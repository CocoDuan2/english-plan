<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P5 - Letter E Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffeef8,#fff5f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
  position:relative;
  margin-top:8px;
}
.tz::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);width:60%;height:3px;
  background:rgba(255,255,255,.5);border-radius:2px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;
  margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;
  border:4px solid #e91e8c;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}
.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
}
.replay-btn:active{transform:scale(.95)}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;max-width:500px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ff6b9d,#e91e8c);
  border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
  transform-style:preserve-3d;
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mem-front .emoji{font-size:48px}
.mem-back{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;
}
.start-screen .preview img{width:70px;height:auto}
.start-btn{
  padding:16px 40px;background:#e91e8c;color:#fff;
  border:none;border-radius:16px;font-size:32px;
  font-weight:900;cursor:pointer;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
  transition:transform .2s ease;
}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:110px;margin:20px auto}
.done-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.done-screen .msg{font-size:22px;color:#e67e22;font-weight:700;margin-bottom:20px}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px;padding:6px 14px}
  .sb{font-size:20px}
  .learn-card{width:105px;height:105px}
  .learn-card img{width:70px}
  .learn-card .label{font-size:16px}
  .card-icon{font-size:44px}
  .listen-card{width:95px;height:95px}
  .listen-card img{width:60px}
  .listen-card .label{font-size:14px}
  .mem-grid{grid-template-columns:repeat(4,1fr);max-width:340px;gap:10px}
  .mem-front .emoji{font-size:36px}
  .mem-back img{width:45px}
  .mem-back .label{font-size:13px}
  .start-screen h1{font-size:32px}
  .start-btn{font-size:26px;padding:14px 32px}
  .done-screen h1{font-size:32px}
  .replay-btn{font-size:18px;padding:10px 20px}
}
@media(min-width:768px){
  .te{font-size:28px}
  .tz{font-size:22px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>Letter E Review</h1>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95a.svg" alt="egg">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f418.svg" alt="elephant">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4aa.svg" alt="elbow">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6aa.svg" alt="exit">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Learn New Words</div>
    <div class="tz">点击卡片学单词</div>
    <div class="sb" id="stars1">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/george-standing.png" alt="George">
    <div class="bbl">Click to reveal!</div>
  </div>
  <div class="learn-grid">
    <div class="learn-card" onclick="revealCard(0)">
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95a.svg" alt="egg">
      <div class="label">egg</div>
    </div>
    <div class="learn-card" onclick="revealCard(1)">
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f418.svg" alt="elephant">
      <div class="label">elephant</div>
    </div>
    <div class="learn-card" onclick="revealCard(2)">
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4aa.svg" alt="elbow">
      <div class="label">elbow</div>
    </div>
    <div class="learn-card" onclick="revealCard(3)">
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6aa.svg" alt="exit">
      <div class="label">exit</div>
    </div>
  </div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听单词，拼字母</div>
    <div class="sb" id="stars2">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
    <div class="bbl">Listen and spell!</div>
  </div>
  <div id="blendGame" style="text-align:center;margin-top:24px">
    <button class="replay-btn" onclick="playBlendWord()">🔊 Play Word</button>
    <div id="blendTarget" style="font-size:32px;font-weight:900;color:#e91e8c;margin:20px 0;min-height:40px"></div>
    <div id="blendOptions" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px"></div>
  </div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听单词找图片</div>
    <div class="sb" id="stars3">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
    <div class="bbl">Find the word!</div>
  </div>
  <button class="replay-btn" onclick="playListenWord()">🔊 Replay</button>
  <div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">翻牌配对游戏</div>
    <div class="sb" id="stars4">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-walking.png" alt="Daddy">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="done-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <h1>All Done!</h1>
    <div class="msg">You learned letter E! 🎉</div>
    <button class="start-btn" onclick="goTo(0)">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / <span id="total">6</span></div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
const words=['egg','elephant','elbow','exit'];
const emojis=['1f95a','1f418','1f4aa','1f6aa'];
let ci=0,ts=6;
let stars=[0,0,0,0,0];
let revealed=0;
let blendIdx=0,blendAttempts=0;
let listenIdx=0,listenAttempts=0;
let memFlipped=[],memMatched=0;

function goTo(i){
  if(i<0||i>=ts)return;
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===ts-1;
  if(i===2)initBlendGame();
  if(i===3)initListenGame();
  if(i===4)initMemGame();
}
function next(){if(ci<ts-1)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}


// Audio cache
const audioCache={};
(function(){
  const words=['egg','elephant','elbow','exit'];
  words.forEach(w=>{
    const a=new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`);
    a.load();
    audioCache[w]=a;
  });
})();
function speak(w,cb){
  const finish=()=>{if(cb)cb()};
  if(audioCache[w]){
    audioCache[w].currentTime=0;
    audioCache[w].play().then(()=>{
      audioCache[w].onended=finish;
      setTimeout(finish,4000);
    }).catch(()=>{
      const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
      const a2=new Audio(u2);
      a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(()=>{
        finish();
        if(typeof showAudioError==='function')showAudioError();
      });
    });
  }else{
    const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
    const a=new Audio(u);
    a.play().then(()=>{a.onended=finish;setTimeout(finish,4000)}).catch(()=>{
      const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
      const a2=new Audio(u2);
      a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(()=>{
        finish();
        if(typeof showAudioError==='function')showAudioError();
      });
    });
  }
}

function playOk(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

function playNo(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=200;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),200);
}

function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;
      background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};
      left:${50+Math.random()*20-10}%;top:30%;
      animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

function updateStars(mod,earned){
  stars[mod]=earned;
  const sb=document.getElementById(`stars${mod}`);
  if(sb){
    sb.innerHTML='';
    for(let i=0;i<4;i++){
      sb.innerHTML+=i<earned?'⭐':'<span style="color:#bbb">★</span>';
    }
  }
}

function revealCard(idx){
  const cards=document.querySelectorAll('.learn-card');
  if(cards[idx].classList.contains('revealed'))return;
  cards[idx].classList.add('revealed');
  speak(words[idx]);
  revealed++;
  if(revealed===4){
    updateStars(1,4);
    showConfetti();
  }
}

function initBlendGame(){
  blendIdx=Math.floor(Math.random()*4);
  blendAttempts=0;
  const target=words[blendIdx];
  document.getElementById('blendTarget').textContent='';
  const opts=document.getElementById('blendOptions');
  opts.innerHTML='';
  
  const letters=target.split('');
  const shuffled=[...letters].sort(()=>Math.random()-0.5);
  
  shuffled.forEach(letter=>{
    const btn=document.createElement('button');
    btn.textContent=letter;
    btn.style.cssText='padding:12px 20px;font-size:24px;font-weight:900;background:#e91e8c;color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .2s';
    btn.onclick=()=>checkBlendLetter(letter,btn);
    opts.appendChild(btn);
  });
  
  speak(target);
}

let blendAnswer='';
function checkBlendLetter(letter,btn){
  blendAnswer+=letter;
  btn.disabled=true;
  btn.style.opacity='0.3';
  document.getElementById('blendTarget').textContent=blendAnswer;
  
  const target=words[blendIdx];
  if(blendAnswer.length===target.length){
    if(blendAnswer===target){
      playOk();
      showConfetti();
      speak(target);
      updateStars(2,4-blendAttempts);
      setTimeout(()=>next(),2000);
    }else{
      playNo();
      blendAttempts++;
      setTimeout(()=>{
        blendAnswer='';
        initBlendGame();
      },1000);
    }
  }
}

function playBlendWord(){
  speak(words[blendIdx]);
}

function initListenGame(){
  listenIdx=Math.floor(Math.random()*4);
  listenAttempts=0;
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  
  const shuffled=[...words].sort(()=>Math.random()-0.5);
  shuffled.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[words.indexOf(w)]}.svg" alt="${w}">`;
    card.onclick=()=>checkListen(w);
    grid.appendChild(card);
  });
  
  speak(words[listenIdx]);
}

function checkListen(w){
  if(w===words[listenIdx]){
    playOk();
    speak(w);
    showConfetti();
    updateStars(3,4-listenAttempts);
    setTimeout(()=>next(),2000);
  }else{
    playNo();
    listenAttempts++;
    speak(words[listenIdx]);
  }
}

function playListenWord(){
  speak(words[listenIdx]);
}

function initMemGame(){
  memFlipped=[];
  memMatched=0;
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  
  const pairs=[];
  for(let i=0;i<4;i++){
    pairs.push({type:'img',word:words[i],emoji:emojis[i]});
    pairs.push({type:'text',word:words[i],emoji:emojis[i]});
  }
  pairs.sort(()=>Math.random()-0.5);
  
  pairs.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.idx=i;
    card.dataset.word=p.word;
    card.innerHTML=`
      <div class="mem-front"><div class="emoji">❓</div></div>
      <div class="mem-back">
        ${p.type==='img'?`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${p.emoji}.svg" alt="${p.word}">`:`<div class="label">${p.word}</div>`}
      </div>
    `;
    card.onclick=()=>flipMem(i);
    grid.appendChild(card);
  });
}

function flipMem(idx){
  const cards=document.querySelectorAll('.mem-card');
  const card=cards[idx];
  
  if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(memFlipped.length>=2)return;
  
  card.classList.add('flipped');
  memFlipped.push(idx);
  
  if(memFlipped.length===2){
    const c1=cards[memFlipped[0]];
    const c2=cards[memFlipped[1]];
    
    if(c1.dataset.word===c2.dataset.word){
      playOk();
      speak(c1.dataset.word);
      setTimeout(()=>{
        c1.classList.add('matched');
        c2.classList.add('matched');
        memFlipped=[];
        memMatched++;
        if(memMatched===4){
          updateStars(4,4);
          showConfetti();
          setTimeout(()=>next(),2000);
        }
      },500);
    }else{
      playNo();
      setTimeout(()=>{
        c1.classList.remove('flipped');
        c2.classList.remove('flipped');
        memFlipped=[];
      },1000);
    }
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prev();
  if(e.key==='ArrowRight')next();
});
goTo(0);
</script>
</body>
</html>
