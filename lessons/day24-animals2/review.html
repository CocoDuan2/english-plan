<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 24 - Animals 2 Review Game</title>
<style>
:root{--tip-accent:#ff6f00;--tip-bg:#fff3e0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#fff3e0 0%,#ffe0b2 50%,#ffcc80 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#ffb74d,#ff9800);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(255,152,0,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.y-wrap{display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px}
.y-q{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;gap:8px}
.y-q .sent{font-size:22px;font-weight:700;color:#2c3e50;margin-bottom:4px}
.y-opts{display:flex;gap:8px;justify-content:center}
.y-opt{width:100px;height:100px;border:none;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.2s}
.y-opt:active{transform:scale(.95)}
.y-opt.ok{background:#c8e6c9;box-shadow:0 0 0 3px #66bb6a}
.y-opt.no{background:#ffcdd2;box-shadow:0 0 0 3px #e57373}
.y-opt .w{font-size:18px;font-weight:900;color:#2c3e50;text-transform:lowercase}
.bino-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:420px}
.bino-card{width:100%;aspect-ratio:1;border:none;border-radius:18px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:.25s;position:relative}
.bino-card.closed{background:linear-gradient(145deg,#8d6e63,#6d4c41)}
.bino-card.closed::after{content:'🔭';font-size:48px}
.bino-card:active{transform:scale(.95)}
.bino-card .inner{opacity:0;transform:scale(.7);transition:.25s;display:flex;flex-direction:column;align-items:center;gap:6px}
.bino-card.on{background:#fff}
.bino-card.on::after{display:none}
.bino-card.on .inner{opacity:1;transform:scale(1)}
.bino-card .w{font-size:20px;font-weight:900;color:#2c3e50;text-transform:lowercase}
.net-wrap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:420px}
.net-q{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;gap:10px}
.net-prompt{font-size:26px;font-weight:900;color:#2c3e50;text-transform:lowercase}
.net-opts{display:flex;gap:8px;justify-content:center}
.net-btn{width:110px;height:110px;border:none;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.2s}
.net-btn:active{transform:scale(.95)}
.net-btn.ok{background:#c8e6c9;box-shadow:0 0 0 3px #66bb6a}
.net-btn.no{background:#ffcdd2;box-shadow:0 0 0 3px #e57373}
.net-btn .w{font-size:18px;font-weight:900;color:#2c3e50;text-transform:lowercase}
.call-wrap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:420px}
.call-q{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;gap:10px}
.call-prompt{font-size:26px;font-weight:900;color:#2c3e50;text-transform:lowercase}
.call-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.call-btn{width:100%;aspect-ratio:1;border:none;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.2s}
.call-btn:active{transform:scale(.95)}
.call-btn.ok{background:#c8e6c9;box-shadow:0 0 0 3px #66bb6a}
.call-btn.no{background:#ffcdd2;box-shadow:0 0 0 3px #e57373}
.call-btn .w{font-size:16px;font-weight:900;color:#2c3e50;text-transform:lowercase}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.done-wrap img{width:160px;height:auto}
.done-ttl{font-size:48px;font-weight:900;color:#2c3e50}
.done-msg{font-size:22px;color:#5f6c7b;text-align:center}
.play-again{font-size:28px;font-weight:700;padding:16px 48px;border:none;border-radius:32px;background:linear-gradient(135deg,#F9ADC7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(249,173,199,.4);margin-top:8px}
.play-again:active{transform:scale(.95)}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Safari Game</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>
<script>
var PP='../../assets/peppa/',ac,busy=false;
var WORDS=[
  {w:'rabbit',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="66" cy="38" rx="10" ry="24" fill="#e1bee7"/><ellipse cx="94" cy="38" rx="10" ry="24" fill="#e1bee7"/><circle cx="80" cy="70" r="30" fill="#f3e5f5"/><ellipse cx="80" cy="115" rx="36" ry="30" fill="#f3e5f5"/><circle cx="70" cy="66" r="4" fill="#333"/><circle cx="90" cy="66" r="4" fill="#333"/></svg>'},
  {w:'pig',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="112" rx="34" ry="26" fill="#f48fb1"/><circle cx="80" cy="64" r="28" fill="#f48fb1"/><ellipse cx="80" cy="74" rx="16" ry="11" fill="#f06292"/><circle cx="74" cy="74" r="3" fill="#ad1457"/><circle cx="86" cy="74" r="3" fill="#ad1457"/></svg>'},
  {w:'cow',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="115" rx="36" ry="28" fill="#fff"/><circle cx="80" cy="64" r="30" fill="#fff"/><circle cx="55" cy="55" r="10" fill="#424242"/><circle cx="90" cy="70" r="12" fill="#424242"/></svg>'},
  {w:'horse',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="115" rx="32" ry="26" fill="#8d6e63"/><ellipse cx="80" cy="70" rx="26" ry="32" fill="#8d6e63"/><path d="M 70 35 Q 80 28 90 35" fill="#6d4c41"/></svg>'},
  {w:'sheep',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="108" rx="34" ry="26" fill="#eceff1"/><circle cx="80" cy="64" r="28" fill="#eceff1"/><circle cx="58" cy="58" r="10" fill="#eceff1"/><circle cx="102" cy="58" r="10" fill="#eceff1"/></svg>'}
];
var YEST=[
  {w:'pink',svg:'<svg width="70" height="70" viewBox="0 0 160 160"><rect x="45" y="20" width="70" height="90" rx="35" fill="#f48fb1"/><rect x="70" y="105" width="20" height="45" rx="3" fill="#8d6e63"/></svg>'},
  {w:'purple',svg:'<svg width="70" height="70" viewBox="0 0 160 160"><ellipse cx="80" cy="90" rx="28" ry="50" fill="#ce93d8"/><rect x="65" y="35" width="30" height="15" rx="7" fill="#9c27b0"/></svg>'},
  {w:'white',svg:'<svg width="70" height="70" viewBox="0 0 160 160"><rect x="35" y="40" width="90" height="80" rx="4" fill="#fff" stroke="#bdbdbd" stroke-width="4"/><rect x="30" y="115" width="10" height="25" fill="#8d6e63"/></svg>'}
];

function ensureAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t){ensureAudio();var o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=0.18;o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function playOk(){playTone(523,.08);setTimeout(function(){playTone(659,.08)},90);setTimeout(function(){playTone(784,.12)},180)}
function playNo(){playTone(330,.15,'square');setTimeout(function(){playTone(262,.2,'square')},160)}
function speak(t,cb){
  var done=false;
  function fin(){if(!done){done=true;if(cb)cb()}}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');
  a.onended=fin;
  a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web');
    b.onended=fin;b.onerror=fin;b.play().catch(fin);
  };
  a.play().catch(fin);
  setTimeout(fin,4000);
}

var cur=0,stars=0;
function go(d){
  var n=cur+d;
  if(n<0||n>=6)return;
  document.getElementById('m'+cur).classList.remove('on');
  cur=n;
  document.getElementById('m'+cur).classList.add('on');
  document.getElementById('pg').textContent=(cur+1)+'/6';
  document.getElementById('pb').disabled=(cur===0);
  document.getElementById('nb').disabled=(cur===5);
  updateTop();
  if(cur===1)initYest();
  if(cur===2)initBino();
  if(cur===3)initNet();
  if(cur===4)initCall();
  if(cur===5)initDone();
}

function updateTop(){
  var titles=['Start','Yesterday','Learn','Rescue Net','Listen','Done'];
  var tips=['','昨天学的颜色','点望远镜,找动物','听声音,选动物','听声音,找图片',''];
  document.getElementById('en').textContent=titles[cur];
  document.getElementById('zh').textContent=tips[cur];
  document.getElementById('st').textContent=stars>0?'⭐'.repeat(stars):'';
}

function addStar(){stars++;updateTop()}

document.getElementById('m0').innerHTML='<img src="'+PP+'emily-elephant.png" width="140"><div class="pr"><img src="'+PP+'peppa-pig-bicycle.png"><div class="bbl">Let\'s rescue animals!</div></div><button class="start-btn" onclick="ensureAudio();go(1)">Start</button>';

function initYest(){
  if(document.getElementById('m1').children.length>0)return;
  var h='<div class="pr"><img src="'+PP+'george-pig-dinosaur.png"><div class="bbl">Yesterday\'s colors!</div></div><div class="y-wrap">';
  YEST.forEach(function(it,i){
    h+='<div class="y-q"><div class="sent">It\'s '+it.w+'!</div><div class="y-opts">';
    var opts=shuffle([it].concat(YEST.filter(function(x){return x.w!==it.w}).slice(0,2)));
    opts.forEach(function(o){
      h+='<button class="y-opt" data-w="'+o.w+'" data-ans="'+it.w+'" onclick="checkYest(this)">'+o.svg+'<div class="w">'+o.w+'</div></button>';
    });
    h+='</div></div>';
  });
  h+='</div>';
  document.getElementById('m1').innerHTML=h;
}

function checkYest(b){
  if(busy||b.classList.contains('ok'))return;
  busy=true;
  var ans=b.dataset.ans,w=b.dataset.w;
  if(w===ans){
    b.classList.add('ok');
    playOk();
    speak(w,function(){busy=false;addStar()});
  }else{
    b.classList.add('no');
    playNo();
    speak(ans,function(){
      b.classList.remove('no');
      busy=false;
    });
  }
}

function initBino(){
  if(document.getElementById('m2').children.length>0)return;
  var h='<div class="pr"><img src="'+PP+'candy-cat.png"><div class="bbl">Find the animals!</div></div><div class="bino-grid">';
  WORDS.forEach(function(it){
    h+='<button class="bino-card closed" onclick="revealBino(this)"><div class="inner">'+it.svg+'<div class="w">'+it.w+'</div></div></button>';
  });
  h+='</div>';
  document.getElementById('m2').innerHTML=h;
}

function revealBino(b){
  if(busy||b.classList.contains('on'))return;
  busy=true;
  b.classList.add('on');
  var w=b.querySelector('.w').textContent;
  playOk();
  speak(w,function(){busy=false;addStar()});
}

function initNet(){
  if(document.getElementById('m3').children.length>0)return;
  var h='<div class="pr"><img src="'+PP+'peppa-pig-bicycle.png"><div class="bbl">Rescue the animals!</div></div><div class="net-wrap" id="netWrap"></div>';
  document.getElementById('m3').innerHTML=h;
  nextNet();
}

var netIdx=0;
function nextNet(){
  if(netIdx>=WORDS.length){go(1);return}
  var it=WORDS[netIdx];
  var opts=shuffle([it].concat(WORDS.filter(function(x){return x.w!==it.w}).slice(0,2)));
  var h='<div class="net-q"><div class="net-prompt">'+it.w+'</div><div class="net-opts">';
  opts.forEach(function(o){
    h+='<button class="net-btn" data-w="'+o.w+'" data-ans="'+it.w+'" onclick="checkNet(this)">'+o.svg+'<div class="w">'+o.w+'</div></button>';
  });
  h+='</div></div>';
  document.getElementById('netWrap').innerHTML=h;
  speak(it.w);
}

function checkNet(b){
  if(busy)return;
  busy=true;
  var ans=b.dataset.ans,w=b.dataset.w;
  if(w===ans){
    b.classList.add('ok');
    playOk();
    speak(w,function(){
      netIdx++;
      busy=false;
      addStar();
      setTimeout(nextNet,600);
    });
  }else{
    b.classList.add('no');
    playNo();
    speak(ans,function(){
      b.classList.remove('no');
      busy=false;
    });
  }
}

function initCall(){
  if(document.getElementById('m4').children.length>0)return;
  var h='<div class="pr"><img src="'+PP+'emily-elephant.png"><div class="bbl">Listen and find!</div></div><div class="call-wrap" id="callWrap"></div>';
  document.getElementById('m4').innerHTML=h;
  nextCall();
}

var callIdx=0;
function nextCall(){
  if(callIdx>=WORDS.length){go(1);return}
  var it=WORDS[callIdx];
  var opts=shuffle([it].concat(WORDS.filter(function(x){return x.w!==it.w}).slice(0,3)));
  var h='<div class="call-q"><div class="call-prompt">🔊</div><div class="call-grid">';
  opts.forEach(function(o){
    h+='<button class="call-btn" data-w="'+o.w+'" data-ans="'+it.w+'" onclick="checkCall(this)">'+o.svg+'<div class="w">'+o.w+'</div></button>';
  });
  h+='</div></div>';
  document.getElementById('callWrap').innerHTML=h;
  speak(it.w);
}

function checkCall(b){
  if(busy)return;
  busy=true;
  var ans=b.dataset.ans,w=b.dataset.w;
  if(w===ans){
    b.classList.add('ok');
    playOk();
    speak(w,function(){
      callIdx++;
      busy=false;
      addStar();
      setTimeout(nextCall,600);
    });
  }else{
    b.classList.add('no');
    playNo();
    setTimeout(function(){
      b.classList.remove('no');
      busy=false;
    },800);
  }
}

function initDone(){
  if(document.getElementById('m5').children.length>0)return;
  document.getElementById('m5').innerHTML='<div class="done-wrap"><img src="'+PP+'peppa-pig-family.png"><div class="done-ttl">All Done!</div><div class="done-msg">All animals rescued! 🚁✨</div><div class="st">⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐</div><button class="play-again" onclick="location.reload()">Play Again</button></div>';
}

function shuffle(a){var c=a.slice();for(var i=c.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=c[i];c[i]=c[j];c[j]=t}return c}

updateTop();
</script>
</body>
</html>
