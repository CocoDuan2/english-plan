<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 23 - Colors 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-title{background:linear-gradient(165deg,#f8bbd0,#f48fb1)}
.bg-hello{background:linear-gradient(170deg,#fff3e0,#ffe0b2)}
.bg-yesterday{background:linear-gradient(160deg,#e1f5fe,#b3e5fc)}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-purple{background:linear-gradient(160deg,#e1bee7,#ce93d8)}
.bg-white{background:linear-gradient(160deg,#fafafa,#f5f5f5)}
.bg-black{background:linear-gradient(160deg,#757575,#616161)}
.bg-brown{background:linear-gradient(160deg,#d7ccc8,#bcaaa4)}
.bg-paint{background:linear-gradient(160deg,#f8bbd0,#f48fb1)}
.bg-gallery{background:linear-gradient(160deg,#e1bee7,#ce93d8)}
.bg-bye{background:linear-gradient(180deg,#ffb74d,#F9ADC7 60%,#ce93d8)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#5f6c7b}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:8px 0;text-shadow:0 3px 0 rgba(0,0,0,.08);text-transform:lowercase}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:85px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj{margin:10px 0}
.obj svg{width:190px;height:190px}
.y-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:760px;margin-top:8px}
.y-card{width:180px;background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.y-card .w{font-size:28px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.paint-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:480px;margin-top:10px}
.paint-btn{width:130px;height:130px;border:none;border-radius:18px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.12);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:.25s}
.paint-btn.closed{background:linear-gradient(145deg,#bdbdbd,#9e9e9e)}
.paint-btn.closed::after{content:'🎨';font-size:36px}
.paint-btn:active{transform:scale(.95)}
.paint-btn .inner{opacity:0;transform:scale(.72);transition:.25s}
.paint-btn .lb{position:absolute;bottom:8px;left:0;right:0;font-size:22px;font-weight:900;color:#2c3e50;text-transform:lowercase;opacity:0;transition:.25s}
.paint-btn.on{background:#fff}
.paint-btn.on::after{display:none}
.paint-btn.on .inner{opacity:1;transform:scale(1)}
.paint-btn.on .lb{opacity:1}
.gallery-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:700px;margin-top:10px}
.gallery-card{background:#fff;border-radius:16px;padding:10px;box-shadow:0 3px 10px rgba(0,0,0,.08);text-align:center;position:relative;border:4px solid #8d6e63}
.gallery-card .w{font-size:28px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.45);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:310px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){
  .word{font-size:100px}
  .obj svg{width:200px;height:200px}
  .paint-btn{width:150px;height:150px}
}
</style>
</head>
<body>
<div class="deck">

<!-- 1. Title: Art Gallery -->
<div class="sl bg-title on">
  <img src="../../assets/peppa/candy-cat.png" width="120" alt="Candy Cat">
  <div class="obj">
    <svg width="150" height="150" viewBox="0 0 160 160" aria-label="Palette">
      <ellipse cx="80" cy="85" rx="55" ry="45" fill="#8d6e63"/>
      <circle cx="100" cy="50" r="12" fill="#f48fb1"/>
      <circle cx="60" cy="55" r="12" fill="#ce93d8"/>
      <circle cx="75" cy="90" r="12" fill="#fff"/>
      <circle cx="105" cy="95" r="12" fill="#424242"/>
      <circle cx="90" cy="70" r="12" fill="#a1887f"/>
      <ellipse cx="45" cy="95" rx="10" ry="18" fill="#8d6e63"/>

  </div>

  <div class="sub">Beautiful colors!</div>
</div>

<!-- 2. Hello: Candy invites to art gallery -->
<div class="sl bg-hello">

    <img src="../../assets/peppa/george-pig-superhero.png" width="85" alt="George">
  </div>
  <div class="pr">
    <img src="../../assets/peppa/candy-cat.png" alt="Candy Cat">

    <svg width="60" height="60" viewBox="0 0 80 80"><ellipse cx="40" cy="50" rx="18" ry="25" fill="#ce93d8"/><circle cx="40" cy="30" r="8" fill="#9c27b0"/></svg>
    <svg width="60" height="60" viewBox="0 0 80 80"><rect x="20" y="15" width="40" height="50" rx="6" fill="#a1887f"/><rect x="25" y="20" width="30" height="40" fill="#fff"/></svg>
  </div>
</div>

<!-- 3. Yesterday Review: Day 22 Actions -->
<div class="sl bg-yesterday">
  <div class="ttl" style="font-size:38px">Yesterday Review</div>
  <div class="y-grid">
    <div class="y-card">
      <svg width="80" height="80" viewBox="0 0 160 160">
        <circle cx="80" cy="30" r="18" fill="#ff6f00"/>
        <ellipse cx="80" cy="70" rx="22" ry="30" fill="#ff6f00"/>
        <rect x="58" y="55" width="8" height="35" rx="4" fill="#ff6f00" transform="rotate(-35 62 72)"/>
        <rect x="94" y="55" width="8" height="35" rx="4" fill="#ff6f00" transform="rotate(45 98 72)"/>
        <rect x="58" y="90" width="8" height="40" rx="4" fill="#ff6f00" transform="rotate(-25 62 110)"/>
        <rect x="94" y="90" width="8" height="40" rx="4" fill="#ff6f00" transform="rotate(55 98 110)"/>
      </svg>

    </div>

        <ellipse cx="80" cy="75" rx="22" ry="28" fill="#ec407a"/>
        <rect x="50" y="60" width="8" height="32" rx="4" fill="#ec407a" transform="rotate(-45 54 76)"/>
        <rect x="102" y="60" width="8" height="32" rx="4" fill="#ec407a" transform="rotate(45 106 76)"/>
        <rect x="58" y="95" width="8" height="28" rx="4" fill="#ec407a" transform="rotate(-15 62 109)"/>
        <rect x="94" y="95" width="8" height="28" rx="4" fill="#ec407a" transform="rotate(15 98 109)"/>

</div>

<!-- 4. New Word: pink -->
<div class="sl bg-pink">
  <div class="pr">
    <img src="../../assets/peppa/emily-elephant.png" alt="Emily">
    <div class="bbl">It's pink!</div>
  </div>
  <div class="obj">
    <svg width="190" height="190" viewBox="0 0 160 160" aria-label="Pink paintbrush">

<!-- 5. New Word: purple -->

    <img src="../../assets/peppa/daddy-pig.png" alt="Daddy Pig">

  </div>

    <svg width="190" height="190" viewBox="0 0 160 160" aria-label="Purple paint tube">

<!-- 6. New Word: white -->

    <img src="../../assets/peppa/mummy-pig-standing.png" alt="Mummy Pig">
    <div class="bbl">It's white!</div>
  </div>
  <div class="obj">
    <svg width="190" height="190" viewBox="0 0 160 160" aria-label="White canvas">

      <rect x="30" y="115" width="10" height="25" fill="#8d6e63"/>
      <rect x="120" y="115" width="10" height="25" fill="#8d6e63"/>
      <rect x="25" y="135" width="110" height="8" rx="4" fill="#8d6e63"/>
    </svg>
  </div>
  <div class="word" style="color:#757575">white</div>
</div>

<!-- 7. New Word: black -->
<div class="sl bg-black">
  <div class="pr">
    <img src="../../assets/peppa/peppa-pig-bicycle.png" alt="Peppa">
    <div class="bbl" style="background:#fff;color:#e67e22">It's black!</div>
  </div>
  <div class="obj">
    <svg width="190" height="190" viewBox="0 0 160 160" aria-label="Black ink bottle">
      <rect x="50" y="70" width="60" height="60" rx="8" fill="#424242"/>
      <rect x="60" y="50" width="40" height="25" rx="6" fill="#616161"/>
      <ellipse cx="80" cy="50" rx="15" ry="8" fill="#757575"/>
      <rect x="65" y="85" width="30" height="20" rx="4" fill="#fff"/>
      <text x="80" y="98" font-size="12" fill="#424242" text-anchor="middle" font-weight="700">INK</text>
    </svg>
  </div>
  <div class="word" style="color:#fff">black</div>
</div>

<!-- 8. New Word: brown -->
<div class="sl bg-brown">
  <div class="pr">
    <img src="../../assets/peppa/candy-cat.png" alt="Candy Cat">
    <div class="bbl">It's brown!</div>
  </div>
  <div class="obj">
    <svg width="190" height="190" viewBox="0 0 160 160" aria-label="Brown picture frame">
      <rect x="30" y="40" width="100" height="80" rx="6" fill="#a1887f"/>
      <rect x="45" y="55" width="70" height="50" fill="#fff"/>
      <circle cx="80" cy="50" r="4" fill="#6d4c41"/>
      <line x1="60" y1="75" x2="100" y2="75" stroke="#8d6e63" stroke-width="3"/>
      <line x1="60" y1="85" x2="100" y2="85" stroke="#8d6e63" stroke-width="3"/>
    </svg>
  </div>
  <div class="word" style="color:#6d4c41">brown</div>
</div>

<!-- 9. Paint Tubes Reveal -->
<div class="sl bg-paint">
  <div class="ttl" style="font-size:38px">Squeeze the Paint!</div>
  <div class="paint-grid" id="paintGrid"></div>
</div>

<!-- 10. Gallery Wall -->
<div class="sl bg-gallery">
  <div class="ttl" style="font-size:52px">Gallery Wall</div>
  <div class="gallery-grid">
    <div class="gallery-card">
      <svg width="100" height="100" viewBox="0 0 160 160">
        <rect x="45" y="20" width="70" height="90" rx="35" fill="#f48fb1"/>
        <rect x="70" y="105" width="20" height="45" rx="3" fill="#8d6e63"/>
        <ellipse cx="80" cy="152" rx="8" ry="4" fill="#6d4c41"/>
      </svg>
      <div class="w">pink</div>
    </div>
    <div class="gallery-card">
      <svg width="100" height="100" viewBox="0 0 160 160">
        <ellipse cx="80" cy="90" rx="28" ry="50" fill="#ce93d8"/>
        <rect x="65" y="35" width="30" height="15" rx="7" fill="#9c27b0"/>
        <rect x="75" y="25" width="10" height="15" fill="#7b1fa2"/>
        <line x1="70" y1="70" x2="90" y2="70" stroke="#ab47bc" stroke-width="3"/>
        <line x1="70" y1="85" x2="90" y2="85" stroke="#ab47bc" stroke-width="3"/>
        <line x1="70" y1="100" x2="90" y2="100" stroke="#ab47bc" stroke-width="3"/>
      </svg>
      <div class="w">purple</div>
    </div>
    <div class="gallery-card">
      <svg width="100" height="100" viewBox="0 0 160 160">
        <rect x="35" y="40" width="90" height="80" rx="4" fill="#fff" stroke="#bdbdbd" stroke-width="4"/>
        <rect x="30" y="115" width="10" height="25" fill="#8d6e63"/>
        <rect x="120" y="115" width="10" height="25" fill="#8d6e63"/>
        <rect x="25" y="135" width="110" height="8" rx="4" fill="#8d6e63"/>
      </svg>
      <div class="w">white</div>
    </div>
    <div class="gallery-card">
      <svg width="100" height="100" viewBox="0 0 160 160">
        <rect x="50" y="70" width="60" height="60" rx="8" fill="#424242"/>
        <rect x="60" y="50" width="40" height="25" rx="6" fill="#616161"/>
        <ellipse cx="80" cy="50" rx="15" ry="8" fill="#757575"/>
        <rect x="65" y="85" width="30" height="20" rx="4" fill="#fff"/>
        <text x="80" y="98" font-size="12" fill="#424242" text-anchor="middle" font-weight="700">INK</text>
      </svg>
      <div class="w">black</div>
    </div>
    <div class="gallery-card">
      <svg width="100" height="100" viewBox="0 0 160 160">
        <rect x="30" y="40" width="100" height="80" rx="6" fill="#a1887f"/>
        <rect x="45" y="55" width="70" height="50" fill="#fff"/>
        <circle cx="80" cy="50" r="4" fill="#6d4c41"/>
        <line x1="60" y1="75" x2="100" y2="75" stroke="#8d6e63" stroke-width="3"/>
        <line x1="60" y1="85" x2="100" y2="85" stroke="#8d6e63" stroke-width="3"/>
      </svg>
      <div class="w">brown</div>
    </div>
  </div>
</div>

<!-- 11. Bye: Peppa family at art show -->
<div class="sl bg-bye">
  <img src="../../assets/peppa/peppa-pig-family.png" width="160" alt="Peppa Family">
  <div class="ttl" style="font-size:48px">Beautiful Art!</div>
  <div class="sub" style="font-size:24px">See you tomorrow! 🎨</div>
</div>

</div>

<button class="fab" id="fab" onclick="toggleNotes()">T</button>
<div class="pop" id="pop"></div>

<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/11</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>

<script>
var COLS=[
  {w:'pink',svg:'<rect x="45" y="20" width="70" height="90" rx="35" fill="#f48fb1"/><rect x="70" y="105" width="20" height="45" rx="3" fill="#8d6e63"/><ellipse cx="80" cy="152" rx="8" ry="4" fill="#6d4c41"/>'},
  {w:'purple',svg:'<ellipse cx="80" cy="90" rx="28" ry="50" fill="#ce93d8"/><rect x="65" y="35" width="30" height="15" rx="7" fill="#9c27b0"/><rect x="75" y="25" width="10" height="15" fill="#7b1fa2"/><line x1="70" y1="70" x2="90" y2="70" stroke="#ab47bc" stroke-width="3"/><line x1="70" y1="85" x2="90" y2="85" stroke="#ab47bc" stroke-width="3"/><line x1="70" y1="100" x2="90" y2="100" stroke="#ab47bc" stroke-width="3"/>'},
  {w:'white',svg:'<rect x="35" y="40" width="90" height="80" rx="4" fill="#fff" stroke="#bdbdbd" stroke-width="4"/><rect x="30" y="115" width="10" height="25" fill="#8d6e63"/><rect x="120" y="115" width="10" height="25" fill="#8d6e63"/><rect x="25" y="135" width="110" height="8" rx="4" fill="#8d6e63"/>'},
  {w:'black',svg:'<rect x="50" y="70" width="60" height="60" rx="8" fill="#424242"/><rect x="60" y="50" width="40" height="25" rx="6" fill="#616161"/><ellipse cx="80" cy="50" rx="15" ry="8" fill="#757575"/><rect x="65" y="85" width="30" height="20" rx="4" fill="#fff"/><text x="80" y="98" font-size="12" fill="#424242" text-anchor="middle" font-weight="700">INK</text>'},
  {w:'brown',svg:'<rect x="30" y="40" width="100" height="80" rx="6" fill="#a1887f"/><rect x="45" y="55" width="70" height="50" fill="#fff"/><circle cx="80" cy="50" r="4" fill="#6d4c41"/><line x1="60" y1="75" x2="100" y2="75" stroke="#8d6e63" stroke-width="3"/><line x1="60" y1="85" x2="100" y2="85" stroke="#8d6e63" stroke-width="3"/>'}
];
var NOTES=[
  'Title slide: Art Gallery theme with palette',
  'Hello: Candy invites friends to paint',
  'Yesterday Review: run, jump, walk from Day 22',
  'New word: pink (paintbrush)',
  'New word: purple (paint tube)',
  'New word: white (canvas)',
  'New word: black (ink bottle)',
  'New word: brown (picture frame)',
  'Interactive: Squeeze paint tubes to reveal colors',
  'All Together: Gallery wall with all 5 art tools',
  'Bye: Peppa family celebrates art show'
];
var cur=0,sls=document.querySelectorAll('.sl');
function go(d){
  sls[cur].classList.remove('on');
  cur+=d;
  if(cur<0)cur=0;
  if(cur>=sls.length)cur=sls.length-1;
  sls[cur].classList.add('on');
  document.getElementById('pg').textContent=(cur+1)+'/'+sls.length;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===sls.length-1;
}
function toggleNotes(){
  var f=document.getElementById('fab'),p=document.getElementById('pop');
  f.classList.toggle('on');
  p.classList.toggle('on');
  if(p.classList.contains('on'))p.innerHTML='<strong>Teacher Notes</strong><br>'+NOTES.map((n,i)=>(i+1)+'. '+n).join('<br>');
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='ArrowRight')go(1);
  if(e.key==='t'||e.key==='T')toggleNotes();
});
var pg=document.getElementById('paintGrid');
COLS.forEach(function(c){
  var b=document.createElement('button');
  b.className='paint-btn closed';
  b.innerHTML='<div class="inner"><svg width="90" height="90" viewBox="0 0 160 160">'+c.svg+'</svg></div><div class="lb">'+c.w+'</div>';
  b.onclick=function(){
    if(b.classList.contains('on'))return;
    b.classList.add('on');
  };
  pg.appendChild(b);
});
go(0);
</script>
</body>
</html>
