<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 18 Review - Daily Actions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ffd89b,#ffb347);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,211,155,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::before{content:'⏰';margin-right:8px}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,211,155,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.learn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:440px;margin:20px 0}
.learn-card{background:#ddd;border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;min-height:140px;justify-content:center;transition:all .3s}
.learn-card.revealed{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card img{width:90px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-card .lbl{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .lbl{opacity:1}
.routine-wrap{display:flex;flex-direction:column;gap:15px;width:100%;max-width:500px;margin:20px 0}
.routine-item{background:#fff;border-radius:16px;padding:15px 20px;display:flex;align-items:center;gap:15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s}
.routine-item:hover{transform:scale(1.02)}
.routine-item img{width:60px}
.routine-item .info{flex:1}
.routine-item .time{font-size:18px;font-weight:700;color:#e67e22}
.routine-item .action{font-size:16px;color:#666}
.routine-item.done{opacity:.5;pointer-events:none}
.listen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:440px;margin:20px 0}
.listen-card{background:#fff;border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;min-height:140px;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s}
.listen-card:hover{transform:scale(1.02)}
.listen-card img{width:90px}
.listen-card .lbl{font-size:20px;font-weight:700;color:#2c3e50}
.sound-icon{font-size:32px;background:linear-gradient(135deg,#ffd89b,#ffb347);border:none;border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px rgba(255,211,155,.4);margin:10px 0}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:560px;margin:20px 0}
.memory-card{aspect-ratio:1;background:#F9ADC7;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s}
.memory-card:hover{transform:scale(1.05)}
.memory-card.flipped{background:#fff}
.memory-card.matched{opacity:.3;pointer-events:none}
.memory-card img{width:70px;display:none}
.memory-card.flipped img{display:block}
.memory-card .back{display:block}
.memory-card.flipped .back{display:none}
.memory-card .lbl{font-size:18px;font-weight:700;color:#2c3e50;display:none}
.memory-card.flipped .lbl{display:block}
.start-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin:20px 0}
.start-wrap img{width:110px}
.start-btn{padding:16px 40px;border:none;border-radius:16px;font-size:32px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#F9ADC7,#ff9a9e);color:#fff;box-shadow:0 6px 20px rgba(249,173,199,.4)}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin:20px 0}
.done-wrap img{width:110px}
.play-again{padding:14px 32px;border:none;border-radius:12px;font-size:24px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.learn-grid{grid-template-columns:1fr;gap:15px;max-width:300px}
.learn-card{min-height:120px}
.learn-card img{width:70px}
.learn-card .lbl{font-size:18px}
.routine-item img{width:50px}
.routine-item .time{font-size:16px}
.routine-item .action{font-size:14px}
.listen-grid{grid-template-columns:1fr;gap:15px;max-width:300px}
.listen-card{min-height:120px}
.listen-card img{width:70px}
.listen-card .lbl{font-size:18px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px}
.memory-card{font-size:36px}
.memory-card img{width:55px}
.memory-card .lbl{font-size:16px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="start-wrap">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="te">Daily Actions</div>
<div style="display:flex;gap:15px;margin:10px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f374.svg" width="50" alt="eat">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f964.svg" width="50" alt="drink">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f634.svg" width="50" alt="sleep">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9fc.svg" width="50" alt="wash">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg" width="50" alt="play">
</div>
<button class="start-btn" onclick="getAC();goM(1)">Let's Play!</button>
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，学单词！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Daily Routine Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Daily Routine</div>
<div class="tz">帮佩琪安排一天！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
<div class="bbl">What do I do?</div>
</div>
<div class="routine-wrap" id="rw"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Listen carefully!</div>
</div>
<button class="sound-icon" id="spk3" onclick="playQ3()">🔊</button>
<div class="listen-grid" id="lf"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">Find the pairs!</div>
</div>
<div class="memory-grid" id="mg"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" alt="Peppa & George">
<div class="te">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div style="font-size:20px;color:#e67e22;margin:10px 0">Great job today!</div>
<button class="play-again" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{w:'eat',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f374.svg'},
{w:'drink',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f964.svg'},
{w:'sleep',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f634.svg'},
{w:'wash',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9fc.svg'},
{w:'play',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg'}
];
var curM=0,busy=false;

var audioCache={};
var words=['sleep', 'Candy', 'Daddy', 'wash', 'George', 'play', 'drink', 'eat', 'Peppa'];
words.forEach(function(w){var a=new Audio('https://dict.youdao.com/dictvoice?audio='+w+'&type=2');a.load();audioCache[w]=a});
function speak(t,cb){
if(audioCache[t]){
audioCache[t].currentTime=0;
audioCache[t].play().then(function(){cb&&cb()}).catch(function(){});
}else{
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var a=new Audio(primary);
a.play().then(function(){cb&&cb()}).catch(function(){});
}});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn
var m1done=0;
function initM1(){
if(document.getElementById('lg').children.length>0)return;
W.forEach(function(item){
var c=document.createElement('div');
c.className='learn-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
speak(item.w);
m1done++;
document.getElementById('s1').innerHTML=stars(m1done,5);
if(m1done===5){
setTimeout(function(){
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
},300);
}
};
document.getElementById('lg').appendChild(c);
});
}

// M2: Daily Routine
var m2done=0;
var routine=[
{time:'8:00 AM',action:'eat',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f374.svg'},
{time:'10:00 AM',action:'play',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg'},
{time:'12:00 PM',action:'eat',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f374.svg'},
{time:'2:00 PM',action:'sleep',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f634.svg'},
{time:'4:00 PM',action:'drink',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f964.svg'}
];
var m2q=0;
function initM2(){
if(document.getElementById('rw').children.length>0)return;
routine.forEach(function(item,idx){
var c=document.createElement('div');
c.className='routine-item';
c.innerHTML='<img src="'+item.img+'" alt="'+item.action+'"><div class="info"><div class="time">'+item.time+'</div><div class="action">'+item.action+'</div></div>';
c.onclick=function(){
if(busy||c.classList.contains('done'))return;
busy=true;
if(idx===m2q){
playOk();
speak(item.action);
c.classList.add('done');
m2done++;
document.getElementById('s2').innerHTML=stars(m2done,5);
m2q++;
if(m2done===5){
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
setTimeout(function(){busy=false},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
document.getElementById('rw').appendChild(c);
});
}

// M3: Listen & Find
var m3done=0;
var m3q=null;
function initM3(){
if(document.getElementById('lf').children.length>0)return;
W.forEach(function(item){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
c.onclick=function(){
if(busy||!m3q)return;
busy=true;
if(item.w===m3q.w){
playOk();
speak(item.w);
m3done++;
document.getElementById('s3').innerHTML=stars(m3done,5);
if(m3done===5){
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
setTimeout(function(){
m3q=null;
if(m3done<5)playQ3();
busy=false;
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
document.getElementById('lf').appendChild(c);
});
playQ3();
}

function playQ3(){
if(m3done>=5)return;
var pool=W.filter(function(x){return !x.used3});
if(pool.length===0){
W.forEach(function(x){x.used3=false});
pool=W.slice();
}
m3q=pool[Math.floor(Math.random()*pool.length)];
m3q.used3=true;
speak(m3q.w);
}

// M4: Memory Match
var m4done=0;
var flipped=[];
function initM4(){
if(document.getElementById('mg').children.length>0)return;
var pairs=[];
W.forEach(function(item){
pairs.push({type:'img',data:item.img,word:item.w});
pairs.push({type:'txt',data:item.w,word:item.w});
});
pairs.sort(function(){return Math.random()-.5});
pairs.forEach(function(item){
var c=document.createElement('div');
c.className='memory-card';
c.dataset.word=item.word;
if(item.type==='img'){
c.innerHTML='<div class="back">❓</div><img src="'+item.data+'" alt="'+item.word+'">';
}else{
c.innerHTML='<div class="back">❓</div><div class="lbl">'+item.data+'</div>';
}
c.onclick=function(){
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
flipped.push(c);
if(flipped.length===2){
busy=true;
var w1=flipped[0].dataset.word;
var w2=flipped[1].dataset.word;
if(w1===w2){
playOk();
speak(w1);
flipped[0].classList.add('matched');
flipped[1].classList.add('matched');
m4done++;
document.getElementById('s4').innerHTML=stars(m4done,5);
if(m4done===5){
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
goM(1);
},1200);
}
flipped=[];
setTimeout(function(){busy=false},1200);
}else{
playNo();
setTimeout(function(){
flipped[0].classList.remove('flipped');
flipped[1].classList.remove('flipped');
flipped=[];
busy=false;
},1000);
}
}
};
document.getElementById('mg').appendChild(c);
});
}

function initM5(){
showConfetti();
}

goM(0);
</script>
</body>
</html>
