<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 12 Review - Weather Watch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#e3f2fd,#bbdefb);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#01579b;margin:8px 0;text-shadow:0 2px 4px rgba(1,87,155,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#29b6f6,#0288d1);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(2,136,209,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(2,136,209,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.pr.big img{width:110px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#0277bd;box-shadow:0 2px 8px rgba(0,0,0,.08)}
/* M1: Learn cards - drop-in reveal */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px}
.card{width:110px;height:120px;background:#b0bec5;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .5s;overflow:hidden}
.card .card-inner{opacity:0;transform:translateY(-60px) scale(.5);transition:all .6s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:6px}
.card.revealed{background:#fff}
.card.revealed .card-inner{opacity:1;transform:translateY(0) scale(1)}
.card .card-label{font-size:20px;font-weight:700;color:#2c3e50}
/* M2: Weather Match - hear word, tap correct weather scene */
.wm-prompt{font-size:32px;font-weight:900;color:#01579b;margin:10px 0;padding:14px 28px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-height:60px;display:flex;align-items:center;justify-content:center;gap:10px}
.wm-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:500px;margin:16px 0}
.wm-btn{width:100px;height:110px;border-radius:18px;background:#fff;border:4px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:4px}
.wm-btn:active{transform:scale(.9)}
.wm-btn.ok{border-color:#4caf50;background:#e8f5e9}
.wm-btn.no{border-color:#e53935;background:#ffebee;animation:shake .4s}
.wm-btn .wface{font-size:44px}
.wm-btn .wlabel{font-size:13px;font-weight:700;color:#555}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* M3: Listen & Find */
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.listen-card{width:100px;height:100px;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card-label{font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px}
/* M4: Memory Match */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:90%;max-width:560px}
.mem-card{aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;transform-style:preserve-3d;position:relative}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.6;pointer-events:none}
.mem-front,.mem-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px}
.mem-front{background:linear-gradient(135deg,#29b6f6,#0288d1);font-size:44px}
.mem-back{transform:rotateY(180deg);background:#fff;flex-direction:column;gap:4px}
.mem-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #29b6f6;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#0288d1;color:#fff;box-shadow:0 4px 12px rgba(2,136,209,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.pr.big img{width:90px}
.sb{font-size:22px}
.card{width:95px;height:105px}.card .card-label{font-size:18px}
.wm-prompt{font-size:24px;padding:10px 20px}.wm-btn{width:80px;height:90px}.wm-btn .wface{font-size:36px}.wm-btn .wlabel{font-size:11px}
.listen-card{width:85px;height:85px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}.mem-back-label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="pr big"><img src="../../assets/peppa/george-standing.png" alt="George"></div>
<div class="te">Weather Watch</div>
<div class="sb">What's the weather today?</div>
<div style="display:flex;gap:14px;align-items:center;margin:20px 0;font-size:40px">
<span>☀️</span><span>🌧️</span><span>☁️</span><span>🌬️</span><span>❄️</span>
</div>
</div>
<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">👆 点一点，看看是什么天气？</div>
<div class="sb" id="s1"></div>
</div>
<div class="pr"><img src="../../assets/peppa/peppa_pig_arms_open.png" alt="Peppa"><div class="bbl">Tap to see!</div></div>
<div class="card-grid" id="cg1"></div>
</div>
<!-- M2: Weather Match -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Weather Match</div>
<div class="tz">🌤️ 听一听，点对的天气！</div>
<div class="sb" id="s2"></div>
</div>
<div class="pr"><img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy"><div class="bbl">Find the weather!</div></div>
<div class="wm-prompt" id="m2prompt"></div>
<div class="wm-grid" id="m2grid"></div>
</div>
<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找天气！</div>
<div class="sb" id="s3"></div>
</div>
<div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl">Listen carefully!</div><div onclick="playM3Round()" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#81d4fa,#0288d1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-left:8px">🔊</div></div>
<div class="listen-grid" id="lg3"></div>
</div>
<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一对！</div>
<div class="sb" id="s4"></div>
</div>
<div class="pr"><img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily"><div class="bbl">Find pairs!</div></div>
<div class="memory-grid" id="mg4"></div>
</div>
<!-- M5: Done -->
<div id="m5" class="mod">
<div class="pr big"><img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb">Sun, rain, cloud, wind, snow! 🎉</div>
<div class="sb" id="s5"></div>
<button class="nb" onclick="location.reload()" style="margin-top:20px;font-size:20px;padding:16px 40px">Play Again</button>
</div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var W=[
{w:'sun',face:'☀️',color:'#f57f17'},
{w:'rain',face:'🌧️',color:'#0277bd'},
{w:'cloud',face:'☁️',color:'#78909c'},
{w:'wind',face:'🌬️',color:'#00838f'},
{w:'snow',face:'❄️',color:'#4a148c'}
];
var curM=0,busy=false,st=[0,0,0,0,0];
function speak(t){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');
a.play().catch(function(){new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web').play().catch(function(){})});
}
function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#f57f17","#0277bd","#78909c","#00838f","#4a148c"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){
curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}
// M1: Learn - drop-in reveal
var m1rev=[];
function initM1(){
if(m1rev.length>0)return;
document.getElementById('s1').innerHTML=stars(0,W.length);
var g=document.getElementById('cg1');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='card';
c.innerHTML='<div style="font-size:44px">❓</div><div class="card-inner"><div style="font-size:50px">'+item.face+'</div><div class="card-label">'+item.w+'</div></div>';
c.onclick=function(){
if(c.classList.contains('revealed')){speak(item.w);return}
c.classList.add('revealed');speak(item.w);m1rev.push(i);
st[0]=m1rev.length;document.getElementById('s1').innerHTML=stars(st[0],W.length);
};
g.appendChild(c);
});
}
// M2: Weather Match - hear word, tap correct weather icon
var m2round=0,m2order=[];
function initM2(){
if(m2order.length>0)return;
document.getElementById('s2').innerHTML=stars(0,W.length);
m2order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('m2grid');g.innerHTML='';
W.forEach(function(item,i){
var b=document.createElement('div');b.className='wm-btn';
b.innerHTML='<div class="wface">'+item.face+'</div><div class="wlabel">'+item.w+'</div>';
b.onclick=function(){checkM2(i,b)};
g.appendChild(b);
});
startM2Round();
}
function startM2Round(){
if(m2round>=W.length)return;
var item=W[m2order[m2round]];
document.getElementById('m2prompt').innerHTML='<span style="font-size:36px">'+item.face+'</span> '+item.w;
document.getElementById('m2prompt').style.color=item.color;
speak(item.w);
}
function checkM2(idx,btn){
if(busy||m2round>=W.length)return;
if(idx===m2order[m2round]){
busy=true;btn.classList.add('ok');playOk();st[1]++;
document.getElementById('s2').innerHTML=stars(st[1],W.length);
m2round++;
setTimeout(function(){
document.querySelectorAll('.wm-btn').forEach(function(b){b.classList.remove('ok','no')});
busy=false;if(m2round<W.length)startM2Round();
else document.getElementById('m2prompt').innerHTML='<span style="font-size:36px">🎉</span> All done!';
},1200);
}else{btn.classList.add('no');playNo();setTimeout(function(){btn.classList.remove('no')},600)}
}
// M3: Listen & Find
var m3round=0,m3order=[];
function initM3(){
if(m3order.length>0)return;
document.getElementById('s3').innerHTML=stars(0,W.length);
m3order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('lg3');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='listen-card';
c.innerHTML='<div style="font-size:44px">'+item.face+'</div><div class="listen-card-label">'+item.w+'</div>';
c.onclick=function(){checkM3(i)};
g.appendChild(c);
});
playM3Round();
}
function playM3Round(){if(m3round>=W.length)return;speak(W[m3order[m3round]].w)}
function checkM3(idx){
if(busy||m3round>=W.length)return;
if(idx===m3order[m3round]){
busy=true;playOk();st[2]++;document.getElementById('s3').innerHTML=stars(st[2],W.length);
m3round++;
setTimeout(function(){if(m3round<W.length)playM3Round();busy=false},1200);
}else{playNo()}
}
// M4: Memory Match
var m4flipped=[],m4matched=0;
function initM4(){
if(m4matched>0)return;
m4matched=0;m4flipped=[];busy=false;
var pairs=[];
W.forEach(function(item,i){pairs.push({idx:i,w:item.w,img:item.img});pairs.push({idx:i,w:item.w,img:item.img})});
pairs.sort(function(){return Math.random()-.5});
window._m4cards=pairs;
var g=document.getElementById('mg4');g.innerHTML='';
for(var i=0;i<pairs.length;i++){
g.innerHTML+='<div id="mc'+i+'" onclick="m4Tap('+i+')" style="width:85px;height:85px;border-radius:14px;background:linear-gradient(135deg,#29b6f6,#0288d1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">🌈</div>';
}
}
function m4Tap(i){
if(busy||m4flipped.length>=2)return;
var el=document.getElementById('mc'+i);
if(el.classList.contains('done')||m4flipped.indexOf(i)>=0)return;
el.innerHTML='<img src="'+window._m4cards[i].img+'" width="55" alt="'+window._m4cards[i].w+'">';
el.style.background='#fff';
m4flipped.push(i);
speak(window._m4cards[i].w);
if(m4flipped.length===2){
busy=true;var a=m4flipped[0],b=m4flipped[1];
if(window._m4cards[a].idx===window._m4cards[b].idx){
playOk();m4matched++;st[3]++;
document.getElementById('s4').innerHTML=stars(st[3],W.length);
document.getElementById('mc'+a).classList.add('done');
document.getElementById('mc'+b).classList.add('done');
m4flipped=[];busy=false;
if(m4matched>=W.length)setTimeout(function(){goM(1)},1000);
}else{
playNo();setTimeout(function(){
document.getElementById('mc'+a).innerHTML='🌈';
document.getElementById('mc'+a).style.background='linear-gradient(135deg,#29b6f6,#0288d1)';
document.getElementById('mc'+b).innerHTML='🌈';
document.getElementById('mc'+b).style.background='linear-gradient(135deg,#29b6f6,#0288d1)';
m4flipped=[];busy=false;
},1000);
}
}
}
function initM5(){document.getElementById('s5').innerHTML=stars(5,5)}
goM(0);
</script>
</body>
</html>
