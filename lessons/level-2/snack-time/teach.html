<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 20 - Snack Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#fff8dc,#ffe4b5)}
.bg-snack{background:linear-gradient(160deg,#fff8dc,#ffd89b)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.obj-wrap img{width:160px;height:auto}
.sound-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:48px;margin:12px;transition:transform .1s}
.sound-btn:active{transform:scale(.9)}
.sound-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin:20px 0}
.snack-btn{width:120px;height:120px;border-radius:20px;border:4px solid #fff;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .2s;background:linear-gradient(135deg,#fff,#f8f8f8)}
.snack-btn:active{transform:scale(.95)}
.snack-btn img{width:70px;height:auto}
.snack-btn .lbl{font-size:18px;font-weight:700;color:#e67e22}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:20px 0;max-width:600px}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.grid-item img{width:80px;height:auto}
.grid-item .lbl{font-size:24px;font-weight:700;color:#2c3e50}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.word{font-size:100px}.sent{font-size:38px}.obj-wrap img{width:180px}.grid-item img{width:100px}}
@media(max-width:480px){.ttl{font-size:30px}.sub{font-size:16px}.word{font-size:56px;letter-spacing:2px}.sent{font-size:24px}.bbl{font-size:20px;padding:8px 14px}.pr img{width:65px}.obj-wrap img{width:130px}.sound-btn{width:80px;height:80px;font-size:36px}.snack-btn{width:100px;height:100px}.snack-btn img{width:60px}.grid{grid-template-columns:repeat(2,1fr);gap:16px}.grid-item img{width:70px}.grid-item .lbl{font-size:20px}}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Title -->
<div class="sl bg-pink on">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:10px 0" alt="Peppa">
<div class="ttl">Snack Time</div>
<div class="sub">Let's have a snack!</div>
<div style="display:flex;gap:20px;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg" width="60" alt="rice">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg" width="60" alt="cake">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg" width="60" alt="juice">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg" width="60" alt="candy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" width="60" alt="cookie">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-sky">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:10px 0" alt="Peppa">
<div class="ttl" style="font-size:52px">Hello! I'm hungry!</div>
</div>

<!-- S2: rice -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Can I have rice?</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg" alt="rice">
</div>
<div class="word">rice</div>
</div>

<!-- S3: cake -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Can I have cake?</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg" alt="cake">
</div>
<div class="word">cake</div>
</div>

<!-- S4: juice -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Can I have juice?</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg" alt="juice">
</div>
<div class="word">juice</div>
</div>

<!-- S5: candy -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Can I have candy?</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg" alt="candy">
</div>
<div class="word">candy</div>
</div>

<!-- S6: cookie -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa">
<div class="bbl">Can I have cookie?</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" alt="cookie">
</div>
<div class="word">cookie</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Tap to hear!</div>
</div>
<div class="sound-grid">
<button class="sound-btn" style="background:linear-gradient(135deg,#fff8dc,#ffd89b)" onclick="speak('rice')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg" width="50" alt="rice">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#ffb6c1,#ff69b4)" onclick="speak('cake')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg" width="50" alt="cake">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#ffa500,#ff8c00)" onclick="speak('juice')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg" width="50" alt="juice">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#ff6b9d,#ff1493)" onclick="speak('candy')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg" width="50" alt="candy">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#d2691e,#8b4513)" onclick="speak('cookie')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" width="50" alt="cookie">
</button>
</div>
</div>

<!-- S8: Snack Table -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">What do you want?</div>
</div>
<div class="sound-grid">
<button class="snack-btn" onclick="speak('rice')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg" alt="rice">
<div class="lbl">rice</div>
</button>
<button class="snack-btn" onclick="speak('cake')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg" alt="cake">
<div class="lbl">cake</div>
</button>
<button class="snack-btn" onclick="speak('juice')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg" alt="juice">
<div class="lbl">juice</div>
</button>
<button class="snack-btn" onclick="speak('candy')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg" alt="candy">
<div class="lbl">candy</div>
</button>
<button class="snack-btn" onclick="speak('cookie')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" alt="cookie">
<div class="lbl">cookie</div>
</button>
</div>
</div>

<!-- S9: All Together -->
<div class="sl bg-snack">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa" style="width:120px">
<div class="bbl">All the snacks!</div>
</div>
<div class="grid">
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg" alt="rice">
<div class="lbl">rice</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg" alt="cake">
<div class="lbl">cake</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg" alt="juice">
<div class="lbl">juice</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg" alt="candy">
<div class="lbl">candy</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" alt="cookie">
<div class="lbl">cookie</div>
</div>
</div>
</div>

<!-- S10: Bye -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:140px;margin:10px 0" alt="Peppa and George">
<div class="ttl">Yummy! Bye bye!</div>
<div class="sub">Tomorrow: Beach Day! 🏖️</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>

<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:'Title page: Snack Time. Preview 5 snacks.',
1:'Hello page: Peppa is hungry! Ready for snack time.',
2:'New word: rice. Peppa asks "Can I have rice?" Point to the rice bowl.',
3:'New word: cake. George asks "Can I have cake?" Point to the cake.',
4:'New word: juice. Candy asks "Can I have juice?" Point to the juice box.',
5:'New word: candy. Emily asks "Can I have candy?" Point to the candy.',
6:'New word: cookie. Peppa asks "Can I have cookie?" Point to the cookie.',
7:'Listen & Say: Tap each snack to hear the word. Repeat after the audio.',
8:'Snack Table: Tap each snack. Ask students "What do you want?"',
9:'All Together: Point to random snacks and ask "Can I have ___?"',
10:'Bye page: Peppa and George are full! Preview tomorrow: Beach Day.'
};

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fb='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fb);
b.play().catch(function(){});
});
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
}

function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
if(e.key==='t'||e.key==='T')tn();
});

goTo(0);
</script>
</body>
</html>
