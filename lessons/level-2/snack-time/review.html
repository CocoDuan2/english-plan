<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 20 Review - Snack Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fff8dc,#ffd89b);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ffa500,#ff8c00);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,165,0,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::before{content:'🍪';margin-right:8px}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,165,0,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card{width:140px;height:140px;border-radius:16px;background:#ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.12);transition:transform .2s;margin:8px}
.card.on{background:#fff}
.card:active{transform:scale(.95)}
.card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.card.on img{opacity:1}
.card .lbl{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.card.on .lbl{opacity:1}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin:20px 0}
.snack-zone{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin:20px 0}
.snack-item{width:110px;height:110px;border-radius:16px;border:3px solid #fff;background:linear-gradient(135deg,#fff,#f8f8f8);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);transition:transform .2s}
.snack-item:active{transform:scale(.95)}
.snack-item img{width:65px;height:auto}
.snack-item .lbl{font-size:16px;font-weight:700;color:#e67e22}
.listen-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin:20px 0}
.listen-item{width:110px;height:110px;border-radius:16px;border:3px solid #fff;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);transition:transform .2s}
.listen-item:active{transform:scale(.95)}
.listen-item img{width:70px;height:auto}
.listen-item .lbl{font-size:16px;font-weight:700;color:#2c3e50}
.listen-btn{width:80px;height:80px;border-radius:50%;border:none;background:linear-gradient(135deg,#ffa500,#ff8c00);color:#fff;font-size:36px;cursor:pointer;box-shadow:0 4px 12px rgba(255,165,0,.4);margin:16px 0;transition:transform .1s}
.listen-btn:active{transform:scale(.9)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:440px;margin:20px 0}
.mem-card{aspect-ratio:1;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:transform .2s;background:linear-gradient(135deg,#ffa500,#ff8c00)}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{background:#fff}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flipped .back{display:none}
.mem-card.flipped .front{display:flex}
.mem-card .front img{width:70px;height:auto}
.mem-card .front .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.mem-card.matched{opacity:.4;pointer-events:none}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #ffa500;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#ffa500;color:#fff;box-shadow:0 4px 12px rgba(255,165,0,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.mem-grid{width:560px;gap:16px}}
@media(max-width:480px){.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}.pr img{width:65px}.sb{font-size:22px}.card{width:120px;height:120px}.card img{width:75px}.card .lbl{font-size:18px}.snack-item{width:95px;height:95px}.snack-item img{width:55px}.listen-item{width:95px;height:95px}.listen-item img{width:60px}.mem-grid{width:100%;max-width:360px;grid-template-columns:repeat(4,1fr);gap:8px}.mem-card .back{font-size:36px}.mem-card .front img{width:55px}.mem-card .front .lbl{font-size:15px}}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:10px 0" alt="Peppa">
<div class="te">Snack Time Review</div>
<div style="display:flex;gap:16px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg" width="60" alt="rice">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg" width="60" alt="cake">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg" width="60" alt="juice">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg" width="60" alt="candy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" width="60" alt="cookie">
</div>
<button class="nb" onclick="getAC();goM(1)" style="font-size:28px;padding:18px 48px;margin-top:20px">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，听一听！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="cards" id="cards1"></div>
</div>

<!-- M2: Snack Picker -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Pick a Snack</div>
<div class="tz">🍰 点你想吃的零食！</div>
<div class="sb" id="s2"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">What do you want?</div>
</div>
<div class="snack-zone" id="snackZone"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Find the snack!</div>
</div>
<button class="listen-btn" id="listenBtn" onclick="playListenWord()">🔊</button>
<div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 找一找，配一对！</div>
<div class="sb" id="s4"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa">
<div class="bbl">Match them!</div>
</div>
<div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:120px;margin:10px 0" alt="Peppa and George">
<div class="te" style="font-size:48px;color:#ffa500">All Done!</div>
<div class="sb" style="font-size:28px;color:#e67e22;margin:20px 0">⭐⭐⭐⭐⭐</div>
<div class="bbl" style="font-size:24px;margin:20px 0">Great job! You learned all the snacks!</div>
<button class="nb" onclick="location.reload()" style="font-size:24px;padding:16px 40px;margin-top:20px">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{w:'rice',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35a.svg'},
{w:'cake',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f370.svg'},
{w:'juice',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9c3.svg'},
{w:'candy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36c.svg'},
{w:'cookie',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg'}
];
var curM=0,busy=false;
var m1Done=0,m2Done=0,m3Done=0,m4Done=0;
var listenTarget='',listenIdx=0;
var memFlipped=[],memMatched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);
o.frequency.value=f;g.gain.value=.15;
o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(m1Done>0)return;
var c=document.getElementById('cards1');
c.innerHTML='';
W.forEach(function(item,i){
var card=document.createElement('div');
card.className='card';
card.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
card.onclick=function(){
if(card.classList.contains('on'))return;
card.classList.add('on');
speak(item.w);
m1Done++;
document.getElementById('s1').innerHTML=stars(m1Done,5);
if(m1Done===5){
setTimeout(function(){
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
},300);
}
};
c.appendChild(card);
});
}

function initM2(){
if(m2Done>0)return;
var z=document.getElementById('snackZone');
z.innerHTML='';
var order=[0,1,2,3,4].sort(function(){return Math.random()-.5});
var target=W[order[0]].w;
document.querySelector('#m2 .bbl').textContent='找到 '+target;
order.forEach(function(i){
var item=W[i];
var div=document.createElement('div');
div.className='snack-item';
div.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
div.onclick=function(){
if(busy)return;
busy=true;
if(item.w===target){
playOk();
speak(item.w);
m2Done++;
document.getElementById('s2').innerHTML=stars(m2Done,5);
setTimeout(function(){
busy=false;
if(m2Done<5){
var nextIdx=order[m2Done];
target=W[nextIdx].w;
document.querySelector('#m2 .bbl').textContent='找到 '+target;
}else{
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
z.appendChild(div);
});
}

function initM3(){
if(m3Done>0)return;
var g=document.getElementById('listenGrid');
g.innerHTML='';
W.forEach(function(item){
var div=document.createElement('div');
div.className='listen-item';
div.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
div.onclick=function(){
if(busy)return;
busy=true;
if(item.w===listenTarget){
playOk();
speak(item.w);
m3Done++;
document.getElementById('s3').innerHTML=stars(m3Done,5);
setTimeout(function(){
busy=false;
if(m3Done<5){
playListenWord();
}else{
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
g.appendChild(div);
});
playListenWord();
}

function playListenWord(){
if(m3Done>=5)return;
listenIdx=Math.floor(Math.random()*5);
listenTarget=W[listenIdx].w;
speak(listenTarget);
}

function initM4(){
if(m4Done>0)return;
var pairs=[];
W.forEach(function(item){
pairs.push({type:'img',data:item.img,word:item.w});
pairs.push({type:'txt',data:item.w,word:item.w});
});
pairs.sort(function(){return Math.random()-.5});
var g=document.getElementById('memGrid');
g.innerHTML='';
pairs.forEach(function(p,i){
var card=document.createElement('div');
card.className='mem-card';
card.dataset.idx=i;
card.dataset.word=p.word;
if(p.type==='img'){
card.innerHTML='<div class="back">🍪</div><div class="front"><img src="'+p.data+'" alt="'+p.word+'"></div>';
}else{
card.innerHTML='<div class="back">🍪</div><div class="front"><div class="lbl">'+p.data+'</div></div>';
}
card.onclick=function(){
if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
card.classList.add('flipped');
memFlipped.push(card);
if(memFlipped.length===2){
busy=true;
var c1=memFlipped[0],c2=memFlipped[1];
if(c1.dataset.word===c2.dataset.word){
playOk();
speak(c1.dataset.word);
c1.classList.add('matched');
c2.classList.add('matched');
memMatched++;
m4Done++;
document.getElementById('s4').innerHTML=stars(m4Done,5);
setTimeout(function(){
memFlipped=[];
busy=false;
if(memMatched===5){
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
goM(1);
},600);
}
},1200);
}else{
playNo();
setTimeout(function(){
c1.classList.remove('flipped');
c2.classList.remove('flipped');
memFlipped=[];
busy=false;
},1000);
}
}
};
g.appendChild(card);
});
}

function initM5(){
document.getElementById('s4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
