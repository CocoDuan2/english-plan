<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 13 Review - Where We Go</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#e8f5e9,#c8e6c9);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#2e7d32;margin:8px 0;text-shadow:0 2px 4px rgba(46,125,50,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#66bb6a,#43a047);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(67,160,71,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(67,160,71,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.pr.big img{width:110px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#2e7d32;box-shadow:0 2px 8px rgba(0,0,0,.08)}
/* M1: Learn cards - slide-right reveal */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px}
.card{width:110px;height:120px;background:#a5d6a7;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .5s;overflow:hidden}
.card .card-inner{opacity:0;transform:translateX(-60px);transition:all .6s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:6px}
.card.revealed{background:#fff}
.card.revealed .card-inner{opacity:1;transform:translateX(0)}
.card .card-label{font-size:20px;font-weight:700;color:#2c3e50}
/* M2: Road Trip */
.rt-prompt{font-size:28px;font-weight:900;color:#2e7d32;margin:10px 0;padding:12px 24px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-height:56px;display:flex;align-items:center;justify-content:center;gap:10px}
.rt-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:500px;margin:16px 0}
.rt-btn{width:100px;height:110px;border-radius:18px;background:#fff;border:4px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:4px}
.rt-btn:active{transform:scale(.9)}
.rt-btn.ok{border-color:#4caf50;background:#e8f5e9}
.rt-btn.no{border-color:#e53935;background:#ffebee;animation:shake .4s}
.rt-btn .rface{font-size:44px}
.rt-btn .rlabel{font-size:13px;font-weight:700;color:#555}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* M3: Listen & Find */
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.listen-card{width:100px;height:100px;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card-label{font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px}
/* M4: Memory Match */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:90%;max-width:560px}
.mem-card{aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;transform-style:preserve-3d;position:relative}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.6;pointer-events:none}
.mem-front,.mem-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px}
.mem-front{background:linear-gradient(135deg,#66bb6a,#43a047);font-size:44px}
.mem-back{transform:rotateY(180deg);background:#fff;flex-direction:column;gap:4px}
.mem-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #66bb6a;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#43a047;color:#fff;box-shadow:0 4px 12px rgba(67,160,71,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.pr.big img{width:90px}
.sb{font-size:22px}
.card{width:95px;height:105px}.card .card-label{font-size:18px}
.rt-prompt{font-size:22px;padding:10px 18px}.rt-btn{width:80px;height:90px}.rt-btn .rface{font-size:36px}.rt-btn .rlabel{font-size:11px}
.listen-card{width:85px;height:85px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}.mem-back-label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="pr big"><img src="../../../assets/peppa/peppa_pig_bicycle.png" alt="Peppa"></div>
<div class="te">Where We Go</div>
<div class="sb">Let's explore with Peppa!</div>
<div style="display:flex;gap:14px;align-items:center;margin:20px 0;font-size:40px">
<span>🏠</span><span>🏫</span><span>🌳</span><span>🛒</span><span>🦁</span>
</div>
</div>
<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">👆 点一点，看看去哪里？</div>
<div class="sb" id="s1"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/peppa_pig_arms_open.png" alt="Peppa"><div class="bbl">Tap to see!</div></div>
<div class="card-grid" id="cg1"></div>
</div>
<!-- M2: Road Trip - tap matching place for each prompt -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Road Trip</div>
<div class="tz">🚗 佩琪要去哪？点对的地方！</div>
<div class="sb" id="s2"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/daddy-pig-standing.png" alt="Daddy"><div class="bbl">Let's drive!</div></div>
<div class="rt-prompt" id="rtPrompt"></div>
<div class="rt-grid" id="rtGrid"></div>
</div>
<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找地方！</div>
<div class="sb" id="s3"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl">Listen carefully!</div><div onclick="playM3Round()" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#a5d6a7,#43a047);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-left:8px">🔊</div></div>
<div class="listen-grid" id="lg3"></div>
</div>
<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一对！</div>
<div class="sb" id="s4"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily"><div class="bbl">Find pairs!</div></div>
<div class="memory-grid" id="mg4"></div>
</div>
<!-- M5: Done -->
<div id="m5" class="mod">
<div class="pr big"><img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb">Home, school, park, shop, zoo! 🎉</div>
<div class="sb" id="s5"></div>
<button class="nb" onclick="location.reload()" style="margin-top:20px;font-size:20px;padding:16px 40px">Play Again</button>
</div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../../assets/peppa/';
var W=[
{w:'home',face:'🏠',color:'#e65100'},
{w:'school',face:'🏫',color:'#1565c0'},
{w:'park',face:`<svg viewBox="0 0 100 100">
  <!-- Grass -->
  <rect x="0" y="75" width="100" height="25" fill="#81C784"/>
  <!-- Tree trunk -->
  <rect x="20" y="45" width="8" height="30" rx="2" fill="#6D4C41"/>
  <!-- Tree leaves -->
  <circle cx="24" cy="40" r="15" fill="#4CAF50"/>
  <circle cx="18" cy="35" r="12" fill="#66BB6A"/>
  <circle cx="30" cy="35" r="12" fill="#66BB6A"/>
  <!-- Bench -->
  <rect x="50" y="65" width="35" height="3" rx="1" fill="#8D6E63"/>
  <rect x="52" y="68" width="3" height="10" fill="#8D6E63"/>
  <rect x="80" y="68" width="3" height="10" fill="#8D6E63"/>
  <rect x="50" y="55" width="35" height="3" rx="1" fill="#A1887F"/>
  <!-- Sun -->
  <circle cx="85" cy="15" r="8" fill="#FDD835"/>
</svg>`,color:'#2e7d32',isSvg:true},
{w:'shop',face:'🛒',color:'#c62828'},
{w:'zoo',face:`<svg viewBox="0 0 100 100">
  <!-- Ground -->
  <rect x="0" y="70" width="100" height="30" fill="#A1887F"/>
  <!-- Gate posts -->
  <rect x="15" y="30" width="8" height="40" fill="#6D4C41"/>
  <rect x="77" y="30" width="8" height="40" fill="#6D4C41"/>
  <!-- Gate top -->
  <rect x="15" y="25" width="70" height="8" rx="2" fill="#8D6E63"/>
  <!-- Bars -->
  <rect x="30" y="33" width="3" height="37" fill="#757575"/>
  <rect x="40" y="33" width="3" height="37" fill="#757575"/>
  <rect x="50" y="33" width="3" height="37" fill="#757575"/>
  <rect x="60" y="33" width="3" height="37" fill="#757575"/>
  <rect x="70" y="33" width="3" height="37" fill="#757575"/>
  <!-- Sign "ZOO" -->
  <rect x="35" y="10" width="30" height="12" rx="2" fill="#FF9800"/>
  <text x="50" y="19" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">ZOO</text>
  <!-- Simple elephant silhouette behind bars -->
  <ellipse cx="50" cy="55" rx="12" ry="10" fill="#9E9E9E" opacity="0.6"/>
  <circle cx="50" cy="50" r="8" fill="#9E9E9E" opacity="0.6"/>
</svg>`,color:'#ff6f00',isSvg:true}
];
var curM=0,busy=false,st=[0,0,0,0,0];
var audioCache={};
var words=['Mummy', 'Daddy', 'Family', 'Emily', 'Peppa'];
words.forEach(function(w){var a=new Audio('https://dict.youdao.com/dictvoice?audio='+w+'&type=2');a.load();audioCache[w]=a});
function speak(t){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');
a.play().catch(function(){new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web').play().catch(function(){})});
}
function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e65100","#1565c0","#2e7d32","#c62828","#ff6f00"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){
curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}
// M1: Learn - slide-right reveal
var m1rev=[];
function initM1(){
if(m1rev.length>0)return;
document.getElementById('s1').innerHTML=stars(0,W.length);
var g=document.getElementById('cg1');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='card';
c.innerHTML='<div class="card-inner" style="opacity:0;transition:opacity .5s">'+(item.isSvg?'<div style="width:60px;height:60px">'+item.face+'</div>':'<div style="font-size:50px">'+item.face+'</div>')+'<div class="card-label">'+item.w+'</div></div>';
c.onclick=function(){
if(c.classList.contains('revealed')){speak(item.w);return}
c.style.background='#fff';c.querySelector('.card-inner').style.opacity='1';speak(item.w);m1rev.push(i);
st[0]=m1rev.length;document.getElementById('s1').innerHTML=stars(st[0],W.length);
};
g.appendChild(c);
});
}
// M2: Road Trip - hear word, tap correct place
var m2round=0,m2order=[];
function initM2(){
if(m2order.length>0)return;
document.getElementById('s2').innerHTML=stars(0,W.length);
m2order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('rtGrid');g.innerHTML='';
W.forEach(function(item,i){
var b=document.createElement('div');b.className='rt-btn';
b.innerHTML='<div class="rface">'+item.face+'</div><div class="rlabel">'+item.w+'</div>';
b.onclick=function(){checkM2(i,b)};
g.appendChild(b);
});
startM2Round();
}
function startM2Round(){
if(m2round>=W.length)return;
var item=W[m2order[m2round]];
document.getElementById('rtPrompt').innerHTML='🚗 <span style="color:'+item.color+'">'+item.w+'</span>';
speak(item.w);
}
function checkM2(idx,btn){
if(busy||m2round>=W.length)return;
if(idx===m2order[m2round]){
busy=true;btn.classList.add('ok');playOk();st[1]++;
document.getElementById('s2').innerHTML=stars(st[1],W.length);
m2round++;
setTimeout(function(){
document.querySelectorAll('.rt-btn').forEach(function(b){b.classList.remove('ok','no')});
busy=false;if(m2round<W.length)startM2Round();
else document.getElementById('rtPrompt').innerHTML='<span style="font-size:36px">🎉</span> Great trip!';
},1200);
}else{btn.classList.add('no');playNo();setTimeout(function(){btn.classList.remove('no')},600)}
}
// M3: Listen & Find
var m3round=0,m3order=[];
function initM3(){
if(m3order.length>0)return;
document.getElementById('s3').innerHTML=stars(0,W.length);
m3order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('lg3');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='listen-card';
c.innerHTML='<div style="font-size:44px">'+item.face+'</div><div class="listen-card-label">'+item.w+'</div>';
c.onclick=function(){checkM3(i)};
g.appendChild(c);
});
playM3Round();
}
function playM3Round(){if(m3round>=W.length)return;speak(W[m3order[m3round]].w)}
function checkM3(idx){
if(busy||m3round>=W.length)return;
if(idx===m3order[m3round]){
busy=true;playOk();st[2]++;document.getElementById('s3').innerHTML=stars(st[2],W.length);
m3round++;
setTimeout(function(){if(m3round<W.length)playM3Round();busy=false},1200);
}else{playNo()}
}
// M4: Memory Match
var m4flipped=[],m4matched=0;
function initM4(){
if(m4matched>0)return;
m4matched=0;m4flipped=[];busy=false;
var pairs=[];
W.forEach(function(item,i){pairs.push({idx:i,w:item.w,img:item.img});pairs.push({idx:i,w:item.w,img:item.img})});
pairs.sort(function(){return Math.random()-.5});
window._m4cards=pairs;
var g=document.getElementById('mg4');g.innerHTML='';
for(var i=0;i<pairs.length;i++){
g.innerHTML+='<div id="mc'+i+'" onclick="m4Tap('+i+')" style="width:85px;height:85px;border-radius:14px;background:linear-gradient(135deg,#66bb6a,#43a047);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">🗺️</div>';
}
}
function m4Tap(i){
if(busy||m4flipped.length>=2)return;
var el=document.getElementById('mc'+i);
if(el.classList.contains('done')||m4flipped.indexOf(i)>=0)return;
el.innerHTML='<img src="'+window._m4cards[i].img+'" width="55" alt="'+window._m4cards[i].w+'">';
el.style.background='#fff';
m4flipped.push(i);
speak(window._m4cards[i].w);
if(m4flipped.length===2){
busy=true;var a=m4flipped[0],b=m4flipped[1];
if(window._m4cards[a].idx===window._m4cards[b].idx){
playOk();m4matched++;st[3]++;
document.getElementById('s4').innerHTML=stars(st[3],W.length);
document.getElementById('mc'+a).classList.add('done');
document.getElementById('mc'+b).classList.add('done');
m4flipped=[];busy=false;
if(m4matched>=W.length)setTimeout(function(){goM(1)},1000);
}else{
playNo();setTimeout(function(){
document.getElementById('mc'+a).innerHTML='🗺️';
document.getElementById('mc'+a).style.background='linear-gradient(135deg,#66bb6a,#43a047)';
document.getElementById('mc'+b).innerHTML='🗺️';
document.getElementById('mc'+b).style.background='linear-gradient(135deg,#66bb6a,#43a047)';
m4flipped=[];busy=false;
},1000);
}
}
}
function initM5(){document.getElementById('s5').innerHTML=stars(5,5)}
goM(0);
</script>
</body>
</html>
