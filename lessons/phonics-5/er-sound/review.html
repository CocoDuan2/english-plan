<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P84 - er Sound Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffeef8,#fff5f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
  position:relative;
  margin-top:8px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;
  margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;
  border:4px solid #e91e8c;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}
.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
}
.replay-btn:active{transform:scale(.95)}
.blend-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.blend-card{
  width:140px;padding:16px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.blend-card:hover{transform:translateY(-4px)}
.blend-card:active{transform:scale(.95)}
.blend-letters{
  display:flex;gap:4px;margin-bottom:8px;
}
.blend-letter{
  width:32px;height:32px;
  background:#e91e8c;color:#fff;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;
}
.blend-word{font-size:18px;font-weight:900;color:#2c3e50}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;max-width:500px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ff6b9d,#e91e8c);
  border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mem-front .emoji{font-size:48px}
.mem-back{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;
}
.start-screen .preview img{width:70px}
.start-btn{
  padding:16px 40px;background:#e91e8c;color:#fff;
  border:none;border-radius:20px;font-size:24px;
  font-weight:900;cursor:pointer;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
  transition:transform .2s ease;
  margin-top:20px;
}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:150px;margin:20px auto}
.done-screen h1{font-size:48px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px;padding:6px 14px}
  .sb{font-size:20px}
  .pr img{width:60px}
  .bbl{font-size:20px;padding:8px 16px}
  .learn-card{width:100px;height:100px}
  .learn-card img{width:70px}
  .listen-card{width:90px;height:90px}
  .listen-card img{width:60px}
  .blend-card{width:120px;padding:12px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .start-screen h1{font-size:32px}
  .done-screen h1{font-size:38px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>er Sound Review</h1>
    <div class="tz">点击卡片复习单词</div>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f467.svg" alt="her">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f33f.svg" alt="fern">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4c5.svg" alt="term">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4dd.svg" alt="verb">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Learn New Words</div>
    <div class="tz">点击灰色卡片学习单词</div>
    <div class="sb">
      <span id="learnStars"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/george-standing.png" alt="Peppa">
    <div class="bbl">Tap the cards!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听单词，点击字母拼读</div>
    <div class="sb">
      <span id="blendStars"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-standing.png" alt="Peppa">
    <div class="bbl">Listen and blend!</div>
  </div>
  <button class="replay-btn" onclick="replayBlend()">🔊 Replay</button>
  <div class="blend-grid" id="blendGrid"></div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听单词，找到对应的图片</div>
    <div class="sb">
      <span id="listenStars"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
    <div class="bbl">Listen and find!</div>
  </div>
  <button class="replay-btn" onclick="replayListen()">🔊 Replay</button>
  <div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">翻牌配对游戏</div>
    <div class="sb">
      <span id="memStars"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Peppa">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="done-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <h1>All Done!</h1>
    <div style="font-size:64px;margin:20px 0">🎉</div>
    <button class="start-btn" onclick="goTo(0)">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / 6</div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
const words=[
  {word:'her',emoji:'1f467'},
  {word:'fern',emoji:'1f33f'},
  {word:'term',emoji:'1f4c5'},
  {word:'verb',emoji:'1f4dd'}
];
let ci=0,tm=6;
let learnStars=0,blendStars=0,listenStars=0,memStars=0;
let listenQueue=[],listenCurrent='';
let blendQueue=[],blendCurrent='';
let memFlipped=[],memMatched=0;

function goTo(i){
  if(i<0||i>=tm)return;
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===tm-1;
  if(i===1)initLearn();
  if(i===2)initBlend();
  if(i===3)initListen();
  if(i===4)initMem();
}
function next(){if(ci<tm-1)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}

function speak(w){
  const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
  const a=new Audio(u);
  a.play().catch(()=>{
    const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
    new Audio(u2).play().catch(()=>console.log('Audio failed'));
  });
}

function playOk(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=800;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

function playNo(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=200;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.2);
}

function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;
      background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};
      left:${50+Math.random()*20-10}%;top:30%;
      animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

function updateStars(el,count,total){
  el.innerHTML='';
  for(let i=0;i<total;i++){
    el.innerHTML+=i<count?'⭐':'★';
  }
}

function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  learnStars=0;
  updateStars(document.getElementById('learnStars'),0,4);
  
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg">
      <div class="label">${w.word}</div>
    `;
    card.onclick=()=>{
      if(!card.classList.contains('revealed')){
        card.classList.add('revealed');
        speak(w.word);
        playOk();
        learnStars++;
        updateStars(document.getElementById('learnStars'),learnStars,4);
        if(learnStars===4)showConfetti();
      }
    };
    grid.appendChild(card);
  });
}

function initBlend(){
  blendQueue=[...words].sort(()=>Math.random()-0.5);
  blendStars=0;
  updateStars(document.getElementById('blendStars'),0,4);
  nextBlend();
}

function nextBlend(){
  if(blendQueue.length===0){
    document.getElementById('blendGrid').innerHTML='<div style="font-size:32px;font-weight:900;color:#27ae60">🎉 All done!</div>';
    return;
  }
  
  blendCurrent=blendQueue.shift();
  const grid=document.getElementById('blendGrid');
  grid.innerHTML='';
  
  const letters=blendCurrent.word.split('');
  letters.forEach(letter=>{
    const card=document.createElement('div');
    card.className='blend-card';
    card.innerHTML=`
      <div class="blend-letters">
        <div class="blend-letter">${letter}</div>
      </div>
      <div class="blend-word">${letter}</div>
    `;
    card.onclick=()=>checkBlend(card);
    grid.appendChild(card);
  });
  
  setTimeout(()=>speak(blendCurrent.word),500);
}

function checkBlend(card){
  playOk();
  showConfetti();
  speak(blendCurrent.word);
  blendStars++;
  updateStars(document.getElementById('blendStars'),blendStars,4);
  setTimeout(nextBlend,2000);
}

function replayBlend(){
  if(blendCurrent)speak(blendCurrent.word);
}

function initListen(){
  listenQueue=[...words].sort(()=>Math.random()-0.5);
  listenStars=0;
  updateStars(document.getElementById('listenStars'),0,4);
  nextListen();
}

function nextListen(){
  if(listenQueue.length===0){
    document.getElementById('listenGrid').innerHTML='<div style="font-size:32px;font-weight:900;color:#27ae60">🎉 All done!</div>';
    return;
  }
  
  listenCurrent=listenQueue.shift();
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg">`;
    card.onclick=()=>checkListen(w.word,card);
    grid.appendChild(card);
  });
  
  setTimeout(()=>speak(listenCurrent.word),500);
}

function checkListen(word,card){
  if(word===listenCurrent.word){
    playOk();
    showConfetti();
    speak(word);
    listenStars++;
    updateStars(document.getElementById('listenStars'),listenStars,4);
    setTimeout(nextListen,2000);
  }else{
    playNo();
    card.style.animation='shake .3s';
    setTimeout(()=>card.style.animation='',300);
  }
}

function replayListen(){
  if(listenCurrent)speak(listenCurrent.word);
}

function initMem(){
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  memFlipped=[];
  memMatched=0;
  memStars=0;
  updateStars(document.getElementById('memStars'),0,4);
  
  const pairs=[...words,...words].sort(()=>Math.random()-0.5);
  
  pairs.forEach((w,idx)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.word=w.word;
    card.dataset.idx=idx;
    card.innerHTML=`
      <div class="mem-front"><div class="emoji">❓</div></div>
      <div class="mem-back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg">
        <div class="label">${w.word}</div>
      </div>
    `;
    card.onclick=()=>flipMem(card);
    grid.appendChild(card);
  });
}

function flipMem(card){
  if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(memFlipped.length>=2)return;
  
  card.classList.add('flipped');
  memFlipped.push(card);
  speak(card.dataset.word);
  
  if(memFlipped.length===2){
    setTimeout(checkMem,800);
  }
}

function checkMem(){
  const[c1,c2]=memFlipped;
  if(c1.dataset.word===c2.dataset.word&&c1.dataset.idx!==c2.dataset.idx){
    c1.classList.add('matched');
    c2.classList.add('matched');
    playOk();
    memMatched++;
    memStars++;
    updateStars(document.getElementById('memStars'),memStars,4);
    if(memMatched===4)showConfetti();
  }else{
    c1.classList.remove('flipped');
    c2.classList.remove('flipped');
    playNo();
  }
  memFlipped=[];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prev();
  if(e.key==='ArrowRight')next();
});
goTo(0);
</script>
</body>
</html>
