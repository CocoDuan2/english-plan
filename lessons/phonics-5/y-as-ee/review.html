<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P96 - y as /iː/ Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffeef8,#fff5f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
  position:relative;
  margin-top:8px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;
  margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;
  border:4px solid #e91e8c;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}
.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
}
.replay-btn:active{transform:scale(.95)}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;max-width:500px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ff6b9d,#e91e8c);
  border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mem-front .emoji{font-size:48px}
.mem-back{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;
}
.start-screen .preview img{width:60px;height:auto}
.start-btn{
  padding:16px 40px;background:#e91e8c;color:#fff;
  border:none;border-radius:16px;font-size:24px;
  font-weight:900;cursor:pointer;margin-top:20px;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
  transition:transform .2s ease;
}
.start-btn:active{transform:scale(.95)}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px}
  .sb{font-size:20px}
  .pr{flex-direction:column;text-align:center;gap:8px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:8px 14px;max-width:90%}
  .learn-card{width:100px;height:100px}
  .learn-card img{width:65px}
  .learn-card .label{font-size:16px}
  .listen-card{width:90px;height:90px}
  .listen-card img{width:60px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .mem-back img{width:50px}
  .start-screen h1{font-size:32px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>y as /iː/ Review</h1>
    <div class="tz">复习 y 结尾的 /iː/ 音</div>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f604.svg" alt="happy">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f476.svg" alt="baby">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f923.svg" alt="funny">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2600.svg" alt="sunny">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Learn Words</div>
    <div class="tz">点击卡片学单词</div>
    <div class="sb" id="stars1">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Tap to reveal!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听单词，拼字母</div>
    <div class="sb" id="stars2">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl" id="blendPrompt">Listen and spell!</div>
  </div>
  <div id="blendGame" style="text-align:center;margin-top:20px"></div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听音找图</div>
    <div class="sb" id="stars3">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Listen and tap!</div>
  </div>
  <button class="replay-btn" onclick="replayAudio()">🔊 Replay</button>
  <div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">记忆翻牌</div>
    <div class="sb" id="stars4">★★★★</div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Find pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family" style="width:140px">
    <h1>All Done!</h1>
    <div class="tz">你完成了所有游戏！</div>
    <div style="font-size:64px;margin:20px 0">🎉</div>
    <button class="start-btn" onclick="goTo(0)">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / 6</div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
let ci=0;
const words=['happy','baby','funny','sunny'];
const wordEmojis={happy:'1f604',baby:'1f476',funny:'1f923',sunny:'2600'};
let stars=[0,0,0,0,0];
let currentAudio='';
let blendQueue=[...words];
let listenQueue=[...words];
let memFlipped=[];
let memMatched=[];

function goTo(i){
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===5;
  if(i===1)initLearn();
  if(i===2)initBlend();
  if(i===3)initListen();
  if(i===4)initMemory();
}

function next(){if(ci<5)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}

function speak(w){
  const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
  new Audio(u).play().catch(()=>{
    const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
    new Audio(u2).play().catch(()=>console.log('Audio failed'));
  });
}

function playOk(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value=523;
  gain.gain.value=0.3;
  osc.start();
  osc.stop(ctx.currentTime+0.15);
}

function playNo(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value=200;
  gain.gain.value=0.3;
  osc.start();
  osc.stop(ctx.currentTime+0.2);
}

function showConfetti(){
  const colors=['#e91e8c','#e67e22','#ffd93d','#a8e6cf','#c9f0ff'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.style.position='fixed';
    c.style.width='10px';
    c.style.height='10px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=Math.random()*100+'%';
    c.style.top='-10px';
    c.style.borderRadius='50%';
    c.style.zIndex='1000';
    c.style.pointerEvents='none';
    document.body.appendChild(c);
    const fall=c.animate([
      {transform:'translateY(0) rotate(0deg)',opacity:1},
      {transform:`translateY(${window.innerHeight}px) rotate(${Math.random()*360}deg)`,opacity:0}
    ],{duration:2000+Math.random()*1000});
    fall.onfinish=()=>c.remove();
  }
}

function updateStars(mod,earned){
  stars[mod]=earned;
  const sb=document.getElementById(`stars${mod}`);
  if(!sb)return;
  sb.innerHTML='';
  for(let i=0;i<4;i++){
    sb.innerHTML+=i<earned?'⭐':'★';
  }
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  let revealed=0;
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordEmojis[w]}.svg" alt="${w}">
      <div class="label">${w}</div>
    `;
    card.onclick=()=>{
      if(card.classList.contains('revealed'))return;
      card.classList.add('revealed');
      speak(w);
      playOk();
      revealed++;
      if(revealed===4){
        updateStars(1,4);
        showConfetti();
      }
    };
    grid.appendChild(card);
  });
}

function initBlend(){
  blendQueue=[...words];
  shuffle(blendQueue);
  nextBlend();
}

function nextBlend(){
  if(blendQueue.length===0){
    document.getElementById('blendPrompt').textContent='All done!';
    document.getElementById('blendGame').innerHTML='';
    updateStars(2,4);
    showConfetti();
    return;
  }
  const word=blendQueue[0];
  const letters=word.split('');
  const game=document.getElementById('blendGame');
  game.innerHTML='';
  
  const img=document.createElement('img');
  img.src=`https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordEmojis[word]}.svg`;
  img.style.width='100px';
  img.style.margin='20px auto';
  game.appendChild(img);
  
  setTimeout(()=>speak(word),300);
  
  const slots=document.createElement('div');
  slots.style.display='flex';
  slots.style.gap='8px';
  slots.style.justifyContent='center';
  slots.style.margin='20px 0';
  letters.forEach(()=>{
    const slot=document.createElement('div');
    slot.style.width='50px';
    slot.style.height='50px';
    slot.style.border='3px solid #e91e8c';
    slot.style.borderRadius='10px';
    slot.style.display='flex';
    slot.style.alignItems='center';
    slot.style.justifyContent='center';
    slot.style.fontSize='28px';
    slot.style.fontWeight='900';
    slot.style.background='#fff';
    slots.appendChild(slot);
  });
  game.appendChild(slots);
  
  const btns=document.createElement('div');
  btns.style.display='flex';
  btns.style.gap='8px';
  btns.style.flexWrap='wrap';
  btns.style.justifyContent='center';
  btns.style.marginTop='20px';
  
  const shuffled=[...letters];
  shuffle(shuffled);
  let filled=0;
  
  shuffled.forEach(l=>{
    const btn=document.createElement('button');
    btn.textContent=l;
    btn.style.padding='12px 20px';
    btn.style.fontSize='24px';
    btn.style.fontWeight='900';
    btn.style.border='none';
    btn.style.borderRadius='10px';
    btn.style.background='#e91e8c';
    btn.style.color='#fff';
    btn.style.cursor='pointer';
    btn.onclick=()=>{
      if(filled>=letters.length)return;
      if(l===letters[filled]){
        slots.children[filled].textContent=l;
        btn.disabled=true;
        btn.style.opacity='0.3';
        playOk();
        filled++;
        if(filled===letters.length){
          speak(word);
          showConfetti();
          blendQueue.shift();
          setTimeout(nextBlend,2000);
        }
      }else{
        playNo();
        btn.style.animation='shake 0.5s';
        setTimeout(()=>btn.style.animation='',500);
      }
    };
    btns.appendChild(btn);
  });
  game.appendChild(btns);
}

function initListen(){
  listenQueue=[...words];
  shuffle(listenQueue);
  nextListen();
}

function nextListen(){
  if(listenQueue.length===0){
    updateStars(3,4);
    showConfetti();
    return;
  }
  currentAudio=listenQueue[0];
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  
  const options=[...words];
  shuffle(options);
  
  options.forEach(w=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordEmojis[w]}.svg" alt="${w}">
      <div class="label">${w}</div>
    `;
    card.onclick=()=>{
      if(w===currentAudio){
        playOk();
        speak(w);
        showConfetti();
        listenQueue.shift();
        setTimeout(nextListen,1500);
      }else{
        playNo();
        speak(currentAudio);
      }
    };
    grid.appendChild(card);
  });
  
  setTimeout(()=>speak(currentAudio),500);
}

function replayAudio(){
  if(currentAudio)speak(currentAudio);
}

function initMemory(){
  memFlipped=[];
  memMatched=[];
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  
  const pairs=[...words,...words];
  shuffle(pairs);
  
  pairs.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.word=w;
    card.dataset.idx=i;
    card.innerHTML=`
      <div class="mem-front"><div class="emoji">❓</div></div>
      <div class="mem-back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordEmojis[w]}.svg" alt="${w}">
        <div class="label">${w}</div>
      </div>
    `;
    card.onclick=()=>flipCard(card);
    grid.appendChild(card);
  });
}

function flipCard(card){
  if(card.classList.contains('flipped')||card.classList.contains('matched')||memFlipped.length>=2)return;
  
  card.classList.add('flipped');
  memFlipped.push(card);
  speak(card.dataset.word);
  
  if(memFlipped.length===2){
    setTimeout(checkMatch,800);
  }
}

function checkMatch(){
  const[c1,c2]=memFlipped;
  if(c1.dataset.word===c2.dataset.word){
    c1.classList.add('matched');
    c2.classList.add('matched');
    memMatched.push(c1,c2);
    playOk();
    showConfetti();
    if(memMatched.length===8){
      updateStars(4,4);
    }
  }else{
    c1.classList.remove('flipped');
    c2.classList.remove('flipped');
    playNo();
  }
  memFlipped=[];
}
</script>
</body>
</html>
