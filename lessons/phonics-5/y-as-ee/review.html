<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P96 Review - y as /iː/</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffeef8,#fff5f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.hdr{
  background:#fff;border-bottom:4px solid #e91e8c;
  padding:12px 20px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.hdr-ttl{font-size:26px;font-weight:900;color:#e91e8c}
.hdr-sub{font-size:20px;color:#e67e22;font-weight:700;margin-top:4px}
.stars{
  display:flex;gap:8px;justify-content:center;
  margin-top:8px;font-size:22px;
}
.mod{
  display:none;flex-direction:column;
  padding:20px 16px 80px;
  align-items:center;min-height:calc(100vh - 140px);
}
.mod.active{display:flex}
.pr{display:flex;align-items:center;gap:12px;margin:16px 0}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:12px 20px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.card-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:16px;max-width:500px;margin:20px auto;width:100%;
}
.card{
  background:#ddd;border:4px solid #bbb;border-radius:20px;
  padding:20px;cursor:pointer;
  transition:all .3s ease;
  min-height:140px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.card.revealed{background:#fff;border-color:#e91e8c}
.card img{width:100px;height:auto;display:none}
.card.revealed img{display:block}
.card .word{
  font-size:32px;font-weight:900;color:#2c3e50;
  display:none;margin-top:8px;
}
.card.revealed .word{display:block}
.quiz-opt{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:20px;cursor:pointer;
  transition:all .3s ease;
}
.quiz-opt:hover{transform:scale(1.05)}
.quiz-opt img{width:120px;height:auto}
.quiz-opt.correct{background:#d4edda;border-color:#28a745}
.quiz-opt.wrong{animation:shake .5s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-10px)}
  75%{transform:translateX(10px)}
}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;max-width:600px;margin:20px auto;
}
.mem-card{
  background:#e91e8c;border:4px solid #c71e6e;border-radius:16px;
  padding:20px;cursor:pointer;
  min-height:100px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s ease;
}
.mem-card.flipped{background:#fff;border-color:#e91e8c}
.mem-card.matched{background:#d4edda;border-color:#28a745;cursor:default}
.mem-card img,.mem-card .word{display:none}
.mem-card.flipped img,.mem-card.flipped .word{display:block}
.mem-card img{width:60px;height:auto}
.mem-card .word{font-size:24px;font-weight:900;color:#2c3e50}
.blend-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;max-width:400px;margin:20px auto;
}
.blend-letter{
  background:#fff;border:4px solid #e91e8c;border-radius:16px;
  padding:16px;font-size:36px;font-weight:900;
  color:#e91e8c;text-align:center;cursor:pointer;
  transition:all .3s ease;
}
.blend-letter:hover{transform:scale(1.1)}
.blend-letter.selected{background:#e91e8c;color:#fff}
.blend-word{
  font-size:48px;font-weight:900;color:#2c3e50;
  margin-top:20px;min-height:60px;
}
.feedback{
  font-size:32px;font-weight:900;
  margin-top:16px;min-height:50px;
}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:4px solid #e91e8c;
  padding:12px 20px;
  display:flex;justify-content:space-between;align-items:center;
}
.nav-btn{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav-btn:disabled{background:#ccc;cursor:not-allowed}
.nav-btn:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:20px;font-weight:700;color:#e67e22}
.big-btn{
  padding:16px 40px;border:none;border-radius:20px;
  font-size:24px;font-weight:900;cursor:pointer;
  background:#e91e8c;color:#fff;
  margin-top:20px;
  transition:transform .2s ease;
}
.big-btn:active{transform:scale(.95)}
@media(max-width:480px){
  .hdr-ttl{font-size:22px}
  .hdr-sub{font-size:18px}
  .stars{font-size:18px}
  .pr{flex-direction:column;text-align:center;gap:8px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:10px 16px;max-width:90%}
  .card-grid{grid-template-columns:1fr;gap:12px}
  .card{min-height:120px}
  .card img{width:80px}
  .card .word{font-size:28px}
  .quiz-opt img{width:100px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .mem-card{padding:12px;min-height:80px}
  .mem-card img{width:50px}
  .mem-card .word{font-size:20px}
  .blend-grid{grid-template-columns:repeat(3,1fr)}
  .blend-letter{font-size:28px;padding:12px}
  .blend-word{font-size:36px}
  .feedback{font-size:24px}
  .big-btn{padding:12px 32px;font-size:20px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-ttl">P96 Review · y as /iː/</div>
  <div class="hdr-sub">Peppa's Happy Day</div>
  <div class="stars" id="stars"></div>
</div>

<!-- M0: Start -->
<div class="mod active">
  <img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin-bottom:16px">
  <div style="font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px">Let's Review!</div>
  <div style="font-size:24px;color:#e67e22;font-weight:700">y as /iː/ sound</div>
  <div style="display:flex;gap:16px;margin-top:20px">
    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f603.svg" style="width:80px">
    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f476.svg" style="width:80px">
    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f923.svg" style="width:80px">
    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2600.svg" style="width:80px">
  </div>
  <button class="big-btn" onclick="nextMod()">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png">
    <div class="bbl">Tap the cards!</div>
  </div>
  <div class="card-grid">
    <div class="card" onclick="revealCard(this,'happy','1f603')">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f603.svg">
      <div class="word">happy</div>
    </div>
    <div class="card" onclick="revealCard(this,'baby','1f476')">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f476.svg">
      <div class="word">baby</div>
    </div>
    <div class="card" onclick="revealCard(this,'funny','1f923')">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f923.svg">
      <div class="word">funny</div>
    </div>
    <div class="card" onclick="revealCard(this,'sunny','2600')">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2600.svg">
      <div class="word">sunny</div>
    </div>
  </div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png">
    <div class="bbl">Spell the word!</div>
  </div>
  <div style="font-size:28px;color:#e67e22;font-weight:700;margin-bottom:16px">
    Listen: <button onclick="playBlendWord()" style="background:#e91e8c;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:20px;cursor:pointer;margin-left:8px">🔊</button>
  </div>
  <div class="blend-grid" id="blendGrid"></div>
  <div class="blend-word" id="blendWord"></div>
  <div class="feedback" id="blendFeedback"></div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png">
    <div class="bbl">Listen and tap!</div>
  </div>
  <div style="font-size:28px;color:#e67e22;font-weight:700;margin-bottom:16px">
    <button onclick="replayAudio()" style="background:#e91e8c;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:20px;cursor:pointer">🔊 Listen again</button>
  </div>
  <div class="card-grid" id="listenGrid"></div>
  <div class="feedback" id="listenFeedback"></div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
  <div class="feedback" id="memFeedback"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:160px;margin-bottom:16px">
  <div style="font-size:48px;font-weight:900;color:#e91e8c;margin-bottom:12px">All Done! 🎉</div>
  <div style="font-size:28px;color:#e67e22;font-weight:700">Great job learning y as /iː/!</div>
  <button class="big-btn" onclick="location.reload()">Play Again</button>
</div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="prevMod()">◀ Back</button>
  <div class="page-num"><span id="curPage">1</span> / 6</div>
  <button class="nav-btn" id="nextBtn" onclick="nextMod()">Next ▶</button>
</div>

<script>
let cur=0,stars=0;
const mods=document.querySelectorAll('.mod');
const total=mods.length;
const words=['happy','baby','funny','sunny'];
const emojis={happy:'1f603',baby:'1f476',funny:'1f923',sunny:'2600'};

function showMod(n){
  mods.forEach(m=>m.classList.remove('active'));
  mods[n].classList.add('active');
  document.getElementById('curPage').textContent=n+1;
  document.getElementById('prevBtn').disabled=n===0;
  document.getElementById('nextBtn').disabled=n===total-1;
  
  if(n===2)setTimeout(initBlend,300);
  if(n===3)setTimeout(initListen,300);
  if(n===4)setTimeout(initMemory,300);
}

function nextMod(){if(cur<total-1){cur++;showMod(cur)}}
function prevMod(){if(cur>0){cur--;showMod(cur)}}

function addStar(){
  stars++;
  document.getElementById('stars').innerHTML='⭐'.repeat(stars)+'★'.repeat(Math.max(0,5-stars)).split('').map(s=>s==='★'?'<span style="color:#bbb">★</span>':s).join('');
}

// M1: Learn
let revealed=0;
function revealCard(el,word,emoji){
  if(el.classList.contains('revealed'))return;
  el.classList.add('revealed');
  speak(word);
  revealed++;
  if(revealed===4){
    setTimeout(()=>{addStar();showConfetti()},500);
  }
}

// M2: Blending
let blendTarget='';
let blendSelected=[];

function initBlend(){
  blendTarget=words[Math.floor(Math.random()*words.length)];
  blendSelected=[];
  document.getElementById('blendWord').textContent='';
  document.getElementById('blendFeedback').textContent='';
  
  const letters=blendTarget.split('');
  const allLetters=[...new Set(letters)];
  const extra=['a','e','i','o','u','b','c','d','f','g','h','l','m','n','p','s','t','y'].filter(l=>!allLetters.includes(l)).sort(()=>Math.random()-.5).slice(0,3);
  const pool=[...allLetters,...extra].sort(()=>Math.random()-.5);
  
  document.getElementById('blendGrid').innerHTML=pool.map(l=>
    `<div class="blend-letter" onclick="selectLetter('${l}')">${l}</div>`
  ).join('');
  
  setTimeout(()=>speak(blendTarget),500);
}

function playBlendWord(){speak(blendTarget)}

function selectLetter(l){
  blendSelected.push(l);
  document.getElementById('blendWord').textContent=blendSelected.join('');
  
  if(blendSelected.join('')===blendTarget){
    document.getElementById('blendFeedback').textContent='✅ Perfect!';
    document.getElementById('blendFeedback').style.color='#27ae60';
    playOk();
    speak(blendTarget);
    showConfetti();
    addStar();
  }else if(blendSelected.length>=blendTarget.length){
    document.getElementById('blendFeedback').textContent='❌ Try again!';
    document.getElementById('blendFeedback').style.color='#e74c3c';
    playNo();
    setTimeout(()=>{
      blendSelected=[];
      document.getElementById('blendWord').textContent='';
      document.getElementById('blendFeedback').textContent='';
    },1000);
  }
}

// M3: Listen
let listenTarget='';
let listenAnswered=false;

function initListen(){
  listenTarget=words[Math.floor(Math.random()*words.length)];
  listenAnswered=false;
  document.getElementById('listenFeedback').textContent='';
  
  const options=words.sort(()=>Math.random()-.5);
  document.getElementById('listenGrid').innerHTML=options.map(w=>
    `<div class="quiz-opt" onclick="checkListen(this,'${w}')">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[w]}.svg">
    </div>`
  ).join('');
  
  setTimeout(()=>speak(listenTarget),500);
}

function replayAudio(){speak(listenTarget)}

function checkListen(el,word){
  if(listenAnswered)return;
  listenAnswered=true;
  
  if(word===listenTarget){
    el.classList.add('correct');
    document.getElementById('listenFeedback').textContent='✅ Great!';
    document.getElementById('listenFeedback').style.color='#27ae60';
    playOk();
    speak(word);
    showConfetti();
    addStar();
  }else{
    el.classList.add('wrong');
    document.getElementById('listenFeedback').textContent='❌ Try again!';
    document.getElementById('listenFeedback').style.color='#e74c3c';
    playNo();
    setTimeout(()=>{
      el.classList.remove('wrong');
      listenAnswered=false;
      document.getElementById('listenFeedback').textContent='';
    },1000);
  }
}

// M4: Memory
let memFlipped=[];
let memMatched=0;

function initMemory(){
  memFlipped=[];
  memMatched=0;
  document.getElementById('memFeedback').textContent='';
  
  const pairs=[];
  words.forEach(w=>{
    pairs.push({type:'img',word:w,emoji:emojis[w]});
    pairs.push({type:'word',word:w});
  });
  pairs.sort(()=>Math.random()-.5);
  
  document.getElementById('memGrid').innerHTML=pairs.map((p,i)=>
    `<div class="mem-card" onclick="flipCard(this,${i},'${p.word}','${p.type}','${p.emoji||''}')">
      ${p.type==='img'?`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${p.emoji}.svg">`:`<div class="word">${p.word}</div>`}
    </div>`
  ).join('');
}

function flipCard(el,idx,word,type,emoji){
  if(el.classList.contains('flipped')||el.classList.contains('matched')||memFlipped.length>=2)return;
  
  el.classList.add('flipped');
  memFlipped.push({el,word});
  
  if(memFlipped.length===2){
    if(memFlipped[0].word===memFlipped[1].word){
      setTimeout(()=>{
        memFlipped.forEach(f=>f.el.classList.add('matched'));
        playOk();
        speak(word);
        showConfetti();
        memMatched++;
        if(memMatched===4){
          setTimeout(()=>{
            document.getElementById('memFeedback').textContent='🎉 All matched!';
            document.getElementById('memFeedback').style.color='#27ae60';
            addStar();
          },500);
        }
        memFlipped=[];
      },500);
    }else{
      setTimeout(()=>{
        memFlipped.forEach(f=>f.el.classList.remove('flipped'));
        playNo();
        memFlipped=[];
      },1000);
    }
  }
}

// Audio
function speak(text){
  const u=`https://dict.youdao.com/dictvoice?audio=${text}&type=2`;
  const a=new Audio(u);
  a.play().catch(()=>{
    const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${text}&spd=4&source=web`;
    new Audio(u2).play().catch(()=>{});
  });
}

function playOk(){new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFgH16eHZ1dHNydnl8f4KFiIuOkZSXmpyfoqWnqqyur7Cxs7W2t7i5uru8vb6/wMHCw8TFxsfIycrLzM3Oz9DR0tPU1dbX2Nna29zd3t/g4eLj5OXm5+jp6uvs7e7v8PHy8/T19vf4+fr7/P3+/w==').play().catch(()=>{})}

function playNo(){new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAAB/fXt5d3V0c3N0dXd5e32AgYOFh4mLjY+RkpSWl5manJ2foaKkpqeoqqusra+wsrO1tre4ubq7vL2+v8DBwsPExcbHyMnKy8zNzs/Q0dLT1NXW19jZ2tvc3d7f4OHi4+Tl5ufo6err7O3u7/Dx8vP09fb3+Pn6+/z9/v8=').play().catch(()=>{})}

function showConfetti(){
  const colors=['#e91e8c','#e67e22','#3498db','#2ecc71','#f39c12'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:10px;height:10px;background:${colors[i%5]};top:-20px;left:${Math.random()*100}%;border-radius:50%;pointer-events:none;z-index:9999;animation:fall ${1+Math.random()}s linear forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

const style=document.createElement('style');
style.textContent='@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}';
document.head.appendChild(style);

showMod(0);
</script>
</body>
</html>
