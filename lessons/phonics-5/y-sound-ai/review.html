<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P95 - Y Sound /aɪ/ Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,#ffeef8,#fff5f0);color:#2c3e50;overflow-x:hidden}
.mod{min-height:100vh;display:none;flex-direction:column;padding:20px 16px 80px;justify-content:flex-start;overflow-y:auto}
.mod.active{display:flex}
.top{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;padding:8px 16px;border-radius:25px;font-size:20px;font-weight:900;box-shadow:0 4px 12px rgba(233,30,140,.3);position:relative;margin-top:8px}
.tz::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:60%;height:3px;background:rgba(255,255,255,.5);border-radius:2px}
.sb{display:flex;gap:6px;align-items:center;font-size:22px;font-weight:900;margin-top:8px}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{background:#fff;border:4px solid #e91e8c;border-radius:20px;padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.bbl::after{content:'';position:absolute;bottom:-12px;left:30px;width:0;height:0;border:8px solid transparent;border-top-color:#e91e8c}
.learn-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:24px}
.learn-card{width:120px;height:120px;border-radius:20px;background:linear-gradient(135deg,#f5f5f5,#e0e0e0);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s ease;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{background:#fff;border:4px solid #e91e8c;box-shadow:0 6px 16px rgba(233,30,140,.3)}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:52px}
.learn-card.revealed .card-icon{display:none}
.listen-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:24px}
.listen-card{width:110px;height:110px;border-radius:20px;background:#fff;border:4px solid #e91e8c;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s ease;box-shadow:0 4px 12px rgba(233,30,140,.2)}
.listen-card:hover{transform:translateY(-4px);box-shadow:0 6px 16px rgba(233,30,140,.3)}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{margin:16px auto;padding:12px 24px;background:#e67e22;color:#fff;border:none;border-radius:12px;font-size:20px;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s ease}
.replay-btn:active{transform:scale(.95)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:500px;margin:24px auto}
.mem-card{width:100%;aspect-ratio:1;border-radius:20px;background:linear-gradient(135deg,#ff6b9d,#e91e8c);border:4px solid #e91e8c;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s ease;position:relative;box-shadow:0 4px 12px rgba(233,30,140,.2);transform-style:preserve-3d}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{display:flex;flex-direction:column;align-items:center;justify-content:center}
.mem-front .emoji{font-size:48px}
.mem-back{display:none;flex-direction:column;align-items:center;justify-content:center}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{display:flex;gap:16px;justify-content:center;margin:20px 0}
.start-screen .preview img{width:70px;height:auto}
.start-btn{padding:16px 32px;background:#e91e8c;color:#fff;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(233,30,140,.3);transition:transform .2s ease;margin-top:20px}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:140px;margin:20px auto}
.done-screen h1{font-size:48px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.done-screen .msg{font-size:24px;color:#e67e22;font-weight:700;margin-bottom:20px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);border-top:2px solid #e0e0e0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.nav button{padding:10px 24px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;background:#e91e8c;color:#fff;transition:transform .2s ease}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
.blend-game{margin-top:24px}
.blend-options{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.blend-letter-btn{width:70px;height:70px;border-radius:12px;background:#fff;border:4px solid #e91e8c;font-size:32px;font-weight:900;color:#e91e8c;cursor:pointer;transition:all .2s ease;box-shadow:0 4px 12px rgba(233,30,140,.2)}
.blend-letter-btn:active{transform:scale(.95)}
.blend-letter-btn.selected{background:#e91e8c;color:#fff}
.blend-display{font-size:48px;font-weight:900;color:#2c3e50;margin:20px 0;min-height:60px}
@media(max-width:480px){
.te{font-size:22px}
.tz{font-size:18px;padding:6px 14px}
.sb{font-size:20px}
.pr{flex-direction:column;text-align:center;gap:8px}
.pr img{width:60px}
.bbl{font-size:18px;padding:8px 14px;max-width:90%}
.learn-card{width:100px;height:100px}
.learn-card img{width:65px}
.learn-card .label{font-size:16px}
.card-icon{font-size:42px}
.listen-card{width:90px;height:90px}
.listen-card img{width:60px}
.listen-card .label{font-size:14px}
.mem-grid{grid-template-columns:repeat(4,1fr);gap:10px}
.mem-front .emoji{font-size:36px}
.mem-back img{width:50px}
.mem-back .label{font-size:14px}
.start-screen h1{font-size:32px}
.start-screen .preview img{width:60px}
.start-btn{padding:14px 28px;font-size:20px}
.done-screen img{width:110px}
.done-screen h1{font-size:38px}
.done-screen .msg{font-size:20px}
.blend-letter-btn{width:60px;height:60px;font-size:28px}
.blend-display{font-size:38px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>Y Sound /aɪ/ Review</h1>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" alt="my">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f426.svg" alt="fly">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4aa.svg" alt="try">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2601.svg" alt="sky">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Y Sound /aɪ/ Review</div>
    <div class="tz">点击卡片学单词</div>
    <div class="sb">
      <span id="stars1">★★★★</span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Tap to learn!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听音拼字母</div>
    <div class="sb">
      <span id="stars2">★★★★</span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Listen and blend!</div>
  </div>
  <div class="blend-game">
    <button class="replay-btn" onclick="playBlendWord()">🔊 Listen</button>
    <div class="blend-display" id="blendDisplay"></div>
    <div class="blend-options" id="blendOptions"></div>
  </div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听音找图</div>
    <div class="sb">
      <span id="stars3">★★★★</span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Listen and find!</div>
  </div>
  <button class="replay-btn" onclick="playListenWord()">🔊 Replay</button>
  <div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">记忆翻牌</div>
    <div class="sb">
      <span id="stars4">★★★★</span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="done-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <h1>All Done!</h1>
    <div class="msg">Great job learning Y sound!</div>
    <div style="font-size:64px;margin:20px 0">🎉</div>
    <button class="start-btn" onclick="goTo(0)">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / 6</div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
let ci=0;
const words=[
  {word:'my',emoji:'1f9f8'},
  {word:'fly',emoji:'1f426'},
  {word:'try',emoji:'1f4aa'},
  {word:'sky',emoji:'2601'}
];
let stars=[0,0,0,0,0];

function goTo(i){
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===5;
  if(i===1)initLearn();
  if(i===2)initBlend();
  if(i===3)initListen();
  if(i===4)initMemory();
}
function next(){if(ci<5)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}

function speak(w){
  const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
  new Audio(u).play().catch(()=>{
    const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
    new Audio(u2).play().catch(()=>console.log('fail'));
  });
}

function playOk(){new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS56+mjUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkj0KFV+16+uoVRQLRp/g8r5sIQUrgc7y2Yk2CBhkuevpo1ARDEyl4fG5ZRwFNo3V7859KQUofsz').play()}
function playNo(){new Audio('data:audio/wav;base64,UklGRhIAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0Yf7///8AAP//AAD//wAA//8AAP//').play()}

function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};left:${50+Math.random()*20-10}%;top:30%;animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}
const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

function updateStars(mod,earned){
  stars[mod]=earned;
  const el=document.getElementById(`stars${mod}`);
  if(el)el.innerHTML='⭐'.repeat(earned)+'★'.repeat(4-earned);
}

// M1: Learn
function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`<div class="card-icon">❓</div><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg"><div class="label">${w.word}</div>`;
    card.onclick=()=>{
      if(!card.classList.contains('revealed')){
        card.classList.add('revealed');
        speak(w.word);
        const revealed=grid.querySelectorAll('.revealed').length;
        if(revealed===words.length)updateStars(1,4);
      }
    };
    grid.appendChild(card);
  });
}

// M2: Blending Game
let blendTarget,blendLetters,blendSelected=[];
function initBlend(){
  blendTarget=words[Math.floor(Math.random()*words.length)].word;
  blendLetters=blendTarget.split('');
  blendSelected=[];
  document.getElementById('blendDisplay').textContent='';
  const opts=document.getElementById('blendOptions');
  opts.innerHTML='';
  const allLetters=[...blendLetters];
  while(allLetters.length<8){
    const rand='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];
    if(!allLetters.includes(rand))allLetters.push(rand);
  }
  allLetters.sort(()=>Math.random()-0.5);
  allLetters.forEach(l=>{
    const btn=document.createElement('button');
    btn.className='blend-letter-btn';
    btn.textContent=l;
    btn.onclick=()=>selectBlendLetter(l,btn);
    opts.appendChild(btn);
  });
  setTimeout(()=>speak(blendTarget),500);
}
function playBlendWord(){speak(blendTarget)}
function selectBlendLetter(l,btn){
  if(btn.classList.contains('selected'))return;
  blendSelected.push(l);
  btn.classList.add('selected');
  document.getElementById('blendDisplay').textContent=blendSelected.join('');
  if(blendSelected.join('')===blendTarget){
    playOk();
    showConfetti();
    updateStars(2,4);
    setTimeout(()=>goTo(3),2000);
  }else if(blendSelected.length>=blendTarget.length){
    playNo();
    setTimeout(()=>{
      blendSelected=[];
      document.getElementById('blendDisplay').textContent='';
      document.querySelectorAll('.blend-letter-btn').forEach(b=>b.classList.remove('selected'));
    },1000);
  }
}

// M3: Listen & Find
let listenTarget;
function initListen(){
  listenTarget=words[Math.floor(Math.random()*words.length)];
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  const opts=[listenTarget];
  while(opts.length<4){
    const rand=words[Math.floor(Math.random()*words.length)];
    if(!opts.includes(rand))opts.push(rand);
  }
  opts.sort(()=>Math.random()-0.5);
  opts.forEach(w=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg">`;
    card.onclick=()=>{
      if(w.word===listenTarget.word){
        playOk();
        speak(w.word);
        showConfetti();
        updateStars(3,4);
        setTimeout(()=>goTo(4),2000);
      }else{
        playNo();
      }
    };
    grid.appendChild(card);
  });
  setTimeout(()=>speak(listenTarget.word),500);
}
function playListenWord(){speak(listenTarget.word)}

// M4: Memory Match
let memFlipped=[],memMatched=0;
function initMemory(){
  memMatched=0;
  memFlipped=[];
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  const pairs=[...words,...words];
  pairs.sort(()=>Math.random()-0.5);
  pairs.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.word=w.word;
    card.dataset.idx=i;
    card.innerHTML=`<div class="mem-front"><div class="emoji">❓</div></div><div class="mem-back"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg"><div class="label">${w.word}</div></div>`;
    card.onclick=()=>flipMemCard(card);
    grid.appendChild(card);
  });
}
function flipMemCard(card){
  if(card.classList.contains('flipped')||card.classList.contains('matched')||memFlipped.length>=2)return;
  card.classList.add('flipped');
  memFlipped.push(card);
  speak(card.dataset.word);
  if(memFlipped.length===2){
    setTimeout(()=>{
      if(memFlipped[0].dataset.word===memFlipped[1].dataset.word){
        memFlipped.forEach(c=>c.classList.add('matched'));
        playOk();
        memMatched+=2;
        if(memMatched===8){
          showConfetti();
          updateStars(4,4);
          setTimeout(()=>goTo(5),2000);
        }
      }else{
        memFlipped.forEach(c=>c.classList.remove('flipped'));
        playNo();
      }
      memFlipped=[];
    },1000);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prev();
  if(e.key==='ArrowRight')next();
});
goTo(0);
</script>
</body>
</html>
