<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P65 - gl Blend Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,#ffeef8,#fff5f0);color:#2c3e50;overflow-x:hidden}
.mod{min-height:100vh;display:none;flex-direction:column;padding:20px 16px 80px;justify-content:flex-start;overflow-y:auto}
.mod.active{display:flex}
.top{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;padding:8px 16px;border-radius:25px;font-size:20px;font-weight:900;box-shadow:0 4px 12px rgba(233,30,140,.3);position:relative;margin-top:8px}
.tz::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:60%;height:3px;background:rgba(255,255,255,.5);border-radius:2px}
.sb{display:flex;gap:6px;align-items:center;font-size:22px;font-weight:900;margin-top:8px}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{background:#fff;border:4px solid #e91e8c;border-radius:20px;padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.bbl::after{content:'';position:absolute;bottom:-12px;left:30px;width:0;height:0;border:8px solid transparent;border-top-color:#e91e8c}
.learn-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:24px}
.learn-card{width:120px;height:120px;border-radius:20px;background:linear-gradient(135deg,#f5f5f5,#e0e0e0);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s ease;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{background:#fff;border:4px solid #e91e8c;box-shadow:0 6px 16px rgba(233,30,140,.3)}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:52px}
.learn-card.revealed .card-icon{display:none}
.listen-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:24px}
.listen-card{width:110px;height:110px;border-radius:20px;background:#fff;border:4px solid #e91e8c;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s ease;box-shadow:0 4px 12px rgba(233,30,140,.2)}
.listen-card:hover{transform:translateY(-4px);box-shadow:0 6px 16px rgba(233,30,140,.3)}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{margin:16px auto;padding:12px 24px;background:#e67e22;color:#fff;border:none;border-radius:12px;font-size:20px;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s ease}
.replay-btn:active{transform:scale(.95)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:500px;margin:24px auto}
.mem-card{width:100%;aspect-ratio:1;border-radius:20px;background:linear-gradient(135deg,#ff6b9d,#e91e8c);border:4px solid #e91e8c;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s ease;position:relative;box-shadow:0 4px 12px rgba(233,30,140,.2);transform-style:preserve-3d}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{display:flex;flex-direction:column;align-items:center;justify-content:center}
.mem-front .emoji{font-size:48px}
.mem-back{display:none;flex-direction:column;align-items:center;justify-content:center}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{display:flex;gap:16px;justify-content:center;margin:20px 0}
.start-screen .preview img{width:70px;height:auto}
.start-btn{padding:16px 40px;background:#e91e8c;color:#fff;border:none;border-radius:16px;font-size:32px;font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(233,30,140,.3);transition:transform .2s ease}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:110px;margin:20px auto}
.done-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.done-screen .msg{font-size:22px;color:#e67e22;font-weight:700;margin-bottom:20px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);border-top:2px solid #e0e0e0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.nav button{padding:10px 24px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;background:#e91e8c;color:#fff;transition:transform .2s ease}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
.blend-input{display:flex;gap:8px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.blend-slot{width:60px;height:60px;border:3px solid #e91e8c;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#2c3e50}
.blend-opts{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.blend-opt{padding:12px 20px;background:#e91e8c;color:#fff;border:none;border-radius:12px;font-size:24px;font-weight:900;cursor:pointer;transition:transform .2s ease}
.blend-opt:active{transform:scale(.95)}
.blend-opt:disabled{opacity:.3}
@media(max-width:480px){
.te{font-size:22px}
.tz{font-size:18px;padding:6px 14px}
.sb{font-size:20px}
.learn-card{width:105px;height:105px}
.learn-card img{width:70px}
.learn-card .label{font-size:16px}
.card-icon{font-size:44px}
.listen-card{width:95px;height:95px}
.listen-card img{width:60px}
.listen-card .label{font-size:14px}
.mem-grid{grid-template-columns:repeat(4,1fr);max-width:340px;gap:10px}
.mem-front .emoji{font-size:36px}
.mem-back img{width:45px}
.mem-back .label{font-size:13px}
.start-screen h1{font-size:32px}
.start-btn{font-size:26px;padding:14px 32px}
.done-screen h1{font-size:32px}
.replay-btn{font-size:18px;padding:10px 20px}
.blend-slot{width:50px;height:50px;font-size:26px}
.blend-opt{font-size:20px;padding:10px 16px}
}
@media(min-width:768px){
.mem-grid{max-width:600px}
}
</style>
</head>
<body>

<div class="mod active">
<div class="start-screen">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<h1>gl Blend Review</h1>
<div class="preview">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f964.svg" alt="glass">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9e4.svg" alt="glove">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f60a.svg" alt="glad">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f4.svg" alt="glue">
</div>
<button class="start-btn" onclick="goM(1)">Let's Play!</button>
</div>
</div>

<div class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">点一点，学单词！</div>
<div class="sb"><span id="s1">★</span><span id="s2">★</span><span id="s3">★</span><span id="s4">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Tap to reveal!</div>
</div>
<div class="learn-grid" id="learnGrid"></div>
</div>

<div class="mod">
<div class="top">
<div class="te">Blending</div>
<div class="tz">听一听，拼单词！</div>
<div class="sb"><span id="s5">★</span><span id="s6">★</span><span id="s7">★</span><span id="s8">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Listen and blend!</div>
</div>
<div id="blendGame" style="text-align:center;margin-top:20px"></div>
</div>

<div class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，找一找！</div>
<div class="sb"><span id="s9">★</span><span id="s10">★</span><span id="s11">★</span><span id="s12">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find the word!</div>
</div>
<button class="replay-btn" onclick="playCurrentWord()">🔊 Listen</button>
<div class="listen-grid" id="listenGrid"></div>
</div>

<div class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找配对！</div>
<div class="sb"><span id="s13">★</span><span id="s14">★</span><span id="s15">★</span><span id="s16">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Match pairs!</div>
</div>
<div class="mem-grid" id="memGrid"></div>
</div>

<div class="mod">
<div class="done-screen">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<h1>All Done!</h1>
<div class="msg">Great job learning gl blend!</div>
<button class="start-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button onclick="prevM()" id="prevBtn">◀ Back</button>
<div class="page-num"><span id="currM">1</span> / 6</div>
<button onclick="nextM()" id="nextBtn">Next ▶</button>
</div>

<script>
const words=['glass','glove','glad','glue'];
const emojis=['1f964','1f9e4','1f60a','1f9f4'];
let cm=0,tm=6;
let learnRevealed=0,blendRound=0,listenRound=0,memMatched=0;
let flipped=[],memPairs=[];

function goM(i){
if(i<0||i>=tm)return;
document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
cm=i;
document.getElementById('currM').textContent=i+1;
document.getElementById('prevBtn').disabled=i===0;
document.getElementById('nextBtn').disabled=i===tm-1;
if(i===1)initLearn();
if(i===2)initBlend();
if(i===3)initListen();
if(i===4)initMem();
}
function nextM(){if(cm<tm-1)goM(cm+1)}
function prevM(){if(cm>0)goM(cm-1)}

function speak(w){
const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
const a=new Audio(u);
a.play().catch(()=>{
const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
new Audio(u2).play().catch(()=>console.log('Audio failed'));
});
}

function playOk(){
const a=new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFgH16eHZ1dHNydnl8f4KFiIuOkZSXmpyfoqWnqqyur7Cxs7W2t7i5uru8vb6/wMHCw8TFxsfIycrLzM3Oz9DR0tPU1dbX2Nna29zd3t/g4eLj5OXm5+jp6uvs7e7v8PHy8/T19vf4+fr7/P3+/w==');
a.play().catch(()=>{});
}

function playNo(){
const a=new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAAB/fn18e3p5eHd2dXRzc3Jxb25tbGtqaWhnZmVkY2JhYF9eXVxbWllYV1ZVVFNSUVBPTk1MS0pJSEdGRURDQkFAPz49PDs6OTg3NjU0MzIxMC8uLSwrKikoJyYlJCMiISAfHh0cGxoZGBcWFRQTEhEQDw4NDAsKCQgHBgUEAwIBAA==');
a.play().catch(()=>{});
}

function showConfetti(){
for(let i=0;i<20;i++){
const c=document.createElement('div');
c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};left:${50+Math.random()*20-10}%;top:30%;animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

function initLearn(){
const grid=document.getElementById('learnGrid');
grid.innerHTML=words.map((w,i)=>`
<div class="learn-card" onclick="revealCard(${i})">
<div class="card-icon">❓</div>
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[i]}.svg" alt="${w}">
<div class="label">${w}</div>
</div>
`).join('');
}

function revealCard(i){
const cards=document.querySelectorAll('.learn-card');
if(cards[i].classList.contains('revealed'))return;
cards[i].classList.add('revealed');
speak(words[i]);
playOk();
learnRevealed++;
document.getElementById(`s${learnRevealed}`).textContent='⭐';
if(learnRevealed===4)showConfetti();
}

function initBlend(){
if(blendRound>=words.length){
document.getElementById('blendGame').innerHTML='<div style="font-size:32px;font-weight:900;color:#27ae60">🎉 All done!</div>';
return;
}
const w=words[blendRound];
const letters=w.split('');
const shuffled=[...letters].sort(()=>Math.random()-.5);
document.getElementById('blendGame').innerHTML=`
<button class="replay-btn" onclick="speak('${w}')">🔊 Listen</button>
<div class="blend-input" id="blendInput">${letters.map(()=>'<div class="blend-slot">_</div>').join('')}</div>
<div class="blend-opts" id="blendOpts">${shuffled.map(l=>`<button class="blend-opt" onclick="selectLetter('${l}')">${l}</button>`).join('')}</div>
<div style="font-size:28px;font-weight:900;margin-top:16px;min-height:40px" id="blendFeedback"></div>
`;
setTimeout(()=>speak(w),500);
window.blendAnswer=letters;
window.blendCurrent=[];
}

function selectLetter(l){
if(window.blendCurrent.length>=window.blendAnswer.length)return;
window.blendCurrent.push(l);
const slots=document.querySelectorAll('.blend-slot');
slots[window.blendCurrent.length-1].textContent=l;
const opts=document.querySelectorAll('.blend-opt');
opts.forEach(o=>{if(o.textContent===l&&!o.disabled){o.disabled=true;return}});
if(window.blendCurrent.length===window.blendAnswer.length){
setTimeout(checkBlend,500);
}
}

function checkBlend(){
const correct=window.blendCurrent.join('')===window.blendAnswer.join('');
const fb=document.getElementById('blendFeedback');
if(correct){
fb.innerHTML='✅ Great!';
fb.style.color='#27ae60';
playOk();
speak(words[blendRound]);
showConfetti();
document.getElementById(`s${5+blendRound}`).textContent='⭐';
blendRound++;
setTimeout(initBlend,2000);
}else{
fb.innerHTML='❌ Try again!';
fb.style.color='#e74c3c';
playNo();
setTimeout(()=>{
window.blendCurrent=[];
document.querySelectorAll('.blend-slot').forEach(s=>s.textContent='_');
document.querySelectorAll('.blend-opt').forEach(o=>o.disabled=false);
fb.textContent='';
},1500);
}
}

function initListen(){
if(listenRound>=words.length){
document.getElementById('listenGrid').innerHTML='<div style="font-size:32px;font-weight:900;color:#27ae60">🎉 All done!</div>';
return;
}
window.currentWord=words[listenRound];
const grid=document.getElementById('listenGrid');
grid.innerHTML=words.map((w,i)=>`
<div class="listen-card" onclick="checkListen('${w}')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[i]}.svg" alt="${w}">
<div class="label">${w}</div>
</div>
`).join('');
setTimeout(()=>speak(window.currentWord),500);
}

function playCurrentWord(){
if(window.currentWord)speak(window.currentWord);
}

function checkListen(w){
if(w===window.currentWord){
playOk();
speak(w);
showConfetti();
document.getElementById(`s${9+listenRound}`).textContent='⭐';
listenRound++;
setTimeout(initListen,2000);
}else{
playNo();
speak(window.currentWord);
}
}

function initMem(){
memPairs=[...words,...words].sort(()=>Math.random()-.5);
const grid=document.getElementById('memGrid');
grid.innerHTML=memPairs.map((w,i)=>{
const ei=words.indexOf(w);
return `
<div class="mem-card" onclick="flipMem(${i})">
<div class="mem-front"><div class="emoji">❓</div></div>
<div class="mem-back">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[ei]}.svg" alt="${w}">
<div class="label">${w}</div>
</div>
</div>
`;
}).join('');
}

function flipMem(i){
const cards=document.querySelectorAll('.mem-card');
if(cards[i].classList.contains('flipped')||cards[i].classList.contains('matched'))return;
if(flipped.length>=2)return;
cards[i].classList.add('flipped');
flipped.push(i);
speak(memPairs[i]);
if(flipped.length===2){
setTimeout(checkMem,800);
}
}

function checkMem(){
const cards=document.querySelectorAll('.mem-card');
const[a,b]=flipped;
if(memPairs[a]===memPairs[b]){
cards[a].classList.add('matched');
cards[b].classList.add('matched');
playOk();
showConfetti();
memMatched++;
document.getElementById(`s${13+memMatched-1}`).textContent='⭐';
if(memMatched===4){
setTimeout(()=>goM(5),1500);
}
}else{
playNo();
setTimeout(()=>{
cards[a].classList.remove('flipped');
cards[b].classList.remove('flipped');
},500);
}
flipped=[];
}

document.addEventListener('keydown',e=>{
if(e.key==='ArrowLeft')prevM();
if(e.key==='ArrowRight')nextM();
});
goM(0);
</script>
</body>
</html>
