<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P62 - bl Blend Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffeef8,#fff5f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
  position:relative;
  margin-top:8px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;
  margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;
  border:4px solid #e91e8c;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}
.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
}
.replay-btn:active{transform:scale(.95)}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;max-width:500px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ff6b9d,#e91e8c);
  border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mem-front .emoji{font-size:48px}
.mem-back{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;
}
.start-screen .preview img{width:70px}
.start-btn{
  padding:16px 40px;background:#e91e8c;color:#fff;
  border:none;border-radius:16px;font-size:24px;
  font-weight:900;cursor:pointer;margin-top:20px;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
  transition:transform .2s ease;
}
.start-btn:active{transform:scale(.95)}
.blend-game{margin-top:24px}
.blend-options{
  display:flex;gap:12px;justify-content:center;
  flex-wrap:wrap;margin-top:20px;
}
.blend-letter-btn{
  width:70px;height:70px;border-radius:12px;
  background:#fff;border:4px solid #e91e8c;
  font-size:32px;font-weight:900;color:#e91e8c;
  cursor:pointer;transition:all .2s ease;
}
.blend-letter-btn:active{transform:scale(.95)}
.blend-letter-btn.selected{
  background:#e91e8c;color:#fff;
}
.blend-word-display{
  font-size:48px;font-weight:900;color:#2c3e50;
  margin:20px 0;min-height:60px;
}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px}
  .sb{font-size:20px}
  .pr{flex-direction:column;text-align:center;gap:8px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:8px 14px}
  .learn-card{width:100px;height:100px}
  .learn-card img{width:70px}
  .learn-card .label{font-size:16px}
  .listen-card{width:90px;height:90px}
  .listen-card img{width:60px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .mem-card .mem-back img{width:50px}
  .blend-letter-btn{width:60px;height:60px;font-size:28px}
  .blend-word-display{font-size:36px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>bl Blend Review</h1>
    <div class="tz">复习 bl 辅音组合</div>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f535.svg" alt="blue">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26ab.svg" alt="black">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f1.svg" alt="block">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f32c.svg" alt="blow">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Learn Words</div>
    <div class="tz">点击卡片学单词</div>
    <div class="sb">
      <span id="stars1"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/george-standing.png" alt="Peppa">
    <div class="bbl">Tap the cards!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听单词拼字母</div>
    <div class="sb">
      <span id="stars2"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-standing.png" alt="Peppa">
    <div class="bbl">Listen and spell!</div>
  </div>
  <div class="blend-game">
    <div id="blendPrompt" style="font-size:28px;font-weight:900;color:#e91e8c;text-align:center;margin-bottom:20px"></div>
    <div class="blend-word-display" id="blendDisplay"></div>
    <div class="blend-options" id="blendOptions"></div>
    <button class="replay-btn" onclick="replayBlendWord()">🔊 Replay</button>
  </div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听音找图</div>
    <div class="sb">
      <span id="stars3"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
    <div class="bbl">Find the word!</div>
  </div>
  <div id="listenPrompt" style="font-size:28px;font-weight:900;color:#e91e8c;text-align:center;margin-bottom:20px"></div>
  <div class="listen-grid" id="listenGrid"></div>
  <button class="replay-btn" onclick="replayListenWord()">🔊 Replay</button>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">记忆翻牌</div>
    <div class="sb">
      <span id="stars4"></span>
    </div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Peppa">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family" style="width:140px">
    <h1>All Done!</h1>
    <div class="tz">你真棒！</div>
    <div style="font-size:64px;margin:20px 0">🎉</div>
    <button class="start-btn" onclick="location.reload()">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / 6</div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
let ci=0,tm=6;
const words=['blue','black','block','blow'];
const wordData={
  blue:{emoji:'1f535'},
  black:{emoji:'26ab'},
  block:{emoji:'1f9f1'},
  blow:{emoji:'1f32c'}
};
let stars=[0,0,0,0,0];
let learnRevealed=0;
let blendQueue=[...words];
let blendCurrent='';
let blendAnswer='';
let listenQueue=[...words];
let listenCurrent='';
let memFlipped=[];
let memMatched=0;

function goTo(i){
  if(i<0||i>=tm)return;
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===tm-1;
  if(i===1)initLearn();
  if(i===2)initBlend();
  if(i===3)initListen();
  if(i===4)initMem();
}
function next(){if(ci<tm-1)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}


// Audio cache
const audioCache={};
(function(){
  const words=['blue','black','block','blow'];
  words.forEach(w=>{
    const a=new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`);
    a.load();
    audioCache[w]=a;
  });
})();
function speak(w,cb){
  const finish=()=>{if(cb)cb()};
  if(audioCache[w]){
    audioCache[w].currentTime=0;
    audioCache[w].play().then(()=>{
      audioCache[w].onended=finish;
      setTimeout(finish,4000);
    }).catch(()=>{
      const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
      const a2=new Audio(u2);
      a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(()=>{
        finish();
        if(typeof showAudioError==='function')showAudioError();
      });
    });
  }else{
    const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
    const a=new Audio(u);
    a.play().then(()=>{a.onended=finish;setTimeout(finish,4000)}).catch(()=>{
      const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
      const a2=new Audio(u2);
      a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(()=>{
        finish();
        if(typeof showAudioError==='function')showAudioError();
      });
    });
  }
}

function playOk(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=523;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+.15);
}

function playNo(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=200;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+.2);
}

function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;
      background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};
      left:${50+Math.random()*20-10}%;top:30%;
      animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

function updateStars(mod){
  const el=document.getElementById(`stars${mod}`);
  if(!el)return;
  el.innerHTML='';
  for(let i=0;i<4;i++){
    el.innerHTML+=i<stars[mod]?'⭐':'★';
  }
}

// M1: Learn
function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  learnRevealed=0;
  stars[1]=0;
  updateStars(1);
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordData[w].emoji}.svg" alt="${w}">
      <div class="label">${w}</div>
    `;
    card.onclick=()=>{
      if(card.classList.contains('revealed'))return;
      card.classList.add('revealed');
      speak(w);
      playOk();
      learnRevealed++;
      stars[1]=learnRevealed;
      updateStars(1);
      if(learnRevealed===4)showConfetti();
    };
    grid.appendChild(card);
  });
}

// M2: Blending Game
function initBlend(){
  stars[2]=0;
  updateStars(2);
  blendQueue=[...words];
  nextBlend();
}

function nextBlend(){
  if(blendQueue.length===0){
    document.getElementById('blendPrompt').innerHTML='🎉 All done!';
    document.getElementById('blendDisplay').textContent='';
    document.getElementById('blendOptions').innerHTML='';
    return;
  }
  blendCurrent=blendQueue[0];
  blendAnswer='';
  document.getElementById('blendPrompt').innerHTML='🔊 Listen...';
  document.getElementById('blendDisplay').textContent='';
  
  const letters=blendCurrent.split('');
  const opts=document.getElementById('blendOptions');
  opts.innerHTML='';
  
  const allLetters=[...new Set(letters.concat(['a','e','i','o','u','b','l','c','k','w']))];
  allLetters.sort(()=>Math.random()-.5).slice(0,8).forEach(l=>{
    const btn=document.createElement('button');
    btn.className='blend-letter-btn';
    btn.textContent=l;
    btn.onclick=()=>selectLetter(l,btn);
    opts.appendChild(btn);
  });
  
  setTimeout(()=>speak(blendCurrent),500);
}

function selectLetter(l,btn){
  blendAnswer+=l;
  btn.classList.add('selected');
  btn.disabled=true;
  document.getElementById('blendDisplay').textContent=blendAnswer;
  
  if(blendAnswer.length===blendCurrent.length){
    setTimeout(()=>{
      if(blendAnswer===blendCurrent){
        playOk();
        speak(blendCurrent);
        showConfetti();
        stars[2]++;
        updateStars(2);
        blendQueue.shift();
        setTimeout(nextBlend,2000);
      }else{
        playNo();
        blendAnswer='';
        document.getElementById('blendDisplay').textContent='';
        document.querySelectorAll('.blend-letter-btn').forEach(b=>{
          b.classList.remove('selected');
          b.disabled=false;
        });
      }
    },300);
  }
}

function replayBlendWord(){
  if(blendCurrent)speak(blendCurrent);
}

// M3: Listen & Find
function initListen(){
  stars[3]=0;
  updateStars(3);
  listenQueue=[...words];
  nextListen();
}

function nextListen(){
  if(listenQueue.length===0){
    document.getElementById('listenPrompt').innerHTML='🎉 All done!';
    document.getElementById('listenGrid').innerHTML='';
    return;
  }
  listenCurrent=listenQueue[0];
  const shuffled=[...words].sort(()=>Math.random()-.5);
  
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  shuffled.forEach(w=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordData[w].emoji}.svg" alt="${w}">
      <div class="label">${w}</div>
    `;
    card.onclick=()=>{
      if(w===listenCurrent){
        playOk();
        speak(w);
        showConfetti();
        stars[3]++;
        updateStars(3);
        listenQueue.shift();
        setTimeout(nextListen,2000);
      }else{
        playNo();
      }
    };
    grid.appendChild(card);
  });
  
  document.getElementById('listenPrompt').innerHTML='🔊 Listen...';
  setTimeout(()=>speak(listenCurrent),500);
}

function replayListenWord(){
  if(listenCurrent)speak(listenCurrent);
}

// M4: Memory Match
function initMem(){
  stars[4]=0;
  updateStars(4);
  memFlipped=[];
  memMatched=0;
  
  const pairs=[...words,...words].sort(()=>Math.random()-.5);
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  
  pairs.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.word=w;
    card.dataset.id=i;
    card.innerHTML=`
      <div class="mem-front"><div class="emoji">❓</div></div>
      <div class="mem-back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${wordData[w].emoji}.svg" alt="${w}">
        <div class="label">${w}</div>
      </div>
    `;
    card.onclick=()=>flipMem(card);
    grid.appendChild(card);
  });
}

function flipMem(card){
  if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(memFlipped.length>=2)return;
  
  card.classList.add('flipped');
  memFlipped.push(card);
  speak(card.dataset.word);
  
  if(memFlipped.length===2){
    setTimeout(()=>{
      if(memFlipped[0].dataset.word===memFlipped[1].dataset.word){
        memFlipped.forEach(c=>c.classList.add('matched'));
        playOk();
        showConfetti();
        memMatched++;
        stars[4]=memMatched;
        updateStars(4);
      }else{
        memFlipped.forEach(c=>c.classList.remove('flipped'));
        playNo();
      }
      memFlipped=[];
    },1000);
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prev();
  if(e.key==='ArrowRight')next();
});
goTo(0);
</script>
</body>
</html>
