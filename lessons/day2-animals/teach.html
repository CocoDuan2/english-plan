<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 2 - Animals</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:18px 22px 72px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fde2ec,#f8bbd0)}
.bg-morning{background:linear-gradient(180deg,#8ed0ff,#c8e6c9)}
.bg-cat{background:linear-gradient(160deg,#ffe0b2,#fff4df)}
.bg-dog{background:linear-gradient(160deg,#d7ccc8,#efebe9)}
.bg-fish{background:linear-gradient(160deg,#b3e5fc,#e1f5fe)}
.bg-bird{background:linear-gradient(160deg,#fff9c4,#fffde7)}
.bg-duck{background:linear-gradient(160deg,#dcedc8,#f1f8e9)}
.bg-hide{background:linear-gradient(160deg,#ede7f6,#fce4ec)}
.bg-finish{background:linear-gradient(180deg,#90caf9,#a5d6a7 60%,#7cb342)}
.ttl{font-size:48px;font-weight:900;color:#2c3e50;margin:6px 0}
.sub{font-size:26px;color:#6c7a89;line-height:1.3}
.word{font-size:96px;font-weight:900;letter-spacing:3px;margin:8px 0;text-shadow:0 3px 0 rgba(0,0,0,.08);text-transform:lowercase}
.sent{font-size:38px;font-weight:800;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:92px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:28px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:8px 0}
.hide-wrap{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:520px;margin:10px auto}
.hide-box{width:148px;height:148px;border-radius:18px;background:#d9d9d9;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 3px 12px rgba(0,0,0,.12);overflow:hidden}
.hide-box::after{content:'?';position:absolute;font-size:58px;font-weight:800;color:#fff;opacity:.85;transition:opacity .25s}
.hide-box svg{opacity:0;transform:scale(.75);transition:opacity .3s,transform .3s}
.hide-box.on::after{opacity:0}
.hide-box.on svg{opacity:1;transform:scale(1)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:460px;margin:10px auto}
.gi{background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.gi div{font-size:30px;font-weight:900;color:#2c3e50;margin-top:6px;text-transform:lowercase}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:320px;max-height:42vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.word{font-size:56px;letter-spacing:2px}
  .sent{font-size:24px}
  .bbl{font-size:20px;padding:8px 14px}
  .pr img{width:65px}
  .obj-wrap svg{width:130px;height:130px}
  .reveal-box{width:100px;height:100px}
  .reveal-box svg{width:65px;height:65px}
}
.word{font-size:72px}
}
.sent{font-size:38px}.reveal-box{width:150px;height:150px}}
  .sub{font-size:30px}
  .word{font-size:112px}
  .sent{font-size:42px}
  .obj-wrap svg{width:220px;height:220px}
  .hide-box{width:162px;height:162px}
}

@media(max-width:480px){
  .ttl{font-size:30px}
  .sub{font-size:16px}
  .word{font-size:56px;letter-spacing:2px}
  .sent{font-size:24px}
  .bbl{font-size:20px;padding:8px 14px}
  .pr img{width:60px}
  .obj-wrap svg{width:130px;height:130px}
  .reveal-box{width:95px;height:95px}
  .reveal-box svg{width:60px;height:60px}
  .grid,.team-grid,.clinic-grid,.basket-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;max-width:320px!important}
  .gi svg,.ti svg,.ci svg,.bi svg{width:70px!important;height:70px!important}
  .gi div,.ti div,.ci div,.bi div{font-size:20px!important}
}
@media(min-width:481px) and (max-width:767px){
  .ttl{font-size:36px}
  .word{font-size:72px}
  .grid,.team-grid,.clinic-grid,.basket-grid{grid-template-columns:repeat(3,1fr)!important;max-width:420px!important}
  .gi svg,.ti svg,.ci svg,.bi svg{width:80px!important;height:80px!important}
}
@media(min-width:768px){
  .word{font-size:100px}
  .sent{font-size:38px}
  .reveal-box{width:150px;height:150px}
}
</style>
</head>
<body>
<div class="deck">
<div class="sl bg-pink on">
  <img src="../../assets/peppa/peppa-pig-title-logo.png" width="178" alt="Peppa">
  <div class="ttl">Animals</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:460px;margin:12px 0">
    <svg width="86" height="86" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#f4a460"/><polygon points="50,60 65,30 78,62" fill="#f4a460"/><polygon points="110,60 95,30 82,62" fill="#f4a460"/></svg>
    <svg width="86" height="86" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#b08968"/><ellipse cx="44" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="116" cy="84" rx="14" ry="22" fill="#8d6e63"/></svg>
    <svg width="86" height="86" viewBox="0 0 160 160"><ellipse cx="76" cy="85" rx="48" ry="32" fill="#42a5f5"/><polygon points="116,85 146,62 146,108" fill="#1e88e5"/></svg>
    <svg width="86" height="86" viewBox="0 0 160 160"><circle cx="78" cy="88" r="36" fill="#ffd54f"/><circle cx="108" cy="68" r="20" fill="#ffe082"/><polygon points="126,68 144,74 126,80" fill="#ff8f00"/></svg>
    <svg width="86" height="86" viewBox="0 0 160 160"><ellipse cx="78" cy="92" rx="40" ry="28" fill="#ffeb3b"/><circle cx="108" cy="76" r="22" fill="#fff176"/><polygon points="126,78 148,86 126,94" fill="#ff9800"/></svg>
  </div>
</div>

<div class="sl bg-morning">
  <img src="../../assets/peppa/peppa_pig_bicycle.png" width="170" alt="Peppa bike">
  <div class="ttl">Animal Parade</div>
  <div class="sent" style="margin-top:14px">Let's find 5 friends!</div>
  </div>

<div class="sl bg-cat">
  <div class="pr"><img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat"><div class="bbl">I see a cat!</div></div>
  <div class="obj-wrap"><svg width="205" height="205" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#f4a460"/><polygon points="50,60 65,30 78,62" fill="#f4a460"/><polygon points="110,60 95,30 82,62" fill="#f4a460"/><circle cx="65" cy="88" r="5" fill="#fff"/><circle cx="95" cy="88" r="5" fill="#fff"/><circle cx="66" cy="89" r="2.5" fill="#333"/><circle cx="96" cy="89" r="2.5" fill="#333"/><polygon points="80,98 74,104 86,104" fill="#f06292"/><path d="M72 112 Q80 119 88 112" stroke="#8d4b20" stroke-width="3" fill="none" stroke-linecap="round"/></svg></div>
  <div class="word" style="color:#e79a4c">cat</div>
</div>

<div class="sl bg-dog">
  <div class="pr"><img src="../../assets/peppa/daddy-pig-walking.png" alt="Daddy Pig"><div class="bbl">I see a dog!</div></div>
  <div class="obj-wrap"><svg width="205" height="205" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#b08968"/><ellipse cx="44" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="116" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="80" cy="105" rx="18" ry="12" fill="#d7b899"/><circle cx="66" cy="86" r="5" fill="#fff"/><circle cx="94" cy="86" r="5" fill="#fff"/><circle cx="66" cy="87" r="2.5" fill="#333"/><circle cx="94" cy="87" r="2.5" fill="#333"/><circle cx="80" cy="102" r="4" fill="#333"/><path d="M72 112 Q80 118 88 112" stroke="#6d4c41" stroke-width="3" fill="none" stroke-linecap="round"/></svg></div>
  <div class="word" style="color:#8d6e63">dog</div>
</div>

<div class="sl bg-fish">
  <div class="pr"><img src="../../assets/peppa/george_pig_bubbles.png" alt="George"><div class="bbl">I see a fish!</div></div>
  <div class="obj-wrap"><svg width="205" height="205" viewBox="0 0 160 160"><ellipse cx="76" cy="85" rx="48" ry="32" fill="#42a5f5"/><polygon points="116,85 146,62 146,108" fill="#1e88e5"/><circle cx="58" cy="80" r="5" fill="#fff"/><circle cx="59" cy="81" r="2.5" fill="#333"/><path d="M60 95 Q76 104 92 95" stroke="#1565c0" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M38 75 Q76 50 112 75" stroke="#64b5f6" stroke-width="5" fill="none" stroke-linecap="round"/></svg></div>
  <div class="word" style="color:#1e88e5">fish</div>
</div>

<div class="sl bg-bird">
  <div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy Pig"><div class="bbl">I see a bird!</div></div>
  <div class="obj-wrap"><svg width="205" height="205" viewBox="0 0 160 160"><circle cx="78" cy="88" r="36" fill="#ffd54f"/><circle cx="108" cy="68" r="20" fill="#ffe082"/><polygon points="126,68 144,74 126,80" fill="#ff8f00"/><circle cx="104" cy="64" r="4" fill="#fff"/><circle cx="105" cy="65" r="2" fill="#333"/><ellipse cx="74" cy="94" rx="16" ry="12" fill="#ffca28"/><path d="M54 106 Q72 126 94 112" stroke="#fb8c00" stroke-width="4" fill="none" stroke-linecap="round"/></svg></div>
  <div class="word" style="color:#f2bf22">bird</div>
</div>

<div class="sl bg-duck">
  <div class="pr"><img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily"><div class="bbl">I see a duck!</div></div>
  <div class="obj-wrap"><svg width="205" height="205" viewBox="0 0 160 160"><ellipse cx="78" cy="92" rx="40" ry="28" fill="#ffeb3b"/><circle cx="108" cy="76" r="22" fill="#fff176"/><polygon points="126,78 148,86 126,94" fill="#ff9800"/><circle cx="103" cy="71" r="4" fill="#fff"/><circle cx="104" cy="72" r="2" fill="#333"/><path d="M52 96 Q74 74 100 90" stroke="#fdd835" stroke-width="8" fill="none" stroke-linecap="round"/></svg></div>
  <div class="word" style="color:#e8c424">duck</div>
</div>

<div class="sl bg-hide">
  <div class="pr"><img src="../../assets/peppa/peppa_pig_princess_fairy.png" width="86" alt="Peppa fairy"><div class="bbl">Who is hiding?</div></div>
  <div class="hide-wrap">
    <div class="hide-box" id="hb0" onclick="reveal(0)"><svg width="102" height="102" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#f4a460"/><polygon points="50,60 65,30 78,62" fill="#f4a460"/><polygon points="110,60 95,30 82,62" fill="#f4a460"/></svg></div>
    <div class="hide-box" id="hb1" onclick="reveal(1)"><svg width="102" height="102" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#b08968"/><ellipse cx="44" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="116" cy="84" rx="14" ry="22" fill="#8d6e63"/></svg></div>
    <div class="hide-box" id="hb2" onclick="reveal(2)"><svg width="102" height="102" viewBox="0 0 160 160"><ellipse cx="76" cy="85" rx="48" ry="32" fill="#42a5f5"/><polygon points="116,85 146,62 146,108" fill="#1e88e5"/></svg></div>
    <div class="hide-box" id="hb3" onclick="reveal(3)"><svg width="102" height="102" viewBox="0 0 160 160"><circle cx="78" cy="88" r="36" fill="#ffd54f"/><circle cx="108" cy="68" r="20" fill="#ffe082"/><polygon points="126,68 144,74 126,80" fill="#ff8f00"/></svg></div>
    <div class="hide-box" id="hb4" onclick="reveal(4)"><svg width="102" height="102" viewBox="0 0 160 160"><ellipse cx="78" cy="92" rx="40" ry="28" fill="#ffeb3b"/><circle cx="108" cy="76" r="22" fill="#fff176"/><polygon points="126,78 148,86 126,94" fill="#ff9800"/></svg></div>
  </div>
  <div class="sent" id="revSent">Tap a box!</div>
</div>

<div class="sl bg-pink">
  <img src="../../assets/peppa/peppa-family-group-outdoors.png" width="178" style="margin-bottom:6px" alt="Peppa family">
  <div class="ttl" style="font-size:56px">Animal Team!</div>
  <div class="grid">
    <div class="gi"><svg width="108" height="108" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#f4a460"/><polygon points="50,60 65,30 78,62" fill="#f4a460"/><polygon points="110,60 95,30 82,62" fill="#f4a460"/></svg><div>cat</div></div>
    <div class="gi"><svg width="108" height="108" viewBox="0 0 160 160"><circle cx="80" cy="90" r="42" fill="#b08968"/><ellipse cx="44" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="116" cy="84" rx="14" ry="22" fill="#8d6e63"/></svg><div>dog</div></div>
    <div class="gi"><svg width="108" height="108" viewBox="0 0 160 160"><ellipse cx="76" cy="85" rx="48" ry="32" fill="#42a5f5"/><polygon points="116,85 146,62 146,108" fill="#1e88e5"/></svg><div>fish</div></div>
    <div class="gi"><svg width="108" height="108" viewBox="0 0 160 160"><circle cx="78" cy="88" r="36" fill="#ffd54f"/><circle cx="108" cy="68" r="20" fill="#ffe082"/><polygon points="126,68 144,74 126,80" fill="#ff8f00"/></svg><div>bird</div></div>
    <div class="gi"><svg width="108" height="108" viewBox="0 0 160 160"><ellipse cx="78" cy="92" rx="40" ry="28" fill="#ffeb3b"/><circle cx="108" cy="76" r="22" fill="#fff176"/><polygon points="126,78 148,86 126,94" fill="#ff9800"/></svg><div>duck</div></div>
  </div>
</div>

<div class="sl bg-finish">
  <img src="../../assets/peppa/george-superhero-costume.png" width="150" alt="George superhero">
  <div class="ttl" style="color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.3);margin-top:8px">Well Done!</div>
  <div class="sub" style="color:rgba(255,255,255,.92)">I see a cat, dog, fish, bird, duck!</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">&#x1F4CB;</button>
<div class="pop" id="P"><div id="B"></div></div>
<div class="nav">
<button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
<div><div class="np" id="pg">1/10</div></div>
<button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>

<script>
var N={
"0":"Picture-first intro · no sentence prompt on first page",
"1":"Action story with pictures only · sentence starts from word pages",
"2":"cat: I see a cat! repeat 3x and point around room",
"3":"dog: I see a dog! repeat 3x",
"4":"fish: I see a fish! pretend to swim",
"5":"bird: I see a bird! flap hands",
"6":"duck: I see a duck! do duck walk",
"7":"Who is hiding: ask before each tap",
"8":"Fast round: random point + ask I see a ___?",
"9":"Celebrate all 5 words"
};
var c=0,t=10,o=false;
var words=["cat","dog","fish","bird","duck"];
var bg=["#f4a46022","#8d6e6322","#1e88e522","#fbc02d22","#fdd83522"];
function reveal(i){
  var b=document.getElementById('hb'+i);
  if(b.classList.contains('on'))return;
  b.classList.add('on');
  b.style.background=bg[i];
  document.getElementById('revSent').textContent='I see a '+words[i]+'!';
}
function goTo(n){
  if(n<0||n>=t)return;
  document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.sl')[n].classList.add('on');
  c=n;
  document.getElementById('pg').textContent=(c+1)+'/'+t;
  document.getElementById('pb').disabled=c===0;
  var b=document.getElementById('xb');
  if(c===t-1){b.textContent='Done';b.disabled=true}else{b.textContent='Next \u25b6';b.disabled=false}
  document.getElementById('B').innerHTML=N[c]||'';
}
function go(d){goTo(c+d)}
function tn(){o=!o;document.getElementById('P').classList.toggle('on',o);document.getElementById('F').classList.toggle('on',o)}
document.addEventListener('click',function(e){if(o&&!e.target.closest('.pop')&&!e.target.closest('.fab')){o=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on')}});
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ')go(1);if(e.key==='ArrowLeft')go(-1);if(e.key==='t'||e.key==='T')tn()});
goTo(0);
</script>
</body>
</html>
