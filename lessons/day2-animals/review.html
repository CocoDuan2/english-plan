<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 2 - Animals (Review)</title>
<style>
:root{--tip-accent:#4caf50;--tip-bg:#eefbf0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#90caf9 0%,#c5e1a5 66%,#8bc34a 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:540px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:28px;font-weight:900;color:#e91e8c}
.zh{display:inline-block;font-size:21px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:18px 16px 72px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:84px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:24px;font-weight:800;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:34px;font-weight:800;padding:18px 56px;border:none;border-radius:38px;background:linear-gradient(135deg,#f9adc7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(233,30,140,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
.door-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:460px}
.door{height:138px;border-radius:16px;background:#d8d8d8;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.door:before{content:'OPEN';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff;letter-spacing:1px;transition:opacity .2s}
.door .inside{opacity:0;transform:scale(.8);transition:opacity .25s,transform .25s;display:flex;flex-direction:column;align-items:center;gap:4px}
.door .inside div{font-size:22px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.door.on:before{opacity:0}
.door.on .inside{opacity:1;transform:scale(1)}
.quiz-wrap{width:100%;max-width:480px}
.target{font-size:40px;font-weight:900;color:#2c3e50;margin:10px 0 14px;text-transform:lowercase}
.opt-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.opt{width:130px;height:130px;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);border:3px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.opt div{font-size:22px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.opt.good{border-color:#66bb6a}
.opt.bad{border-color:#ef5350}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:470px}
.listen-btn{height:134px;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;border:3px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.listen-btn div{font-size:22px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.match-wrap{display:flex;gap:12px;width:100%;max-width:500px;justify-content:center}
.col{display:flex;flex-direction:column;gap:10px;flex:1}
.m-card{height:94px;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;border:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px}
.m-card.sel{border-color:#42a5f5}
.m-card.ok{border-color:#66bb6a;opacity:.55;pointer-events:none}
.m-word{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#f9adc7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.door-grid,.listen-grid{max-width:620px}.door{height:150px}.listen-btn{height:146px}.opt{width:146px;height:146px}.match-wrap{max-width:620px}}

@media(max-width:480px){
  .main{max-width:100%}
  .en{font-size:22px}
  .zh{font-size:16px;padding:4px 10px}
  .stars{font-size:18px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:8px 12px}
  .start-btn{font-size:26px;padding:16px 44px}
  .face-wrap{width:220px;height:220px}
  .spot{min-width:60px;min-height:60px}
  .learn-card{width:80px;height:80px}
  .learn-card div{font-size:16px!important}
  .listen-card{width:160px;min-height:180px}
  .listen-card img{width:72px!important}
  .aq-btn{width:80px;height:80px}
  .doc-btn{height:90px;font-size:16px!important}
  .seq-dot{width:70px;height:70px}
  .seq-btn{height:76px;font-size:16px!important}
}
@media(min-width:481px) and (max-width:767px){
  .main{max-width:560px}
  .face-wrap{width:260px;height:260px}
  .listen-card{width:200px}
}

@media(min-width:768px){.main{max-width:800px}.listen-card{width:240px}.face-wrap{width:360px;height:360px}}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Peppa's Animal Rescue</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
  {w:'cat',clr:'#f4a460',svg:'<circle cx="80" cy="90" r="42" fill="#f4a460"/><polygon points="50,60 65,30 78,62" fill="#f4a460"/><polygon points="110,60 95,30 82,62" fill="#f4a460"/><circle cx="65" cy="88" r="5" fill="#fff"/><circle cx="95" cy="88" r="5" fill="#fff"/><circle cx="66" cy="89" r="2.5" fill="#333"/><circle cx="96" cy="89" r="2.5" fill="#333"/><path d="M72 112 Q80 119 88 112" stroke="#8d4b20" stroke-width="3" fill="none"/>'},
  {w:'dog',clr:'#8d6e63',svg:'<circle cx="80" cy="90" r="42" fill="#b08968"/><ellipse cx="44" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="116" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="80" cy="105" rx="18" ry="12" fill="#d7b899"/><circle cx="66" cy="87" r="2.5" fill="#333"/><circle cx="94" cy="87" r="2.5" fill="#333"/><circle cx="66" cy="86" r="5" fill="#fff"/><circle cx="94" cy="86" r="5" fill="#fff"/><circle cx="80" cy="102" r="4" fill="#333"/>'},
  {w:'fish',clr:'#1e88e5',svg:'<ellipse cx="76" cy="85" rx="48" ry="32" fill="#42a5f5"/><polygon points="116,85 146,62 146,108" fill="#1e88e5"/><circle cx="58" cy="80" r="5" fill="#fff"/><circle cx="59" cy="81" r="2.5" fill="#333"/><path d="M60 95 Q76 104 92 95" stroke="#1565c0" stroke-width="3" fill="none"/><path d="M38 75 Q76 50 112 75" stroke="#64b5f6" stroke-width="5" fill="none"/>'},
  {w:'bird',clr:'#fbc02d',svg:'<circle cx="78" cy="88" r="36" fill="#ffd54f"/><circle cx="108" cy="68" r="20" fill="#ffe082"/><polygon points="126,68 144,74 126,80" fill="#ff8f00"/><circle cx="104" cy="64" r="4" fill="#fff"/><circle cx="105" cy="65" r="2" fill="#333"/><ellipse cx="74" cy="94" rx="16" ry="12" fill="#ffca28"/><path d="M54 106 Q72 126 94 112" stroke="#fb8c00" stroke-width="4" fill="none"/>'},
  {w:'duck',clr:'#fdd835',svg:'<ellipse cx="78" cy="92" rx="40" ry="28" fill="#ffeb3b"/><circle cx="108" cy="76" r="22" fill="#fff176"/><polygon points="126,78 148,86 126,94" fill="#ff9800"/><circle cx="103" cy="71" r="4" fill="#fff"/><circle cx="104" cy="72" r="2" fill="#333"/><path d="M52 96 Q74 74 100 90" stroke="#fdd835" stroke-width="8" fill="none"/>'}
];

function svgOf(i,s){return '<svg width="'+(s||88)+'" height="'+(s||88)+'" viewBox="0 0 160 160">'+W[i].svg+'</svg>'}
function shadowOf(i,s){
  var t=W[i].svg.replace(/#[0-9A-Fa-f]{3,6}/g,'#9e9e9e');
  return '<svg width="'+(s||78)+'" height="'+(s||78)+'" viewBox="0 0 160 160">'+t+'</svg>';
}

var ac=null;
function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function tone(f,d){var c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function ok(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.16)},200)}
function no(){tone(300,.3)}
function speak(t,cb){
  var u=t.indexOf(' ')>=0
    ? 'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web'
    : 'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u),done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  a.onended=fin;a.onerror=fin;setTimeout(fin,4200);a.play().catch(fin);
}

function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'★':'☆';return s}
function setHead(en,zh,s){document.getElementById('en').textContent=en;document.getElementById('zh').textContent=zh;document.getElementById('st').textContent=s||''}

var cur=0,mods=['m0','m1','m2','m3','m4','m5'];

function init0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'peppa-house-icon.png" width="150" alt="Peppa house">'+
    '<div class="pr"><div class="bbl">Help me rescue animal friends!</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:420px">'+W.map(function(_,i){return svgOf(i,70)}).join('')+'</div>'+
    '<button class="start-btn" onclick="audio();go(1)">Start!</button>';
  setHead("Peppa's Animal Rescue",'和佩琪去救小动物！','');
}

var dOpen=0,dBusy=false;
function init1(){
  dOpen=0;dBusy=false;
  document.getElementById('m1').innerHTML=
    '<div class="pr"><img src="'+PP+'peppa_pig_arms_open.png" alt="Peppa"><div class="bbl">Open the animal doors!</div></div>'+
    '<div class="door-grid">'+W.map(function(w,i){
      return '<div class="door" id="d'+i+'" onclick="tapDoor('+i+')" style="background:'+w.clr+'33"><div class="inside">'+svgOf(i,78)+'<div>'+w.w+'</div></div></div>';
    }).join('')+'</div>';
  setHead('Open the doors!','打开小门，找动物！',stars(0,5));
}
function tapDoor(i){
  var el=document.getElementById('d'+i);
  if(el.classList.contains('on')||dBusy)return;
  dBusy=true;el.classList.add('on');dOpen++;ok();
  setHead('I see a '+W[i].w+'!','找到 '+W[i].w+' 啦！',stars(dOpen,5));
  speak(W[i].w,function(){dBusy=false});
}

var qOrder=[],qIndex=0,qScore=0,qLock=false;
function init2(){
  qOrder=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
  qIndex=0;qScore=0;qLock=false;
  document.getElementById('m2').innerHTML='<div class="quiz-wrap" id="qWrap"></div>';
  renderQuiz();
}
function choicesFor(target){
  var pool=W.map(function(_,i){return i}).filter(function(i){return i!==target}).sort(function(){return Math.random()-.5}).slice(0,2);
  pool.push(target);
  return pool.sort(function(){return Math.random()-.5});
}
function renderQuiz(){
  if(qIndex>=5){
    document.getElementById('qWrap').innerHTML='<img src="'+PP+'george_pig_dinosaur.png" width="150" alt="George">'+
      '<div style="font-size:30px;font-weight:900;color:#2c3e50;margin-top:10px">Mission Complete!</div>';
    setHead('Great rescue!','动物搜救完成！',stars(5,5));
    return;
  }
  var tgt=qOrder[qIndex],opts=choicesFor(tgt);
  document.getElementById('qWrap').innerHTML=
    '<div class="pr"><img src="'+PP+'george-superhero-costume.png" alt="George hero"><div class="bbl">Find: '+W[tgt].w+'!</div></div>'+
    '<div class="target">'+W[tgt].w+'</div>'+
    '<div class="opt-row">'+opts.map(function(i){
      return '<div class="opt" id="o'+i+'" onclick="pickQuiz('+i+','+tgt+')">'+svgOf(i,80)+'<div>'+W[i].w+'</div></div>';
    }).join('')+'</div>';
  setHead('Find the right animal!','选对目标动物！',stars(qScore,5));
  speak(W[tgt].w);
}
function pickQuiz(i,tgt){
  if(qLock)return;
  qLock=true;
  var el=document.getElementById('o'+i);
  if(i===tgt){
    el.classList.add('good');ok();qScore++;qIndex++;
    setHead('Yes! I see a '+W[i].w+'!','答对啦！',stars(qScore,5));
    speak('I see a '+W[i].w,function(){qLock=false;setTimeout(renderQuiz,650)});
  }else{
    el.classList.add('bad');no();
    setHead('Try again!','再试一次！',stars(qScore,5));
    speak(W[tgt].w,function(){qLock=false});
  }
}

var lOrder=[],lIndex=0,lScore=0,lLock=false;
function init3(){
  lOrder=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
  lIndex=0;lScore=0;lLock=false;
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'daddy-pig-standing.png" alt="Daddy Pig"><div class="bbl" id="lb">Listen and tap!</div></div>'+
    '<div class="listen-grid">'+W.map(function(w,i){
      return '<div class="listen-btn" id="l'+i+'" onclick="pickListen('+i+')">'+svgOf(i,80)+'<div>'+w.w+'</div></div>';
    }).join('')+'</div>';
  askListen();
}
function askListen(){
  if(lIndex>=5){
    setHead('Perfect ears!','听力通关啦！',stars(5,5));
    document.getElementById('lb').textContent='You found all sounds!';
    return;
  }
  var t=lOrder[lIndex];
  setHead('Where is '+W[t].w+'?','听一听，点对应动物！',stars(lScore,5));
  document.getElementById('lb').textContent='Tap '+W[t].w+'!';
  speak(W[t].w);
}
function pickListen(i){
  if(lLock||lIndex>=5)return;
  lLock=true;
  var t=lOrder[lIndex],el=document.getElementById('l'+i);
  if(i===t){
    ok();el.style.borderColor='#66bb6a';lScore++;lIndex++;
    setHead('Nice! '+W[i].w+'!','对啦！',stars(lScore,5));
    speak('I see a '+W[i].w,function(){lLock=false;setTimeout(function(){el.style.borderColor='transparent';askListen()},700)});
  }else{
    no();el.style.borderColor='#ef5350';
    setHead('Oops, listen again','再听一次哦',stars(lScore,5));
    speak(W[t].w,function(){lLock=false;setTimeout(function(){el.style.borderColor='transparent'},350)});
  }
}

var mPairs=[],mSelectedL=-1,mSelectedR=-1,mDone=0,mLock=false;
function init4(){
  mPairs=[0,1,2,3].sort(function(){return Math.random()-.5});
  mSelectedL=-1;mSelectedR=-1;mDone=0;mLock=false;
  document.getElementById('m4').innerHTML=
    '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy Cat"><div class="bbl">Match shadow and animal!</div></div>'+
    '<div class="match-wrap">'+
      '<div class="col" id="lc">'+mPairs.map(function(i,pos){
        return '<div class="m-card" id="sl'+pos+'" onclick="pickShadow('+pos+','+i+')">'+shadowOf(i,68)+'</div>';
      }).join('')+'</div>'+
      '<div class="col" id="rc">'+[0,1,2,3].sort(function(){return Math.random()-.5}).map(function(i,pos){
        return '<div class="m-card" id="cr'+pos+'" onclick="pickColor('+pos+','+i+')">'+svgOf(i,68)+'<div class="m-word">'+W[i].w+'</div></div>';
      }).join('')+'</div>'+
    '</div>';
  setHead('Shadow match!','把影子和动物配对！',stars(0,4));
}
function pickShadow(pos,id){
  if(mLock)return;
  clearSel('sl');
  mSelectedL={pos:pos,id:id};
  document.getElementById('sl'+pos).classList.add('sel');
  tryMatch();
}
function pickColor(pos,id){
  if(mLock)return;
  clearSel('cr');
  mSelectedR={pos:pos,id:id};
  document.getElementById('cr'+pos).classList.add('sel');
  tryMatch();
}
function clearSel(prefix){for(var i=0;i<4;i++){var e=document.getElementById(prefix+i);if(e)e.classList.remove('sel')}}
function tryMatch(){
  if(!mSelectedL||!mSelectedR||mLock)return;
  mLock=true;
  if(mSelectedL.id===mSelectedR.id){
    ok();mDone++;
    var a=document.getElementById('sl'+mSelectedL.pos),b=document.getElementById('cr'+mSelectedR.pos);
    a.classList.add('ok');b.classList.add('ok');a.classList.remove('sel');b.classList.remove('sel');
    setHead('Match! '+W[mSelectedL.id].w,'配对成功！',stars(mDone,4));
    speak(W[mSelectedL.id].w,function(){mSelectedL=null;mSelectedR=null;mLock=false;if(mDone>=4)setTimeout(function(){go(1)},700)});
  }else{
    no();
    setHead('Not same, try again','还不对，再试试',stars(mDone,4));
    setTimeout(function(){clearSel('sl');clearSel('cr');mSelectedL=null;mSelectedR=null;mLock=false},500);
  }
}

function init5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="190" alt="Peppa family">'+
    '<div class="bbl" style="font-size:30px;margin-top:10px">All Done!</div>'+
    '<div style="font-size:26px;font-weight:800;color:#e67e22;margin-top:10px">I see a cat, dog, fish, bird, duck!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px" onclick="restart()">Play Again</button>';
  setHead('Great Job!','今天的动物课完成啦！',stars(5,5));
}

function restart(){
  document.getElementById(mods[cur]).classList.remove('on');
  cur=0;document.getElementById(mods[cur]).classList.add('on');
  init0();
  document.getElementById('pg').textContent='1/6';
  document.getElementById('pb').disabled=true;
  var xb=document.getElementById('xb');xb.textContent='Next ▶';xb.disabled=false;
}

var inits=[init0,init1,init2,init3,init4,init5];
function go(d){
  var n=cur+d;if(n<0||n>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=n;
  document.getElementById(mods[cur]).classList.add('on');
  inits[cur]();
  document.getElementById('pg').textContent=(cur+1)+'/6';
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===mods.length-1){xb.textContent='Done';xb.disabled=true}else{xb.textContent='Next ▶';xb.disabled=false}
}

init0();
</script>
</body>
</html>
