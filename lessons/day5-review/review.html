<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 5 - Review Party Game</title>
<style>
:root{--tip-accent:#9c27b0;--tip-bg:#f3e5f5}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#fce4ec 0%,#f3e5f5 50%,#e8eaf6 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:18px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#9c27b0;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:38px;background:linear-gradient(135deg,#ce93d8,#9c27b0);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(156,39,176,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
/* Sort game */
.sort-baskets{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.basket{width:105px;min-height:90px;border-radius:16px;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:3px dashed #bbb;background:rgba(255,255,255,.5);transition:.2s}
.basket.active{border-color:#9c27b0;background:rgba(156,39,176,.1)}
.basket.correct{border-color:#66bb6a;background:#e8f5e9}
.basket div{font-size:18px;font-weight:800;color:#2c3e50}
.sort-item-area{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;max-width:500px}
.sort-item{width:100px;height:100px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:.2s}
.sort-item div{font-size:16px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.sort-item.done{opacity:.3;pointer-events:none}
.sort-item.good{outline:4px solid #66bb6a}
.sort-item.bad{outline:4px solid #ef5350}
/* Listen race */
.race-opts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px;margin-top:10px}
.race-btn{width:110px;height:120px;border:none;border-radius:18px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.race-btn div{font-size:18px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.race-btn.good{outline:4px solid #66bb6a}
.race-btn.bad{outline:4px solid #ef5350}
/* Bingo */
.bingo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:440px;margin-top:10px}
.bingo-cell{width:100px;height:100px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:.2s}
.bingo-cell div{font-size:16px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.bingo-cell.marked{background:#e8f5e9;outline:3px solid #66bb6a}
.bingo-call{font-size:28px;font-weight:900;color:#9c27b0;margin:8px 0;min-height:36px}
/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#ce93d8;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){
  .main{max-width:800px}
  .race-btn{width:130px;height:140px}
  .bingo-cell{width:110px;height:110px}
  .bingo-grid{max-width:560px}
}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Peppa's Party Games</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>
<!-- SCRIPT_START -->
<script>
var PP='../../assets/peppa/';
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function svgTag(d,sz){return '<svg width="'+(sz||80)+'" height="'+(sz||80)+'" viewBox="0 0 160 160">'+d+'</svg>'}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'★':'☆';return s}
function setHead(en,zh,s){document.getElementById('en').textContent=en;document.getElementById('zh').textContent=zh;document.getElementById('st').textContent=s||''}

var ac=null;
function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function tone(f,d){var c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.16)},200)}
function playNo(){tone(300,.3)}
function speak(t,cb){
  var u=t.indexOf(' ')>=0
    ?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web'
    :'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u),done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  a.onended=fin;a.onerror=fin;setTimeout(fin,4200);a.play().catch(fin);
}
/* All word data by theme */
var themes=[
  {name:'Colors',sent:'It\'s ___!',items:[
    {w:'red',svg:'<circle cx="80" cy="70" r="40" fill="#e74c3c"/><rect x="78" y="110" width="4" height="30" rx="2" fill="#999"/>'},
    {w:'blue',svg:'<circle cx="80" cy="70" r="40" fill="#2196f3"/><rect x="78" y="110" width="4" height="30" rx="2" fill="#999"/>'},
    {w:'yellow',svg:'<circle cx="80" cy="70" r="40" fill="#fdd835"/><rect x="78" y="110" width="4" height="30" rx="2" fill="#999"/>'},
    {w:'green',svg:'<circle cx="80" cy="70" r="40" fill="#4CAF50"/><rect x="78" y="110" width="4" height="30" rx="2" fill="#999"/>'},
    {w:'orange',svg:'<circle cx="80" cy="70" r="40" fill="#ff9800"/><rect x="78" y="110" width="4" height="30" rx="2" fill="#999"/>'}
  ]},
  {name:'Animals',sent:'I see a ___!',items:[
    {w:'cat',svg:'<circle cx="80" cy="80" r="28" fill="#ff9800"/><circle cx="70" cy="74" r="4" fill="#fff"/><circle cx="90" cy="74" r="4" fill="#fff"/><circle cx="70" cy="74" r="2" fill="#333"/><circle cx="90" cy="74" r="2" fill="#333"/><ellipse cx="80" cy="88" rx="6" ry="4" fill="#333"/><path d="M56 60 Q50 40 60 50" stroke="#ff9800" stroke-width="4" fill="none"/><path d="M104 60 Q110 40 100 50" stroke="#ff9800" stroke-width="4" fill="none"/>'},
    {w:'dog',svg:'<circle cx="80" cy="80" r="30" fill="#8d6e63"/><circle cx="68" cy="74" r="4" fill="#fff"/><circle cx="92" cy="74" r="4" fill="#fff"/><circle cx="68" cy="74" r="2" fill="#333"/><circle cx="92" cy="74" r="2" fill="#333"/><ellipse cx="80" cy="90" rx="8" ry="5" fill="#333"/><ellipse cx="52" cy="58" rx="10" ry="16" fill="#6d4c41"/><ellipse cx="108" cy="58" rx="10" ry="16" fill="#6d4c41"/>'},
    {w:'fish',svg:'<ellipse cx="80" cy="80" rx="36" ry="22" fill="#42a5f5"/><circle cx="96" cy="74" r="4" fill="#fff"/><circle cx="96" cy="74" r="2" fill="#333"/><path d="M110 80 L130 68 L130 92 Z" fill="#42a5f5"/>'},
    {w:'bird',svg:'<ellipse cx="80" cy="82" rx="22" ry="26" fill="#ffeb3b"/><circle cx="74" cy="76" r="3" fill="#333"/><polygon points="80,92 74,100 86,100" fill="#ff9800"/>'},
    {w:'duck',svg:'<ellipse cx="80" cy="82" rx="28" ry="24" fill="#fff"/><circle cx="72" cy="76" r="3" fill="#333"/><ellipse cx="80" cy="90" rx="8" ry="4" fill="#ffb300"/>'}
  ]},
  {name:'Body',sent:'This is my ___!',items:[
    {w:'head',svg:'<circle cx="80" cy="82" r="52" fill="#ffd6b5"/><circle cx="63" cy="71" r="3" fill="#333"/><circle cx="99" cy="71" r="3" fill="#333"/>'},
    {w:'eyes',svg:'<ellipse cx="52" cy="78" rx="20" ry="14" fill="#fff"/><ellipse cx="108" cy="78" rx="20" ry="14" fill="#fff"/><circle cx="52" cy="80" r="6" fill="#333"/><circle cx="108" cy="80" r="6" fill="#333"/>'},
    {w:'ears',svg:'<ellipse cx="40" cy="80" rx="12" ry="22" fill="#ffd6b5"/><ellipse cx="120" cy="80" rx="12" ry="22" fill="#ffd6b5"/><ellipse cx="40" cy="80" rx="6" ry="14" fill="#ffab91"/><ellipse cx="120" cy="80" rx="6" ry="14" fill="#ffab91"/>'},
    {w:'nose',svg:'<ellipse cx="80" cy="94" rx="16" ry="12" fill="#ffab91"/><circle cx="74" cy="94" r="3" fill="#8d6e63"/><circle cx="86" cy="94" r="3" fill="#8d6e63"/>'},
    {w:'mouth',svg:'<path d="M58 106 Q80 132 102 106" stroke="#e53935" stroke-width="9" fill="none" stroke-linecap="round"/>'}
  ]},
  {name:'Food',sent:'I like ___!',items:[
    {w:'apple',svg:'<circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/>'},
    {w:'banana',svg:'<ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/><rect x="72" y="38" width="6" height="24" rx="3" fill="#8d6e63"/>'},
    {w:'milk',svg:'<rect x="46" y="48" width="68" height="76" rx="10" fill="#fff"/><rect x="46" y="48" width="68" height="24" rx="10" fill="#42a5f5"/><text x="80" y="106" text-anchor="middle" font-size="20" font-weight="900" fill="#42a5f5">MILK</text>'},
    {w:'bread',svg:'<rect x="30" y="56" width="100" height="64" rx="20" fill="#e6a84c"/><rect x="30" y="56" width="100" height="32" rx="20" fill="#d4943c"/>'},
    {w:'egg',svg:'<ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/>'}
  ]}
];
var allItems=[];
themes.forEach(function(th,ti){th.items.forEach(function(it){allItems.push({w:it.w,svg:it.svg,theme:ti,sent:th.sent.replace('___',it.w)})})});

var cur=0,mods=['m0','m1','m2','m3','m4','m5'];
/* Module 0: Start page */
function init0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="140" alt="Peppa family">'+
    '<div class="pr"><div class="bbl">Party time! Let\'s play!</div></div>'+
    '<div style="font-size:48px;margin:8px 0">🎈🎉🎊🎈</div>'+
    '<button class="start-btn" onclick="audio();go(1)">Start!</button>';
  setHead("Peppa's Party Games",'点一点，开始派对游戏！','');
}

/* Module 1: Sort Game — tap item then tap correct theme basket */
var sortPool=[],sortIdx=0,sortScore=0,sortBusy=false,sortSel=-1;
function init1(){
  // pick 2 from each theme = 8 items
  sortPool=[];sortIdx=0;sortScore=0;sortBusy=false;sortSel=-1;
  themes.forEach(function(th,ti){
    var s=shuffle(th.items.slice()).slice(0,2);
    s.forEach(function(it){sortPool.push({w:it.w,svg:it.svg,theme:ti})});
  });
  sortPool=shuffle(sortPool);
  var bk=['🎨 Colors','🐾 Animals','🧩 Body','🍎 Food'];
  document.getElementById('m1').innerHTML=
    '<div class="pr"><img src="'+PP+'peppa-pig-happy-standing.png" width="80" alt="Peppa"><div class="bbl" id="sortBbl">Tap a picture, then its group!</div></div>'+
    '<div class="sort-baskets">'+bk.map(function(b,i){
      return '<div class="basket" id="bsk'+i+'" onclick="tapBasket('+i+')"><div>'+b+'</div></div>';
    }).join('')+'</div>'+
    '<div class="sort-item-area" id="sortArea"></div>';
  renderSortItems();
  setHead('Sort the Words','点图片，再点它的分类！',stars(0,8));
}
function renderSortItems(){
  var el=document.getElementById('sortArea');
  el.innerHTML=sortPool.map(function(it,i){
    return '<button class="sort-item'+(it.done?' done':'')+'" id="si'+i+'" onclick="tapSortItem('+i+')">'+
      svgTag(it.svg,60)+'<div>'+it.w+'</div></button>';
  }).join('');
}
function tapSortItem(i){
  if(sortBusy||sortPool[i].done)return;
  sortSel=i;
  document.querySelectorAll('.sort-item').forEach(function(e){e.style.outline=''});
  document.getElementById('si'+i).style.outline='4px solid #9c27b0';
  speak(sortPool[i].w);
}
function tapBasket(bi){
  if(sortBusy||sortSel<0)return;
  sortBusy=true;
  var it=sortPool[sortSel];
  var bsk=document.getElementById('bsk'+bi);
  if(bi===it.theme){
    playOk();sortScore++;it.done=true;
    bsk.classList.add('correct');
    document.getElementById('sortBbl').textContent=it.w+' → '+themes[bi].name+'!';
    setHead('Sort the Words','分对啦！',stars(sortScore,8));
    speak(it.sent,function(){
      setTimeout(function(){
        bsk.classList.remove('correct');
        sortSel=-1;sortBusy=false;
        renderSortItems();
        if(sortScore>=8)setTimeout(function(){go(1)},600);
      },400);
    });
  }else{
    playNo();bsk.style.outline='3px solid #ef5350';
    speak(themes[it.theme].name,function(){
      setTimeout(function(){bsk.style.outline='';sortBusy=false},350);
    });
  }
}

/* Module 2: Listen & Race — hear a sentence, pick the correct item from 4 */
var racePool=[],raceIdx=0,raceScore=0,raceBusy=false;
function init2(){
  racePool=shuffle(allItems.slice()).slice(0,8);
  raceIdx=0;raceScore=0;raceBusy=false;
  document.getElementById('m2').innerHTML=
    '<div class="pr"><img src="'+PP+'george_pig_dinosaur.png" width="80" alt="George"><div class="bbl" id="raceBbl">Listen and find!</div></div>'+
    '<div style="font-size:26px;font-weight:900;color:#9c27b0;margin:6px 0" id="raceSent"></div>'+
    '<div class="race-opts" id="raceOpts"></div>'+
    '<button style="margin-top:12px;padding:10px 28px;border:none;border-radius:14px;background:#ce93d8;color:#fff;font-size:20px;font-weight:700;cursor:pointer" onclick="replayRace()">🔊 Listen Again</button>';
  setupRace();
  setHead('Listen & Find','听句子，找图片！',stars(0,8));
}
function setupRace(){
  if(raceIdx>=8){
    setHead('Listening done!','听力完成啦！',stars(8,8));
    document.getElementById('raceBbl').textContent='Super ears!';
    document.getElementById('raceSent').textContent='';
    document.getElementById('raceOpts').innerHTML='';
    return;
  }
  var target=racePool[raceIdx];
  var wrong=shuffle(allItems.filter(function(x){return x.w!==target.w})).slice(0,3);
  var opts=shuffle([target].concat(wrong));
  document.getElementById('raceSent').textContent='';
  document.getElementById('raceOpts').innerHTML=opts.map(function(o,i){
    return '<button class="race-btn" id="rb'+i+'" onclick="tapRace('+i+',\''+target.w+'\')">'+
      svgTag(o.svg,70)+'<div>'+o.w+'</div></button>';
  }).join('');
  window._raceOpts=opts;
  speak(target.sent);
}
function replayRace(){
  if(raceIdx<8)speak(racePool[raceIdx].sent);
}
function tapRace(i,targetW){
  if(raceBusy)return;raceBusy=true;
  var el=document.getElementById('rb'+i);
  var picked=window._raceOpts[i];
  if(picked.w===targetW){
    playOk();raceScore++;raceIdx++;el.classList.add('good');
    setHead('Listen & Find','听对啦！',stars(raceScore,8));
    speak(picked.w,function(){setTimeout(function(){el.classList.remove('good');raceBusy=false;setupRace()},600)});
  }else{
    playNo();el.classList.add('bad');
    speak(targetW,function(){setTimeout(function(){el.classList.remove('bad');raceBusy=false},350)});
  }
}

/* Module 3: Bingo — 4x4 grid, auto-call words, kid taps to mark */
var bingoGrid=[],bingoCall=[],bingoIdx=0,bingoScore=0,bingoBusy=false;
function init3(){
  bingoGrid=shuffle(allItems.slice()).slice(0,16);
  bingoCall=shuffle(bingoGrid.slice());
  bingoIdx=0;bingoScore=0;bingoBusy=false;
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'daddy-pig-walking.png" width="80" alt="Daddy"><div class="bbl" id="bingoBbl">Bingo time!</div></div>'+
    '<div class="bingo-call" id="bingoCall"></div>'+
    '<div class="bingo-grid" id="bingoGrid"></div>'+
    '<button style="margin-top:12px;padding:10px 28px;border:none;border-radius:14px;background:#ce93d8;color:#fff;font-size:20px;font-weight:700;cursor:pointer" onclick="callBingo()">🔊 Call Word</button>';
  renderBingo();
  setHead('Bingo!','听到词，点图片！',stars(0,8));
}
function renderBingo(){
  var el=document.getElementById('bingoGrid');
  el.innerHTML=bingoGrid.map(function(it,i){
    return '<button class="bingo-cell'+(it.marked?' marked':'')+'" id="bc'+i+'" onclick="tapBingo('+i+')">'+
      svgTag(it.svg,55)+'<div>'+it.w+'</div></button>';
  }).join('');
}
function callBingo(){
  if(bingoIdx>=8){return}
  var it=bingoCall[bingoIdx];
  document.getElementById('bingoCall').textContent=it.sent;
  document.getElementById('bingoBbl').textContent='Find: '+it.w+'!';
  speak(it.sent);
}
function tapBingo(i){
  if(bingoBusy||bingoIdx>=8)return;
  bingoBusy=true;
  var target=bingoCall[bingoIdx];
  var picked=bingoGrid[i];
  var el=document.getElementById('bc'+i);
  if(picked.w===target.w){
    playOk();bingoScore++;bingoIdx++;
    picked.marked=true;el.classList.add('marked');
    setHead('Bingo!','答对啦！',stars(bingoScore,8));
    speak(picked.w,function(){
      setTimeout(function(){
        bingoBusy=false;
        if(bingoIdx>=8){
          document.getElementById('bingoBbl').textContent='BINGO!';
          document.getElementById('bingoCall').textContent='🎉 BINGO! 🎉';
          setTimeout(function(){go(1)},800);
        }
      },400);
    });
  }else{
    playNo();el.style.outline='3px solid #ef5350';
    speak(target.w,function(){
      setTimeout(function(){el.style.outline='';bingoBusy=false},350);
    });
  }
}

/* Module 4: Sentence Builder — show SVG, kid picks correct sentence pattern */
var sbPool=[],sbIdx=0,sbScore=0,sbBusy=false;
function init4(){
  sbPool=shuffle(allItems.slice()).slice(0,8);
  sbIdx=0;sbScore=0;sbBusy=false;
  document.getElementById('m4').innerHTML=
    '<div class="pr"><img src="'+PP+'emily-elephant-standing.png" width="80" alt="Emily"><div class="bbl" id="sbBbl">Pick the right sentence!</div></div>'+
    '<div id="sbPic" style="margin:8px 0"></div>'+
    '<div style="font-size:34px;font-weight:900;color:#2c3e50;margin:4px 0" id="sbWord"></div>'+
    '<div class="race-opts" id="sbOpts"></div>';
  setupSb();
  setHead('Say It Right','选对的句子！',stars(0,8));
}

function setupSb(){
  if(sbIdx>=8){
    setHead('Sentences done!','句子全对啦！',stars(8,8));
    document.getElementById('sbBbl').textContent='Amazing!';
    document.getElementById('sbPic').innerHTML='';
    document.getElementById('sbWord').textContent='';
    document.getElementById('sbOpts').innerHTML='';
    setTimeout(function(){go(1)},800);
    return;
  }
  var target=sbPool[sbIdx];
  document.getElementById('sbPic').innerHTML=svgTag(target.svg,90);
  document.getElementById('sbWord').textContent=target.w;
  // build 4 sentence options: correct + 3 wrong patterns
  var sents=themes.map(function(th){return th.sent.replace('___',target.w)});
  var correct=target.sent;
  var wrong=sents.filter(function(s){return s!==correct});
  wrong=shuffle(wrong).slice(0,3);
  var opts=shuffle([correct].concat(wrong));
  document.getElementById('sbOpts').innerHTML=opts.map(function(s,i){
    return '<button class="race-btn" style="width:auto;height:auto;min-width:140px;padding:12px 16px" id="sb'+i+'" onclick="tapSb('+i+')">'+
      '<div style="font-size:20px">'+s+'</div></button>';
  }).join('');
  window._sbOpts=opts;
  window._sbCorrect=correct;
  speak(target.w);
}

function tapSb(i){
  if(sbBusy)return;sbBusy=true;
  var el=document.getElementById('sb'+i);
  if(window._sbOpts[i]===window._sbCorrect){
    playOk();sbScore++;sbIdx++;el.classList.add('good');
    setHead('Say It Right','选对啦！',stars(sbScore,8));
    speak(window._sbCorrect,function(){
      setTimeout(function(){el.classList.remove('good');sbBusy=false;setupSb()},600);
    });
  }else{
    playNo();el.classList.add('bad');
    speak(window._sbCorrect,function(){
      setTimeout(function(){el.classList.remove('bad');sbBusy=false},350);
    });
  }
}

/* Module 5: Done page */
function init5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="198" alt="Peppa family">'+
    '<div class="bbl" style="font-size:30px;margin-top:10px">All Done!</div>'+
    '<div style="font-size:52px;margin:8px 0">🎉🎈🎊🎉</div>'+
    '<div style="font-size:24px;font-weight:800;color:#9c27b0;margin-top:6px">We know 20 words!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px" onclick="restart()">Play Again</button>';
  setHead('Great Job!','派对游戏完成啦！',stars(8,8));
}

/* Navigation */
function restart(){
  document.getElementById(mods[cur]).classList.remove('on');
  cur=0;document.getElementById(mods[cur]).classList.add('on');
  init0();
  document.getElementById('pg').textContent='1/6';
  document.getElementById('pb').disabled=true;
  var xb=document.getElementById('xb');xb.textContent='Next ▶';xb.disabled=false;
}

var inits=[init0,init1,init2,init3,init4,init5];
function go(d){
  var n=cur+d;if(n<0||n>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=n;
  document.getElementById(mods[cur]).classList.add('on');
  inits[cur]();
  document.getElementById('pg').textContent=(cur+1)+'/6';
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===mods.length-1){xb.textContent='Done';xb.disabled=true}
  else{xb.textContent='Next ▶';xb.disabled=false}
}

init0();
</script>
