<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 21 - Numbers Review Game</title>
<style>
:root{--tip-accent:#ff6f00;--tip-bg:#fff3e0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#fff9c4 0%,#ffeb3b 50%,#81c784 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#ffb74d,#ff6f00);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(255,111,0,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Treasure Game</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>
<script>
var PP='../../assets/peppa/';
var NUMS=[
  {w:'one',n:1,color:'#ffd700',svg:'<polygon points="80,25 95,70 145,70 110,95 125,140 80,110 35,140 50,95 15,70 65,70" fill="#ffd700"/>'},
  {w:'two',n:2,color:'#ec407a',svg:'<path d="M60 50 Q50 30 70 20 Q80 15 90 20 Q110 30 100 50 Q95 65 80 80 L80 100 Q70 90 60 80 Q45 65 60 50 Z" fill="#ec407a"/>'},
  {w:'three',n:3,color:'#ff9800',svg:'<ellipse cx="80" cy="95" rx="35" ry="25" fill="#ff9800"/><ellipse cx="80" cy="85" rx="32" ry="22" fill="#ffb74d"/><rect x="76" y="40" width="8" height="30" rx="4" fill="#66bb6a"/>'},
  {w:'four',n:4,color:'#42a5f5',svg:'<ellipse cx="80" cy="80" rx="45" ry="35" fill="#42a5f5"/><circle cx="65" cy="60" r="3" fill="#333"/><circle cx="95" cy="60" r="3" fill="#333"/>'},
  {w:'five',n:5,color:'#9c27b0',svg:'<circle cx="80" cy="70" r="35" fill="#e53935"/><circle cx="50" cy="85" r="28" fill="#ffc107"/><circle cx="110" cy="85" r="28" fill="#4caf50"/>'}
];
var YEST=[
  {w:'apple',sent:'I like apple!',svg:'<circle cx="80" cy="90" r="48" fill="#e53935"/><circle cx="60" cy="72" r="12" fill="#ef5350" opacity=".5"/><rect x="76" y="30" width="8" height="24" rx="4" fill="#6d4c41"/><ellipse cx="92" cy="38" rx="14" ry="8" fill="#66bb6a"/>'},
  {w:'milk',sent:'I like milk!',svg:'<rect x="42" y="40" width="76" height="90" rx="10" fill="#e3f2fd"/><rect x="42" y="40" width="76" height="28" rx="10" fill="#42a5f5"/><text x="80" y="62" text-anchor="middle" font-size="18" font-weight="900" fill="#fff">MILK</text>'},
  {w:'egg',sent:'I like egg!',svg:'<ellipse cx="80" cy="90" rx="55" ry="42" fill="#fff" stroke="#f5f5f5" stroke-width="2"/><circle cx="80" cy="85" r="24" fill="#ffc107"/><circle cx="80" cy="85" r="16" fill="#ffca28"/>'}
];

function draw(svg,s){return '<svg width="'+(s||76)+'" height="'+(s||76)+'" viewBox="0 0 160 160">'+svg+'</svg>'}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d,type){var c=ac(),o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.value=.16;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}
function playOk(){tone(523,.08);setTimeout(function(){tone(659,.08)},90);setTimeout(function(){tone(784,.12)},180)}
function playNo(){tone(310,.15,'square');setTimeout(function(){tone(262,.18,'square')},150)}
function speak(text,cb){
  var done=false;
  function end(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
  a.onended=end;a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web');
    b.onended=end;b.onerror=end;b.play().catch(end);
  };
  a.play().catch(end);
  setTimeout(end,4000);
}

var cur=0,score=0,total=18;
var mods=['m0','m1','m2','m3','m4','m5'];
function ui(){
  document.getElementById('pg').textContent=(cur+1)+'/'+mods.length;
  document.getElementById('pb').disabled=cur===0;
  var n=document.getElementById('nb');
  if(cur===mods.length-1){n.disabled=true;n.textContent='Done'}
  else{n.disabled=false;n.textContent='Next'}
  var titles=['Treasure Game','Yesterday Bridge','Island Dig','Treasure Collect','Pirate Ship','All Done!'];
  var tips=['','昨天复习桥','挖沙找数字','收集宝藏','海盗船装载',''];
  document.getElementById('en').textContent=titles[cur]||'';
  var zh=document.getElementById('zh');
  zh.textContent=tips[cur]||'';
  zh.style.display=tips[cur]?'inline-block':'none';
  var s='';for(var i=0;i<total;i++)s+=i<score?'⭐':'☆';
  document.getElementById('st').textContent=s;
}
function show(i){
  if(i<0||i>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=i;
  document.getElementById(mods[cur]).classList.add('on');
  if(cur===1)initM1();
  if(cur===2)initM2();
  if(cur===3)initM3();
  if(cur===4)initM4();
  if(cur===5)initM5();
  ui();
}
function go(d){show(cur+d)}

/* M0: Start page */
(function initM0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'george-pig-superhero.png" width="140" alt="George Superhero">'+
    '<div class="pr"><div class="bbl">Let\'s find treasures!</div></div>'+
    '<div style="display:flex;gap:10px;margin:8px 0">'+
      '<img src="'+PP+'peppa-pig-fairy.png" width="80" alt="Peppa">'+
      '<img src="'+PP+'daddy-pig-standing.png" width="80" alt="Daddy">'+
    '</div>'+
    '<button class="start-btn" onclick="ac();show(1)">Start!</button>';
  ui();
})();

/* M1: Yesterday Bridge — 3 food words micro-review */
var yBusy=false,yQ=0,yOrder=[];
function initM1(){yBusy=false;yQ=0;yOrder=shuffle([0,1,2]);buildY()}
function buildY(){
  if(yQ>=3){setTimeout(function(){show(2)},700);return}
  var t=YEST[yOrder[yQ]];
  var opts=shuffle(YEST.slice());
  document.getElementById('m1').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'emily-elephant-standing.png" alt="Emily"><div class="bbl">'+t.sent+'</div></div>'+
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">'+opts.map(function(o){
        return '<button style="width:130px;height:130px;border:none;border-radius:16px;background:#fff;box-shadow:0 2 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px" data-w="'+o.w+'" onclick="tapY(this,\''+t.w+'\')">'+
          draw(o.svg,74)+'<div style="font-size:20px;font-weight:800;color:#2c3e50">'+o.w+'</div></button>';
      }).join('')+'</div>'+
    '</div>';
  setTimeout(function(){speak(t.w)},180);
}
function tapY(el,correct){
  if(yBusy)return;yBusy=true;
  if(el.dataset.w===correct){
    el.style.outline='4px solid #66bb6a';score++;ui();playOk();
    speak(correct,function(){yBusy=false;yQ++;setTimeout(buildY,520)});
  }else{
    el.style.outline='4px solid #ef5350';playNo();
    speak(correct,function(){yBusy=false});
  }
}

/* M2: Island Dig — tap sand piles to reveal numbers */
var dBusy=false,dRevealed=0;
function initM2(){
  dBusy=false;dRevealed=0;
  var order=shuffle([0,1,2,3,4]);
  document.getElementById('m2').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'peppa-pig-bicycle.png" alt="Peppa"><div class="bbl">Dig for treasures!</div></div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:440px;margin-top:10px">'+
        order.map(function(i){
          var t=NUMS[i];
          return '<button style="width:120px;height:120px;border:none;border-radius:16px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.1);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;background:linear-gradient(145deg,#d7ccc8,#bcaaa4)" data-w="'+t.w+'" onclick="digTap(this)">'+
            '<div style="font-size:36px">🏝️</div>'+
            '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:.3s" class="inner">'+
              draw(t.svg,70)+'<div style="font-size:20px;font-weight:800;color:'+t.color+';margin-top:4px">'+t.w+'</div>'+
            '</div>'+
          '</button>';
        }).join('')+
      '</div>'+
    '</div>';
}
function digTap(btn){
  if(dBusy||btn.classList.contains('done'))return;
  var inner=btn.querySelector('.inner');
  if(inner.style.opacity==='1'){
    speak(btn.dataset.w);
    return;
  }
  dBusy=true;
  btn.style.background='#fff';
  btn.querySelector('div').style.opacity='0';
  inner.style.opacity='1';
  btn.classList.add('done');
  score++;ui();playOk();
  speak(btn.dataset.w,function(){
    dBusy=false;
    dRevealed++;
    if(dRevealed===5)setTimeout(function(){show(3)},800);
  });
}

/* M3: Treasure Collect — tap to collect correct number of items */
var cBusy=false,cQ=0,cOrder=[];
function initM3(){cBusy=false;cQ=0;cOrder=shuffle([0,1,2,3,4]);buildC()}
function buildC(){
  if(cQ>=5){setTimeout(function(){show(4)},700);return}
  var t=NUMS[cOrder[cQ]];
  var opts=[t.n-1,t.n,t.n+1].filter(function(x){return x>=1&&x<=5});
  if(opts.length<3){
    if(t.n===1)opts=[1,2,3];
    else if(t.n===5)opts=[3,4,5];
  }
  opts=shuffle(opts);
  document.getElementById('m3').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy"><div class="bbl">I have '+t.w+'!</div></div>'+
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px">'+opts.map(function(num){
        var items='';
        for(var i=0;i<num;i++)items+=draw(t.svg,50);
        return '<button style="width:140px;min-height:140px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;padding:10px" data-n="'+num+'" onclick="tapC(this,'+t.n+')">'+items+'</button>';
      }).join('')+'</div>'+
    '</div>';
  setTimeout(function(){speak(t.w)},180);
}
function tapC(el,correct){
  if(cBusy)return;cBusy=true;
  if(parseInt(el.dataset.n)===correct){
    el.style.outline='4px solid #66bb6a';score++;ui();playOk();
    speak(NUMS[cOrder[cQ]].w,function(){cBusy=false;cQ++;setTimeout(buildC,520)});
  }else{
    el.style.outline='4px solid #ef5350';playNo();
    speak(NUMS[cOrder[cQ]].w,function(){cBusy=false});
  }
}

/* M4: Pirate Ship — listen and load correct number of treasure chests */
var pBusy=false,pQ=0,pOrder=[];
function initM4(){pBusy=false;pQ=0;pOrder=shuffle([0,1,2,3,4]);buildP()}
function buildP(){
  if(pQ>=5){setTimeout(function(){show(5)},700);return}
  var t=NUMS[pOrder[pQ]];
  var opts=shuffle([1,2,3,4,5]);
  document.getElementById('m4').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'george_pig_dinosaur.png" alt="George"><div class="bbl">Load the ship!</div></div>'+
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px">'+opts.map(function(num){
        var chests='';
        for(var i=0;i<num;i++)chests+='<div style="width:32px;height:32px;background:#8d6e63;border-radius:4px;margin:2px"></div>';
        return '<button style="width:110px;min-height:110px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;padding:8px" data-n="'+num+'" onclick="tapP(this,'+t.n+')">'+chests+'</button>';
      }).join('')+'</div>'+
    '</div>';
  setTimeout(function(){speak(t.w)},180);
}
function tapP(el,correct){
  if(pBusy)return;pBusy=true;
  if(parseInt(el.dataset.n)===correct){
    el.style.outline='4px solid #66bb6a';score++;ui();playOk();
    speak(NUMS[pOrder[pQ]].w,function(){pBusy=false;pQ++;setTimeout(buildP,520)});
  }else{
    el.style.outline='4px solid #ef5350';playNo();
    speak(NUMS[pOrder[pQ]].w,function(){pBusy=false});
  }
}

/* M5: Done page */
function initM5(){
  score=total;ui();
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-pig-family.png" width="160" alt="Peppa Family">'+
    '<div style="font-size:48px;font-weight:900;color:#ff6f00;margin:12px 0">All Done!</div>'+
    '<div style="font-size:24px;color:#5f6c7b;margin-bottom:12px">Great treasure hunting!</div>'+
    '<div style="font-size:52px">🏆✨🎉</div>'+
    '<button class="start-btn" style="margin-top:20px" onclick="location.reload()">Play Again</button>';
}

ui();
</script>
</body>
</html>
