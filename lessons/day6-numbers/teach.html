<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 6 - Numbers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 74px;text-align:center}
.sl.on{display:flex}
.bg-title{background:linear-gradient(165deg,#e8f5e9,#c8e6c9)}
.bg-hello{background:linear-gradient(180deg,#dcedc8,#f1f8e9)}
.bg-yesterday{background:linear-gradient(160deg,#fff4e0,#ffe8cc)}
.bg-one{background:linear-gradient(160deg,#fff9c4,#fffde7)}
.bg-two{background:linear-gradient(160deg,#fce4ec,#fff0f5)}
.bg-three{background:linear-gradient(160deg,#e8f5e9,#f1f8e9)}
.bg-four{background:linear-gradient(160deg,#e3f2fd,#e8eaf6)}
.bg-five{background:linear-gradient(160deg,#f3e5f5,#fce4ec)}
.bg-count{background:linear-gradient(160deg,#fff8e1,#fff3e0)}
.bg-team{background:linear-gradient(160deg,#e0f7fa,#e8f5e9)}
.bg-bye{background:linear-gradient(180deg,#66bb6a,#aed581 58%,#dce775)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:6px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-transform:lowercase;color:#2c3e50;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#43a047;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pr img{width:85px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;font-size:26px;font-weight:700;color:#43a047;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj{margin:8px 0}
.dots{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:6px 0}
.dots svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.1))}
.review-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:760px;margin-top:14px}
.review-card{width:160px;min-height:160px;background:#fff;border-radius:20px;padding:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;justify-content:center}
.review-word{font-size:30px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:6px}
.count-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:700px;margin-top:10px}
.c-btn{width:130px;height:130px;border:none;border-radius:20px;background:linear-gradient(145deg,#a5d6a7,#81c784);color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;overflow:hidden;transition:.3s}
.c-btn span{font-size:22px;font-weight:900;text-transform:lowercase;opacity:0;transform:translateY(10px);transition:.3s}
.c-btn .inner{opacity:0;transform:scale(.6);transition:.3s}
.c-btn.on span,.c-btn.on .inner{opacity:1;transform:translateY(0) scale(1)}
.c-btn.on{background:#fff;color:#2c3e50;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:900px;margin-top:10px}
.ti{background:#fff;border-radius:16px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.ti .num{font-size:42px;font-weight:900;color:#43a047}
.ti .wlabel{font-size:28px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:#81c784;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(129,199,132,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:126px;right:16px;z-index:199;width:330px;max-height:42vh;background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 16px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#81c784;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.ttl{font-size:46px}.sub{font-size:24px}.word{font-size:100px}.sent{font-size:38px}.c-btn{width:150px;height:150px}}
</style>
</head>

<script>
var notes={
"0":"Title page: George in superhero costume leads treasure hunt. Kids look at treasure icons (star, heart, flower, butterfly, balloon). No words yet.",
"1":"Story setup: Peppa and Emily go treasure hunting in the garden. Image-led, no sentence drills.",
"2":"Yesterday review: 3 food items quick recall. Teacher points, kids say 'I like apple/banana/egg'. 2 min max.",
"3":"one: Show 1 star. 'I have one!' Kids repeat 3x. Count together: one!",
"4":"two: Show 2 hearts. 'I have two!' Count together: one, two!",
"5":"three: Show 3 flowers. 'I have three!' Count together: one, two, three!",
"6":"four: Show 4 butterflies. 'I have four!' Count: one, two, three, four!",
"7":"five: Show 5 balloons. 'I have five!' Count all: one, two, three, four, five!",
"8":"Count & Reveal: Teacher taps each treasure chest. Ask 'How many?' before revealing.",
"9":"All Together: Random point and ask. 'How many stars? I have one!' Mix up order.",
"10":"Celebrate! Count 1-5 together one final time."
};

var numWords=["one","two","three","four","five"];

function countTap(i){
  var el=document.getElementById('cb'+i);
  if(!el||el.classList.contains('on'))return;
  el.classList.add('on');
  document.getElementById('countBbl').textContent='I have '+numWords[i]+'!';
}

var cur=0,total=11,open=false;
function goTo(n){
  if(n<0||n>=total)return;
  document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.sl')[n].classList.add('on');
  cur=n;
  document.getElementById('pg').textContent=(cur+1)+'/'+total;
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===total-1){xb.textContent='Done';xb.disabled=true}else{xb.textContent='Next \u25B6';xb.disabled=false}
  document.getElementById('B').innerHTML=notes[cur]||'';
}
function go(d){goTo(cur+d)}
function tn(){open=!open;document.getElementById('P').classList.toggle('on',open);document.getElementById('F').classList.toggle('on',open)}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});
document.addEventListener('click',function(e){
  if(open&&!e.target.closest('.pop')&&!e.target.closest('.fab')){
    open=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on');
  }
});
goTo(0);
</script>
</body>
</html>
