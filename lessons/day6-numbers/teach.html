<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 6 - Numbers (Teach)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 30px 70px;text-align:center;overflow-y:auto}
.sl.on{display:flex}
.bg0{background:linear-gradient(160deg,#fef9ef,#fdf2e9)}
.bg1{background:linear-gradient(160deg,#e8f8f5,#d5f5e3)}
.bg2{background:linear-gradient(160deg,#ebf5fb,#d6eaf8)}
.bg3{background:linear-gradient(160deg,#fdebd0,#fadbd8)}
.bg4{background:linear-gradient(160deg,#f5eef8,#ebdef0)}
.bg5{background:linear-gradient(160deg,#fef9ef,#fdebd0)}
.bg6{background:linear-gradient(160deg,#f9ebea,#fdedec)}
.sec{font-size:13px;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.ttl{font-size:32px;font-weight:800;color:#2c3e50;margin-bottom:12px}
.sub{font-size:18px;color:#7f8c8d;margin-bottom:16px}
.big{width:180px;height:180px;margin:6px 0}
.wd{font-size:60px;font-weight:800;color:#2c3e50;margin:10px 0;letter-spacing:3px}
.ks{font-size:30px;font-weight:600;color:#e67e22;margin:12px 0;background:rgba(230,126,34,.08);border-radius:12px;padding:10px 24px;border-left:4px solid #e67e22}

/* Flash grid for warm-up */
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:560px;margin:10px auto}
.fc{background:#fff;border-radius:16px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.05);min-height:100px}
.fc img{width:52px;height:52px}
.fc .fw{font-size:15px;font-weight:700;color:#2c3e50;margin-top:4px}

/* Counting items row */
.count-row{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin:10px 0}
.count-row img{width:70px;height:70px;animation:popIn .4s ease both}
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

/* Counting Game */
.cg-items{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.cg-items img{width:80px;height:80px;opacity:0;transition:opacity .3s}
.cg-items img.show{opacity:1;animation:popIn .4s ease}
.cg-reveal{font-size:48px;font-weight:800;color:#e67e22;margin:10px 0;opacity:0;transition:opacity .5s}
.cg-reveal.show{opacity:1}
.cg-btn{padding:14px 36px;border:none;border-radius:14px;font-size:20px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;box-shadow:0 4px 15px rgba(52,152,219,.3);transition:transform .2s}
.cg-btn:hover{transform:scale(1.05)}
.cg-btn:active{transform:scale(.95)}

/* Number Race */
.nr-area{position:relative;width:100%;max-width:400px;min-height:200px;background:#fff;border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;padding:20px;margin:10px 0}
.nr-area img{width:60px;height:60px}
.nr-prompt{font-size:28px;font-weight:700;color:#2c3e50;margin:10px 0}
.nr-choices{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.nr-choice{width:80px;height:80px;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s,box-shadow .2s}
.nr-choice:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.nr-choice:active{transform:scale(.95)}
.nr-choice img{width:50px;height:50px}
.nr-choice.correct{background:#d5f5e3;box-shadow:0 0 0 3px #27ae60}
.nr-choice.wrong{background:#fadbd8;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* FAB & popup */
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#3498db;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(52,152,219,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.fab:hover{background:#2980b9;transform:scale(1.08)}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:340px;max-height:45vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:16px 20px;display:none;font-size:14px;line-height:1.7;color:#555;border:1px solid rgba(52,152,219,.2)}
.pop.on{display:block;animation:fu .2s ease}
.pop-t{font-size:12px;font-weight:700;color:#3498db;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.pop ul{margin:4px 0 4px 18px}.pop li{margin:3px 0}.pop b{color:#2c3e50}
.pop .tc{font-weight:700;color:#3498db;margin-top:8px;display:block;font-size:13px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nb{padding:10px 22px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#3498db;color:#fff}
.nb:hover{background:#2980b9}
.nb:disabled{background:#e0e0e0;color:#bbb;cursor:default}
.np{font-size:14px;font-weight:600;color:#999}
.nk{font-size:11px;color:#ccc;margin-top:2px;text-align:center}

@media(min-width:768px){
  .big{width:220px;height:220px}
  .wd{font-size:72px}
  .ks{font-size:34px}
  .ttl{font-size:38px}
  .fc img{width:68px;height:68px}
  .fc .fw{font-size:18px}
  .count-row img{width:90px;height:90px}
  .cg-items img{width:100px;height:100px}
  .nr-area{max-width:500px;min-height:240px}
  .nr-area img{width:70px;height:70px}
  .nr-choice{width:100px;height:100px}
  .nr-choice img{width:60px;height:60px}
  .pop{width:400px}
}
</style>
</head>
<body>
<div class="deck" id="D"></div>
<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div class="pop-t">📋 Teacher Notes</div><div id="B"></div></div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">◀ Back</button>
  <div style="text-align:center"><div class="np" id="pg">1/14</div><div class="nk">← → · T=tips</div></div>
  <button class="nb" id="nb" onclick="go(1)">Next ▶</button>
</div>
<script>
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/';
var N={},c=0,t=0,o=false;

var RW=[
  {w:'apple',svg:'1f34e'},
  {w:'nose',svg:'1f443'},
  {w:'dog',svg:'1f436'}
];

var NW=[
  {w:'one',  svg:'31-20e3', n:1},
  {w:'two',  svg:'32-20e3', n:2},
  {w:'three',svg:'33-20e3', n:3},
  {w:'four', svg:'34-20e3', n:4},
  {w:'five', svg:'35-20e3', n:5}
];

// Items used for counting visuals
var ITEMS=[
  {w:'apple',svg:'1f34e'},
  {w:'star',svg:'2b50'},
  {w:'dog',svg:'1f436'},
  {w:'fish',svg:'1f41f'},
  {w:'banana',svg:'1f34c'}
];

function img(svg,sz){return '<img src="'+TW+svg+'.svg" width="'+sz+'" height="'+sz+'" alt="">'}
function mk(i,bg,x){return '<div class="sl '+bg+(i===0?' on':'')+'" data-i="'+i+'">'+x+'</div>'}

function build(){
var h='',i=0;

// 1 Title
h+=mk(i++,'bg0',
  '<div style="display:flex;gap:8px;margin:6px 0">'+NW.map(function(w){return img(w.svg,60)}).join('')+'</div>'+
  '<div class="ttl">Numbers</div>'+
  '<div class="sub">one · two · three · four · five</div>');
N[0]='<span class="tc">🎯 Today</span><ul><li>Sentence: <b>I have ___!</b></li><li>Ask: <b>How many?</b></li><li>New: one, two, three, four, five</li><li>Review: apple, nose, dog</li></ul>';

// 2 Warm-up
h+=mk(i++,'bg1',
  '<div class="sec">Warm-up</div><div class="ttl">How many? 👀</div>'+
  '<div class="fg">'+RW.map(function(w){return '<div class="fc">'+img(w.svg,52)+'<div class="fw">'+w.w+'</div></div>'}).join('')+'</div>'+
  '<div class="ks">I have one ___!</div>');
N[1]='<span class="tc">🗣️ Warm-up</span><ul><li>Hold up one apple: "How many apples? One! I have one apple!"</li><li>Point to nose: "I have one nose!"</li><li>Point to dog: "I have one dog!"</li><li>Quick review, 2 min max</li></ul>';

// 3-7 New Words (each number with matching count of items)
NW.forEach(function(w,j){
  var itemObj = ITEMS[j];
  var dots = '';
  for(var k=0;k<w.n;k++) dots += img(itemObj.svg,70);
  h+=mk(i++,'bg2',
    '<div class="sec">New Word '+(j+1)+'/5</div>'+
    img(w.svg,180)+
    '<div class="wd">'+w.w+'</div>'+
    '<div class="count-row">'+dots+'</div>'+
    '<div class="ks">I have '+w.w+'!</div>');
  N[i-1]='<span class="tc">🗣️</span><ul><li>Show '+w.n+' '+itemObj.w+(w.n>1?'s':'')+'</li><li>Count together: "one'+(w.n>=2?', two':'')+(w.n>=3?', three':'')+(w.n>=4?', four':'')+(w.n>=5?', five':'')+'"</li><li>"How many?" → "I have '+w.w+'!"</li><li>Repeat 2-3 times</li></ul>';
});

// 8-12 Counting Game (5 pages, each shows N items, teacher clicks to count)
buildCountingGame(h,i);
}

function buildCountingGame(h,i){
var cgItems = [
  {n:3, item:ITEMS[0], label:'three'},
  {n:5, item:ITEMS[1], label:'five'},
  {n:2, item:ITEMS[2], label:'two'},
  {n:4, item:ITEMS[3], label:'four'},
  {n:1, item:ITEMS[4], label:'one'}
];

cgItems.forEach(function(cg,j){
  var itemsHtml='';
  for(var k=0;k<cg.n;k++){
    itemsHtml+='<img src="'+TW+cg.item.svg+'.svg" width="80" height="80" alt="" data-cg="'+i+'" data-k="'+k+'">';
  }
  h+=mk(i,'bg3',
    '<div class="sec">Counting Game '+(j+1)+'/5</div>'+
    '<div class="ttl">Let\'s count! 🔢</div>'+
    '<div class="cg-items" id="cgi'+i+'">'+itemsHtml+'</div>'+
    '<div class="cg-reveal" id="cgr'+i+'">I have '+cg.label+'!</div>'+
    '<button class="cg-btn" id="cgb'+i+'" onclick="countReveal('+i+','+cg.n+')">Count them!</button>');
  N[i]='<span class="tc">🎮 Counting Game</span><ul><li>Tap "Count them!" to reveal items one by one</li><li>Count aloud with the child: "one, two'+(cg.n>=3?', three':'')+(cg.n>=4?', four':'')+(cg.n>=5?', five':'')+'"</li><li>Then sentence appears: "I have '+cg.label+'!"</li><li>Ask: "How many '+cg.item.w+(cg.n>1?'s':'')+'?"</li></ul>';
  i++;
});

buildNumberRace(h,i);
}

function buildNumberRace(h,i){
// 13 Number Race
h+=mk(i,'bg4',
  '<div class="sec">Number Race</div>'+
  '<div class="ttl">How many? 🏁</div>'+
  '<div class="nr-area" id="nrArea"></div>'+
  '<div class="nr-prompt" id="nrPrompt">Tap Start!</div>'+
  '<div class="nr-choices" id="nrChoices"></div>'+
  '<button class="cg-btn" id="nrStart" onclick="startRace()">Start!</button>');
N[i]='<span class="tc">🎮 Number Race</span><ul><li>Tap Start to show random items</li><li>Ask "How many?" — child picks the number</li><li>5 rounds, gets faster!</li><li>Celebrate each correct answer</li></ul>';
i++;

// 14 Bye
h+=mk(i++,'bg5',
  img('2b50',180)+
  '<div class="ttl">Well Done!</div>'+
  '<div class="sub">See you next time! 👋</div>');
N[i-1]='<span class="tc">👋</span><ul><li>"How many stars? One big star!"</li><li>"Say bye! Bye one! Bye two!"</li></ul>';

document.getElementById('D').innerHTML=h;
t=i;goTo(0);
}

// === Counting Game Logic ===
function countReveal(slideIdx, total){
  var items = document.querySelectorAll('[data-cg="'+slideIdx+'"]');
  var btn = document.getElementById('cgb'+slideIdx);
  var reveal = document.getElementById('cgr'+slideIdx);
  btn.style.display='none';
  var delay=0;
  items.forEach(function(it,k){
    setTimeout(function(){it.classList.add('show')},delay);
    delay+=600;
  });
  setTimeout(function(){
    reveal.classList.add('show');
  },delay+300);
}

// === Number Race Logic ===
var raceRound=0, raceTotal=5;
function startRace(){
  raceRound=0;
  document.getElementById('nrStart').style.display='none';
  nextRaceRound();
}
function nextRaceRound(){
  if(raceRound>=raceTotal){
    document.getElementById('nrArea').innerHTML='';
    document.getElementById('nrPrompt').textContent='Great counting! 🎉';
    document.getElementById('nrChoices').innerHTML='';
    return;
  }
  var correctNum=1+Math.floor(Math.random()*5);
  var itemIdx=Math.floor(Math.random()*ITEMS.length);
  var item=ITEMS[itemIdx];
  var area=document.getElementById('nrArea');
  var html='';
  for(var k=0;k<correctNum;k++) html+=img(item.svg,60);
  area.innerHTML=html;
  document.getElementById('nrPrompt').textContent='How many?';

  // Build 3 choices including correct
  var choices=[correctNum];
  while(choices.length<3){
    var r=1+Math.floor(Math.random()*5);
    if(choices.indexOf(r)===-1) choices.push(r);
  }
  choices.sort(function(){return Math.random()-.5});

  var ch=document.getElementById('nrChoices');
  ch.innerHTML='';
  choices.forEach(function(num){
    var nwObj=NW[num-1];
    var div=document.createElement('div');
    div.className='nr-choice';
    div.innerHTML=img(nwObj.svg,50);
    div.onclick=function(){
      if(num===correctNum){
        div.classList.add('correct');
        document.getElementById('nrPrompt').textContent='I have '+nwObj.w+'! ⭐';
        raceRound++;
        setTimeout(nextRaceRound,1500);
      } else {
        div.classList.add('wrong');
        setTimeout(function(){div.classList.remove('wrong')},500);
      }
    };
    ch.appendChild(div);
  });
}

// === Navigation ===
function goTo(i){if(i<0||i>=t)return;document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});document.querySelectorAll('.sl')[i].classList.add('on');c=i;
  document.getElementById('pg').textContent=(c+1)+'/'+t;
  document.getElementById('pb').disabled=c===0;
  var b=document.getElementById('nb');
  if(c===t-1){b.textContent='Done 🎉';b.disabled=true}else{b.textContent='Next ▶';b.disabled=false}
  document.getElementById('B').innerHTML=N[c]||'';
}
function go(d){goTo(c+d)}

// === Teacher Notes ===
function tn(){o=!o;document.getElementById('P').classList.toggle('on',o);document.getElementById('F').classList.toggle('on',o)}
document.addEventListener('click',function(e){if(o&&!e.target.closest('.pop')&&!e.target.closest('.fab')){o=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on')}});

// === Keyboard ===
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});

build();
</script>
</body>
</html>
