<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 6 Review - Numbers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#a8e6cf 0%,#ffd3b6 50%,#ffaaa5 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#e67e22;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#e67e22;transform:scale(1.2)}
.top-bar .dot.done{background:#f39c12}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px;background:none;border-radius:0;min-height:auto;box-shadow:none}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:17px;color:rgba(0,0,0,.5);margin-top:2px;line-height:1.3}
.instr-stars{display:flex;gap:5px;margin-top:4px}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}
.card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

.review-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.review-card:active{transform:scale(.95)}
.review-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Tap-to-learn */
.learn-grid{display:flex;flex-wrap:wrap;gap:12px;width:100%;justify-content:center}
.learn-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;
  width:calc(33.33% - 8px);min-height:110px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.learn-card:active{transform:scale(.95)}
.learn-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333;opacity:0;transition:opacity .3s}
.learn-card.revealed .label{opacity:1}
.learn-card.revealed .icon img{filter:none;animation:popIn .4s ease}
.learn-card:not(.revealed) .icon img{filter:grayscale(1) brightness(1.1)}

/* Count & Color stars */
.cc-num{font-size:72px;font-weight:800;color:#e67e22;margin:8px 0}
.cc-stars{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.cc-star{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s,background .3s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.cc-star:active{transform:scale(.9)}
.cc-star.lit{background:rgba(255,215,0,.3);animation:popIn .4s ease}
.cc-star .icon img{filter:grayscale(1) brightness(1.3);transition:filter .3s}
.cc-star.lit .icon img{filter:none}
.cc-confirm{padding:14px 40px;border:none;border-radius:50px;font-size:20px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;box-shadow:0 4px 15px rgba(230,126,34,.3);
  transition:transform .2s;margin-top:10px;display:none}
.cc-confirm:active{transform:scale(.95)}

/* Listen & Find */
.listen-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.listen-card:active{transform:scale(.95)}
.listen-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Whack-a-mole */
.mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.mole-hole{background:rgba(139,90,43,.3);border-radius:50%;width:100%;aspect-ratio:1;display:flex;
  align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:inset 0 4px 8px rgba(0,0,0,.15);-webkit-tap-highlight-color:transparent}
.mole-hole:active{transform:scale(.95)}
.mole{position:absolute;bottom:-80px;transition:bottom .3s ease;line-height:1;display:flex;flex-direction:column;align-items:center}
.mole.up{bottom:8px;animation:moleWiggle .3s ease}
.mole.whacked{animation:popIn .3s ease}
.mole-sign{background:#fff;border-radius:8px;padding:2px 8px;font-size:14px;font-weight:700;color:#e67e22;margin-bottom:2px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
@keyframes moleWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}

/* Star burst */
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

/* Complete */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.complete-text{font-size:24px;font-weight:700;color:#fff;margin-top:12px;text-shadow:1px 1px 3px rgba(0,0,0,.2)}

/* Nav bar */
.nav-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;
  padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-top:2px solid rgba(0,0,0,.06);z-index:100}
.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#e67e22;border:2px solid #e67e22}
.nav-next{color:#fff;background:linear-gradient(135deg,#f5b041,#e67e22);
  box-shadow:0 4px 15px rgba(230,126,34,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-progress{font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center}

@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

@media(min-width:768px){
  .top-bar{max-width:800px;padding:16px 24px}
  .top-bar .title{font-size:22px}
  .main{max-width:800px;padding:24px 24px 20px}
  .card-grid,.mole-grid{gap:18px}
  .card{padding:20px;min-height:140px}
  .card .icon img,.review-card .icon img,.listen-card .icon img,.learn-card .icon img{width:120px!important;height:120px!important}
  .mole img{width:80px!important;height:80px!important}
  .cc-star{width:90px;height:90px}
  .cc-num{font-size:90px}
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title" id="topTitle">Day 6 · Numbers Review</div>
  <div class="dots" id="dots"></div>
</div>
<div class="main" id="main">
<div class="instr-banner" id="instrBanner"></div>

<!-- Start Screen -->
<div class="module active" id="mod0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px">
  <div style="display:flex;gap:12px" id="startIcons"></div>
  <div style="font-size:32px;font-weight:700;color:#2d3436">准备好了吗？</div>
  <div style="font-size:18px;color:rgba(0,0,0,.45)">点击开始学数字！</div>
  <button onclick="getAudioCtx();goModule(1);document.getElementById('mod0').style.display='none'" style="font-size:28px;padding:16px 50px;border-radius:50px;border:none;background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(230,126,34,.35);letter-spacing:2px">开始玩 ▶</button>
</div>

<!-- Module 1: Review Warm-up -->
<div class="module" id="mod1">
  <div class="card-grid" id="reviewGrid"></div>
</div>

<!-- Module 2: Tap to Learn -->
<div class="module" id="mod2">
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- Module 3: Count & Color -->
<div class="module" id="mod3">
  <div class="cc-num" id="ccNum"></div>
  <div class="cc-stars" id="ccStars"></div>
  <button class="cc-confirm" id="ccConfirm" onclick="checkCount()">OK!</button>
</div>

<!-- Module 4: Listen & Find -->
<div class="module" id="mod4">
  <div class="card-grid" id="listenGrid"></div>
</div>

<!-- Module 5: Number Whack -->
<div class="module" id="mod5">
  <div class="mole-grid" id="moleGrid"></div>
</div>

<!-- Complete -->
<div class="module" id="mod6">
  <div class="complete-screen">
    <div id="completeEmoji"></div>
    <div class="complete-text">Great Job, Ranran!</div>
    <div style="font-size:16px;color:rgba(255,255,255,.85);margin-top:8px">You learned all the numbers!</div>
    <button class="nav-btn nav-next" style="margin-top:20px" onclick="goModule(1)">Play Again</button>
    <button class="nav-btn" style="margin-top:10px;background:rgba(255,255,255,.2);color:#fff;border:none" onclick="location.href='../../index.html'">Home</button>
  </div>
</div>
</div>

<div class="nav-bar">
  <button class="nav-btn nav-prev" id="navPrev" onclick="goPrev()">&#9664; Back</button>
  <span class="nav-progress" id="navProgress">1/5</span>
  <button class="nav-btn nav-next" id="navNext" onclick="goNext()">Next &#9654;</button>
</div>

<script>
// === TWEMOJI HELPER ===
function twimg(code, sz) {
  return '<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/' + code + '.svg" width="' + sz + '" height="' + sz + '" alt="">';
}

// === DATA ===
var NUMBERS = [
  {name:'one',   code:'31-20e3', n:1},
  {name:'two',   code:'32-20e3', n:2},
  {name:'three', code:'33-20e3', n:3},
  {name:'four',  code:'34-20e3', n:4},
  {name:'five',  code:'35-20e3', n:5}
];
var REVIEW = [
  {name:'apple', code:'1f34e'},
  {name:'nose',  code:'1f443'},
  {name:'dog',   code:'1f436'}
];

var MODULES = 6, currentModule = 0;
var reviewRound = 0, reviewOrder = [];
var learnRevealed = 0;
var ccRound = 0, ccTarget = 0, ccLit = 0;
var listenRound = 0, listenOrder = [];
var whackRound = 0, whackOrder = [], moleTimers = [];

// === AUDIO ===
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function speak(text, cb) {
  var isWord = text.trim().indexOf(' ') === -1;
  var url = isWord
    ? 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2'
    : 'https://fanyi.baidu.com/gettts?lan=en&text=' + encodeURIComponent(text) + '&spd=4&source=web';
  var a = new Audio(url);
  var done = false;
  var finish = function(){ if(!done){ done=true; if(cb) setTimeout(cb, 50); } };
  var safety = setTimeout(finish, 4000);
  a.onended = function(){ clearTimeout(safety); finish(); };
  a.onerror = function(){ clearTimeout(safety); finish(); };
  a.play().catch(finish);
}
function playCorrect() {
  var ctx = getAudioCtx();
  [523.25, 659.25].forEach(function(freq, i) {
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    var t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  });
}
function playWrong() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
function playPop() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}
function playStar() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}

// === UI HELPERS ===
function setInstr(en, zh, starsHtml) {
  var b = document.getElementById('instrBanner');
  var h = '<div class="instr-en">' + en + '</div>';
  if(zh) h += '<div class="instr-zh">' + zh + '</div>';
  if(starsHtml) h += '<div class="instr-stars">' + starsHtml + '</div>';
  b.innerHTML = h;
}
function starsBar(total, earned) {
  var h = '';
  for(var i = 0; i < total; i++) {
    h += '<span style="opacity:' + (i < earned ? '1' : '.3') + ';transition:opacity .3s">' + twimg('2b50', 18) + '</span>';
  }
  return h;
}
function burstStars(x, y) {
  playStar();
  var c = document.createElement('div');
  c.className = 'star-burst';
  c.style.left = x + 'px'; c.style.top = y + 'px';
  var codes = ['2b50','1f31f','2728','1f4ab'];
  for(var i = 0; i < 8; i++) {
    var s = document.createElement('div');
    s.className = 'star-particle';
    var angle = (i / 8) * Math.PI * 2;
    var dist = 60 + Math.random() * 40;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    s.innerHTML = twimg(codes[i % 4], 20);
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(function(){ c.remove(); }, 1100);
}
function shuffle(arr) {
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// === NAVIGATION ===
function updateDots() {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(var i = 1; i <= 5; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === currentModule ? ' active' : '') + (i < currentModule ? ' done' : '');
    dots.appendChild(d);
  }
}
function goModule(n) {
  currentModule = n;
  document.querySelectorAll('.module').forEach(function(m){ m.classList.remove('active'); m.style.display = ''; });
  var target = document.getElementById('mod' + n);
  if(target) target.classList.add('active');
  updateDots();
  if(n === 1) startReview();
  if(n === 2) initLearn();
  if(n === 3) startCountColor();
  if(n === 4) startListen();
  if(n === 5) startWhack();
  updateNav();
}
function updateNav() {
  document.getElementById('navPrev').disabled = (currentModule <= 1);
  document.getElementById('navNext').textContent = (currentModule >= 5) ? 'Done!' : 'Next';
  document.getElementById('navProgress').textContent = Math.min(currentModule, 5) + '/5';
  document.querySelector('.nav-bar').style.display = (currentModule >= 6) ? 'none' : '';
}
function goNext() { if(currentModule < 6) goModule(currentModule + 1); }
function goPrev() { if(currentModule > 1) goModule(currentModule - 1); }

// === MODULE 1: REVIEW WARM-UP (find apple/nose/dog) ===
function startReview() {
  reviewRound = 0;
  reviewOrder = shuffle([0,1,2]);
  buildReviewGrid();
  showReviewPrompt();
}
function buildReviewGrid() {
  var grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  shuffle(REVIEW).forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'review-card';
    card.innerHTML = '<div class="icon">' + twimg(r.code, 80) + '</div><div class="label">' + r.name + '</div>';
    card.onclick = function(e) { checkReview(this, r, e); };
    grid.appendChild(card);
  });
}
function showReviewPrompt() {
  if(reviewRound >= 3) {
    setInstr('Great memory! 🌟', '太厉害了，全部找对啦！', starsBar(3, 3));
    return;
  }
  var target = REVIEW[reviewOrder[reviewRound]];
  setInstr('Find: ' + target.name + '! ' + twimg(target.code, 24), '点一点，哪个是 ' + target.name + '？', starsBar(3, reviewRound));
  speak('Find ' + target.name);
}
var reviewBusy = false;
function checkReview(card, item, e) {
  if(reviewRound >= 3) { speak(item.name); return; }
  if(reviewBusy) return;
  var target = REVIEW[reviewOrder[reviewRound]];
  if(item.name === target.name) {
    reviewBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    reviewRound++;
    setInstr('Find: ' + target.name + '!', '答对啦！这是 ' + target.name + '！', starsBar(3, reviewRound));
    playCorrect();
    speak(target.name);
    setTimeout(function() {
      reviewBusy = false;
      buildReviewGrid(); showReviewPrompt();
    }, 1200);
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 2: TAP TO LEARN (numbers) ===
function initLearn() {
  learnRevealed = 0;
  setInstr('Tap to learn! 👆', '点一点卡片，学习数字吧！');
  var grid = document.getElementById('learnGrid');
  grid.innerHTML = '';
  NUMBERS.forEach(function(a, i) {
    var card = document.createElement('div');
    card.className = 'learn-card';
    card.innerHTML = '<div class="icon">' + twimg(a.code, 80) + '</div><div class="label">' + a.name + '</div>';
    card.onclick = function(e) { revealLearn(this, i, e); };
    grid.appendChild(card);
  });
}
var learnBusy = false;
function revealLearn(el, idx, e) {
  if (el.classList.contains('revealed')) { speak(NUMBERS[idx].name); return; }
  if (learnBusy) return;
  el.classList.add('revealed');
  learnRevealed++;
  learnBusy = true;
  playPop();
  var rect = el.getBoundingClientRect();
  burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
  speak(NUMBERS[idx].name, function() {
    learnBusy = false;
    if (learnRevealed >= NUMBERS.length) {
      setInstr('All learned! 🎉', '全部学会啦，你真棒！');
    } else {
      setInstr('Tap to learn! 👆', '还有卡片没翻开哦，继续点！');
    }
  });
}

// === MODULE 3: COUNT & COLOR ===
var CC_ROUNDS = [
  {n:3, word:'three'},
  {n:1, word:'one'},
  {n:5, word:'five'},
  {n:2, word:'two'},
  {n:4, word:'four'}
];
function startCountColor() {
  ccRound = 0;
  nextCCRound();
}
function nextCCRound() {
  if(ccRound >= CC_ROUNDS.length) {
    setInstr('Amazing counting! 🌟', '数数高手！全部答对啦！', starsBar(5, 5));
    document.getElementById('ccNum').textContent = '';
    document.getElementById('ccStars').innerHTML = '';
    document.getElementById('ccConfirm').style.display = 'none';
    return;
  }
  ccTarget = CC_ROUNDS[ccRound].n;
  ccLit = 0;
  var numWord = CC_ROUNDS[ccRound].word;
  document.getElementById('ccNum').innerHTML = twimg(NUMBERS[ccTarget-1].code, 90);
  setInstr('Light up ' + numWord + ' stars! ⭐', '点亮 ' + ccTarget + ' 颗星星吧！', starsBar(5, ccRound));
  speak(numWord);
  buildCCStars();
  document.getElementById('ccConfirm').style.display = 'none';
}
function buildCCStars() {
  var container = document.getElementById('ccStars');
  container.innerHTML = '';
  for(var i = 0; i < 5; i++) {
    var star = document.createElement('div');
    star.className = 'cc-star';
    star.setAttribute('data-idx', i);
    star.innerHTML = '<div class="icon">' + twimg('2b50', 44) + '</div>';
    star.onclick = (function(idx, el) {
      return function(e) { toggleStar(idx, el, e); };
    })(i, star);
    container.appendChild(star);
  }
}
function toggleStar(idx, el, e) {
  if(el.classList.contains('lit')) {
    el.classList.remove('lit');
    ccLit--;
  } else {
    el.classList.add('lit');
    ccLit++;
    playPop();
  }
  document.getElementById('ccConfirm').style.display = (ccLit > 0) ? 'block' : 'none';
}
var ccBusy = false;
function checkCount() {
  if(ccBusy) return;
  if(ccLit === ccTarget) {
    ccBusy = true;
    var numWord = CC_ROUNDS[ccRound].word;
    var rect = document.getElementById('ccStars').getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    ccRound++;
    playCorrect();
    setInstr('I have ' + numWord + '! ⭐', '答对啦！' + ccTarget + ' 颗星星！', starsBar(5, ccRound));
    speak(numWord, function() {
      ccBusy = false;
      setTimeout(nextCCRound, 800);
    });
  } else {
    playWrong();
    document.getElementById('ccStars').style.animation = 'shake .4s ease';
    setTimeout(function(){ document.getElementById('ccStars').style.animation = ''; }, 500);
    var hint = ccLit > ccTarget ? '太多啦，去掉几颗！' : '不够哦，再点亮几颗！';
    setInstr('Try again!', hint, starsBar(5, ccRound));
  }
}

// === MODULE 4: LISTEN & FIND ===
function startListen() {
  listenRound = 0;
  listenOrder = shuffle([0,1,2,3,4]);
  buildListenGrid();
  showListenPrompt();
}
function buildListenGrid() {
  var grid = document.getElementById('listenGrid');
  grid.innerHTML = '';
  shuffle(NUMBERS).forEach(function(a) {
    var card = document.createElement('div');
    card.className = 'listen-card';
    card.innerHTML = '<div class="icon">' + twimg(a.code, 80) + '</div><div class="label">' + a.name + '</div>';
    card.onclick = function(e) { checkListen(this, a, e); };
    grid.appendChild(card);
  });
}
function showListenPrompt() {
  if(listenRound >= 5) {
    setInstr('All found! 🎉', '全部找到啦，耳朵真灵！', starsBar(5, 5));
    return;
  }
  var target = NUMBERS[listenOrder[listenRound]];
  setInstr('Find: ' + target.name + '! 🔍 ' + twimg(target.code, 24), '听一听，哪个是 ' + target.name + '？点它！', starsBar(5, listenRound));
  speak('Find ' + target.name);
}
var listenBusy = false;
function checkListen(card, num, e) {
  if(listenRound >= 5) { speak(num.name); return; }
  if(listenBusy) return;
  var target = NUMBERS[listenOrder[listenRound]];
  if(num.name === target.name) {
    listenBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    listenRound++;
    setInstr('Find: ' + target.name + '!', '找对啦！这是 ' + target.name + '！', starsBar(5, listenRound));
    playCorrect();
    speak(target.name, function() {
      listenBusy = false;
      buildListenGrid(); showListenPrompt();
    });
  } else {
    speak(num.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 5: NUMBER WHACK (moles hold number signs) ===
function startWhack() {
  whackRound = 0;
  whackOrder = shuffle([0,1,2,3,4]);
  moleTimers.forEach(clearTimeout);
  moleTimers = [];
  buildMoleGrid();
  nextWhackRound();
}
function buildMoleGrid() {
  var grid = document.getElementById('moleGrid');
  grid.innerHTML = '';
  for(var i = 0; i < 6; i++) {
    var hole = document.createElement('div');
    hole.className = 'mole-hole';
    hole.setAttribute('data-hole', i);
    var mole = document.createElement('div');
    mole.className = 'mole';
    mole.setAttribute('data-hole', i);
    hole.appendChild(mole);
    hole.onclick = function(e) { whackMole(this, e); };
    grid.appendChild(hole);
  }
}

// === WHACK ROUND LOGIC ===
function nextWhackRound() {
  if(whackRound >= 5) {
    setInstr('Great whacking! 🔨', '打得太好了，全部打中！', starsBar(5, 5));
    return;
  }
  var target = NUMBERS[whackOrder[whackRound]];
  setInstr('Whack ' + target.name + '! 🔨 ' + twimg(target.code, 24), '快打 ' + target.name + '！用手点它！', starsBar(5, whackRound));
  speak(target.name);

  // Clear all moles
  var moles = document.querySelectorAll('.mole');
  moles.forEach(function(m){ m.classList.remove('up'); m.innerHTML = ''; });

  // Pick random holes and numbers to show
  var holes = shuffle([0,1,2,3,4,5]);
  var count = 2 + Math.floor(Math.random() * 2); // 2-3 moles
  var picks = shuffle(NUMBERS);
  var hasTarget = false;
  var popList = [];
  for(var i = 0; i < count; i++) {
    var w = picks[i % picks.length];
    if(w.name === target.name) hasTarget = true;
    popList.push({hole: holes[i], word: w});
  }
  if(!hasTarget) { popList[0].word = target; }

  popList.forEach(function(p, idx) {
    var timer = setTimeout(function() {
      var mole = document.querySelector('.mole[data-hole="' + p.hole + '"]');
      mole.innerHTML = '<div class="mole-sign">' + p.word.name + '</div>' + twimg(p.word.code, 70);
      mole.setAttribute('data-name', p.word.name);
      mole.classList.add('up');
    }, idx * 500);
    moleTimers.push(timer);
  });
}

// === WHACK CLICK HANDLER ===
var whackBusy = false;
function whackMole(hole, e) {
  var mole = hole.querySelector('.mole');
  if(!mole.classList.contains('up') || whackBusy) return;
  var target = NUMBERS[whackOrder[whackRound]];
  var name = mole.getAttribute('data-name');
  if(name === target.name) {
    whackBusy = true;
    mole.classList.add('whacked');
    moleTimers.forEach(clearTimeout); moleTimers = [];
    var rect = hole.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    whackRound++;
    setInstr('Whack ' + target.name + '! 🔨', '打对啦！这是 ' + target.name + '！', starsBar(5, whackRound));
    playCorrect();
    speak(target.name, function() {
      whackBusy = false;
      document.querySelectorAll('.mole').forEach(function(m){
        m.classList.remove('up','whacked'); m.innerHTML = '';
      });
      nextWhackRound();
    });
  } else {
    playWrong();
    hole.style.animation = 'shake .4s ease';
    setTimeout(function(){ hole.style.animation = ''; }, 500);
  }
}

// === INIT ===
document.getElementById('topTitle').innerHTML = twimg('1f522', 20) + ' Day 6 · Numbers Review';
document.getElementById('startIcons').innerHTML = NUMBERS.map(function(a){ return twimg(a.code, 60); }).join('');
document.getElementById('completeEmoji').innerHTML = twimg('1f389', 90);
