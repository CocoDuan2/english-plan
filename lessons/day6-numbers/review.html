<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 6 - Numbers (Review)</title>
<style>
:root{--tip-accent:#43a047;--tip-bg:#e8f5e9}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#e8f5e9 0%,#f1f8e9 50%,#dcedc8 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:18px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#43a047;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:38px;background:linear-gradient(135deg,#81c784,#43a047);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(67,160,71,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
/* Module 1: food micro-review + number tap cards */
.food-quick{width:100%;max-width:500px;background:rgba(255,255,255,.8);border-radius:20px;padding:12px 10px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fq-title{font-size:24px;font-weight:900;color:#2c3e50}
.fq-row{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.fq-btn{width:100px;height:100px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.fq-btn div{font-size:18px;font-weight:800;color:#2c3e50}
.fq-btn.good{outline:4px solid #66bb6a}
.fq-btn.bad{outline:4px solid #ef5350}
.num-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px;margin-top:12px}
.num-card{width:90px;height:120px;background:linear-gradient(145deg,#a5d6a7,#81c784);border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:.3s}
.num-card.on{background:#fff}
.num-card .dots-area{opacity:0;transition:.3s}
.num-card.on .dots-area{opacity:1}
.num-card .nlabel{font-size:20px;font-weight:800;color:#fff;text-transform:lowercase;opacity:0;transition:.3s}
.num-card.on .nlabel{opacity:1;color:#2c3e50}
/* Module 2: Count & Collect — tap N times */
.collect-area{width:100%;max-width:500px}
.collect-prompt{font-size:28px;font-weight:900;color:#43a047;margin:8px 0}
.collect-zone{min-height:200px;background:rgba(255,255,255,.7);border-radius:24px;padding:16px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;cursor:pointer;box-shadow:inset 0 2px 8px rgba(0,0,0,.06)}
.collect-item{width:60px;height:60px;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.collect-counter{font-size:48px;font-weight:900;color:#43a047;margin-top:8px}
/* Module 3: Listen & pick dot pattern */
.dot-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:500px}
.dot-card{width:140px;min-height:160px;background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dot-card div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:6px}
.dot-card.good{outline:4px solid #66bb6a}
.dot-card.bad{outline:4px solid #ef5350}
.dot-dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:100px}
.dot-dots span{display:block;width:20px;height:20px;border-radius:50%;background:#43a047}
/* Module 4: Number path — tap 1-5 in order */
.path-area{width:100%;max-width:500px}
.path-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.path-step{width:90px;height:90px;border:none;border-radius:50%;font-size:36px;font-weight:900;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;transition:.3s}
.path-step.waiting{background:linear-gradient(145deg,#e0e0e0,#bdbdbd);color:#fff}
.path-step.active{background:linear-gradient(145deg,#FFD600,#FFC107);color:#fff;animation:pulse .6s infinite alternate}
.path-step.done{background:linear-gradient(145deg,#66bb6a,#43a047);color:#fff}
.path-step.bad{background:#ef5350;color:#fff}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.path-label{font-size:22px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:4px;opacity:0;transition:.3s}
.path-step.done+.path-label{opacity:1}
.path-wrap{display:flex;flex-direction:column;align-items:center}
/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#81c784;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.main{max-width:800px}.dot-card{width:170px}.collect-zone{min-height:240px}}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Treasure Hunt Game</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>
<script>
var PP='../../assets/peppa/';
var nums=[
  {w:'one',n:1,svg:'<polygon points="80,18 95,62 142,62 104,92 118,138 80,110 42,138 56,92 18,62 65,62" fill="#FFD600"/>'},
  {w:'two',n:2,svg:'<path d="M80 130 C30 100 10 60 80 28 C150 60 130 100 80 130Z" fill="#e91e63"/>'},
  {w:'three',n:3,svg:'<circle cx="80" cy="70" r="28" fill="#FF9800"/><ellipse cx="68" cy="108" rx="18" ry="12" fill="#FF9800"/><ellipse cx="92" cy="108" rx="18" ry="12" fill="#FF9800"/>'},
  {w:'four',n:4,svg:'<path d="M50 90 Q80 30 110 90" fill="#42a5f5"/><path d="M60 90 Q80 40 100 90" fill="#64b5f6"/>'},
  {w:'five',n:5,svg:'<circle cx="50" cy="44" r="34" fill="#ab47bc"/><rect x="48" y="76" width="4" height="40" rx="2" fill="#8d6e63"/>'}
];
var foodItems=[
  {w:'apple',svg:'<circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/>'},
  {w:'banana',svg:'<ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/><rect x="72" y="38" width="6" height="24" rx="3" fill="#8d6e63"/>'},
  {w:'egg',svg:'<ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/>'}
];
function nsvg(i,s){return '<svg width="'+(s||80)+'" height="'+(s||80)+'" viewBox="0 0 160 160">'+nums[i].svg+'</svg>'}
function fsvg(i,s){return '<svg width="'+(s||60)+'" height="'+(s||60)+'" viewBox="0 0 160 160">'+foodItems[i].svg+'</svg>'}
// For balloon (five) use different viewBox
function nsvg5(i,s){
  if(i===4) return '<svg width="'+(s||80)+'" height="'+((s||80)*1.4)+'" viewBox="0 0 100 140">'+nums[i].svg+'</svg>';
  return nsvg(i,s);
}

var ac=null;
function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function tone(f,d){var c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.16)},200)}
function playNo(){tone(300,.3)}
function speak(t,cb){
  var u=t.indexOf(' ')>=0
    ?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web'
    :'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u),done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  a.onended=fin;a.onerror=fin;setTimeout(fin,4200);a.play().catch(fin);
}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'★':'☆';return s}
function setHead(en,zh,s){document.getElementById('en').textContent=en;document.getElementById('zh').textContent=zh;document.getElementById('st').textContent=s||''}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var cur=0,mods=['m0','m1','m2','m3','m4','m5'];

/* Module 0: Start page */
function init0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'george-superhero-costume.png" width="140" alt="George">'+
    '<div class="pr"><div class="bbl">Let\'s find treasures!</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:360px">'+
      nsvg(0,56)+nsvg5(1,56)+nsvg(2,56)+nsvg(3,56)+nsvg5(4,56)+
    '</div>'+
    '<button class="start-btn" onclick="audio();go(1)">Start!</button>';
  setHead('Treasure Hunt Game','点一点，开始寻宝游戏！','');
}

/* Module 1: Food micro-review + number tap-to-reveal cards */
var fqOrder=[],fqIdx=0,fqScore=0,fqBusy=false,numRevealed={};
function init1(){
  fqOrder=shuffle([0,1,2]);fqIdx=0;fqScore=0;fqBusy=false;numRevealed={};
  document.getElementById('m1').innerHTML=
    '<div class="food-quick">'+
      '<div class="fq-title">Yesterday Quick Review</div>'+
      '<div style="font-size:20px;font-weight:800;color:#e67e22;margin-top:4px" id="fqPrompt"></div>'+
      '<div class="fq-row">'+foodItems.map(function(f,i){
        return '<button class="fq-btn" id="fq'+i+'" onclick="tapFq('+i+')">'+
          fsvg(i,56)+'<div>'+f.w+'</div></button>';
      }).join('')+'</div>'+
    '</div>'+
    '<div class="pr"><img src="'+PP+'peppa-pig-happy-standing.png" alt="Peppa"><div class="bbl" id="numBbl">Tap to count!</div></div>'+
    '<div class="num-cards" id="numCards">'+nums.map(function(n,i){
      var dots='';for(var d=0;d<n.n;d++)dots+='<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#43a047;margin:2px"></span>';
      return '<div class="num-card" id="nc'+i+'" onclick="tapNum('+i+')">'+
        '<div class="dots-area">'+dots+'</div>'+
        '<div class="nlabel">'+n.w+'</div></div>';
    }).join('')+'</div>';
  askFq();
  setHead('Review + New Numbers','先复习昨天，再点数学数！',stars(0,8));
}
function askFq(){
  if(fqIdx>=3){document.getElementById('fqPrompt').textContent='Now tap the number cards!';return}
  var w=foodItems[fqOrder[fqIdx]].w;
  document.getElementById('fqPrompt').textContent='I like '+w+'!';
  speak(w);
}
function tapFq(i){
  if(fqBusy||fqIdx>=3)return;fqBusy=true;
  var target=fqOrder[fqIdx],el=document.getElementById('fq'+i);
  if(i===target){
    playOk();fqScore++;fqIdx++;el.classList.add('good');
    setHead('Food review','复习答对啦！',stars(fqScore,8));
    speak('I like '+foodItems[i].w,function(){setTimeout(function(){el.classList.remove('good');fqBusy=false;askFq()},500)});
  }else{
    playNo();el.classList.add('bad');
    speak(foodItems[target].w,function(){setTimeout(function(){el.classList.remove('bad');fqBusy=false},350)});
  }
}
function tapNum(i){
  var el=document.getElementById('nc'+i);
  if(el.classList.contains('on')){speak(nums[i].w);return}
  el.classList.add('on');numRevealed[i]=true;fqScore++;playOk();
  document.getElementById('numBbl').textContent='I have '+nums[i].w+'!';
  setHead('Tap and count!','点一点，学数字！',stars(fqScore,8));
  speak('I have '+nums[i].w);
}

/* Module 2: Count & Collect — tap zone to collect N items */
var collectOrder=[],collectIdx=0,collectTaps=0,collectTarget=0,collectLock=false;
function init2(){
  collectOrder=shuffle([0,1,2,3,4]);collectIdx=0;
  document.getElementById('m2').innerHTML=
    '<div class="collect-area">'+
      '<div class="pr"><img src="'+PP+'george_pig_dinosaur.png" alt="George"><div class="bbl" id="colBbl">Tap to collect!</div></div>'+
      '<div class="collect-prompt" id="colPrompt"></div>'+
      '<div class="collect-zone" id="colZone" onclick="tapCollect()"></div>'+
      '<div class="collect-counter" id="colCount"></div>'+
    '</div>';
  setupCollectRound();
}
function setupCollectRound(){
  if(collectIdx>=5){
    setHead('Collecting done!','收集完成啦！',stars(5,5));
    document.getElementById('colBbl').textContent='All collected!';
    document.getElementById('colPrompt').textContent='';
    document.getElementById('colZone').style.display='none';
    document.getElementById('colCount').textContent='';
    return;
  }
  var ni=collectOrder[collectIdx];
  collectTarget=nums[ni].n;collectTaps=0;collectLock=false;
  document.getElementById('colZone').innerHTML='';
  document.getElementById('colZone').style.display='flex';
  document.getElementById('colPrompt').textContent='I have '+nums[ni].w+'!';
  document.getElementById('colBbl').textContent='Tap '+nums[ni].w+' times!';
  document.getElementById('colCount').textContent='0 / '+collectTarget;
  setHead('Count & Collect','点'+collectTarget+'下收集宝物！',stars(collectIdx,5));
  speak('I have '+nums[ni].w);
}
function tapCollect(){
  if(collectLock)return;
  var ni=collectOrder[collectIdx];
  collectTaps++;
  var zone=document.getElementById('colZone');
  var item=document.createElement('div');
  item.className='collect-item';
  item.innerHTML=nsvg5(ni,56);
  zone.appendChild(item);
  tone(440+collectTaps*80,.08);
  document.getElementById('colCount').textContent=collectTaps+' / '+collectTarget;
  if(collectTaps===collectTarget){
    collectLock=true;playOk();
    speak(nums[ni].w,function(){
      setTimeout(function(){collectIdx++;setupCollectRound()},600);
    });
  }else if(collectTaps>collectTarget){
    collectLock=true;playNo();
    document.getElementById('colBbl').textContent='Too many! Try again!';
    setTimeout(function(){
      collectTaps=0;zone.innerHTML='';
      document.getElementById('colCount').textContent='0 / '+collectTarget;
      collectLock=false;
    },800);
  }
}

/* Module 3: Listen & pick dot pattern */
var liOrder=[],liIdx=0,liScore=0,liLock=false;
function init3(){
  liOrder=shuffle([0,1,2,3,4]);liIdx=0;liScore=0;liLock=false;
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy"><div class="bbl" id="liBbl">Listen and find!</div></div>'+
    '<div class="dot-row" id="liRow"></div>';
  setupListenRound();
}
function makeDots(n){
  var h='<div class="dot-dots">';
  for(var i=0;i<n;i++) h+='<span></span>';
  h+='</div>';return h;
}
function setupListenRound(){
  if(liIdx>=5){
    setHead('Listening done!','听音找数完成啦！',stars(5,5));
    document.getElementById('liBbl').textContent='Perfect ears!';
    document.getElementById('liRow').innerHTML='';
    return;
  }
  var ti=liOrder[liIdx];
  var wrong=shuffle([0,1,2,3,4].filter(function(x){return x!==ti})).slice(0,2);
  var opts=shuffle([ti].concat(wrong));
  document.getElementById('liRow').innerHTML=opts.map(function(oi){
    return '<button class="dot-card" id="dc'+oi+'" onclick="tapDot('+oi+','+ti+')">'+
      makeDots(nums[oi].n)+'<div>'+nums[oi].w+'</div></button>';
  }).join('');
  document.getElementById('liBbl').textContent='Find: '+nums[ti].w+'!';
  setHead('Listen and pick','听一听，点对的数字！',stars(liScore,5));
  speak('I have '+nums[ti].w);
}
function tapDot(picked,target){
  if(liLock)return;liLock=true;
  var el=document.getElementById('dc'+picked);
  if(picked===target){
    playOk();liScore++;liIdx++;el.classList.add('good');
    setHead('Good ears!','听对啦！',stars(liScore,5));
    speak(nums[picked].w,function(){setTimeout(function(){el.classList.remove('good');liLock=false;setupListenRound()},600)});
  }else{
    playNo();el.classList.add('bad');
    speak(nums[target].w,function(){setTimeout(function(){el.classList.remove('bad');liLock=false},350)});
  }
}

/* Module 4: Number Path — tap 1-5 in order */
var pathIdx=0,pathLock=false;
function init4(){
  pathIdx=0;pathLock=false;
  var h='<div class="path-area">'+
    '<div class="pr"><img src="'+PP+'mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl" id="pathBbl">Tap one to five!</div></div>'+
    '<div class="path-row">';
  var order=shuffle([0,1,2,3,4]);
  for(var i=0;i<5;i++){
    var oi=order[i];
    h+='<div class="path-wrap"><button class="path-step waiting" id="ps'+oi+'" onclick="tapPath('+oi+')">'+(oi+1)+'</button>'+
      '<div class="path-label" id="pl'+oi+'">'+nums[oi].w+'</div></div>';
  }
  h+='</div></div>';
  document.getElementById('m4').innerHTML=h;
  highlightPath();
  setHead('Number Path','按顺序点 1 到 5！',stars(0,5));
  speak('one');
}
function highlightPath(){
  for(var i=0;i<5;i++){
    var el=document.getElementById('ps'+i);
    if(!el)continue;
    if(i<pathIdx){el.className='path-step done';document.getElementById('pl'+i).style.opacity='1'}
    else if(i===pathIdx){el.className='path-step active'}
    else{el.className='path-step waiting'}
  }
}
function tapPath(i){
  if(pathLock)return;
  if(i===pathIdx){
    pathLock=true;pathIdx++;playOk();
    highlightPath();
    setHead('Number Path','按顺序点！',stars(pathIdx,5));
    speak(nums[i].w,function(){
      setTimeout(function(){
        pathLock=false;
        if(pathIdx>=5){
          setHead('Path done!','数字路径完成啦！',stars(5,5));
          document.getElementById('pathBbl').textContent='One to five!';
          setTimeout(function(){go(1)},800);
        }else{speak(nums[pathIdx].w)}
      },400);
    });
  }else{
    pathLock=true;playNo();
    var el=document.getElementById('ps'+i);
    el.className='path-step bad';
    speak(nums[pathIdx].w,function(){
      setTimeout(function(){highlightPath();pathLock=false},400);
    });
  }
}

/* Module 5: Done page */
function init5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="198" alt="Peppa family">'+
    '<div class="bbl" style="font-size:30px;margin-top:10px">All Done!</div>'+
    '<div style="font-size:26px;font-weight:800;color:#43a047;margin-top:10px">I have one, two, three, four, five!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px" onclick="restart()">Play Again</button>';
  setHead('Great Job!','寻宝游戏完成啦！',stars(6,6));
}

/* Navigation */
function restart(){
  document.getElementById(mods[cur]).classList.remove('on');
  cur=0;document.getElementById(mods[cur]).classList.add('on');
  init0();
  document.getElementById('pg').textContent='1/6';
  document.getElementById('pb').disabled=true;
  var xb=document.getElementById('xb');xb.textContent='Next \u25B6';xb.disabled=false;
}

var inits=[init0,init1,init2,init3,init4,init5];
function go(d){
  var n=cur+d;if(n<0||n>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=n;
  document.getElementById(mods[cur]).classList.add('on');
  inits[cur]();
  document.getElementById('pg').textContent=(cur+1)+'/6';
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===mods.length-1){xb.textContent='Done';xb.disabled=true}
  else{xb.textContent='Next \u25B6';xb.disabled=false}
}

init0();
</script>
</body>
</html>
