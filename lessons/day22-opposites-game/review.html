<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 22 Review - Opposites Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fff3e0,#ffe0b2);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff9800,#ffb74d);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,152,0,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,152,0,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.card{width:140px;height:140px;background:#ddd;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s;margin:8px}
.card.on{background:#fff}
.card:active{transform:scale(.95)}
.card svg{width:90px;height:90px;opacity:0;transition:opacity .3s}
.card.on svg{opacity:1}
.card .lbl{font-size:20px;font-weight:700;color:#2c3e50;margin-top:6px;opacity:0;transition:opacity .3s}
.card.on .lbl{opacity:1}
.cards{display:flex;flex-wrap:wrap;justify-content:center;max-width:600px}
.pair-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin:20px 0;max-width:500px}
.pair-item{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;padding:20px;background:#fff;border-radius:20px;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s}
.pair-item:active{transform:scale(.95)}
.pair-item svg{width:100px;height:100px}
.pair-item .lbl{font-size:28px;font-weight:700;color:#2c3e50}
.vs{font-size:40px;font-weight:900;color:#e67e22}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0;max-width:500px}
.listen-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:16px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s}
.listen-item:active{transform:scale(.95)}
.listen-item svg{width:80px;height:80px}
.listen-item .lbl{font-size:22px;font-weight:700;color:#2c3e50}
.sound-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#ff9800,#ffb74d);color:#fff;font-size:36px;box-shadow:0 4px 12px rgba(255,152,0,.4);margin:16px 0;display:flex;align-items:center;justify-content:center}
.sound-btn:active{transform:scale(.9)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;max-width:560px}
.mem-card{width:100%;aspect-ratio:1;background:#fff;border-radius:12px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:44px;transition:transform .3s;position:relative}
.mem-card.flip{transform:rotateY(180deg)}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-card:active{transform:scale(.95)}
.mem-card .back{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden}
.mem-card .front{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;transform:rotateY(180deg)}
.mem-card .front svg{width:70px;height:70px}
.mem-card .front .lbl{font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px}
@media(max-width:480px){.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}.pr img{width:65px}.sb{font-size:22px}.card{width:120px;height:120px}.card svg{width:80px;height:80px}.card .lbl{font-size:18px}.pair-item svg{width:90px;height:90px}.pair-item .lbl{font-size:24px}.vs{font-size:32px}.listen-grid{grid-template-columns:repeat(2,1fr)}.listen-item svg{width:70px;height:70px}.listen-item .lbl{font-size:20px}.mem-grid{grid-template-columns:repeat(3,1fr);max-width:440px}.mem-card{font-size:36px}.mem-card .front svg{width:60px;height:60px}.mem-card .front .lbl{font-size:16px}}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:20px 0" alt="Peppa">
<div class="te">Opposites Game</div>
<div style="display:flex;gap:20px;margin:20px 0">
<svg width="60" height="60" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="#ff6b6b"/><text x="80" y="110" font-size="80" text-anchor="middle" fill="#fff">🔥</text></svg>
<svg width="60" height="60" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="#4ecdc4"/><text x="80" y="110" font-size="80" text-anchor="middle" fill="#fff">❄️</text></svg>
<svg width="60" height="60" viewBox="0 0 160 160"><path d="M80 20 L80 140 M60 40 L80 20 L100 40" stroke="#2c3e50" stroke-width="10" fill="none"/></svg>
<svg width="60" height="60" viewBox="0 0 160 160"><path d="M80 140 L80 20 M60 120 L80 140 L100 120" stroke="#2c3e50" stroke-width="10" fill="none"/></svg>
<svg width="60" height="60" viewBox="0 0 160 160"><path d="M30 80 L130 80 M110 60 L130 80 L110 100" stroke="#2c3e50" stroke-width="10" fill="none"/></svg>
</div>
<button class="nb" style="font-size:28px;padding:18px 40px;margin-top:10px" onclick="getAC();goM(1)">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">👆 点一点，学单词！</div>
<div class="sb" id="st1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="cards" id="cards1"></div>
</div>

<!-- M2: Opposite Pairs -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Find Opposites</div>
<div class="tz">🔄 点一点，找相反！</div>
<div class="sb" id="st2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find the opposite!</div>
</div>
<div id="game2"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="st3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">Listen and find!</div>
</div>
<button class="sound-btn" id="playBtn3">🔊</button>
<div class="listen-grid" id="grid3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，配一配！</div>
<div class="sb" id="st4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">Match the pairs!</div>
</div>
<div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;margin:20px 0" alt="Family">
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb" style="font-size:28px;color:#e67e22">⭐⭐⭐⭐⭐</div>
<div style="font-size:22px;color:#666;margin:20px 0">Great job learning opposites!</div>
<button class="nb" style="font-size:24px;padding:16px 36px;margin-top:10px" onclick="location.reload()">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'hot',svg:'<svg width="90" height="90" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="#ff6b6b"/><text x="80" y="110" font-size="80" text-anchor="middle" fill="#fff">🔥</text></svg>'},
{w:'cold',svg:'<svg width="90" height="90" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="#4ecdc4"/><text x="80" y="110" font-size="80" text-anchor="middle" fill="#fff">❄️</text></svg>'},
{w:'up',svg:'<svg width="90" height="90" viewBox="0 0 160 160"><path d="M80 20 L80 140 M60 40 L80 20 L100 40" stroke="#2c3e50" stroke-width="10" fill="none"/></svg>'},
{w:'down',svg:'<svg width="90" height="90" viewBox="0 0 160 160"><path d="M80 140 L80 20 M60 120 L80 140 L100 120" stroke="#2c3e50" stroke-width="10" fill="none"/></svg>'},
{w:'fast',svg:'<svg width="90" height="90" viewBox="0 0 160 160"><path d="M30 80 L130 80 M110 60 L130 80 L110 100" stroke="#2c3e50" stroke-width="10" fill="none"/></svg>'}
];
var curM=0,busy=false;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn
var m1done=0;
function initM1(){
if(document.getElementById('cards1').children.length>0)return;
W.forEach(function(item){
var c=document.createElement('div');
c.className='card';
c.innerHTML=item.svg+'<div class="lbl">'+item.w+'</div>';
c.onclick=function(){
if(!c.classList.contains('on')){
c.classList.add('on');
speak(item.w);
m1done++;
document.getElementById('st1').innerHTML=stars(m1done,5);
if(m1done===5){
setTimeout(function(){
var img=document.querySelector('#m1 .pr img');
img.classList.add('peppa-jumping');
setTimeout(function(){img.classList.remove('peppa-jumping')},600);
},300);
}
}else{
speak(item.w);
}
};
document.getElementById('cards1').appendChild(c);
});
}

// M2: Opposite Pairs
var m2done=0;
var pairs=[['hot','cold'],['up','down']];
var curPair=0;
function initM2(){
if(document.getElementById('game2').children.length>0)return;
showPair();
}
function showPair(){
if(curPair>=pairs.length){
setTimeout(function(){goM(1)},800);
return;
}
var p=pairs[curPair];
var w1=W.find(function(x){return x.w===p[0]});
var w2=W.find(function(x){return x.w===p[1]});
var html='<div class="pair-grid">';
html+='<div class="pair-item" onclick="checkOpp(\''+p[0]+'\')">'+w1.svg+'<div class="lbl">'+p[0]+'</div></div>';
html+='<div class="vs">VS</div>';
html+='<div class="pair-item" onclick="checkOpp(\''+p[1]+'\')">'+w2.svg+'<div class="lbl">'+p[1]+'</div></div>';
html+='</div>';
document.getElementById('game2').innerHTML=html;
}
function checkOpp(w){
if(busy)return;
busy=true;
speak(w);
playOk();
m2done++;
document.getElementById('st2').innerHTML=stars(m2done,5);
setTimeout(function(){
curPair++;
showPair();
busy=false;
},1200);
}

// M3: Listen & Find
var m3list=[];
var m3cur=0;
function initM3(){
if(document.getElementById('grid3').children.length>0)return;
m3list=W.slice().sort(function(){return Math.random()-.5});
W.forEach(function(item){
var d=document.createElement('div');
d.className='listen-item';
d.innerHTML=item.svg+'<div class="lbl">'+item.w+'</div>';
d.onclick=function(){checkListen(item.w)};
document.getElementById('grid3').appendChild(d);
});
document.getElementById('playBtn3').onclick=function(){speak(m3list[m3cur].w)};
speak(m3list[m3cur].w);
}
function checkListen(w){
if(busy)return;
if(w===m3list[m3cur].w){
busy=true;
playOk();
speak(w);
m3cur++;
document.getElementById('st3').innerHTML=stars(m3cur,5);
setTimeout(function(){
if(m3cur<5){
speak(m3list[m3cur].w);
busy=false;
}else{
setTimeout(function(){goM(1)},800);
}
},1200);
}else{
playNo();
}
}

// M4: Memory Match
var m4cards=[];
var m4flip=[];
var m4match=0;
function initM4(){
if(document.getElementById('memGrid').children.length>0)return;
var pairs=W.slice(0,5);
m4cards=pairs.concat(pairs).sort(function(){return Math.random()-.5});
m4cards.forEach(function(item,i){
var c=document.createElement('div');
c.className='mem-card';
c.innerHTML='<div class="back">🎴</div><div class="front">'+item.svg+'<div class="lbl">'+item.w+'</div></div>';
c.onclick=function(){flipCard(i)};
document.getElementById('memGrid').appendChild(c);
});
}
function flipCard(i){
if(busy||m4flip.length>=2||m4flip.includes(i))return;
var cards=document.querySelectorAll('.mem-card');
cards[i].classList.add('flip');
m4flip.push(i);
speak(m4cards[i].w);
if(m4flip.length===2){
busy=true;
setTimeout(function(){
if(m4cards[m4flip[0]].w===m4cards[m4flip[1]].w){
playOk();
cards[m4flip[0]].classList.add('matched');
cards[m4flip[1]].classList.add('matched');
m4match++;
document.getElementById('st4').innerHTML=stars(m4match,5);
if(m4match===5){
setTimeout(function(){goM(1)},1200);
}
}else{
playNo();
cards[m4flip[0]].classList.remove('flip');
cards[m4flip[1]].classList.remove('flip');
}
m4flip=[];
busy=false;
},1000);
}
}

function initM5(){}

goM(0);
</script>
</body>
</html>
