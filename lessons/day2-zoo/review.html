<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 2 Review - Visit the Zoo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#c8e6c9,#a5d6a7);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px 20px 80px}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#27ae60;margin:8px 0;text-shadow:0 2px 4px rgba(39,174,96,.2)}
.tz{
  font-size:20px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,#66bb6a,#81c784);
  border-radius:25px;
  padding:12px 24px;
  display:inline-block;
  box-shadow:0 6px 20px rgba(102,187,106,.35);
  margin:8px 0;
  letter-spacing:.5px;
  position:relative;
}
.tz::after{
  content:'';
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  height:4px;
  background:rgba(102,187,106,.2);
  border-radius:2px;
  filter:blur(3px);
}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#27ae60;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #66bb6a;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#66bb6a;color:#fff;box-shadow:0 4px 12px rgba(102,187,106,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.card{width:130px;height:160px;border-radius:16px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .2s}
.card:active{transform:scale(.95)}
.card.revealed{background:linear-gradient(135deg,#a8e6cf,#88d8b0)}
.card img{width:90px;height:90px}
.card .label{font-size:20px;font-weight:700;color:#2c3e50}
.cards-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;max-width:700px}
.match-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px}
.match-item{width:140px;height:140px;border-radius:16px;border:3px solid transparent;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.match-item:active{transform:scale(.95)}
.match-item.selected{border-color:#66bb6a;background:#e8f5e9}
.match-item img{width:100px;height:100px}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:550px}
.listen-item{width:120px;height:140px;border-radius:16px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .2s}
.listen-item:active{transform:scale(.95)}
.listen-item img{width:80px;height:80px}
.listen-item .label{font-size:18px;font-weight:700;color:#2c3e50}
.replay-btn{width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,#66bb6a,#81c784);color:#fff;font-size:32px;cursor:pointer;box-shadow:0 4px 12px rgba(102,187,106,.4);margin:10px 0;display:flex;align-items:center;justify-content:center}
.replay-btn:active{transform:scale(.9)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px 0}
.mem-card{width:120px;height:140px;border-radius:12px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.mem-front{background:linear-gradient(135deg,#66bb6a,#81c784);color:#fff;font-size:44px}
.mem-back{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12);transform:rotateY(180deg)}
.mem-back img{width:70px;height:70px}
.mem-back .label{font-size:18px;font-weight:700;color:#2c3e50}
@media(max-width:480px){
  .te{font-size:26px}
  .tz{font-size:18px;padding:10px 20px}
  .bbl{font-size:20px}
  .pr img{width:65px}
  .sb{font-size:22px}
  .card{width:110px;height:140px}
  .card img{width:75px;height:75px}
  .card .label{font-size:18px}
  .match-grid{gap:15px}
  .match-item{width:120px;height:120px}
  .match-item img{width:85px;height:85px}
  .listen-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .listen-item{width:110px;height:130px}
  .listen-item img{width:70px;height:70px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:10px;max-width:440px}
  .mem-card{width:95px;height:115px}
  .mem-back img{width:60px;height:60px}
  .mem-back .label{font-size:16px}
}
</style>
</head>
<body>
<div id="m0" class="mod on"></div>
<div id="m1" class="mod"></div>
<div id="m2" class="mod"></div>
<div id="m3" class="mod"></div>
<div id="m4" class="mod"></div>
<div id="m5" class="mod"></div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var W=[
  {w:'cat',svg:'<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f431.svg" width="90" alt="cat">'},
  {w:'dog',svg:'<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="90" alt="dog">'},
  {w:'fish',svg:'<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41f.svg" width="90" alt="fish">'},
  {w:'bird',svg:'<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f426.svg" width="90" alt="bird">'},
  {w:'duck',svg:'<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f986.svg" width="90" alt="duck">'}
];
var curM=0,busy=false;

function speak(t){
  var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
  var a=new Audio(primary);
  a.play().catch(function(){var b=new Audio(fallback);b.play().catch(function(){})})
}

function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}

function showConfetti(){
  var w=document.createElement("div");w.className="confetti-wrap";
  var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
  for(var i=0;i<20;i++){
    var p=document.createElement("div");p.className="confetti-piece";
    p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";
    p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";
    p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)
  }
  document.body.appendChild(w);setTimeout(function(){w.remove()},1600)
}

function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}

function goM(d){
  curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
  document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
  document.getElementById('m'+curM).classList.add('on');
  document.getElementById('pg').textContent=(curM+1)+'/6';
  document.getElementById('pBtn').disabled=curM===0;
  var nb=document.getElementById('nBtn');
  if(curM===0){nb.textContent='Start!';nb.disabled=false}
  else if(curM>=5){nb.textContent='Done';nb.disabled=true}
  else{nb.textContent='Next ▶';nb.disabled=false}
  if(curM===1)initM1();
  if(curM===2)initM2();
  if(curM===3)initM3();
  if(curM===4)initM4();
  if(curM===5)initM5();
}

document.getElementById('m0').innerHTML='<img src="'+PP+'peppa-family-group-outdoors.png" width="140"><div style="font-size:28px;font-weight:900;color:#27ae60;margin:10px 0">Let\'s Play!</div><div style="display:flex;gap:15px;margin:15px 0"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f431.svg" width="60"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="60"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41f.svg" width="60"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f426.svg" width="60"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f986.svg" width="60"></div>';

function initM1(){
  var h='<div class="top"><div class="te">Learn New Words</div><div class="tz">👆 点一点，学单词</div><div class="sb">'+stars(0,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'candy-cat-green-dress.png"><div class="bbl">Tap to learn!</div></div>';
  h+='<div class="cards-wrap" id="cw"></div>';
  document.getElementById('m1').innerHTML=h;
  var cw=document.getElementById('cw');
  var revealed=0;
  W.forEach(function(item){
    var c=document.createElement('div');
    c.className='card';
    c.innerHTML='<div style="font-size:48px;color:#bbb">?</div>';
    c.onclick=function(){
      if(c.classList.contains('revealed'))return speak(item.w);
      c.classList.add('revealed');
      c.innerHTML=item.svg+'<div class="label">'+item.w+'</div>';
      speak(item.w);
      revealed++;
      document.querySelector('#m1 .sb').innerHTML=stars(revealed,5);
      if(revealed===5)setTimeout(function(){if(curM===1)goM(1)},1200)
    };
    cw.appendChild(c)
  })
}

function initM2(){
  var h='<div class="top"><div class="te">Match Animals</div><div class="tz">🐾 连线配对动物</div><div class="sb">'+stars(0,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'george-standing.png"><div class="bbl">Find the same!</div></div>';
  h+='<div style="display:flex;gap:30px;align-items:center"><div class="match-grid" id="left"></div><div class="match-grid" id="right"></div></div>';
  document.getElementById('m2').innerHTML=h;
  
  var shuffled=[...W].sort(function(){return Math.random()-.5});
  var left=document.getElementById('left');
  var right=document.getElementById('right');
  var selected=null;
  var matched=0;
  
  W.forEach(function(item,i){
    var l=document.createElement('div');
    l.className='match-item';
    l.innerHTML=item.svg;
    l.dataset.word=item.w;
    l.onclick=function(){
      if(busy||l.classList.contains('matched'))return;
      if(selected&&selected.side==='left')return;
      document.querySelectorAll('#left .match-item').forEach(function(x){x.classList.remove('selected')});
      l.classList.add('selected');
      selected={el:l,word:item.w,side:'left'};
      speak(item.w)
    };
    left.appendChild(l)
  });
  
  shuffled.forEach(function(item){
    var r=document.createElement('div');
    r.className='match-item';
    r.innerHTML=item.svg;
    r.dataset.word=item.w;
    r.onclick=function(){
      if(busy||r.classList.contains('matched'))return;
      if(!selected||selected.side==='right')return;
      busy=true;
      if(selected.word===item.w){
        playOk();
        selected.el.classList.add('matched');
        r.classList.add('matched');
        matched++;
        document.querySelector('#m2 .sb').innerHTML=stars(matched,5);
        setTimeout(function(){
          busy=false;
          selected=null;
          if(matched===5)setTimeout(function(){if(curM===2)goM(1)},800)
        },1200)
      }else{
        playNo();
        setTimeout(function(){
          selected.el.classList.remove('selected');
          busy=false;
          selected=null
        },800)
      }
    };
    right.appendChild(r)
  })
}

function initM3(){
  var h='<div class="top"><div class="te">Listen & Find</div><div class="tz">👂 听一听，找动物</div><div class="sb">'+stars(0,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'daddy-pig-standing.png"><div class="bbl">Listen carefully!</div></div>';
  h+='<button class="replay-btn" id="replay">🔊</button>';
  h+='<div class="listen-grid" id="lg"></div>';
  document.getElementById('m3').innerHTML=h;
  
  var queue=[...W].sort(function(){return Math.random()-.5});
  var current=0;
  var lg=document.getElementById('lg');
  
  function playQ(){
    if(current>=queue.length){
      setTimeout(function(){if(curM===3)goM(1)},1000);
      return
    }
    speak(queue[current].w)
  }
  
  document.getElementById('replay').onclick=function(){if(!busy)playQ()};
  
  W.forEach(function(item){
    var c=document.createElement('div');
    c.className='listen-item';
    c.innerHTML=item.svg+'<div class="label">'+item.w+'</div>';
    c.onclick=function(){
      if(busy)return;
      busy=true;
      if(item.w===queue[current].w){
        playOk();
        c.classList.add('peppa-jumping');
        current++;
        document.querySelector('#m3 .sb').innerHTML=stars(current,5);
        setTimeout(function(){
          c.classList.remove('peppa-jumping');
          busy=false;
          playQ()
        },1200)
      }else{
        playNo();
        setTimeout(function(){busy=false},800)
      }
    };
    lg.appendChild(c)
  });
  
  setTimeout(playQ,500)
}

function initM4(){
  var h='<div class="top"><div class="te">Memory Match</div><div class="tz">🎴 记忆翻牌配对</div><div class="sb">'+stars(0,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'mummy-pig-standing-grass.png"><div class="bbl">Find pairs!</div></div>';
  h+='<div class="mem-grid" id="mg"></div>';
  document.getElementById('m4').innerHTML=h;
  
  var pairs=[...W,...W].sort(function(){return Math.random()-.5});
  var flipped=[];
  var matched=0;
  var mg=document.getElementById('mg');
  
  pairs.forEach(function(item,i){
    var c=document.createElement('div');
    c.className='mem-card';
    c.innerHTML='<div class="mem-face mem-front">🦁</div><div class="mem-face mem-back">'+item.svg+'<div class="label">'+item.w+'</div></div>';
    c.dataset.word=item.w;
    c.dataset.id=i;
    c.onclick=function(){
      if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
      c.classList.add('flipped');
      flipped.push(c);
      speak(item.w);
      if(flipped.length===2){
        busy=true;
        setTimeout(function(){
          if(flipped[0].dataset.word===flipped[1].dataset.word){
            playOk();
            flipped[0].classList.add('matched');
            flipped[1].classList.add('matched');
            matched++;
            document.querySelector('#m4 .sb').innerHTML=stars(matched,5);
            flipped=[];
            busy=false;
            if(matched===5)setTimeout(function(){if(curM===4)goM(1)},1000)
          }else{
            playNo();
            setTimeout(function(){
              flipped[0].classList.remove('flipped');
              flipped[1].classList.remove('flipped');
              flipped=[];
              busy=false
            },1000)
          }
        },600)
      }
    };
    mg.appendChild(c)
  })
}

function initM5(){
  document.getElementById('m5').innerHTML='<img src="'+PP+'peppa-family-group-outdoors.png" width="120"><div style="font-size:42px;font-weight:900;color:#27ae60;margin:10px 0">All Done!</div><div style="font-size:24px;color:#666;margin:6px 0">Great job at the zoo!</div><div style="font-size:28px;margin:10px 0">'+stars(5,5)+'</div><button onclick="location.reload()" style="margin-top:16px;padding:14px 32px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#66bb6a;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(102,187,106,.4)">Play Again 🔄</button>';
}

goM(0);
</script>
</body>
</html>
