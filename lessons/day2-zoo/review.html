<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 2 Review - Zoo Animals</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.m{display:none;flex-direction:column;flex:1;padding:20px 24px 70px}
.m.on{display:flex}
.bg-zoo{background:linear-gradient(180deg,#A8E6CF,#FFD3B6)}
.bg-green{background:linear-gradient(160deg,#c8e6c9,#a5d6a7)}
.bg-blue{background:linear-gradient(160deg,#b3e5fc,#81d4fa)}
.bg-purple{background:linear-gradient(160deg,#e1bee7,#ce93d8)}
.bg-party{background:linear-gradient(160deg,#fff9c4,#ffecb3)}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ttl{font-size:26px;font-weight:800;color:#e91e8c}
.tz{font-size:20px;font-weight:800;color:#fff;background:linear-gradient(135deg,#66bb6a,#81c784);padding:8px 16px;border-radius:25px;box-shadow:0 3px 12px rgba(102,187,106,.3);position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:60%;height:4px;background:rgba(255,255,255,.4);border-radius:2px}
.st{display:flex;gap:4px;font-size:22px}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:10px 18px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}
.cd{background:#ddd;border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.cd.rv{background:#fff}
.cd.rv img{width:90px;height:90px}
.cd.rv .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.feed-zone{display:flex;flex-direction:column;gap:16px;margin:14px 0}
.animal-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.7);border-radius:16px;padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.animal-icon{width:70px;height:70px}
.food-options{display:flex;gap:10px}
.food-btn{width:60px;height:60px;border:none;border-radius:12px;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s;display:flex;align-items:center;justify-content:center}
.food-btn:active{transform:scale(.9)}
.food-btn img{width:45px;height:45px}
.food-btn.fed{opacity:.3;pointer-events:none}
.lg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}
.lc{background:#fff;border-radius:16px;padding:14px;text-align:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:transform .2s}
.lc:active{transform:scale(.95)}
.lc img{width:90px;height:90px}
.lc .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;width:100%;max-width:440px;align-self:center}
.mc{aspect-ratio:1;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:44px;transition:transform .3s;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.mc.bk{background:linear-gradient(135deg,#ff6b9d,#ffa07a)}
.mc.op{background:#fff;pointer-events:none}
.mc.mt{background:#a5d6a7;pointer-events:none}
.mc img{width:70px;height:70px}
.mc .lb{font-size:18px;font-weight:900;color:#2c3e50;margin-top:4px}
.mc:active{transform:scale(.95)}
.done-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center}
.done-wrap img{width:110px;margin-bottom:12px}
.done-ttl{font-size:48px;font-weight:900;color:#e91e8c;margin:8px 0}
.done-msg{font-size:22px;color:#7f8c8d;margin:6px 0}
.btn-again{margin-top:16px;padding:14px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,#ff6b9d,#ffa07a);color:#fff;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(255,107,157,.3)}
.btn-again:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#66bb6a;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.confetti{position:fixed;width:12px;height:12px;border-radius:50%;pointer-events:none;z-index:999}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}
@media(max-width:480px){
  .cg{grid-template-columns:repeat(2,1fr)}
  .cd.rv img{width:70px;height:70px}
  .cd.rv .lb{font-size:18px}
  .animal-icon{width:60px;height:60px}
  .food-btn{width:50px;height:50px}
  .food-btn img{width:38px;height:38px}
  .lg{grid-template-columns:repeat(2,1fr)}
  .lc img{width:70px;height:70px}
  .lc .lb{font-size:18px}
  .mg{grid-template-columns:repeat(3,1fr);max-width:340px}
  .mc{font-size:36px}
  .mc img{width:60px;height:60px}
  .mc .lb{font-size:16px}
  .done-ttl{font-size:36px}
}
@media(min-width:481px) and (max-width:767px){
  .mg{max-width:500px}
}
@media(min-width:768px){
  .mg{max-width:560px}
  .mc img{width:80px;height:80px}
  .mc .lb{font-size:20px}
}
</style>
</head>
<body>
<div class="deck">
<!-- M0: Start -->
<div class="m bg-zoo on">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" width="110" style="margin-bottom:12px">
<div style="font-size:38px;font-weight:900;color:#2c3e50;margin:8px 0">Zoo Animals!</div>
<div style="display:flex;gap:14px;margin:12px 0;flex-wrap:wrap;justify-content:center">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f431.svg" width="60" alt="cat">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="60" alt="dog">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41f.svg" width="60" alt="fish">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f426.svg" width="60" alt="bird">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f986.svg" width="60" alt="duck">
</div>
<button class="btn-again" onclick="unlock()">Let's Play!</button>
</div>
</div>

<!-- M1: Learn Words -->
<div class="m bg-green">
<div class="hd">
<div class="ttl">Learn Words</div>
<div class="tz">👆 点一点，学单词</div>
<div class="st" id="s1"></div>
</div>
<div class="pr"><img src="../../assets/peppa/candy-cat-green-dress.png"><div class="bbl">Tap to see!</div></div>
<div class="cg" id="cg1"></div>
</div>

<!-- M2: Feed Animals -->
<div class="m bg-zoo">
<div class="hd">
<div class="ttl">Feed the Animals</div>
<div class="tz">🍖 给动物喂食物</div>
<div class="st" id="s2"></div>
</div>
<div class="pr"><img src="../../assets/peppa/george-standing.png"><div class="bbl">Feed them!</div></div>
<div class="feed-zone" id="feedZone"></div>
</div>

<!-- M3: Listen & Find -->
<div class="m bg-blue">
<div class="hd">
<div class="ttl">Listen & Find</div>
<div class="tz">👂 听一听，找一找</div>
<div class="st" id="s3"></div>
</div>
<div class="pr"><img src="../../assets/peppa/emily-elephant-standing.png"><div class="bbl">Find it!</div></div>
<div style="text-align:center;margin:10px 0">
<button style="width:70px;height:70px;border-radius:50%;border:none;background:linear-gradient(135deg,#66bb6a,#81c784);color:#fff;font-size:32px;cursor:pointer;box-shadow:0 3px 12px rgba(102,187,106,.3)" onclick="playQ3()">🔊</button>
</div>
<div class="lg" id="lg3"></div>
</div>

<!-- M4: Memory Flip -->
<div class="m bg-purple">
<div class="hd">
<div class="ttl">Memory Flip</div>
<div class="tz">🎴 翻一翻，配一配</div>
<div class="st" id="s4"></div>
</div>
<div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png"><div class="bbl">Match them!</div></div>
<div class="mg" id="mg4"></div>
</div>

<!-- M5: Done -->
<div class="m bg-party">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png">
<div class="done-ttl">All Done!</div>
<div class="done-msg">You learned 5 animals today!</div>
<div class="st" style="font-size:28px;margin:10px 0">⭐⭐⭐⭐⭐</div>
<button class="btn-again" onclick="goM(0)">Play Again</button>
</div>
</div>
</div>

<div class="nav">
<button class="nb" id="pb" onclick="goM(cm-1)">&#9664; Back</button>
<div><div class="np" id="pg">1/6</div></div>
<button class="nb" id="xb" onclick="goM(cm+1)">Next &#9654;</button>
</div>

<script>
var words=['cat','dog','fish','bird','duck'];
var cm=0,tm=6,busy=false,actx;
var m1rv=[0,0,0,0,0],m1i=0;
var m2fed=[0,0,0,0,0],m2i=0;
var m3q=0,m3i=0;
var m4op=[],m4p1=-1,m4p2=-1,m4mt=0;
var foodMap={cat:0,dog:1,fish:2,bird:3,duck:4};
var foodEmojis=['🥩','🦴','🐟','🌾','🌽'];

function speak(txt,cb){
  if(busy)return;
  var isSent=txt.indexOf(' ')>-1;
  var primary=isSent?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web':'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
  var fallback=isSent?'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2':'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
  var a=new Audio(primary);
  var timer=setTimeout(function(){if(cb)cb()},4000);
  a.onended=function(){clearTimeout(timer);if(cb)cb()};
  a.onerror=function(){clearTimeout(timer);var b=new Audio(fallback);b.play().catch(function(){});setTimeout(function(){if(cb)cb()},4000)};
  a.play().catch(function(){var b=new Audio(fallback);b.play().catch(function(){});setTimeout(function(){if(cb)cb()},4000)})
}

function playOk(){
  if(!actx)return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.frequency.setValueAtTime(523,actx.currentTime);
  o.frequency.setValueAtTime(659,actx.currentTime+.1);
  o.frequency.setValueAtTime(784,actx.currentTime+.2);
  g.gain.setValueAtTime(.3,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.4);
  o.start();o.stop(actx.currentTime+.4);
  showConfetti()
}

function playNo(){
  if(!actx)return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.frequency.setValueAtTime(300,actx.currentTime);
  o.frequency.setValueAtTime(200,actx.currentTime+.15);
  g.gain.setValueAtTime(.2,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.3);
  o.start();o.stop(actx.currentTime+.3)
}

function showConfetti(){
  var colors=['#ff6b9d','#ffa07a','#ffeb3b','#66bb6a','#42a5f5','#ab47bc'];
  for(var i=0;i<20;i++){
    var c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.top='-20px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animation='fall '+(2+Math.random())+'s linear forwards';
    c.style.animationDelay=Math.random()*.3+'s';
    document.body.appendChild(c);
    setTimeout(function(el){return function(){if(el.parentNode)el.parentNode.removeChild(el)}}(c),3500)
  }
}

function unlock(){
  actx=new(window.AudioContext||window.webkitAudioContext)();
  goM(1)
}

function goM(n){
  if(n<0||n>=tm||busy)return;
  document.querySelectorAll('.m').forEach(function(m){m.classList.remove('on')});
  document.querySelectorAll('.m')[n].classList.add('on');
  cm=n;
  document.getElementById('pg').textContent=(cm+1)+'/'+tm;
  document.getElementById('pb').disabled=cm===0;
  document.getElementById('xb').disabled=cm===tm-1;
  if(cm===1)initM1();
  if(cm===2)initM2();
  if(cm===3)initM3();
  if(cm===4)initM4()
}

function updateStars(mid,got,total){
  var s='';
  for(var i=0;i<total;i++)s+=i<got?'⭐':'<span style="color:#bbb">★</span>';
  document.getElementById('s'+mid).innerHTML=s
}

function initM1(){
  var h='';
  for(var i=0;i<5;i++){
    h+='<div class="cd'+(m1rv[i]?' rv':'')+'" onclick="revealM1('+i+')">';
    if(m1rv[i]){
      h+='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmojiCode(words[i])+'.svg" alt="'+words[i]+'">';
      h+='<div class="lb">'+words[i]+'</div>'
    }
    h+='</div>'
  }
  document.getElementById('cg1').innerHTML=h;
  updateStars(1,m1i,5)
}

function revealM1(i){
  if(busy||m1rv[i])return;
  busy=true;
  m1rv[i]=1;
  m1i++;
  initM1();
  speak(words[i],function(){
    busy=false;
    if(m1i===5)setTimeout(function(){goM(2)},1200)
  })
}

function initM2(){
  var h='';
  for(var i=0;i<5;i++){
    h+='<div class="animal-row">';
    h+='<img class="animal-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmojiCode(words[i])+'.svg" alt="'+words[i]+'">';
    h+='<div class="food-options">';
    for(var j=0;j<5;j++){
      h+='<button class="food-btn'+(m2fed[i]?' fed':'')+'" onclick="feedAnimal('+i+','+j+')" style="font-size:36px">'+foodEmojis[j]+'</button>'
    }
    h+='</div></div>'
  }
  document.getElementById('feedZone').innerHTML=h;
  updateStars(2,m2i,5)
}

function feedAnimal(animal,food){
  if(busy||m2fed[animal])return;
  if(food===foodMap[words[animal]]){
    busy=true;
    m2fed[animal]=1;
    m2i++;
    playOk();
    initM2();
    speak(words[animal],function(){
      busy=false;
      if(m2i===5)setTimeout(function(){goM(3)},1200)
    })
  }else{
    playNo()
  }
}

function initM3(){
  m3q=Math.floor(Math.random()*5);
  var h='';
  for(var i=0;i<5;i++){
    h+='<div class="lc" onclick="ansM3('+i+')">';
    h+='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmojiCode(words[i])+'.svg" alt="'+words[i]+'">';
    h+='<div class="lb">'+words[i]+'</div></div>'
  }
  document.getElementById('lg3').innerHTML=h;
  updateStars(3,m3i,5);
  setTimeout(function(){speak(words[m3q])},300)
}

function playQ3(){
  if(!busy)speak(words[m3q])
}

function ansM3(i){
  if(busy)return;
  if(i===m3q){
    busy=true;
    m3i++;
    playOk();
    updateStars(3,m3i,5);
    speak(words[i],function(){
      busy=false;
      if(m3i===5){setTimeout(function(){goM(4)},1200)}else{setTimeout(initM3,800)}
    })
  }else{
    playNo()
  }
}

function initM4(){
  m4op=[];m4p1=-1;m4p2=-1;m4mt=0;
  var pairs=[];
  for(var i=0;i<5;i++){pairs.push(i);pairs.push(i)}
  pairs.sort(function(){return Math.random()-.5});
  var h='';
  for(var j=0;j<10;j++){
    h+='<div class="mc bk" onclick="flipM4('+j+')" data-w="'+pairs[j]+'">🐾</div>'
  }
  document.getElementById('mg4').innerHTML=h;
  updateStars(4,m4mt,5)
}

function flipM4(i){
  if(busy)return;
  var cs=document.querySelectorAll('#mg4 .mc');
  var c=cs[i];
  if(!c.classList.contains('bk'))return;
  if(m4p1===-1){
    m4p1=i;
    c.classList.remove('bk');
    c.classList.add('op');
    var w=words[parseInt(c.getAttribute('data-w'))];
    c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmojiCode(w)+'.svg"><div class="lb">'+w+'</div>';
    speak(w)
  }else if(m4p2===-1&&i!==m4p1){
    busy=true;
    m4p2=i;
    c.classList.remove('bk');
    c.classList.add('op');
    var w2=words[parseInt(c.getAttribute('data-w'))];
    c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmojiCode(w2)+'.svg"><div class="lb">'+w2+'</div>';
    speak(w2,function(){
      var w1=words[parseInt(cs[m4p1].getAttribute('data-w'))];
      if(w1===w2){
        playOk();
        cs[m4p1].classList.add('mt');
        cs[m4p2].classList.add('mt');
        m4mt++;
        updateStars(4,m4mt,5);
        m4p1=-1;m4p2=-1;
        busy=false;
        if(m4mt===5)setTimeout(function(){goM(5)},1200)
      }else{
        playNo();
        setTimeout(function(){
          cs[m4p1].classList.remove('op');
          cs[m4p1].classList.add('bk');
          cs[m4p1].innerHTML='🐾';
          cs[m4p2].classList.remove('op');
          cs[m4p2].classList.add('bk');
          cs[m4p2].innerHTML='🐾';
          m4p1=-1;m4p2=-1;
          busy=false
        },1000)
      }
    })
  }
}

function getEmojiCode(w){
  var map={cat:'1f431',dog:'1f436',fish:'1f41f',bird:'1f426',duck:'1f986'};
  return map[w]||'1f431'
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')goM(cm+1);
  if(e.key==='ArrowLeft')goM(cm-1)
});

goM(0);
</script>
</body>
</html>
