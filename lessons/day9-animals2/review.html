<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 9 - Animals 2 (Review)</title>
<style>
:root{--tip-accent:#2e7d32;--tip-bg:#e8f5e9}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#e8f5e9 0%,#c8e6c9 55%,#a5d6a7 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:16px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#2e7d32;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 56px;border:none;border-radius:38px;background:linear-gradient(135deg,#66bb6a,#2e7d32);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(46,125,50,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
.win-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px}
.win{width:96px;height:124px;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(160deg,#cfd8dc,#90a4ae);box-shadow:0 3px 10px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.25s;position:relative}
.win:active{transform:scale(.95)}
.win .inside{opacity:0;transform:scale(.7);transition:.25s}
.win .lbl{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase;opacity:0;transition:.25s}
.win.on{background:#fff}
.win.on .inside,.win.on .lbl{opacity:1;transform:scale(1)}
.quick-wrap{width:100%;max-width:500px;background:rgba(255,255,255,.84);border-radius:18px;padding:10px 8px;margin-bottom:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.quick-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.quick-btn{width:94px;height:94px;border:none;border-radius:14px;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.quick-btn div{font-size:18px;font-weight:800;color:#6d4c41}
.quick-btn.good{outline:4px solid #66bb6a}
.parade-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.parade-btn{width:130px;height:130px;border:none;border-radius:16px;background:#fff;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;transition:.2s}
.parade-btn:active{transform:scale(.94)}
.parade-btn.good{outline:5px solid #66bb6a;transform:scale(1.05)}
.parade-btn.bad{outline:5px solid #ef5350}
.listen-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.listen-btn{width:150px;height:150px;border:none;border-radius:16px;background:#fff;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;transition:.2s}
.listen-btn:active{transform:scale(.94)}
.listen-btn.good{outline:5px solid #66bb6a}
.listen-btn.bad{outline:5px solid #ef5350}
.odd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;margin-top:8px}
.odd-btn{width:160px;height:120px;border:none;border-radius:14px;background:#fff;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;transition:.2s}
.odd-btn:active{transform:scale(.94)}
.odd-btn.good{outline:4px solid #66bb6a}
.odd-btn.bad{outline:4px solid #ef5350}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#66bb6a;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Farm Animal Game</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>

<div class="nav">
  <button class="nb" id="pb" onclick="goMod(-1)">Back</button>
  <span class="np" id="pg"></span>
  <button class="nb" id="nx" onclick="goMod(1)">Next</button>
</div>

<script>
var actx=null;
function ensureAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type){ensureAudio();var o=actx.createOscillator(),g=actx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=0.18;o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}
function playOk(){playTone(523,.08);setTimeout(function(){playTone(659,.08)},90);setTimeout(function(){playTone(784,.12)},180)}
function playNo(){playTone(330,.15,'square');setTimeout(function(){playTone(262,.2,'square')},160)}
function speak(text,cb){
  var done=false;
  function finish(){if(!done){done=true;if(cb)cb()}}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
  a.onended=finish;
  a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web');
    b.onended=finish;b.onerror=finish;b.play().catch(finish);
  };
  a.play().catch(finish);
  setTimeout(finish,4000);
}

var WORDS=[
  {w:'rabbit',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="66" cy="38" rx="10" ry="20" fill="#e0e0e0"/><ellipse cx="94" cy="38" rx="10" ry="20" fill="#e0e0e0"/><ellipse cx="66" cy="40" rx="5" ry="14" fill="#f8bbd0"/><ellipse cx="94" cy="40" rx="5" ry="14" fill="#f8bbd0"/><circle cx="80" cy="68" r="28" fill="#eeeeee"/><ellipse cx="80" cy="112" rx="34" ry="28" fill="#eeeeee"/><circle cx="70" cy="64" r="4" fill="#333"/><circle cx="90" cy="64" r="4" fill="#333"/><ellipse cx="80" cy="74" rx="5" ry="4" fill="#ef9a9a"/></svg>'},
  {w:'pig',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="110" rx="32" ry="24" fill="#f48fb1"/><circle cx="80" cy="64" r="26" fill="#f48fb1"/><circle cx="66" cy="44" r="9" fill="#f8bbd0"/><circle cx="94" cy="44" r="9" fill="#f8bbd0"/><ellipse cx="80" cy="72" rx="14" ry="10" fill="#f06292"/><circle cx="75" cy="72" r="2.5" fill="#ad1457"/><circle cx="85" cy="72" r="2.5" fill="#ad1457"/></svg>'},
  {w:'cow',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="110" rx="34" ry="24" fill="#fff"/><circle cx="80" cy="64" r="26" fill="#fff"/><ellipse cx="66" cy="48" rx="10" ry="7" fill="#eceff1"/><ellipse cx="94" cy="48" rx="10" ry="7" fill="#eceff1"/><ellipse cx="80" cy="74" rx="15" ry="11" fill="#f8bbd0"/><ellipse cx="70" cy="58" rx="7" ry="6" fill="#333"/><ellipse cx="95" cy="66" rx="8" ry="7" fill="#333"/></svg>'},
  {w:'horse',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="84" cy="110" rx="34" ry="24" fill="#8d6e63"/><ellipse cx="80" cy="60" rx="22" ry="18" fill="#8d6e63"/><rect x="72" y="68" width="16" height="28" rx="8" fill="#8d6e63"/><path d="M65 48 Q80 35 98 46" stroke="#5d4037" stroke-width="8" fill="none"/><circle cx="72" cy="58" r="3.5" fill="#333"/><circle cx="88" cy="58" r="3.5" fill="#333"/></svg>'},
  {w:'sheep',svg:'<svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="108" rx="34" ry="24" fill="#f5f5f5"/><circle cx="80" cy="66" r="24" fill="#f5f5f5"/><circle cx="66" cy="86" r="10" fill="#f5f5f5"/><circle cx="94" cy="86" r="10" fill="#f5f5f5"/><ellipse cx="80" cy="68" rx="15" ry="12" fill="#b0bec5"/><circle cx="74" cy="66" r="3" fill="#333"/><circle cx="86" cy="66" r="3" fill="#333"/></svg>'}
];
var YEST=[
  {w:'pink',svg:'<svg width="52" height="52" viewBox="0 0 160 160"><circle cx="80" cy="56" r="14" fill="#f48fb1"/><circle cx="100" cy="68" r="14" fill="#f48fb1"/><circle cx="96" cy="90" r="14" fill="#f48fb1"/><circle cx="72" cy="90" r="14" fill="#f48fb1"/><circle cx="62" cy="68" r="14" fill="#f48fb1"/><circle cx="80" cy="76" r="10" fill="#e91e63"/></svg>'},
  {w:'purple',svg:'<svg width="52" height="52" viewBox="0 0 160 160"><ellipse cx="55" cy="70" rx="30" ry="22" fill="#9c27b0" transform="rotate(-15,55,70)"/><ellipse cx="105" cy="70" rx="30" ry="22" fill="#9c27b0" transform="rotate(15,105,70)"/><ellipse cx="80" cy="85" rx="6" ry="14" fill="#4a148c"/></svg>'},
  {w:'black',svg:'<svg width="52" height="52" viewBox="0 0 160 160"><ellipse cx="80" cy="110" rx="32" ry="24" fill="#333"/><circle cx="80" cy="62" r="26" fill="#333"/><polygon points="58,42 66,62 50,58" fill="#333"/><polygon points="102,42 94,62 110,58" fill="#333"/></svg>'}
];

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
var modN=6,curMod=0,score=0,total=0;
function showMod(n){curMod=n;for(var i=0;i<modN;i++){document.getElementById('m'+i).classList.toggle('on',i===n)}document.getElementById('pg').textContent=(n+1)+'/'+modN;document.getElementById('pb').disabled=n===0;document.getElementById('nx').disabled=n===modN-1;updBar()}
function goMod(d){showMod(Math.max(0,Math.min(modN-1,curMod+d)))}
function updBar(){
  var titles=['Farm Animal Game','Learn Animals','Parade Gate','Listen and Tap','Find the Different','All Done!'];
  var hints=['','点窗户，学新词！','看图选同伴！','听一听，点动物！','找不一样的！',''];
  document.getElementById('en').textContent=titles[curMod];
  document.getElementById('zh').textContent=hints[curMod];
  document.getElementById('zh').style.display=hints[curMod]?'inline-block':'none';
  var s='';for(var i=0;i<total;i++)s+=i<score?'⭐':'☆';document.getElementById('st').textContent=s;
}

(function(){
  var m=document.getElementById('m0');
  m.innerHTML='<img src="../../assets/peppa/george-superhero-costume.png" width="140" alt="George">'+
    '<div class="pr"><div class="bbl">Come to the farm!</div></div>'+ 
    '<button class="start-btn" onclick="ensureAudio();showMod(1);initM1()">Start!</button>';
  updBar();
})();

function initM1(){
  total+=WORDS.length;
  var m=document.getElementById('m1');
  var h='<div class="quick-wrap"><div style="font-size:22px;font-weight:900;color:#6d4c41;margin-bottom:8px">Yesterday Quick Review</div><div class="quick-row">';
  YEST.forEach(function(y){h+='<button class="quick-btn" onclick="quickTap(this,\''+y.w+'\')">'+y.svg+'<div>'+y.w+'</div></button>'});
  h+='</div></div>';
  h+='<div class="pr"><img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"><div class="bbl">Tap the windows!</div></div>';
  h+='<div class="win-row">';
  WORDS.forEach(function(w,i){
    h+='<button class="win" data-i="'+i+'" onclick="winTap(this,'+i+')"><div class="inside">'+w.svg+'</div><div class="lbl">'+w.w+'</div></button>';
  });
  h+='</div>';
  m.innerHTML=h;
  updBar();
}
function quickTap(el,w){if(el.classList.contains('good'))return;el.classList.add('good');speak(w)}
function winTap(el,i){
  if(el.classList.contains('on')){speak(WORDS[i].w);return}
  el.classList.add('on');
  playOk();score++;updBar();
  speak('I see a '+WORDS[i].w+'!');
}

var m2busy=false,m2q=0,m2order=[];
function initM2(){m2q=0;m2order=shuffle([0,1,2,3,4]);total+=5;buildM2()}
function buildM2(){
  if(m2q>=5){setTimeout(function(){showMod(3);initM3()},700);return}
  var target=WORDS[m2order[m2q]];
  var opts=[target],others=shuffle(WORDS.filter(function(w){return w.w!==target.w}));
  opts.push(others[0],others[1]);opts=shuffle(opts);
  var m=document.getElementById('m2');
  var h='<div class="pr"><img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily"><div class="bbl">Who joins the parade?</div></div>';
  h+='<div style="width:100%;max-width:500px;background:rgba(255,255,255,.8);border-radius:18px;padding:10px 8px">';
  h+='<div style="font-size:28px;font-weight:900;color:#2e7d32">I see a '+target.w+'!</div>';
  h+='<div style="margin-top:6px">'+target.svg.replace('width="100" height="100"','width="110" height="110"')+'</div>';
  h+='<div class="parade-grid">';
  opts.forEach(function(o){h+='<button class="parade-btn" data-w="'+o.w+'" onclick="paradeTap(this,\''+target.w+'\')">'+o.svg+'</button>'});
  h+='</div></div>';
  m.innerHTML=h;
}
function paradeTap(el,correct){
  if(m2busy)return;m2busy=true;
  if(el.dataset.w===correct){
    el.classList.add('good');playOk();score++;updBar();
    speak('I see a '+correct+'!',function(){m2busy=false;m2q++;buildM2()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){m2busy=false;setTimeout(function(){el.classList.remove('bad')},300)});
  }
}

var m3busy=false,m3q=0,m3order=[];
function initM3(){m3q=0;m3order=shuffle([0,1,2,3,4]);total+=5;buildM3()}
function buildM3(){
  if(m3q>=5){setTimeout(function(){showMod(4);initM4()},700);return}
  var target=WORDS[m3order[m3q]];
  var pool=shuffle(WORDS.filter(function(w){return w.w!==target.w})).slice(0,1);
  var opts=shuffle([target,pool[0]]);
  var m=document.getElementById('m3');
  var h='<div class="pr"><img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy"><div class="bbl">Listen and tap!</div></div>';
  h+='<button style="width:190px;height:84px;border:none;border-radius:14px;background:#2e7d32;color:#fff;font-size:26px;font-weight:900;cursor:pointer" onclick="speak(\''+target.w+'\')">🔊 '+target.w+'</button>';
  h+='<div class="listen-grid">';
  opts.forEach(function(o){h+='<button class="listen-btn" data-w="'+o.w+'" onclick="listenTap(this,\''+target.w+'\')">'+o.svg+'</button>'});
  h+='</div>';
  m.innerHTML=h;
  setTimeout(function(){speak(target.w)},280);
}
function listenTap(el,correct){
  if(m3busy)return;m3busy=true;
  if(el.dataset.w===correct){
    el.classList.add('good');playOk();score++;updBar();
    speak('I see a '+correct+'!',function(){m3busy=false;m3q++;buildM3()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){m3busy=false;setTimeout(function(){el.classList.remove('bad')},350)});
  }
}

var m4busy=false,m4q=0,m4order=[];
function initM4(){m4q=0;m4order=shuffle([0,1,2,3,4]);total+=5;buildM4()}
function buildM4(){
  if(m4q>=5){setTimeout(function(){showMod(5);initM5()},700);return}
  var target=WORDS[m4order[m4q]];
  var same=shuffle(WORDS.filter(function(w){return w.w!==target.w}))[0];
  var cards=[target,same,same,same];
  cards=shuffle(cards);
  var m=document.getElementById('m4');
  var h='<div class="pr"><img src="../../assets/peppa/peppa-fairy-princess-small.png" alt="Peppa Fairy"><div class="bbl">Find the different!</div></div>';
  h+='<div style="font-size:24px;font-weight:900;color:#2e7d32">Tap one different animal</div>';
  h+='<div class="odd-grid">';
  cards.forEach(function(c){h+='<button class="odd-btn" data-w="'+c.w+'" onclick="oddTap(this,\''+target.w+'\')">'+c.svg.replace('width="100" height="100"','width="92" height="92"')+'</button>'});
  h+='</div>';
  m.innerHTML=h;
}
function oddTap(el,correct){
  if(m4busy)return;m4busy=true;
  if(el.dataset.w===correct){
    el.classList.add('good');playOk();score++;updBar();
    speak(correct,function(){m4busy=false;m4q++;buildM4()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){m4busy=false;setTimeout(function(){el.classList.remove('bad')},350)});
  }
}

function initM5(){
  total=score;updBar();
  var m=document.getElementById('m5');
  m.innerHTML='<img src="../../assets/peppa/peppa-family-group-outdoors.png" width="160" alt="Peppa family">'+
    '<div style="font-size:42px;font-weight:900;color:#2e7d32;margin:10px 0">All Done!</div>'+
    '<div style="font-size:22px;color:#5d4037;margin-bottom:8px">Great farm game today!</div>'+
    '<div style="font-size:28px;letter-spacing:3px">'+Array(score+1).join('⭐')+'</div>'+
    '<button class="start-btn" style="margin-top:14px" onclick="location.reload()">Play Again</button>';
}

updBar();
</script>
</body>
</html>
