<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 9 Review - Animals 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#c8f7dc 0%,#fce4a8 50%,#f7b8a0 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#27ae60;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#27ae60;transform:scale(1.2)}
.top-bar .dot.done{background:#2ecc71}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}
.module-title{font-size:20px;font-weight:700;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.2);margin-bottom:6px;display:flex;align-items:center;gap:6px}

.teacher-guide{background:rgba(255,255,255,.85);border-radius:10px;padding:8px 14px;font-size:13px;color:#666;
  margin-bottom:10px;text-align:center;width:100%;line-height:1.4;cursor:pointer;user-select:none}
.teacher-guide b{color:#27ae60}
.tg-expand{display:none;margin-top:8px;text-align:left;font-size:12px;line-height:1.6;
  background:rgba(39,174,96,.12);border-radius:8px;padding:8px 12px}
.tg-expand.open{display:block}
.tg-expand li{margin:4px 0;list-style:disc;margin-left:16px}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px;background:none;border-radius:0;min-height:auto;box-shadow:none}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:13px;color:rgba(0,0,0,.45);margin-top:2px;line-height:1.2}
.instr-stars{display:flex;gap:5px;margin-top:4px}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}
.card .icon{line-height:1;transition:filter .4s,transform .4s}
.card .label{font-size:18px;font-weight:700;margin-top:4px;opacity:0;transition:opacity .4s;color:#333}
.card.revealed .label{opacity:1}
.card.gray .icon img{filter:grayscale(1) brightness(1.1)}
.card.revealed .icon img{filter:none;animation:popIn .4s ease}

.prompt-text{font-size:22px;font-weight:700;color:#fff;text-shadow:1px 1px 4px rgba(0,0,0,.2);
  margin-bottom:10px;min-height:30px;text-align:center}
.score-bar{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.star{opacity:.3;transition:opacity .3s,transform .3s;line-height:1}
.star.earned{opacity:1;animation:popIn .4s ease}

.review-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.review-card:active{transform:scale(.95)}
.review-card .icon{line-height:1}
.review-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Tap-to-learn card reveal */
.learn-grid{display:flex;flex-wrap:wrap;gap:12px;width:100%;justify-content:center}
.learn-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;
  width:calc(33.33% - 8px);min-height:110px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.learn-card:active{transform:scale(.95)}
.learn-card .icon{line-height:1}
.learn-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333;opacity:0;transition:opacity .3s}
.learn-card.revealed .label{opacity:1}
.learn-card.revealed .icon img{filter:none;animation:popIn .4s ease}
.learn-card:not(.revealed) .icon img{filter:grayscale(1) brightness(1.1)}

/* Memory flip game */
.flip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;justify-items:center}
.flip-card{background:rgba(255,255,255,.9);border-radius:14px;padding:10px;min-height:100px;width:100%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .3s,background .3s;-webkit-tap-highlight-color:transparent}
.flip-card:active{transform:scale(.95)}
.flip-card .flip-face{line-height:1}
.flip-card.matched{background:#d5f5e3;pointer-events:none;opacity:.7}

/* Listen & Find */
.listen-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.listen-card:active{transform:scale(.95)}
.listen-card .icon{line-height:1}
.listen-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Whack-a-mole */
.mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.mole-hole{background:rgba(139,90,43,.3);border-radius:50%;width:100%;aspect-ratio:1;display:flex;
  align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:inset 0 4px 8px rgba(0,0,0,.15);-webkit-tap-highlight-color:transparent}
.mole-hole:active{transform:scale(.95)}
.mole{position:absolute;bottom:-70px;transition:bottom .3s ease;line-height:1}
.mole.up{bottom:10px;animation:moleWiggle .3s ease}
.mole.whacked{animation:popIn .3s ease}
@keyframes moleWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}

/* Correct message overlay */
#correctMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(39,174,96,.95);color:#fff;font-size:26px;font-weight:700;
  padding:14px 26px;border-radius:20px;z-index:500;display:none;text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none;white-space:nowrap}

/* Completion */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.complete-emoji{animation:popIn .6s ease}
.complete-text{font-size:24px;font-weight:700;color:#fff;margin-top:12px;text-shadow:1px 1px 3px rgba(0,0,0,.2)}

/* Stars burst */
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

/* Nav bar */
.nav-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;
  padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-top:2px solid rgba(0,0,0,.06);z-index:100}
.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#27ae60;border:2px solid #27ae60}
.nav-next{color:#fff;background:linear-gradient(135deg,#6dd5a0,#27ae60);
  box-shadow:0 4px 15px rgba(39,174,96,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-progress{font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center}

/* Animations */
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* PC layout */
@media(min-width:768px){
  .top-bar{max-width:800px;padding:16px 24px}
  .top-bar .title{font-size:22px}
  .main{max-width:800px;padding:24px 24px 20px}
  .module-title{font-size:28px}
  .card-grid,.flip-grid,.mole-grid{gap:18px}
  .card{padding:20px;min-height:140px}
  .card .icon img,.review-card .icon img,.listen-card .icon img,.learn-card .icon img{width:120px!important;height:120px!important}
  .flip-card .flip-face img{width:80px!important;height:80px!important}
  .mole img{width:70px!important;height:70px!important}
  .complete-emoji img{width:120px!important;height:120px!important}
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title" id="topTitle">Day 9 · Animals 2 Review</div>
  <div class="dots" id="dots"></div>
</div>
<div class="main" id="main">
<div class="instr-banner" id="instrBanner"></div>

<!-- Module 1: Review Warm-up -->
<div class="module" id="mod1">
  <div class="card-grid" id="reviewGrid"></div>
</div>

<!-- Module 2: Tap to Learn -->
<div class="module" id="mod2">
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- Module 3: Whack-a-Mole -->
<div class="module" id="mod3">
  <div class="mole-grid" id="moleGrid"></div>
</div>

<!-- Module 4: Listen & Find -->
<div class="module" id="mod4">
  <div class="card-grid" id="listenGrid"></div>
</div>

<!-- Module 5: Memory Flip -->
<div class="module" id="mod5">
  <div class="flip-grid" id="flipGrid"></div>
</div>

<!-- Complete -->
<div class="module" id="mod6">
  <div class="complete-screen">
    <div class="complete-emoji" id="completeEmoji"></div>
    <div class="complete-text">Great Job, Ranran!</div>
    <div style="font-size:16px;color:rgba(255,255,255,.85);margin-top:8px">You reviewed all the farm animals!</div>
    <button class="nav-btn nav-next" style="margin-top:20px" onclick="goModule(1)">Play Again</button>
    <button class="nav-btn" style="margin-top:10px;background:rgba(255,255,255,.2);color:#fff;border:none" onclick="location.href='../../index.html'">Home</button>
  </div>
</div>

</div>

<!-- Correct message overlay -->
<div id="correctMsg"></div>
<script>
// === TWEMOJI HELPER ===
function twimg(code, sz) {
  return '<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/' + code + '.svg" width="' + sz + '" height="' + sz + '" alt="">';
}

// === DATA ===
var ANIMALS = [
  {name:'rabbit', code:'1f430'},
  {name:'pig',    code:'1f437'},
  {name:'cow',    code:'1f404'},
  {name:'horse',  code:'1f434'},
  {name:'sheep',  code:'1f411'}
];
var REVIEW = [
  {name:'cat',  code:'1f431'},
  {name:'dog',  code:'1f436'},
  {name:'fish', code:'1f41f'}
];

var MODULES = 6, currentModule = 0;
var reviewRound = 0, reviewOrder = [];
var learnRevealed = 0;
var whackRound = 0, whackScore = 0, whackOrder = [], whackTimer = null, moleTimers = [];
var listenRound = 0, listenOrder = [];
var flipFirst = null, flipMatched = 0, flipLocked = false;

// === AUDIO & SPEECH ===
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function speak(text, cb) {
  setTimeout(function() {
    if (!window.speechSynthesis) { if(cb) cb(); return; }
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.8; u.pitch = 1.1;
    if(cb) {
      var done = false;
      var safety = setTimeout(function(){ if(!done){ done=true; cb(); } }, 4000);
      u.onend = function(){ if(!done){ done=true; clearTimeout(safety); setTimeout(cb, 50); } };
    }
    window.speechSynthesis.speak(u);
  }, 100);
}

// Repeat / follow-along phase: show mic prompt, wait, then callback
function repeatPhase(word, cb) {
  setInstr('Your turn! 🎤', '跟着说一遍: ' + word);
  setTimeout(function() {
    speak(word, function() {
      setTimeout(cb, 2500);
    });
  }, 800);
}
function playCorrect() {
  var ctx = getAudioCtx();
  [523.25, 659.25].forEach(function(freq, i) {
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    var t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  });
}
function playWrong() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
function playPop() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}
function playStar() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
function setInstr(en, zh, starsHtml) {
  var b = document.getElementById('instrBanner');
  var h = '<div class="instr-en">' + en + '</div>';
  if(zh) h += '<div class="instr-zh">' + zh + '</div>';
  if(starsHtml) h += '<div class="instr-stars">' + starsHtml + '</div>';
  b.innerHTML = h;
}
function starsBar(total, earned) {
  var h = '';
  for(var i = 0; i < total; i++) {
    h += '<span class="star' + (i < earned ? ' earned' : '') + '">' + twimg('2b50', 18) + '</span>';
  }
  return h;
}

function showCorrect(name, cb) {
  playCorrect();
  var el = document.getElementById('correctMsg');
  el.textContent = 'I see a ' + name + '!';
  el.style.display = 'block';
  speak('I see a ' + name + '!', function() {
    el.style.display = 'none';
    if(cb) cb();
  });
}

function burstStars(x, y) {
  playStar();
  var c = document.createElement('div');
  c.className = 'star-burst';
  c.style.left = x + 'px'; c.style.top = y + 'px';
  var codes = ['2b50','1f31f','2728','1f4ab'];
  for(var i = 0; i < 8; i++) {
    var s = document.createElement('div');
    s.className = 'star-particle';
    var angle = (i / 8) * Math.PI * 2;
    var dist = 60 + Math.random() * 40;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    s.innerHTML = twimg(codes[i % 4], 20);
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(function(){ c.remove(); }, 1100);
}

function shuffle(arr) {
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// === NAVIGATION ===
function updateDots() {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(var i = 1; i <= 5; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === currentModule ? ' active' : '') + (i < currentModule ? ' done' : '');
    dots.appendChild(d);
  }
}

function goModule(n) {
  currentModule = n;
  document.querySelectorAll('.module').forEach(function(m){ m.classList.remove('active'); });
  var target = document.getElementById('mod' + n);
  if(target) target.classList.add('active');
  updateDots();
  if(n === 1) startReview();
  if(n === 2) initMod2();
  if(n === 3) startWhack();
  if(n === 4) startListen();
  if(n === 5) startFlip();
  updateNav();
}

function updateNav() {
  document.getElementById('navPrev').disabled = (currentModule <= 1);
  document.getElementById('navNext').textContent = (currentModule >= 5) ? 'Done!' : 'Next';
  document.getElementById('navProgress').textContent = Math.min(currentModule, 5) + '/5';
  document.querySelector('.nav-bar').style.display = (currentModule >= 6) ? 'none' : '';
}
function goNext() { if(currentModule < 6) goModule(currentModule + 1); }
function goPrev() { if(currentModule > 1) goModule(currentModule - 1); }

// === MODULE 1: REVIEW WARM-UP ===
function startReview() {
  reviewRound = 0;
  reviewOrder = shuffle([0,1,2]);
  buildReviewGrid();
  showReviewPrompt();
}

function buildReviewGrid() {
  var grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  shuffle(REVIEW).forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'review-card';
    card.innerHTML = '<div class="icon">' + twimg(r.code, 80) + '</div><div class="label">' + r.name + '</div>';
    card.onclick = function(e) { checkReview(this, r, e); };
    grid.appendChild(card);
  });
}

function showReviewPrompt() {
  if(reviewRound >= 3) {
    setInstr('Great memory! 🌟', '太厉害了，全部找对啦！', starsBar(3, 3));
    return;
  }
  var target = REVIEW[reviewOrder[reviewRound]];
  setInstr('Find: ' + target.name + '! ' + twimg(target.code, 24), '点一点，哪个是 ' + target.name + '？', starsBar(3, reviewRound));
  speak('Find ' + target.name + '!');
}

var reviewBusy = false;
function checkReview(card, item, e) {
  if(reviewRound >= 3) { speak(item.name); return; }
  if(reviewBusy) return;
  var target = REVIEW[reviewOrder[reviewRound]];
  if(item.name === target.name) {
    reviewBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    reviewRound++;
    setInstr('Find: ' + target.name + '! ' + twimg(target.code, 24), '答对啦！这是 ' + target.name + '！', starsBar(3, reviewRound));
    playCorrect();
    speak(target.name, function() {
      reviewBusy = false;
      buildReviewGrid(); showReviewPrompt();
    });
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 2: TAP TO LEARN ===
function initMod2() {
  learnRevealed = 0;
  setInstr('Tap to learn! 👆', '点一点卡片，学习新单词吧！');
  speak('Tap to learn!');
  var grid = document.getElementById('learnGrid');
  grid.innerHTML = '';
  ANIMALS.forEach(function(a, i) {
    var card = document.createElement('div');
    card.className = 'learn-card';
    card.innerHTML = '<div class="icon">' + twimg(a.code, 80) + '</div><div class="label">' + a.name + '</div>';
    card.onclick = function(e) { revealLearn(this, i, e); };
    grid.appendChild(card);
  });
}

var learnBusy = false;
function revealLearn(el, idx, e) {
  if (el.classList.contains('revealed')) {
    speak(ANIMALS[idx].name);
    return;
  }
  if (learnBusy) return;
  el.classList.add('revealed');
  learnRevealed++;
  learnBusy = true;
  playPop();
  var rect = el.getBoundingClientRect();
  burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
  speak(ANIMALS[idx].name, function() {
    repeatPhase(ANIMALS[idx].name, function() {
      learnBusy = false;
      if (learnRevealed >= ANIMALS.length) {
        setInstr('All learned! 🎉', '全部学会啦，你真棒！');
      } else {
        setInstr('Tap to learn! 👆', '还有卡片没翻开哦，继续点！');
      }
    });
  });
}

// === MODULE 3: WHACK-A-MOLE ===
function startWhack() {
  whackRound = 0; whackScore = 0;
  whackOrder = shuffle([0,1,2,3,4]);
  moleTimers.forEach(clearTimeout);
  moleTimers = [];
  buildMoleGrid();
  nextWhackRound();
}

function buildMoleGrid() {
  var grid = document.getElementById('moleGrid');
  grid.innerHTML = '';
  for(var i = 0; i < 6; i++) {
    var hole = document.createElement('div');
    hole.className = 'mole-hole';
    hole.setAttribute('data-hole', i);
    var mole = document.createElement('div');
    mole.className = 'mole';
    mole.setAttribute('data-hole', i);
    hole.appendChild(mole);
    hole.onclick = function(e) { whackMole(this, e); };
    grid.appendChild(hole);
  }
}

function nextWhackRound() {
  if(whackRound >= 5) {
    setInstr('Great whacking! 🔨', '打得太好了，全部打中！', starsBar(5, 5));
    return;
  }
  var target = ANIMALS[whackOrder[whackRound]];
  setInstr('Whack the ' + target.name + '! 🔨 ' + twimg(target.code, 24), '快打 ' + target.name + '！用手点它！', starsBar(5, whackRound));
  speak(target.name);

  var moles = document.querySelectorAll('.mole');
  moles.forEach(function(m){ m.classList.remove('up'); m.innerHTML = ''; });

  var holes = shuffle([0,1,2,3,4,5]);
  var count = 2 + Math.floor(Math.random() * 2);
  var picks = shuffle(ANIMALS);
  var hasTarget = false;
  var popList = [];
  for(var i = 0; i < count; i++) {
    var w = picks[i % picks.length];
    if(w.name === target.name) hasTarget = true;
    popList.push({hole: holes[i], word: w});
  }
  if(!hasTarget) { popList[0].word = target; }

  popList.forEach(function(p, idx) {
    var t = setTimeout(function() {
      var mole = document.querySelector('.mole[data-hole="' + p.hole + '"]');
      mole.innerHTML = twimg(p.word.code, 50);
      mole.setAttribute('data-name', p.word.name);
      mole.classList.add('up');
    }, idx * 500);
    moleTimers.push(t);
  });
}

var whackBusy = false;
function whackMole(hole, e) {
  var mole = hole.querySelector('.mole');
  if(!mole.classList.contains('up') || whackBusy) return;
  var target = ANIMALS[whackOrder[whackRound]];
  var name = mole.getAttribute('data-name');
  if(name === target.name) {
    whackBusy = true;
    mole.classList.add('whacked');
    moleTimers.forEach(clearTimeout); moleTimers = [];
    var rect = hole.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    whackScore++;
    whackRound++;
    setInstr('Whack the ' + target.name + '! 🔨 ' + twimg(target.code, 24), '打对啦！这是 ' + target.name + '！', starsBar(5, whackRound));
    playCorrect(); speak(target.name, function() {
      repeatPhase(target.name, function() {
        whackBusy = false;
        document.querySelectorAll('.mole').forEach(function(m){
          m.classList.remove('up','whacked'); m.innerHTML = '';
        });
        nextWhackRound();
      });
    });
  } else {
    playWrong();
    hole.style.animation = 'shake .4s ease';
    setTimeout(function(){ hole.style.animation = ''; }, 500);
  }
}

// === MODULE 4: LISTEN & FIND ===
function startListen() {
  listenRound = 0;
  listenOrder = shuffle([0,1,2,3,4]);
  buildListenGrid();
  showListenPrompt();
}

function buildListenGrid() {
  var grid = document.getElementById('listenGrid');
  grid.innerHTML = '';
  shuffle(ANIMALS).forEach(function(a) {
    var card = document.createElement('div');
    card.className = 'listen-card';
    card.innerHTML = '<div class="icon">' + twimg(a.code, 80) + '</div><div class="label">' + a.name + '</div>';
    card.onclick = function(e) { checkListen(this, a, e); };
    grid.appendChild(card);
  });
}

function showListenPrompt() {
  if(listenRound >= 5) {
    setInstr('All found! 🎉', '全部找到啦，耳朵真灵！', starsBar(5, 5));
    return;
  }
  var target = ANIMALS[listenOrder[listenRound]];
  setInstr('Find the ' + target.name + '! 🔍 ' + twimg(target.code, 24), '听一听，哪个是 ' + target.name + '？点它！', starsBar(5, listenRound));
  speak('Find the ' + target.name + '!');
}

var listenBusy = false;
function checkListen(card, animal, e) {
  if(listenRound >= 5 || listenBusy) return;
  var target = ANIMALS[listenOrder[listenRound]];
  if(animal.name === target.name) {
    listenBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    listenRound++;
    setInstr('Find the ' + target.name + '! 🔍 ' + twimg(target.code, 24), '找对啦！这是 ' + target.name + '！', starsBar(5, listenRound));
    playCorrect(); speak(target.name, function() {
      repeatPhase(target.name, function() {
        listenBusy = false;
        buildListenGrid(); showListenPrompt();
      });
    });
  } else {
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 5: MEMORY FLIP ===
function startFlip() {
  flipFirst = null; flipMatched = 0; flipLocked = false;
  setInstr('Find the pairs! 🃏', '翻开两张一样的卡片，配成一对！', starsBar(4, 0));
  speak('Find the matching pairs!');
  var picks = shuffle(ANIMALS).slice(0, 4);
  var pairs = shuffle(picks.concat(picks.slice()));
  buildFlipGrid(pairs);
}

function buildFlipGrid(pairs) {
  var grid = document.getElementById('flipGrid');
  grid.innerHTML = '';
  pairs.forEach(function(w, i) {
    var card = document.createElement('div');
    card.className = 'flip-card face-down';
    card.setAttribute('data-idx', i);
    card.setAttribute('data-name', w.name);
    card.innerHTML = '<div class="flip-face">' + twimg('2753', 40) + '</div>';
    card.onclick = function(e) { flipCard(this, w, e); };
    grid.appendChild(card);
  });
}

function flipCard(el, word, e) {
  if(flipLocked) return;
  if(el.classList.contains('matched')) return;
  if(!el.classList.contains('face-down')) return;

  el.classList.remove('face-down');
  el.querySelector('.flip-face').innerHTML = twimg(word.code, 60);
  playPop();

  if(!flipFirst) {
    speak(word.name);
    flipFirst = {el: el, word: word};
    return;
  }

  flipLocked = true;
  if(flipFirst.word.name === word.name && flipFirst.el !== el) {
    var rect = el.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    el.classList.add('matched');
    flipFirst.el.classList.add('matched');
    flipMatched++;
    setInstr('Find the pairs! 🃏', '再翻两张，找一样的！', starsBar(4, flipMatched));
    playCorrect(); speak(word.name, function() {
      repeatPhase(word.name, function() {
        flipFirst = null;
        flipLocked = false;
        if(flipMatched >= 4) {
          setInstr('All done! 🎉', '全部配对成功，你太棒了！', starsBar(4, 4));
        }
      });
    });
  } else {
    var prev = flipFirst.el;
    setTimeout(function() {
      el.classList.add('face-down');
      el.querySelector('.flip-face').innerHTML = twimg('2753', 40);
      prev.classList.add('face-down');
      prev.querySelector('.flip-face').innerHTML = twimg('2753', 40);
      flipFirst = null;
      flipLocked = false;
    }, 800);
    playWrong();
  }
}
