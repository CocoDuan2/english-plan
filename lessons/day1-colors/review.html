<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 1 Review - Colors</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 50%,#ff9a9e 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#e67e22;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#e67e22;transform:scale(1.2)}
.top-bar .dot.done{background:#f39c12}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:17px;color:rgba(0,0,0,.5);margin-top:2px;line-height:1.3}
.instr-stars{display:flex;gap:5px;margin-top:4px}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title" id="topTitle">🎨 Day 1 · Colors Review</div>
  <div class="dots" id="dots"></div>
</div>
<div class="main" id="main">
<div class="instr-banner" id="instrBanner"></div>

<!-- Start Screen -->
<div class="module active" id="mod0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px">
  <div style="display:flex;gap:12px" id="startIcons"></div>
  <div style="font-size:32px;font-weight:700;color:#2d3436">准备好了吗？</div>
  <div style="font-size:18px;color:rgba(0,0,0,.45)">点击开始学颜色！</div>
  <button onclick="getAudioCtx();goModule(1);document.getElementById('mod0').style.display='none'" style="font-size:28px;padding:16px 50px;border-radius:50px;border:none;background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(230,126,34,.35);letter-spacing:2px">开始玩 ▶</button>
</div>

<!-- Module 1: Meet the Colors (no review on Day 1) -->
<div class="module" id="mod1"></div>
<!-- Module 2: Tap to Learn -->
<div class="module" id="mod2"></div>
<!-- Module 3: Paint Reveal -->
<div class="module" id="mod3"></div>
<!-- Module 4: Listen & Find -->
<div class="module" id="mod4"></div>
<!-- Module 5: Balloon Pop -->
<div class="module" id="mod5"></div>
<!-- Complete -->
<div class="module" id="mod6">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1">
    <div style="font-size:90px;animation:popIn .6s ease">🌈</div>
    <div style="font-size:24px;font-weight:700;color:#fff;margin-top:12px;text-shadow:1px 1px 3px rgba(0,0,0,.2)">Great Job, Ranran!</div>
    <div style="font-size:16px;color:rgba(255,255,255,.85);margin-top:8px">You learned all the colors!</div>
    <button class="nav-btn nav-next" style="margin-top:20px" onclick="goModule(1)">Play Again</button>
    <button class="nav-btn" style="margin-top:10px;background:rgba(255,255,255,.2);color:#fff;border:none" onclick="location.href='../../index.html'">Home</button>
  </div>
</div>
</div>

<div id="correctMsg" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(230,126,34,.95);color:#fff;font-size:26px;font-weight:700;padding:14px 26px;border-radius:20px;z-index:500;display:none;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none;white-space:nowrap"></div>

<div class="nav-bar" style="position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid rgba(0,0,0,.06);z-index:100">
  <button class="nav-btn nav-prev" id="navPrev" onclick="goPrev()">◀ Back</button>
  <span class="nav-progress" id="navProgress" style="font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center">1/5</span>
  <button class="nav-btn nav-next" id="navNext" onclick="goNext()">Next ▶</button>
</div>

<style>
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}
.card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

.learn-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;
  width:calc(33.33% - 8px);min-height:110px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s}
.learn-card:active{transform:scale(.95)}
.learn-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333;opacity:0;transition:opacity .3s}
.learn-card.revealed .label{opacity:1}

.color-circle{width:80px;height:80px;border-radius:50%;transition:background .5s,transform .4s,box-shadow .4s}
.color-circle.gray{background:#ccc!important;box-shadow:none!important}

/* Paint shapes */
.paint-shape{width:90px;height:90px;border-radius:20px;background:#ddd;cursor:pointer;transition:background .4s,transform .3s;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.paint-shape:active{transform:scale(.92)}
.paint-shape.painted{animation:popIn .4s ease}

/* Balloon */
.balloon-area{position:relative;width:100%;height:300px;overflow:hidden;border-radius:16px;background:rgba(255,255,255,.15)}
.balloon{position:absolute;width:60px;height:75px;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;cursor:pointer;transition:transform .2s;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.balloon:active{transform:scale(.85)}
.balloon::after{content:'';position:absolute;bottom:-8px;width:2px;height:20px;background:rgba(0,0,0,.2)}

.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#e67e22;border:2px solid #e67e22}
.nav-next{color:#fff;background:linear-gradient(135deg,#f39c12,#e67e22);box-shadow:0 4px 15px rgba(230,126,34,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}

.star{opacity:.3;transition:opacity .3s,transform .3s;line-height:1}
.star.earned{opacity:1;animation:popIn .4s ease}
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes floatUp{0%{transform:translateY(0)}100%{transform:translateY(-380px)}}

@media(min-width:768px){
  .top-bar{max-width:800px}
  .main{max-width:800px}
  .color-circle{width:100px;height:100px}
  .paint-shape{width:110px;height:110px}
  .balloon-area{height:400px}
}
</style>

<script>
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/';
function twimg(code,sz){return '<img src="'+TW+code+'.svg" width="'+sz+'" height="'+sz+'" alt="">';}

var COLORS=[
  {name:'red',clr:'#e74c3c'},
  {name:'blue',clr:'#3498db'},
  {name:'yellow',clr:'#f1c40f'},
  {name:'green',clr:'#27ae60'},
  {name:'orange',clr:'#e67e22'}
];

var MODULES=6,currentModule=0;
var meetIdx=0;
var learnRevealed=0,learnBusy=false;
var paintOrder=[],paintRound=0,paintBusy=false;
var listenOrder=[],listenRound=0,listenBusy=false;
var balloonOrder=[],balloonRound=0,balloonScore=0,balloonTimer=null,balloonBusy=false;

// === AUDIO ===
var audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function speak(text,cb){
  var isWord=text.trim().indexOf(' ')===-1;
  var url=isWord?'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2':'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web';
  var a=new Audio(url);var done=false;
  var finish=function(){if(!done){done=true;if(cb)setTimeout(cb,50);}};
  var safety=setTimeout(finish,4000);
  a.onended=function(){clearTimeout(safety);finish();};
  a.onerror=function(){clearTimeout(safety);finish();};
  a.play().catch(finish);
}
function playCorrect(){var ctx=getAudioCtx();[523.25,659.25].forEach(function(f,i){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;var t=ctx.currentTime+i*.15;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);});}
function playWrong(){var ctx=getAudioCtx();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.value=200;g.gain.setValueAtTime(.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);o.start();o.stop(ctx.currentTime+.2);}
function playPop(){var ctx=getAudioCtx();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08);o.start();o.stop(ctx.currentTime+.08);}
function playStar(){var ctx=getAudioCtx();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(1200,ctx.currentTime);o.frequency.linearRampToValueAtTime(1800,ctx.currentTime+.2);g.gain.setValueAtTime(.25,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);o.start();o.stop(ctx.currentTime+.2);}

function setInstr(en,zh,starsHtml){
  var b=document.getElementById('instrBanner');
  var h='<div class="instr-en">'+en+'</div>';
  if(zh)h+='<div class="instr-zh">'+zh+'</div>';
  if(starsHtml)h+='<div class="instr-stars">'+starsHtml+'</div>';
  b.innerHTML=h;
}
function starsBar(total,earned){
  var h='';for(var i=0;i<total;i++){h+='<span class="star'+(i<earned?' earned':'')+'">'+twimg('2b50',18)+'</span>';}return h;
}
function burstStars(x,y){
  playStar();var c=document.createElement('div');c.className='star-burst';c.style.left=x+'px';c.style.top=y+'px';
  var codes=['2b50','1f31f','2728','1f4ab'];
  for(var i=0;i<8;i++){var s=document.createElement('div');s.className='star-particle';var angle=(i/8)*Math.PI*2;var dist=60+Math.random()*40;s.style.setProperty('--tx',Math.cos(angle)*dist+'px');s.style.setProperty('--ty',Math.sin(angle)*dist+'px');s.innerHTML=twimg(codes[i%4],20);c.appendChild(s);}
  document.body.appendChild(c);setTimeout(function(){c.remove();},1100);
}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

// === NAV ===
function updateDots(){
  var dots=document.getElementById('dots');dots.innerHTML='';
  for(var i=1;i<=5;i++){var d=document.createElement('div');d.className='dot'+(i===currentModule?' active':'')+(i<currentModule?' done':'');dots.appendChild(d);}
}
function goModule(n){
  currentModule=n;
  document.querySelectorAll('.module').forEach(function(m){m.classList.remove('active');m.style.display='';});
  var target=document.getElementById('mod'+n);if(target)target.classList.add('active');
  updateDots();
  if(n===1)startMeet();if(n===2)initLearn();if(n===3)startPaint();if(n===4)startListen();if(n===5)startBalloon();
  updateNav();
}
function updateNav(){
  document.getElementById('navPrev').disabled=(currentModule<=1);
  document.getElementById('navNext').textContent=(currentModule>=5)?'Done!':'Next';
  document.getElementById('navProgress').textContent=Math.min(currentModule,5)+'/5';
  document.querySelector('.nav-bar').style.display=(currentModule>=6)?'none':'';
}
function goNext(){if(currentModule<6)goModule(currentModule+1);}
function goPrev(){if(currentModule>1)goModule(currentModule-1);}

// === MODULE 1: Meet the Colors ===
function startMeet(){
  meetIdx=0;
  setInstr('Meet the colors! 👋','认识一下这些颜色吧！点一点每个颜色');
  var grid=document.getElementById('mod1');
  grid.innerHTML='<div class="card-grid" id="meetGrid"></div>';
  var g=document.getElementById('meetGrid');
  COLORS.forEach(function(c){
    var card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="color-circle" style="background:'+c.clr+';box-shadow:0 4px 15px '+c.clr+'44"></div><div class="label">'+c.name+'</div>';
    card.onclick=function(){speak(c.name);playPop();card.style.transform='scale(1.05)';setTimeout(function(){card.style.transform='';},300);};
    g.appendChild(card);
  });
}

// === MODULE 2: Tap to Learn ===
function initLearn(){
  learnRevealed=0;learnBusy=false;
  setInstr('Tap to learn! 👆','点一点灰色的圆，看看是什么颜色！');
  var grid=document.getElementById('mod2');
  grid.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:12px;width:100%;justify-content:center" id="learnGrid"></div>';
  var g=document.getElementById('learnGrid');
  COLORS.forEach(function(c,i){
    var card=document.createElement('div');card.className='learn-card';
    card.innerHTML='<div class="color-circle gray" data-clr="'+c.clr+'" style="background:#ccc"></div><div class="label">'+c.name+'</div>';
    card.onclick=function(e){revealLearn(card,i,e);};
    g.appendChild(card);
  });
}
function revealLearn(el,idx,e){
  if(el.classList.contains('revealed')){speak(COLORS[idx].name);return;}
  if(learnBusy)return;learnBusy=true;
  el.classList.add('revealed');
  var circle=el.querySelector('.color-circle');
  circle.classList.remove('gray');
  circle.style.background=COLORS[idx].clr;
  circle.style.boxShadow='0 4px 15px '+COLORS[idx].clr+'44';
  circle.style.transform='scale(1.1)';
  setTimeout(function(){circle.style.transform='';},300);
  learnRevealed++;playPop();
  var rect=el.getBoundingClientRect();burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
  speak(COLORS[idx].name,function(){
    learnBusy=false;
    if(learnRevealed>=COLORS.length)setInstr('All learned! 🎉','全部学会啦，你真棒！');
    else setInstr('Tap to learn! 👆','还有灰色的圆没翻开哦，继续点！');
  });
}

// === MODULE 3: Paint Reveal ===
function startPaint(){
  paintRound=0;paintBusy=false;
  paintOrder=shuffle([0,1,2,3,4]);
  setInstr('Paint it! 🎨','点一点，把灰色的方块涂上颜色！',starsBar(5,0));
  var grid=document.getElementById('mod3');
  grid.innerHTML='<div class="card-grid" id="paintGrid"></div>';
  buildPaintGrid();showPaintPrompt();
}
function buildPaintGrid(){
  var g=document.getElementById('paintGrid');g.innerHTML='';
  shuffle(COLORS).forEach(function(c){
    var shape=document.createElement('div');shape.className='paint-shape';shape.setAttribute('data-name',c.name);
    shape.style.background='#ddd';
    shape.onclick=function(e){checkPaint(shape,c,e);};
    g.appendChild(shape);
  });
}
function showPaintPrompt(){
  if(paintRound>=5){setInstr('All painted! 🎨','太厉害了，全部涂好啦！',starsBar(5,5));return;}
  var target=COLORS[paintOrder[paintRound]];
  setInstr('Find '+target.name+'!','点一点，哪个要涂成 '+target.name+'？',starsBar(5,paintRound));
  speak('Find '+target.name);
}
function checkPaint(shape,color,e){
  if(paintRound>=5){return;}if(paintBusy)return;
  var target=COLORS[paintOrder[paintRound]];
  if(color.name===target.name){
    paintBusy=true;
    shape.style.background=color.clr;shape.classList.add('painted');
    shape.style.boxShadow='0 4px 15px '+color.clr+'44';
    var rect=shape.getBoundingClientRect();burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    paintRound++;
    setInstr('Find '+target.name+'!','答对啦！这是 '+target.name+'！',starsBar(5,paintRound));
    playCorrect();speak(target.name,function(){paintBusy=false;buildPaintGrid();showPaintPrompt();});
  }else{
    playWrong();shape.style.animation='shake .4s ease';setTimeout(function(){shape.style.animation='';},500);
  }
}

// === MODULE 4: Listen & Find ===
function startListen(){
  listenRound=0;listenBusy=false;
  listenOrder=shuffle([0,1,2,3,4]);
  buildListenGrid();showListenPrompt();
}
function buildListenGrid(){
  var grid=document.getElementById('mod4');
  grid.innerHTML='<div class="card-grid" id="listenGrid"></div>';
  var g=document.getElementById('listenGrid');
  shuffle(COLORS).forEach(function(c){
    var card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="color-circle" style="background:'+c.clr+';box-shadow:0 4px 15px '+c.clr+'44"></div><div class="label">'+c.name+'</div>';
    card.onclick=function(e){checkListen(card,c,e);};
    g.appendChild(card);
  });
}
function showListenPrompt(){
  if(listenRound>=5){setInstr('All found! 🎉','全部找到啦，耳朵真灵！',starsBar(5,5));return;}
  var target=COLORS[listenOrder[listenRound]];
  setInstr('Find '+target.name+'! 🔍','听一听，哪个是 '+target.name+'？点它！',starsBar(5,listenRound));
  speak('Find '+target.name);
}
function checkListen(card,color,e){
  if(listenRound>=5||listenBusy)return;
  var target=COLORS[listenOrder[listenRound]];
  if(color.name===target.name){
    listenBusy=true;
    var rect=card.getBoundingClientRect();burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    listenRound++;
    setInstr('Find '+target.name+'!','找对啦！这是 '+target.name+'！',starsBar(5,listenRound));
    playCorrect();speak(target.name,function(){listenBusy=false;buildListenGrid();showListenPrompt();});
  }else{
    playWrong();card.style.animation='shake .4s ease';setTimeout(function(){card.style.animation='';},500);
  }
}

// === MODULE 5: Balloon Pop ===
function startBalloon(){
  balloonRound=0;balloonScore=0;balloonBusy=false;
  balloonOrder=shuffle([0,1,2,3,4]);
  var grid=document.getElementById('mod5');
  grid.innerHTML='<div class="balloon-area" id="balloonArea"></div>';
  nextBalloonRound();
}
function nextBalloonRound(){
  if(balloonRound>=5){setInstr('All popped! 🎈','气球全部打完啦，你太棒了！',starsBar(5,5));return;}
  var target=COLORS[balloonOrder[balloonRound]];
  setInstr('Pop the '+target.name+' balloon! 🎈','快点 '+target.name+' 的气球！',starsBar(5,balloonRound));
  speak(target.name);
  spawnBalloons(target);
}
function spawnBalloons(target){
  var area=document.getElementById('balloonArea');area.innerHTML='';
  if(balloonTimer)clearInterval(balloonTimer);
  var all=shuffle(COLORS);var spawned=0;
  balloonTimer=setInterval(function(){
    if(spawned>=4){clearInterval(balloonTimer);return;}
    var c=all[spawned%all.length];
    var b=document.createElement('div');b.className='balloon';
    b.style.background=c.clr;b.style.left=Math.random()*70+10+'%';b.style.bottom='-80px';
    b.style.animation='floatUp '+(4+Math.random()*2)+'s linear forwards';
    b.setAttribute('data-name',c.name);
    b.onclick=function(e){popBalloon(b,c,target,e);};
    area.appendChild(b);spawned++;
  },800);
}
function popBalloon(b,color,target,e){
  if(balloonBusy)return;
  if(color.name===target.name){
    balloonBusy=true;
    var rect=b.getBoundingClientRect();burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    b.style.display='none';balloonRound++;balloonScore++;
    setInstr('Pop the '+target.name+' balloon! 🎈','打对啦！这是 '+target.name+'！',starsBar(5,balloonRound));
    playCorrect();speak(target.name,function(){balloonBusy=false;nextBalloonRound();});
  }else{
    playWrong();b.style.animation='shake .4s ease';
    setTimeout(function(){b.style.animation='floatUp 4s linear forwards';},500);
  }
}

// === INIT ===
document.getElementById('startIcons').innerHTML=COLORS.map(function(c){return '<div style="width:50px;height:50px;border-radius:50%;background:'+c.clr+'"></div>';}).join('');
</script>
</body>
</html>
