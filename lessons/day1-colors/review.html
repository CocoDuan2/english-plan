<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 1 Review - Colors</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px 20px 80px}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{
  font-size:20px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,#ff6b9d,#ffa07a);
  border-radius:25px;
  padding:12px 24px;
  display:inline-block;
  box-shadow:0 6px 20px rgba(255,107,157,.35);
  margin:8px 0;
  letter-spacing:.5px;
  position:relative;
  transform:translateY(0);
  transition:transform .2s,box-shadow .2s;
}
.tz::after{
  content:'';
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  height:4px;
  background:rgba(255,107,157,.2);
  border-radius:2px;
  filter:blur(3px);
}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
  .te{font-size:26px}
  .tz{font-size:18px;padding:10px 20px}
  .bbl{font-size:20px}
  .pr img{width:65px}
  .sb{font-size:22px}
}
</style>
</head>
<body>
<div id="m0" class="mod on"></div>
<div id="m1" class="mod"></div>
<div id="m2" class="mod"></div>
<div id="m3" class="mod"></div>
<div id="m4" class="mod"></div>
<div id="m5" class="mod"></div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var W=[
  {w:'red',clr:'#e74c3c',svg:'<circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="95" cy="32" rx="14" ry="9" fill="#4CAF50"/><circle cx="68" cy="78" r="5" fill="#fff"/><circle cx="92" cy="78" r="5" fill="#fff"/><circle cx="69" cy="79" r="2.5" fill="#333"/><circle cx="93" cy="79" r="2.5" fill="#333"/><path d="M70 95 Q80 103 90 95" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>'},
  {w:'blue',clr:'#3498db',svg:'<rect x="20" y="65" width="120" height="55" rx="10" fill="#3498db"/><rect x="45" y="40" width="70" height="35" rx="8" fill="#3498db"/><circle cx="50" cy="120" r="14" fill="#333"/><circle cx="110" cy="120" r="14" fill="#333"/><circle cx="50" cy="120" r="6" fill="#999"/><circle cx="110" cy="120" r="6" fill="#999"/><rect x="55" y="50" width="22" height="18" rx="3" fill="#B3E5FC"/><rect x="83" y="50" width="22" height="18" rx="3" fill="#B3E5FC"/>'},
  {w:'yellow',clr:'#f1c40f',svg:'<circle cx="80" cy="80" r="42" fill="#f1c40f"/><circle cx="68" cy="72" r="5" fill="#fff"/><circle cx="92" cy="72" r="5" fill="#fff"/><circle cx="69" cy="73" r="2.5" fill="#333"/><circle cx="93" cy="73" r="2.5" fill="#333"/><path d="M70 88 Q80 96 90 88" stroke="#f39c12" stroke-width="3" fill="none" stroke-linecap="round"/>'},
  {w:'green',clr:'#27ae60',svg:'<ellipse cx="80" cy="70" rx="48" ry="45" fill="#27ae60"/><path d="M40 70 Q40 100 80 110 Q120 100 120 70" fill="#229954"/><circle cx="68" cy="62" r="5" fill="#fff"/><circle cx="92" cy="62" r="5" fill="#fff"/><circle cx="69" cy="63" r="2.5" fill="#333"/><circle cx="93" cy="63" r="2.5" fill="#333"/>'},
  {w:'orange',clr:'#e67e22',svg:'<circle cx="80" cy="85" r="50" fill="#e67e22"/><ellipse cx="80" cy="32" rx="6" ry="4" fill="#4CAF50"/><circle cx="68" cy="78" r="5" fill="#fff"/><circle cx="92" cy="78" r="5" fill="#fff"/><circle cx="69" cy="79" r="2.5" fill="#333"/><circle cx="93" cy="79" r="2.5" fill="#333"/><path d="M70 95 Q80 103 90 95" stroke="#d35400" stroke-width="3" fill="none" stroke-linecap="round"/>'}
];
var actx,curM=0;
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function speak(t){var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';var a=new Audio(primary);a.play().catch(function(){var b=new Audio(fallback);b.play().catch(function(){})})}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});document.getElementById('m'+curM).classList.add('on');document.getElementById('pg').textContent=(curM+1)+'/6';document.getElementById('pBtn').disabled=curM===0;var nb=document.getElementById('nBtn');if(curM===0){nb.textContent='Start!';nb.disabled=false}else if(curM>=5){nb.textContent='Done';nb.disabled=true}else{nb.textContent='Next ▶';nb.disabled=false}if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();}

document.getElementById('m0').innerHTML='<img src="'+PP+'peppa-pig-happy-standing.png" width="140" style="margin-bottom:16px"><div style="display:flex;gap:12px;justify-content:center;margin:12px 0">'+W.map(function(x){return '<svg width="60" height="60" viewBox="0 0 160 160">'+x.svg+'</svg>'}).join('')+'</div><div style="font-size:28px;font-weight:900;color:#e91e8c">Let\'s Play!</div>';

var lnC=0,lnB=false;
function initM1(){
  lnC=0;lnB=false;
  var h='<div class="top"><div class="te">Learn Colors!</div><div class="tz">👆 点一点，认识颜色！</div><div class="sb" id="m1s">'+stars(0,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'peppa-pig-red-polka-dot-dress.png"><div class="bbl">Tap to learn!</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center">';
  for(var i=0;i<5;i++){
    h+='<div id="lc'+i+'" onclick="lnTap('+i+')" style="width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.1)"><svg width="75" height="75" viewBox="0 0 160 160" style="opacity:0" id="lci'+i+'">'+W[i].svg+'</svg></div>';
  }
  h+='</div>';
  document.getElementById('m1').innerHTML=h;
}
function lnTap(i){
  var peppaImg=document.querySelector("#m1 .pr img");

  if(lnB)return;
  lnB=true;
  var card=document.getElementById('lc'+i);
  if(card.style.background==='rgb(255, 255, 255)'){
    speak(W[i].w);
    lnB=false;
    return;
  }
  card.style.background='#fff';
  if(peppaImg){peppaImg.classList.add("peppa-jumping");setTimeout(function(){peppaImg.classList.remove("peppa-jumping")},600)}
  document.getElementById('lci'+i).style.opacity='1';
  lnC++;
  document.getElementById('m1s').innerHTML=stars(lnC,5);
  playOk();
  speak(W[i].w);
  setTimeout(function(){lnB=false},1200);
}

var pjS=0,pjI=0,pjB=false,pjOrd=[];
function initM2(){
  pjS=0;pjI=0;pjB=false;
  pjOrd=shuffle([0,1,2,3,4]);
  renderPJ();
}
function renderPJ(){
  if(pjI>=5){
    setTimeout(function(){goM(1)},800);
    return;
  }
  var tgt=W[pjOrd[pjI]];
  var h='<div class="top"><div class="te">Jump in Puddles!</div><div class="tz">💦 跳进'+tgt.w+'的泥坑！</div><div class="sb">'+stars(pjS,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'peppa-and-george-ooo.png"><div class="bbl">Jump in '+tgt.w+'!</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center">';
  for(var j=0;j<5;j++){
    h+='<div onclick="pjTap('+j+')" style="width:105px;height:105px;border-radius:50%;background:'+W[j].clr+';cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.15)"></div>';
  }
  h+='</div>';
  document.getElementById('m2').innerHTML=h;
  speak(tgt.w);
}
function pjTap(j){
  var peppaImg=document.querySelector("#m2 .pr img");

  if(pjB)return;
  pjB=true;
  if(j===pjOrd[pjI]){
    if(peppaImg){peppaImg.classList.add("peppa-jumping");setTimeout(function(){peppaImg.classList.remove("peppa-jumping")},600)}
    playOk();
    pjS++;
    pjI++;
    setTimeout(function(){pjB=false;renderPJ()},1200);
  }else{
    playNo();
    setTimeout(function(){pjB=false},800);
  }
}

var lsS=0,lsI=0,lsB=false,lsOrd=[];
function initM3(){
  lsS=0;lsI=0;lsB=false;
  lsOrd=shuffle([0,1,2,3,4]);
  renderLS();
}
function renderLS(){
  if(lsI>=5){
    setTimeout(function(){goM(1)},800);
    return;
  }
  var tgt=W[lsOrd[lsI]];
  var h='<div class="top"><div class="te">Listen & Find!</div><div class="tz">👂 听一听，找出来！</div><div class="sb">'+stars(lsS,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'george-standing.png"><div class="bbl">Listen!</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:12px">';
  for(var j=0;j<5;j++){
    h+='<div onclick="lsTap('+j+')" style="width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.1)"><svg width="70" height="70" viewBox="0 0 160 160">'+W[j].svg+'</svg></div>';
  }
  h+='</div>';
  document.getElementById('m3').innerHTML=h;
  setTimeout(function(){speak(tgt.w)},300);
}
function lsTap(j){
  var peppaImg=document.querySelector("#m3 .pr img");

  if(lsB)return;
  lsB=true;
  if(j===lsOrd[lsI]){
    if(peppaImg){peppaImg.classList.add("peppa-jumping");setTimeout(function(){peppaImg.classList.remove("peppa-jumping")},600)}
    playOk();
    lsS++;
    lsI++;
    setTimeout(function(){lsB=false;renderLS()},1200);
  }else{
    playNo();
    setTimeout(function(){lsB=false},800);
  }
}

var fCards=[],fFlip=[],fMatch=0,fB=false;
function initM4(){
  fMatch=0;fFlip=[];fB=false;
  var pairs=[];
  for(var i=0;i<4;i++){
    pairs.push({idx:i,w:W[i].w,svg:W[i].svg},{idx:i,w:W[i].w,svg:W[i].svg});
  }
  fCards=shuffle(pairs);
  var h='<div class="top"><div class="te">Memory Match!</div><div class="tz">🎴 翻牌配对！</div><div class="sb" id="m4s">'+stars(0,4)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'candy-cat-green-dress.png"><div class="bbl">Find pairs!</div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:400px">';
  for(var i=0;i<8;i++){
    h+='<div id="fc'+i+'" onclick="fTap('+i+')" style="width:85px;height:85px;border-radius:14px;background:#F9ADC7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">❓</div>';
  }
  h+='</div>';
  document.getElementById('m4').innerHTML=h;
}
function fTap(i){
  if(fB||fFlip.length>=2)return;
  var el=document.getElementById('fc'+i);
  if(el.classList.contains('done')||fFlip.indexOf(i)>=0)return;
  el.innerHTML='<svg width="55" height="55" viewBox="0 0 160 160">'+fCards[i].svg+'</svg>';
  el.style.background='#fff';
  fFlip.push(i);
  speak(fCards[i].w);
  if(fFlip.length===2){
    fB=true;
    var a=fFlip[0],b=fFlip[1];
    if(fCards[a].idx===fCards[b].idx){
      var peppaImg=document.querySelector("#m4 .pr img");
      if(peppaImg){peppaImg.classList.add("peppa-jumping");setTimeout(function(){peppaImg.classList.remove("peppa-jumping")},600)}
      playOk();
      fMatch++;
      document.getElementById('m4s').innerHTML=stars(fMatch,4);
      document.getElementById('fc'+a).classList.add('done');
      document.getElementById('fc'+b).classList.add('done');
      fFlip=[];
      fB=false;
      if(fMatch>=4){
        setTimeout(function(){goM(1)},1200);
      }
    }else{
      playNo();
      setTimeout(function(){
        document.getElementById('fc'+a).innerHTML='❓';
        document.getElementById('fc'+a).style.background='#F9ADC7';
        document.getElementById('fc'+b).innerHTML='❓';
        document.getElementById('fc'+b).style.background='#F9ADC7';
        fFlip=[];
        fB=false;
      },1200);
    }
  }
}

function initM5(){
  document.getElementById('m5').innerHTML='<img src="'+PP+'peppa-family-group-outdoors.png" width="120" style="margin-bottom:10px"><div style="font-size:42px;font-weight:900;color:#e91e8c;margin:10px 0">All Done!</div><div style="font-size:24px;color:#666;margin:6px 0">What a colorful day!</div><div style="font-size:28px;margin:10px 0">'+stars(5,5)+'</div><button onclick="location.reload()" style="margin-top:16px;padding:14px 32px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(249,173,199,.4)">Play Again 🔄</button>';
}

goM(0);
</script>
</body>
</html>
