<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 4 - Food</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 74px;text-align:center}
.sl.on{display:flex}
.bg-title{background:linear-gradient(165deg,#fff4e0,#ffe8cc)}
.bg-hello{background:linear-gradient(180deg,#ffe9c8,#dcedc8)}
.bg-yesterday{background:linear-gradient(160deg,#d6ecff,#e3f2fd)}
.bg-apple{background:linear-gradient(160deg,#ffe0e0,#fff0f0)}
.bg-banana{background:linear-gradient(160deg,#fff9c4,#fffde7)}
.bg-milk{background:linear-gradient(160deg,#e8f5e9,#f1f8e9)}
.bg-bread{background:linear-gradient(160deg,#ffe0b2,#fff3e0)}
.bg-egg{background:linear-gradient(160deg,#fff8e1,#fffde7)}
.bg-basket{background:linear-gradient(160deg,#f3e5f5,#fce4ec)}
.bg-team{background:linear-gradient(160deg,#fff4e0,#ffe0b2)}
.bg-bye{background:linear-gradient(180deg,#81c784,#aed581 58%,#dce775)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:6px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-transform:lowercase;color:#2c3e50;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pr img{width:85px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;font-size:26px;font-weight:700;color:#e67e22;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj{margin:8px 0}
.review-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:760px;margin-top:14px}
.review-card{width:180px;min-height:180px;background:#fff;border-radius:20px;padding:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;justify-content:center}
.review-word{font-size:34px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:6px}
.basket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:620px;margin-top:8px}
.b-btn{width:156px;height:156px;border:none;border-radius:20px;background:linear-gradient(145deg,#d7ccc8,#bcaaa4);color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;transition:.3s}
.b-btn span{font-size:24px;font-weight:900;text-transform:lowercase;opacity:0;transform:translateY(10px);transition:.3s}
.b-btn svg{opacity:0;transform:scale(.6);transition:.3s}
.b-btn.on span,.b-btn.on svg{opacity:1;transform:translateY(0) scale(1)}
.b-btn.on{background:#fff;color:#2c3e50;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:900px;margin-top:10px}
.ti{background:#fff;border-radius:16px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.ti div{font-size:30px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:#f9adc7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:126px;right:16px;z-index:199;width:330px;max-height:42vh;background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 16px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#f9adc7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.word{font-size:56px;letter-spacing:2px}
  .sent{font-size:24px}
  .bbl{font-size:20px;padding:8px 14px}
  .pr img{width:65px}
  .obj-wrap svg{width:130px;height:130px}
  .reveal-box{width:100px;height:100px}
  .reveal-box svg{width:65px;height:65px}
}
.word{font-size:72px}
}
.sent{font-size:38px}.reveal-box{width:150px;height:150px}}
  .sub{font-size:24px}
  .word{font-size:100px}
  .sent{font-size:38px}
  .obj svg{width:200px;height:200px}
  .review-card{width:200px}
  .b-btn{width:170px;height:170px}
}

@media(max-width:480px){
  .ttl{font-size:30px}
  .sub{font-size:16px}
  .word{font-size:56px;letter-spacing:2px}
  .sent{font-size:24px}
  .bbl{font-size:20px;padding:8px 14px}
  .pr img{width:60px}
  .obj-wrap svg{width:130px;height:130px}
  .reveal-box{width:95px;height:95px}
  .reveal-box svg{width:60px;height:60px}
  .grid,.team-grid,.clinic-grid,.basket-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;max-width:320px!important}
  .gi svg,.ti svg,.ci svg,.bi svg{width:70px!important;height:70px!important}
  .gi div,.ti div,.ci div,.bi div{font-size:20px!important}
}
@media(min-width:481px) and (max-width:767px){
  .ttl{font-size:36px}
  .word{font-size:72px}
  .grid,.team-grid,.clinic-grid,.basket-grid{grid-template-columns:repeat(3,1fr)!important;max-width:420px!important}
  .gi svg,.ti svg,.ci svg,.bi svg{width:80px!important;height:80px!important}
}
@media(min-width:768px){
  .word{font-size:100px}
  .sent{font-size:38px}
  .reveal-box{width:150px;height:150px}
}
</style>
</head>
<body>
<div class="deck">
  <!-- Slide 1: Title — Mummy Pig + food SVGs -->
  <div class="sl bg-title on">
    <img src="../../assets/peppa/mummy-pig-standing-grass.png" width="140" alt="Mummy Pig">
    <div class="ttl">Peppa's Picnic</div>
    <div style="display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;justify-content:center;max-width:560px">
      <svg width="90" height="90" viewBox="0 0 160 160"><circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/></svg>
      <svg width="90" height="90" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="38" ry="28" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="30" ry="20" fill="#ffe066"/><rect x="72" y="42" width="6" height="20" rx="3" fill="#8d6e63"/></svg>
      <svg width="90" height="90" viewBox="0 0 160 160"><rect x="42" y="50" width="76" height="68" rx="10" fill="#fff"/><rect x="42" y="50" width="76" height="22" rx="10" fill="#42a5f5"/><text x="80" y="100" text-anchor="middle" font-size="22" font-weight="900" fill="#42a5f5">MILK</text></svg>
      <svg width="90" height="90" viewBox="0 0 160 160"><rect x="30" y="58" width="100" height="60" rx="18" fill="#e6a84c"/><rect x="30" y="58" width="100" height="30" rx="18" fill="#d4943c"/><circle cx="55" cy="78" r="3" fill="#c68030"/><circle cx="80" cy="82" r="3" fill="#c68030"/><circle cx="105" cy="78" r="3" fill="#c68030"/></svg>
      <svg width="90" height="90" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="36" ry="40" fill="#fff8e1"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/></svg>
    </div>
  </div>

  <!-- Slide 2: Hello — George invites to picnic, image-led -->
  <div class="sl bg-hello">
    <img src="../../assets/peppa/george_pig_dinosaur.png" width="140" alt="George with dinosaur">
    <div class="ttl">Picnic Time!</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:14px">
      <img src="../../assets/peppa/peppa-pig-happy-standing.png" width="85" alt="Peppa">
      <img src="../../assets/peppa/daddy-pig-standing.png" width="85" alt="Daddy">
      <img src="../../assets/peppa/emily-elephant-standing.png" width="85" alt="Emily">
    </div>
    <div class="sent" style="margin-top:14px">Yummy food for everyone!</div>
  </div>

  <!-- Slide 3: Yesterday Review — body parts quick recall -->
  <div class="sl bg-yesterday">
    <div class="pr"><img src="../../assets/peppa/peppa_pig_bicycle.png" alt="Peppa bike"><div class="bbl">Yesterday Review!</div></div>
    <div class="review-row">
      <div class="review-card">
        <svg width="110" height="110" viewBox="0 0 160 160"><circle cx="80" cy="82" r="52" fill="#ffd6b5"/><circle cx="63" cy="71" r="3" fill="#333"/><circle cx="99" cy="71" r="3" fill="#333"/><path d="M62 112 Q80 126 98 112" stroke="#e57373" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
        <div class="review-word">head</div>
      </div>
      <div class="review-card">
        <svg width="110" height="110" viewBox="0 0 160 160"><ellipse cx="52" cy="78" rx="20" ry="14" fill="#fff"/><ellipse cx="108" cy="78" rx="20" ry="14" fill="#fff"/><circle cx="52" cy="80" r="6" fill="#333"/><circle cx="108" cy="80" r="6" fill="#333"/></svg>
        <div class="review-word">eyes</div>
      </div>
      <div class="review-card">
        <svg width="110" height="110" viewBox="0 0 160 160"><path d="M58 106 Q80 132 102 106" stroke="#e53935" stroke-width="9" fill="none" stroke-linecap="round"/></svg>
        <div class="review-word">mouth</div>
      </div>
    </div>
  </div>

  <!-- Slide 4: apple — Mummy Pig -->
  <div class="sl bg-apple">
    <div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl">I like apple!</div></div>
    <div class="obj"><svg width="190" height="190" viewBox="0 0 160 160"><circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/><circle cx="65" cy="78" r="4" fill="#fff" opacity=".3"/></svg></div>
    <div class="word">apple</div>
  </div>

  <!-- Slide 5: banana — Daddy Pig -->
  <div class="sl bg-banana">
    <div class="pr"><img src="../../assets/peppa/daddy-pig-walking.png" alt="Daddy"><div class="bbl">I like banana!</div></div>
    <div class="obj"><svg width="190" height="190" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/><rect x="72" y="38" width="6" height="24" rx="3" fill="#8d6e63"/><circle cx="80" cy="88" r="2" fill="#c68030"/></svg></div>
    <div class="word">banana</div>
  </div>

  <!-- Slide 6: milk — Emily Elephant -->
  <div class="sl bg-milk">
    <div class="pr"><img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily"><div class="bbl">I like milk!</div></div>
    <div class="obj"><svg width="190" height="190" viewBox="0 0 160 160"><rect x="46" y="48" width="68" height="76" rx="10" fill="#fff"/><rect x="46" y="48" width="68" height="24" rx="10" fill="#42a5f5"/><rect x="56" y="36" width="48" height="18" rx="6" fill="#e3f2fd"/><text x="80" y="106" text-anchor="middle" font-size="20" font-weight="900" fill="#42a5f5">MILK</text></svg></div>
    <div class="word">milk</div>
  </div>

  <!-- Slide 7: bread — Candy Cat -->
  <div class="sl bg-bread">
    <div class="pr"><img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy"><div class="bbl">I like bread!</div></div>
    <div class="obj"><svg width="190" height="190" viewBox="0 0 160 160"><rect x="30" y="56" width="100" height="64" rx="20" fill="#e6a84c"/><rect x="30" y="56" width="100" height="32" rx="20" fill="#d4943c"/><circle cx="55" cy="78" r="3" fill="#c68030"/><circle cx="80" cy="82" r="3" fill="#c68030"/><circle cx="105" cy="78" r="3" fill="#c68030"/></svg></div>
    <div class="word">bread</div>
  </div>

  <!-- Slide 8: egg — George -->
  <div class="sl bg-egg">
    <div class="pr"><img src="../../assets/peppa/george-standing.png" alt="George"><div class="bbl">I like egg!</div></div>
    <div class="obj"><svg width="190" height="190" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="88" rx="32" ry="38" fill="#fffde7"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/><circle cx="74" cy="78" r="3" fill="#fff" opacity=".4"/></svg></div>
    <div class="word">egg</div>
  </div>

  <!-- Slide 9: Basket Reveal — tap to open picnic basket items -->
  <div class="sl bg-basket">
    <div class="pr"><img src="../../assets/peppa/peppa_pig_arms_open.png" alt="Peppa"><div class="bbl" id="basketBubble">Open the basket!</div></div>
    <div class="basket-grid">
      <button class="b-btn" id="bb0" onclick="basketTap(0)"><svg width="86" height="86" viewBox="0 0 160 160"><circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/></svg><span>apple</span></button>
      <button class="b-btn" id="bb1" onclick="basketTap(1)"><svg width="86" height="86" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/></svg><span>banana</span></button>
      <button class="b-btn" id="bb2" onclick="basketTap(2)"><svg width="86" height="86" viewBox="0 0 160 160"><rect x="46" y="48" width="68" height="76" rx="10" fill="#fff"/><rect x="46" y="48" width="68" height="24" rx="10" fill="#42a5f5"/></svg><span>milk</span></button>
      <button class="b-btn" id="bb3" onclick="basketTap(3)"><svg width="86" height="86" viewBox="0 0 160 160"><rect x="30" y="56" width="100" height="64" rx="20" fill="#e6a84c"/><rect x="30" y="56" width="100" height="32" rx="20" fill="#d4943c"/></svg><span>bread</span></button>
      <button class="b-btn" id="bb4" onclick="basketTap(4)"><svg width="86" height="86" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/></svg><span>egg</span></button>
    </div>
  </div>

  <!-- Slide 10: All Together — food grid -->
  <div class="sl bg-team">
    <img src="../../assets/peppa/peppa-and-george-ooo.png" width="130" alt="Peppa and George">
    <div class="ttl" style="font-size:36px">Picnic Food!</div>
    <div class="team-grid">
      <div class="ti"><svg width="100" height="100" viewBox="0 0 160 160"><circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/></svg><div>apple</div></div>
      <div class="ti"><svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/><rect x="72" y="38" width="6" height="24" rx="3" fill="#8d6e63"/></svg><div>banana</div></div>
      <div class="ti"><svg width="100" height="100" viewBox="0 0 160 160"><rect x="46" y="48" width="68" height="76" rx="10" fill="#fff"/><rect x="46" y="48" width="68" height="24" rx="10" fill="#42a5f5"/></svg><div>milk</div></div>
      <div class="ti"><svg width="100" height="100" viewBox="0 0 160 160"><rect x="30" y="56" width="100" height="64" rx="20" fill="#e6a84c"/><rect x="30" y="56" width="100" height="32" rx="20" fill="#d4943c"/></svg><div>bread</div></div>
      <div class="ti"><svg width="100" height="100" viewBox="0 0 160 160"><ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/></svg><div>egg</div></div>
    </div>
  </div>

  <!-- Slide 11: Bye — picnic celebration -->
  <div class="sl bg-bye">
    <img src="../../assets/peppa/peppa-family-group-outdoors.png" width="160" alt="Peppa family picnic">
    <div class="ttl" style="color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.3)">Yummy Picnic!</div>
    <div class="sub" style="color:rgba(255,255,255,.92);font-size:22px;font-weight:700;margin-top:6px">I like apple, banana, milk, bread, egg!</div>
  </div>
</div>

<button class="fab" id="F" onclick="tn()">&#x1F4CB;</button>
<div class="pop" id="P"><div id="B"></div></div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
  <div class="np" id="pg">1/11</div>
  <button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>

<script>
var notes={
"0":"Title page: image-first, no word wall. Let kids point at food SVGs. Mummy Pig leads today's picnic story.",
"1":"Story setup: George brings dinosaur to picnic. Friends join. Keep playful, no sentence drills yet.",
"2":"Yesterday review: 3 body parts quick recall. Teacher points, kids say 'This is my head/eyes/mouth'. 2 min max.",
"3":"apple: Teacher says 'I like apple!' Kids repeat 3x. Point to the red color.",
"4":"banana: 'I like banana!' Repeat. Talk about yellow color.",
"5":"milk: 'I like milk!' Repeat. Point to the blue carton.",
"6":"bread: 'I like bread!' Repeat. Talk about the brown color.",
"7":"egg: 'I like egg!' Repeat. Point to the yolk.",
"8":"Basket reveal: Teacher taps each basket square to reveal food. Ask 'What is it?' before tapping.",
"9":"All Together: Random point and ask. Mix up order. Ask 'Do you like ___?'",
"10":"Celebrate! Say the full sentence chain once together."
};

var foodWords=["apple","banana","milk","bread","egg"];

function basketTap(i){
  var el=document.getElementById('bb'+i);
  if(!el||el.classList.contains('on'))return;
  el.classList.add('on');
  document.getElementById('basketBubble').textContent='I like '+foodWords[i]+'!';
}

var cur=0,total=11,open=false;
function goTo(n){
  if(n<0||n>=total)return;
  document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.sl')[n].classList.add('on');
  cur=n;
  document.getElementById('pg').textContent=(cur+1)+'/'+total;
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===total-1){xb.textContent='Done';xb.disabled=true}else{xb.textContent='Next \u25B6';xb.disabled=false}
  document.getElementById('B').innerHTML=notes[cur]||'';
}
function go(d){goTo(cur+d)}
function tn(){open=!open;document.getElementById('P').classList.toggle('on',open);document.getElementById('F').classList.toggle('on',open)}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});
document.addEventListener('click',function(e){
  if(open&&!e.target.closest('.pop')&&!e.target.closest('.fab')){
    open=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on');
  }
});
goTo(0);
</script>
</body>
</html>
