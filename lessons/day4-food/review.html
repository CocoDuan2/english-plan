<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 4 - Food (Review)</title>
<style>
:root{--tip-accent:#e67e22;--tip-bg:#fff4e0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#ffe9c8 0%,#fff4e0 50%,#dcedc8 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:18px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:38px;background:linear-gradient(135deg,#f9adc7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(233,30,140,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
/* Module 1: Learn cards */
.learn-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px;margin-top:12px}
.flip-card{width:105px;height:130px;perspective:600px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transition:transform .5s;transform-style:preserve-3d}
.flip-card.on .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.flip-front{background:linear-gradient(145deg,#d7ccc8,#bcaaa4);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.flip-front::after{content:'?';font-size:40px;font-weight:900;color:#fff;opacity:.6}
.flip-back{background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.1);transform:rotateY(180deg)}
.flip-back div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:4px}
/* Module 1b: body micro-review */
.body-quick{width:100%;max-width:500px;background:rgba(255,255,255,.8);border-radius:20px;padding:12px 10px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.bq-title{font-size:24px;font-weight:900;color:#2c3e50}
.bq-row{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.bq-btn{width:100px;height:100px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.bq-btn div{font-size:18px;font-weight:800;color:#2c3e50}
.bq-btn.good{outline:4px solid #66bb6a}
.bq-btn.bad{outline:4px solid #ef5350}
/* Module 2: Feed the friends */
.feed-area{width:100%;max-width:500px}
.feed-friend{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.85);border-radius:20px;padding:12px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.feed-friend img{width:80px;height:auto}
.feed-want{font-size:28px;font-weight:900;color:#e67e22}
.feed-opts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.feed-btn{width:110px;height:110px;border:none;border-radius:18px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.feed-btn div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.feed-btn.good{outline:4px solid #66bb6a}
.feed-btn.bad{outline:4px solid #ef5350}
/* Module 3: Listen 3-choice */
.listen-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:500px}
.listen-card{width:145px;min-height:170px;background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.listen-card div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:6px}
.listen-card.good{outline:4px solid #66bb6a}
.listen-card.bad{outline:4px solid #ef5350}
/* Module 4: Shopping list match */
.shop-area{width:100%;max-width:500px;background:rgba(255,255,255,.84);border-radius:20px;padding:14px 10px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.shop-list{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:60px;margin-bottom:10px}
.shop-tag{padding:8px 16px;border-radius:12px;font-size:22px;font-weight:900;color:#fff;background:#e67e22;opacity:.4;transition:.3s}
.shop-tag.done{opacity:1;background:#66bb6a}
.shop-shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.shop-item{height:110px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.shop-item div{font-size:18px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.shop-item.good{outline:4px solid #66bb6a}
.shop-item.bad{outline:4px solid #ef5350}
.shop-item.bought{opacity:.35;pointer-events:none}
/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#f9adc7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}

  .listen-card{width:170px}
  .feed-btn{width:120px;height:120px}
}

@media(max-width:480px){
  .main{max-width:100%}
  .en{font-size:22px}
  .zh{font-size:16px;padding:4px 10px}
  .stars{font-size:18px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:8px 12px}
  .start-btn{font-size:26px;padding:16px 44px}
  .face-wrap{width:220px;height:220px}
  .spot{min-width:60px;min-height:60px}
  .learn-card{width:80px;height:80px}
  .learn-card div{font-size:16px!important}
  .listen-card{width:160px;min-height:180px}
  .listen-card img{width:72px!important}
  .aq-btn{width:80px;height:80px}
  .doc-btn{height:90px;font-size:16px!important}
  .seq-dot{width:70px;height:70px}
  .seq-btn{height:76px;font-size:16px!important}
}
@media(min-width:481px) and (max-width:767px){
  .main{max-width:560px}
  .face-wrap{width:260px;height:260px}
  .listen-card{width:200px}
}

@media(min-width:768px){.main{max-width:800px}.listen-card{width:240px}.face-wrap{width:360px;height:360px}}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Peppa's Picnic Game</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>
<script>
var PP='../../assets/peppa/';
var foods=[
  {w:'apple',svg:'<circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/>'},
  {w:'banana',svg:'<ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/><rect x="72" y="38" width="6" height="24" rx="3" fill="#8d6e63"/>'},
  {w:'milk',svg:'<rect x="46" y="48" width="68" height="76" rx="10" fill="#fff"/><rect x="46" y="48" width="68" height="24" rx="10" fill="#42a5f5"/><text x="80" y="106" text-anchor="middle" font-size="20" font-weight="900" fill="#42a5f5">MILK</text>'},
  {w:'bread',svg:'<rect x="30" y="56" width="100" height="64" rx="20" fill="#e6a84c"/><rect x="30" y="56" width="100" height="32" rx="20" fill="#d4943c"/><circle cx="55" cy="78" r="3" fill="#c68030"/><circle cx="80" cy="82" r="3" fill="#c68030"/><circle cx="105" cy="78" r="3" fill="#c68030"/>'},
  {w:'egg',svg:'<ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="88" rx="32" ry="38" fill="#fffde7"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/>'}
];
var bodyParts=[
  {w:'head',svg:'<circle cx="80" cy="82" r="52" fill="#ffd6b5"/><circle cx="63" cy="71" r="3" fill="#333"/><circle cx="99" cy="71" r="3" fill="#333"/>'},
  {w:'nose',svg:'<ellipse cx="80" cy="94" rx="16" ry="12" fill="#ffab91"/><circle cx="74" cy="94" r="3" fill="#8d6e63"/><circle cx="86" cy="94" r="3" fill="#8d6e63"/>'},
  {w:'mouth',svg:'<path d="M58 106 Q80 132 102 106" stroke="#e53935" stroke-width="9" fill="none" stroke-linecap="round"/>'}
];
function svgOf(arr,i,s){return '<svg width="'+(s||80)+'" height="'+(s||80)+'" viewBox="0 0 160 160">'+arr[i].svg+'</svg>'}
function fsvg(i,s){return svgOf(foods,i,s)}

var ac=null;
function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function tone(f,d){var c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.16)},200)}
function playNo(){tone(300,.3)}
function speak(t,cb){
  var u=t.indexOf(' ')>=0
    ?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web'
    :'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u),done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  a.onended=fin;a.onerror=fin;setTimeout(fin,4200);a.play().catch(fin);
}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'★':'☆';return s}
function setHead(en,zh,s){document.getElementById('en').textContent=en;document.getElementById('zh').textContent=zh;document.getElementById('st').textContent=s||''}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var cur=0,mods=['m0','m1','m2','m3','m4','m5'];

/* Module 0: Start page */
function init0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'george_pig_dinosaur.png" width="140" alt="George">'+
    '<div class="pr"><div class="bbl">Let\'s have a picnic!</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:430px">'+
      foods.map(function(_,i){return fsvg(i,72)}).join('')+
    '</div>'+
    '<button class="start-btn" onclick="audio();go(1)">Start!</button>';
  setHead("Peppa's Picnic Game",'点一点，开始野餐游戏！','');
}

/* Module 1: Body micro-review + flip card learn */
var bqOrder=[],bqIdx=0,bqScore=0,bqBusy=false,flipDone={};
function init1(){
  bqOrder=shuffle([0,1,2]);bqIdx=0;bqScore=0;bqBusy=false;flipDone={};
  document.getElementById('m1').innerHTML=
    '<div class="body-quick">'+
      '<div class="bq-title">Yesterday Quick Review</div>'+
      '<div style="font-size:20px;font-weight:800;color:#e67e22;margin-top:4px" id="bqPrompt"></div>'+
      '<div class="bq-row">'+bodyParts.map(function(p,i){
        return '<button class="bq-btn" id="bq'+i+'" onclick="tapBq('+i+')">'+
          svgOf(bodyParts,i,60)+'<div>'+p.w+'</div></button>';
      }).join('')+'</div>'+
    '</div>'+
    '<div class="pr"><img src="'+PP+'mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl" id="learnBbl">Tap to see food!</div></div>'+
    '<div class="learn-grid">'+foods.map(function(f,i){
      return '<div class="flip-card" id="fc'+i+'" onclick="tapFlip('+i+')">'+
        '<div class="flip-inner"><div class="flip-front"></div>'+
        '<div class="flip-back">'+fsvg(i,70)+'<div>'+f.w+'</div></div></div></div>';
    }).join('')+'</div>';
  askBq();
  setHead('Review + New Words','先复习昨天，再翻牌学新词！',stars(0,8));
}
function askBq(){
  if(bqIdx>=3){document.getElementById('bqPrompt').textContent='Great! Now flip the cards!';return}
  var w=bodyParts[bqOrder[bqIdx]].w;
  document.getElementById('bqPrompt').textContent='This is my '+w+'!';
  speak(w);
}
function tapBq(i){
  if(bqBusy||bqIdx>=3)return;bqBusy=true;
  var target=bqOrder[bqIdx],el=document.getElementById('bq'+i);
  if(i===target){
    playOk();bqScore++;bqIdx++;el.classList.add('good');
    setHead('Yesterday review','复习答对啦！',stars(bqScore,8));
    speak('This is my '+bodyParts[i].w,function(){setTimeout(function(){el.classList.remove('good');bqBusy=false;askBq()},500)});
  }else{
    playNo();el.classList.add('bad');
    speak(bodyParts[target].w,function(){setTimeout(function(){el.classList.remove('bad');bqBusy=false},350)});
  }
}
function tapFlip(i){
  var el=document.getElementById('fc'+i);
  if(el.classList.contains('on')){speak(foods[i].w);return}
  el.classList.add('on');flipDone[i]=true;bqScore++;playOk();
  document.getElementById('learnBbl').textContent='I like '+foods[i].w+'!';
  setHead('Flip and learn!','翻牌学新词！',stars(bqScore,8));
  speak('I like '+foods[i].w);
}

/* Module 2: Feed the Friends — character asks for food, pick correct one */
var feedChars=[
  {name:'Peppa',img:'peppa-pig-happy-standing.png'},
  {name:'George',img:'george-standing.png'},
  {name:'Daddy',img:'daddy-pig-standing.png'},
  {name:'Mummy',img:'mummy-pig-standing-grass.png'},
  {name:'Emily',img:'emily-elephant-standing.png'}
];
var feedOrder=[],feedIdx=0,feedScore=0,feedLock=false;
function init2(){
  feedOrder=shuffle([0,1,2,3,4]);feedIdx=0;feedScore=0;feedLock=false;
  document.getElementById('m2').innerHTML=
    '<div class="feed-area">'+
      '<div class="feed-friend" id="feedFriend"></div>'+
      '<div class="feed-opts" id="feedOpts"></div>'+
    '</div>';
  setupFeedRound();
}
function setupFeedRound(){
  if(feedIdx>=5){
    setHead('Feeding done!','喂朋友们完成啦！',stars(5,5));
    document.getElementById('feedFriend').innerHTML=
      '<img src="'+PP+'peppa-family-group-outdoors.png" width="120" alt="All">'+
      '<div style="font-size:26px;font-weight:900;color:#e67e22">Everyone is full!</div>';
    document.getElementById('feedOpts').innerHTML='';
    return;
  }
  var ti=feedOrder[feedIdx];
  var ch=feedChars[ti];
  document.getElementById('feedFriend').innerHTML=
    '<img src="'+PP+ch.img+'" alt="'+ch.name+'">'+
    '<div><div style="font-size:22px;font-weight:800;color:#607d8b">'+ch.name+'</div>'+
    '<div class="feed-want" id="feedWant">I like '+foods[ti].w+'!</div></div>';
  // pick 3 options: correct + 2 wrong
  var wrong=shuffle([0,1,2,3,4].filter(function(x){return x!==ti})).slice(0,2);
  var opts=shuffle([ti].concat(wrong));
  document.getElementById('feedOpts').innerHTML=opts.map(function(oi){
    return '<button class="feed-btn" id="fb'+oi+'" onclick="tapFeed('+oi+','+ti+')">'+
      fsvg(oi,70)+'<div>'+foods[oi].w+'</div></button>';
  }).join('');
  setHead('Feed the friends','给朋友们喂食物！',stars(feedScore,5));
  speak('I like '+foods[ti].w);
}
function tapFeed(picked,target){
  if(feedLock)return;feedLock=true;
  var el=document.getElementById('fb'+picked);
  if(picked===target){
    playOk();feedScore++;feedIdx++;el.classList.add('good');
    setHead('Yummy!','喂对啦！',stars(feedScore,5));
    speak(foods[picked].w,function(){setTimeout(function(){el.classList.remove('good');feedLock=false;setupFeedRound()},600)});
  }else{
    playNo();el.classList.add('bad');
    speak(foods[target].w,function(){setTimeout(function(){el.classList.remove('bad');feedLock=false},350)});
  }
}

/* Module 3: Listen and pick from 3 choices */
var liOrder=[],liIdx=0,liScore=0,liLock=false;
function init3(){
  liOrder=shuffle([0,1,2,3,4]);liIdx=0;liScore=0;liLock=false;
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'daddy-pig-walking.png" alt="Daddy"><div class="bbl" id="liBbl">Listen and find!</div></div>'+
    '<div class="listen-row" id="liRow"></div>';
  setupListenRound();
}
function setupListenRound(){
  if(liIdx>=5){
    setHead('Listening done!','听音找图完成啦！',stars(5,5));
    document.getElementById('liBbl').textContent='Perfect ears!';
    document.getElementById('liRow').innerHTML='';
    return;
  }
  var ti=liOrder[liIdx];
  var wrong=shuffle([0,1,2,3,4].filter(function(x){return x!==ti})).slice(0,2);
  var opts=shuffle([ti].concat(wrong));
  document.getElementById('liRow').innerHTML=opts.map(function(oi){
    return '<button class="listen-card" id="lc'+oi+'" onclick="tapListen('+oi+','+ti+')">'+
      fsvg(oi,80)+'<div>'+foods[oi].w+'</div></button>';
  }).join('');
  document.getElementById('liBbl').textContent='Find: '+foods[ti].w+'!';
  setHead('Listen and pick','听一听，点对的食物！',stars(liScore,5));
  speak('I like '+foods[ti].w);
}
function tapListen(picked,target){
  if(liLock)return;liLock=true;
  var el=document.getElementById('lc'+picked);
  if(picked===target){
    playOk();liScore++;liIdx++;el.classList.add('good');
    setHead('Good ears!','听对啦！',stars(liScore,5));
    speak(foods[picked].w,function(){setTimeout(function(){el.classList.remove('good');liLock=false;setupListenRound()},600)});
  }else{
    playNo();el.classList.add('bad');
    speak(foods[target].w,function(){setTimeout(function(){el.classList.remove('bad');liLock=false},350)});
  }
}

/* Module 4: Shopping List — Mummy reads list, kid taps items in order */
var shopOrder=[],shopIdx=0,shopScore=0,shopLock=false;
function init4(){
  shopOrder=shuffle([0,1,2,3,4]);shopIdx=0;shopScore=0;shopLock=false;
  var listHtml=shopOrder.map(function(si){
    return '<span class="shop-tag" id="stag'+si+'">'+foods[si].w+'</span>';
  }).join('');
  var shelfOrder=shuffle([0,1,2,3,4]);
  var shelfHtml=shelfOrder.map(function(si){
    return '<button class="shop-item" id="si'+si+'" onclick="tapShop('+si+')">'+
      fsvg(si,60)+'<div>'+foods[si].w+'</div></button>';
  }).join('');
  document.getElementById('m4').innerHTML=
    '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy"><div class="bbl" id="shopBbl">Shopping time!</div></div>'+
    '<div class="shop-area">'+
      '<div style="font-size:22px;font-weight:800;color:#2c3e50;margin-bottom:6px">Shopping List</div>'+
      '<div class="shop-list" id="shopList">'+listHtml+'</div>'+
      '<div class="shop-shelf">'+shelfHtml+'</div>'+
    '</div>';
  askShop();
}
function askShop(){
  if(shopIdx>=5){
    setHead('Shopping done!','购物清单完成啦！',stars(5,5));
    document.getElementById('shopBbl').textContent='All bought!';
    setTimeout(function(){go(1)},800);
    return;
  }
  var w=foods[shopOrder[shopIdx]].w;
  document.getElementById('shopBbl').textContent='Find: '+w+'!';
  setHead('Shopping list','按清单找食物！',stars(shopScore,5));
  speak(w);
}
function tapShop(i){
  if(shopLock)return;shopLock=true;
  var target=shopOrder[shopIdx];
  var el=document.getElementById('si'+i);
  if(i===target){
    playOk();shopScore++;el.classList.add('good');
    document.getElementById('stag'+i).classList.add('done');
    speak('I like '+foods[i].w,function(){
      setTimeout(function(){
        el.classList.remove('good');el.classList.add('bought');
        shopIdx++;shopLock=false;askShop();
      },500);
    });
  }else{
    playNo();el.classList.add('bad');
    speak(foods[target].w,function(){setTimeout(function(){el.classList.remove('bad');shopLock=false},350)});
  }
}

/* Module 5: Done page */
function init5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="198" alt="Peppa family">'+
    '<div class="bbl" style="font-size:30px;margin-top:10px">All Done!</div>'+
    '<div style="font-size:26px;font-weight:800;color:#e67e22;margin-top:10px">I like apple, banana, milk, bread, egg!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px" onclick="restart()">Play Again</button>';
  setHead('Great Job!','野餐游戏完成啦！',stars(6,6));
}

/* Navigation */
function restart(){
  document.getElementById(mods[cur]).classList.remove('on');
  cur=0;document.getElementById(mods[cur]).classList.add('on');
  init0();
  document.getElementById('pg').textContent='1/6';
  document.getElementById('pb').disabled=true;
  var xb=document.getElementById('xb');xb.textContent='Next ▶';xb.disabled=false;
}

var inits=[init0,init1,init2,init3,init4,init5];
function go(d){
  var n=cur+d;if(n<0||n>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=n;
  document.getElementById(mods[cur]).classList.add('on');
  inits[cur]();
  document.getElementById('pg').textContent=(cur+1)+'/6';
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===mods.length-1){xb.textContent='Done';xb.disabled=true}
  else{xb.textContent='Next ▶';xb.disabled=false}
}

init0();
</script>
