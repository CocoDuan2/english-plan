<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 28 - Body Game</title>
<style>
:root{--tip-accent:#42a5f5;--tip-bg:#e3f2fd}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#42a5f5 0%,#1e88e5 50%,#1565c0 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#42a5f5,#1e88e5);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(30,136,229,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.y-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:440px;margin-top:10px}
.y-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.y-card:active{transform:scale(.95)}
.y-card.correct{border-color:#66bb6a;background:#e8f5e9}
.y-card.wrong{border-color:#ef5350;background:#ffebee}
.y-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.mirror-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:440px;margin-top:10px}
.mirror-card{width:120px;height:120px;background:linear-gradient(145deg,#90caf9,#64b5f6);border-radius:18px;box-shadow:0 3px 10px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;border:3px solid transparent;position:relative}
.mirror-card:active{transform:scale(.95)}
.mirror-card.on{background:#fff}
.mirror-card::before{content:'💧';font-size:36px;position:absolute}
.mirror-card.on::before{display:none}
.mirror-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px;opacity:0;transition:.2s}
.mirror-card.on .lb{opacity:1}
.bag-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:440px;margin-top:10px}
.bag-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.bag-card:active{transform:scale(.95)}
.bag-card.correct{border-color:#66bb6a;background:#e8f5e9}
.bag-card.wrong{border-color:#ef5350;background:#ffebee}
.bag-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.bingo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:440px;margin-top:10px}
.bingo-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.bingo-card:active{transform:scale(.95)}
.bingo-card.marked{border-color:#fdd835;background:#fffde7}
.bingo-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.done-wrap img{width:160px;height:auto}
.done-ttl{font-size:48px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.done-msg{font-size:22px;color:#ffeaa7;text-align:center}
.play-again{font-size:28px;font-weight:700;padding:16px 48px;border:none;border-radius:32px;background:linear-gradient(135deg,#F9ADC7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(249,173,199,.4);margin-top:8px}
.play-again:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Doctor Checkup</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>
<script>
var PP='../../assets/peppa/';
var WORDS=[
  {w:'head',svg:'<circle cx="80" cy="80" r="50" fill="#ff9800"/><circle cx="65" cy="70" r="6" fill="#424242"/><circle cx="95" cy="70" r="6" fill="#424242"/><path d="M60 95 Q80 105 100 95" stroke="#424242" stroke-width="3" fill="none"/>'},
  {w:'eyes',svg:'<ellipse cx="55" cy="80" rx="22" ry="28" fill="#ab47bc"/><circle cx="55" cy="80" r="14" fill="#fff"/><circle cx="55" cy="80" r="8" fill="#424242"/><ellipse cx="105" cy="80" rx="22" ry="28" fill="#ab47bc"/><circle cx="105" cy="80" r="14" fill="#fff"/><circle cx="105" cy="80" r="8" fill="#424242"/>'},
  {w:'ears',svg:'<ellipse cx="40" cy="80" rx="18" ry="35" fill="#26c6da"/><ellipse cx="40" cy="80" rx="10" ry="25" fill="#80deea"/><ellipse cx="120" cy="80" rx="18" ry="35" fill="#26c6da"/><ellipse cx="120" cy="80" rx="10" ry="25" fill="#80deea"/>'},
  {w:'nose',svg:'<ellipse cx="80" cy="85" rx="28" ry="38" fill="#ef5350"/><ellipse cx="80" cy="75" rx="18" ry="28" fill="#e57373"/><ellipse cx="70" cy="75" rx="6" ry="10" fill="#c62828"/><ellipse cx="90" cy="75" rx="6" ry="10" fill="#c62828"/>'},
  {w:'mouth',svg:'<ellipse cx="80" cy="85" rx="40" ry="28" fill="#ec407a"/><path d="M50 80 Q80 95 110 80" stroke="#c2185b" stroke-width="3" fill="none"/><rect x="65" y="70" width="10" height="14" rx="2" fill="#fff"/><rect x="77" y="70" width="10" height="14" rx="2" fill="#fff"/>'}
];
var YESTERDAY=[
  {w:'cat',svg:'<ellipse cx="80" cy="100" rx="28" ry="18" fill="#ff9800"/><circle cx="80" cy="70" r="30" fill="#ff9800"/><path d="M50 50 L45 30 L55 45 Z" fill="#ff9800"/><path d="M110 50 L115 30 L105 45 Z" fill="#ff9800"/><circle cx="68" cy="65" r="5" fill="#424242"/>'},
  {w:'dog',svg:'<ellipse cx="80" cy="110" rx="32" ry="20" fill="#42a5f5"/><circle cx="80" cy="75" r="32" fill="#42a5f5"/><ellipse cx="60" cy="55" rx="12" ry="18" fill="#42a5f5"/><ellipse cx="100" cy="55" rx="12" ry="18" fill="#42a5f5"/><circle cx="70" cy="70" r="5" fill="#424242"/>'},
  {w:'bird',svg:'<circle cx="80" cy="85" r="28" fill="#ab47bc"/><circle cx="80" cy="60" r="20" fill="#ba68c8"/><path d="M45 75 L25 65 L35 80 L25 95 L45 85 Z" fill="#ab47bc"/><path d="M115 75 L135 65 L125 80 L135 95 L115 85 Z" fill="#ab47bc"/>'}
];
var ac=null,cur=0,tot=6,stars=0,busy=false;
function init(){
  ac=new (window.AudioContext||window.webkitAudioContext)();
  buildStart();
  buildYesterday();
  buildMirror();
  buildBag();
  buildBingo();
  buildDone();
  render();
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')go(-1);
    if(e.key==='ArrowRight')go(1);
  });
}
function buildStart(){
  var m=document.getElementById('m0');
  m.innerHTML='<div class="pr"><img src="'+PP+'mummy-pig.png" alt="Mummy"><div class="bbl">Let\\'s check your body!</div></div><img src="'+PP+'mummy-pig.png" width="140" alt="Mummy"><button class="start-btn" onclick="startGame()">Start!</button>';
}
function startGame(){
  if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();
  go(1);
}
function buildYesterday(){
  var m=document.getElementById('m1');
  var h='<div class="pr"><img src="'+PP+'mummy-pig.png" alt="Mummy"><div class="bbl">Yesterday animals!</div></div><div class="y-grid" id="y-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('y-grid');
  var q=shuffle(YESTERDAY.slice()).slice(0,3);
  var ans=q[0];
  q.forEach(d=>{
    var c=document.createElement('div');
    c.className='y-card';
    c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(busy)return;
      busy=true;
      if(d.w===ans.w){
        c.classList.add('correct');
        playOk();
        speak(d.w,()=>{
          stars++;
          updateStars();
          setTimeout(()=>{go(1);busy=false},800);
        });
      }else{
        c.classList.add('wrong');
        playNo();
        speak(ans.w,()=>{busy=false});
      }
    };
    g.appendChild(c);
  });
  setTimeout(()=>speak("I see a "+ans.w+"!"),600);
}
function buildMirror(){
  var m=document.getElementById('m2');
  var h='<div class="pr"><img src="'+PP+'daddy-pig.png" alt="Daddy"><div class="bbl">Wipe the mirror!</div></div><div class="mirror-grid" id="mirror-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('mirror-grid');
  WORDS.forEach(d=>{
    var c=document.createElement('div');
    c.className='mirror-card';
    c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(c.classList.contains('on'))return speak(d.w);
      c.classList.add('on');
      playOk();
      speak(d.w);
    };
    g.appendChild(c);
  });
}
function buildBag(){
  var m=document.getElementById('m3');
  var h='<div class="pr"><img src="'+PP+'candy-cat.png" alt="Candy"><div class="bbl">Find the tool!</div></div><div class="bag-grid" id="bag-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('bag-grid');
  var idx=0;
  function nextQ(){
    if(idx>=WORDS.length){
      setTimeout(()=>go(1),1200);
      return;
    }
    g.innerHTML='';
    var ans=WORDS[idx];
    var opts=shuffle([ans,...shuffle(WORDS.filter(x=>x.w!==ans.w)).slice(0,2)]);
    opts.forEach(d=>{
      var c=document.createElement('div');
      c.className='bag-card';
      c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
      c.onclick=()=>{
        if(busy)return;
        busy=true;
        if(d.w===ans.w){
          c.classList.add('correct');
          playOk();
          speak(d.w,()=>{
            stars++;
            updateStars();
            idx++;
            setTimeout(()=>{busy=false;nextQ()},800);
          });
        }else{
          c.classList.add('wrong');
          playNo();
          speak(ans.w,()=>{busy=false});
        }
      };
      g.appendChild(c);
    });
    setTimeout(()=>speak("This is my "+ans.w+"!"),600);
  }
  nextQ();
}
function buildBingo(){
  var m=document.getElementById('m4');
  var h='<div class="pr"><img src="'+PP+'peppa-pig.png" alt="Peppa"><div class="bbl">Mark the body part!</div></div><div class="bingo-grid" id="bingo-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('bingo-grid');
  var seq=shuffle(WORDS.slice());
  var idx=0;
  WORDS.forEach(d=>{
    var c=document.createElement('div');
    c.className='bingo-card';
    c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(busy||c.classList.contains('marked'))return;
      busy=true;
      if(d.w===seq[idx].w){
        c.classList.add('marked');
        playOk();
        speak(d.w,()=>{
          stars++;
          updateStars();
          idx++;
          if(idx>=seq.length){
            setTimeout(()=>go(1),1200);
          }else{
            setTimeout(()=>{busy=false;speak("This is my "+seq[idx].w+"!")},800);
          }
        });
      }else{
        playNo();
        speak(seq[idx].w,()=>{busy=false});
      }
    };
    g.appendChild(c);
  });
  setTimeout(()=>speak("This is my "+seq[0].w+"!"),600);
}
function buildDone(){
  var m=document.getElementById('m5');
  m.innerHTML='<div class="done-wrap"><img src="'+PP+'peppa-family.png" alt="Peppa Family"><div class="done-ttl">All Done!</div><div class="done-msg">You know your body! 🩺</div><button class="play-again" onclick="location.reload()">Play Again</button></div>';
}
function go(d){
  cur+=d;
  if(cur<0)cur=0;
  if(cur>=tot)cur=tot-1;
  render();
}
function render(){
  document.querySelectorAll('.mod').forEach((s,i)=>s.classList.toggle('on',i===cur));
  document.getElementById('pg').textContent=(cur+1)+'/'+tot;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===tot-1;
  var titles=['Doctor Checkup','昨天学的动物','擦镜子学词','医生包找工具','听音标记身体','完成啦'];
  document.getElementById('en').textContent=titles[cur]||'Doctor Checkup';
  document.getElementById('zh').textContent=['点开始玩','点一点,哪个是?','擦一擦,看看是什么','听一听,找对应的','听一听,点对应的',''][cur]||'';
  updateStars();
}
function updateStars(){
  var s='';
  for(var i=0;i<stars;i++)s+='⭐';
  document.getElementById('st').textContent=s;
}
function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function playOk(){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.frequency.setValueAtTime(523,ac.currentTime);
  o.frequency.setValueAtTime(659,ac.currentTime+.1);
  g.gain.setValueAtTime(.15,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+.3);
  o.start();o.stop(ac.currentTime+.3);
}
function playNo(){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.frequency.setValueAtTime(200,ac.currentTime);
  g.gain.setValueAtTime(.1,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+.2);
  o.start();o.stop(ac.currentTime+.2);
}
function speak(t,cb){
  var u='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  if(t.includes(' '))u='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
  var a=new Audio(u);
  var done=false;
  a.onended=()=>{if(!done){done=true;if(cb)cb()}};
  a.onerror=()=>{if(!done){done=true;if(cb)cb()}};
  a.play().catch(()=>{if(!done){done=true;if(cb)cb()}});
  setTimeout(()=>{if(!done){done=true;if(cb)cb()}},4000);
}
init();
</script>
</body>
</html>
