<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 24 - Music Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-music{background:linear-gradient(180deg,#FFE5B4,#FFD1DC)}
.bg-purple{background:linear-gradient(160deg,#e1bee7,#ce93d8)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0;justify-content:center}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.obj-wrap img{width:160px;height:auto}
.sound-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;margin:10px;display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .1s}
.sound-btn:active{transform:scale(.9)}
.btn-sing{background:linear-gradient(135deg,#ff6b9d,#ffa07a)}
.btn-dance{background:linear-gradient(135deg,#ba68c8,#9c27b0)}
.btn-clap{background:linear-gradient(135deg,#ffd54f,#ffb300)}
.btn-drum{background:linear-gradient(135deg,#ef5350,#e53935)}
.btn-piano{background:linear-gradient(135deg,#42a5f5,#1e88e5)}
.stage{position:relative;width:100%;max-width:600px;height:400px;background:linear-gradient(180deg,#FFE5B4 0%,#FFD1DC 100%);border-radius:20px;margin:20px 0;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:20px;padding:20px}
.music-item{cursor:pointer;transition:transform .2s;text-align:center}
.music-item:hover{transform:scale(1.1)}
.music-item img{width:100px;height:auto;margin-bottom:8px}
.music-item .label{font-size:22px;font-weight:700;color:#2c3e50}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px 0}
.grid-item{text-align:center}
.grid-item img{width:80px;height:auto;margin-bottom:8px}
.grid-item .label{font-size:24px;font-weight:700;color:#2c3e50}
.hello-img{width:110px;height:auto;margin:10px 0}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word{font-size:56px;letter-spacing:2px}
.sent{font-size:24px}
.bbl{font-size:20px;padding:8px 14px}
.pr img{width:65px}
.obj-wrap img{width:120px}
.sound-btn{width:80px;height:80px;font-size:36px}
.stage{height:300px;gap:15px}
.music-item img{width:70px}
.music-item .label{font-size:18px}
.grid{grid-template-columns:repeat(2,1fr);gap:15px}
.grid-item img{width:70px}
.grid-item .label{font-size:20px}
}
@media(min-width:481px) and (max-width:767px){
.word{font-size:72px}
.sent{font-size:28px}
}
@media(min-width:768px){
.word{font-size:100px}
.sent{font-size:38px}
}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Title -->
<div class="sl bg-pink on">
<div class="ttl">🎵 Music Time 🎹</div>
<div class="sub">Let's make music together!</div>
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" class="hello-img" alt="Peppa">
<div style="display:flex;gap:20px;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3a4.svg" width="60" alt="sing">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f483.svg" width="60" alt="dance">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f44f.svg" width="60" alt="clap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f941.svg" width="60" alt="drum">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3b9.svg" width="60" alt="piano">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-music">
<img src="../../../assets/peppa/daddy-pig-walking.png" class="hello-img" alt="Peppa">
<div class="ttl">Hello! Let's make music!</div>
</div>

<!-- S2: sing -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Peppa">
<div class="bbl">I can sing!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3a4.svg" alt="sing">
</div>
<div class="word">sing</div>
</div>

<!-- S3: dance -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">I can dance!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f483.svg" alt="dance">
</div>
<div class="word">dance</div>
</div>

<!-- S4: clap -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">I can clap!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f44f.svg" alt="clap">
</div>
<div class="word">clap</div>
</div>

<!-- S5: drum -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">I can drum!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f941.svg" alt="drum">
</div>
<div class="word">drum</div>
</div>

<!-- S6: piano -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">I can piano!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3b9.svg" alt="piano">
</div>
<div class="word">piano</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-music">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa">
<div class="bbl">Listen and say!</div>
</div>
<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-top:20px">
<button class="sound-btn btn-sing" onclick="speak('sing')">🎤</button>
<button class="sound-btn btn-dance" onclick="speak('dance')">💃</button>
<button class="sound-btn btn-clap" onclick="speak('clap')">👏</button>
<button class="sound-btn btn-drum" onclick="speak('drum')">🥁</button>
<button class="sound-btn btn-piano" onclick="speak('piano')">🎹</button>
</div>
</div>

<!-- S8: Music Show -->
<div class="sl bg-music">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Let's perform!</div>
</div>
<div class="stage">
<div class="music-item" onclick="speak('sing')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3a4.svg" alt="sing">
<div class="label">sing</div>
</div>
<div class="music-item" onclick="speak('dance')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f483.svg" alt="dance">
<div class="label">dance</div>
</div>
<div class="music-item" onclick="speak('clap')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f44f.svg" alt="clap">
<div class="label">clap</div>
</div>
<div class="music-item" onclick="speak('drum')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f941.svg" alt="drum">
<div class="label">drum</div>
</div>
<div class="music-item" onclick="speak('piano')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3b9.svg" alt="piano">
<div class="label">piano</div>
</div>
</div>
</div>

<!-- S9: All Together -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px" alt="Family">
<div class="bbl">All together!</div>
</div>
<div class="grid">
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3a4.svg" alt="sing">
<div class="label">sing</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f483.svg" alt="dance">
<div class="label">dance</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f44f.svg" alt="clap">
<div class="label">clap</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f941.svg" alt="drum">
<div class="label">drum</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3b9.svg" alt="piano">
<div class="label">piano</div>
</div>
</div>
</div>

<!-- S10: Bye -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" class="hello-img" alt="Peppa and George">
<div class="ttl">Great job! 🎵</div>
<div class="sub">Tomorrow: Beach Day! 🏖️</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>
<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:'Title page: Music Time theme with 5 music actions preview.',
1:'Hello page: Peppa invites to make music together.',
2:'New word: sing - Peppa with microphone emoji.',
3:'New word: dance - George with dancer emoji.',
4:'New word: clap - Candy Cat with clapping hands emoji.',
5:'New word: drum - Daddy Pig with drum emoji.',
6:'New word: piano - Mummy Pig with piano emoji.',
7:'Listen & Say: 5 colorful buttons with music emojis, click to hear pronunciation.',
8:'Music Show: Interactive stage with all 5 music actions, click to hear words.',
9:'All Together: Grid display of all 5 words for teacher to point and ask.',
10:'Bye page: Peppa and George celebrate, preview tomorrow (Beach Day).'
};

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
}

function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
if(e.key==='t'||e.key==='T')tn();
});

goTo(0);
</script>
</body>
</html>
