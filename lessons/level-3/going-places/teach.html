<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 21 - Going Places</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.bg-road{background:linear-gradient(160deg,#e3f2fd,#bbdefb)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.obj-wrap img{width:160px;height:auto}
.sound-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:48px;margin:12px;transition:transform .1s}
.sound-btn:active{transform:scale(.9)}
.sound-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin:20px 0}
.road-map{display:flex;flex-direction:column;gap:20px;margin:20px 0;max-width:500px}
.road-item{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
.road-item:active{transform:scale(.95)}
.road-item img{width:80px;height:auto}
.road-item .lbl{font-size:28px;font-weight:700;color:#2c3e50}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:20px 0;max-width:600px}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.grid-item img{width:80px;height:auto}
.grid-item .lbl{font-size:24px;font-weight:700;color:#2c3e50}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.word{font-size:100px}.sent{font-size:38px}.obj-wrap img{width:180px}.grid-item img{width:100px}}
@media(max-width:480px){.ttl{font-size:30px}.sub{font-size:16px}.word{font-size:56px;letter-spacing:2px}.sent{font-size:24px}.bbl{font-size:20px;padding:8px 14px}.pr img{width:65px}.obj-wrap img{width:130px}.sound-btn{width:80px;height:80px;font-size:36px}.road-item{padding:12px}.road-item img{width:70px}.road-item .lbl{font-size:24px}.grid{grid-template-columns:repeat(2,1fr);gap:16px}.grid-item img{width:70px}.grid-item .lbl{font-size:20px}}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Title -->
<div class="sl bg-pink on">
<img src="../../../assets/peppa/peppa_pig_bicycle.png" style="width:110px;margin:10px 0" alt="Peppa">
<div class="ttl">Going Places</div>
<div class="sub">Let's go on a trip!</div>
<div style="display:flex;gap:20px;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg" width="60" alt="bus">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg" width="60" alt="bike">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" width="60" alt="boat">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg" width="60" alt="train">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg" width="60" alt="plane">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-sky">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:10px 0" alt="Peppa">
<div class="ttl" style="font-size:52px">Let's go on a trip!</div>
</div>

<!-- S2: bus -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
<div class="bbl">I go by bus!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg" alt="bus">
</div>
<div class="word">bus</div>
</div>

<!-- S3: bike -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">I go by bike!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg" alt="bike">
</div>
<div class="word">bike</div>
</div>

<!-- S4: boat -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">I go by boat!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" alt="boat">
</div>
<div class="word">boat</div>
</div>

<!-- S5: train -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">I go by train!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg" alt="train">
</div>
<div class="word">train</div>
</div>

<!-- S6: plane -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">I go by plane!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg" alt="plane">
</div>
<div class="word">plane</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Peppa">
<div class="bbl">Listen and say!</div>
</div>
<div class="sound-grid">
<button class="sound-btn" style="background:linear-gradient(135deg,#ffeb3b,#ffc107)" onclick="speak('bus')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg" width="50" alt="bus">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#4caf50,#8bc34a)" onclick="speak('bike')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg" width="50" alt="bike">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#2196f3,#03a9f4)" onclick="speak('boat')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" width="50" alt="boat">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#9c27b0,#ba68c8)" onclick="speak('train')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg" width="50" alt="train">
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#f44336,#e91e63)" onclick="speak('plane')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg" width="50" alt="plane">
</button>
</div>
</div>

<!-- S8: Transportation Game -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="George">
<div class="bbl">How do we go?</div>
</div>
<div class="road-map">
<div class="road-item" onclick="speak('bus')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg" alt="bus">
<div class="lbl">bus</div>
</div>
<div class="road-item" onclick="speak('bike')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg" alt="bike">
<div class="lbl">bike</div>
</div>
<div class="road-item" onclick="speak('boat')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" alt="boat">
<div class="lbl">boat</div>
</div>
<div class="road-item" onclick="speak('train')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg" alt="train">
<div class="lbl">train</div>
</div>
<div class="road-item" onclick="speak('plane')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg" alt="plane">
<div class="lbl">plane</div>
</div>
</div>
</div>

<!-- S9: All Together -->
<div class="sl bg-road">
<div class="pr">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px" alt="Family">
<div class="bbl">All together!</div>
</div>
<div class="grid">
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg" alt="bus">
<div class="lbl">bus</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg" alt="bike">
<div class="lbl">bike</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" alt="boat">
<div class="lbl">boat</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg" alt="train">
<div class="lbl">train</div>
</div>
<div class="grid-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg" alt="plane">
<div class="lbl">plane</div>
</div>
</div>
</div>

<!-- S10: Bye -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:110px;margin:10px 0" alt="Peppa and George">
<div class="ttl">Bye bye!</div>
<div class="sub">Tomorrow: Opposites Game!</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>
<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:'Title page. Story: Going Places - Peppa and family explore different ways to travel.',
1:'Hello page. Peppa invites: "Let\'s go on a trip!"',
2:'New word: bus. Sentence: "I go by bus!" Peppa takes the bus to school.',
3:'New word: bike. Sentence: "I go by bike!" George rides his bike in the park.',
4:'New word: boat. Sentence: "I go by boat!" Daddy sails a boat on the lake.',
5:'New word: train. Sentence: "I go by train!" Mummy takes the train to the city.',
6:'New word: plane. Sentence: "I go by plane!" Candy flies on a plane for vacation.',
7:'Listen & Say. Click each button to hear the word. Encourage repetition.',
8:'Transportation Game. Click each vehicle to hear its name. Ask: "How do you go to school?"',
9:'All Together. Point to each vehicle randomly and ask: "What is this?" or "I go by ___?"',
10:'Bye page. Preview tomorrow: Opposites Game (hot/cold, up/down, fast/slow).'
};

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
}

function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
if(e.key==='t'||e.key==='T')tn();
});

goTo(0);
</script>
</body>
</html>
