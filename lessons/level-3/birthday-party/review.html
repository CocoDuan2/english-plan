<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 28 Review - Birthday Party</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#FFD700,#FFA07A,#FF69B4);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FFD700,#FF69B4);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,215,0,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,215,0,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px;margin:20px 0}
.card{width:100%;aspect-ratio:1;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.card:hover{transform:scale(1.05)}
.card.revealed{background:linear-gradient(135deg,#FFD700,#FFA07A)}
.card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.card.revealed img{opacity:1}
.card-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.card.revealed .card-label{opacity:1}
.party-wrap{display:flex;flex-direction:column;gap:20px;max-width:500px;margin:20px 0}
.party-row{display:flex;gap:15px;justify-content:center}
.party-btn{width:100px;height:100px;border-radius:16px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:16px;font-weight:700;color:#2c3e50;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s}
.party-btn:hover{transform:scale(1.05)}
.party-btn img{width:60px;height:auto}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px;margin:20px 0}
.listen-card{width:100%;aspect-ratio:1;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.listen-card:hover{transform:scale(1.05)}
.listen-card img{width:80px;height:auto}
.listen-card-label{font-size:18px;font-weight:700;color:#2c3e50;margin-top:8px}
.speaker-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;cursor:pointer;font-size:32px;display:flex;align-items:center;justify-content:center;margin:10px 0;box-shadow:0 4px 12px rgba(255,215,0,.4)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:440px;margin:20px 0}
.mem-card{width:100%;aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.mem-card:hover{transform:scale(1.05)}
.mem-card.flipped{background:linear-gradient(135deg,#FFD700,#FFA07A)}
.mem-card.matched{background:#98FB98;pointer-events:none}
.mem-back{font-size:44px}
.mem-front{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flipped .mem-back{display:none}
.mem-card.flipped .mem-front{display:flex}
.mem-front img{width:70px;height:auto}
.mem-label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #FFD700;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#FFD700;color:#fff;box-shadow:0 4px 12px rgba(255,215,0,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card-label{font-size:18px}
.party-btn{width:80px;height:80px;font-size:14px}
.party-btn img{width:50px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.memory-grid{grid-template-columns:repeat(3,1fr);max-width:360px}
}
@media(min-width:768px){
.memory-grid{max-width:560px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="top">
<div class="te">Birthday Party</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
</div>
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" style="width:110px;margin:20px 0" alt="Peppa">
<div class="pr">
<div class="bbl">Let's play party games!</div>
</div>
<div style="display:flex;gap:20px;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f382.svg" width="60" alt="cake">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f381.svg" width="60" alt="gift">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f388.svg" width="60" alt="balloon">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f56f.svg" width="60" alt="candle">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg" width="60" alt="friend">
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">🎉 点卡片，学单词！</div>
<div class="sb" id="s1">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: Party Collect -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Party Collect</div>
<div class="tz">🎈 听词，点派对物品！</div>
<div class="sb" id="s2">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find party things!</div>
</div>
<div class="party-wrap" id="pw"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Listen and tap!</div>
</div>
<button class="speaker-btn" id="spk3">🔊</button>
<div class="listen-grid" id="lg3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻牌配对！</div>
<div class="sb" id="s4">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Match the pairs!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="top">
<div class="te">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
</div>
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;margin:20px 0" alt="Family">
<div class="pr">
<div class="bbl">Great job! You helped Peppa!</div>
</div>
<button class="nb" onclick="location.reload()" style="margin-top:20px">🎉 Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{w:'cake',e:'1f382'},
{w:'gift',e:'1f381'},
{w:'balloon',e:'1f388'},
{w:'candle',e:'1f56f'},
{w:'friend',e:'1f9d2'}
];
var curM=0,busy=false;
var st1=0,st2=0,st3=0,st4=0;

const audioCache={};
['cake','gift','balloon','candle','friend'].forEach(function(w){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(w)+'&type=2');
a.load();
audioCache[w]=a;
});

function speak(t,cb){
if(audioCache[t]){
audioCache[t].play().then(function(){cb&&cb()}).catch(function(){
var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web');
b.play().then(function(){cb&&cb()}).catch(function(){cb&&cb()});
});
}else{
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().then(function(){cb&&cb()}).catch(function(){
var b=new Audio(fallback);
b.play().then(function(){cb&&cb()}).catch(function(){cb&&cb()});
});
}
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#FFD700","#FF69B4","#87CEEB","#98FB98","#FFA500"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
var g=document.getElementById('cg1');
g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg" alt="'+item.w+'"><div class="card-label">'+item.w+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
speak(item.w);
st1++;
document.getElementById('s1').innerHTML=stars(st1,5);
if(st1===5){
setTimeout(function(){goM(1)},1500);
}
};
g.appendChild(c);
});
}

function initM2(){
var pw=document.getElementById('pw');
pw.innerHTML='';
var order=W.slice().sort(function(){return Math.random()-.5});
var idx=0;
function ask(){
if(idx>=5){
setTimeout(function(){goM(1)},1200);
return;
}
var target=order[idx];
speak(target.w);
}
order.forEach(function(item){
var btn=document.createElement('button');
btn.className='party-btn';
btn.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg" alt="'+item.w+'"><div>'+item.w+'</div>';
btn.onclick=function(){
if(busy)return;
if(item.w===order[idx].w){
busy=true;
playOk();
btn.style.opacity='0.3';
btn.style.pointerEvents='none';
st2++;
document.getElementById('s2').innerHTML=stars(st2,5);
setTimeout(function(){
busy=false;
idx++;
if(idx<5)ask();
else setTimeout(function(){goM(1)},1200);
},1200);
}else{
playNo();
}
};
pw.appendChild(btn);
});
ask();
}

function initM3(){
var lg=document.getElementById('lg3');
lg.innerHTML='';
var order=W.slice().sort(function(){return Math.random()-.5});
var idx=0;
function ask(){
if(idx>=5){
setTimeout(function(){goM(1)},1200);
return;
}
speak(order[idx].w);
}
W.forEach(function(item){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg" alt="'+item.w+'"><div class="listen-card-label">'+item.w+'</div>';
c.onclick=function(){
if(busy)return;
if(item.w===order[idx].w){
busy=true;
playOk();
c.style.opacity='0.3';
c.style.pointerEvents='none';
st3++;
document.getElementById('s3').innerHTML=stars(st3,5);
setTimeout(function(){
busy=false;
idx++;
if(idx<5)ask();
else setTimeout(function(){goM(1)},1200);
},1200);
}else{
playNo();
}
};
lg.appendChild(c);
});
document.getElementById('spk3').onclick=function(){
if(idx<5)speak(order[idx].w);
};
ask();
}

function initM4(){
var mg=document.getElementById('mg4');
mg.innerHTML='';
var pairs=W.concat(W).sort(function(){return Math.random()-.5});
var flipped=[];
pairs.forEach(function(item,i){
var c=document.createElement('div');
c.className='mem-card';
c.dataset.word=item.w;
c.innerHTML='<div class="mem-back">🎁</div><div class="mem-front"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg" alt="'+item.w+'"><div class="mem-label">'+item.w+'</div></div>';
c.onclick=function(){
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
speak(item.w);
flipped.push(c);
if(flipped.length===2){
busy=true;
setTimeout(function(){
if(flipped[0].dataset.word===flipped[1].dataset.word){
playOk();
flipped[0].classList.add('matched');
flipped[1].classList.add('matched');
st4++;
document.getElementById('s4').innerHTML=stars(st4,5);
if(st4===5){
setTimeout(function(){goM(1)},1500);
}
}else{
playNo();
flipped[0].classList.remove('flipped');
flipped[1].classList.remove('flipped');
}
flipped=[];
busy=false;
},800);
}
};
mg.appendChild(c);
});
}

function initM5(){
// Done page, no init needed
}

goM(0);
</script>
</body>
</html>
