<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 25 Review - Beach Day</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#87CEEB,#F4E4C1);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#0077be;margin:8px 0;text-shadow:0 2px 4px rgba(0,119,190,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#0077be,#4fc3f7);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(0,119,190,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(0,119,190,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#0077be;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.learn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px auto}
.learn-card{width:100%;aspect-ratio:1;background:#ddd;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.learn-card.revealed{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card img{width:90px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.learn-card.revealed .learn-label{opacity:1}
.beach-game{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px auto}
.beach-btn{width:100%;aspect-ratio:1;border:none;border-radius:16px;background:linear-gradient(135deg,#4fc3f7,#0077be);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,119,190,.3);transition:transform .2s}
.beach-btn:active{transform:scale(.95)}
.beach-btn img{width:80px;margin-bottom:8px}
.beach-btn-label{font-size:18px;font-weight:700;color:#fff}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px auto}
.listen-card{width:100%;aspect-ratio:1;background:#fff;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s}
.listen-card:hover{transform:scale(1.05)}
.listen-card img{width:90px;margin-bottom:8px}
.listen-label{font-size:20px;font-weight:700;color:#2c3e50}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px auto}
.memory-card{width:100%;aspect-ratio:1;background:#4fc3f7;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;position:relative;transform-style:preserve-3d}
.memory-card.flipped{transform:rotateY(180deg)}
.memory-card.matched{opacity:.5;pointer-events:none}
.memory-front,.memory-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}
.memory-front{background:#4fc3f7;font-size:44px}
.memory-back{background:#fff;transform:rotateY(180deg);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.memory-back img{width:70px;margin-bottom:4px}
.memory-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.replay-btn{padding:16px 40px;border:none;border-radius:12px;font-size:20px;font-weight:900;cursor:pointer;background:#4fc3f7;color:#fff;box-shadow:0 4px 12px rgba(79,195,247,.4);margin-top:20px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #4fc3f7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#4fc3f7;color:#fff;box-shadow:0 4px 12px rgba(79,195,247,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.learn-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.learn-card img{width:70px}
.learn-label{font-size:18px}
.beach-game{grid-template-columns:repeat(2,1fr);gap:15px}
.beach-btn img{width:70px}
.beach-btn-label{font-size:16px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.listen-card img{width:70px}
.listen-label{font-size:18px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.memory-front{font-size:36px}
.memory-back img{width:60px}
.memory-back-label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin-bottom:10px">
<div class="te">Beach Day Review</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div style="display:flex;gap:20px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3d6.svg" width="70" alt="sand">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41a.svg" width="70" alt="shell">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f30a.svg" width="70" alt="wave">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f980.svg" width="70" alt="crab">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" width="70" alt="boat">
</div>
<button class="nb" onclick="getAC();goM(1)" style="font-size:24px;padding:18px 48px">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">🏖️ 点一点，学单词！</div>
<div class="sb" id="s1">⭐<span style="color:#bbb">★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Beach Explorer -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Beach Explorer</div>
<div class="tz">🌊 听一听，找一找！</div>
<div class="sb" id="s2">⭐⭐<span style="color:#bbb">★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png">
<div class="bbl">Find what you hear!</div>
</div>
<div class="beach-game" id="bg"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，点一点！</div>
<div class="sb" id="s3">⭐⭐⭐<span style="color:#bbb">★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png">
<div class="bbl">Listen and find!</div>
</div>
<button onclick="playQ()" style="width:100px;height:100px;border-radius:50%;border:none;background:linear-gradient(135deg,#4fc3f7,#0077be);color:#fff;font-size:48px;cursor:pointer;box-shadow:0 4px 12px rgba(79,195,247,.4);margin:10px 0">🔊</button>
<div class="listen-grid" id="lfg"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐<span style="color:#bbb">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png">
<div class="bbl">Match the pairs!</div>
</div>
<div class="memory-grid" id="mg"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;margin-bottom:10px">
<div class="te">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="bbl" style="font-size:24px;margin:20px 0">Great job at the beach!</div>
<button class="replay-btn" onclick="location.reload()">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../../assets/peppa/';
var W=[
{w:'sand',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3d6.svg'},
{w:'shell',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41a.svg'},
{w:'wave',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f30a.svg'},
{w:'crab',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f980.svg'},
{w:'boat',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg'}
];
var curM=0,busy=false;
var m1Rev=[],m2Idx=0,m2Seq=[],m3Idx=0,m3Seq=[],m4Flipped=[],m4Matched=0;
function speak(t){var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';var a=new Audio(primary);a.play().catch(function(){var b=new Audio(fallback);b.play().catch(function(){})})}
function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});document.getElementById('m'+curM).classList.add('on');document.getElementById('pg').textContent=(curM+1)+'/6';document.getElementById('pBtn').disabled=curM===0;var nb=document.getElementById('nBtn');if(curM===0){nb.textContent='Start!';nb.disabled=false}else if(curM>=5){nb.textContent='Done';nb.disabled=true}else{nb.textContent='Next ▶';nb.disabled=false}if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5()}
function initM1(){if(m1Rev.length>0)return;var g=document.getElementById('lg');g.innerHTML='';W.forEach(function(x,i){var c=document.createElement('div');c.className='learn-card';c.innerHTML='<img src="'+x.e+'" alt="'+x.w+'"><div class="learn-label">'+x.w+'</div>';c.onclick=function(){if(m1Rev.indexOf(i)>=0)return speak(x.w);c.classList.add('revealed');m1Rev.push(i);speak(x.w);document.getElementById('s1').innerHTML=stars(m1Rev.length,5);if(m1Rev.length===5)setTimeout(function(){goM(1)},1500)};g.appendChild(c)})}
function initM2(){if(m2Seq.length>0)return;m2Seq=W.map(function(x,i){return i}).sort(function(){return Math.random()-.5});var g=document.getElementById('bg');g.innerHTML='';W.forEach(function(x){var b=document.createElement('button');b.className='beach-btn';b.innerHTML='<img src="'+x.e+'" alt="'+x.w+'"><div class="beach-btn-label">'+x.w+'</div>';b.onclick=function(){if(busy)return;busy=true;var tgt=m2Seq[m2Idx];if(x.w===W[tgt].w){playOk();speak(x.w);m2Idx++;document.getElementById('s2').innerHTML=stars(m2Idx,5);setTimeout(function(){busy=false;if(m2Idx===5)goM(1)},1200)}else{playNo();setTimeout(function(){busy=false},800)}};g.appendChild(b)});speak(W[m2Seq[0]].w)}
function initM3(){if(m3Seq.length>0)return;m3Seq=W.map(function(x,i){return i}).sort(function(){return Math.random()-.5});var g=document.getElementById('lfg');g.innerHTML='';W.forEach(function(x){var c=document.createElement('div');c.className='listen-card';c.innerHTML='<img src="'+x.e+'" alt="'+x.w+'"><div class="listen-label">'+x.w+'</div>';c.onclick=function(){if(busy)return;busy=true;var tgt=m3Seq[m3Idx];if(x.w===W[tgt].w){playOk();speak(x.w);m3Idx++;document.getElementById('s3').innerHTML=stars(m3Idx,5);setTimeout(function(){busy=false;if(m3Idx===5)goM(1)},1200)}else{playNo();setTimeout(function(){busy=false},800)}};g.appendChild(c)});speak(W[m3Seq[0]].w)}
function playQ(){if(m3Idx<5)speak(W[m3Seq[m3Idx]].w)}
function initM4(){if(m4Matched>0)return;var pairs=[];W.forEach(function(x,i){pairs.push({t:'img',w:x.w,e:x.e,id:i});pairs.push({t:'txt',w:x.w,id:i})});pairs.sort(function(){return Math.random()-.5});var g=document.getElementById('mg');g.innerHTML='';pairs.forEach(function(p,i){var c=document.createElement('div');c.className='memory-card';c.dataset.id=p.id;c.dataset.idx=i;if(p.t==='img'){c.innerHTML='<div class="memory-front">🌊</div><div class="memory-back"><img src="'+p.e+'" alt="'+p.w+'"></div>'}else{c.innerHTML='<div class="memory-front">🌊</div><div class="memory-back"><div class="memory-back-label">'+p.w+'</div></div>'}c.onclick=function(){if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;c.classList.add('flipped');m4Flipped.push({el:c,id:p.id});if(m4Flipped.length===2){busy=true;setTimeout(function(){if(m4Flipped[0].id===m4Flipped[1].id){playOk();m4Flipped[0].el.classList.add('matched');m4Flipped[1].el.classList.add('matched');m4Matched++;document.getElementById('s4').innerHTML=stars(m4Matched,5);if(m4Matched===5)setTimeout(function(){goM(1)},1500)}else{playNo();m4Flipped[0].el.classList.remove('flipped');m4Flipped[1].el.classList.remove('flipped')}m4Flipped=[];busy=false},800)}};g.appendChild(c)})}
function initM5(){}
goM(0);
</script>
</body>
</html>
