<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 29 - Shopping Trip</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-shop{background:linear-gradient(135deg,#FFE5B4,#FFD700,#FFA07A)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.hero-img{width:110px;height:auto;margin:10px 0}
.sound-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;font-size:44px;display:flex;align-items:center;justify-content:center;margin:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .1s}
.sound-btn:active{transform:scale(.9)}
.btn-shop{background:linear-gradient(135deg,#FFB6C1,#FF69B4)}
.btn-buy{background:linear-gradient(135deg,#FFD700,#FFA500)}
.btn-money{background:linear-gradient(135deg,#98FB98,#32CD32)}
.btn-bag{background:linear-gradient(135deg,#DDA0DD,#BA55D3)}
.btn-toy{background:linear-gradient(135deg,#87CEEB,#4682B4)}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:500px;margin:20px 0}
.shop-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:12px;border-radius:12px;background:rgba(255,255,255,.3);transition:all .2s}
.shop-item:hover{transform:scale(1.05);background:rgba(255,255,255,.5)}
.shop-item.collected{opacity:.4;pointer-events:none}
.shop-item img{width:80px;height:auto}
.shop-label{font-size:24px;font-weight:700;color:#2c3e50}
.cart{position:fixed;top:20px;right:20px;background:#fff;border-radius:12px;padding:10px 16px;box-shadow:0 4px 12px rgba(0,0,0,.15);font-size:20px;font-weight:700;color:#e67e22}
.all-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px 0}
.all-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.all-item img{width:80px;height:auto}
.all-label{font-size:24px;font-weight:700;color:#2c3e50}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word{font-size:56px;letter-spacing:2px}
.sent{font-size:24px}
.bbl{font-size:20px;padding:8px 14px}
.hero-img{width:90px}
.sound-btn{width:80px;height:80px;font-size:36px}
.shop-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.shop-item img{width:70px}
.shop-label{font-size:20px}
.all-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.all-item img{width:70px}
.all-label{font-size:20px}
.cart{font-size:18px;padding:8px 12px}
}
@media(min-width:768px){
.word{font-size:100px}
.sent{font-size:38px}
}
</style>
</head>
<body>
<div class="deck">

<!-- S0: Title -->
<div class="sl bg-shop on">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" class="hero-img" alt="Peppa">
<div class="ttl">Shopping Trip</div>
<div class="sub">Let's go shopping with Peppa!</div>
<div class="obj-wrap" style="display:flex;gap:20px;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3ea.svg" width="60" alt="shop">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4b5.svg" width="60" alt="money">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cd.svg" width="60" alt="bag">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" width="60" alt="toy">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" class="hero-img" alt="Mummy Pig">
<div class="ttl">Let's go shopping!</div>
</div>

<!-- S2: shop -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
<div class="bbl">I want shop!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3ea.svg" width="160" alt="shop">
</div>
<div class="word">shop</div>
</div>

<!-- S3: buy -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy Pig">
<div class="bbl">I want buy!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d2.svg" width="160" alt="buy">
</div>
<div class="word">buy</div>
</div>

<!-- S4: money -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png" alt="Daddy Pig">
<div class="bbl">I want money!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4b5.svg" width="160" alt="money">
</div>
<div class="word">money</div>
</div>

<!-- S5: bag -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Peppa">
<div class="bbl">I want bag!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cd.svg" width="160" alt="bag">
</div>
<div class="word">bag</div>
</div>

<!-- S6: toy -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">I want toy!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" width="160" alt="toy">
</div>
<div class="word">toy</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-shop">
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Peppa">
<div class="bbl">Listen and say!</div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;max-width:500px">
<button class="sound-btn btn-shop" onclick="speak('shop')">🏪</button>
<button class="sound-btn btn-buy" onclick="speak('buy')">🛒</button>
<button class="sound-btn btn-money" onclick="speak('money')">💵</button>
<button class="sound-btn btn-bag" onclick="speak('bag')">🛍️</button>
<button class="sound-btn btn-toy" onclick="speak('toy')">🧸</button>
</div>
</div>

<!-- S8: Shopping Game -->
<div class="sl bg-shop">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa">
<div class="bbl">Help me shop!</div>
</div>
<div class="cart" id="cart">🛒 0/5</div>
<div class="shop-grid" id="shopGrid">
<div class="shop-item" onclick="collect(this,'shop')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3ea.svg" alt="shop">
<div class="shop-label">shop</div>
</div>
<div class="shop-item" onclick="collect(this,'buy')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d2.svg" alt="buy">
<div class="shop-label">buy</div>
</div>
<div class="shop-item" onclick="collect(this,'money')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4b5.svg" alt="money">
<div class="shop-label">money</div>
</div>
<div class="shop-item" onclick="collect(this,'bag')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cd.svg" alt="bag">
<div class="shop-label">bag</div>
</div>
<div class="shop-item" onclick="collect(this,'toy')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" alt="toy">
<div class="shop-label">toy</div>
</div>
</div>
</div>

<!-- S9: All Together -->
<div class="sl bg-pink">
<div class="pr">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px" alt="Peppa Family">
<div class="bbl">All together!</div>
</div>
<div class="all-grid">
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3ea.svg" alt="shop">
<div class="all-label">shop</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d2.svg" alt="buy">
<div class="all-label">buy</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4b5.svg" alt="money">
<div class="all-label">money</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cd.svg" alt="bag">
<div class="all-label">bag</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" alt="toy">
<div class="all-label">toy</div>
</div>
</div>
</div>

<!-- S10: Bye -->
<div class="sl bg-shop">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" class="hero-img" alt="Peppa and George">
<div class="ttl">Great shopping!</div>
<div class="sub">Tomorrow: Doctor Visit!</div>
</div>

</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>

<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:'Title page: Shopping Trip story begins. Peppa and family go shopping.',
1:'Hello page: Mummy Pig invites us to go shopping together.',
2:'New word: shop - the place where we buy things.',
3:'New word: buy - what we do at the shop.',
4:'New word: money - what we use to buy things.',
5:'New word: bag - what we carry our shopping in.',
6:'New word: toy - what George wants to buy.',
7:'Listen & Say: Click each button to hear the word. Encourage repetition.',
8:'Shopping Game: Click items to collect them in the cart. Speak each word when clicked.',
9:'All Together: Point to items randomly and ask "What do you want?"',
10:'Bye page: Celebrate shopping success. Preview tomorrow\'s doctor visit.'
};

var collected=0;

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){});
}

function collect(el,word){
if(el.classList.contains('collected'))return;
el.classList.add('collected');
collected++;
document.getElementById('cart').textContent='🛒 '+collected+'/5';
speak(word);
if(collected===5){
setTimeout(function(){
alert('Great shopping! 🎉');
},800);
}
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
if(c===8){
collected=0;
document.getElementById('cart').textContent='🛒 0/5';
document.querySelectorAll('.shop-item').forEach(function(el){
el.classList.remove('collected');
});
}
}

function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
if(e.key==='t'||e.key==='T')tn();
});

goTo(0);
</script>
</body>
</html>
