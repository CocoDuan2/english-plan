<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 27 Review - Shapes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#E1BEE7,#CE93D8);padding:20px}
.ttl{font-size:36px;font-weight:800;color:#fff;margin:20px 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:400px}
.card{background:#fff;border-radius:16px;padding:20px;text-align:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s}
.card:active{transform:scale(.95)}
.card img{width:80px;margin-bottom:10px}
.card span{font-size:24px;font-weight:700;color:#2c3e50}
</style>
</head>
<body>
<div class="deck">
<div class="ttl">Shapes Review</div>
<div class="grid">
<div class="card" onclick="speak('circle')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f534.svg" alt="circle">
<span>circle</span>
</div>
<div class="card" onclick="speak('square')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f7e6.svg" alt="square">
<span>square</span>
</div>
<div class="card" onclick="speak('triangle')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f53a.svg" alt="triangle">
<span>triangle</span>
</div>
<div class="card" onclick="speak('star')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" alt="star">
<span>star</span>
</div>
<div class="card" onclick="speak('heart')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2764.svg" alt="heart">
<span>heart</span>
</div>
</div>
</div>
<script>
function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){});
}
</script>
</body>
</html>
