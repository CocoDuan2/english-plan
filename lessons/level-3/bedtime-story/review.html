<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 26 Review - Bedtime Story</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#1a1a3e,#2d2d5f);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#FFD700;margin:8px 0;text-shadow:0 2px 4px rgba(255,215,0,.3)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#4169E1,#6495ED);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(65,105,225,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(65,105,225,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#FFD700;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px auto}
.card{width:100%;aspect-ratio:1;background:#fff;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s}
.card.revealed{background:linear-gradient(135deg,#a8e6cf,#88d8b0)}
.card:active{transform:scale(.95)}
.card img{width:90px;height:auto;margin:8px 0}
.card-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:6px}
.night-scene{position:relative;width:100%;max-width:500px;height:400px;margin:20px auto;background:linear-gradient(180deg,#0a0a1e,#1a1a3e);border-radius:20px;overflow:hidden}
.night-item{position:absolute;cursor:pointer;transition:transform .3s}
.night-item:hover{transform:scale(1.1)}
.night-item img{width:80px;height:auto}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px auto}
.listen-card{background:#fff;border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:90px;height:auto}
.listen-card-label{font-size:20px;font-weight:700;color:#2c3e50}
.speaker-btn{width:50px;height:50px;border-radius:50%;background:#4169E1;color:#fff;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(65,105,225,.3)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px auto}
.mem-card{aspect-ratio:1;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s;position:relative}
.mem-card.flipped{background:#fff}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-card:active{transform:scale(.95)}
.mem-front{font-size:44px}
.mem-back{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.mem-back img{width:70px;height:auto}
.mem-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #4169E1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#4169E1;color:#fff;box-shadow:0 4px 12px rgba(65,105,225,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card-label{font-size:18px}
.night-item img{width:60px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.listen-card img{width:70px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.mem-front{font-size:36px}
.mem-back img{width:50px}
.mem-back-label{font-size:16px}
}
</style>
</head>
<body>
<div id="m0" class="mod on"></div>
<div id="m1" class="mod"></div>
<div id="m2" class="mod"></div>
<div id="m3" class="mod"></div>
<div id="m4" class="mod"></div>
<div id="m5" class="mod"></div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../../assets/peppa/';
var W=['book','bed','moon','star','dream'];
var curM=0,busy=false;
function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}
function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}
function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);
o.frequency.value=f;g.gain.value=.15;
o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}
function playOk(){
tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);
showConfetti();
}
function playNo(){tone(300,.3)}
function showConfetti(){
var w=document.createElement("div");w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");p.className="confetti-piece";
p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}
function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}
function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M0: Start
document.getElementById('m0').innerHTML='<img src="'+PP+'peppa-pig-happy-standing.png" style="width:110px;margin-bottom:10px"><div class="te">Bedtime Story</div><div class="sb">Let\'s review!</div><div style="display:flex;gap:20px;margin-top:20px"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4d6.svg" width="70" alt="book"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" width="70" alt="bed"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f319.svg" width="70" alt="moon"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="70" alt="star"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4ad.svg" width="70" alt="dream"></div>';

// M1: Learn
var m1Stars=0;
function initM1(){
m1Stars=0;
var emojis=['1f4d6','1f6cf','1f319','2b50','1f4ad'];
var html='<div class="top"><div class="te">Learn</div><div class="tz">👆 点一点，学单词！</div><div class="sb">'+stars(m1Stars,5)+'</div></div><div class="pr"><img src="'+PP+'george-standing.png"><div class="bbl">Tap to reveal!</div></div><div class="card-grid">';
for(var i=0;i<5;i++){
html+='<div class="card" data-idx="'+i+'" onclick="revealCard('+i+')"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+emojis[i]+'.svg" style="display:none"><div class="card-label" style="display:none">'+W[i]+'</div></div>';
}
html+='</div>';
document.getElementById('m1').innerHTML=html;
}
function revealCard(idx){
if(busy)return;
var card=document.querySelectorAll('#m1 .card')[idx];
if(card.classList.contains('revealed'))return;
card.classList.add('revealed');
card.querySelector('img').style.display='block';
card.querySelector('.card-label').style.display='block';
speak(W[idx]);
m1Stars++;
document.querySelector('#m1 .sb').innerHTML=stars(m1Stars,5);
if(m1Stars===5){
playOk();
document.querySelector('#m1 .pr img').classList.add('peppa-jumping');
}
}

// M2: Night Sky Game
var m2Stars=0;
function initM2(){
m2Stars=0;
var emojis=['1f4d6','1f6cf','1f319','2b50','1f4ad'];
var html='<div class="top"><div class="te">Night Sky</div><div class="tz">🌙 点一点，找东西！</div><div class="sb">'+stars(m2Stars,5)+'</div></div><div class="pr"><img src="'+PP+'peppa-pig-happy-standing.png"><div class="bbl">Find them!</div></div><div class="night-scene">';
html+='<svg viewBox="0 0 500 400" style="width:100%;height:auto"><rect width="500" height="400" fill="#0a0a1e"/><circle cx="450" cy="50" r="40" fill="#FFD700"/><polygon points="100,80 110,110 140,110 115,130 125,160 100,140 75,160 85,130 60,110 90,110" fill="#FFFF00"/><polygon points="350,150 355,170 375,170 360,180 365,200 350,190 335,200 340,180 325,170 345,170" fill="#FFFF00"/><rect x="50" y="250" width="150" height="120" fill="#4169E1" rx="10"/><rect x="60" y="260" width="130" height="80" fill="#6495ED" rx="5"/><rect x="300" y="300" width="80" height="90" fill="#8B4513" rx="5"/></svg>';
var positions=[{l:320,t:310},{l:100,t:280},{l:410,t:20},{l:80,t:80},{l:330,t:140}];
for(var i=0;i<5;i++){
html+='<div class="night-item" style="left:'+positions[i].l+'px;top:'+positions[i].t+'px" onclick="clickNight('+i+')"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+emojis[i]+'.svg"></div>';
}
html+='</div>';
document.getElementById('m2').innerHTML=html;
}
function clickNight(idx){
if(busy)return;
busy=true;
speak(W[idx]);
playOk();
m2Stars++;
document.querySelector('#m2 .sb').innerHTML=stars(m2Stars,5);
document.querySelectorAll('#m2 .night-item')[idx].style.opacity='0.3';
if(m2Stars===5){
document.querySelector('#m2 .pr img').classList.add('peppa-jumping');
}
setTimeout(function(){busy=false},1200);
}

// M3: Listen & Find
var m3Stars=0,m3Queue=[];
function initM3(){
m3Stars=0;
m3Queue=[0,1,2,3,4].sort(function(){return Math.random()-.5});
var emojis=['1f4d6','1f6cf','1f319','2b50','1f4ad'];
var html='<div class="top"><div class="te">Listen & Find</div><div class="tz">👂 听一听，点一点！</div><div class="sb">'+stars(m3Stars,5)+'</div></div><div class="pr"><img src="'+PP+'candy-cat-green-dress.png"><div class="bbl">Listen!</div></div><button class="speaker-btn" onclick="playM3Word()" style="margin:10px auto">🔊</button><div class="listen-grid">';
for(var i=0;i<5;i++){
html+='<div class="listen-card" onclick="checkM3('+i+')"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+emojis[i]+'.svg"><div class="listen-card-label">'+W[i]+'</div></div>';
}
html+='</div>';
document.getElementById('m3').innerHTML=html;
playM3Word();
}
function playM3Word(){
if(m3Queue.length===0)return;
speak(W[m3Queue[0]]);
}
function checkM3(idx){
if(busy||m3Queue.length===0)return;
busy=true;
if(idx===m3Queue[0]){
playOk();
m3Stars++;
document.querySelector('#m3 .sb').innerHTML=stars(m3Stars,5);
document.querySelectorAll('#m3 .listen-card')[idx].style.opacity='0.3';
m3Queue.shift();
if(m3Queue.length>0){
setTimeout(function(){playM3Word();busy=false},1200);
}else{
document.querySelector('#m3 .pr img').classList.add('peppa-jumping');
setTimeout(function(){busy=false},1200);
}
}else{
playNo();
setTimeout(function(){busy=false},800);
}
}

// M4: Memory Match
var m4Stars=0,m4Flipped=[],m4Matched=[];
function initM4(){
m4Stars=0;m4Flipped=[];m4Matched=[];
var pairs=[0,0,1,1,2,2,3,3,4,4].sort(function(){return Math.random()-.5});
var emojis=['1f4d6','1f6cf','1f319','2b50','1f4ad'];
var html='<div class="top"><div class="te">Memory Match</div><div class="tz">🎴 翻一翻，找一样的！</div><div class="sb">'+stars(m4Stars,5)+'</div></div><div class="pr"><img src="'+PP+'emily-elephant-standing.png"><div class="bbl">Match them!</div></div><div class="memory-grid">';
for(var i=0;i<10;i++){
html+='<div class="mem-card" data-val="'+pairs[i]+'" onclick="flipM4('+i+')"><div class="mem-front">🌙</div><div class="mem-back"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+emojis[pairs[i]]+'.svg"><div class="mem-back-label">'+W[pairs[i]]+'</div></div></div>';
}
html+='</div>';
document.getElementById('m4').innerHTML=html;
}
function flipM4(idx){
if(busy||m4Flipped.length>=2)return;
var card=document.querySelectorAll('#m4 .mem-card')[idx];
if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
card.classList.add('flipped');
m4Flipped.push(idx);
var val=parseInt(card.getAttribute('data-val'));
speak(W[val]);
if(m4Flipped.length===2){
busy=true;
var c1=document.querySelectorAll('#m4 .mem-card')[m4Flipped[0]];
var c2=document.querySelectorAll('#m4 .mem-card')[m4Flipped[1]];
var v1=parseInt(c1.getAttribute('data-val'));
var v2=parseInt(c2.getAttribute('data-val'));
if(v1===v2){
setTimeout(function(){
playOk();
c1.classList.add('matched');
c2.classList.add('matched');
m4Matched.push(v1);
m4Stars++;
document.querySelector('#m4 .sb').innerHTML=stars(m4Stars,5);
m4Flipped=[];
busy=false;
if(m4Matched.length===5){
document.querySelector('#m4 .pr img').classList.add('peppa-jumping');
setTimeout(function(){goM(1)},1500);
}
},800);
}else{
setTimeout(function(){
playNo();
c1.classList.remove('flipped');
c2.classList.remove('flipped');
m4Flipped=[];
busy=false;
},1200);
}
}
}

// M5: Done
document.getElementById('m5').innerHTML='<img src="'+PP+'peppa-family-group-outdoors.png" style="width:120px;margin-bottom:10px"><div class="te">All Done!</div><div class="sb">'+stars(5,5)+'</div><div class="bbl" style="margin:20px 0">Great job! Sweet dreams!</div><button class="nb" onclick="location.reload()" style="margin-top:20px">Play Again</button>';

goM(0);
</script>
</body>
</html>
