<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 26 - Bedtime Story</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-night{background:linear-gradient(180deg,#1a1a3e,#2d2d5f,#4a4a7a)}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.ttl{font-size:42px;font-weight:800;color:#fff;margin:8px 0;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.sub{font-size:22px;color:#ffd700}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.obj-wrap img{width:160px;height:auto}
.sound-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:48px;transition:transform .2s;box-shadow:0 4px 12px rgba(0,0,0,.15);margin:10px}
.sound-btn:active{transform:scale(.9)}
.btn-book{background:linear-gradient(135deg,#8B4513,#A0522D)}
.btn-bed{background:linear-gradient(135deg,#4169E1,#6495ED)}
.btn-moon{background:linear-gradient(135deg,#FFD700,#FFA500)}
.btn-star{background:linear-gradient(135deg,#FFD700,#FFFF00)}
.btn-dream{background:linear-gradient(135deg,#9370DB,#BA55D3)}
.sound-grid{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;max-width:600px;margin:20px auto}
.bedtime-scene{position:relative;width:100%;max-width:500px;margin:20px auto}
.bedtime-item{position:absolute;cursor:pointer;transition:transform .3s}
.bedtime-item:hover{transform:scale(1.1)}
.bedtime-item img{width:80px;height:auto}
.all-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px auto}
.all-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.all-item img{width:80px;height:auto}
.all-label{font-size:24px;font-weight:700;color:#fff}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word{font-size:56px;letter-spacing:2px}
.sent{font-size:24px}
.bbl{font-size:20px;padding:8px 14px}
.pr img{width:65px}
.obj-wrap img{width:120px}
.sound-btn{width:80px;height:80px;font-size:40px;margin:8px}
.bedtime-item img{width:60px}
.all-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.all-item img{width:70px}
.all-label{font-size:20px}
}
@media(min-width:768px){
.word{font-size:100px}
.sent{font-size:38px}
.obj-wrap img{width:180px}
}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Title -->
<div class="sl bg-night on">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin-bottom:10px">
<div class="ttl">Bedtime Story</div>
<div class="sub">Time to sleep!</div>
<div style="display:flex;gap:20px;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4d6.svg" width="60" alt="book">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" width="60" alt="bed">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f319.svg" width="60" alt="moon">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="60" alt="star">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4ad.svg" width="60" alt="dream">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-night">
<img src="../../../assets/peppa/daddy-pig-walking.png" style="width:110px;margin-bottom:10px">
<div class="ttl" style="font-size:52px">Hello! It's bedtime!</div>
</div>

<!-- S2: book -->
<div class="sl bg-night">
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png">
<div class="bbl">I see a book!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4d6.svg" alt="book">
</div>
<div class="word" style="color:#fff">book</div>
</div>

<!-- S3: bed -->
<div class="sl bg-night">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png">
<div class="bbl">I see a bed!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" alt="bed">
</div>
<div class="word" style="color:#fff">bed</div>
</div>

<!-- S4: moon -->
<div class="sl bg-night">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png">
<div class="bbl">I see a moon!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f319.svg" alt="moon">
</div>
<div class="word" style="color:#fff">moon</div>
</div>

<!-- S5: star -->
<div class="sl bg-night">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png">
<div class="bbl">I see a star!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" alt="star">
</div>
<div class="word" style="color:#fff">star</div>
</div>

<!-- S6: dream -->
<div class="sl bg-night">
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png">
<div class="bbl">I see a dream!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4ad.svg" alt="dream">
</div>
<div class="word" style="color:#fff">dream</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-night">
<div class="ttl">Listen & Say</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png">
<div class="bbl">Click to hear!</div>
</div>
<div class="sound-grid">
<button class="sound-btn btn-book" onclick="speak('book')">📖</button>
<button class="sound-btn btn-bed" onclick="speak('bed')">🛏️</button>
<button class="sound-btn btn-moon" onclick="speak('moon')">🌙</button>
<button class="sound-btn btn-star" onclick="speak('star')">⭐</button>
<button class="sound-btn btn-dream" onclick="speak('dream')">💭</button>
</div>
</div>

<!-- S8: Bedtime Routine -->
<div class="sl bg-night">
<div class="ttl">Bedtime Routine</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-fairy-princess.png">
<div class="bbl">Click what you see!</div>
</div>
<div class="bedtime-scene">
<svg viewBox="0 0 500 400" style="width:100%;height:auto">
<rect width="500" height="400" fill="#1a1a3e"/>
<rect x="50" y="250" width="150" height="120" fill="#4169E1" rx="10"/>
<rect x="60" y="260" width="130" height="80" fill="#6495ED" rx="5"/>
<circle cx="450" cy="50" r="40" fill="#FFD700"/>
<polygon points="250,80 260,110 290,110 265,130 275,160 250,140 225,160 235,130 210,110 240,110" fill="#FFFF00"/>
<polygon points="350,150 355,170 375,170 360,180 365,200 350,190 335,200 340,180 325,170 345,170" fill="#FFFF00"/>
<rect x="300" y="300" width="80" height="90" fill="#8B4513" rx="5"/>
<rect x="310" y="310" width="60" height="70" fill="#A0522D"/>
</svg>
<div class="bedtime-item" style="left:100px;top:280px" onclick="speak('bed')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" alt="bed">
</div>
<div class="bedtime-item" style="left:410px;top:20px" onclick="speak('moon')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f319.svg" alt="moon">
</div>
<div class="bedtime-item" style="left:230px;top:80px" onclick="speak('star')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" alt="star">
</div>
<div class="bedtime-item" style="left:320px;top:310px" onclick="speak('book')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4d6.svg" alt="book">
</div>
</div>
</div>

<!-- S9: All Together -->
<div class="sl bg-night">
<div class="ttl">All Together</div>
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;margin:10px 0">
<div class="all-grid">
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4d6.svg" alt="book">
<div class="all-label">book</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" alt="bed">
<div class="all-label">bed</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f319.svg" alt="moon">
<div class="all-label">moon</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" alt="star">
<div class="all-label">star</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4ad.svg" alt="dream">
<div class="all-label">dream</div>
</div>
</div>
</div>

<!-- S10: Bye -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:110px;margin-bottom:10px">
<div class="ttl" style="color:#2c3e50">Good night!</div>
<div class="sub" style="color:#e67e22">Tomorrow: Shapes Around Us!</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>
<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:'Title page: Bedtime Story. Preview tonight\'s words.',
1:'Hello page: Peppa invites you to bedtime.',
2:'New word: book. Peppa reads a bedtime story.',
3:'New word: bed. George is ready to sleep.',
4:'New word: moon. Mummy looks at the moon outside.',
5:'New word: star. Daddy points to the stars.',
6:'New word: dream. Candy Cat has sweet dreams.',
7:'Listen & Say: Click each button to hear the word. Repeat multiple times.',
8:'Bedtime Routine: Click items in the bedroom scene to hear their names.',
9:'All Together: Point to each item randomly and ask "What\'s this?"'
};
function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}
function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
}
function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}
document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
if(e.key==='t'||e.key==='T')tn();
});
goTo(0);
</script>
</body>
</html>
