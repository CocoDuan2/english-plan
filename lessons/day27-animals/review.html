<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 27 - Animals Game</title>
<style>
:root{--tip-accent:#66bb6a;--tip-bg:#e8f5e9}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#8BC34A 0%,#689F38 50%,#558B2F 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#8BC34A,#689F38);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(104,159,56,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.y-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:440px;margin-top:10px}
.y-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.y-card:active{transform:scale(.95)}
.y-card.correct{border-color:#66bb6a;background:#e8f5e9}
.y-card.wrong{border-color:#ef5350;background:#ffebee}
.y-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:440px;margin-top:10px}
.path-card{width:120px;height:120px;background:linear-gradient(145deg,#689F38,#558B2F);border-radius:18px;box-shadow:0 3px 10px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;border:3px solid transparent;position:relative}
.path-card:active{transform:scale(.95)}
.path-card.on{background:#fff}
.path-card::before{content:'🌿';font-size:36px;position:absolute}
.path-card.on::before{display:none}
.path-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px;opacity:0;transition:.2s}
.path-card.on .lb{opacity:1}
.rescue-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:440px;margin-top:10px}
.rescue-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.rescue-card:active{transform:scale(.95)}
.rescue-card.correct{border-color:#66bb6a;background:#e8f5e9}
.rescue-card.wrong{border-color:#ef5350;background:#ffebee}
.rescue-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.jeep-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:440px;margin-top:10px}
.jeep-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.jeep-card:active{transform:scale(.95)}
.jeep-card.correct{border-color:#66bb6a;background:#e8f5e9}
.jeep-card.wrong{border-color:#ef5350;background:#ffebee}
.jeep-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.done-wrap img{width:160px;height:auto}
.done-ttl{font-size:48px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.done-msg{font-size:22px;color:#ffeaa7;text-align:center}
.play-again{font-size:28px;font-weight:700;padding:16px 48px;border:none;border-radius:32px;background:linear-gradient(135deg,#F9ADC7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(249,173,199,.4);margin-top:8px}
.play-again:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Jungle Safari</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>
<script>
var PP='../../assets/peppa/';
var WORDS=[
  {w:'cat',svg:'<ellipse cx="80" cy="100" rx="28" ry="18" fill="#ff9800"/><circle cx="80" cy="70" r="30" fill="#ff9800"/><path d="M50 50 L45 30 L55 45 Z" fill="#ff9800"/><path d="M110 50 L115 30 L105 45 Z" fill="#ff9800"/><circle cx="68" cy="65" r="5" fill="#424242"/><circle cx="92" cy="65" r="5" fill="#424242"/>'},
  {w:'dog',svg:'<ellipse cx="80" cy="110" rx="32" ry="20" fill="#42a5f5"/><circle cx="80" cy="75" r="32" fill="#42a5f5"/><ellipse cx="60" cy="55" rx="12" ry="18" fill="#42a5f5"/><ellipse cx="100" cy="55" rx="12" ry="18" fill="#42a5f5"/><circle cx="70" cy="70" r="5" fill="#424242"/><circle cx="90" cy="70" r="5" fill="#424242"/>'},
  {w:'fish',svg:'<ellipse cx="85" cy="80" rx="35" ry="22" fill="#26c6da"/><path d="M50 80 L30 70 L30 90 Z" fill="#26c6da"/><path d="M110 65 L130 55 L120 75 Z" fill="#00acc1"/><circle cx="100" cy="75" r="5" fill="#424242"/>'},
  {w:'bird',svg:'<circle cx="80" cy="85" r="28" fill="#ab47bc"/><circle cx="80" cy="60" r="20" fill="#ba68c8"/><path d="M45 75 L25 65 L35 80 L25 95 L45 85 Z" fill="#ab47bc"/><path d="M115 75 L135 65 L125 80 L135 95 L115 85 Z" fill="#ab47bc"/><circle cx="72" cy="58" r="4" fill="#424242"/>'},
  {w:'duck',svg:'<ellipse cx="85" cy="95" rx="32" ry="24" fill="#fdd835"/><circle cx="70" cy="65" r="22" fill="#fdd835"/><ellipse cx="62" cy="62" rx="4" ry="5" fill="#424242"/><ellipse cx="60" cy="72" rx="12" ry="6" fill="#ff9800"/>'}
];
var YESTERDAY=[
  {w:'red',svg:'<ellipse cx="80" cy="100" rx="35" ry="20" fill="#c0392b"/><circle cx="80" cy="75" r="40" fill="#e74c3c"/><circle cx="65" cy="65" r="8" fill="#fff" opacity=".7"/><rect x="76" y="30" width="8" height="20" rx="4" fill="#27ae60"/><ellipse cx="80" cy="32" rx="12" ry="6" fill="#27ae60"/>'},
  {w:'blue',svg:'<rect x="50" y="50" width="60" height="80" rx="30" fill="#3498db"/><ellipse cx="80" cy="50" rx="30" ry="15" fill="#5dade2"/><rect x="70" y="40" width="20" height="15" rx="8" fill="#2980b9"/><circle cx="65" cy="70" r="6" fill="#fff" opacity=".6"/>'},
  {w:'orange',svg:'<ellipse cx="80" cy="110" rx="30" ry="18" fill="#d35400"/><rect x="50" y="60" width="60" height="50" rx="8" fill="#e67e22"/><ellipse cx="80" cy="60" rx="30" ry="15" fill="#f39c12"/><circle cx="65" cy="75" r="7" fill="#fff" opacity=".6"/><rect x="76" y="35" width="8" height="25" rx="4" fill="#c0392b"/>'}
];
var ac=null,cur=0,tot=6,stars=0,busy=false;
function init(){
  ac=new (window.AudioContext||window.webkitAudioContext)();
  buildStart();
  buildYesterday();
  buildPath();
  buildRescue();
  buildJeep();
  buildDone();
  render();
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')go(-1);
    if(e.key==='ArrowRight')go(1);
  });
}
function buildStart(){
  var m=document.getElementById('m0');
  m.innerHTML='<div class="pr"><img src="'+PP+'emily-elephant.png" alt="Emily"><div class="bbl">Let\'s find animals!</div></div><img src="'+PP+'emily-elephant.png" width="140" alt="Emily"><button class="start-btn" onclick="startGame()">Start!</button>';
}
function startGame(){
  if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();
  go(1);
}
function buildYesterday(){
  var m=document.getElementById('m1');
  var h='<div class="pr"><img src="'+PP+'emily-elephant.png" alt="Emily"><div class="bbl">Yesterday colors!</div></div><div class="y-grid" id="y-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('y-grid');
  var q=shuffle(YESTERDAY.slice()).slice(0,3);
  var ans=q[0];
  q.forEach(d=>{
    var c=document.createElement('div');
    c.className='y-card';
    c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(busy)return;
      busy=true;
      if(d.w===ans.w){
        c.classList.add('correct');
        playOk();
        speak(d.w,()=>{
          stars++;
          updateStars();
          setTimeout(()=>{go(1);busy=false},800);
        });
      }else{
        c.classList.add('wrong');
        playNo();
        speak(ans.w,()=>{busy=false});
      }
    };
    g.appendChild(c);
  });
  setTimeout(()=>speak("It's "+ans.w+"!"),600);
}
function buildPath(){
  var m=document.getElementById('m2');
  var h='<div class="pr"><img src="'+PP+'george-pig-dinosaur.png" alt="George"><div class="bbl">Push the leaves!</div></div><div class="zh">拨开树叶,看看是谁!</div><div class="path-grid" id="path-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('path-grid');
  WORDS.forEach(d=>{
    var c=document.createElement('div');
    c.className='path-card';
    c.innerHTML='<div class="inner"><svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg></div><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(c.classList.contains('on'))return speak(d.w);
      c.classList.add('on');
      playOk();
      speak(d.w);
    };
    g.appendChild(c);
  });
}
function buildRescue(){
  var m=document.getElementById('m3');
  var h='<div class="pr"><img src="'+PP+'daddy-pig.png" alt="Daddy"><div class="bbl">Rescue the animals!</div></div><div class="zh">听一听,救哪个动物?</div><div class="rescue-grid" id="rescue-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('rescue-grid');
  var q=shuffle(WORDS.slice()).slice(0,3);
  var ans=q[0];
  q.forEach(d=>{
    var c=document.createElement('div');
    c.className='rescue-card';
    c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(busy)return;
      busy=true;
      if(d.w===ans.w){
        c.classList.add('correct');
        playOk();
        speak("I see a "+d.w+"!",()=>{
          stars++;
          updateStars();
          setTimeout(()=>{go(1);busy=false},800);
        });
      }else{
        c.classList.add('wrong');
        playNo();
        speak("I see a "+ans.w+"!",()=>{busy=false});
      }
    };
    g.appendChild(c);
  });
  setTimeout(()=>speak("I see a "+ans.w+"!"),600);
}
function buildJeep(){
  var m=document.getElementById('m4');
  var h='<div class="pr"><img src="'+PP+'peppa-pig-fairy.png" alt="Peppa"><div class="bbl">Load the jeep!</div></div><div class="zh">听一听,哪个动物上车?</div><div class="jeep-grid" id="jeep-grid"></div>';
  m.innerHTML=h;
  var g=document.getElementById('jeep-grid');
  var q=shuffle(WORDS.slice()).slice(0,4);
  var ans=q[0];
  q.forEach(d=>{
    var c=document.createElement('div');
    c.className='jeep-card';
    c.innerHTML='<svg width="90" height="90" viewBox="0 0 160 160">'+d.svg+'</svg><div class="lb">'+d.w+'</div>';
    c.onclick=()=>{
      if(busy)return;
      busy=true;
      if(d.w===ans.w){
        c.classList.add('correct');
        playOk();
        speak("I see a "+d.w+"!",()=>{
          stars++;
          updateStars();
          setTimeout(()=>{go(1);busy=false},800);
        });
      }else{
        c.classList.add('wrong');
        playNo();
        speak("I see a "+ans.w+"!",()=>{busy=false});
      }
    };
    g.appendChild(c);
  });
  setTimeout(()=>speak("I see a "+ans.w+"!"),600);
}
function buildDone(){
  var m=document.getElementById('m5');
  m.innerHTML='<div class="done-wrap"><img src="'+PP+'peppa-pig-family.png" alt="Peppa Family"><div class="done-ttl">All Done!</div><div class="done-msg">Great safari adventure!</div><div class="st" style="color:#fff">⭐⭐⭐</div><button class="play-again" onclick="location.reload()">Play Again</button></div>';
}
function go(d){
  cur+=d;
  if(cur<0)cur=0;
  if(cur>=tot)cur=tot-1;
  render();
}
function render(){
  document.querySelectorAll('.mod').forEach((s,i)=>s.classList.toggle('on',i===cur));
  document.getElementById('pg').textContent=(cur+1)+'/'+tot;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===tot-1;
  var titles=['Jungle Safari','Yesterday','Learn Words','Rescue','Safari Jeep','Done!'];
  var tips=['','点一点,哪个是 '+YESTERDAY[0].w+'?','拨开树叶,看看是谁!','听一听,救哪个动物?','听一听,哪个动物上车?',''];
  document.getElementById('en').textContent=titles[cur]||'';
  document.getElementById('zh').textContent=tips[cur]||'';
  updateStars();
}
function updateStars(){
  var s='';
  for(var i=0;i<stars;i++)s+='⭐';
  document.getElementById('st').textContent=s;
}
function speak(t,cb){
  var u='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u);
  var done=false;
  a.onended=()=>{if(!done){done=true;cb&&cb()}};
  a.onerror=()=>{if(!done){done=true;cb&&cb()}};
  a.play().catch(()=>{if(!done){done=true;cb&&cb()}});
  setTimeout(()=>{if(!done){done=true;cb&&cb()}},4000);
}
function playOk(){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.frequency.value=800;g.gain.value=.15;
  o.start();o.stop(ac.currentTime+.08);
  setTimeout(()=>{
    var o2=ac.createOscillator(),g2=ac.createGain();
    o2.connect(g2);g2.connect(ac.destination);
    o2.frequency.value=1000;g2.gain.value=.15;
    o2.start();o2.stop(ac.currentTime+.08);
  },80);
}
function playNo(){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.frequency.value=300;g.gain.value=.2;
  o.start();o.stop(ac.currentTime+.3);
}
function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
init();
</script>
</body>
</html>
