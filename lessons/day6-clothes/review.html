<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 6 Review - Clothes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#FFE5B4,#FFDAB9);overflow:hidden}
.mod{display:none;flex-direction:column;height:100%;padding:20px 20px 80px}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:12px}
.te{font-size:26px;font-weight:900;color:#e91e8c;margin:4px 0}
.tz{font-size:20px;font-weight:700;color:#e67e22;background:linear-gradient(135deg,#fff5e6,#ffe8cc);border-radius:12px;padding:8px 14px;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #e67e22}
.sb{font-size:22px;font-weight:700;color:#666;margin:4px 0}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.pr img{width:80px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:center;padding:0 20px}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
@media(max-width:480px){
  .te{font-size:22px}.tz{font-size:18px}.bbl{font-size:20px}.pr img{width:65px}
}
</style>
</head>
<body>
<div id="m0" class="mod on"></div>
<div id="m1" class="mod"></div>
<div id="m2" class="mod"></div>
<div id="m3" class="mod"></div>
<div id="m4" class="mod"></div>
<div id="m5" class="mod"></div>
<div class="nav" style="justify-content:space-between">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>&#9664; Back</button>
<div style="font-size:13px;color:#999" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/';
var W=[
  {w:'hat',tw:'1f3a9',emoji:'🎩'},
  {w:'shoes',tw:'1f45f',emoji:'👟'},
  {w:'shirt',tw:'1f455',emoji:'👕'},
  {w:'pants',tw:'1f456',emoji:'👖'},
  {w:'socks',tw:'1f9e6',emoji:'🧦'}
];
var D5=[
  {w:'mom',tw:'1f469'},{w:'dad',tw:'1f468'},{w:'baby',tw:'1f476'}
];
var actx,curM=0,score=0,totalQ=0;
function twImg(code,sz){return '<img src="'+TW+code+'.svg" width="'+(sz||90)+'">';}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22","#e91e8c","#9b59b6"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%7];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function speak(t,cb){
  var isSent=t.indexOf(' ')>-1;
  var primary=isSent?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web':'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var fallback=isSent?'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2':'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
  var done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio(primary);
  a.onended=fin;a.onerror=function(){var b=new Audio(fallback);b.onended=fin;b.onerror=fin;setTimeout(fin,4000);b.play().catch(fin)};
  setTimeout(fin,4000);a.play().catch(function(){var b=new Audio(fallback);b.onended=fin;b.onerror=fin;setTimeout(fin,4000);b.play().catch(fin)});
}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'🩶';return s}
function setI(en,zh,s){document.getElementById('ie').textContent=en;document.getElementById('iz').textContent=zh;document.getElementById('sb').innerHTML=s||''}
function goM(d){
  curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
  document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
  document.getElementById('m'+curM).classList.add('on');
  document.getElementById('pg').textContent=(curM+1)+'/6';
  document.getElementById('pBtn').disabled=curM===0;
  var nb=document.getElementById('nBtn');
  if(curM===0){nb.textContent='Start!'}
  else if(curM>=5){nb.textContent='Done';nb.disabled=true}
  else{nb.textContent='Next ▶';nb.disabled=false}
  if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}

// M0: Start
document.getElementById('m0').innerHTML=
  '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
  '<img src="'+PP+'peppa-pig-in-bed.png" width="140">'+
  '<div style="font-size:36px;font-weight:900;color:#e91e8c;margin:12px 0">Help Peppa Get Dressed!</div>'+
  '<div style="font-size:22px;color:#666">hat · shoes · shirt · pants · socks</div>'+
  '<div id="ie" style="display:none"></div><div id="iz" style="display:none"></div><div id="sb" style="display:none"></div>'+
  '</div>';

// M1: Learn - tap closet shelves to reveal clothes
var lnI=0,lnB=false,lnOrd;
function initM1(){
  lnI=0;lnB=false;lnOrd=shuffle([0,1,2,3,4]);
  var h='<div class="top"><div class="te">Open the Closet!</div><div class="tz">打开衣柜,找衣服!</div><div class="sb" id="m1s"></div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:10px 0;max-width:500px" id="m1cards">';
  for(var i=0;i<5;i++){
    h+='<div id="lc'+i+'" onclick="lnTap('+i+')" style="width:110px;height:110px;border-radius:18px;background:#8B4513;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.15);transition:background .4s;border:3px solid #654321;position:relative">';
    h+='<div style="position:absolute;width:30px;height:6px;background:#654321;border-radius:3px" id="lch'+i+'"></div>';
    h+='<div style="opacity:0;transition:opacity .4s" id="lci'+i+'">'+twImg(W[i].tw,75)+'<div style="font-size:20px;font-weight:700;color:#2c3e50;margin-top:4px">'+W[i].w+'</div></div></div>';
  }
  h+='</div>';
  document.getElementById('m1').innerHTML=h;
  document.getElementById('m1s').innerHTML=stars(0,5);
  speak('Open the closet');
}
function lnTap(i){
  if(lnB)return;lnB=true;
  var card=document.getElementById('lc'+i);
  if(card.style.background==='rgb(255, 255, 255)'){speak(W[i].w);lnB=false;return}
  card.style.background='#fff';
  card.style.borderColor='#ddd';
  document.getElementById('lch'+i).style.display='none';
  document.getElementById('lci'+i).style.opacity='1';
  lnI++;
  document.getElementById('m1s').innerHTML=stars(lnI,5);
  playOk();speak(W[i].w,function(){lnB=false});
}

// M2: Yesterday Review (Day5 family micro-review)
var rvOrd,rvCur=0,rvB=false;
function initM2(){
  rvCur=0;rvB=false;rvOrd=shuffle([0,1,2]);
  renderRV();
}
function renderRV(){
  var idx=rvOrd[rvCur];
  var h='<div class="top"><div class="te">Remember Family?</div><div class="tz">还记得家人吗?</div><div class="sb" id="m2s">'+stars(rvCur,3)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'george-standing.png" width="75"><div class="bbl">Find '+D5[idx].w+'!</div></div>';
  h+='<div style="display:flex;gap:16px;justify-content:center;margin:20px 0">';
  var opts=shuffle([0,1,2]);
  for(var i=0;i<3;i++){
    h+='<div onclick="rvTap('+opts[i]+')" style="width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12)">'+twImg(D5[opts[i]].tw,70)+'</div>';
  }
  h+='</div><div id="rvfb" style="font-size:22px;font-weight:700;min-height:30px;margin:6px 0;text-align:center"></div>';
  document.getElementById('m2').innerHTML=h;
  speak('Find '+D5[idx].w);
}
function rvTap(i){
  if(rvB)return;rvB=true;
  var correct=rvOrd[rvCur];
  if(i===correct){
    playOk();rvCur++;
    document.getElementById('m2s').innerHTML=stars(rvCur,3);
    document.getElementById('rvfb').textContent='Yes! '+D5[correct].w+'!';
    if(rvCur>=3){setTimeout(function(){goM(1)},1200);return}
    setTimeout(function(){rvB=false;renderRV()},1200);
  }else{
    playNo();speak(D5[correct].w);
    document.getElementById('rvfb').textContent='Try again!';
    setTimeout(function(){rvB=false},1200);
  }
}

// M3: Dressing Order Game - tap clothes in correct order
var doSeq=[0,2,3,4,1],doCur=0,doB=false;
function initM3(){
  doCur=0;doB=false;
  var h='<div class="top"><div class="te">Dress in Order!</div><div class="tz">按顺序穿衣服!</div><div class="sb" id="m3s">'+stars(0,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'peppa-pig-in-bed.png" width="75"><div class="bbl">Tap: shirt → pants → socks → shoes → hat</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:10px 0;max-width:500px">';
  var ord=shuffle([0,1,2,3,4]);
  for(var i=0;i<5;i++){
    var idx=ord[i];
    h+='<div id="doc'+idx+'" onclick="doTap('+idx+')" style="width:105px;height:105px;border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12);transition:opacity .4s,transform .4s">'+twImg(W[idx].tw,70)+'<div style="font-size:20px;font-weight:700;color:#2c3e50;margin-top:4px">'+W[idx].w+'</div></div>';
  }
  h+='</div><div id="dofb" style="font-size:22px;font-weight:700;min-height:30px;margin:6px 0;text-align:center"></div>';
  document.getElementById('m3').innerHTML=h;
  speak('Dress in order');
}
function doTap(i){
  if(doB)return;doB=true;
  var correct=doSeq[doCur];
  if(i===correct){
    playOk();speak(W[i].w);
    var card=document.getElementById('doc'+i);
    card.style.opacity='0.3';
    card.style.transform='scale(0.9)';
    card.style.cursor='default';
    doCur++;
    document.getElementById('m3s').innerHTML=stars(doCur,5);
    document.getElementById('dofb').textContent='Good! '+W[i].w+'!';
    if(doCur>=5){setTimeout(function(){goM(1)},1200);return}
    setTimeout(function(){doB=false},1200);
  }else{
    playNo();
    document.getElementById('dofb').textContent='Not yet! Try '+W[correct].w+'!';
    setTimeout(function(){doB=false},1200);
  }
}

// M4: Listen & Find - tap the clothes you hear
var lfOrd,lfCur=0,lfB=false;
function initM4(){
  lfCur=0;lfB=false;lfOrd=shuffle([0,1,2,3,4]);
  renderLF();
}
function renderLF(){
  var idx=lfOrd[lfCur];
  var h='<div class="top"><div class="te">Listen & Find!</div><div class="tz">听一听,找衣服!</div><div class="sb" id="m4s">'+stars(lfCur,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'peppa-pig-happy-standing.png" width="75"><div class="bbl">Find '+W[idx].w+'!</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:10px 0;max-width:500px">';
  var opts=shuffle([0,1,2,3,4]);
  for(var i=0;i<5;i++){
    h+='<div onclick="lfTap('+opts[i]+')" style="width:105px;height:105px;border-radius:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12)">'+twImg(W[opts[i]].tw,75)+'</div>';
  }
  h+='</div><div id="lffb" style="font-size:22px;font-weight:700;min-height:30px;margin:6px 0;text-align:center"></div>';
  document.getElementById('m4').innerHTML=h;
  speak('Find '+W[idx].w);
}
function lfTap(i){
  if(lfB)return;lfB=true;
  var correct=lfOrd[lfCur];
  if(i===correct){
    playOk();lfCur++;
    document.getElementById('m4s').innerHTML=stars(lfCur,5);
    document.getElementById('lffb').textContent='Yes! '+W[correct].w+'!';
    if(lfCur>=5){setTimeout(function(){goM(1)},1200);return}
    setTimeout(function(){lfB=false;renderLF()},1200);
  }else{
    playNo();speak(W[correct].w);
    document.getElementById('lffb').textContent='Try again!';
    setTimeout(function(){lfB=false},1200);
  }
}

// M5: Memory Flip - match pairs of clothes
var mfCards=[],mfFlip=[],mfMatch=0,mfB=false;
function initM5(){
  mfMatch=0;mfB=false;mfFlip=[];
  var pairs=[0,1,2,3,4];
  mfCards=shuffle(pairs.concat(pairs));
  var h='<div class="top"><div class="te">Match Pairs!</div><div class="tz">找一找,配对衣服!</div><div class="sb" id="m5s">'+stars(0,5)+'</div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:500px;margin:10px auto" id="m5grid">';
  for(var i=0;i<10;i++){
    h+='<div id="mfc'+i+'" onclick="mfTap('+i+')" style="width:90px;height:90px;border-radius:14px;background:#F9ADC7;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12);transition:background .3s">';
    h+='<div style="font-size:44px" id="mfce'+i+'">'+W[0].emoji+'</div>';
    h+='<div style="display:none" id="mfci'+i+'">'+twImg(W[mfCards[i]].tw,70)+'<div style="font-size:18px;font-weight:700;color:#2c3e50;margin-top:2px">'+W[mfCards[i]].w+'</div></div>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('m5').innerHTML=h;
  speak('Match pairs');
}
function mfTap(i){
  if(mfB)return;
  var card=document.getElementById('mfc'+i);
  if(card.style.background==='rgb(255, 255, 255)')return;
  if(mfFlip.length>=2)return;
  card.style.background='#fff';
  document.getElementById('mfce'+i).style.display='none';
  document.getElementById('mfci'+i).style.display='block';
  mfFlip.push(i);
  speak(W[mfCards[i]].w);
  if(mfFlip.length===2){
    mfB=true;
    setTimeout(function(){
      var a=mfFlip[0],b=mfFlip[1];
      if(mfCards[a]===mfCards[b]){
        playOk();mfMatch++;
        document.getElementById('m5s').innerHTML=stars(mfMatch,5);
        if(mfMatch>=5){setTimeout(function(){goM(1)},1200)}
      }else{
        playNo();
        document.getElementById('mfc'+a).style.background='#F9ADC7';
        document.getElementById('mfc'+b).style.background='#F9ADC7';
        document.getElementById('mfce'+a).style.display='block';
        document.getElementById('mfce'+b).style.display='block';
        document.getElementById('mfci'+a).style.display='none';
        document.getElementById('mfci'+b).style.display='none';
      }
      mfFlip=[];mfB=false;
    },1200);
  }
}

// M6: Done
document.getElementById('m5').insertAdjacentHTML('afterend','<div id="m6" class="mod"></div>');
function initM6(){
  var h='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">';
  h+='<img src="'+PP+'peppa-family-group-outdoors.png" width="140">';
  h+='<div style="font-size:42px;font-weight:900;color:#e91e8c;margin:12px 0">All Done!</div>';
  h+='<div style="font-size:22px;color:#666;margin:8px 0">You helped Peppa get dressed!</div>';
  h+='<div style="font-size:32px;margin:8px 0">⭐⭐⭐⭐⭐</div>';
  h+='<button class="nb" onclick="location.reload()" style="margin-top:16px;font-size:20px;padding:16px 36px">Play Again</button>';
  h+='</div>';
  document.getElementById('m6').innerHTML=h;
  speak('All done');showConfetti();
}
function goM(d){
  curM+=d;if(curM<0)curM=0;if(curM>6)curM=6;
  document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
  document.getElementById('m'+curM).classList.add('on');
  document.getElementById('pg').textContent=(curM+1)+'/7';
  document.getElementById('pBtn').disabled=curM===0;
  var nb=document.getElementById('nBtn');
  if(curM===0){nb.textContent='Start!'}
  else if(curM>=6){nb.style.display='none'}
  else{nb.textContent='Next ▶';nb.disabled=false}
  if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();if(curM===6)initM6();
}
</script>
</body>
</html>
