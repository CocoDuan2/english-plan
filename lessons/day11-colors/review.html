<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 11 - Colors Review Game</title>
<style>
:root{--tip-accent:#ff7043;--tip-bg:#fff3ed}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#87CEEB 0%,#B6E3B5 70%,#8BC34A 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#F9ADC7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(233,30,140,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.quick-grid{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;max-width:500px}
.quick-btn{width:120px;height:120px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer}
.quick-btn div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.quick-btn.ok{outline:4px solid #66bb6a}
.quick-btn:active{transform:scale(.95)}
.word-track{width:100%;max-width:500px;background:rgba(255,255,255,.86);border-radius:18px;padding:10px 8px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.wcard{background:#eceff1;border-radius:14px;min-height:100px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.wcard svg{opacity:0;transition:.25s}
.wcard .lb{font-size:20px;font-weight:800;color:#2c3e50;opacity:0;text-transform:lowercase}
.wcard.on{background:#fff}
.wcard.on svg,.wcard.on .lb{opacity:1}
.wcard:active{transform:scale(.95)}
.hunt-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px}
.hunt-card{width:110px;height:130px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.hunt-card div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.hunt-card.good{outline:4px solid #66bb6a}
.hunt-card.bad{outline:4px solid #ef5350}
.hunt-card:active{transform:scale(.95)}
.match-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:500px;width:100%}
.match-card{height:126px;border:none;border-radius:14px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.match-card div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.match-card.good{outline:4px solid #66bb6a}
.match-card.bad{outline:4px solid #ef5350}
.match-card:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Color Picnic Game</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>

<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>

<script>
var PP='../../assets/peppa/';
var WORDS=[
  {w:'red',c:'#e74c3c',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="95" cy="32" rx="14" ry="9" fill="#4CAF50"/><circle cx="68" cy="78" r="5" fill="#fff"/><circle cx="92" cy="78" r="5" fill="#fff"/><circle cx="69" cy="79" r="2.5" fill="#333"/><circle cx="93" cy="79" r="2.5" fill="#333"/></svg>'},
  {w:'blue',c:'#3498db',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><rect x="20" y="65" width="120" height="55" rx="10" fill="#3498db"/><rect x="45" y="40" width="70" height="35" rx="8" fill="#3498db"/><circle cx="50" cy="120" r="14" fill="#333"/><circle cx="110" cy="120" r="14" fill="#333"/><rect x="55" y="50" width="22" height="18" rx="3" fill="#B3E5FC"/><rect x="83" y="50" width="22" height="18" rx="3" fill="#B3E5FC"/></svg>'},
  {w:'yellow',c:'#f1c40f',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><circle cx="80" cy="80" r="42" fill="#f1c40f"/><circle cx="68" cy="72" r="4" fill="#F57F17"/><circle cx="92" cy="72" r="4" fill="#F57F17"/><path d="M68 90 Q80 100 92 90" stroke="#F57F17" stroke-width="3" fill="none"/></svg>'},
  {w:'green',c:'#27ae60',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><rect x="70" y="100" width="20" height="45" rx="4" fill="#795548"/><ellipse cx="80" cy="70" rx="48" ry="45" fill="#27ae60"/><circle cx="68" cy="65" r="4" fill="#fff"/><circle cx="92" cy="65" r="4" fill="#fff"/></svg>'},
  {w:'orange',c:'#e67e22',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><circle cx="80" cy="85" r="50" fill="#e67e22"/><ellipse cx="80" cy="32" rx="6" ry="4" fill="#4CAF50"/><circle cx="68" cy="78" r="5" fill="#fff"/><circle cx="92" cy="78" r="5" fill="#fff"/></svg>'}
];
var YEST=[
  {w:'jump',svg:'<svg width="70" height="70" viewBox="0 0 160 160"><circle cx="80" cy="38" r="16" fill="#ffcc80"/><rect x="68" y="56" width="24" height="34" rx="10" fill="#ab47bc"/><line x1="80" y1="90" x2="62" y2="118" stroke="#7e57c2" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="90" x2="100" y2="110" stroke="#7e57c2" stroke-width="8" stroke-linecap="round"/></svg>'},
  {w:'purple',svg:'<svg width="70" height="70" viewBox="0 0 160 160"><ellipse cx="55" cy="70" rx="30" ry="22" fill="#9c27b0" transform="rotate(-15,55,70)"/><ellipse cx="105" cy="70" rx="30" ry="22" fill="#9c27b0" transform="rotate(15,105,70)"/></svg>'},
  {w:'pig',svg:'<svg width="70" height="70" viewBox="0 0 160 160"><ellipse cx="80" cy="108" rx="32" ry="24" fill="#f48fb1"/><circle cx="80" cy="64" r="26" fill="#f48fb1"/><ellipse cx="80" cy="72" rx="14" ry="10" fill="#f06292"/></svg>'}
];

var actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d,type){var c=ac(),o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.value=.16;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}
function playOk(){tone(523,.08);setTimeout(function(){tone(659,.08)},90);setTimeout(function(){tone(784,.12)},180)}
function playNo(){tone(310,.15,'square');setTimeout(function(){tone(262,.18,'square')},150)}
function speak(text,cb){
  var done=false;
  function end(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
  a.onended=end;
  a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web');
    b.onended=end;b.onerror=end;b.play().catch(end);
  };
  a.play().catch(end);
  setTimeout(end,4000);
}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}

var cur=0,score=0,total=18;
var mods=['m0','m1','m2','m3','m4','m5'];
function ui(){
  document.getElementById('pg').textContent=(cur+1)+'/'+mods.length;
  document.getElementById('pb').disabled=cur===0;
  var n=document.getElementById('nb');
  if(cur===mods.length-1){n.disabled=true;n.textContent='Done'}else{n.disabled=false;n.textContent='Next'}
  var titles=['Color Picnic Game','Yesterday Quick','Tap and Reveal','Lunch Box Hunt','Color Match','All Done!'];
  var tips=['','昨天复习 3 题','点一点，学新词','听一听，找颜色','看图配词',''];
  document.getElementById('en').textContent=titles[cur];
  var zh=document.getElementById('zh');
  zh.textContent=tips[cur];
  zh.style.display=tips[cur]?'inline-block':'none';
  var s='';for(var i=0;i<total;i++)s+=i<score?'⭐':'☆';
  document.getElementById('st').textContent=s;
}
function show(i){
  if(i<0||i>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=i;
  document.getElementById(mods[cur]).classList.add('on');
  if(cur===1)initM1();
  if(cur===2)initM2();
  if(cur===3)initM3();
  if(cur===4)initM4();
  if(cur===5)initM5();
  ui();
}
function go(d){show(cur+d)}

(function initM0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'peppa-pig-red-polka-dot-dress.png" width="140" alt="Peppa">'+
    '<div class="pr"><div class="bbl">Tap, find, match colors!</div></div>'+
    '<div style="display:flex;gap:10px;margin:8px 0">'+
      '<img src="'+PP+'george-playing-ball.png" width="80" alt="George">'+
      '<img src="'+PP+'emily-elephant-standing.png" width="80" alt="Emily">'+
    '</div>'+
    '<button class="start-btn" onclick="ac();show(1)">Start!</button>';
  ui();
})();

function initM1(){
  document.getElementById('m1').innerHTML=
    '<div class="pr"><img src="'+PP+'mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl">Tap yesterday words!</div></div>'+
    '<div class="quick-grid">'+YEST.map(function(y){
      return '<button class="quick-btn" onclick="tapYesterday(this,\''+y.w+'\')">'+y.svg+'<div>'+y.w+'</div></button>';
    }).join('')+'</div>';
}
function tapYesterday(el,w){
  if(el.classList.contains('ok'))return;
  el.classList.add('ok');
  score++;ui();playOk();
  speak(w);
}

var learnBusy=false;
function initM2(){
  learnBusy=false;
  document.getElementById('m2').innerHTML=
    '<div class="pr"><img src="'+PP+'daddy-pig-standing.png" alt="Daddy"><div class="bbl">Tap gray cards!</div></div>'+
    '<div class="word-track"><div class="word-grid">'+WORDS.map(function(w,i){
      return '<button class="wcard" id="wc'+i+'" onclick="tapLearn('+i+')">'+w.svg+'<div class="lb">'+w.w+'</div></button>';
    }).join('')+'</div></div>';
}
function tapLearn(i){
  var el=document.getElementById('wc'+i);
  if(el.classList.contains('on')){speak(WORDS[i].w);return}
  if(learnBusy)return;learnBusy=true;
  el.classList.add('on');
  score++;ui();playOk();
  speak(WORDS[i].w,function(){learnBusy=false});
}

var huntBusy=false,huntTarget='',huntQ=0,huntOrder=[];
function initM3(){
  huntBusy=false;
  huntQ=0;
  huntOrder=shuffle([0,1,2,3,4]);
  buildHunt();
}
function buildHunt(){
  if(huntQ>=5){setTimeout(function(){show(4)},700);return}
  var tgt=WORDS[huntOrder[huntQ]];
  huntTarget=tgt.w;
  var opts=shuffle([tgt].concat(shuffle(WORDS.filter(function(w){return w.w!==tgt.w})).slice(0,2)));
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'george-superhero-costume.png" alt="George"><div class="bbl">Find '+tgt.w+'!</div></div>'+
    '<button style="width:220px;height:84px;border:none;border-radius:14px;background:#ff7043;color:#fff;font-size:26px;font-weight:900;cursor:pointer;margin-bottom:10px" onclick="speak(\''+tgt.w+'\')">🔊 Listen</button>'+
    '<div class="hunt-grid">'+opts.map(function(o){
      return '<button class="hunt-card" data-w="'+o.w+'" onclick="tapHunt(this)">'+o.svg+'<div>'+o.w+'</div></button>';
    }).join('')+'</div>';
  setTimeout(function(){speak(tgt.w)},260);
}
function tapHunt(el){
  if(huntBusy)return;huntBusy=true;
  if(el.dataset.w===huntTarget){
    el.classList.add('good');score++;ui();playOk();
    speak(huntTarget,function(){huntBusy=false;huntQ++;setTimeout(buildHunt,520)});
  }else{
    el.classList.add('bad');playNo();
    speak(huntTarget,function(){huntBusy=false;setTimeout(function(){el.classList.remove('bad')},320)});
  }
}

var mBusy=false,mQ=0,mOrd=[];
function initM4(){mBusy=false;mQ=0;mOrd=shuffle([0,1,2,3,4]);buildMatch()}
function buildMatch(){
  if(mQ>=5){setTimeout(function(){show(5)},700);return}
  var target=WORDS[mOrd[mQ]];
  var options=shuffle([target].concat(shuffle(WORDS.filter(function(w){return w.w!==target.w})).slice(0,3)));
  document.getElementById('m4').innerHTML=
    '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy"><div class="bbl">Match the word!</div></div>'+
    '<div style="margin:6px 0">'+target.svg.replace('width="92" height="92"','width="110" height="110"')+'</div>'+
    '<div class="match-wrap">'+options.map(function(o){
      return '<button class="match-card" data-w="'+o.w+'" onclick="tapMatch(this,\''+target.w+'\')"><div>'+o.w+'</div></button>';
    }).join('')+'</div>';
}
function tapMatch(el,correct){
  if(mBusy)return;mBusy=true;
  if(el.dataset.w===correct){
    el.classList.add('good');score++;ui();playOk();
    speak(correct,function(){mBusy=false;mQ++;buildMatch()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){mBusy=false;setTimeout(function(){el.classList.remove('bad')},320)});
  }
}

function initM5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="170" alt="Family">'+
    '<div style="font-size:42px;font-weight:900;color:#e91e8c;margin:10px 0">All Done!</div>'+
    '<div style="font-size:22px;color:#e67e22">You found all colors!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px;margin-top:16px" onclick="location.reload()">Play Again</button>';
}
</script>
</body>
</html>
