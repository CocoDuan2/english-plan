<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P45 - Magic E: u_e Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#f3e5f5,#fff8e1);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#9c27b0}
.tz{
  background:linear-gradient(135deg,#ce93d8,#9c27b0);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(156,39,176,.3);
  position:relative;margin-top:8px;
}
.tz::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);width:60%;height:3px;
  background:rgba(255,255,255,.5);border-radius:2px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #9c27b0;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#9c27b0;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;border:4px solid #9c27b0;
  box-shadow:0 6px 16px rgba(156,39,176,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}

.transform-box{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;margin-top:20px;
}
.transform-word{
  font-size:64px;font-weight:900;color:#2c3e50;
  background:#fff;border:4px solid #9c27b0;border-radius:20px;
  padding:16px 32px;transition:all .5s ease;position:relative;
}
.transform-word .e-slot{
  display:inline-block;width:40px;height:40px;
  border:4px dashed #9c27b0;border-radius:8px;
  vertical-align:middle;margin-left:4px;
  transition:all .3s ease;
}
.magic-e-btn{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#ce93d8,#9c27b0);
  border:4px solid #7b1fa2;
  color:#fff;font-size:48px;font-weight:900;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(156,39,176,.4);
  transition:all .3s ease;
  animation:sparkle 1.5s ease-in-out infinite;
}
@keyframes sparkle{
  0%,100%{box-shadow:0 0 8px rgba(156,39,176,.4)}
  50%{box-shadow:0 0 20px rgba(156,39,176,.8),0 0 40px rgba(206,147,216,.4)}
}
.magic-e-btn:active{transform:scale(.9)}
.transform-result{font-size:32px;font-weight:900;color:#27ae60;min-height:40px}

.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #9c27b0;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(156,39,176,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(156,39,176,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.listen-card.correct{background:#d4edda;border-color:#27ae60}
.listen-card.wrong{animation:shake .3s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-10px)}
  75%{transform:translateX(10px)}
}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
}
.replay-btn:active{transform:scale(.95)}

.mem-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:12px;max-width:520px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ce93d8,#9c27b0);
  border:4px solid #9c27b0;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;position:relative;
  box-shadow:0 4px 12px rgba(156,39,176,.2);
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{display:flex;flex-direction:column;align-items:center;justify-content:center}
.mem-front .emoji{font-size:36px}
.mem-back{display:none;flex-direction:column;align-items:center;justify-content:center}
.mem-back img{width:50px;height:auto;margin-bottom:4px}
.mem-back .label{font-size:14px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}

.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#9c27b0;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;flex-wrap:wrap;
}
.start-screen .preview img{width:70px;height:auto}
.start-btn{
  padding:16px 40px;background:#9c27b0;color:#fff;
  border:none;border-radius:16px;font-size:32px;
  font-weight:900;cursor:pointer;
  box-shadow:0 6px 16px rgba(156,39,176,.3);
  transition:transform .2s ease;
}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:110px;margin:20px auto}
.done-screen h1{font-size:42px;font-weight:900;color:#9c27b0;margin-bottom:12px}
.done-screen .msg{font-size:22px;color:#e67e22;font-weight:700;margin-bottom:20px}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#9c27b0;color:#fff;transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px;padding:6px 14px}
  .sb{font-size:20px}
  .pr{flex-direction:column;text-align:center;gap:8px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:8px 14px;max-width:90%}
  .learn-card{width:100px;height:100px}
  .learn-card img{width:65px}
  .learn-card .label{font-size:16px}
  .card-icon{font-size:44px}
  .transform-word{font-size:44px;padding:12px 20px}
  .transform-word .e-slot{width:30px;height:30px}
  .magic-e-btn{width:64px;height:64px;font-size:36px}
  .listen-card{width:95px;height:95px}
  .listen-card img{width:60px}
  .listen-card .label{font-size:14px}
  .mem-grid{grid-template-columns:repeat(5,1fr);max-width:340px;gap:8px}
  .mem-front .emoji{font-size:28px}
  .mem-back img{width:36px}
  .mem-back .label{font-size:11px}
  .start-screen h1{font-size:32px}
  .start-btn{font-size:26px;padding:14px 32px}
  .done-screen h1{font-size:32px}
  .replay-btn{font-size:18px;padding:10px 20px}
}
@media(min-width:768px){
  .mem-grid{max-width:600px}
}
</style>
</head>
<body>

<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-fairy-princess.png" alt="Peppa Fairy">
    <h1>✨ Magic E: u_e Review</h1>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" alt="cute">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f4.svg" alt="tube">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f40f.svg" alt="mule">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1fa88.svg" alt="flute">

  </div>

<div class="mod">
  <div class="top">
    <div class="te">✨ Learn</div>
    <div class="tz">点一点，学单词！</div>
    <div class="sb"><span id="s1">★</span><span id="s2">★</span><span id="s3">★</span><span id="s4">★</span><span id="s5">★</span></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Tap to reveal!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<div class="mod">
  <div class="top">
    <div class="te">🪄 Magic E Game</div>
    <div class="tz">点击 e，变魔法！</div>
    <div class="sb"><span id="s6">★</span><span id="s7">★</span><span id="s8">★</span><span id="s9">★</span><span id="s10">★</span></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa Fairy">

<div class="mod">
  <div class="top">

    <div class="sb"><span id="s11">★</span><span id="s12">★</span><span id="s13">★</span><span id="s14">★</span><span id="s15">★</span></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">

  </div>
  <button class="replay-btn" onclick="playCurrentWord()">🔊 Listen</button>

</div>

<div class="mod">
  <div class="top">
    <div class="te">🧠 Memory Match</div>
    <div class="tz">翻一翻，找一样！</div>
    <div class="sb"><span id="s16">★</span><span id="s17">★</span><span id="s18">★</span><span id="s19">★</span><span id="s20">★</span></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<div class="mod">
  <div class="done-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <h1>✨ All Done!</h1>
    <div class="msg">Magic E master! cute, tube, mule, flute, June! 💜</div>
    <div class="sb" style="justify-content:center;font-size:32px;margin:20px 0">
      <span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
    </div>
    <button class="start-btn" onclick="goM(0)">Play Again 🪄</button>
  </div>
</div>

<div class="nav">
  <button onclick="prevM()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="currM">1</span> / 6</div>
  <button onclick="nextM()" id="nextBtn">Next ▶</button>
</div>

<script>
const words=[
  {w:'cute',img:'1f436'},
  {w:'tube',img:'1f9f4'},
  {w:'mule',img:'1f40f'},
  {w:'flute',img:'1fa88'},
  {w:'June',img:'1f4c6'}
];

const transformPairs=[
  {base:'cut',full:'cute',img:'1f436'},
  {base:'tub',full:'tube',img:'1f9f4'},
  {base:'mul',full:'mule',img:'1f40f'},
  {base:'flut',full:'flute',img:'1fa88'},
  {base:'Jun',full:'June',img:'1f4c6'}
];

let cm=0,busy=false;
let listenIdx=0,memFlipped=[],memMatched=0;
let transformIdx=0;

function goM(m){
  if(m<0||m>5)return;
  document.querySelectorAll('.mod').forEach((el,i)=>el.classList.toggle('active',i===m));
  cm=m;
  document.getElementById('currM').textContent=m+1;
  document.getElementById('prevBtn').disabled=m===0;
  document.getElementById('nextBtn').disabled=m===5;
  if(m===1)initM1();
  if(m===2)initM2();
  if(m===3)initM3();
  if(m===4)initM4();
}
function nextM(){if(cm<5)goM(cm+1)}
function prevM(){if(cm>0)goM(cm-1)}

function stars(ids){
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.textContent='⭐';
  });
}

function speak(w,cb){
  const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
  const a=new Audio(u);
  let done=false;
  const finish=()=>{if(!done){done=true;if(cb)cb()}};
  a.play().then(()=>{a.onended=finish;setTimeout(finish,4000)}).catch(()=>{
    const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
    const a2=new Audio(u2);
    a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(finish);
  });
}

// Preload audio
const preloadWords=['cute', 'tube', 'mule', 'flute', 'June'];
preloadWords.forEach(w=>{
  const a=new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`);
  a.load();
});

function playOk(){
  try{
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=523;
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);
    osc.start();osc.stop(ctx.currentTime+0.3);
  }catch(e){}
  showConfetti();
}

function playNo(){
  try{
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=200;
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.2);
    osc.start();osc.stop(ctx.currentTime+0.2);
  }catch(e){}
}

function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;
      background:${['#ce93d8','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};
      left:${50+Math.random()*20-10}%;top:30%;
      animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

function initM1(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  words.forEach((item,i)=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`
      <div class="card-icon">🪄</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${item.img}.svg" alt="${item.w}">
      <div class="label">${item.w}</div>
    `;
    card.onclick=()=>{
      if(card.classList.contains('revealed'))return speak(item.w);
      card.classList.add('revealed');
      speak(item.w);
      stars([`s${i+1}`]);
    };
    grid.appendChild(card);
  });
}

function initM2(){
  transformIdx=0;
  showTransform();
}

function showTransform(){
  const box=document.getElementById('transformBox');
  if(transformIdx>=transformPairs.length){
    box.innerHTML=`
      <div style="font-size:48px;margin:20px 0">🎉</div>
      <div style="font-size:28px;font-weight:900;color:#27ae60">Magic E master!</div>
    `;
    return;
  }
  const pair=transformPairs[transformIdx];
  box.innerHTML=`
    <div class="transform-word" id="tWord">${pair.base}<span class="e-slot" id="eSlot"></span></div>
    <div style="font-size:20px;color:#667085;margin:8px 0">👆 Tap the magic E button!</div>
    <button class="magic-e-btn" id="eBtn" onclick="addMagicE()">e</button>
    <div class="transform-result" id="tResult"></div>
  `;
}

function addMagicE(){
  const pair=transformPairs[transformIdx];
  const slot=document.getElementById('eSlot');
  const result=document.getElementById('tResult');
  const word=document.getElementById('tWord');
  const btn=document.getElementById('eBtn');
  slot.style.borderStyle='solid';
  slot.style.background='linear-gradient(135deg,#ce93d8,#9c27b0)';
  slot.style.color='#fff';
  slot.textContent='e';
  slot.style.display='inline-flex';
  slot.style.alignItems='center';
  slot.style.justifyContent='center';
  slot.style.fontSize='inherit';
  slot.style.fontWeight='900';
  btn.style.display='none';
  setTimeout(()=>{
    word.innerHTML=`${pair.full}`;
    word.style.color='#9c27b0';
    result.innerHTML=`✨ ${pair.full}! ✨`;
    playOk();speak(pair.full);
    stars([`s${6+transformIdx}`]);
  },600);
  setTimeout(()=>{
    transformIdx++;
    showTransform();
  },2500);
}

let listenWords=[...words];
let currentListenWord=null;

function initM3(){
  listenIdx=0;
  listenWords=[...words].sort(()=>Math.random()-0.5);
  showListenRound();
}

function showListenRound(){
  if(listenIdx>=listenWords.length){
    document.getElementById('listenGrid').innerHTML=`
      <div style="text-align:center;width:100%">
        <div style="font-size:48px;margin:20px 0">🎉</div>
        <div style="font-size:28px;font-weight:900;color:#27ae60">All found!</div>
      </div>
    `;
    return;
  }
  currentListenWord=listenWords[listenIdx];
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  const others=words.filter(w=>w.w!==currentListenWord.w);
  const shuffled=[...others].sort(()=>Math.random()-0.5);
  const choices=[currentListenWord,shuffled[0],shuffled[1]].sort(()=>Math.random()-0.5);
  choices.forEach(item=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${item.img}.svg" alt="${item.w}">
      <div class="label">${item.w}</div>
    `;
    card.onclick=()=>{
      if(busy)return;
      if(item.w===currentListenWord.w){
        busy=true;
        card.classList.add('correct');
        playOk();speak(item.w);
        stars([`s${11+listenIdx}`]);
        setTimeout(()=>{
          busy=false;
          listenIdx++;
          showListenRound();
          if(listenIdx<listenWords.length)setTimeout(()=>playCurrentWord(),500);
        },1500);
      }else{
        card.classList.add('wrong');
        playNo();speak(currentListenWord.w);
        setTimeout(()=>card.classList.remove('wrong'),400);
      }
    };
    grid.appendChild(card);
  });
  setTimeout(()=>playCurrentWord(),500);
}

function playCurrentWord(){
  if(currentListenWord)speak(currentListenWord.w);
}

function initM4(){
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  memFlipped=[];memMatched=0;
  const pairs=[...words,...words].sort(()=>Math.random()-0.5);
  pairs.forEach((item,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.word=item.w;
    card.innerHTML=`
      <div class="mem-front"><div class="emoji">🪄</div></div>
      <div class="mem-back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${item.img}.svg" alt="${item.w}">
        <div class="label">${item.w}</div>
      </div>
    `;
    card.onclick=()=>flipCard(card,i);
    grid.appendChild(card);
  });
}

function flipCard(card,idx){
  if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  memFlipped.push({card,idx,word:card.dataset.word});
  if(memFlipped.length===2){
    busy=true;
    const [a,b]=memFlipped;
    if(a.word===b.word&&a.idx!==b.idx){
      playOk();speak(a.word);
      setTimeout(()=>{
        a.card.classList.add('matched');
        b.card.classList.add('matched');
        memMatched++;
        stars([`s${16+memMatched-1}`]);
        if(memMatched===words.length)setTimeout(()=>goM(5),1000);
        memFlipped=[];busy=false;
      },1200);
    }else{
      playNo();
      setTimeout(()=>{
        a.card.classList.remove('flipped');
        b.card.classList.remove('flipped');
        memFlipped=[];busy=false;
      },1000);
    }
  }
}

goM(0);
</script>
