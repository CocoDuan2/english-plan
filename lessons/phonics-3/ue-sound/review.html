<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P52 Review - ue Sound</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  background:linear-gradient(135deg,#e3f2fd,#fff5f0);
  color:#2c3e50;
}
.hdr{
  background:#fff;border-bottom:3px solid #1976d2;
  padding:12px 16px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.hdr-ttl{font-size:26px;font-weight:900;color:#e91e8c}
.hdr-sub{font-size:20px;font-weight:900;color:#e67e22;margin-top:4px}
.stars{
  display:flex;gap:8px;justify-content:center;
  margin-top:8px;font-size:22px;
}
.mod{
  flex:1;display:none;flex-direction:column;
  padding:20px 16px 80px;
  align-items:center;justify-content:center;
  text-align:center;
}
.mod.active{display:flex}
.ttl{font-size:32px;font-weight:900;color:#1976d2;margin-bottom:12px}
.sub{font-size:20px;color:#e67e22;font-weight:700}
.pr{display:flex;align-items:center;gap:12px;margin:16px 0}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #1976d2;border-radius:20px;
  padding:12px 20px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#1976d2;
}
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:16px;max-width:500px;margin:20px auto;
}
.card{
  background:#ddd;border:4px solid #bbb;border-radius:16px;
  padding:20px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:all .2s ease;
}
.card:hover{transform:scale(1.05)}
.card.revealed{background:#fff;border-color:#1976d2}
.card img{width:100px;height:auto}
.card .word{font-size:32px;font-weight:900;color:#2c3e50}
.btn{
  padding:14px 28px;border:none;border-radius:12px;
  font-size:20px;font-weight:700;cursor:pointer;
  background:#1976d2;color:#fff;
  transition:transform .2s ease;margin:12px;
}
.btn:active{transform:scale(.95)}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav-btn{
  padding:10px 20px;border:none;border-radius:12px;
  font-size:16px;font-weight:700;cursor:pointer;
  background:#1976d2;color:#fff;
  transition:all .2s ease;
}
.nav-btn:disabled{background:#ccc;cursor:not-allowed}
.nav-btn:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:18px;font-weight:700;color:#1976d2}

.blend-game{max-width:600px;margin:20px auto}
.blend-input{
  display:flex;gap:8px;justify-content:center;
  margin:20px 0;
}
.blend-slot{
  width:60px;height:60px;
  border:3px solid #1976d2;border-radius:12px;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#2c3e50;
}
.blend-letters{
  display:flex;gap:8px;justify-content:center;
  flex-wrap:wrap;margin-top:20px;
}
.blend-letter-btn{
  width:60px;height:60px;
  border:3px solid #1976d2;border-radius:12px;
  background:#fff;cursor:pointer;
  font-size:28px;font-weight:900;color:#1976d2;
  transition:all .2s ease;
}
.blend-letter-btn:hover{transform:scale(1.1)}
.blend-letter-btn.used{opacity:.3;pointer-events:none}

.listen-game{max-width:600px;margin:20px auto}
.listen-options{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:20px}
.listen-option{
  background:#fff;border:4px solid #1976d2;border-radius:20px;
  padding:20px;cursor:pointer;transition:all .2s ease;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.listen-option:hover{transform:scale(1.05)}
.listen-option img{width:100px;height:auto}

.memory-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;max-width:600px;margin:20px auto;
}
.memory-card{
  aspect-ratio:1;
  background:#1976d2;border:4px solid #1565c0;border-radius:16px;
  cursor:pointer;position:relative;
  transition:transform .3s ease;
}
.memory-card:hover{transform:scale(1.05)}
.memory-card.flipped{background:#fff;border-color:#1976d2}
.memory-card.matched{background:#4caf50;border-color:#388e3c;pointer-events:none}
.memory-card .front{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
}
.memory-card .back{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
}
.memory-card.flipped .back{display:flex}
.memory-card .back img{width:60px;height:auto}
.memory-card .back .word{font-size:20px;font-weight:900;color:#2c3e50}

@media(max-width:480px){
  .hdr-ttl{font-size:22px}
  .hdr-sub{font-size:18px}
  .stars{font-size:20px}
  .ttl{font-size:26px}
  .sub{font-size:18px}
  .pr{flex-direction:column;gap:8px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:10px 16px}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .card img{width:80px}
  .card .word{font-size:28px}
  .listen-options{grid-template-columns:1fr;gap:12px}
  .memory-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .memory-card .front{font-size:36px}
  .memory-card .back img{width:50px}
  .memory-card .back .word{font-size:18px}
}
</style>
</head>
<body>
<div class="hdr">
<div class="hdr-ttl">P52 Review · ue Sound</div>
<div class="hdr-sub">复习 ue 发音</div>
<div class="stars" id="stars"></div>
</div>
<!-- M0: Start -->
<div class="mod active">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin-bottom:16px">
<div class="ttl">Let's Review "ue"!</div>
<div class="sub">复习 ue 发音</div>
<div style="display:flex;gap:12px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f535.svg" style="width:80px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f4.svg" style="width:80px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2705.svg" style="width:80px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f50d.svg" style="width:80px">
</div>
<button class="btn" onclick="nextMod()">Let's Play! 开始</button>
</div>

<!-- M1: Learn -->
<div class="mod">
<div class="ttl">Learn the Words</div>
<div class="sub">点击卡片学单词</div>
<div class="grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
<div class="ttl">Spell the Word!</div>
<div class="sub">听音拼单词</div>
<div class="blend-game">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png">
<div class="bbl">Listen and spell!</div>
</div>
<button class="btn" onclick="playBlendWord()">🔊 Play Word</button>
<div class="blend-input" id="blendInput"></div>
<div class="blend-letters" id="blendLetters"></div>
<div style="font-size:28px;font-weight:900;margin-top:16px;min-height:40px" id="blendFeedback"></div>
</div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
<div class="ttl">Listen & Find</div>
<div class="sub">听音找图</div>
<div class="listen-game">
<button class="btn" onclick="playListenWord()">🔊 Play Again</button>
<div class="listen-options" id="listenOptions"></div>
<div style="font-size:28px;font-weight:900;margin-top:16px;min-height:40px" id="listenFeedback"></div>
</div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
<div class="ttl">Memory Match</div>
<div class="sub">记忆翻牌配对</div>
<div class="memory-grid" id="memoryGrid"></div>
<div style="font-size:28px;font-weight:900;margin-top:16px;min-height:40px" id="memoryFeedback"></div>
</div>

<!-- M5: Done -->
<div class="mod">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:160px;margin-bottom:16px">
<div class="ttl">All Done! 🎉</div>
<div class="sub">全部完成！</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-fairy-princess.png">
<div class="bbl">Great job!</div>
</div>
<button class="btn" onclick="location.reload()">Play Again 再玩一次</button>
</div>

<div class="nav">
<button class="nav-btn" id="prevBtn" onclick="prevMod()">◀ Back</button>
<div class="page-num"><span id="curr">1</span> / 6</div>
<button class="nav-btn" id="nextBtn" onclick="nextMod()">Next ▶</button>
</div>
<script>
const words=['blue','glue','true','clue'];
const emojis={blue:'1f535',glue:'1f9f4',true:'2705',clue:'1f50d'};
let curr=0,stars=0;
const mods=document.querySelectorAll('.mod');

function updateStars(){
  document.getElementById('stars').innerHTML=Array(6).fill(0).map((_,i)=>i<stars?'⭐':'★').join('');
}
updateStars();

function showMod(n){
  mods.forEach(m=>m.classList.remove('active'));
  mods[n].classList.add('active');
  document.getElementById('curr').textContent=n+1;
  document.getElementById('prevBtn').disabled=n===0;
  document.getElementById('nextBtn').disabled=n===5;
  if(n===1)initLearn();
  if(n===2)initBlend();
  if(n===3)initListen();
  if(n===4)initMemory();
}

function nextMod(){if(curr<5){curr++;showMod(curr)}}
function prevMod(){if(curr>0){curr--;showMod(curr)}}

function speak(txt){
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';
  u.rate=0.8;
  speechSynthesis.speak(u);
}

function playOk(){speak('Good job')}
function playNo(){speak('Try again')}

// M1: Learn
function initLearn(){
  document.getElementById('learnGrid').innerHTML=words.map(w=>`
    <div class="card" onclick="revealCard(this,'${w}')">
      <div style="font-size:48px">?</div>
    </div>
  `).join('');
}

function revealCard(el,w){
  if(el.classList.contains('revealed'))return;
  el.classList.add('revealed');
  el.innerHTML=`
    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[w]}.svg">
    <div class="word">${w}</div>
  `;
  speak(w);
}

// M2: Blending
let blendIdx=0,blendInput=[];
function initBlend(){
  blendIdx=0;
  nextBlendWord();
}

function nextBlendWord(){
  if(blendIdx>=words.length){
    document.getElementById('blendFeedback').textContent='🎉 All done!';
    stars++;updateStars();
    setTimeout(nextMod,2000);
    return;
  }
  blendInput=[];
  const w=words[blendIdx];
  document.getElementById('blendInput').innerHTML=w.split('').map(()=>'<div class="blend-slot">_</div>').join('');
  const letters=[...new Set(w.split(''))].sort(()=>Math.random()-0.5);
  document.getElementById('blendLetters').innerHTML=letters.map(l=>`
    <button class="blend-letter-btn" onclick="addLetter('${l}')">${l}</button>
  `).join('');
  document.getElementById('blendFeedback').textContent='';
}

function playBlendWord(){
  speak(words[blendIdx]);
}

function addLetter(l){
  const w=words[blendIdx];
  if(blendInput.length>=w.length)return;
  blendInput.push(l);
  document.querySelectorAll('.blend-slot')[blendInput.length-1].textContent=l;
  if(blendInput.join('')===w){
    document.getElementById('blendFeedback').textContent='✅ Correct!';
    playOk();
    confetti({particleCount:80,spread:60,origin:{y:0.6}});
    blendIdx++;
    setTimeout(nextBlendWord,2000);
  }else if(blendInput.length===w.length){
    document.getElementById('blendFeedback').textContent='❌ Try again!';
    playNo();
    setTimeout(()=>{
      blendInput=[];
      document.querySelectorAll('.blend-slot').forEach(s=>s.textContent='_');
      document.getElementById('blendFeedback').textContent='';
    },1500);
  }
}

// M3: Listen
let listenIdx=0;
function initListen(){
  listenIdx=0;
  nextListenWord();
}

function nextListenWord(){
  if(listenIdx>=words.length){
    document.getElementById('listenFeedback').textContent='🎉 All done!';
    stars++;updateStars();
    setTimeout(nextMod,2000);
    return;
  }
  const correct=words[listenIdx];
  const opts=words.sort(()=>Math.random()-0.5);
  document.getElementById('listenOptions').innerHTML=opts.map(w=>`
    <div class="listen-option" onclick="checkListen('${w}','${correct}')">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[w]}.svg">
    </div>
  `).join('');
  document.getElementById('listenFeedback').textContent='';
  setTimeout(()=>speak(correct),500);
}

function playListenWord(){
  speak(words[listenIdx]);
}

function checkListen(sel,cor){
  if(sel===cor){
    document.getElementById('listenFeedback').textContent='✅ Correct!';
    playOk();
    speak(cor);
    confetti({particleCount:80,spread:60,origin:{y:0.6}});
    listenIdx++;
    setTimeout(nextListenWord,2000);
  }else{
    document.getElementById('listenFeedback').textContent='❌ Try again!';
    playNo();
  }
}

// M4: Memory
let memFlipped=[],memMatched=[];
function initMemory(){
  memFlipped=[];memMatched=[];
  const pairs=[...words,...words].sort(()=>Math.random()-0.5);
  document.getElementById('memoryGrid').innerHTML=pairs.map((w,i)=>`
    <div class="memory-card" onclick="flipMem(${i},'${w}')">
      <div class="front">?</div>
      <div class="back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${emojis[w]}.svg">
        <div class="word">${w}</div>
      </div>
    </div>
  `).join('');
}

function flipMem(i,w){
  const card=document.querySelectorAll('.memory-card')[i];
  if(card.classList.contains('flipped')||card.classList.contains('matched')||memFlipped.length>=2)return;
  card.classList.add('flipped');
  memFlipped.push({i,w,card});
  speak(w);
  if(memFlipped.length===2){
    setTimeout(checkMemMatch,800);
  }
}

function checkMemMatch(){
  const[a,b]=memFlipped;
  if(a.w===b.w){
    a.card.classList.add('matched');
    b.card.classList.add('matched');
    memMatched.push(a.w);
    playOk();
    confetti({particleCount:50,spread:50,origin:{y:0.6}});
    if(memMatched.length===4){
      document.getElementById('memoryFeedback').textContent='🎉 All matched!';
      stars++;updateStars();
      setTimeout(nextMod,2000);
    }
  }else{
    a.card.classList.remove('flipped');
    b.card.classList.remove('flipped');
    playNo();
  }
  memFlipped=[];
}

function confetti(opts){
  if(window.confetti)window.confetti(opts);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</body>
</html>
