<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 3 Review - Morning Routine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.md{display:none;flex-direction:column;align-items:center;justify-content:flex-start;flex:1;padding:20px 24px 70px;overflow-y:auto}
.md.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.bg-mint{background:linear-gradient(160deg,#b2dfdb,#80cbc4)}
.bg-lav{background:linear-gradient(160deg,#e1bee7,#ce93d8)}
.bg-peach{background:linear-gradient(160deg,#ffccbc,#ffab91)}
.hd{width:100%;max-width:600px;display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:2px solid rgba(255,255,255,.5);margin-bottom:16px}
.ht{font-size:26px;font-weight:900;color:#e91e8c}
.tz{display:flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(135deg,#ff6b9d,#ffa07a);border-radius:25px;font-size:20px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(255,107,157,.3);position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,255,255,.4);border-radius:2px}
.st{display:flex;gap:6px;font-size:22px}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:10px 18px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:500px;margin:16px 0}
.card{aspect-ratio:1;background:#ddd;border-radius:16px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .1s}
.card:active{transform:scale(.95)}
.card.on{background:#fff}
.card img{width:90px;height:90px}
.card .label{font-size:20px;font-weight:700;color:#2c3e50}
.body-game{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px;margin:20px 0}
.body-btn{padding:20px;background:#fff;border-radius:20px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:12px;transition:all .2s}
.body-btn:active{transform:scale(.95)}
.body-btn.correct{background:#c8e6c9;animation:bounce .6s}
.body-btn .emoji{font-size:60px}
.body-btn .label{font-size:24px;font-weight:700;color:#2c3e50}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:500px;margin:16px 0}
.listen-card{aspect-ratio:1;background:#fff;border-radius:16px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .1s}
.listen-card:active{transform:scale(.95)}
.listen-card.correct{background:#c8e6c9}
.listen-card img{width:90px;height:90px}
.listen-card .label{font-size:20px;font-weight:700;color:#2c3e50}
.replay-btn{margin:16px 0;padding:12px 24px;background:linear-gradient(135deg,#a8e6cf,#88d8b0);border:none;border-radius:25px;font-size:20px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(168,230,207,.4);display:flex;align-items:center;gap:8px}
.replay-btn:active{transform:scale(.95)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:560px;margin:16px 0}
.mem-card{aspect-ratio:1;background:#F9ADC7;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .1s}
.mem-card:active{transform:scale(.95)}
.mem-card.flip{background:#fff}
.mem-card.match{background:#c8e6c9;pointer-events:none}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flip .back{display:none}
.mem-card.flip .front{display:flex}
.mem-card .front img{width:70px;height:70px}
.mem-card .front .label{font-size:18px;font-weight:700;color:#2c3e50}
.start-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin:20px 0}
.start-wrap img{width:110px;height:auto}
.start-ttl{font-size:42px;font-weight:900;color:#2c3e50}
.start-btn{padding:16px 40px;background:#F9ADC7;border:none;border-radius:25px;font-size:32px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 6px 16px rgba(249,173,199,.4)}
.start-btn:active{transform:scale(.95)}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin:20px 0}
.done-wrap img{width:110px;height:auto}
.done-ttl{font-size:48px;font-weight:900;color:#2c3e50}
.done-sub{font-size:24px;color:#7f8c8d}
.confetti{position:fixed;width:12px;height:12px;border-radius:50%;pointer-events:none;z-index:999;animation:fall 2s forwards}
@keyframes fall{to{transform:translateY(100vh);opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
@keyframes peppa-jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
  .ht{font-size:22px}.tz{font-size:18px;padding:6px 12px}.st{font-size:18px}
  .bbl{font-size:18px;padding:8px 14px}
  .card-grid,.listen-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .card img,.listen-card img{width:70px;height:70px}
  .card .label,.listen-card .label{font-size:18px}
  .body-game{gap:15px}
  .body-btn{padding:16px;gap:8px}
  .body-btn .emoji{font-size:50px}
  .body-btn .label{font-size:20px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:10px;max-width:440px}
  .mem-card .back{font-size:36px}
  .mem-card .front img{width:60px;height:60px}
  .mem-card .front .label{font-size:16px}
  .start-ttl{font-size:32px}
  .start-btn{font-size:26px;padding:14px 32px}
  .done-ttl{font-size:38px}
  .done-sub{font-size:20px}
}
@media(min-width:768px){
  .card img,.listen-card img{width:100px;height:100px}
  .mem-grid{max-width:600px}
}
</style>
</head>
<body>
<div class="deck">
<!-- M0: Start -->
<div class="md bg-pink on">
  <div class="start-wrap">
    <img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="start-ttl">Morning Routine</div>
    <div style="display:flex;gap:12px;font-size:60px">
      <div>👤</div><div>👀</div><div>👂</div><div>👃</div><div>👄</div>
    </div>
    <button class="start-btn" onclick="goM(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="md bg-sky">
  <div class="hd">
    <div class="ht">Learn New Words</div>
    <div class="tz">👆 点一点</div>
  </div>
  <div class="st" id="stars1">★★★★★</div>
  <div class="pr">
    <img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Tap to learn!</div>
  </div>
  <div class="card-grid" id="learnGrid"></div>
</div>

<!-- M2: Touch Your Body -->
<div class="md bg-mint">
  <div class="hd">
    <div class="ht">Touch Your Body</div>
    <div class="tz">👆 听指令点身体</div>
  </div>
  <div class="st" id="stars2">★★★★★</div>
  <div class="pr">
    <img src="../../assets/peppa/george-standing.png" alt="George">
    <div class="bbl">Touch your <span id="targetPart">head</span>!</div>
  </div>
  <div class="body-game" id="bodyGame"></div>
</div>

<!-- M3: Listen & Find -->
<div class="md bg-lav">
  <div class="hd">
    <div class="ht">Listen & Find</div>
    <div class="tz">👂 听声音找图片</div>
  </div>
  <div class="st" id="stars3">★★★★★</div>
  <div class="pr">
    <img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
    <div class="bbl">Find <span id="listenWord">head</span>!</div>
  </div>
  <button class="replay-btn" onclick="replayListen()">🔊 听一遍</button>
  <div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Flip -->
<div class="md bg-peach">
  <div class="hd">
    <div class="ht">Memory Flip</div>
    <div class="tz">🎴 找一样的</div>
  </div>
  <div class="st" id="stars4">★★★★★</div>
  <div class="pr">
    <img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily">
    <div class="bbl">Match them!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="md bg-sky">
  <div class="done-wrap">
    <img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <div class="done-ttl">All Done! 🎉</div>
    <div class="done-sub">You learned 5 body parts!</div>
    <div class="st">⭐⭐⭐⭐⭐</div>
    <button class="start-btn" onclick="goM(0)">Play Again</button>
  </div>
</div>
</div>

<div class="nav">
  <button class="nb" onclick="prevM()" id="prevBtn">Back</button>
  <div class="np"><span id="curr">1</span> / 6</div>
  <button class="nb" onclick="nextM()" id="nextBtn">Next</button>
</div>

<script>
const words=['head','eyes','ears','nose','mouth'];
const emojis=['👤','👀','👂','👃','👄'];
let midx=0,busy=false;
let stars=[0,0,0,0,0];

function goM(n){
  document.querySelectorAll('.md').forEach((m,i)=>m.classList.toggle('on',i===n));
  midx=n;
  document.getElementById('curr').textContent=n+1;
  document.getElementById('prevBtn').disabled=n===0;
  document.getElementById('nextBtn').disabled=n===5;
  if(n===1)initLearn();
  if(n===2)initBodyGame();
  if(n===3)initListen();
  if(n===4)initMemory();
}
function prevM(){if(midx>0)goM(midx-1)}
function nextM(){if(midx<5)goM(midx+1)}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prevM();
  if(e.key==='ArrowRight')nextM();
});

// M1: Learn
let learnRevealed=0;
function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  learnRevealed=0;
  words.forEach((w,i)=>{
    const card=document.createElement('button');
    card.className='card';
    card.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${getEmojiCode(emojis[i])}.svg" style="display:none"><div class="label" style="display:none">${w}</div>`;
    card.onclick=()=>{
      if(!card.classList.contains('on')){
        card.classList.add('on');
        card.querySelector('img').style.display='block';
        card.querySelector('.label').style.display='block';
        speak(w);
        learnRevealed++;
        updateStars(1,learnRevealed);
        if(learnRevealed===5)setTimeout(()=>goM(2),1200);
      }else{
        speak(w);
      }
    };
    grid.appendChild(card);
  });
}

function getEmojiCode(emoji){
  const codes={'👤':'1f464','👀':'1f440','👂':'1f442','👃':'1f443','👄':'1f444'};
  return codes[emoji]||'1f464';
}

// M2: Touch Your Body
let bodyIdx=0;
function initBodyGame(){
  const game=document.getElementById('bodyGame');
  game.innerHTML='';
  bodyIdx=0;
  const shuffled=[...words].sort(()=>Math.random()-.5);
  shuffled.forEach((w,i)=>{
    const btn=document.createElement('button');
    btn.className='body-btn';
    btn.innerHTML=`<div class="emoji">${emojis[words.indexOf(w)]}</div><div class="label">${w}</div>`;
    btn.onclick=()=>{
      if(busy)return;
      const target=words[bodyIdx];
      if(w===target){
        busy=true;
        btn.classList.add('correct');
        playOk();
        showConfetti();
        speak(w);
        updateStars(2,bodyIdx+1);
        bodyIdx++;
        document.getElementById('targetPart').textContent=words[bodyIdx]||'done';
        setTimeout(()=>{
          busy=false;
          if(bodyIdx===5)goM(3);
        },1200);
      }else{
        playNo();
        speak(target);
      }
    };
    game.appendChild(btn);
  });
  document.getElementById('targetPart').textContent=words[0];
  speak(words[0]);
}

// M3: Listen & Find
let listenIdx=0;
function initListen(){
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  listenIdx=0;
  const shuffled=[...words].sort(()=>Math.random()-.5);
  shuffled.forEach(w=>{
    const card=document.createElement('button');
    card.className='listen-card';
    card.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${getEmojiCode(emojis[words.indexOf(w)])}.svg"><div class="label">${w}</div>`;
    card.onclick=()=>{
      if(busy||card.classList.contains('correct'))return;
      const target=words[listenIdx];
      if(w===target){
        busy=true;
        card.classList.add('correct');
        playOk();
        showConfetti();
        speak(w);
        updateStars(3,listenIdx+1);
        listenIdx++;
        if(listenIdx<5){
          setTimeout(()=>{
            busy=false;
            document.getElementById('listenWord').textContent=words[listenIdx];
            speak(words[listenIdx]);
          },1200);
        }else{
          setTimeout(()=>goM(4),1200);
        }
      }else{
        playNo();
      }
    };
    grid.appendChild(card);
  });
  document.getElementById('listenWord').textContent=words[0];
  speak(words[0]);
}
function replayListen(){
  if(listenIdx<5)speak(words[listenIdx]);
}

// M4: Memory Flip
let memFlipped=[],memMatched=0;
function initMemory(){
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  memFlipped=[];
  memMatched=0;
  const pairs=[...words,...words].sort(()=>Math.random()-.5);
  pairs.forEach((w,i)=>{
    const card=document.createElement('button');
    card.className='mem-card';
    card.dataset.word=w;
    card.innerHTML=`<div class="back">❓</div><div class="front"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${getEmojiCode(emojis[words.indexOf(w)])}.svg"><div class="label">${w}</div></div>`;
    card.onclick=()=>{
      if(busy||card.classList.contains('flip')||card.classList.contains('match'))return;
      card.classList.add('flip');
      speak(w);
      memFlipped.push(card);
      if(memFlipped.length===2){
        busy=true;
        const[c1,c2]=memFlipped;
        if(c1.dataset.word===c2.dataset.word){
          setTimeout(()=>{
            c1.classList.add('match');
            c2.classList.add('match');
            playOk();
            showConfetti();
            memMatched++;
            updateStars(4,memMatched);
            memFlipped=[];
            busy=false;
            if(memMatched===5)setTimeout(()=>goM(5),1200);
          },600);
        }else{
          setTimeout(()=>{
            c1.classList.remove('flip');
            c2.classList.remove('flip');
            playNo();
            memFlipped=[];
            busy=false;
          },1000);
        }
      }
    };
    grid.appendChild(card);
  });
}

function updateStars(module,count){
  stars[module]=count;
  const el=document.getElementById(`stars${module}`);
  if(el)el.innerHTML='⭐'.repeat(count)+'★'.repeat(5-count).split('').map(s=>s==='★'?'<span style="color:#bbb">★</span>':s).join('');
}

function speak(text,cb){
  const url=text.includes(' ')?
    `https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(text)}&spd=4&source=web`:
    `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&type=2`;
  const a=new Audio(url);
  let done=false;
  a.onended=()=>{if(!done){done=true;cb&&cb()}};
  a.onerror=()=>{
    if(!done){
      done=true;
      const fallback=text.includes(' ')?
        `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&type=2`:
        `https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(text)}&spd=4&source=web`;
      const a2=new Audio(fallback);
      a2.onended=()=>cb&&cb();
      a2.onerror=()=>cb&&cb();
      a2.play().catch(()=>cb&&cb());
    }
  };
  setTimeout(()=>{if(!done){done=true;cb&&cb()}},4000);
  a.play().catch(()=>{if(!done){done=true;cb&&cb()}});
}

function playOk(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value=800;
  gain.gain.setValueAtTime(.3,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.3);
  osc.start();
  osc.stop(ctx.currentTime+.3);
}

function playNo(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value=200;
  gain.gain.setValueAtTime(.2,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.2);
  osc.start();
  osc.stop(ctx.currentTime+.2);
}

function showConfetti(){
  const colors=['#ff6b9d','#ffa07a','#a8e6cf','#88d8b0','#ffd700','#87ceeb'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.top=Math.random()*30+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

goM(0);
</script>
</body>
</html>
