<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 3 - Body (Review)</title>
<style>
:root{--tip-accent:#42a5f5;--tip-bg:#eaf4ff}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#9bd8ff 0%,#b8e6c3 66%,#8bc34a 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:18px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:38px;background:linear-gradient(135deg,#f9adc7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(233,30,140,.35);margin-top:16px;}
.start-btn:active{transform:scale(.96)}
.animal-quick{width:100%;max-width:500px;background:rgba(255,255,255,.8);border-radius:20px;padding:12px 10px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.aq-title{font-size:24px;font-weight:900;color:#2c3e50}
.aq-row{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.aq-btn{width:100px;height:100px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer}
.aq-btn.good{outline:4px solid #66bb6a}
.aq-btn.bad{outline:4px solid #ef5350}
.face-wrap{position:relative;width:280px;height:280px;border-radius:50%;background:#ffe1cd;box-shadow:inset 0 -14px 0 rgba(255,255,255,.35),0 5px 16px rgba(0,0,0,.12)}
.spot{position:absolute;border:none;background:transparent;cursor:pointer;border-radius:50%;min-width:82px;min-height:82px}
.spot::after{content:'';position:absolute;inset:0;border-radius:50%;border:4px dashed rgba(255,255,255,.7);opacity:0}
.spot.hit::after{opacity:1}
.s-head{left:120px;top:24px;width:84px;height:84px}
.s-eyes{left:70px;top:108px;width:180px;height:68px;border-radius:36px}
.s-ears{left:10px;top:106px;width:300px;height:86px;border-radius:42px}
.s-nose{left:128px;top:152px;width:68px;height:68px}
.s-mouth{left:102px;top:208px;width:120px;height:72px;border-radius:36px}
.learn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:520px;margin-top:12px}
.learn-card{width:96px;height:96px;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:.5;transition:.2s}
.learn-card.on{opacity:1;transform:translateY(-3px)}
.learn-card div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.doc-area{width:100%;max-width:520px;background:rgba(255,255,255,.84);border-radius:20px;padding:14px 10px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.doc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.doc-btn{height:114px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.doc-btn.good{outline:4px solid #66bb6a}
.doc-btn.bad{outline:4px solid #ef5350}
.listen-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;max-width:520px}
.listen-card{width:210px;min-height:228px;background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.listen-card.good{outline:4px solid #66bb6a}
.listen-card.bad{outline:4px solid #ef5350}
.seq-wrap{width:100%;max-width:520px;background:rgba(255,255,255,.84);border-radius:20px;padding:12px 10px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.seq-show{display:flex;gap:10px;justify-content:center;min-height:100px;align-items:center}
.seq-dot{width:90px;height:90px;border-radius:16px;background:#eceff1;display:flex;align-items:center;justify-content:center;opacity:.45;transition:.2s}
.seq-dot.on{opacity:1;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.seq-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.seq-btn{height:96px;border:none;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#f9adc7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}

  .listen-card{width:240px}
  .face-wrap{width:360px;height:360px}
}

@media(max-width:480px){
  .main{max-width:100%}
  .en{font-size:22px}
  .zh{font-size:16px;padding:4px 10px}
  .stars{font-size:18px}
  .pr img{width:60px}
  .bbl{font-size:18px;padding:8px 12px}
  .start-btn{font-size:26px;padding:16px 44px}
  .face-wrap{width:220px;height:220px}
  .spot{min-width:60px;min-height:60px}
  .learn-card{width:80px;height:80px}
  .learn-card div{font-size:16px!important}
  .listen-card{width:160px;min-height:180px}
  .listen-card img{width:72px!important}
  .aq-btn{width:80px;height:80px}
  .doc-btn{height:90px;font-size:16px!important}
  .seq-dot{width:70px;height:70px}
  .seq-btn{height:76px;font-size:16px!important}
}
@media(min-width:481px) and (max-width:767px){
  .main{max-width:560px}
  .face-wrap{width:260px;height:260px}
  .listen-card{width:200px}
}

@media(min-width:768px){.main{max-width:800px}.listen-card{width:240px}.face-wrap{width:360px;height:360px}}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Doctor Peppa Body Game</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m1b"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>

<script>
var PP='../../assets/peppa/';
var parts=[
  {w:'head',svg:'<circle cx="80" cy="82" r="52" fill="#ffd6b5"/><circle cx="63" cy="71" r="3" fill="#333"/><circle cx="99" cy="71" r="3" fill="#333"/><path d="M62 112 Q80 126 98 112" stroke="#e57373" stroke-width="5" fill="none" stroke-linecap="round"/>'},
  {w:'eyes',svg:'<ellipse cx="52" cy="78" rx="20" ry="14" fill="#fff"/><ellipse cx="108" cy="78" rx="20" ry="14" fill="#fff"/><circle cx="52" cy="80" r="6" fill="#333"/><circle cx="108" cy="80" r="6" fill="#333"/>'},
  {w:'ears',svg:'<ellipse cx="34" cy="84" rx="14" ry="20" fill="#ffd8bf"/><ellipse cx="126" cy="84" rx="14" ry="20" fill="#ffd8bf"/><ellipse cx="34" cy="84" rx="7" ry="10" fill="#ffccbc"/><ellipse cx="126" cy="84" rx="7" ry="10" fill="#ffccbc"/>'},
  {w:'nose',svg:'<ellipse cx="80" cy="94" rx="16" ry="12" fill="#ffab91"/><circle cx="74" cy="94" r="3" fill="#8d6e63"/><circle cx="86" cy="94" r="3" fill="#8d6e63"/>'},
  {w:'mouth',svg:'<path d="M58 106 Q80 132 102 106" stroke="#e53935" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M62 106 Q80 116 98 106" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>'}
];
var animals=[
  {w:'cat',svg:'<circle cx="80" cy="90" r="42" fill="#f4a460"/><polygon points="50,60 65,30 78,62" fill="#f4a460"/><polygon points="110,60 95,30 82,62" fill="#f4a460"/>'},
  {w:'dog',svg:'<circle cx="80" cy="90" r="42" fill="#b08968"/><ellipse cx="44" cy="84" rx="14" ry="22" fill="#8d6e63"/><ellipse cx="116" cy="84" rx="14" ry="22" fill="#8d6e63"/>'},
  {w:'fish',svg:'<ellipse cx="76" cy="85" rx="48" ry="32" fill="#42a5f5"/><polygon points="116,85 146,62 146,108" fill="#1e88e5"/>'}
];
function svgOf(arr,i,s){return '<svg width="'+(s||80)+'" height="'+(s||80)+'" viewBox="0 0 160 160">'+arr[i].svg+'</svg>'}

var ac=null;
function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function tone(f,d){var c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function ok(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.16)},200)}
function no(){tone(300,.3)}
function speak(t,cb){
  var u=t.indexOf(' ')>=0
    ? 'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web'
    : 'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u),done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  a.onended=fin;a.onerror=fin;setTimeout(fin,4200);a.play().catch(fin);
}

function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'★':'☆';return s}
function setHead(en,zh,s){document.getElementById('en').textContent=en;document.getElementById('zh').textContent=zh;document.getElementById('st').textContent=s||''}

var cur=0,mods=['m0','m1','m1b','m2','m3','m4','m5'];

function init0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'peppa_pig_princess_fairy.png" width="160" alt="Peppa">'+
    '<div class="pr"><div class="bbl">Tap and check body parts!</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:430px">'+parts.map(function(_,i){return svgOf(parts,i,72)}).join('')+'</div>'+
    '<button class="start-btn" onclick="audio();go(1)">Start!</button>';
  setHead('Doctor Peppa Body Game','点一点，找身体部位！','');
}

var aqOrder=[],aqIndex=0,aqScore=0,aqBusy=false,learnDone={};
function init1(){
  aqOrder=[0,1,2].sort(function(){return Math.random()-.5});
  aqIndex=0;aqScore=0;aqBusy=false;learnDone={};
  document.getElementById('m1').innerHTML=
    '<div class="animal-quick">'+
      '<div class="aq-title">Yesterday Quick Review</div>'+
      '<div style="font-size:20px;font-weight:800;color:#e67e22;margin-top:4px" id="aqPrompt"></div>'+
      '<div class="aq-row">'+animals.map(function(a,i){return '<button class="aq-btn" id="aq'+i+'" onclick="tapAq('+i+')">'+svgOf(animals,i,70)+'</button>'}).join('')+'</div>'+
    '</div>';
  document.getElementById('m1b').innerHTML=
    '<div class="pr"><img src="'+PP+'george-superhero-costume.png" alt="George"><div class="bbl" id="learnBubble">Tap my body!</div></div>'+
    '<div class="face-wrap">'+
      '<button class="spot s-head" onclick="tapLearn(0,this)"></button>'+
      '<button class="spot s-eyes" onclick="tapLearn(1,this)"></button>'+
      '<button class="spot s-ears" onclick="tapLearn(2,this)"></button>'+
      '<button class="spot s-nose" onclick="tapLearn(3,this)"></button>'+
      '<button class="spot s-mouth" onclick="tapLearn(4,this)"></button>'+
      '<svg width="280" height="280" viewBox="0 0 160 160" style="position:absolute;left:20px;top:20px;pointer-events:none"><circle cx="80" cy="84" r="48" fill="#ffd8bf"/><ellipse cx="34" cy="84" rx="14" ry="20" fill="#ffd8bf"/><ellipse cx="126" cy="84" rx="14" ry="20" fill="#ffd8bf"/><ellipse cx="52" cy="78" rx="20" ry="14" fill="#fff"/><ellipse cx="108" cy="78" rx="20" ry="14" fill="#fff"/><circle cx="52" cy="80" r="6" fill="#333"/><circle cx="108" cy="80" r="6" fill="#333"/><ellipse cx="80" cy="94" rx="16" ry="12" fill="#ffab91"/><circle cx="74" cy="94" r="3" fill="#8d6e63"/><circle cx="86" cy="94" r="3" fill="#8d6e63"/><path d="M58 106 Q80 132 102 106" stroke="#e53935" stroke-width="9" fill="none" stroke-linecap="round"/></svg>'+
    '</div>'+
    '<div class="learn-row">'+parts.map(function(p,i){return '<div class="learn-card" id="lc'+i+'">'+svgOf(parts,i,56)+'<div>'+p.w+'</div></div>'}).join('')+'</div>';
  askAq();
  setHead('Quick review','先复习昨天的动物！',stars(0,3));
}
function askAq(){
  if(aqIndex>=3){document.getElementById('aqPrompt').textContent='Great! Go to next page!';return}
  var w=animals[aqOrder[aqIndex]].w;
  document.getElementById('aqPrompt').textContent='I see a '+w+'!';
  speak(w);
}
function tapAq(i){
  if(aqBusy||aqIndex>=3)return;
  aqBusy=true;
  var target=aqOrder[aqIndex];
  var el=document.getElementById('aq'+i);
  if(i===target){
    ok();aqScore++;aqIndex++;el.classList.add('good');
    setHead('Yesterday review: nice!','昨天词复习答对啦！',stars(aqScore,8));
    speak('I see a '+animals[i].w,function(){setTimeout(function(){el.classList.remove('good');aqBusy=false;askAq()},500)});
  }else{
    no();el.classList.add('bad');
    speak(animals[target].w,function(){setTimeout(function(){el.classList.remove('bad');aqBusy=false},350)});
  }
}
function tapLearn(i,btn){
  if(learnDone[i]){speak(parts[i].w);return}
  learnDone[i]=true;btn.classList.add('hit');document.getElementById('lc'+i).classList.add('on');aqScore++;ok();
  document.getElementById('learnBubble').textContent='This is my '+parts[i].w+'!';
  setHead('Touch and say!','点身体部位并跟读！',stars(aqScore,8));
  speak('This is my '+parts[i].w);
}

function init1b(){
  setHead("Learn new words","点脸上的部位学新词！",stars(aqScore,8));
}

var docOrder=[],docIndex=0,docScore=0,docLock=false;

function init2(){
  docOrder=[0,1,2,3,4].sort(function(){return Math.random()-.5});
  docIndex=0;docScore=0;docLock=false;
  document.getElementById('m2').innerHTML=
    '<div class="pr"><img src="'+PP+'daddy-pig-standing.png" alt="Daddy"><div class="bbl" id="docBubble">Doctor says...</div></div>'+
    '<div class="doc-area">'+
      '<div style="font-size:34px;font-weight:900;color:#2c3e50" id="docTarget"></div>'+
      '<div class="doc-grid">'+parts.map(function(p,i){return '<button class="doc-btn" id="d'+i+'" onclick="tapDoc('+i+')">'+svgOf(parts,i,64)+'<div>'+p.w+'</div></button>'}).join('')+'</div>'+
    '</div>';
  askDoc();
}
function askDoc(){
  if(docIndex>=5){
    setHead('Doctor mission done!','体检游戏完成啦！',stars(5,5));
    document.getElementById('docBubble').textContent='All checks passed!';
    document.getElementById('docTarget').textContent='Great job!';
    return;
  }
  var p=parts[docOrder[docIndex]].w;
  document.getElementById('docBubble').textContent='Doctor says: '+p+'!';
  document.getElementById('docTarget').textContent=p;
  setHead('Doctor says game','医生说：点对部位！',stars(docScore,5));
  speak(p);
}
function tapDoc(i){
  if(docLock||docIndex>=5)return;
  docLock=true;
  var t=docOrder[docIndex],el=document.getElementById('d'+i);
  if(i===t){
    ok();docScore++;docIndex++;el.classList.add('good');
    setHead('Correct check!','答对啦，继续体检！',stars(docScore,5));
    speak('This is my '+parts[i].w,function(){setTimeout(function(){el.classList.remove('good');docLock=false;askDoc()},550)});
  }else{
    no();el.classList.add('bad');
    speak(parts[t].w,function(){setTimeout(function(){el.classList.remove('bad');docLock=false},350)});
  }
}

var liOrder=[],liIndex=0,liScore=0,liLock=false;
function init3(){
  liOrder=[0,1,2,3,4].sort(function(){return Math.random()-.5});
  liIndex=0;liScore=0;liLock=false;
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl" id="liBubble">Listen and choose!</div></div>'+
    '<div class="listen-row">'+
      '<button class="listen-card" id="la" onclick="tapListen(0)"><img src="'+PP+'george-standing.png" width="96" alt="George"><div id="laPart" style="font-size:22px;font-weight:900;color:#2c3e50;margin-top:8px"></div><div style="font-size:20px;color:#607d8b">George</div></button>'+
      '<button class="listen-card" id="lb" onclick="tapListen(1)"><img src="'+PP+'peppa-pig-happy-standing.png" width="96" alt="Peppa"><div id="lbPart" style="font-size:22px;font-weight:900;color:#2c3e50;margin-top:8px"></div><div style="font-size:20px;color:#607d8b">Peppa</div></button>'+
    '</div>';
  setupListenRound();
}
function setupListenRound(){
  if(liIndex>=5){
    setHead('Listening done!','听音找图完成啦！',stars(5,5));
    document.getElementById('liBubble').textContent='Perfect ears!';
    return;
  }
  var t=liOrder[liIndex];
  var wrong=[0,1,2,3,4].filter(function(i){return i!==t}).sort(function(){return Math.random()-.5})[0];
  var left=Math.random()>.5?t:wrong;
  var right=left===t?wrong:t;
  document.getElementById('la').dataset.part=left;
  document.getElementById('lb').dataset.part=right;
  document.getElementById('laPart').textContent=parts[left].w;
  document.getElementById('lbPart').textContent=parts[right].w;
  document.getElementById('liBubble').textContent='Find: '+parts[t].w+'!';
  setHead('Listen and pick','听句子，选正确部位！',stars(liScore,5));
  speak('This is my '+parts[t].w);
}
function tapListen(btn){
  if(liLock||liIndex>=5)return;
  liLock=true;
  var t=liOrder[liIndex];
  var id=Number(document.getElementById(btn===0?'la':'lb').dataset.part);
  var el=document.getElementById(btn===0?'la':'lb');
  if(id===t){
    ok();liScore++;liIndex++;el.classList.add('good');
    setHead('Good listening!','听对啦！',stars(liScore,5));
    speak(parts[id].w,function(){setTimeout(function(){el.classList.remove('good');liLock=false;setupListenRound()},600)});
  }else{
    no();el.classList.add('bad');
    speak(parts[t].w,function(){setTimeout(function(){el.classList.remove('bad');liLock=false},350)});
  }
}

var seq=[],seqStep=0,seqInput=0,seqScore=0,seqLock=false;
function init4(){
  seq=[];seqStep=0;seqInput=0;seqScore=0;seqLock=false;
  document.getElementById('m4').innerHTML=
    '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy"><div class="bbl" id="sqBubble">Watch the order!</div></div>'+
    '<div class="seq-wrap">'+
      '<div class="seq-show">'+
        '<div class="seq-dot" id="sd0">'+svgOf(parts,0,58)+'</div>'+
        '<div class="seq-dot" id="sd1">'+svgOf(parts,1,58)+'</div>'+
        '<div class="seq-dot" id="sd2">'+svgOf(parts,3,58)+'</div>'+
      '</div>'+
      '<div class="seq-btns">'+parts.map(function(p,i){return '<button class="seq-btn" onclick="tapSeq('+i+')">'+svgOf(parts,i,54)+'<div>'+p.w+'</div></button>'}).join('')+'</div>'+
    '</div>';
  nextSeqRound();
}
function flashSeq(i,on){var el=document.getElementById('sd'+i);if(el)el.classList.toggle('on',on)}
function playSeq(){
  seqLock=true;
  var i=0;
  function step(){
    if(i>=seq.length){seqLock=false;return}
    var m=seq[i];
    flashSeq(m,true);
    setTimeout(function(){flashSeq(m,false);i++;setTimeout(step,180)},300);
  }
  step();
}
function nextSeqRound(){
  if(seqScore>=3){
    setHead('Memory star!','记忆挑战完成啦！',stars(3,3));
    document.getElementById('sqBubble').textContent='You did it!';
    setTimeout(function(){go(1)},700);
    return;
  }
  seq.push(Math.floor(Math.random()*3));
  seqInput=0;
  document.getElementById('sqBubble').textContent='Watch: '+seq.length+' steps';
  setHead('Memory order game','看顺序，再按同样顺序点！',stars(seqScore,3));
  setTimeout(playSeq,350);
}
function tapSeq(i){
  if(seqLock)return;
  if(i===seq[seqInput]){
    ok();seqInput++;
    if(seqInput>=seq.length){seqScore++;setHead('Great memory!','记忆正确！',stars(seqScore,3));setTimeout(nextSeqRound,550)}
  }else{
    no();setHead('Oops, watch again','顺序错了，再看一次',stars(seqScore,3));setTimeout(playSeq,400);seqInput=0;
  }
}

function init5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="198" alt="Peppa family">'+
    '<div class="bbl" style="font-size:30px;margin-top:10px">All Done!</div>'+
    '<div style="font-size:26px;font-weight:800;color:#e67e22;margin-top:10px">This is my head, eyes, ears, nose, mouth!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px" onclick="restart()">Play Again</button>';
  setHead('Great Job!','身体课复习完成啦！',stars(6,6));
}

function restart(){
  document.getElementById(mods[cur]).classList.remove('on');
  cur=0;document.getElementById(mods[cur]).classList.add('on');
  init0();
  document.getElementById('pg').textContent='1/6';
  document.getElementById('pb').disabled=true;
  var xb=document.getElementById('xb');xb.textContent='Next ▶';xb.disabled=false;
}

var inits=[init0,init1,init1b,init2,init3,init4,init5];
function go(d){
  var n=cur+d;if(n<0||n>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=n;
  document.getElementById(mods[cur]).classList.add('on');
  inits[cur]();
  document.getElementById('pg').textContent=(cur+1)+'/7';
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===mods.length-1){xb.textContent='Done';xb.disabled=true}else{xb.textContent='Next ▶';xb.disabled=false}
}

init0();
</script>
