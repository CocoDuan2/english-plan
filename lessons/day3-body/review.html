<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 3 Review - Body</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#e1f5fe,#f3e5f5);overflow:hidden}
.mod{display:none;flex-direction:column;height:100%;padding:20px 20px 80px}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:12px}
.te{font-size:26px;font-weight:900;color:#e91e8c;margin:4px 0}
.tz{font-size:20px;font-weight:700;color:#e67e22;background:#fff;border-radius:12px;padding:8px 14px;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #ce93d8}
.sb{font-size:22px;font-weight:700;color:#666;margin:4px 0}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:center;padding:0 20px}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
@media(max-width:480px){.te{font-size:22px}.tz{font-size:18px}.bbl{font-size:20px}.pr img{width:65px}}
</style>
</head>
<body>
<div id="m0" class="mod on"></div>
<div id="m1" class="mod"></div>
<div id="m2" class="mod"></div>
<div id="m3" class="mod"></div>
<div id="m4" class="mod"></div>
<div id="m5" class="mod"></div>
<div class="nav" style="justify-content:space-between">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>&#9664; Back</button>
<div style="font-size:13px;color:#999" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/';
var W=[
  {w:'head',tw:'1f600'},{w:'eyes',tw:'1f440'},{w:'ears',tw:'1f442'},
  {w:'nose',tw:'1f443'},{w:'mouth',tw:'1f444'}
];

var actx,curM=0,score=0,totalQ=0;
function twImg(c,s){return '<img src="'+TW+c+'.svg" width="'+(s||90)+'">'}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#2196F3","#4CAF50","#FF9800","#E91E8C","#9C27B0"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function speak(t,cb){
  var isSent=t.indexOf(' ')>-1;
  var primary=isSent?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web':'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var fallback=isSent?'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2':'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
  var done=false;function fin(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio(primary);a.onended=fin;
  a.onerror=function(){var b=new Audio(fallback);b.onended=fin;b.onerror=fin;setTimeout(fin,4000);b.play().catch(fin)};
  setTimeout(fin,4000);a.play().catch(function(){var b=new Audio(fallback);b.onended=fin;b.onerror=fin;setTimeout(fin,4000);b.play().catch(fin)});
}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'🩶';return s}
function goM(d){
  curM+=d;if(curM<0)curM=0;if(curM>4)curM=5;
  document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
  document.getElementById('m'+curM).classList.add('on');
  document.getElementById('pg').textContent=(curM+1)+'/5';
  document.getElementById('pBtn').disabled=curM===0;
  var nb=document.getElementById('nBtn');
  if(curM===0){nb.textContent='Start!'}
  else if(curM>=4){nb.textContent='Done';nb.disabled=true}
  else{nb.textContent='Next ▶';nb.disabled=false}
  if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();
}
// M0: Start
document.getElementById('m0').innerHTML=
  '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
  '<img src="'+PP+'george_pig_dinosaur.png" width="110">'+
  '<div style="font-size:36px;font-weight:900;color:#e91e8c;margin:12px 0">Morning Routine!</div>'+
  '<div style="font-size:22px;color:#666">head · eyes · ears · nose · mouth</div></div>';
// M1: Learn - tap cards
var lnI=0,lnB=false;
function initM1(){
  lnI=0;lnB=false;
  var h='<div class="top"><div class="te">Learn Body Parts!</div><div class="tz">点一点，认识身体部位！</div><div class="sb" id="m1s">'+stars(0,5)+'</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:10px 0">';
  for(var i=0;i<5;i++){
    h+='<div id="lc'+i+'" onclick="lnTap('+i+')" style="width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.1);transition:background .4s">';
    h+='<div style="opacity:0;transition:opacity .4s" id="lci'+i+'">'+twImg(W[i].tw,75)+'<div style="font-size:20px;font-weight:700;color:#2c3e50;margin-top:4px">'+W[i].w+'</div></div></div>';
  }
  h+='</div>';
  document.getElementById('m1').innerHTML=h;
  
}
function lnTap(i){
  if(lnB)return;lnB=true;
  var card=document.getElementById('lc'+i);
  if(card.style.background==='#fff'){speak(W[i].w);lnB=false;return}
  card.style.background='#fff';document.getElementById('lci'+i).style.opacity='1';
  lnI++;document.getElementById('m1s').innerHTML=stars(lnI,5);
  playOk();speak(W[i].w,function(){lnB=false});
}
// M2: Touch Your Body (hear word, pick from 3)
var tbOrd,tbCur=0,tbB=false;
function initM3(){
  tbCur=0;tbB=false;tbOrd=shuffle([0,1,2,3,4]);renderTB();
}
function renderTB(){
  var idx=tbOrd[tbCur];
  var h='<div class="top"><div class="te">Touch Your Body!</div><div class="tz">听一听，点对的身体部位！</div><div class="sb" id="m3s">'+stars(tbCur,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'daddy-pig-standing.png" width="75"><div class="bbl">Touch your '+W[idx].w+'!</div></div>';
  h+='<div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin:20px 0">';
  var opts=shuffle([0,1,2,3,4]).slice(0,3);
  if(opts.indexOf(idx)===-1)opts[Math.floor(Math.random()*3)]=idx;
  for(var i=0;i<opts.length;i++)h+='<div onclick="tbTap('+opts[i]+')" style="width:110px;height:110px;border-radius:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12)">'+twImg(W[opts[i]].tw,75)+'</div>';
  h+='</div><div id="tbfb" style="font-size:22px;font-weight:700;min-height:30px;margin:6px 0;text-align:center"></div>';
  document.getElementById('m2').innerHTML=h;speak(W[idx].w);
}
function tbTap(i){
  if(tbB)return;tbB=true;var correct=tbOrd[tbCur];
  if(i===correct){playOk();tbCur++;score++;totalQ++;
    document.getElementById('m3s').innerHTML=stars(tbCur,5);
    document.getElementById('tbfb').textContent='Yes! This is my '+W[correct].w+'!';
    speak(W[correct].w);
    if(tbCur>=5){setTimeout(function(){goM(1)},1200);return}
    setTimeout(function(){renderTB();tbB=false},1600);
  }else{playNo();totalQ++;document.getElementById('tbfb').textContent='Try again!';
    setTimeout(function(){document.getElementById('tbfb').textContent='';tbB=false},1000)}
}
// M3: Memory Flip
var fCards=[],fFlip=[],fMatch=0,fB=false;
function initM4(){
  fMatch=0;fFlip=[];fB=false;
  var pairs=[];for(var i=0;i<4;i++)pairs.push({idx:i,w:W[i].w,tw:W[i].tw},{idx:i,w:W[i].w,tw:W[i].tw});
  fCards=shuffle(pairs);
  var h='<div class="top"><div class="te">Memory Match!</div><div class="tz">翻牌配对！</div><div class="sb" id="m4s">'+stars(0,4)+'</div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:400px;margin:10px auto">';
  for(var i=0;i<8;i++)h+='<div id="fc'+i+'" onclick="fTap('+i+')" style="width:85px;height:85px;border-radius:14px;background:#ce93d8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">❓</div>';
  h+='</div>';document.getElementById('m3').innerHTML=h;
}
function fTap(i){
  if(fB||fFlip.length>=2)return;var el=document.getElementById('fc'+i);
  if(el.classList.contains('done')||fFlip.indexOf(i)>=0)return;
  el.innerHTML=twImg(fCards[i].tw,55);el.style.background='#fff';fFlip.push(i);speak(fCards[i].w);
  if(fFlip.length===2){fB=true;var a=fFlip[0],b=fFlip[1];
    if(fCards[a].idx===fCards[b].idx){playOk();fMatch++;document.getElementById('m4s').innerHTML=stars(fMatch,4);
      document.getElementById('fc'+a).classList.add('done');document.getElementById('fc'+b).classList.add('done');
      fFlip=[];fB=false;if(fMatch>=4)setTimeout(function(){goM(1)},1200);
    }else{playNo();setTimeout(function(){
      document.getElementById('fc'+a).innerHTML='❓';document.getElementById('fc'+a).style.background='#ce93d8';
      document.getElementById('fc'+b).innerHTML='❓';document.getElementById('fc'+b).style.background='#ce93d8';
      fFlip=[];fB=false},800)}
  }
}
// M4: Done
function initM5(){
  document.getElementById('m4').innerHTML=
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="120" style="margin-bottom:10px">'+
    '<div style="font-size:42px;font-weight:900;color:#e91e8c;margin:10px 0">All clean!</div>'+
    '<div style="font-size:24px;color:#666;margin:6px 0">My body! 😀👀👂👃👄</div>'+
    '<div style="font-size:28px;margin:10px 0">'+stars(5,5)+'</div>'+
    '<button onclick="location.reload()" style="margin-top:16px;padding:14px 32px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(249,173,199,.4)">Play Again 🔄</button></div>';
}
goM(0);
</script>
</body>
</html>
