<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 19 - Food Review Game</title>
<style>
:root{--tip-accent:#e65100;--tip-bg:#fff3e0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#fff3e0 0%,#ffe0b2 50%,#c8e6c9 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#ff8a65,#e65100);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(230,81,0,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Cooking Game</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/6</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>
<script>
var PP='../../assets/peppa/';
var FOODS=[
  {w:'apple',color:'#e53935',svg:'<circle cx="80" cy="90" r="48" fill="#e53935"/><circle cx="60" cy="72" r="12" fill="#ef5350" opacity=".5"/><rect x="76" y="30" width="8" height="24" rx="4" fill="#6d4c41"/><ellipse cx="92" cy="38" rx="14" ry="8" fill="#66bb6a"/><circle cx="105" cy="78" r="6" fill="#8bc34a"/><circle cx="105" cy="78" r="2" fill="#333"/>'},
  {w:'banana',color:'#f9a825',svg:'<path d="M40 110 Q30 60 70 40 Q90 32 110 50 Q100 48 80 55 Q50 70 48 110 Z" fill="#f9a825"/><path d="M40 110 Q30 60 70 40 Q60 55 55 80 Q50 100 48 110 Z" fill="#fdd835" opacity=".5"/><rect x="66" y="32" width="10" height="14" rx="5" fill="#6d4c41"/>'},
  {w:'milk',color:'#42a5f5',svg:'<rect x="42" y="40" width="76" height="90" rx="10" fill="#e3f2fd"/><rect x="42" y="40" width="76" height="28" rx="10" fill="#42a5f5"/><text x="80" y="62" text-anchor="middle" font-size="18" font-weight="900" fill="#fff">MILK</text><rect x="56" y="80" width="48" height="36" rx="6" fill="#bbdefb"/><circle cx="80" cy="98" r="12" fill="#fff"/><circle cx="80" cy="98" r="6" fill="#90caf9"/><rect x="90" y="22" width="6" height="40" rx="3" fill="#ef5350"/>'},
  {w:'bread',color:'#d4a056',svg:'<ellipse cx="80" cy="95" rx="52" ry="35" fill="#d4a056"/><ellipse cx="80" cy="80" rx="48" ry="28" fill="#e6b566"/><ellipse cx="80" cy="75" rx="42" ry="22" fill="#f0c878"/><path d="M50 72 Q65 60 80 72 Q95 60 110 72" stroke="#c8943e" stroke-width="3" fill="none"/>'},
  {w:'egg',color:'#ffc107',svg:'<ellipse cx="80" cy="90" rx="55" ry="42" fill="#fff" stroke="#f5f5f5" stroke-width="2"/><ellipse cx="80" cy="88" rx="52" ry="38" fill="#fffde7"/><circle cx="80" cy="85" r="24" fill="#ffc107"/><circle cx="80" cy="85" r="16" fill="#ffca28"/><circle cx="72" cy="78" r="5" fill="#fff" opacity=".5"/>'}
];
var YEST=[
  {w:'head',sent:'This is my head!',svg:'<circle cx="80" cy="78" r="55" fill="#ffd6b5" stroke="#ff9800" stroke-width="3"/><circle cx="62" cy="68" r="4" fill="#333" opacity=".3"/><circle cx="98" cy="68" r="4" fill="#333" opacity=".3"/>'},
  {w:'nose',sent:'This is my nose!',svg:'<circle cx="80" cy="78" r="48" fill="#ffd8bf" opacity=".4"/><ellipse cx="80" cy="90" rx="18" ry="14" fill="#ffab91" stroke="#e64a19" stroke-width="3"/><circle cx="74" cy="90" r="3.5" fill="#8d6e63"/><circle cx="86" cy="90" r="3.5" fill="#8d6e63"/>'},
  {w:'mouth',sent:'This is my mouth!',svg:'<circle cx="80" cy="78" r="48" fill="#ffd8bf" opacity=".4"/><path d="M58 102 Q80 128 102 102" stroke="#e91e63" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M70 110 Q80 118 90 110" fill="#e57373" opacity=".6"/>'}
];

function draw(svg,s){return '<svg width="'+(s||76)+'" height="'+(s||76)+'" viewBox="0 0 160 160">'+svg+'</svg>'}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d,type){var c=ac(),o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.value=.16;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}
function playOk(){tone(523,.08);setTimeout(function(){tone(659,.08)},90);setTimeout(function(){tone(784,.12)},180)}
function playNo(){tone(310,.15,'square');setTimeout(function(){tone(262,.18,'square')},150)}
function speak(text,cb){
  var done=false;
  function end(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
  a.onended=end;a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web');
    b.onended=end;b.onerror=end;b.play().catch(end);
  };
  a.play().catch(end);
  setTimeout(end,4000);
}

var cur=0,score=0,total=18;
var mods=['m0','m1','m2','m3','m4','m5'];
function ui(){
  document.getElementById('pg').textContent=(cur+1)+'/'+mods.length;
  document.getElementById('pb').disabled=cur===0;
  var n=document.getElementById('nb');
  if(cur===mods.length-1){n.disabled=true;n.textContent='Done'}
  else{n.disabled=false;n.textContent='Next'}
  var titles=['Cooking Game','Yesterday Bridge','Fridge Peek','Cooking Pot','Taste Test','All Done!'];
  var tips=['','昨天复习桥','打开冰箱找食物','放进锅里煮一煮','听一听，尝一尝',''];
  document.getElementById('en').textContent=titles[cur]||'';
  var zh=document.getElementById('zh');
  zh.textContent=tips[cur]||'';
  zh.style.display=tips[cur]?'inline-block':'none';
  var s='';for(var i=0;i<total;i++)s+=i<score?'⭐':'☆';
  document.getElementById('st').textContent=s;
}
function show(i){
  if(i<0||i>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=i;
  document.getElementById(mods[cur]).classList.add('on');
  if(cur===1)initM1();
  if(cur===2)initM2();
  if(cur===3)initM3();
  if(cur===4)initM4();
  if(cur===5)initM5();
  ui();
}
function go(d){show(cur+d)}

/* M0: Start page */
(function initM0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'mummy-pig-standing-grass.png" width="140" alt="Mummy Pig">'+
    '<div class="pr"><div class="bbl">Time to cook!</div></div>'+
    '<div style="display:flex;gap:10px;margin:8px 0">'+
      '<img src="'+PP+'george_pig_dinosaur.png" width="80" alt="George">'+
      '<img src="'+PP+'peppa-pig-happy-standing.png" width="80" alt="Peppa">'+
    '</div>'+
    '<button class="start-btn" onclick="ac();show(1)">Start!</button>';
  ui();
})();

/* M1: Yesterday Bridge — 3 body words micro-review */
var yBusy=false,yQ=0,yOrder=[];
function initM1(){yBusy=false;yQ=0;yOrder=shuffle([0,1,2]);buildY()}
function buildY(){
  if(yQ>=3){setTimeout(function(){show(2)},700);return}
  var t=YEST[yOrder[yQ]];
  var opts=shuffle(YEST.slice());
  document.getElementById('m1').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'candy-cat-green-dress.png" alt="Candy"><div class="bbl">'+t.sent+'</div></div>'+
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">'+opts.map(function(o){
        return '<button style="width:130px;height:130px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px" data-w="'+o.w+'" onclick="tapY(this,\''+t.w+'\')">'+
          draw(o.svg,74)+'<div style="font-size:20px;font-weight:800;color:#2c3e50">'+o.w+'</div></button>';
      }).join('')+'</div>'+
    '</div>';
  setTimeout(function(){speak(t.w)},180);
}
function tapY(el,correct){
  if(yBusy)return;yBusy=true;
  if(el.dataset.w===correct){
    el.style.outline='4px solid #66bb6a';score++;ui();playOk();
    speak(correct,function(){yBusy=false;yQ++;setTimeout(buildY,520)});
  }else{
    el.style.outline='4px solid #ef5350';playNo();
    speak(correct,function(){yBusy=false;setTimeout(function(){el.style.outline='none'},320)});
  }
}

/* M2: Fridge Peek — tap shelf to slide open and reveal food + pronunciation */
var fpBusy=false,fpIdx=0,fpOrder=[];
function initM2(){fpBusy=false;fpIdx=0;fpOrder=shuffle([0,1,2,3,4]);buildFP()}
function buildFP(){
  if(fpIdx>=5){setTimeout(function(){show(3)},700);return}
  var f=FOODS[fpOrder[fpIdx]];
  var revealed=[];
  for(var i=0;i<fpIdx;i++)revealed.push(fpOrder[i]);
  var shelves='';
  var order=shuffle([0,1,2,3,4]);
  for(var j=0;j<5;j++){
    var idx=order[j];
    if(revealed.indexOf(idx)>=0){
      shelves+='<div style="width:90px;height:105px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.08)">'+
        draw(FOODS[idx].svg,60)+'<div style="font-size:18px;font-weight:800;color:#2c3e50">'+FOODS[idx].w+'</div></div>';
    }else if(idx===fpOrder[fpIdx]){
      shelves+='<button style="width:90px;height:105px;border:none;border-radius:16px;background:linear-gradient(145deg,#e0f2f1,#b2dfdb);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 3px 12px rgba(0,150,136,.2)" onclick="tapFP(this,'+idx+')">'+
        '<span style="font-size:36px">🚪</span>'+
        '<div style="font-size:14px;color:#00695c;font-weight:700;margin-top:2px">Open!</div>'+
      '</button>';
    }else{
      shelves+='<div style="width:90px;height:105px;border-radius:16px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;opacity:.35">'+
        '<span style="font-size:28px">🚪</span>'+
      '</div>';
    }
  }
  document.getElementById('m2').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'daddy-pig-standing.png" alt="Daddy"><div class="bbl">What\'s inside?</div></div>'+
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+shelves+'</div>'+
    '</div>';
}
function tapFP(el,idx){
  if(fpBusy)return;fpBusy=true;
  var f=FOODS[idx];
  el.style.background='#fff';
  el.innerHTML=draw(f.svg,60)+'<div style="font-size:18px;font-weight:800;color:#2c3e50">'+f.w+'</div>';
  el.style.display='flex';el.style.flexDirection='column';el.style.alignItems='center';el.style.justifyContent='center';
  score++;ui();playOk();
  speak('I like '+f.w,function(){fpBusy=false;fpIdx++;setTimeout(buildFP,520)});
}

/* M3: Cooking Pot — hear food name, pick correct one to put in pot (3 choices) */
var cpBusy=false,cpQ=0,cpOrder=[];
function initM3(){cpBusy=false;cpQ=0;cpOrder=shuffle([0,1,2,3,4]);buildCP()}
function buildCP(){
  if(cpQ>=5){setTimeout(function(){show(4)},700);return}
  var tgt=FOODS[cpOrder[cpQ]];
  var others=FOODS.filter(function(x){return x.w!==tgt.w});
  var opts=shuffle([tgt].concat(shuffle(others).slice(0,2)));
  /* pot SVG */
  var pot='<svg width="120" height="80" viewBox="0 0 160 100"><ellipse cx="80" cy="75" rx="55" ry="18" fill="#bdbdbd"/><rect x="28" y="40" width="104" height="40" rx="12" fill="#e0e0e0"/><ellipse cx="80" cy="40" rx="52" ry="12" fill="#bdbdbd"/>';
  /* show already-added items in pot */
  for(var k=0;k<cpQ;k++){
    var prev=FOODS[cpOrder[k]];
    var xp=40+k*22;
    pot+='<circle cx="'+xp+'" cy="36" r="8" fill="'+prev.color+'" opacity=".6"/>';
  }
  pot+='</svg>';

  document.getElementById('m3').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'george-superhero-costume.png" alt="George"><div class="bbl">Put '+tgt.w+' in the pot!</div></div>'+
      '<div style="text-align:center;margin:8px 0">'+pot+'</div>'+
      '<div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px">'+
      opts.map(function(o){
        return '<button style="width:130px;height:140px;border:none;border-radius:18px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;transition:.2s" data-w="'+o.w+'" onclick="tapCP(this,\''+tgt.w+'\')">'+
          draw(o.svg,80)+'<div style="font-size:20px;font-weight:800;color:#2c3e50">'+o.w+'</div></button>';
      }).join('')+'</div>'+
    '</div>';
  setTimeout(function(){speak(tgt.w)},200);
}
function tapCP(el,correct){
  if(cpBusy)return;cpBusy=true;
  if(el.dataset.w===correct){
    el.style.outline='4px solid #66bb6a';
    el.style.transform='translateY(-8px)';
    score++;ui();playOk();
    speak('I like '+correct,function(){cpBusy=false;cpQ++;setTimeout(buildCP,520)});
  }else{
    el.style.outline='4px solid #ef5350';playNo();
    speak(correct,function(){cpBusy=false;setTimeout(function(){el.style.outline='none'},320)});
  }
}

/* M4: Taste Test — hear word, pick from 4 plates (spinning plate visual) */
var ttBusy=false,ttQ=0,ttOrder=[];
function initM4(){ttBusy=false;ttQ=0;ttOrder=shuffle([0,1,2,3,4]);buildTT()}
function buildTT(){
  if(ttQ>=5){setTimeout(function(){show(5)},700);return}
  var tgt=FOODS[ttOrder[ttQ]];
  var others=FOODS.filter(function(x){return x.w!==tgt.w});
  var opts=shuffle([tgt].concat(shuffle(others).slice(0,3)));
  document.getElementById('m4').innerHTML=
    '<div style="width:100%;max-width:500px">'+
      '<div class="pr"><img src="'+PP+'peppa_pig_bicycle.png" alt="Peppa"><div class="bbl">Taste this!</div></div>'+
      '<button style="width:200px;height:70px;border:none;border-radius:14px;background:#ff8a65;color:#fff;font-size:24px;font-weight:900;cursor:pointer;display:block;margin:0 auto 10px;box-shadow:0 3px 12px rgba(255,138,101,.3)" onclick="speak(\''+tgt.w+'\')">🔊 Listen</button>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:340px;margin:0 auto">'+
      opts.map(function(o){
        /* plate style: white circle with food on top */
        return '<button style="width:100%;height:130px;border:none;border-radius:50%;background:radial-gradient(circle at 50% 55%,#fff 60%,#f5f5f5 100%);box-shadow:0 4px 16px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative" data-w="'+o.w+'" onclick="tapTT(this,\''+tgt.w+'\')">'+
          draw(o.svg,60)+
        '</button>';
      }).join('')+'</div>'+
    '</div>';
  setTimeout(function(){speak(tgt.w)},220);
}
function tapTT(el,correct){
  if(ttBusy)return;ttBusy=true;
  if(el.dataset.w===correct){
    el.style.background='#fff';el.style.borderRadius='16px';
    el.style.boxShadow='0 2px 8px rgba(0,0,0,.08)';
    el.innerHTML=draw(FOODS.find(function(f){return f.w===correct}).svg,60)+'<div style="font-size:18px;font-weight:800;color:#2c3e50;margin-top:4px">'+correct+'</div>';
    el.style.display='flex';el.style.flexDirection='column';el.style.alignItems='center';el.style.justifyContent='center';
    score++;ui();playOk();
    speak('I like '+correct,function(){ttBusy=false;ttQ++;setTimeout(buildTT,520)});
  }else{
    el.style.outline='4px solid #ef5350';playNo();
    speak(correct,function(){ttBusy=false;setTimeout(function(){el.style.outline='none'},320)});
  }
}

/* M5: Done page */
function initM5(){
  score=total;ui();
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="170" alt="Peppa family">'+
    '<div style="font-size:42px;font-weight:900;color:#e91e8c;margin:10px 0">All Done!</div>'+
    '<div style="font-size:22px;color:#e67e22">Yummy cooking!</div>'+
    '<div style="display:flex;gap:8px;justify-content:center;margin:10px 0">'+
      FOODS.map(function(f){return draw(f.svg,50)}).join('')+
    '</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px;margin-top:12px" onclick="location.reload()">Play Again</button>';
}
</script>
</body>
</html>
