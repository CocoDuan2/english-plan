<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Day 4 Review - Peppa's Picnic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#a8e6cf,#ffd3b6);overflow:hidden;user-select:none}
.pg{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:20px}
.hd{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:50}
.hd-ttl{font-size:26px;font-weight:bold;color:#e91e8c}
.tz{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#ff6b9d,#ffa07a);color:#fff;font-size:20px;font-weight:bold;padding:8px 18px;border-radius:25px;box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative}
.tz::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #ffa07a}
.stars{display:flex;gap:5px;font-size:22px}
.pr{position:absolute;top:90px;left:20px;z-index:10}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:20px;padding:12px 22px;font-size:22px;font-weight:bold;color:#e67e22;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:85%}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:15px solid #fff}
.nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 -2px 10px rgba(0,0,0,.1)}
.nav button{background:#e91e8c;color:#fff;border:none;border-radius:25px;padding:10px 25px;font-size:18px;font-weight:bold;cursor:pointer;transition:all .3s}
.nav button:hover{background:#c71a73;transform:scale(1.05)}
.nav button:disabled{background:#ccc;cursor:not-allowed;transform:none}
.pg-num{font-size:20px;color:#555;font-weight:bold}
.start-wrap{display:flex;flex-direction:column;align-items:center;gap:25px}
.start-wrap img{width:110px;height:auto}
.start-ttl{font-size:48px;font-weight:bold;color:#e91e8c;text-align:center}
.start-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px}
.start-preview img{width:70px;height:70px}
.start-btn{background:#4caf50;color:#fff;border:none;border-radius:30px;padding:15px 40px;font-size:24px;font-weight:bold;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.2);transition:all .3s}
.start-btn:hover{background:#45a049;transform:scale(1.05)}
.learn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px}
.learn-card{width:140px;height:180px;background:#ddd;border-radius:15px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;overflow:hidden}
.learn-card.revealed{background:#fff}
.learn-card img{width:90px;height:90px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-card span{font-size:20px;font-weight:bold;color:#555;opacity:0;transition:opacity .3s}
.learn-card.revealed span{opacity:1}
.learn-card::before{content:'?';position:absolute;font-size:60px;color:#999;opacity:1;transition:opacity .3s}
.learn-card.revealed::before{opacity:0}
.sort-wrap{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap;justify-content:center;max-width:900px}
.food-items{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.sort-food{cursor:pointer;transition:all .3s;opacity:1}
.sort-food:hover{transform:scale(1.1)}
.sort-food.sorted{opacity:.3;pointer-events:none}
.sort-food img{width:80px;height:80px}
.plates{display:flex;gap:20px}
.plate{width:180px;height:180px;background:radial-gradient(circle,#fff 60%,#e0e0e0 100%);border-radius:50%;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px;padding:15px;box-shadow:0 6px 18px rgba(0,0,0,.2);position:relative}
.plate::after{content:attr(data-label);position:absolute;bottom:-30px;font-size:18px;font-weight:bold;color:#555}
.plate img{width:45px;height:45px}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px}
.listen-card{width:140px;height:160px;background:#fff;border-radius:15px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);border:4px solid transparent}
.listen-card:hover{transform:translateY(-5px)}
.listen-card img{width:90px;height:90px}
.listen-card span{font-size:20px;font-weight:bold;color:#555}
.replay-btn{position:absolute;top:100px;right:20px;width:60px;height:60px;border-radius:50%;background:#ff9800;color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:all .3s;z-index:20}
.replay-btn:hover{background:#f57c00;transform:scale(1.1)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;max-width:560px}
.mem-card{width:120px;height:140px;background:#fff;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;transform-style:preserve-3d}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-front,.mem-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}
.mem-front{background:linear-gradient(135deg,#ffd3e8,#ffb3d9)}
.mem-back{background:#fff;transform:rotateY(180deg)}
.mem-front span{font-size:44px}
.mem-back img{width:70px;height:70px;margin-bottom:8px}
.mem-back span{font-size:18px;font-weight:bold;color:#555}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:25px}
.done-wrap img{width:110px;height:auto}
.done-ttl{font-size:52px;font-weight:bold;color:#4caf50;text-align:center}
.done-msg{font-size:24px;color:#555;text-align:center}
.confetti{position:fixed;width:12px;height:12px;border-radius:50%;pointer-events:none;z-index:999;animation:fall 2s ease-out forwards}
@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);opacity:0}
}
@keyframes peppa-jump{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-30px)}
}
.jump{animation:peppa-jump .6s ease-in-out}
@media(max-width:480px){
.hd-ttl{font-size:22px}
.tz{font-size:18px;padding:6px 14px}
.stars{font-size:20px}
.pr img{width:60px}
.bbl{font-size:20px;padding:10px 18px}
.start-wrap img{width:90px}
.start-ttl{font-size:36px}
.start-preview{grid-template-columns:repeat(3,1fr);gap:12px}
.start-preview img{width:55px;height:55px}
.start-btn{font-size:20px;padding:12px 30px}
.learn-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.learn-card{width:120px;height:160px}
.learn-card img{width:75px;height:75px}
.learn-card span{font-size:18px}
.food-items{grid-template-columns:repeat(2,1fr);gap:12px}
.sort-food img{width:65px;height:65px}
.plates{flex-direction:column;gap:15px}
.plate{width:150px;height:150px}
.plate img{width:38px;height:38px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.listen-card{width:120px;height:140px}
.listen-card img{width:75px;height:75px}
.listen-card span{font-size:18px}
.mem-grid{grid-template-columns:repeat(3,1fr);gap:12px}
.mem-card{width:100px;height:120px}
.mem-back img{width:60px;height:60px}
.mem-back span{font-size:16px}
.done-wrap img{width:90px}
.done-ttl{font-size:40px}
.done-msg{font-size:20px}
}
@media(min-width:481px) and (max-width:767px){
.start-ttl{font-size:42px}
.done-ttl{font-size:46px}
}
</style>
</head>
<body>

<div class="hd">
<div class="hd-ttl">Peppa's Picnic</div>
<div class="tz">🧺 点一点,学单词!</div>
<div class="stars" id="starBar"></div>
</div>

<div class="pg" id="m0">
<div class="start-wrap">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="start-ttl">Let's Play!</div>
<div class="start-preview">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" alt="apple">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" alt="banana">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg" alt="milk">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35e.svg" alt="bread">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95a.svg" alt="egg">
</div>
<button class="start-btn" onclick="startGame()">Start</button>
</div>
</div>

<div class="pg" id="m1" style="display:none">
<div class="pr"><img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"></div>
<div class="bbl">Tap to learn!</div>
<div class="learn-grid">
<div class="learn-card" onclick="reveal(this,'apple','1f34e')"></div>
<div class="learn-card" onclick="reveal(this,'banana','1f34c')"></div>
<div class="learn-card" onclick="reveal(this,'milk','1f95b')"></div>
<div class="learn-card" onclick="reveal(this,'bread','1f35e')"></div>
<div class="learn-card" onclick="reveal(this,'egg','1f95a')"></div>
</div>
</div>

<div class="pg" id="m2" style="display:none">
<div class="pr"><img src="../../assets/peppa/george-standing.png" alt="George"></div>
<div class="bbl">Sort the food!</div>
<div class="sort-wrap">
<div class="food-items">
<div class="sort-food" onclick="sortFood(this,'apple','fruit')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" alt="apple">
</div>
<div class="sort-food" onclick="sortFood(this,'banana','fruit')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" alt="banana">
</div>
<div class="sort-food" onclick="sortFood(this,'milk','drink')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg" alt="milk">
</div>
<div class="sort-food" onclick="sortFood(this,'bread','food')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35e.svg" alt="bread">
</div>
<div class="sort-food" onclick="sortFood(this,'egg','food')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95a.svg" alt="egg">
</div>
</div>
<div class="plates">
<div class="plate" id="fruitPlate" data-label="Fruit"></div>
<div class="plate" id="drinkPlate" data-label="Drink"></div>
<div class="plate" id="foodPlate" data-label="Food"></div>
</div>
</div>
</div>

<div class="pg" id="m3" style="display:none">
<div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"></div>
<div class="bbl">Find the food!</div>
<button class="replay-btn" onclick="replayWord()">🔊</button>
<div class="listen-grid">
<div class="listen-card" onclick="checkListen(this,'apple')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" alt="apple">
<span>apple</span>
</div>
<div class="listen-card" onclick="checkListen(this,'banana')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" alt="banana">
<span>banana</span>
</div>
<div class="listen-card" onclick="checkListen(this,'milk')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg" alt="milk">
<span>milk</span>
</div>
<div class="listen-card" onclick="checkListen(this,'bread')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f35e.svg" alt="bread">
<span>bread</span>
</div>
<div class="listen-card" onclick="checkListen(this,'egg')">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95a.svg" alt="egg">
<span>egg</span>
</div>
</div>
</div>

<div class="pg" id="m4" style="display:none">
<div class="pr"><img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy"></div>
<div class="bbl">Match the pairs!</div>
<div class="mem-grid" id="memGrid"></div>
</div>

<div class="pg" id="m5" style="display:none">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="done-ttl">All Done!</div>
<div class="done-msg">Great job! You helped Peppa!</div>
<div class="stars">⭐⭐⭐⭐⭐</div>
<button class="start-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button id="backBtn" onclick="prevM()">◀ Back</button>
<div class="pg-num"><span id="curM">1</span> / 6</div>
<button id="nextBtn" onclick="nextM()">Next ▶</button>
</div>

<script>
const words=['apple','banana','milk','bread','egg'];
const codes=['1f34e','1f34c','1f95b','1f35e','1f95a'];
let curM=0,stars=0,busy=false;
let listenTarget='',listenRound=0;
let memFlipped=[],memMatched=0;

function goM(n){
document.querySelectorAll('.pg').forEach(p=>p.style.display='none');
document.getElementById('m'+n).style.display='flex';
curM=n;
document.getElementById('curM').textContent=n+1;
document.getElementById('backBtn').disabled=n===0;
document.getElementById('nextBtn').disabled=n===5;
updateStars();
if(n===3&&listenRound===0)startListen();
if(n===4&&memMatched===0)initMem();
}
function nextM(){if(curM<5)goM(curM+1)}
function prevM(){if(curM>0)goM(curM-1)}
function updateStars(){
const bar=document.getElementById('starBar');
bar.innerHTML='';
for(let i=0;i<5;i++){
const s=document.createElement('span');
s.textContent=i<stars?'⭐':'★';
s.style.color=i<stars?'':'#bbb';
bar.appendChild(s);
}
}
function startGame(){
const ctx=new AudioContext();
ctx.resume();
goM(1);
}
function speak(word){
const url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(word)+'&type=2';
const a=new Audio(url);
a.play().catch(()=>{
const url2='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(word)+'&spd=4&source=web';
const a2=new Audio(url2);
a2.play().catch(()=>console.log('Audio failed'));
});
}
function reveal(card,word,code){
if(card.classList.contains('revealed'))return speak(word);
card.classList.add('revealed');
const img=document.createElement('img');
img.src='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+code+'.svg';
const span=document.createElement('span');
span.textContent=word;
card.appendChild(img);
card.appendChild(span);
speak(word);
const all=document.querySelectorAll('.learn-card.revealed');
if(all.length===5){
stars=Math.max(stars,1);
updateStars();
}
}
let sorted=0;
function sortFood(el,word,type){
if(busy||el.classList.contains('sorted'))return;
busy=true;
const plate=document.getElementById(type+'Plate');
const img=document.createElement('img');
img.src=el.querySelector('img').src;
plate.appendChild(img);
el.classList.add('sorted');
speak(word);
sorted++;
if(sorted===5){
stars=Math.max(stars,2);
updateStars();
playOk();
}
setTimeout(()=>busy=false,800);
}
function startListen(){
listenTarget=words[Math.floor(Math.random()*5)];
speak(listenTarget);
}
function replayWord(){
if(listenTarget)speak(listenTarget);
}
function checkListen(card,word){
if(busy)return;
busy=true;
if(word===listenTarget){
card.style.borderColor='#4caf50';
playOk();
speak(word);
listenRound++;
if(listenRound===5){
stars=Math.max(stars,3);
updateStars();
setTimeout(()=>busy=false,1200);
}else{
setTimeout(()=>{
card.style.borderColor='transparent';
listenTarget=words[Math.floor(Math.random()*5)];
speak(listenTarget);
busy=false;
},1200);
}
}else{
card.style.borderColor='#f44336';
playNo();
setTimeout(()=>{
card.style.borderColor='transparent';
busy=false;
},800);
}
}
function initMem(){
const grid=document.getElementById('memGrid');
grid.innerHTML='';
const pairs=[...words,...words].sort(()=>Math.random()-.5);
pairs.forEach((w,i)=>{
const card=document.createElement('div');
card.className='mem-card';
card.innerHTML=`
<div class="mem-front"><span>🧺</span></div>
<div class="mem-back">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${codes[words.indexOf(w)]}.svg">
<span>${w}</span>
</div>
`;
card.onclick=()=>flipMem(card,w);
grid.appendChild(card);
});
}
function flipMem(card,word){
if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
card.classList.add('flipped');
memFlipped.push({card,word});
if(memFlipped.length===2){
busy=true;
const[a,b]=memFlipped;
if(a.word===b.word){
setTimeout(()=>{
a.card.classList.add('matched');
b.card.classList.add('matched');
memFlipped=[];
memMatched++;
playOk();
if(memMatched===5){
stars=Math.max(stars,4);
updateStars();
setTimeout(()=>goM(5),1500);
}
busy=false;
},800);
}else{
setTimeout(()=>{
a.card.classList.remove('flipped');
b.card.classList.remove('flipped');
memFlipped=[];
playNo();
busy=false;
},1000);
}
}
}
function playOk(){
showConfetti();
const ctx=new AudioContext();
const osc=ctx.createOscillator();
const gain=ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value=800;
gain.gain.setValueAtTime(.3,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.3);
osc.start();
osc.stop(ctx.currentTime+.3);
document.querySelector('.pr img').classList.add('jump');
setTimeout(()=>document.querySelector('.pr img').classList.remove('jump'),600);
}
function playNo(){
const ctx=new AudioContext();
const osc=ctx.createOscillator();
const gain=ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value=200;
gain.gain.setValueAtTime(.2,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.2);
osc.start();
osc.stop(ctx.currentTime+.2);
}
function showConfetti(){
const colors=['#ff6b9d','#ffa07a','#a8e6cf','#ffd3b6','#ffb88c'];
for(let i=0;i<20;i++){
const c=document.createElement('div');
c.className='confetti';
c.style.left=Math.random()*100+'vw';
c.style.top='0';
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.animationDelay=Math.random()*.3+'s';
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}
document.addEventListener('keydown',e=>{
if(e.key==='ArrowRight')nextM();
if(e.key==='ArrowLeft')prevM();
});
goM(0);
</script>
</body>
</html>
