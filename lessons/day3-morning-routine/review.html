<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Day 3 Review - Morning Routine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#a8e6cf,#ffd3b6);overflow:hidden;user-select:none}
.pg{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:20px}
.top{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:50}
.ttl{font-size:26px;font-weight:bold;color:#e91e8c}
.tz{font-size:20px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#64b5f6,#42a5f5);padding:8px 18px;border-radius:25px;box-shadow:0 3px 10px rgba(0,0,0,.15);position:relative}
.tz::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:80%;height:3px;background:rgba(255,255,255,.4);border-radius:2px}
.stars{font-size:22px;display:flex;gap:5px}
.pr{position:absolute;top:90px;left:20px;z-index:10}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:20px;padding:12px 22px;font-size:22px;font-weight:bold;color:#e67e22;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:90%}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:15px solid #fff}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin-top:20px}
.card{width:100%;aspect-ratio:1;background:#ddd;border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.card:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
.card.revealed{background:#fff}
.card img{width:90px;height:90px;display:none}
.card.revealed img{display:block}
.card span{font-size:20px;font-weight:bold;color:#555;margin-top:10px;display:none}
.card.revealed span{display:block}
.body-btn{width:105px;height:105px;border-radius:20px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);background:#fff}
.body-btn:active{transform:scale(.95)}
.body-btn img{width:75px;height:75px;margin-bottom:8px}
.body-btn span{font-size:18px;font-weight:bold;color:#555}
.body-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin-top:20px}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin-top:20px}
.listen-card{width:100%;aspect-ratio:1;background:#fff;border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);border:4px solid transparent}
.listen-card:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
.listen-card.correct{border-color:#4caf50;animation:pulse .6s}
.listen-card img{width:90px;height:90px}
.listen-card span{font-size:20px;font-weight:bold;color:#555;margin-top:10px}
.replay-btn{position:fixed;top:90px;right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#64b5f6,#42a5f5);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:20;transition:all .3s}
.replay-btn:active{transform:scale(.9)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;width:440px;margin-top:20px}
.mem-card{aspect-ratio:1;background:linear-gradient(135deg,#ffd3e8,#ffb3d9);border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative}
.mem-card:hover{transform:translateY(-3px)}
.mem-card.flipped{background:#fff}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;gap:8px}
.mem-card.flipped .back{display:none}
.mem-card.flipped .front{display:flex}
.mem-card .front img{width:70px;height:70px}
.mem-card .front span{font-size:18px;font-weight:bold;color:#555}
.start-wrap{display:flex;flex-direction:column;align-items:center;gap:25px}
.start-wrap img{width:110px;height:auto}
.start-ttl{font-size:42px;font-weight:bold;color:#e91e8c;text-align:center}
.start-btn{background:#e91e8c;color:#fff;border:none;border-radius:30px;padding:15px 40px;font-size:32px;font-weight:bold;cursor:pointer;transition:all .3s;box-shadow:0 6px 16px rgba(0,0,0,.2)}
.start-btn:hover{background:#c71a73;transform:scale(1.05)}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:25px}
.done-wrap img{width:120px;height:auto}
.done-ttl{font-size:48px;font-weight:bold;color:#4caf50;text-align:center}
.done-sub{font-size:24px;color:#555;text-align:center}
.nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 -2px 10px rgba(0,0,0,.1)}
.nav button{background:#e91e8c;color:#fff;border:none;border-radius:25px;padding:10px 25px;font-size:18px;font-weight:bold;cursor:pointer;transition:all .3s}
.nav button:hover{background:#c71a73;transform:scale(1.05)}
.nav button:disabled{background:#ccc;cursor:not-allowed;transform:none}
.pg-num{font-size:20px;color:#555;font-weight:bold}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes peppa-jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
.confetti{position:fixed;width:10px;height:10px;border-radius:50%;pointer-events:none;z-index:999;animation:fall 2s ease-out forwards}
@keyframes fall{to{transform:translateY(100vh);opacity:0}}
@media(max-width:480px){
.ttl{font-size:22px}
.tz{font-size:18px;padding:6px 14px}
.stars{font-size:20px}
.pr img{width:60px}
.bbl{font-size:20px;padding:10px 18px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.card img{width:70px;height:70px}
.card span{font-size:18px}
.body-btn{width:90px;height:90px}
.body-btn img{width:60px;height:60px}
.body-btn span{font-size:16px}
.body-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.listen-card img{width:70px;height:70px}
.listen-card span{font-size:18px}
.mem-grid{grid-template-columns:repeat(3,1fr);gap:12px;width:340px}
.mem-card .back{font-size:36px}
.mem-card .front img{width:55px;height:55px}
.mem-card .front span{font-size:16px}
.start-wrap img{width:90px}
.start-ttl{font-size:32px}
.start-btn{font-size:26px;padding:12px 32px}
.done-wrap img{width:100px}
.done-ttl{font-size:38px}
.done-sub{font-size:20px}
}
@media(min-width:481px) and (max-width:767px){
.card-grid{grid-template-columns:repeat(3,1fr)}
.body-grid{grid-template-columns:repeat(3,1fr)}
.listen-grid{grid-template-columns:repeat(3,1fr)}
.mem-grid{width:480px}
}
@media(min-width:768px){
.mem-grid{width:560px;gap:18px}
.mem-card .back{font-size:48px}
.mem-card .front img{width:80px;height:80px}
.mem-card .front span{font-size:20px}
}
</style>
</head>
<body>

<div class="top">
<div class="ttl">Morning Routine</div>
<div class="tz" id="tipText">👆 点一点开始学习</div>
<div class="stars" id="stars">
<span>★</span><span>★</span><span>★</span><span>★</span>
</div>
</div>

<div class="pg" id="m0">
<div class="start-wrap">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="start-ttl">Let's Learn<br>Body Parts!</div>
<div style="display:flex;gap:20px;margin:20px 0;flex-wrap:wrap;justify-content:center">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg" width="60" alt="head">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f440.svg" width="60" alt="eyes">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f442.svg" width="60" alt="ears">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f443.svg" width="60" alt="nose">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f444.svg" width="60" alt="mouth">
</div>
<button class="start-btn" onclick="startGame()">Let's Play!</button>
</div>
</div>

<div class="pg" id="m1" style="display:none">
<div class="pr"><img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"></div>
<div class="bbl">Tap to learn!</div>
<div class="card-grid">
<div class="card" data-word="head">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg" alt="head">
<span>head</span>
</div>
<div class="card" data-word="eyes">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f440.svg" alt="eyes">
<span>eyes</span>
</div>
<div class="card" data-word="ears">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f442.svg" alt="ears">
<span>ears</span>
</div>
<div class="card" data-word="nose">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f443.svg" alt="nose">
<span>nose</span>
</div>
<div class="card" data-word="mouth">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f444.svg" alt="mouth">
<span>mouth</span>
</div>
</div>
</div>

<div class="pg" id="m2" style="display:none">
<div class="pr"><img src="../../assets/peppa/george-standing.png" alt="George"></div>
<div class="bbl">Touch your body!</div>
<div class="body-grid">
<button class="body-btn" data-word="head">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg" alt="head">
<span>head</span>
</button>
<button class="body-btn" data-word="eyes">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f440.svg" alt="eyes">
<span>eyes</span>
</button>
<button class="body-btn" data-word="ears">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f442.svg" alt="ears">
<span>ears</span>
</button>
<button class="body-btn" data-word="nose">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f443.svg" alt="nose">
<span>nose</span>
</button>
<button class="body-btn" data-word="mouth">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f444.svg" alt="mouth">
<span>mouth</span>
</button>
</div>
</div>

<div class="pg" id="m3" style="display:none">
<div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"></div>
<div class="bbl">Listen and find!</div>
<button class="replay-btn" onclick="replayWord()">🔊</button>
<div class="listen-grid">
<div class="listen-card" data-word="head">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg" alt="head">
<span>head</span>
</div>
<div class="listen-card" data-word="eyes">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f440.svg" alt="eyes">
<span>eyes</span>
</div>
<div class="listen-card" data-word="ears">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f442.svg" alt="ears">
<span>ears</span>
</div>
<div class="listen-card" data-word="nose">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f443.svg" alt="nose">
<span>nose</span>
</div>
<div class="listen-card" data-word="mouth">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f444.svg" alt="mouth">
<span>mouth</span>
</div>
</div>
</div>

<div class="pg" id="m4" style="display:none">
<div class="pr"><img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy"></div>
<div class="bbl">Match the pairs!</div>
<div class="mem-grid" id="memGrid"></div>
</div>

<div class="pg" id="m5" style="display:none">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="done-ttl">All Done!</div>
<div class="done-sub">You learned 5 body parts!<br>Great job! 🎉</div>
<button class="start-btn" onclick="goM(0)">Play Again</button>
</div>
</div>

<div class="nav">
<button id="back" onclick="prevM()">◀ Back</button>
<div class="pg-num"><span id="cur">1</span> / 6</div>
<button id="next" onclick="nextM()">Next ▶</button>
</div>

<script>
const words=['head','eyes','ears','nose','mouth'];
const imgs=[
'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg',
'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f440.svg',
'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f442.svg',
'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f443.svg',
'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f444.svg'
];
const tips=[
'👆 点一点开始学习',
'👆 点卡片学新词',
'💦 听指令点身体部位',
'👂 听声音找图片',
'🎴 翻牌配对游戏'
];
let curM=0,stars=0,busy=false,actx;
function goM(n){
document.querySelectorAll('.pg').forEach((p,i)=>{p.style.display=i===n?'flex':'none'});
curM=n;
document.getElementById('cur').textContent=n+1;
document.getElementById('back').disabled=n===0;
document.getElementById('next').disabled=n===5;
if(n>0&&n<6)document.getElementById('tipText').textContent=tips[n-1];
}
function nextM(){if(curM<5)goM(curM+1)}
function prevM(){if(curM>0)goM(curM-1)}
function speak(txt){
const u1=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(txt)}&type=2`;
const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(txt)}&spd=4&source=web`;
const a=new Audio(txt.includes(' ')?u2:u1);
a.play().catch(()=>{const b=new Audio(txt.includes(' ')?u1:u2);b.play().catch(()=>{})});
setTimeout(()=>{a.pause();a.currentTime=0},4000);
}
function playOk(){
if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
const o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.frequency.value=523;g.gain.value=.3;
o.start();o.stop(actx.currentTime+.15);
showConfetti();
}
function playNo(){
if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
const o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.frequency.value=200;g.gain.value=.3;
o.start();o.stop(actx.currentTime+.2);
}
function showConfetti(){
for(let i=0;i<20;i++){
const c=document.createElement('div');
c.className='confetti';
c.style.left=Math.random()*100+'vw';
c.style.top='0';
c.style.background=['#e91e8c','#ffd3b6','#a8e6cf','#88d8b0','#ffb88c'][Math.floor(Math.random()*5)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}
function addStar(){
stars++;
const ss=document.getElementById('stars').children;
if(stars<=4)ss[stars-1].textContent='⭐';
}
function startGame(){
if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
actx.resume();
goM(1);
}

document.querySelectorAll('#m1 .card').forEach(c=>{
c.addEventListener('click',()=>{
if(busy)return;
c.classList.add('revealed');
speak(c.dataset.word);
});
});

let bodyDone=[];
document.querySelectorAll('#m2 .body-btn').forEach(b=>{
b.addEventListener('click',()=>{
if(busy)return;
const w=b.dataset.word;
if(!bodyDone.includes(w)){
bodyDone.push(w);
speak(w);
b.style.opacity='.5';
if(bodyDone.length===5){
busy=true;
playOk();
addStar();
setTimeout(()=>{busy=false;nextM()},1200);
}
}
});
});

let listenQ=[...words].sort(()=>Math.random()-.5);
let listenIdx=0;
function playListenQ(){
if(listenIdx<listenQ.length){
speak(listenQ[listenIdx]);
}
}
function replayWord(){
if(listenIdx<listenQ.length)speak(listenQ[listenIdx]);
}
document.querySelectorAll('#m3 .listen-card').forEach(c=>{
c.addEventListener('click',()=>{
if(busy||listenIdx>=listenQ.length)return;
const w=c.dataset.word;
if(w===listenQ[listenIdx]){
busy=true;
c.classList.add('correct');
playOk();
speak(w);
listenIdx++;
setTimeout(()=>{
busy=false;
if(listenIdx===listenQ.length){
addStar();
setTimeout(()=>nextM(),800);
}else{
playListenQ();
}
},1200);
}else{
playNo();
}
});
});
const origGoM=goM;
goM=function(n){
origGoM(n);
if(n===3){listenIdx=0;setTimeout(playListenQ,500)}
};

const memPairs=[];
words.forEach((w,i)=>{
memPairs.push({word:w,img:imgs[i]});
memPairs.push({word:w,img:imgs[i]});
});
memPairs.sort(()=>Math.random()-.5);
const memGrid=document.getElementById('memGrid');
memPairs.forEach((p,i)=>{
const c=document.createElement('div');
c.className='mem-card';
c.innerHTML=`<div class="back">🐷</div><div class="front"><img src="${p.img}"><span>${p.word}</span></div>`;
c.dataset.word=p.word;
c.dataset.idx=i;
memGrid.appendChild(c);
});
let memFlipped=[],memMatched=0;
document.querySelectorAll('#m4 .mem-card').forEach(c=>{
c.addEventListener('click',()=>{
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
memFlipped.push(c);
if(memFlipped.length===2){
busy=true;
const[c1,c2]=memFlipped;
if(c1.dataset.word===c2.dataset.word&&c1.dataset.idx!==c2.dataset.idx){
playOk();
speak(c1.dataset.word);
setTimeout(()=>{
c1.classList.add('matched');
c2.classList.add('matched');
memMatched+=2;
memFlipped=[];
busy=false;
if(memMatched===memPairs.length){
addStar();
setTimeout(()=>goM(5),1000);
}
},1200);
}else{
playNo();
setTimeout(()=>{
c1.classList.remove('flipped');
c2.classList.remove('flipped');
memFlipped=[];
busy=false;
},1000);
}
}
});
});

goM(0);
</script>
</body>
</html>
