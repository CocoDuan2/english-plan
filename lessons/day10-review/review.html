<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 10 - Adventure Review Game</title>
<style>
:root{--tip-accent:#00897b;--tip-bg:#e0f2f1}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#e0f7fa 0%,#e8f5e9 52%,#dcedc8 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:16px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#00897b;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 56px;border:none;border-radius:38px;background:linear-gradient(135deg,#4db6ac,#00897b);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(0,137,123,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
.quick-wrap{width:100%;max-width:500px;background:rgba(255,255,255,.85);border-radius:18px;padding:10px 8px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.quick-grid{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.quick-btn{width:94px;height:94px;border:none;border-radius:14px;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.quick-btn div{font-size:18px;font-weight:800;color:#2c3e50}
.quick-btn.good{outline:4px solid #66bb6a}
.quick-btn:active{transform:scale(.95)}
.stamp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;width:100%;margin-top:8px}
.stamp-card{height:140px;border:none;border-radius:16px;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:.2s}
.stamp-card div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.stamp-card.good{outline:5px solid #66bb6a}
.stamp-card.bad{outline:5px solid #ef5350}
.stamp-card:active{transform:scale(.95)}
.listen-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px;margin-top:8px}
.listen-btn{width:110px;height:128px;border:none;border-radius:16px;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:.2s}
.listen-btn div{font-size:18px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.listen-btn.good{outline:4px solid #66bb6a}
.listen-btn.bad{outline:4px solid #ef5350}
.listen-btn:active{transform:scale(.95)}
.shadow-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:500px;width:100%;margin-top:8px}
.shadow-card{height:120px;border:none;border-radius:14px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.shadow-card.good{outline:4px solid #66bb6a}
.shadow-card.bad{outline:4px solid #ef5350}
.shadow-card:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#4db6ac;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Adventure Review</div>
    <div class="zh" id="zh"></div>
    <div class="stars" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
  <div class="mod" id="m5"></div>
</div>

<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <span class="np" id="pg"></span>
  <button class="nb" id="nx" onclick="go(1)">Next</button>
</div>

<script>
var actx=null;
function ensureAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type){ensureAudio();var o=actx.createOscillator(),g=actx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=0.18;o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}
function playOk(){playTone(523,.08);setTimeout(function(){playTone(659,.08)},90);setTimeout(function(){playTone(784,.12)},180)}
function playNo(){playTone(330,.15,'square');setTimeout(function(){playTone(262,.2,'square')},160)}
function speak(text,cb){
  var done=false;
  function finish(){if(!done){done=true;if(cb)cb()}}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
  a.onended=finish;
  a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web');
    b.onended=finish;b.onerror=finish;b.play().catch(finish);
  };
  a.play().catch(finish);
  setTimeout(finish,4000);
}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var YEST=[
  {w:'rabbit',svg:'<svg width="52" height="52" viewBox="0 0 160 160"><ellipse cx="66" cy="38" rx="10" ry="20" fill="#e0e0e0"/><ellipse cx="94" cy="38" rx="10" ry="20" fill="#e0e0e0"/><circle cx="80" cy="68" r="28" fill="#eeeeee"/></svg>'},
  {w:'pig',svg:'<svg width="52" height="52" viewBox="0 0 160 160"><ellipse cx="80" cy="108" rx="28" ry="22" fill="#f48fb1"/><circle cx="80" cy="64" r="26" fill="#f48fb1"/></svg>'},
  {w:'cow',svg:'<svg width="52" height="52" viewBox="0 0 160 160"><ellipse cx="80" cy="110" rx="30" ry="22" fill="#fff"/><circle cx="80" cy="64" r="24" fill="#fff"/><ellipse cx="70" cy="58" rx="7" ry="6" fill="#333"/></svg>'}
];

var WORDS=[
  {w:'one',kind:'number',sent:'I have one!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><polygon points="80,25 96,62 138,66 106,94 116,136 80,114 44,136 54,94 22,66 64,62" fill="#ffca28"/></svg>'},
  {w:'two',kind:'number',sent:'I have two!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><path d="M48 74 C48 50 74 50 80 70 C86 50 112 50 112 74 C112 95 90 111 80 122 C70 111 48 95 48 74Z" fill="#f06292"/><path d="M22 74 C22 50 48 50 54 70 C60 50 86 50 86 74 C86 95 64 111 54 122 C44 111 22 95 22 74Z" fill="#f48fb1"/></svg>'},
  {w:'run',kind:'action',sent:'I can run!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><circle cx="80" cy="38" r="16" fill="#ffcc80"/><rect x="68" y="56" width="24" height="36" rx="10" fill="#ff7043"/><line x1="80" y1="92" x2="56" y2="118" stroke="#5c6bc0" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="92" x2="96" y2="120" stroke="#5c6bc0" stroke-width="8" stroke-linecap="round"/></svg>'},
  {w:'jump',kind:'action',sent:'I can jump!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><circle cx="80" cy="38" r="16" fill="#ffcc80"/><rect x="68" y="56" width="24" height="34" rx="10" fill="#ab47bc"/><line x1="80" y1="90" x2="62" y2="118" stroke="#7e57c2" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="90" x2="100" y2="110" stroke="#7e57c2" stroke-width="8" stroke-linecap="round"/></svg>'},
  {w:'pink',kind:'color',sent:'It\'s pink!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><circle cx="80" cy="56" r="14" fill="#f48fb1"/><circle cx="100" cy="68" r="14" fill="#f48fb1"/><circle cx="96" cy="90" r="14" fill="#f48fb1"/><circle cx="72" cy="90" r="14" fill="#f48fb1"/><circle cx="62" cy="68" r="14" fill="#f48fb1"/><circle cx="80" cy="76" r="10" fill="#e91e63"/></svg>'},
  {w:'purple',kind:'color',sent:'It\'s purple!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><ellipse cx="55" cy="70" rx="30" ry="22" fill="#9c27b0" transform="rotate(-15,55,70)"/><ellipse cx="105" cy="70" rx="30" ry="22" fill="#9c27b0" transform="rotate(15,105,70)"/><ellipse cx="80" cy="85" rx="6" ry="14" fill="#4a148c"/></svg>'},
  {w:'rabbit',kind:'animal',sent:'I see a rabbit!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><ellipse cx="66" cy="38" rx="10" ry="20" fill="#e0e0e0"/><ellipse cx="94" cy="38" rx="10" ry="20" fill="#e0e0e0"/><circle cx="80" cy="68" r="28" fill="#eeeeee"/><ellipse cx="80" cy="112" rx="34" ry="28" fill="#eeeeee"/></svg>'},
  {w:'pig',kind:'animal',sent:'I see a pig!',svg:'<svg width="92" height="92" viewBox="0 0 160 160"><ellipse cx="80" cy="108" rx="32" ry="24" fill="#f48fb1"/><circle cx="80" cy="64" r="26" fill="#f48fb1"/><ellipse cx="80" cy="72" rx="14" ry="10" fill="#f06292"/></svg>'}
];

var modN=6,curMod=0,score=0,total=27;
function enterModule(n){
  if(n===1)initM1();
  if(n===2)initM2();
  if(n===3)initM3();
  if(n===4)initM4();
  if(n===5)initM5();
}
function showMod(n){
  curMod=n;
  for(var i=0;i<modN;i++)document.getElementById('m'+i).classList.toggle('on',i===n);
  document.getElementById('pg').textContent=(n+1)+'/'+modN;
  document.getElementById('pb').disabled=n===0;
  document.getElementById('nx').disabled=n===modN-1;
  enterModule(n);
  updateTop();
}
function go(d){showMod(Math.max(0,Math.min(modN-1,curMod+d)))}
function updateTop(){
  var titles=['Adventure Review','Warm-up','Stamp Match','Listen Mission','Shadow Match','All Done!'];
  var hints=['','昨天动物热身','看图选句子','听一听，点图片','找同一个影子',''];
  document.getElementById('en').textContent=titles[curMod];
  document.getElementById('zh').textContent=hints[curMod];
  document.getElementById('zh').style.display=hints[curMod]?'inline-block':'none';
  var s='';for(var i=0;i<total;i++)s+=i<score?'⭐':'☆';
  document.getElementById('st').textContent=s;
}

(function(){
  var m=document.getElementById('m0');
  m.innerHTML='<img src="../../assets/peppa/peppa_pig_arms_open.png" width="140" alt="Peppa">'+
    '<div class="pr"><div class="bbl">Adventure review time!</div></div>'+
    '<div style="display:flex;gap:10px;margin:8px 0">'+
    '<img src="../../assets/peppa/george-superhero-costume.png" width="80" alt="George">'+
    '<img src="../../assets/peppa/emily-elephant-standing.png" width="80" alt="Emily">'+
    '</div>'+
    '<button class="start-btn" onclick="ensureAudio();showMod(1)">Start!</button>';
  updateTop();
})();

function initM1(){
  var m=document.getElementById('m1');
  var h='<div class="pr"><img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"><div class="bbl">Tap yesterday animals!</div></div>';
  h+='<div class="quick-wrap"><div class="quick-grid">';
  YEST.forEach(function(y){h+='<button class="quick-btn" onclick="tapQuick(this,\''+y.w+'\')">'+y.svg+'<div>'+y.w+'</div></button>'});
  h+='</div></div>';
  m.innerHTML=h;
  updateTop();
}
function tapQuick(el,w){
  if(el.classList.contains('good'))return;
  el.classList.add('good');
  playOk();score++;updateTop();
  speak('I see a '+w+'!');
}

var m2busy=false,m2q=0,m2order=[];
function initM2(){m2q=0;m2order=shuffle([0,1,2,3,4,5,6,7]);buildM2()}
function buildM2(){
  if(m2q>=8){setTimeout(function(){showMod(3);initM3()},700);return}
  var target=WORDS[m2order[m2q]];
  var wrong=shuffle(WORDS.filter(function(w){return w.w!==target.w})).slice(0,3);
  var opts=shuffle([target].concat(wrong));
  var m=document.getElementById('m2');
  var h='<div class="pr"><img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy"><div class="bbl">Match picture with sentence</div></div>';
  h+='<div style="background:rgba(255,255,255,.84);border-radius:18px;padding:10px 8px;width:100%;max-width:500px">';
  h+='<div>'+target.svg+'</div>';
  h+='<div style="font-size:34px;font-weight:900;color:#2c3e50;text-transform:lowercase">'+target.w+'</div>';
  h+='<div class="stamp-grid">';
  opts.forEach(function(o){h+='<button class="stamp-card" data-s="'+o.sent+'" onclick="tapStamp(this,\''+target.sent.replace(/'/g,"\\'")+'\')"><div style="font-size:22px">'+o.sent+'</div></button>'});
  h+='</div></div>';
  m.innerHTML=h;
}
function tapStamp(el,correct){
  if(m2busy)return;m2busy=true;
  if(el.dataset.s===correct){
    el.classList.add('good');playOk();score++;updateTop();
    speak(correct,function(){m2busy=false;m2q++;buildM2()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){m2busy=false;setTimeout(function(){el.classList.remove('bad')},320)});
  }
}

var m3busy=false,m3q=0,m3order=[];
function initM3(){m3q=0;m3order=shuffle([0,1,2,3,4,5,6,7]);buildM3()}
function buildM3(){
  if(m3q>=8){setTimeout(function(){showMod(4);initM4()},700);return}
  var target=WORDS[m3order[m3q]];
  var opts=shuffle([target].concat(shuffle(WORDS.filter(function(w){return w.w!==target.w})).slice(0,2)));
  var m=document.getElementById('m3');
  var h='<div class="pr"><img src="../../assets/peppa/george-superhero-costume.png" alt="George"><div class="bbl">Listen mission</div></div>';
  h+='<button style="width:220px;height:84px;border:none;border-radius:14px;background:#00897b;color:#fff;font-size:26px;font-weight:900;cursor:pointer" onclick="speak(\''+target.sent.replace(/'/g,"\\'")+'\')">🔊 Listen</button>';
  h+='<div class="listen-grid">';
  opts.forEach(function(o){h+='<button class="listen-btn" data-w="'+o.w+'" onclick="tapListen(this,\''+target.w+'\')">'+o.svg+'<div>'+o.w+'</div></button>'});
  h+='</div>';
  m.innerHTML=h;
  setTimeout(function(){speak(target.sent)},260);
}
function tapListen(el,correct){
  if(m3busy)return;m3busy=true;
  if(el.dataset.w===correct){
    el.classList.add('good');playOk();score++;updateTop();
    speak('Good! '+correct,function(){m3busy=false;m3q++;buildM3()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){m3busy=false;setTimeout(function(){el.classList.remove('bad')},320)});
  }
}

var m4busy=false,m4q=0,m4order=[];
function initM4(){m4q=0;m4order=shuffle([0,1,2,3,4,5,6,7]);buildM4()}
function buildM4(){
  if(m4q>=8){setTimeout(function(){showMod(5);initM5()},700);return}
  var target=WORDS[m4order[m4q]];
  var same=shuffle(WORDS.filter(function(w){return w.w!==target.w}))[0];
  var cards=shuffle([target,same,same,same]);
  var m=document.getElementById('m4');
  var h='<div class="pr"><img src="../../assets/peppa/peppa-fairy-princess-small.png" alt="Peppa Fairy"><div class="bbl">Tap the same shadow</div></div>';
  h+='<div style="opacity:.35;filter:grayscale(1)">'+target.svg.replace('width="92" height="92"','width="102" height="102"')+'</div>';
  h+='<div class="shadow-grid">';
  cards.forEach(function(c){h+='<button class="shadow-card" data-w="'+c.w+'" onclick="tapShadow(this,\''+target.w+'\')"><div style="opacity:.35;filter:grayscale(1)">'+c.svg.replace('width="92" height="92"','width="86" height="86"')+'</div></button>'});
  h+='</div>';
  m.innerHTML=h;
}
function tapShadow(el,correct){
  if(m4busy)return;m4busy=true;
  if(el.dataset.w===correct){
    el.classList.add('good');playOk();score++;updateTop();
    speak(correct,function(){m4busy=false;m4q++;buildM4()});
  }else{
    el.classList.add('bad');playNo();
    speak(correct,function(){m4busy=false;setTimeout(function(){el.classList.remove('bad')},320)});
  }
}

function initM5(){
  updateTop();
  var m=document.getElementById('m5');
  m.innerHTML='<img src="../../assets/peppa/peppa-family-group-outdoors.png" width="160" alt="Peppa family">'+
    '<div style="font-size:42px;font-weight:900;color:#00897b;margin:10px 0">All Done!</div>'+
    '<div style="font-size:22px;color:#5d4037;margin-bottom:8px">Great adventure review!</div>'+
    '<div style="font-size:28px;letter-spacing:3px">'+Array(score+1).join('⭐')+'</div>'+
    '<button class="start-btn" style="margin-top:14px" onclick="location.reload()">Play Again</button>';
}
</script>
</body>
</html>
