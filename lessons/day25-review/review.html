<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 25 - Review Game</title>
<style>
:root{--tip-accent:#5e35b1;--tip-bg:#ede7f6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#1a237e 0%,#4527a0 50%,#311b92 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;z-index:100;width:100%;text-align:center;padding:8px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05)}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;color:var(--tip-accent);font-weight:800;margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.st{margin-top:4px;font-size:22px;letter-spacing:2px}
.mod{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 70px}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#e67e22;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:30px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:40px;background:linear-gradient(135deg,#7e57c2,#5e35b1);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(94,53,177,.3);margin-top:16px}
.start-btn:active{transform:scale(.95)}
.planet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:440px;margin-top:10px}
.planet-btn{width:190px;height:140px;border:none;border-radius:20px;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.3);background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:.2s}
.planet-btn:active{transform:scale(.95)}
.planet-btn .icon{font-size:48px}
.planet-btn .t{font-size:24px;font-weight:900;color:#2c3e50}
.alien-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:440px;margin-top:10px}
.alien-card{background:#fff;border-radius:18px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent}
.alien-card:active{transform:scale(.95)}
.alien-card.correct{border-color:#66bb6a;background:#e8f5e9}
.alien-card.wrong{border-color:#ef5350;background:#ffebee}
.alien-card .lb{font-size:20px;font-weight:900;color:#2c3e50;margin-top:6px}
.fuel-grid{display:flex;flex-direction:column;gap:12px;max-width:440px;margin-top:10px}
.fuel-q{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.15);text-align:center}
.fuel-q .w{font-size:32px;font-weight:900;color:#2c3e50;margin:8px 0}
.fuel-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.fuel-opt{padding:14px;border:none;border-radius:14px;background:#f5f5f5;font-size:20px;font-weight:700;color:#2c3e50;cursor:pointer;transition:.2s}
.fuel-opt:active{transform:scale(.95)}
.fuel-opt.correct{background:#66bb6a;color:#fff}
.fuel-opt.wrong{background:#ef5350;color:#fff}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.done-wrap img{width:160px;height:auto}
.done-ttl{font-size:48px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.done-msg{font-size:22px;color:#e1bee7;text-align:center}
.play-again{font-size:28px;font-weight:700;padding:16px 48px;border:none;border-radius:32px;background:linear-gradient(135deg,#F9ADC7,#e91e8c);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(249,173,199,.4);margin-top:8px}
.play-again:active{transform:scale(.95)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
</style>
</head>
<body>
<div class="main">
  <div class="top">
    <div class="en" id="en">Space Adventure</div>
    <div class="zh" id="zh"></div>
    <div class="st" id="st"></div>
  </div>
  <div class="mod on" id="m0"></div>
  <div class="mod" id="m1"></div>
  <div class="mod" id="m2"></div>
  <div class="mod" id="m3"></div>
  <div class="mod" id="m4"></div>
</div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">Back</button>
  <div class="np" id="pg">1/5</div>
  <button class="nb" id="nb" onclick="go(1)">Next</button>
</div>
<script>
var PP='../../assets/peppa/';
var NUMBERS=[
  {w:'one',sent:'I have one!',svg:'<circle cx="80" cy="80" r="30" fill="#ffc107"/>'},
  {w:'two',sent:'I have two!',svg:'<circle cx="60" cy="80" r="25" fill="#ff9800"/><circle cx="100" cy="80" r="25" fill="#ff9800"/>'},
  {w:'three',sent:'I have three!',svg:'<circle cx="50" cy="70" r="20" fill="#f57c00"/><circle cx="80" cy="70" r="20" fill="#f57c00"/><circle cx="110" cy="70" r="20" fill="#f57c00"/>'},
  {w:'four',sent:'I have four!',svg:'<circle cx="50" cy="60" r="18" fill="#e65100"/><circle cx="110" cy="60" r="18" fill="#e65100"/><circle cx="50" cy="100" r="18" fill="#e65100"/><circle cx="110" cy="100" r="18" fill="#e65100"/>'},
  {w:'five',sent:'I have five!',svg:'<circle cx="80" cy="50" r="16" fill="#bf360c"/><circle cx="50" cy="80" r="16" fill="#bf360c"/><circle cx="110" cy="80" r="16" fill="#bf360c"/><circle cx="60" cy="110" r="16" fill="#bf360c"/><circle cx="100" cy="110" r="16" fill="#bf360c"/>'}
];
var ACTIONS=[
  {w:'run',sent:'I can run!',svg:'<circle cx="80" cy="40" r="12" fill="#ff6f00"/><rect x="76" y="52" width="8" height="30" rx="4" fill="#ff6f00"/><path d="M70 82 L80 100 L90 82" stroke="#ff6f00" stroke-width="6" fill="none"/>'},
  {w:'jump',sent:'I can jump!',svg:'<circle cx="80" cy="35" r="12" fill="#f57c00"/><rect x="76" y="47" width="8" height="25" rx="4" fill="#f57c00"/><path d="M70 72 L80 95 L90 72" stroke="#f57c00" stroke-width="6" fill="none"/>'},
  {w:'walk',sent:'I can walk!',svg:'<circle cx="80" cy="45" r="12" fill="#e65100"/><rect x="76" y="57" width="8" height="35" rx="4" fill="#e65100"/><path d="M70 92 L80 100 L90 92" stroke="#e65100" stroke-width="6" fill="none"/>'},
  {w:'sit',sent:'I can sit!',svg:'<circle cx="80" cy="50" r="12" fill="#bf360c"/><rect x="76" y="62" width="8" height="20" rx="4" fill="#bf360c"/><rect x="60" y="82" width="40" height="8" rx="4" fill="#bf360c"/>'},
  {w:'stand',sent:'I can stand!',svg:'<circle cx="80" cy="40" r="12" fill="#d84315"/><rect x="76" y="52" width="8" height="45" rx="4" fill="#d84315"/><rect x="70" y="97" width="20" height="8" rx="4" fill="#d84315"/>'}
];
var COLORS2=[
  {w:'pink',sent:"It's pink!",svg:'<circle cx="80" cy="80" r="35" fill="#f48fb1"/>'},
  {w:'purple',sent:"It's purple!",svg:'<circle cx="80" cy="80" r="35" fill="#ab47bc"/>'},
  {w:'white',sent:"It's white!",svg:'<circle cx="80" cy="80" r="35" fill="#fff" stroke="#e0e0e0" stroke-width="3"/>'},
  {w:'black',sent:"It's black!",svg:'<circle cx="80" cy="80" r="35" fill="#424242"/>'},
  {w:'brown',sent:"It's brown!",svg:'<circle cx="80" cy="80" r="35" fill="#8d6e63"/>'}
];
var ANIMALS2=[
  {w:'rabbit',sent:'I see a rabbit!',svg:'<ellipse cx="66" cy="58" rx="8" ry="20" fill="#e1bee7"/><ellipse cx="94" cy="58" rx="8" ry="20" fill="#e1bee7"/><circle cx="80" cy="90" r="28" fill="#f3e5f5"/>'},
  {w:'pig',sent:'I see a pig!',svg:'<circle cx="80" cy="80" r="28" fill="#f48fb1"/><ellipse cx="80" cy="88" rx="14" ry="9" fill="#f06292"/>'},
  {w:'cow',sent:'I see a cow!',svg:'<ellipse cx="80" cy="95" rx="32" ry="24" fill="#fff"/><circle cx="80" cy="70" r="26" fill="#fff"/><circle cx="60" cy="65" r="8" fill="#424242"/><circle cx="90" cy="75" r="10" fill="#424242"/>'},
  {w:'horse',sent:'I see a horse!',svg:'<ellipse cx="80" cy="95" rx="28" ry="22" fill="#8d6e63"/><ellipse cx="80" cy="70" rx="22" ry="28" fill="#8d6e63"/><path d="M70 45 Q80 38 90 45" fill="#6d4c41"/>'},
  {w:'sheep',sent:'I see a sheep!',svg:'<ellipse cx="80" cy="92" rx="30" ry="22" fill="#eceff1"/><circle cx="80" cy="68" r="24" fill="#eceff1"/><circle cx="60" cy="62" r="8" fill="#eceff1"/><circle cx="100" cy="62" r="8" fill="#eceff1"/>'}
];
var ALL=[].concat(NUMBERS,ACTIONS,COLORS2,ANIMALS2);

function draw(svg,s){return '<svg width="'+(s||76)+'\" height="'+(s||76)+'\" viewBox="0 0 160 160">'+svg+'</svg>'}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d,type){var c=ac(),o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.value=.16;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}
function playOk(){tone(523,.08);setTimeout(function(){tone(659,.08)},90);setTimeout(function(){tone(784,.12)},180)}
function playNo(){tone(310,.15,'square');setTimeout(function(){tone(262,.18,'square')},150)}
function speak(text,cb){
  var done=false;
  function end(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
  a.onended=end;a.onerror=function(){
    var b=new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web');
    b.onended=end;b.onerror=end;b.play().catch(end);
  };
  a.play().catch(end);
  setTimeout(end,4000);
}

var cur=0,score=0,total=20;
var mods=['m0','m1','m2','m3','m4'];
function ui(){
  document.getElementById('pg').textContent=(cur+1)+'/'+mods.length;
  document.getElementById('pb').disabled=cur===0;
  var n=document.getElementById('nb');
  if(cur===mods.length-1){n.disabled=true;n.textContent='Done'}
  else{n.disabled=false;n.textContent='Next'}
  var titles=['Space Adventure','Planet Hop','Alien Delivery','Rocket Fuel','All Done!'];
  var tips=['','选一个星球','听一听,送货','句子加油',''];
  document.getElementById('en').textContent=titles[cur]||'';
  var zh=document.getElementById('zh');
  zh.textContent=tips[cur]||'';
  zh.style.display=tips[cur]?'inline-block':'none';
  var s='';for(var i=0;i<total;i++)s+=i<score?'⭐':'☆';
  document.getElementById('st').textContent=s;
  mods.forEach(function(m,i){document.getElementById(m).classList.toggle('on',i===cur)});
}
function go(d){
  if(d>0&&cur===mods.length-1)return;
  cur=Math.max(0,Math.min(mods.length-1,cur+d));ui();
}

// Module 0: Start
document.getElementById('m0').innerHTML='<img src="'+PP+'george-pig-superhero.png" width="140" alt="George"><div class="pr"><img src="'+PP+'george-pig-superhero.png" alt="George"><div class="bbl">Let\'s explore space!</div></div><button class="start-btn" onclick="startGame()">Start!</button>';

function startGame(){ac();go(1);buildPlanet()}

// Module 1: Planet Hop (choose planet)
var planetBusy=false;
function buildPlanet(){
  var m=document.getElementById('m1');
  m.innerHTML='<div class="pr"><img src="'+PP+'peppa-pig-fairy.png" alt="Peppa"><div class="bbl">Pick a planet!</div></div><div class="planet-grid" id="planetGrid"></div>';
  var planets=[
    {icon:'🔢',t:'Numbers',data:NUMBERS},
    {icon:'🏃',t:'Actions',data:ACTIONS},
    {icon:'🎨',t:'Colors',data:COLORS2},
    {icon:'🐾',t:'Animals',data:ANIMALS2}
  ];
  var pg=document.getElementById('planetGrid');
  planets.forEach(function(p){
    var btn=document.createElement('button');
    btn.className='planet-btn';
    btn.innerHTML='<div class="icon">'+p.icon+'</div><div class="t">'+p.t+'</div>';
    btn.onclick=function(){
      if(planetBusy)return;
      planetBusy=true;
      playOk();
      setTimeout(function(){go(1);buildAlien(p.data);planetBusy=false},800);
    };
    pg.appendChild(btn);
  });
}

// Module 2: Alien Delivery (listen and pick)
var alienBusy=false,alienQ=[];
function buildAlien(data){
  var m=document.getElementById('m2');
  alienQ=shuffle(data.slice()).slice(0,3);
  var idx=0;
  function nextQ(){
    if(idx>=alienQ.length){
      setTimeout(function(){go(1);buildFuel()},1200);
      return;
    }
    var q=alienQ[idx];
    var opts=shuffle([q].concat(shuffle(data.filter(function(x){return x.w!==q.w})).slice(0,2)));
    var html='<div class="pr"><img src="'+PP+'emily-elephant.png" alt="Emily"><div class="bbl">Deliver to alien!</div></div><div class="alien-grid" id="alienGrid"></div>';
    m.innerHTML=html;
    var ag=document.getElementById('alienGrid');
    opts.forEach(function(o){
      var card=document.createElement('div');
      card.className='alien-card';
      card.innerHTML=draw(o.svg,90)+'<div class="lb">'+o.w+'</div>';
      card.onclick=function(){
        if(alienBusy)return;
        alienBusy=true;
        if(o.w===q.w){
          card.classList.add('correct');
          playOk();
          speak(q.sent);
          score++;ui();
          setTimeout(function(){idx++;nextQ();alienBusy=false},1200);
        }else{
          card.classList.add('wrong');
          playNo();
          speak(q.sent);
          setTimeout(function(){card.classList.remove('wrong');alienBusy=false},800);
        }
      };
      ag.appendChild(card);
    });
    speak(q.w);
  }
  nextQ();
}

// Module 3: Rocket Fuel (sentence matching)
var fuelBusy=false,fuelQ=[];
function buildFuel(){
  var m=document.getElementById('m3');
  fuelQ=shuffle(ALL.slice()).slice(0,4);
  var idx=0;
  function nextQ(){
    if(idx>=fuelQ.length){
      setTimeout(function(){go(1);buildDone()},1200);
      return;
    }
    var q=fuelQ[idx];
    var opts=shuffle([q.sent,'I like it!','This is fun!','Let\'s go!'].filter(function(x,i,a){return a.indexOf(x)===i&&(x===q.sent||!ALL.find(function(y){return y.sent===x}))})).slice(0,4);
    if(opts.indexOf(q.sent)===-1)opts[0]=q.sent;
    var html='<div class="pr"><img src="'+PP+'candy-cat.png" alt="Candy"><div class="bbl">Fuel the rocket!</div></div><div class="fuel-grid"><div class="fuel-q"><div class="w">'+q.w+'</div>'+draw(q.svg,100)+'<div class="fuel-opts" id="fuelOpts"></div></div></div>';
    m.innerHTML=html;
    var fo=document.getElementById('fuelOpts');
    opts.forEach(function(o){
      var btn=document.createElement('button');
      btn.className='fuel-opt';
      btn.textContent=o;
      btn.onclick=function(){
        if(fuelBusy)return;
        fuelBusy=true;
        if(o===q.sent){
          btn.classList.add('correct');
          playOk();
          speak(q.sent);
          score++;ui();
          setTimeout(function(){idx++;nextQ();fuelBusy=false},1200);
        }else{
          btn.classList.add('wrong');
          playNo();
          setTimeout(function(){btn.classList.remove('wrong');fuelBusy=false},800);
        }
      };
      fo.appendChild(btn);
    });
  }
  nextQ();
}

// Module 4: Done
function buildDone(){
  var m=document.getElementById('m4');
  m.innerHTML='<div class="done-wrap"><img src="'+PP+'peppa-pig-family.png" alt="Family"><div class="done-ttl">All Done!</div><div class="done-msg">Great space mission!</div><div style="font-size:48px;margin-top:8px">🚀✨🌟</div><button class="play-again" onclick="restart()">Play Again</button></div>';
  score=total;ui();
}

function restart(){
  score=0;cur=0;ui();
  document.getElementById('m0').innerHTML='<img src="'+PP+'george-pig-superhero.png" width="140" alt="George"><div class="pr"><img src="'+PP+'george-pig-superhero.png" alt="George"><div class="bbl">Let\'s explore space!</div></div><button class="start-btn" onclick="startGame()">Start!</button>';
}

ui();
</script>
</body>
</html>
