<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 9 Review - Counting Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fff3e0,#ffe0b2);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e65100;margin:8px 0;text-shadow:0 2px 4px rgba(230,81,0,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff8f00,#ff6d00);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,143,0,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,143,0,.2);border-radius:2px;filter:blur(3px)}
.tz-row{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.pr.big img{width:110px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.card{width:110px;height:110px;background:#ddd;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;overflow:hidden}
.card .card-inner{opacity:0;transform:translateY(30px);transition:all .5s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:8px}
.card.revealed{background:#fff}
.card.revealed .card-inner{opacity:1;transform:translateY(0)}
.card .card-label{font-size:16px;font-weight:700;color:#2c3e50}
.count-prompt{font-size:36px;font-weight:900;color:#e65100;margin:10px 0;padding:10px 28px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.count-area{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:400px;margin:16px 0}
.count-item{width:80px;height:80px;background:#fff;border-radius:50%;border:3px solid #ff8f00;box-shadow:0 4px 10px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.count-item:active{transform:scale(.9)}
.count-item.tapped{background:#ffd54f;border-color:#ff6d00;pointer-events:none}
.count-progress{font-size:28px;font-weight:700;color:#e65100;margin:8px 0}
.speaker-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ff8f00,#ff6d00);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(255,143,0,.4);margin:0}
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.listen-card{width:100px;height:100px;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card-label{font-size:18px;font-weight:700;color:#2c3e50;margin-top:8px}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:90%;max-width:560px}
.mem-card{aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;transform-style:preserve-3d;position:relative}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.6;pointer-events:none;transform:rotateY(180deg)}
.mem-front,.mem-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px}
.mem-front{background:linear-gradient(135deg,#ff8f00,#ff6d00);font-size:44px}
.mem-back{transform:rotateY(180deg);background:#fff;flex-direction:column;gap:4px}
.mem-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #ff8f00;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#ff8f00;color:#fff;box-shadow:0 4px 12px rgba(255,143,0,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.pr.big img{width:90px}.tz-row{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.sb{font-size:22px}
.card .card-label{font-size:14px}
.count-prompt{font-size:28px}.count-item{width:65px;height:65px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}.mem-back-label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="pr big"><img src="../../../assets/peppa/george-standing.png" alt="George"></div>
<div class="te">Counting Game</div>
<div class="sb">Let's play!</div>
<div style="display:flex;gap:14px;align-items:center;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" width="40" alt="1">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" width="40" alt="2">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="40" alt="3">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" width="40" alt="4">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="40" alt="5">
</div>
</div>
<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，看看是几？</div>
<div class="sb" id="s1"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"><div class="bbl">Tap to see!</div></div>
<div class="card-grid" id="cg1"></div>
</div>
<!-- M2: Count & Tap -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Count & Tap</div>
<div class="tz">数一数，点数字！</div>
<div class="sb" id="s2"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/george-standing.png" alt="George"><div class="bbl">How many?</div></div>
<div style="display:flex;flex-direction:column;gap:20px;align-items:center;margin:16px 0">
<div id="m2items" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:16px;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-height:100px"></div>
<div id="m2numbers" style="display:flex;gap:12px;justify-content:center"></div>
</div>
</div>
<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，点一点！</div>
<div class="sb" id="s3"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl">Listen carefully!</div><div onclick="playM3Round()" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#a8e6cf,#88d8b0);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-left:8px">🔊</div></div>
<div class="listen-grid" id="lg3"></div>
</div>
<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一对！</div>
<div class="sb" id="s4"></div>
</div>
<div class="pr"><img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily"><div class="bbl">Find pairs!</div></div>
<div class="memory-grid" id="mg4"></div>
</div>
<!-- M5: Done -->
<div id="m5" class="mod">
<div class="pr big"><img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb">1, 2, 3, 4, 5 — You can count! 🎉</div>
<div class="sb" id="s5"></div>
<button class="nb" onclick="location.reload()" style="margin-top:20px;font-size:20px;padding:16px 40px">Play Again</button>
</div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../../assets/peppa/';
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/';
var W=[
{w:'one',n:1,emoji:'1f34e',numEmoji:'31-20e3',color:'#e53935'},
{w:'two',n:2,emoji:'1f34c',numEmoji:'32-20e3',color:'#f9a825'},
{w:'three',n:3,emoji:'2b50',numEmoji:'33-20e3',color:'#ff8f00'},
{w:'four',n:4,emoji:'1f338',numEmoji:'34-20e3',color:'#ec407a'},
{w:'five',n:5,emoji:'1f436',numEmoji:'35-20e3',color:'#43a047'}
];
var curM=0,busy=false,st=[0,0,0,0,0];
function dotsHTML(item,sz){var h='';for(var i=0;i<item.n;i++)h+='<img src="'+TW+item.emoji+'.svg" width="'+sz+'" style="margin:2px">';return h}
function speak(t){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');
a.play().catch(function(){new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web').play().catch(function(){})});
}
function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e53935","#f9a825","#ff8f00","#ec407a","#43a047"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){
curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}
// M1: Learn - slide-up reveal
var m1rev=[];
function initM1(){
if(m1rev.length>0)return;
document.getElementById('s1').innerHTML=stars(0,W.length);
var g=document.getElementById('cg1');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='card';
c.innerHTML='<div class="card-inner"><img src="'+TW+item.numEmoji+'.svg" width="60" alt="'+item.w+'"><div class="card-label">'+item.w+'</div></div>';
c.onclick=function(){
if(c.classList.contains('revealed')){speak(item.w);return}
c.classList.add('revealed');playOk();speak(item.w);m1rev.push(i);
st[0]=m1rev.length;document.getElementById('s1').innerHTML=stars(st[0],W.length);
};
g.appendChild(c);
});
}
// M2: Count & Tap - hear number, tap that many stars
var m2round=0,m2order=[],m2tapped=0,m2target=0;
// M2: Count & Tap
var m2round=0,m2questions=[];
function initM2(){
if(m2round>0)return;
document.getElementById('s2').innerHTML=stars(0,W.length);
m2questions=W.map(function(item){return item.n}).sort(function(){return Math.random()-.5});
buildM2Numbers();
playM2Round();
}
function buildM2Numbers(){
var g=document.getElementById('m2numbers');g.innerHTML='';
for(var i=1;i<=5;i++){
var d=document.createElement('div');
d.style.cssText='width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;font-size:32px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .2s';
d.textContent=i;
d.onmouseover=function(){this.style.transform='scale(1.1)'};
d.onmouseout=function(){this.style.transform='scale(1)'};
d.onclick=(function(num){return function(){checkM2(num)}})(i);
g.appendChild(d);
}
}
function playM2Round(){
if(m2round>=m2questions.length)return;
var n=m2questions[m2round];
var item=W.find(function(x){return x.n===n});
var g=document.getElementById('m2items');g.innerHTML='';
for(var i=0;i<n;i++){
var img=document.createElement('img');
img.src=TW+item.emoji+'.svg';
img.width=50;
img.style.margin='4px';
g.appendChild(img);
}
speak('How many?');
}
function checkM2(num){
if(busy)return;
if(num===m2questions[m2round]){
busy=true;playOk();speak(W.find(function(x){return x.n===num}).w);
st[1]++;document.getElementById('s2').innerHTML=stars(st[1],m2questions.length);
m2round++;
setTimeout(function(){if(m2round<m2questions.length)playM2Round();busy=false},1500);
}else{playNo()}
}
// M3: Listen & Find
var m3round=0,m3order=[];
function initM3(){
if(m3order.length>0)return;
document.getElementById('s3').innerHTML=stars(0,W.length);
m3order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('lg3');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='listen-card';
c.innerHTML='<div>'+dotsHTML(item,28)+'</div><div class="listen-card-label">'+item.w+'</div>';
c.onclick=function(){checkM3(i)};
g.appendChild(c);
});
playM3Round();
}
function playM3Round(){if(m3round>=W.length)return;speak(W[m3order[m3round]].w)}
function checkM3(idx){
if(busy||m3round>=W.length)return;
if(idx===m3order[m3round]){
busy=true;playOk();st[2]++;document.getElementById('s3').innerHTML=stars(st[2],W.length);
m3round++;
setTimeout(function(){if(m3round<W.length)playM3Round();busy=false},1200);
}else{playNo()}
}
// M4: Memory Match
var m4flipped=[],m4matched=0;
function initM4(){
if(m4matched>0)return;
m4matched=0;m4flipped=[];busy=false;
var pairs=[];
W.forEach(function(item,i){pairs.push({idx:i,w:item.w,img:item.img});pairs.push({idx:i,w:item.w,img:item.img})});
pairs.sort(function(){return Math.random()-.5});
window._m4cards=pairs;
var g=document.getElementById('mg4');g.innerHTML='';
for(var i=0;i<pairs.length;i++){
g.innerHTML+='<div id="mc'+i+'" onclick="m4Tap('+i+')" style="width:85px;height:85px;border-radius:14px;background:linear-gradient(135deg,#ff8f00,#ff6d00);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">🔢</div>';
}
}
function m4Tap(i){
if(busy||m4flipped.length>=2)return;
var el=document.getElementById('mc'+i);
if(el.classList.contains('done')||m4flipped.indexOf(i)>=0)return;
el.innerHTML='<img src="'+window._m4cards[i].img+'" width="55" alt="'+window._m4cards[i].w+'">';
el.style.background='#fff';
m4flipped.push(i);
speak(window._m4cards[i].w);
if(m4flipped.length===2){
busy=true;var a=m4flipped[0],b=m4flipped[1];
if(window._m4cards[a].idx===window._m4cards[b].idx){
playOk();m4matched++;st[3]++;
document.getElementById('s4').innerHTML=stars(st[3],W.length);
document.getElementById('mc'+a).classList.add('done');
document.getElementById('mc'+b).classList.add('done');
m4flipped=[];busy=false;
if(m4matched>=W.length)setTimeout(function(){goM(1)},1000);
}else{
playNo();setTimeout(function(){
document.getElementById('mc'+a).innerHTML='🔢';
document.getElementById('mc'+a).style.background='linear-gradient(135deg,#ff8f00,#ff6d00)';
document.getElementById('mc'+b).innerHTML='🔢';
document.getElementById('mc'+b).style.background='linear-gradient(135deg,#ff8f00,#ff6d00)';
m4flipped=[];busy=false;
},1000);
}
}
}
function initM5(){document.getElementById('s5').innerHTML=stars(5,5)}
goM(0);
</script>
</body>
</html>
