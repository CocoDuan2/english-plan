<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 10 - Playground Fun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.bg-playground{background:linear-gradient(180deg,#FFE5B4,#98D8C8)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:100px;font-weight:900;letter-spacing:4px;margin:10px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:38px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:15px 0}
.obj-wrap img{width:180px;height:auto}
.hello-peppa{width:160px!important;margin:15px 0}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.sound-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:20px 0}
.sound-btn{width:110px;height:110px;border-radius:20px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:18px;font-weight:700;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,.15);transition:transform .2s}
.sound-btn:active{transform:scale(.92)}
.sound-btn img{width:60px;height:60px}
.card-game-container{display:flex;flex-direction:column;align-items:center;gap:25px;padding:20px}
.cards-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:900px}
.flip-card{width:150px;height:200px;perspective:1000px;cursor:pointer}
.flip-card-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}
.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.flip-card-front{background:linear-gradient(135deg,#fce4ec,#f8bbd0);border:4px solid #F9ADC7}
.flip-card-back{background:#fff;transform:rotateY(180deg)}
.flip-card-front img{width:80px;height:80px;margin-bottom:10px}
.flip-card-front .question{font-size:60px;color:#e91e8c}
.flip-card-back img{width:100px;height:100px}
.flip-card-back .action-label{font-size:24px;font-weight:800;color:#2c3e50;margin-top:10px}
.card-game-btn{padding:18px 50px;font-size:32px;font-weight:900;color:#fff;background:linear-gradient(135deg,#FF6B9D,#FFA07A);border:none;border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,157,.4);transition:all .2s;display:none}
.card-game-btn.show{display:block}
.card-game-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(255,107,157,.5)}
.card-game-btn:active{transform:translateY(0);box-shadow:0 4px 15px rgba(255,107,157,.4)}
.card-result{margin-top:20px;display:flex;align-items:center;gap:15px;opacity:0;transition:opacity .5s}
.card-result.show{opacity:1}
.card-result img{width:120px;height:auto}
.card-result .bbl{font-size:32px;padding:15px 25px}
.char-shake{animation:char-shake 1s ease-in-out infinite}
@keyframes char-shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-3px) rotate(-2deg)}
75%{transform:translateX(3px) rotate(2deg)}
}
.char-bounce{animation:char-bounce 1s ease-in-out infinite}
@keyframes char-bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}
.char-walk{animation:char-walk 1.5s ease-in-out infinite}
@keyframes char-walk{
0%,100%{transform:translateX(0)}
50%{transform:translateX(15px)}
}
.all-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:20px auto}
.all-item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:15px;background:#fff;border-radius:16px;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.all-item img{width:90px;height:90px}
.all-item .label{font-size:24px;font-weight:800;color:#2c3e50}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word{font-size:60px;letter-spacing:2px}
.sent{font-size:26px}
.bbl{font-size:20px;padding:8px 14px}
.obj-wrap img{width:140px}
.hello-peppa{width:120px!important}
.sound-btn{width:90px;height:90px;font-size:16px}
.sound-btn img{width:50px;height:50px}
.cards-row{gap:8px;max-width:320px}
.flip-card{width:100px;height:140px}
.flip-card-front img{width:50px;height:50px}
.flip-card-front .question{font-size:50px}
.flip-card-back img{width:60px;height:60px}
.flip-card-back .action-label{font-size:18px}
.card-game-btn{padding:14px 40px;font-size:26px}
.card-result img{width:90px}
.card-result .bbl{font-size:24px;padding:10px 18px}
.all-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.all-item img{width:70px;height:70px}
.all-item .label{font-size:20px}
}
@media(min-width:481px) and (max-width:767px){
.cards-row{gap:10px}
.flip-card{width:120px;height:160px}
.flip-card-front img{width:60px;height:60px}
.flip-card-back img{width:75px;height:75px}
.flip-card-back .action-label{font-size:20px}
}
@media(min-width:768px){
.word{font-size:120px}
.sent{font-size:42px}
}
</style>
</head>
<body>
<div class="deck">

<!-- S0: Title -->
<div class="sl bg-pink on">
<div class="ttl">🎪 Playground Fun 🎪</div>
<div class="sub">Let's play with Peppa!</div>
<div style="margin:20px 0">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px" alt="Peppa">
</div>
<div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:15px">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg" width="70" alt="run">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg" width="70" alt="jump">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg" width="70" alt="walk">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg" width="70" alt="sit">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg" width="70" alt="stand">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-sky">
<img src="../../../assets/peppa/daddy-pig-standing.png" class="hello-peppa" alt="Peppa">
<div class="ttl" style="font-size:52px">Let's go to the playground!</div>
</div>

<!-- S2: run -->
<div class="sl bg-playground">
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" class="char-shake" alt="Peppa">
<div class="bbl">I can run!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg" alt="run">
</div>
<div class="word">RUN</div>
</div>

<!-- S3: jump -->
<div class="sl bg-playground">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" class="char-bounce" alt="George">
<div class="bbl">I can jump!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg" alt="jump">
</div>
<div class="word">JUMP</div>
</div>

<!-- S4: walk -->
<div class="sl bg-playground">
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-walking.png" class="char-walk" alt="Daddy">
<div class="bbl">I can walk!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg" alt="walk">
</div>
<div class="word">WALK</div>
</div>

<!-- S5: sit -->
<div class="sl bg-playground">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">I can sit!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg" alt="sit">
</div>
<div class="word">SIT</div>
</div>

<!-- S6: stand -->
<div class="sl bg-playground">
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Peppa">
<div class="bbl">I can stand!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg" alt="stand">
</div>
<div class="word">STAND</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa">
<div class="bbl">Listen and say!</div>
</div>
<div class="sound-grid">
<button class="sound-btn" style="background:linear-gradient(135deg,#FF6B9D,#FFA07A)" onclick="speak('run')">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg" alt="run">
<span>run</span>
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#A8E6CF,#88D8B0)" onclick="speak('jump')">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg" alt="jump">
<span>jump</span>
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#FFD93D,#FFA500)" onclick="speak('walk')">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg" alt="walk">
<span>walk</span>
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#A8DADC,#457B9D)" onclick="speak('sit')">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg" alt="sit">
<span>sit</span>
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#E9C46A,#F4A261)" onclick="speak('stand')">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg" alt="stand">

</button>
</div>

<!-- S8: Card Flip Game -->
<div class="sl bg-playground">
<div class="pr">
<img src="../../../assets/peppa/peppa-fairy-princess.png" alt="Peppa">
<div class="bbl">Pick a card!</div>
</div>
<div class="card-game-container">
<div class="cards-row" id="cardsRow"></div>
<button class="card-game-btn" id="cardGameBtn" onclick="resetCardGame()">Play again!</button>
</div>
<div class="card-result" id="cardResult"></div>
</div>

<!-- S9: All Together -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px" alt="Family">
<div class="bbl">Let's review!</div>
</div>
<div class="all-grid">
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg" alt="run">
<div class="label">run</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg" alt="jump">
<div class="label">jump</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg" alt="walk">
<div class="label">walk</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg" alt="sit">
<div class="label">sit</div>
</div>
<div class="all-item">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg" alt="stand">
<div class="label">stand</div>
</div>
</div>
</div>

<!-- S10: Bye -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/george-superhero-costume.png" style="width:110px" alt="Peppa">
<div class="ttl">Great job! 🎉</div>
<div class="sub">Tomorrow: Let's learn about feelings!</div>
</div>

</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>

<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:'Title page: Playground Fun theme with 5 action emojis preview',
1:'Hello: Peppa invites to playground',
2:'New word: run - Peppa with shake animation says "I can run!" with running emoji (180px)',
3:'New word: jump - George with bounce animation says "I can jump!" with jumping emoji',
4:'New word: walk - Daddy Pig with walk animation says "I can walk!" with walking emoji',
5:'New word: sit - Mummy Pig says "I can sit!" with sitting emoji',
6:'New word: stand - Peppa says "I can stand!" with standing emoji',
7:'Listen & Say: 5 colorful buttons with action emojis, click to hear pronunciation',
8:'Card Flip Game: 5 cards face-down (150x200px, pink gradient with Peppa icon + ?). Click each card to flip one by one (3D rotateY animation, 0.6s). Each card shows action emoji + "I can ___!" and speaks word. One lucky star ⭐ shows confetti + "Wow! Lucky star!". Cards stay flipped after clicking. When all 5 cards are flipped, "Play again!" button appears to reset game. Random: 1 star + 4 actions (from 5 total).',
9:'All Together: Grid showing all 5 actions for teacher to point and ask',
10:'Bye: Celebration and preview of next lesson (feelings)'
};

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function playAction(action,elem){
elem.classList.add('animate-'+action);
speak('I can '+action);
setTimeout(function(){
elem.classList.remove('animate-'+action);
},1000);
}

// Card Flip Game
var cardActions=['run','jump','walk','sit','stand'];
var cardEmojis={
run:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg',
jump:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg',
walk:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg',
sit:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg',
stand:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg'
};
var cardCharacters={
run:'../../../assets/peppa/peppa-and-george-ooo.png',
jump:'../../../assets/peppa/george-standing.png',
walk:'../../../assets/peppa/daddy-pig-walking.png',
sit:'../../../assets/peppa/mummy-pig-standing-grass.png',
stand:'../../../assets/peppa/george_pig_dinosaur.png'
};
var cardGameBusy=false;
var currentCards=[];

function initCardGame(){
// Pick 1 random star position (0-4)
var starPos=Math.floor(Math.random()*5);

// Pick 4 random actions from 5 total
var shuffled=cardActions.slice().sort(function(){return Math.random()-.5});
var selectedActions=shuffled.slice(0,4);

// Build cards array
currentCards=[];
for(var i=0;i<5;i++){
if(i===starPos){
currentCards.push({type:'star',emoji:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u2b50.svg',label:'⭐'});
}else{
var action=selectedActions.shift();
currentCards.push({type:'action',action:action,emoji:cardEmojis[action],label:action});
}
}

// Render cards
var row=document.getElementById('cardsRow');
row.innerHTML='';
for(var i=0;i<5;i++){
var card=document.createElement('div');
card.className='flip-card';
card.dataset.index=i;
card.innerHTML='<div class="flip-card-inner">'+
'<div class="flip-card-front">'+
'<img src="../../../assets/peppa/george-playing-ball.png" alt="Peppa">'+
'<div class="question">?</div>'+
'</div>'+
'<div class="flip-card-back">'+
'<img src="'+currentCards[i].emoji+'" alt="'+currentCards[i].label+'">'+
'<div class="action-label">'+currentCards[i].label+'</div>'+
'</div>'+
'</div>';
card.onclick=function(){flipCard(this);};
row.appendChild(card);
}

// Hide button and result
document.getElementById('cardGameBtn').classList.remove('show');
document.getElementById('cardResult').classList.remove('show');
cardGameBusy=false;
}

function flipCard(cardElem){
if(cardGameBusy)return;
if(cardElem.classList.contains('flipped'))return;

cardGameBusy=true;
var idx=parseInt(cardElem.dataset.index);
var cardData=currentCards[idx];

// Flip the clicked card
cardElem.classList.add('flipped');

// Wait for flip animation
setTimeout(function(){
// Show result
showCardResult(cardData);

// Check if all cards are flipped
var allCards=document.querySelectorAll('.flip-card');
var allFlipped=true;
allCards.forEach(function(c){
if(!c.classList.contains('flipped')){
allFlipped=false;
}
});

// If all flipped, show "Play again" button
if(allFlipped){
document.getElementById('cardGameBtn').classList.add('show');
}

cardGameBusy=false;
},600);
}

function showCardResult(cardData){
var result=document.getElementById('cardResult');

if(cardData.type==='star'){
// Lucky star
showConfetti();
result.innerHTML='<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"><div class="bbl">Wow! Lucky star!</div>';
result.classList.add('show');
speak('Wow! Lucky star!');
}else{
// Action
var charImg=cardCharacters[cardData.action];
result.innerHTML='<img src="'+charImg+'" alt="character"><div class="bbl">I can '+cardData.action+'!</div>';
result.classList.add('show');
speak('I can '+cardData.action);
}
}

function resetCardGame(){
initCardGame();
}

function showConfetti(){
var colors=['#FF6B9D','#FFD93D','#A8E6CF','#A8DADC','#E9C46A','#FFD700'];
for(var i=0;i<20;i++){
var confetti=document.createElement('div');
confetti.style.position='fixed';
confetti.style.width='10px';
confetti.style.height='10px';
confetti.style.borderRadius='50%';
confetti.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
confetti.style.left=Math.random()*100+'%';
confetti.style.top='0';
confetti.style.zIndex='1000';
confetti.style.pointerEvents='none';
document.body.appendChild(confetti);

var fallDuration=2+Math.random()*2;
var fallDistance=window.innerHeight+50;
confetti.animate([
{transform:'translateY(0) rotate(0deg)',opacity:1},
{transform:'translateY('+fallDistance+'px) rotate(720deg)',opacity:0}
],{
duration:fallDuration*1000,
easing:'cubic-bezier(.25,.46,.45,.94)'
});

setTimeout(function(){
confetti.remove();
},fallDuration*1000);
}
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
}

function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}
