<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 10 Review - Playground Fun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#FFE5B4,#98D8C8);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#A8E6CF,#88D8B0);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(168,230,207,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(168,230,207,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.learn-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.learn-card{width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:all .3s;position:relative}
.learn-card.revealed{background:#fff}
.learn-card img{width:70px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-card .label{font-size:20px;font-weight:800;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .label{opacity:1}
.learn-card.revealed{background:#fff}
.action-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:20px 0;max-width:600px}
.action-btn{width:120px;height:120px;border-radius:20px;background:#fff;border:4px solid #A8E6CF;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 15px rgba(0,0,0,.12);transition:all .3s}
.action-btn:hover{transform:scale(1.05)}
.action-btn img{width:70px}
.action-btn .label{font-size:20px;font-weight:800;color:#2c3e50}
.listen-grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;margin:20px 0}
.listen-card{width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 12px rgba(0,0,0,.1);transition:all .3s;border:3px solid transparent}
.listen-card:hover{transform:scale(1.05)}
.listen-card.correct{border-color:#27ae60;animation:pulse-correct .5s}
.listen-card.wrong{border-color:#e74c3c;animation:shake .5s}
.listen-card img{width:60px}
.listen-card .label{font-size:18px;font-weight:700;color:#2c3e50}
@keyframes pulse-correct{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.replay-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#A8E6CF,#88D8B0);border:none;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(168,230,207,.4);margin:10px auto}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:440px;margin:20px auto}
.mem-card{width:100%;aspect-ratio:1;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.12)}
.mem-front{background:linear-gradient(135deg,#A8E6CF,#88D8B0)}
.mem-front .emoji{font-size:44px}
.mem-back{background:#fff;transform:rotateY(180deg);gap:4px}
.mem-back img{width:70px}
.mem-back .label{font-size:18px;font-weight:700;color:#2c3e50}
.start-wrap{text-align:center;margin:30px 0}
.start-wrap img{width:140px;margin:20px 0}
.start-btn{padding:18px 48px;border:none;border-radius:16px;font-size:24px;font-weight:900;background:linear-gradient(135deg,#A8E6CF,#88D8B0);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(168,230,207,.4);margin:20px 0}
.done-wrap{text-align:center;margin:30px 0}
.done-wrap img{width:120px;margin:20px 0}
.done-ttl{font-size:48px;font-weight:900;color:#27ae60;margin:15px 0}
.done-msg{font-size:22px;color:#555;margin:10px 0}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.learn-card{width:90px;height:90px}
.learn-card img{width:55px}
.learn-card .label{font-size:18px}
.card-icon{font-size:36px}
.action-btn{width:100px;height:100px}
.action-btn img{width:55px}
.action-btn .label{font-size:18px}
.listen-card{width:85px;height:85px}
.listen-card img{width:50px}
.listen-card .label{font-size:16px}
.mem-grid{grid-template-columns:repeat(3,1fr);width:320px;gap:10px}
.mem-back img{width:55px}
.mem-back .label{font-size:16px}
.start-wrap img{width:110px}
.start-btn{padding:14px 36px;font-size:20px}
.done-wrap img{width:100px}
.done-ttl{font-size:36px}
.done-msg{font-size:18px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="start-wrap">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="te">Playground Fun!</div>
<div class="tz">和佩琪一起玩游戏吧</div>
<div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg" width="60" alt="run">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg" width="60" alt="jump">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg" width="60" alt="walk">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg" width="60" alt="sit">
<img src="https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg" width="60" alt="stand">
</div>
<button class="start-btn" onclick="goM(1)">Let's Play!</button>
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，学新词</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png" alt="Peppa">
<div class="bbl">Tap to reveal!</div>
</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Action Challenge -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Action Challenge</div>
<div class="tz">点一点，做动作</div>
<div class="sb" id="s2"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Click and do the action!</div>
</div>
<div class="action-grid" id="ag"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，找一找</div>
<div class="sb" id="s3"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
<div class="bbl">Listen and find!</div>
</div>
<button class="replay-btn" onclick="playCurrentWord()">🔊</button>
<div class="listen-grid" id="lig"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一样的</div>
<div class="sb" id="s4"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find the pairs!</div>
</div>
<div class="mem-grid" id="mg"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="done-ttl">All Done! 🎉</div>
<div class="done-msg">You learned 5 actions!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="start-btn" onclick="goM(0)">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{w:'run',img:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f3c3.svg'},
{w:'jump',img:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f938.svg'},
{w:'walk',img:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f6b6.svg'},
{w:'sit',img:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9d8.svg'},
{w:'stand',img:'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/emoji_u1f9cd.svg'}
];
var curM=0,busy=false;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn
var m1Revealed=0;
function initM1(){
var lg=document.getElementById('lg');
lg.innerHTML='';
m1Revealed=0;
W.forEach(function(item){
var card=document.createElement('div');
card.className='learn-card';
card.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="label">'+item.w+'</div>';
card.onclick=function(){
if(card.classList.contains('revealed'))return;
card.classList.add('revealed');
speak(item.w);
m1Revealed++;
document.getElementById('s1').innerHTML=stars(m1Revealed,5);
if(m1Revealed===5){
setTimeout(function(){
var peppa=document.querySelector('#m1 .pr img');
peppa.classList.add('peppa-jumping');
setTimeout(function(){peppa.classList.remove('peppa-jumping')},600);
},300);
}
};
lg.appendChild(card);
});
}

// M2: Action Challenge
var m2Done=0;
function initM2(){
var ag=document.getElementById('ag');
ag.innerHTML='';
m2Done=0;
W.forEach(function(item){
var btn=document.createElement('div');
btn.className='action-btn';
btn.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="label">'+item.w+'</div>';
btn.onclick=function(){
if(busy)return;
busy=true;
speak(item.w);
playOk();
m2Done++;
document.getElementById('s2').innerHTML=stars(m2Done,5);
setTimeout(function(){
busy=false;
if(m2Done===5){
var george=document.querySelector('#m2 .pr img');
george.classList.add('peppa-jumping');
setTimeout(function(){george.classList.remove('peppa-jumping')},600);
}
},1200);
};
ag.appendChild(btn);
});
}

// M3: Listen & Find
var m3Queue=[],m3Current='',m3Done=0;
function initM3(){
m3Queue=W.map(function(x){return x.w}).sort(function(){return Math.random()-.5});
m3Current='';
m3Done=0;
var lig=document.getElementById('lig');
lig.innerHTML='';
W.forEach(function(item){
var card=document.createElement('div');
card.className='listen-card';
card.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="label">'+item.w+'</div>';
card.onclick=function(){
if(busy||!m3Current)return;
busy=true;
if(item.w===m3Current){
card.classList.add('correct');
playOk();
speak(item.w);
m3Done++;
document.getElementById('s3').innerHTML=stars(m3Done,5);
setTimeout(function(){
card.classList.remove('correct');
busy=false;
if(m3Done===5){
var peppa=document.querySelector('#m3 .pr img');
peppa.classList.add('peppa-jumping');
setTimeout(function(){peppa.classList.remove('peppa-jumping')},600);
}else{
nextM3();
}
},1200);
}else{
card.classList.add('wrong');
playNo();
setTimeout(function(){
card.classList.remove('wrong');
busy=false;
},800);
}
};
lig.appendChild(card);
});
nextM3();
}
function nextM3(){
if(m3Queue.length===0)return;
m3Current=m3Queue.shift();
speak(m3Current);
}
function playCurrentWord(){
if(m3Current)speak(m3Current);
}

// M4: Memory Match
var m4Flipped=[],m4Matched=0;
function initM4(){
m4Flipped=[];
m4Matched=0;
var pairs=[];
W.forEach(function(item){
pairs.push({type:'word',data:item.w,img:item.img});
pairs.push({type:'word',data:item.w,img:item.img});
});
pairs.sort(function(){return Math.random()-.5});
var mg=document.getElementById('mg');
mg.innerHTML='';
pairs.forEach(function(item,idx){
var card=document.createElement('div');
card.className='mem-card';
card.dataset.idx=idx;
card.dataset.word=item.data;
card.innerHTML='<div class="mem-face mem-front"><div class="emoji">❓</div></div><div class="mem-face mem-back"><img src="'+item.img+'" alt="'+item.data+'"><div class="label">'+item.data+'</div></div>';
card.onclick=function(){
if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
card.classList.add('flipped');
m4Flipped.push(card);
if(m4Flipped.length===2){
busy=true;
setTimeout(function(){
var c1=m4Flipped[0],c2=m4Flipped[1];
if(c1.dataset.word===c2.dataset.word){
c1.classList.add('matched');
c2.classList.add('matched');
playOk();
m4Matched++;
document.getElementById('s4').innerHTML=stars(m4Matched,5);
if(m4Matched===5){
setTimeout(function(){
var candy=document.querySelector('#m4 .pr img');
candy.classList.add('peppa-jumping');
setTimeout(function(){
candy.classList.remove('peppa-jumping');
goM(1);
},600);
},500);
}
}else{
playNo();
setTimeout(function(){
c1.classList.remove('flipped');
c2.classList.remove('flipped');
},600);
}
m4Flipped=[];
busy=false;
},800);
}
};
mg.appendChild(card);
});
}

function initM5(){
// Done page, no init needed
}

goM(0);
</script>
</body>
</html>
