<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 7 Review - Toy Box Fun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fff8e1,#ffecb3);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e65100;margin:8px 0;text-shadow:0 2px 4px rgba(230,81,0,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff7043,#ff5722);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,112,67,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,112,67,.2);border-radius:2px;filter:blur(3px)}
.tz-row{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.sb{font-size:24px;font-weight:700;color:#bf360c;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.pr.big img{width:110px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.card{width:110px;height:110px;background:#ddd;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;overflow:hidden}
.card .card-inner{opacity:0;transform:translateY(40px) scale(.5);transition:all .5s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:4px}
.card.revealed{background:#fff}.card.revealed .card-icon{display:none}
.card.revealed .card-inner{opacity:1;transform:translateY(0) scale(1)}
.card .card-icon{font-size:44px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.card img,.card svg{width:90px;height:90px}
.card .card-label{font-size:16px;font-weight:700;color:#2c3e50}
.toybox{width:300px;min-height:120px;background:linear-gradient(180deg,#8d6e63,#6d4c41);border-radius:0 0 20px 20px;border:6px solid #5d4037;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;padding:16px;margin:12px 0;position:relative}
.toybox::before{content:'Toy Box';position:absolute;top:-36px;left:50%;transform:translateX(-50%);background:#5d4037;color:#fff;padding:6px 20px;border-radius:10px 10px 0 0;font-size:16px;font-weight:700;white-space:nowrap}
.toybox-slot{width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:12px;border:2px dashed rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;transition:all .3s}
.toybox-slot.filled{border-style:solid;background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.6)}
.toybox-slot img,.toybox-slot svg{width:45px;height:45px}
.toy-pick{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:0}
.toy-btn{width:90px;height:90px;background:#fff;border-radius:16px;border:3px solid #ff7043;box-shadow:0 4px 10px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.toy-btn:active{transform:scale(.92)}
.toy-btn.used{opacity:.3;pointer-events:none}
.toy-btn img,.toy-btn svg{width:60px;height:60px}
.toy-prompt{font-size:36px;font-weight:900;color:#e65100;margin:12px 0;padding:10px 24px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.speaker-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ff7043,#e64a19);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(255,112,67,.4);margin:12px 0}
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.listen-card{width:100px;height:100px;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img,.listen-card svg{width:80px;height:80px}
.listen-card-label{font-size:18px;font-weight:700;color:#2c3e50;margin-top:8px}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:90%;max-width:560px}
.mem-card{aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;transform-style:preserve-3d;position:relative}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{opacity:.6;pointer-events:none;transform:rotateY(180deg)}
.mem-front,.mem-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px}
.mem-front{background:linear-gradient(135deg,#ff7043,#e64a19);font-size:44px}
.mem-back{transform:rotateY(180deg);background:#fff;flex-direction:column;gap:4px}
.mem-back img,.mem-back svg{width:70px;height:70px}
.mem-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #ff7043;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#ff7043;color:#fff;box-shadow:0 4px 12px rgba(255,112,67,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){.pr{gap:6px!important}
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.pr.big img{width:90px}.tz-row{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.sb{font-size:22px}
.card img,.card svg{width:70px;height:70px}.card .card-label{font-size:14px}
.toybox{width:260px;min-height:100px;padding:12px}
.toybox-slot{width:50px;height:50px}.toybox-slot img,.toybox-slot svg{width:35px;height:35px}
.toy-btn{width:75px;height:75px}.toy-btn img,.toy-btn svg{width:48px;height:48px}
.toy-prompt{font-size:28px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.listen-card img,.listen-card svg{width:60px;height:60px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.mem-back img,.mem-back svg{width:55px;height:55px}.mem-back-label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="pr big"><img src="../../../assets/peppa/george_pig_dinosaur.png" alt="George"></div>
<div class="te">Toy Box Fun</div>
<div class="sb">Let's play!</div>
<div style="display:flex;gap:16px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg" width="50" alt="ball">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f697.svg" width="50" alt="car">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" width="50" alt="bear">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f1.svg" width="50" alt="block">
</div>
</div>
<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，看看是什么玩具！</div>
<div class="sb" id="s1"><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span></div>
</div>
<div class="pr"><img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"><div class="bbl">Tap to see!</div></div>
<div class="card-grid" id="cg1"></div>
</div>
<!-- M2: Toy Box Sort -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Toy Box Sort</div>
<div class="tz">听一听，把玩具放进箱子！</div>
<div class="sb" id="s2"><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span></div>
</div>
<div class="pr"><img src="../../../assets/peppa/george-standing.png" alt="George"><div class="bbl">Put it in!</div><div onclick="playM2Round()" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#a8e6cf,#88d8b0);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-left:8px">🔊</div></div>
<div class="toy-prompt" id="m2prompt"></div>
<div class="toy-pick" id="m2pick"></div>
<div class="toybox" id="m2box"></div>
</div>
<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，点一点！</div>
<div class="sb" id="s3"><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span></div>
</div>
<div class="pr"><img src="../../../assets/peppa/daddy-pig-standing.png" alt="Daddy"><div class="bbl">Listen carefully!</div><div onclick="playM3Round()" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#a8e6cf,#88d8b0);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-left:8px">🔊</div></div>
<div class="listen-grid" id="lg3"></div>
</div>
<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一对！</div>
<div class="sb" id="s4"><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span></div>
</div>
<div class="pr"><img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy"><div class="bbl">Find pairs!</div></div>
<div class="memory-grid" id="mg4"></div>
</div>
<!-- M5: Done -->
<div id="m5" class="mod">
<div class="pr big"><img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb">All toys are in the box! 🎉</div>
<div class="sb" id="s5"><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span><span style="color:#bbb">★</span></div>
<button class="nb" onclick="location.reload()" style="margin-top:20px;font-size:20px;padding:16px 40px">Play Again</button>
</div>
<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../../assets/peppa/';
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/';
var DOLL_SVG='<svg viewBox="0 0 160 160"><ellipse cx="80" cy="45" rx="32" ry="28" fill="#8B4513"/><circle cx="80" cy="55" r="28" fill="#FFD4A3"/><circle cx="72" cy="50" r="3" fill="#333"/><circle cx="88" cy="50" r="3" fill="#333"/><ellipse cx="68" cy="58" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/><ellipse cx="92" cy="58" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/><path d="M72 62 Q80 68 88 62" stroke="#333" stroke-width="2" fill="none"/><path d="M80 80 L60 85 L55 130 L105 130 L100 85 Z" fill="#FF69B4"/><circle cx="80" cy="82" r="3" fill="#FFD700"/><circle cx="80" cy="92" r="3" fill="#FFD700"/><circle cx="80" cy="102" r="3" fill="#FFD700"/><ellipse cx="58" cy="95" rx="6" ry="18" fill="#FFD4A3"/><ellipse cx="102" cy="95" rx="6" ry="18" fill="#FFD4A3"/><rect x="68" y="128" width="10" height="25" rx="5" fill="#FFD4A3"/><rect x="82" y="128" width="10" height="25" rx="5" fill="#FFD4A3"/><ellipse cx="73" cy="152" rx="8" ry="4" fill="#FF1493"/><ellipse cx="87" cy="152" rx="8" ry="4" fill="#FF1493"/></svg>';
var W=[
{w:'ball',img:TW+'26bd.svg',isSvg:false},
{w:'car',img:TW+'1f697.svg',isSvg:false},
{w:'doll',img:'',isSvg:true},
{w:'bear',img:TW+'1f9f8.svg',isSvg:false},
{w:'block',img:TW+'1f9f1.svg',isSvg:false}
];
var curM=0,busy=false,st=[0,0,0,0,0];
function itemHTML(item,cls){
if(item.isSvg)return DOLL_SVG;
return '<img src="'+item.img+'" alt="'+item.w+'"'+(cls?' class="'+cls+'"':'')+'>';
}
function speak(t){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');
a.play().catch(function(){new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web').play().catch(function(){})});
}
function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%5];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){
curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}
// M1: Learn - bounce in
var m1rev=[];
function initM1(){
if(m1rev.length>0)return;
var g=document.getElementById('cg1');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='card';
c.innerHTML='<div class="card-icon">🎁</div><div class="card-inner">'+itemHTML(item)+'<div class="card-label">'+item.w+'</div></div>';
c.onclick=function(){
if(c.classList.contains('revealed')){speak(item.w);return}
c.classList.add('revealed');playOk();speak(item.w);m1rev.push(i);
st[0]=m1rev.length;document.getElementById('s1').innerHTML=stars(st[0],W.length)
};
g.appendChild(c);
});
}
// M2: Toy Box Sort
var m2round=0,m2order=[];
function initM2(){
if(m2order.length>0)return;
m2order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var pk=document.getElementById('m2pick');pk.innerHTML='';
W.forEach(function(item,i){
var b=document.createElement('div');b.className='toy-btn';b.dataset.idx=i;
b.innerHTML=itemHTML(item);
b.onclick=function(){checkM2(i,b)};
pk.appendChild(b);
});
var bx=document.getElementById('m2box');bx.innerHTML='';
for(var i=0;i<W.length;i++){
var s=document.createElement('div');s.className='toybox-slot';s.id='m2s'+i;
s.innerHTML='<span style="font-size:20px;color:rgba(255,255,255,.5)">?</span>';
bx.appendChild(s);
}
playM2Round();
}
function playM2Round(){
if(m2round>=W.length)return;
var idx=m2order[m2round];
document.getElementById('m2prompt').textContent=W[idx].w;
speak(W[idx].w);
}
function checkM2(idx,btn){
if(busy||m2round>=W.length)return;
var correct=m2order[m2round];
if(idx===correct){
busy=true;playOk();btn.classList.add('used');
var slot=document.getElementById('m2s'+m2round);
slot.classList.add('filled');slot.innerHTML=itemHTML(W[idx]);
st[1]++;document.getElementById('s2').innerHTML=stars(st[1],W.length);
m2round++;
setTimeout(function(){if(m2round<W.length)playM2Round();busy=false},1200);
}else{playNo()}
}
// M3: Listen & Find
var m3round=0,m3order=[];
function initM3(){
if(m3order.length>0)return;
m3order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('lg3');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');c.className='listen-card';
c.innerHTML=itemHTML(item)+'<div class="listen-card-label">'+item.w+'</div>';
c.onclick=function(){checkM3(i)};
g.appendChild(c);
});
playM3Round();
}
function playM3Round(){if(m3round>=W.length)return;speak(W[m3order[m3round]].w)}
function checkM3(idx){
if(busy||m3round>=W.length)return;
if(idx===m3order[m3round]){
busy=true;playOk();st[2]++;document.getElementById('s3').innerHTML=stars(st[2],W.length);
m3round++;
setTimeout(function(){if(m3round<W.length)playM3Round();busy=false},1200);
}else{playNo()}
}
// M4: Memory Match
var m4flipped=[],m4matched=0;
function initM4(){
if(m4matched>0)return;
m4matched=0;m4flipped=[];busy=false;
var pairs=[];
W.forEach(function(item,i){pairs.push({idx:i,w:item.w,img:item.img});pairs.push({idx:i,w:item.w,img:item.img})});
pairs.sort(function(){return Math.random()-.5});
window._m4cards=pairs;
var g=document.getElementById('mg4');g.innerHTML='';
for(var i=0;i<pairs.length;i++){
g.innerHTML+='<div id="mc'+i+'" onclick="m4Tap('+i+')" style="width:85px;height:85px;border-radius:14px;background:linear-gradient(135deg,#ff7043,#e64a19);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">🎲</div>';
}
}
function m4Tap(i){
if(busy||m4flipped.length>=2)return;
var el=document.getElementById('mc'+i);
if(el.classList.contains('done')||m4flipped.indexOf(i)>=0)return;
el.innerHTML='<img src="'+window._m4cards[i].img+'" width="55" alt="'+window._m4cards[i].w+'">';
el.style.background='#fff';
m4flipped.push(i);
speak(window._m4cards[i].w);
if(m4flipped.length===2){
busy=true;var a=m4flipped[0],b=m4flipped[1];
if(window._m4cards[a].idx===window._m4cards[b].idx){
playOk();m4matched++;st[3]++;
document.getElementById('s4').innerHTML=stars(st[3],W.length);
document.getElementById('mc'+a).classList.add('done');
document.getElementById('mc'+b).classList.add('done');
m4flipped=[];busy=false;
if(m4matched>=W.length)setTimeout(function(){goM(1)},1000);
}else{
playNo();setTimeout(function(){
document.getElementById('mc'+a).innerHTML='🎲';
document.getElementById('mc'+a).style.background='linear-gradient(135deg,#ff7043,#e64a19)';
document.getElementById('mc'+b).innerHTML='🎲';
document.getElementById('mc'+b).style.background='linear-gradient(135deg,#ff7043,#e64a19)';
m4flipped=[];busy=false;
},1000);
}
}
}
