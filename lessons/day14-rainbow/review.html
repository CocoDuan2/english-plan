<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 14 Review - Rainbow Colors</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#f3e5f5,#e1bee7);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#7b1fa2;margin:8px 0;text-shadow:0 2px 4px rgba(123,31,162,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ce93d8,#ab47bc);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(171,71,188,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(171,71,188,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.pr.big img{width:110px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#7b1fa2;box-shadow:0 2px 8px rgba(0,0,0,.08)}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="pr big"><img src="../../assets/peppa/peppa-fairy-princess.png" alt="Peppa"></div>
<div class="te">Rainbow Colors</div>
<div class="sb">Let's paint a rainbow!</div>
<svg width="220" height="70" viewBox="0 0 220 70" style="margin:16px 0">
<path d="M10 70 A100 100 0 0 1 210 70" fill="none" stroke="#e91e63" stroke-width="8"/>
<path d="M20 70 A90 90 0 0 1 200 70" fill="none" stroke="#9c27b0" stroke-width="8"/>
<path d="M30 70 A80 80 0 0 1 190 70" fill="none" stroke="#eee" stroke-width="8"/>
<path d="M40 70 A70 70 0 0 1 180 70" fill="none" stroke="#555" stroke-width="8"/>
<path d="M50 70 A60 60 0 0 1 170 70" fill="none" stroke="#795548" stroke-width="8"/>
</svg>
</div>
<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Colors</div>
<div class="tz">🌈 点一点，发现新颜色！</div>
<div class="sb" id="s1"></div>
</div>
<div class="pr"><img src="../../assets/peppa/peppa_pig_arms_open.png" alt="Peppa"><div class="bbl">Tap to see!</div></div>
<div id="cg1" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px"></div>
</div>
<!-- M2: Rainbow Paint -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Rainbow Paint</div>
<div class="tz">🎨 听颜色，点对的颜料！</div>
<div class="sb" id="s2"></div>
</div>
<div class="pr"><img src="../../assets/peppa/george-standing.png" alt="George"><div class="bbl">Paint it!</div></div>
<div id="paintPrompt" style="font-size:28px;font-weight:900;color:#7b1fa2;margin:10px 0;padding:12px 24px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-height:56px;display:flex;align-items:center;justify-content:center"></div>
<div id="paintGrid" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin:16px 0"></div>
<svg id="rainbowCanvas" width="280" height="80" viewBox="0 0 280 80" style="margin-top:10px">
<path id="rb0" d="M10 80 A130 130 0 0 1 270 80" fill="none" stroke="#ddd" stroke-width="10"/>
<path id="rb1" d="M22 80 A118 118 0 0 1 258 80" fill="none" stroke="#ddd" stroke-width="10"/>
<path id="rb2" d="M34 80 A106 106 0 0 1 246 80" fill="none" stroke="#ddd" stroke-width="10"/>
<path id="rb3" d="M46 80 A94 94 0 0 1 234 80" fill="none" stroke="#ddd" stroke-width="10"/>
<path id="rb4" d="M58 80 A82 82 0 0 1 222 80" fill="none" stroke="#ddd" stroke-width="10"/>
</svg>
</div>
<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找颜色！</div>
<div class="sb" id="s3"></div>
</div>
<div class="pr"><img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy"><div class="bbl">Listen!</div><div onclick="playM3Round()" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#ce93d8,#9c27b0);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-left:8px">🔊</div></div>
<div id="lg3" style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center"></div>
</div>
<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一对！</div>
<div class="sb" id="s4"></div>
</div>
<div class="pr"><img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy"><div class="bbl">Find pairs!</div></div>
<div id="mg4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:90%;max-width:560px"></div>
</div>
<!-- M5: Done -->
<div id="m5" class="mod">
<div class="pr big"><img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb">Pink, purple, white, black, brown! 🌈</div>
<div class="sb" id="s5"></div>
<button onclick="location.reload()" style="margin-top:20px;font-size:20px;padding:16px 40px;border:none;border-radius:12px;background:#9c27b0;color:#fff;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(156,39,176,.4)">Play Again</button>
</div>
<div style="position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #ce93d8;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100">
<button id="pBtn" onclick="goM(-1)" disabled style="padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#9c27b0;color:#fff;box-shadow:0 4px 12px rgba(156,39,176,.4)">◀ Back</button>
<div id="pg" style="font-size:13px;color:#999">1/6</div>
<button id="nBtn" onclick="goM(1)" style="padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#9c27b0;color:#fff;box-shadow:0 4px 12px rgba(156,39,176,.4)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var W=[
{w:'pink',hex:'#e91e63'},{w:'purple',hex:'#9c27b0'},{w:'white',hex:'#ffffff'},
{w:'black',hex:'#333333'},{w:'brown',hex:'#795548'}
];
var curM=0,busy=false,st=[0,0,0,0,0];
function cc(item){return item.hex==='#ffffff'?'#888':item.hex}
function speak(t){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');
a.play().catch(function(){new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web').play().catch(function(){})});
}
function getAC(){if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();return window.actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999";var colors=["#e91e63","#9c27b0","#fff","#555","#795548"];for(var i=0;i<20;i++){var p=document.createElement("div");p.style.cssText="position:absolute;width:"+(6+Math.random()*8)+"px;height:"+(6+Math.random()*8)+"px;border-radius:50%;left:"+Math.random()*100+"%;top:"+Math.random()*30+"%;background:"+colors[i%5]+";animation:cfall 1.2s ease-out "+Math.random()*.3+"s forwards;opacity:0";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';return s}
function goM(d){
curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}
// M1: Learn - fade-in reveal
var m1rev=[];
function initM1(){
if(m1rev.length>0)return;
document.getElementById('s1').innerHTML=stars(0,W.length);
var g=document.getElementById('cg1');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.style.cssText='width:110px;height:120px;background:#ce93d8;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .5s;overflow:hidden';
c.innerHTML='<div style="font-size:44px">❓</div><div style="opacity:0;transform:scale(.3);transition:all .6s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:60px;height:60px;border-radius:50%;background:'+item.hex+(item.w==='white'?';border:2px solid #bbb':'')+'"></div><div style="font-size:20px;font-weight:700;color:#2c3e50">'+item.w+'</div></div>';
c.onclick=function(){
if(c.dataset.rev){speak(item.w);return}
c.dataset.rev='1';c.style.background='#fff';
c.children[0].style.display='none';
c.children[1].style.opacity='1';c.children[1].style.transform='scale(1)';
speak(item.w);m1rev.push(i);st[0]=m1rev.length;
document.getElementById('s1').innerHTML=stars(st[0],W.length);
};
g.appendChild(c);
});
}
// M2: Rainbow Paint
var m2round=0,m2order=[];
function initM2(){
if(m2order.length>0)return;
document.getElementById('s2').innerHTML=stars(0,W.length);
m2order=[0,1,2,3,4];// paint in order top to bottom
var g=document.getElementById('paintGrid');g.innerHTML='';
W.forEach(function(item,i){
var b=document.createElement('div');
b.style.cssText='width:80px;height:80px;border-radius:50%;background:'+item.hex+(item.w==='white'?';border:3px solid #bbb':'')+';box-shadow:0 4px 12px rgba(0,0,0,.15);cursor:pointer;transition:all .2s';
b.onclick=function(){checkM2(i)};
g.appendChild(b);
});
startM2Round();
}
function startM2Round(){
if(m2round>=W.length)return;
var item=W[m2order[m2round]];
document.getElementById('paintPrompt').innerHTML='<span style="color:'+cc(item)+'">'+item.w+'</span>';
speak(item.w);
}
function checkM2(idx){
if(busy||m2round>=W.length)return;
if(idx===m2order[m2round]){
busy=true;playOk();
document.getElementById('rb'+m2round).setAttribute('stroke',W[idx].hex==='#ffffff'?'#eee':W[idx].hex);
st[1]++;document.getElementById('s2').innerHTML=stars(st[1],W.length);
m2round++;
setTimeout(function(){
busy=false;
if(m2round<W.length)startM2Round();
else document.getElementById('paintPrompt').innerHTML='<span style="font-size:36px">🌈</span> Beautiful rainbow!';
},1200);
}else{playNo()}
}
// M3: Listen & Find
var m3round=0,m3order=[];
function initM3(){
if(m3order.length>0)return;
document.getElementById('s3').innerHTML=stars(0,W.length);
m3order=W.map(function(_,i){return i}).sort(function(){return Math.random()-.5});
var g=document.getElementById('lg3');g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.style.cssText='width:100px;height:100px;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s';
c.innerHTML='<div style="width:50px;height:50px;border-radius:50%;background:'+item.hex+(item.w==='white'?';border:2px solid #bbb':'')+'"></div><div style="font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px">'+item.w+'</div>';
c.onclick=function(){checkM3(i)};
g.appendChild(c);
});
playM3Round();
}
function playM3Round(){if(m3round>=W.length)return;speak(W[m3order[m3round]].w)}
function checkM3(idx){
if(busy||m3round>=W.length)return;
if(idx===m3order[m3round]){
busy=true;playOk();st[2]++;document.getElementById('s3').innerHTML=stars(st[2],W.length);
m3round++;
setTimeout(function(){if(m3round<W.length)playM3Round();busy=false},1200);
}else{playNo()}
}
// M4: Memory Match
var m4flipped=[],m4matched=0;
function initM4(){
if(document.getElementById('mg4').children.length>0)return;
document.getElementById('s4').innerHTML=stars(0,W.length);
var g=document.getElementById('mg4');g.innerHTML='';
var pairs=[];
W.forEach(function(item){pairs.push({w:item.w,hex:item.hex});pairs.push({w:item.w,hex:item.hex})});
pairs.sort(function(){return Math.random()-.5});
pairs.forEach(function(item,i){
var c=document.createElement('div');
c.style.cssText='aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;transform-style:preserve-3d;position:relative';
c.dataset.word=item.w;c.dataset.idx=i;
c.innerHTML='<div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px;background:linear-gradient(135deg,#ce93d8,#9c27b0);font-size:44px">🌈</div><div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px;transform:rotateY(180deg);background:#fff;flex-direction:column;gap:4px"><div style="width:44px;height:44px;border-radius:50%;background:'+item.hex+(item.w==='white'?';border:2px solid #bbb':'')+'"></div><div style="font-size:18px;font-weight:700;color:#2c3e50">'+item.w+'</div></div>';
c.onclick=function(){flipCard(c)};
g.appendChild(c);
});
}
function flipCard(card){
if(busy||card.dataset.flipped||card.dataset.matched)return;
card.style.transform='rotateY(180deg)';card.dataset.flipped='1';speak(card.dataset.word);m4flipped.push(card);
if(m4flipped.length===2){
busy=true;var c1=m4flipped[0],c2=m4flipped[1];
if(c1.dataset.word===c2.dataset.word&&c1.dataset.idx!==c2.dataset.idx){
playOk();c1.dataset.matched='1';c2.dataset.matched='1';c1.style.opacity='.6';c2.style.opacity='.6';
m4matched++;st[3]++;document.getElementById('s4').innerHTML=stars(st[3],W.length);
m4flipped=[];busy=false;
if(m4matched===W.length)setTimeout(function(){goM(1)},1000);
}else{
playNo();setTimeout(function(){c1.style.transform='';c2.style.transform='';delete c1.dataset.flipped;delete c2.dataset.flipped;m4flipped=[];busy=false},1000);
}
}
}
function initM5(){document.getElementById('s5').innerHTML=stars(5,5)}
goM(0);
</script>
<style>
@keyframes cfall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@media(max-width:480px){
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.pr.big img{width:90px}.sb{font-size:22px}
}
</style>
</body>
</html>
