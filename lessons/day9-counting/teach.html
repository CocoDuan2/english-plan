<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 9 - Counting Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-count{background:linear-gradient(160deg,#fff3e0,#ffe0b2)}
.bg-play{background:linear-gradient(180deg,#e3f2fd,#bbdefb)}
.bg-word{background:linear-gradient(180deg,#fce4ec,#f8bbd0)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.pr.big img{width:110px}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.dots{display:flex;gap:12px;justify-content:center;margin:10px 0}
.dot{width:40px;height:40px;border-radius:50%;display:inline-block}
/* S7: Counting Fingers */
.finger-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:600px;margin:16px 0}
.finger-btn{width:110px;height:110px;border-radius:20px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .1s;background:#fff}
.finger-btn:active{transform:scale(.9)}
.finger-btn .flabel{font-size:18px;font-weight:700;color:#2c3e50}
/* S8: Number Hunt */
.hunt-scene{position:relative;width:340px;height:280px;background:linear-gradient(180deg,#87CEEB 60%,#8BC34A);border-radius:20px;overflow:hidden;margin:16px 0}
.hunt-item{position:absolute;width:80px;height:80px;border-radius:16px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.hunt-item:active{transform:scale(.9)}
.hunt-item .hlabel{font-size:14px;font-weight:700;color:#2c3e50}
.hunt-item.found{background:#ffd54f;border:3px solid #ff8f00}
/* S9: All Together */
.all-grid{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;max-width:700px;margin:20px 0}
.all-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.all-label{font-size:24px;font-weight:700;color:#2c3e50}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#ff8f00;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(255,143,0,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#ff8f00;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.ttl{font-size:30px}.sub{font-size:16px}.word{font-size:56px;letter-spacing:2px}
.bbl{font-size:20px;padding:8px 14px}.pr img{width:65px}.pr.big img{width:90px}
.finger-btn{width:80px;height:80px}.finger-btn .flabel{font-size:14px}
.hunt-scene{width:280px;height:230px}.hunt-item{width:65px;height:65px}
.all-label{font-size:18px}.dot{width:30px;height:30px}
}
@media(min-width:768px){.word{font-size:100px}}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Title -->
<div class="sl bg-count on">
<div class="pr big"><img src="../../assets/peppa/george-standing.png" alt="George"></div>
<div class="ttl">Counting Game</div>
<div class="sub">Let's count with Peppa!</div>
<div style="display:flex;gap:14px;align-items:center;margin-top:20px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/261d.svg" width="50" alt="1">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/270c.svg" width="50" alt="2">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" width="50" alt="apple">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" width="50" alt="banana">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="50" alt="star">
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-play">
<div class="pr big"><img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"></div>
<div class="ttl" style="font-size:48px">Let's count together!</div>
</div>

<!-- S2: one -->
<div class="sl bg-word">
<div class="pr">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">I have one!</div>
</div>
<div class="obj-wrap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg" width="160" alt="apple">
</div>
<div class="word" style="color:#e53935">one</div>
</div>

<!-- S3: two -->
<div class="sl bg-word">
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">I have two!</div>
</div>
<div class="obj-wrap" style="display:flex;gap:16px;justify-content:center">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" width="120" alt="banana">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34c.svg" width="120" alt="banana">
</div>
<div class="word" style="color:#f9a825">two</div>
</div>

<!-- S4: three -->
<div class="sl bg-word">
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy Pig">
<div class="bbl">I have three!</div>
</div>
<div class="obj-wrap" style="display:flex;gap:14px;justify-content:center">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="100" alt="star">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="100" alt="star">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" width="100" alt="star">
</div>
<div class="word" style="color:#ff8f00">three</div>
</div>

<!-- S5: four -->
<div class="sl bg-word">
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy Pig">
<div class="bbl">I have four!</div>
</div>
<div class="obj-wrap" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:300px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" width="100" alt="flower">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" width="100" alt="flower">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" width="100" alt="flower">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg" width="100" alt="flower">
</div>
<div class="word" style="color:#ec407a">four</div>
</div>

<!-- S6: five -->
<div class="sl bg-word">
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat">
<div class="bbl">I have five!</div>
</div>
<div class="obj-wrap" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:340px">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="80" alt="dog">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f431.svg" width="80" alt="cat">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41f.svg" width="80" alt="fish">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f426.svg" width="80" alt="bird">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f986.svg" width="80" alt="duck">
</div>
<div class="word" style="color:#43a047">five</div>
</div>

<!-- S7: Counting Fingers -->
<div class="sl bg-count">
<div class="ttl">Counting Fingers</div>
<div class="pr">
<img src="../../assets/peppa/peppa-and-george-ooo.png" alt="Peppa & George">
<div class="bbl">How many?</div>
</div>
<div class="finger-grid" id="fingerGrid"></div>
</div>

<!-- S8: Number Hunt -->
<div class="sl bg-play">
<div class="ttl">Number Hunt!</div>
<div class="pr">
<img src="../../assets/peppa/george_pig_dinosaur.png" alt="George">
<div class="bbl">Find the numbers!</div>
</div>
<div class="hunt-scene" id="huntScene"></div>
</div>

<!-- S9: All Together - Number Parade -->
<div class="sl bg-count">
<div class="ttl">Number Parade</div>
<div class="pr big"><img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="all-grid" id="allGrid"></div>
</div>

<!-- S10: Bye -->
<div class="sl bg-play">
<div class="pr big"><img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa"></div>
<div class="ttl">1, 2, 3, 4, 5 — Great counting!</div>
<div class="sub">You did it!</div>
<div style="font-size:34px;font-weight:700;color:#e67e22;margin-top:20px">Tomorrow: Playground Fun!</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>
<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/11</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>
<script>
var c=0,t=11;
var WD=[
{w:'one',n:1,emoji:'1f34e',color:'#e53935'},
{w:'two',n:2,emoji:'1f34c',color:'#f9a825'},
{w:'three',n:3,emoji:'2b50',color:'#ff8f00'},
{w:'four',n:4,emoji:'1f338',color:'#ec407a'},
{w:'five',n:5,emoji:'1f436',color:'#43a047'}
];
var N={
0:'Title: Counting Game. George loves counting! Show number preview icons.',
1:'Hello: Peppa invites us to count together! Hold up fingers as you count.',
2:'New word: one. Peppa has one apple! "I have one!" Hold up 1 finger.',
3:'New word: two. George has two bananas! "I have two!" Hold up 2 fingers.',
4:'New word: three. Daddy has three stars! "I have three!" Hold up 3 fingers.',
5:'New word: four. Mummy has four flowers! "I have four!" Hold up 4 fingers.',
6:'New word: five. Candy Cat has five pets! "I have five!" Hold up 5 fingers.',
7:'Counting Fingers: Tap each number button to hear the count. Show fingers together!',
8:'Number Hunt: Tap hidden numbers in the scene. Ask "Where is three?"',
9:'Number Parade: All 5 numbers displayed. Point randomly and ask "How many?"',
10:'Bye: Great counting! Tomorrow we go to the playground!'
};
function speak(txt){
var a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2');
a.play().catch(function(){new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web').play().catch(function(){})});
}
function showConfetti(){var w=document.createElement("div");w.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999";var colors=["#e53935","#f9a825","#ff8f00","#ec407a","#43a047"];for(var i=0;i<20;i++){var p=document.createElement("div");p.style.cssText="position:absolute;width:"+(6+Math.random()*8)+"px;height:"+(6+Math.random()*8)+"px;border-radius:50%;left:"+Math.random()*100+"%;top:"+Math.random()*30+"%;background:"+colors[i%5]+";animation:cfall 1.2s ease-out "+Math.random()*.3+"s forwards;opacity:0";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
// S7: Counting Fingers
var fingerInit=false;
function initFingers(){
if(fingerInit)return;fingerInit=true;
var g=document.getElementById('fingerGrid');g.innerHTML='';
var handEmojis=['261d','270c','1f91e','1f596','1f590'];
WD.forEach(function(item,i){
var b=document.createElement('div');b.className='finger-btn';b.style.border='3px solid '+item.color;
b.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+handEmojis[i]+'.svg" width="50" alt="'+item.w+'"><div class="flabel">'+item.w+'</div>';
b.onclick=function(){speak(item.w);b.style.animation='bounce .5s ease';setTimeout(function(){b.style.animation=''},600)};
g.appendChild(b);
});
}
// S8: Number Hunt
var huntInit=false,huntFound=0;
function initHunt(){
if(huntInit)return;huntInit=true;
var scene=document.getElementById('huntScene');scene.innerHTML='';
var sceneWidth=window.innerWidth<480?280:340;
var sceneHeight=window.innerWidth<480?230:280;
var itemSize=window.innerWidth<480?65:80;
var positions=[
{x:sceneWidth*0.06,y:sceneHeight*0.07},
{x:sceneWidth*0.59,y:sceneHeight*0.11},
{x:sceneWidth*0.32,y:sceneHeight*0.36},
{x:sceneWidth*0.09,y:sceneHeight*0.61},
{x:sceneWidth*0.65,y:sceneHeight*0.61}
];
WD.forEach(function(item,i){
var d=document.createElement('div');d.className='hunt-item';
d.style.left=positions[i].x+'px';d.style.top=positions[i].y+'px';
var dots='';for(var j=0;j<item.n;j++)dots+='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.emoji+'.svg'+'" width="20" style="margin:1px">';
d.innerHTML=dots+'<div class="hlabel">'+item.w+'</div>';
d.onclick=function(){
if(d.classList.contains('found'))return;
d.classList.add('found');speak(item.w);showConfetti();huntFound++;
};
scene.appendChild(d);
});
}
// S9: All Together
var allInit=false;
function initAll(){
if(allInit)return;allInit=true;
var g=document.getElementById('allGrid');g.innerHTML='';
WD.forEach(function(item){
var dots='';for(var j=0;j<item.n;j++)dots+='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.emoji+'.svg'+'" width="30" style="margin:2px">';
var d=document.createElement('div');d.className='all-item';
d.innerHTML='<div>'+dots+'</div><div class="all-label" style="color:'+item.color+'">'+item.w+'</div>';
g.appendChild(d);
});
}
function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){b.textContent='Done';b.disabled=true}else{b.textContent='Next ▶';b.disabled=false}
document.getElementById('B').innerHTML=N[c]||'';
if(c===7)initFingers();
if(c===8)initHunt();
if(c===9)initAll();
}
function tn(){document.getElementById('F').classList.toggle('on');document.getElementById('P').classList.toggle('on')}
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')goTo(c-1);if(e.key==='ArrowRight')goTo(c+1);if(e.key==='t'||e.key==='T')tn()});
goTo(0);
</script>
<style>@keyframes cfall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}@keyframes bounce{0%{transform:translateY(0)}30%{transform:translateY(-20px)}60%{transform:translateY(-10px)}100%{transform:translateY(0)}}</style>
</body>
</html>
