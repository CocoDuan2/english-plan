<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P39 - -ug Family Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffeef8,#fff5f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
  position:relative;
  margin-top:8px;
}
.tz::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);width:60%;height:3px;
  background:rgba(255,255,255,.5);border-radius:2px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;
  margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;
  border:4px solid #e91e8c;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}
.blend-game{margin-top:24px;text-align:center}
.blend-input{
  display:flex;gap:8px;justify-content:center;margin:20px 0;
}
.blend-slot{
  width:60px;height:60px;border:4px solid #e91e8c;
  border-radius:12px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#2c3e50;
}
.blend-letters{
  display:flex;gap:12px;justify-content:center;
  flex-wrap:wrap;margin-top:16px;
}
.blend-letter-btn{
  width:60px;height:60px;border:4px solid #e91e8c;
  border-radius:12px;background:#fff;
  font-size:32px;font-weight:900;color:#e91e8c;
  cursor:pointer;transition:all .2s ease;
}
.blend-letter-btn:active{transform:scale(.9)}
.blend-letter-btn.used{opacity:.3;pointer-events:none}
.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
}
.replay-btn:active{transform:scale(.95)}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;max-width:500px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ff6b9d,#e91e8c);
  border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mem-front .emoji{font-size:48px}
.mem-back{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;
}
.start-screen .preview img{width:70px;height:auto}
.start-btn{
  padding:16px 40px;background:#e91e8c;color:#fff;
  border:none;border-radius:16px;font-size:32px;
  font-weight:900;cursor:pointer;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
  transition:transform .2s ease;
}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:110px;margin:20px auto}
.done-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.done-screen .msg{font-size:22px;color:#e67e22;font-weight:700;margin-bottom:20px}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px;padding:6px 14px}
  .sb{font-size:20px}
  .learn-card{width:105px;height:105px}
  .learn-card img{width:70px}
  .learn-card .label{font-size:16px}
  .card-icon{font-size:44px}
  .blend-slot,.blend-letter-btn{width:50px;height:50px;font-size:28px}
  .listen-card{width:95px;height:95px}
  .listen-card img{width:60px}
  .listen-card .label{font-size:14px}
  .mem-grid{grid-template-columns:repeat(4,1fr);max-width:340px;gap:10px}
  .mem-front .emoji{font-size:36px}
  .mem-back img{width:45px}
  .mem-back .label{font-size:13px}
  .start-screen h1{font-size:32px}
  .start-btn{font-size:26px;padding:14px 32px}
  .done-screen h1{font-size:32px}
  .replay-btn{font-size:18px;padding:10px 20px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>-ug Family Review</h1>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41b.svg" alt="bug">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f917.svg" alt="hug">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2615.svg" alt="mug">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f6.svg" alt="rug">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6a2.svg" alt="tug">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Learn New Words</div>
    <div class="tz">点击卡片学单词</div>
    <div class="sb" id="stars1"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/george-standing.png" alt="Peppa">
    <div class="bbl">Tap the cards!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听单词，拼字母</div>
    <div class="sb" id="stars2"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-standing.png" alt="Peppa">
    <div class="bbl">Listen and spell!</div>
  </div>
  <div class="blend-game">
    <div style="font-size:24px;font-weight:900;color:#e91e8c;margin-bottom:16px">
      🔊 <span id="blendWord">bug</span>
    </div>
    <div class="blend-input" id="blendInput"></div>
    <div class="blend-letters" id="blendLetters"></div>
    <button class="replay-btn" onclick="playBlendWord()">🔊 Replay</button>
  </div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听音找图</div>
    <div class="sb" id="stars3"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
    <div class="bbl">Find the word!</div>
  </div>
  <div class="listen-grid" id="listenGrid"></div>
  <button class="replay-btn" onclick="playListenWord()">🔊 Replay</button>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">记忆翻牌</div>
    <div class="sb" id="stars4"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Peppa">
    <div class="bbl">Match the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="done-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <h1>All Done!</h1>
    <div class="msg">Great job learning -ug words!</div>
    <div style="font-size:64px;margin:20px 0">🎉</div>
    <button class="start-btn" onclick="location.reload()">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / 6</div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
const words=[
  {word:'bug',emoji:'1f41b'},
  {word:'hug',emoji:'1f917'},
  {word:'mug',emoji:'2615'},
  {word:'rug',emoji:'1f9f6'},
  {word:'tug',emoji:'1f6a2'}
];
let ci=0,stars=[0,0,0,0,0];
let flipped=[],matched=0;
let listenQueue=[...words],currentListen=null;
let blendQueue=[...words],currentBlend=null,blendPos=0;

function goTo(i){
  if(i<0||i>5)return;
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===5;
  if(i===1)initLearn();
  if(i===2)initBlend();
  if(i===3)initListen();
  if(i===4)initMemory();
}
function next(){if(ci<5)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}

// Audio cache
const audioCache={};
(function(){
  const words=['bug','hug','mug','rug','tug'];
  words.forEach(w=>{
    const a=new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`);
    a.load();
    audioCache[w]=a;
  });
})();
function speak(w,cb){
  const finish=()=>{if(cb)cb()};
  if(audioCache[w]){
    audioCache[w].currentTime=0;
    audioCache[w].play().then(()=>{
      audioCache[w].onended=finish;
      setTimeout(finish,4000);
    }).catch(()=>{
      const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
      const a2=new Audio(u2);
      a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(()=>{
        finish();
        if(typeof showAudioError==='function')showAudioError();
      });
    });
  }else{
    const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
    const a=new Audio(u);
    a.play().then(()=>{a.onended=finish;setTimeout(finish,4000)}).catch(()=>{
      const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
      const a2=new Audio(u2);
      a2.play().then(()=>{a2.onended=finish;setTimeout(finish,4000)}).catch(()=>{
        finish();
        if(typeof showAudioError==='function')showAudioError();
      });
    });
  }
}
function playOk(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.frequency.value=523;
  gain.gain.setValueAtTime(0.3,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);
  osc.start();osc.stop(ctx.currentTime+0.3);
}
function playNo(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.frequency.value=200;
  gain.gain.setValueAtTime(0.3,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.2);
  osc.start();osc.stop(ctx.currentTime+0.2);
}
function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;
      background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};
      left:${50+Math.random()*20-10}%;top:30%;
      animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}
function updateStars(mod){
  const el=document.getElementById(`stars${mod}`);
  if(!el)return;
  el.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElement('span');
    s.textContent=i<stars[mod]?'⭐':'★';
    s.style.color=i<stars[mod]?'':'#bbb';
    el.appendChild(s);
  }
}

// M1: Learn
function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  words.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`
      <div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg" alt="${w.word}">
      <div class="label">${w.word}</div>
    `;
    card.onclick=()=>{
      if(!card.classList.contains('revealed')){
        card.classList.add('revealed');
        playOk();
        speak(w.word);
        showConfetti();
        stars[1]++;
        updateStars(1);
      }
    };
    grid.appendChild(card);
  });
  updateStars(1);
}

// M2: Blending
function initBlend(){
  if(blendQueue.length===0){
    document.querySelector('.blend-game').innerHTML='<div style="font-size:32px;font-weight:900;color:#27ae60">🎉 All done!</div>';
    return;
  }
  const idx=Math.floor(Math.random()*blendQueue.length);
  currentBlend=blendQueue[idx];
  blendQueue.splice(idx,1);
  blendPos=0;
  
  document.getElementById('blendWord').textContent=currentBlend.word;
  
  const input=document.getElementById('blendInput');
  input.innerHTML='';
  for(let i=0;i<currentBlend.word.length;i++){
    const slot=document.createElement('div');
    slot.className='blend-slot';
    slot.id=`slot${i}`;
    input.appendChild(slot);
  }
  
  const letters=document.getElementById('blendLetters');
  letters.innerHTML='';
  const allLetters=['b','h','m','r','t','u','g'];
  allLetters.forEach(l=>{
    const btn=document.createElement('button');
    btn.className='blend-letter-btn';
    btn.textContent=l;
    btn.onclick=()=>selectLetter(l,btn);
    letters.appendChild(btn);
  });
  
  setTimeout(()=>speak(currentBlend.word),500);
  updateStars(2);
}
function playBlendWord(){
  speak(currentBlend.word);
}
function selectLetter(l,btn){
  if(blendPos>=currentBlend.word.length)return;
  const correct=currentBlend.word[blendPos];
  if(l===correct){
    document.getElementById(`slot${blendPos}`).textContent=l;
    btn.classList.add('used');
    blendPos++;
    playOk();
    if(blendPos===currentBlend.word.length){
      stars[2]++;
      updateStars(2);
      showConfetti();
      speak(currentBlend.word);
      setTimeout(initBlend,2000);
    }
  }else{
    playNo();
  }
}

// M3: Listen
function initListen(){
  if(listenQueue.length===0){
    document.getElementById('listenGrid').innerHTML='<div style="font-size:32px;font-weight:900;color:#27ae60">🎉 All done!</div>';
    return;
  }
  const idx=Math.floor(Math.random()*listenQueue.length);
  currentListen=listenQueue[idx];
  listenQueue.splice(idx,1);
  
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg" alt="${w.word}">
      <div class="label">${w.word}</div>
    `;
    card.onclick=()=>{
      if(w.word===currentListen.word){
        playOk();
        speak(w.word);
        showConfetti();
        stars[3]++;
        updateStars(3);
        setTimeout(initListen,2000);
      }else{
        playNo();
        speak(currentListen.word);
      }
    };
    grid.appendChild(card);
  });
  
  setTimeout(()=>speak(currentListen.word),500);
  updateStars(3);
}
function playListenWord(){
  speak(currentListen.word);
}

// M4: Memory
function initMemory(){
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  const pairs=[...words,...words].sort(()=>Math.random()-0.5);
  pairs.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.innerHTML=`
      <div class="mem-front"><div class="emoji">❓</div></div>
      <div class="mem-back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.emoji}.svg" alt="${w.word}">
        <div class="label">${w.word}</div>
      </div>
    `;
    card.dataset.word=w.word;
    card.onclick=()=>flipCard(card);
    grid.appendChild(card);
  });
  flipped=[];
  matched=0;
  updateStars(4);
}
function flipCard(card){
  if(card.classList.contains('flipped')||card.classList.contains('matched')||flipped.length>=2)return;
  card.classList.add('flipped');
  flipped.push(card);
  speak(card.dataset.word);
  
  if(flipped.length===2){
    setTimeout(()=>{
      if(flipped[0].dataset.word===flipped[1].dataset.word){
        flipped[0].classList.add('matched');
        flipped[1].classList.add('matched');
        playOk();
        showConfetti();
        matched+=2;
        stars[4]++;
        updateStars(4);
        if(matched===10){
          setTimeout(()=>alert('🎉 All matched!'),500);
        }
      }else{
        flipped[0].classList.remove('flipped');
        flipped[1].classList.remove('flipped');
        playNo();
      }
      flipped=[];
    },1000);
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

document.addEventListener('keydown',e=>{
