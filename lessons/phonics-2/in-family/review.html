<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P35 - -in Family Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Comic Sans MS','Segoe UI Emoji',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#fff5e6,#ffe6f0);
  color:#2c3e50;
  overflow-x:hidden;
}
.mod{
  min-height:100vh;display:none;flex-direction:column;
  padding:20px 16px 80px;
  justify-content:flex-start;
  overflow-y:auto;
}
.mod.active{display:flex}
.top{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
}
.te{font-size:26px;font-weight:900;color:#e91e8c}
.tz{
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;padding:8px 16px;border-radius:25px;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
  position:relative;
  margin-top:8px;
}
.tz::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);width:60%;height:3px;
  background:rgba(255,255,255,.5);border-radius:2px;
}
.sb{
  display:flex;gap:6px;align-items:center;
  font-size:22px;font-weight:900;
  margin-top:8px;
}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pr img{width:75px;height:auto}
.bbl{
  background:#fff;border:4px solid #e91e8c;border-radius:20px;
  padding:10px 18px;font-size:22px;font-weight:900;color:#e67e22;
  position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.bbl::after{
  content:'';position:absolute;bottom:-12px;left:30px;
  width:0;height:0;border:8px solid transparent;
  border-top-color:#e91e8c;
}
.learn-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.learn-card{
  width:120px;height:120px;border-radius:20px;
  background:linear-gradient(135deg,#f5f5f5,#e0e0e0);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.learn-card:active{transform:scale(.95)}
.learn-card img{width:80px;height:auto;display:none}
.learn-card .label{font-size:18px;font-weight:900;color:#2c3e50;margin-top:8px;display:none}
.learn-card.revealed{
  background:#fff;
  border:4px solid #e91e8c;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.learn-card.revealed img,.learn-card.revealed .label{display:block}
.card-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;
}
.learn-card.revealed .card-icon{display:none}
.blend-game-area{text-align:center;margin-top:20px}
.blend-prompt{font-size:28px;color:#e67e22;font-weight:900;margin-bottom:16px}
.blend-letters{
  display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;
}
.blend-letter-btn{
  font-size:48px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,#e91e8c,#c44569);
  border:none;border-radius:12px;
  width:64px;height:64px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.3);
}
.blend-letter-btn:active{transform:scale(.9)}
.blend-letter-btn.selected{
  background:linear-gradient(135deg,#27ae60,#2ecc71);
  transform:scale(1.1);
}
.blend-letter-btn.wrong-pick{
  background:linear-gradient(135deg,#e74c3c,#c0392b);
  animation:shake .3s ease;
}
.blend-answer{
  display:flex;gap:6px;justify-content:center;
  margin:16px 0;min-height:64px;align-items:center;
}
.blend-slot{
  width:56px;height:56px;border:4px dashed #e91e8c;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;font-weight:900;color:#e91e8c;
}
.blend-slot.filled{border-style:solid;background:#fff0f5}
.listen-grid{
  display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  margin-top:24px;
}
.listen-card{
  width:110px;height:110px;border-radius:20px;
  background:#fff;border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
}
.listen-card:hover{
  transform:translateY(-4px);
  box-shadow:0 6px 16px rgba(233,30,140,.3);
}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:16px;font-weight:900;color:#2c3e50}
.replay-btn{
  margin:16px auto;padding:12px 24px;
  background:#e67e22;color:#fff;border:none;
  border-radius:12px;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .2s ease;
  display:block;
}
.replay-btn:active{transform:scale(.95)}
.mem-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;max-width:500px;margin:24px auto;
}
.mem-card{
  width:100%;aspect-ratio:1;border-radius:20px;
  background:linear-gradient(135deg,#ff6b9d,#e91e8c);
  border:4px solid #e91e8c;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:all .3s ease;
  position:relative;
  box-shadow:0 4px 12px rgba(233,30,140,.2);
  transform-style:preserve-3d;
}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{pointer-events:none}
.mem-card.matched{opacity:.3;pointer-events:none}
.mem-front{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mem-front .emoji{font-size:48px}
.mem-back{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.mem-back img{width:60px;height:auto;margin-bottom:8px}
.mem-back .label{font-size:16px;font-weight:900;color:#2c3e50}
.mem-card.flipped{background:#fff}
.mem-card.flipped .mem-front{display:none}
.mem-card.flipped .mem-back{display:flex}
.start-screen{text-align:center}
.start-screen img{width:110px;margin:20px auto}
.start-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.start-screen .preview{
  display:flex;gap:16px;justify-content:center;margin:20px 0;flex-wrap:wrap;
}
.start-screen .preview img{width:70px;height:auto}
.start-btn{
  padding:16px 40px;background:#e91e8c;color:#fff;
  border:none;border-radius:16px;font-size:32px;
  font-weight:900;cursor:pointer;
  box-shadow:0 6px 16px rgba(233,30,140,.3);
  transition:transform .2s ease;
}
.start-btn:active{transform:scale(.95)}
.done-screen{text-align:center}
.done-screen img{width:110px;margin:20px auto}
.done-screen h1{font-size:42px;font-weight:900;color:#e91e8c;margin-bottom:12px}
.done-screen .msg{font-size:22px;color:#e67e22;font-weight:700;margin-bottom:20px}
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  border-top:2px solid #e0e0e0;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.nav button{
  padding:10px 24px;border:none;border-radius:12px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:#e91e8c;color:#fff;
  transition:transform .2s ease;
}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button:not(:disabled):active{transform:scale(.95)}
.page-num{font-size:16px;font-weight:700;color:#667085}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)}
}
@media(max-width:480px){
  .te{font-size:22px}
  .tz{font-size:18px;padding:6px 14px}
  .sb{font-size:20px}
  .pr img{width:60px}
  .bbl{font-size:20px;padding:8px 16px}
  .learn-card{width:100px;height:100px}
  .learn-card img{width:70px}
  .learn-card .label{font-size:16px}
  .card-icon{font-size:42px}
  .blend-prompt{font-size:24px}
  .blend-letter-btn{width:56px;height:56px;font-size:40px}
  .blend-slot{width:48px;height:48px;font-size:32px}
  .listen-card{width:90px;height:90px}
  .listen-card img{width:60px}
  .listen-card .label{font-size:14px}
  .replay-btn{font-size:18px;padding:10px 20px}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:10px;max-width:350px}
  .mem-front .emoji{font-size:36px}
  .mem-back img{width:50px}
  .mem-back .label{font-size:14px}
  .start-screen h1{font-size:32px}
  .start-screen .preview img{width:60px}
  .start-btn{font-size:26px;padding:12px 32px}
  .done-screen h1{font-size:32px}
  .done-screen .msg{font-size:18px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div class="mod active">
  <div class="start-screen">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <h1>-in Family Review</h1>
    <div class="preview">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4cc.svg" alt="pin">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c6.svg" alt="win">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f5d1.svg" alt="bin">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41f.svg" alt="fin">
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f96b.svg" alt="tin">
    </div>
    <button class="start-btn" onclick="goTo(1)">Let's Play!</button>
  </div>
</div>

<!-- M1: Learn -->
<div class="mod">
  <div class="top">
    <div class="te">Learn New Words</div>
    <div class="tz">点击灰色卡片学习单词</div>
    <div class="sb" id="stars1"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Tap the cards!</div>
  </div>
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Blending Game -->
<div class="mod">
  <div class="top">
    <div class="te">Blending Game</div>
    <div class="tz">听单词，点字母拼出来</div>
    <div class="sb" id="stars2"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Listen and blend!</div>
  </div>
  <div class="blend-game-area">
    <div class="blend-prompt" id="blendPrompt"></div>
    <div class="blend-answer" id="blendAnswer"></div>
    <div class="blend-letters" id="blendLetters"></div>
  </div>
</div>

<!-- M3: Listen & Find -->
<div class="mod">
  <div class="top">
    <div class="te">Listen & Find</div>
    <div class="tz">听单词，找到对应的图片</div>
    <div class="sb" id="stars3"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Listen and tap!</div>
  </div>
  <button class="replay-btn" onclick="replayListen()">🔊 Replay</button>
  <div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div class="mod">
  <div class="top">
    <div class="te">Memory Match</div>
    <div class="tz">翻牌配对游戏</div>
    <div class="sb" id="stars4"></div>
  </div>
  <div class="pr">
    <img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
    <div class="bbl">Find the pairs!</div>
  </div>
  <div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div class="mod">
  <div class="done-screen">
    <img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
    <h1>All Done!</h1>
    <div class="msg">Great job learning -in words!</div>
    <div style="font-size:64px;margin:20px 0">🎉</div>
    <button class="start-btn" onclick="goTo(0)">Play Again</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prev()" id="prevBtn">◀ Back</button>
  <div class="page-num"><span id="curr">1</span> / 6</div>
  <button onclick="next()" id="nextBtn">Next ▶</button>
</div>

<script>
let ci=0,tm=6;
const words=[
  {w:'pin',img:'1f4cc'},
  {w:'win',img:'1f3c6'},
  {w:'bin',img:'1f5d1'},
  {w:'fin',img:'1f41f'},
  {w:'tin',img:'1f96b'}
];
let stars=[0,0,0,0,0];

function goTo(i){
  if(i<0||i>=tm)return;
  document.querySelectorAll('.mod').forEach((m,idx)=>m.classList.toggle('active',idx===i));
  ci=i;
  document.getElementById('curr').textContent=i+1;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===tm-1;
  
  if(i===1)initLearn();
  if(i===2)initBlend();
  if(i===3)initListen();
  if(i===4)initMem();
  
  for(let j=1;j<=4;j++){
    const el=document.getElementById(`stars${j}`);
    if(el)el.innerHTML=Array(5).fill(0).map((_,k)=>k<stars[j]?'⭐':'★').join(' ');
  }
}
function next(){if(ci<tm-1)goTo(ci+1)}
function prev(){if(ci>0)goTo(ci-1)}

function speak(w){
  const u=`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(w)}&type=2`;
  new Audio(u).play().catch(()=>{
    const u2=`https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(w)}&spd=4&source=web`;
    new Audio(u2).play().catch(()=>console.log('Audio failed'));
  });
}

function playOk(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g);
  g.connect(ctx.destination);
  o.frequency.value=523;
  g.gain.value=0.1;
  o.start();
  setTimeout(()=>o.stop(),100);
}

function playNo(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g);
  g.connect(ctx.destination);
  o.frequency.value=200;
  g.gain.value=0.1;
  o.start();
  setTimeout(()=>o.stop(),200);
}

function showConfetti(){
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;
      background:${['#ff6b9d','#ffd93d','#a8e6cf','#c9f0ff'][i%4]};
      left:${50+Math.random()*20-10}%;top:30%;
      animation:fall ${1+Math.random()}s ease-out forwards;pointer-events:none;z-index:1000`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes fall{to{transform:translateY(70vh) rotate(360deg);opacity:0}}`;
document.head.appendChild(style);

// M1: Learn
function initLearn(){
  const grid=document.getElementById('learnGrid');
  grid.innerHTML='';
  words.forEach(w=>{
    const card=document.createElement('div');
    card.className='learn-card';
    card.innerHTML=`<div class="card-icon">❓</div>
      <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.img}.svg" alt="${w.w}">
      <div class="label">${w.w}</div>`;
    card.onclick=()=>{
      if(!card.classList.contains('revealed')){
        card.classList.add('revealed');
        speak(w.w);
        const revealed=grid.querySelectorAll('.revealed').length;
        if(revealed===words.length){
          stars[1]=5;
          showConfetti();
          setTimeout(()=>goTo(2),1500);
        }
      }
    };
    grid.appendChild(card);
  });
}

// M2: Blending Game
let blendIdx=0,blendQueue=[],blendAnswer=[];
function initBlend(){
  blendIdx=0;
  blendQueue=[...words].sort(()=>Math.random()-.5);
  nextBlend();
}
function nextBlend(){
  if(blendIdx>=blendQueue.length){
    stars[2]=5;
    showConfetti();
    setTimeout(()=>goTo(3),1500);
    return;
  }
  const word=blendQueue[blendIdx];
  blendAnswer=[];
  document.getElementById('blendPrompt').textContent='Spell the word!';
  const answerDiv=document.getElementById('blendAnswer');
  answerDiv.innerHTML='';
  word.w.split('').forEach(()=>{
    const slot=document.createElement('div');
    slot.className='blend-slot';
    answerDiv.appendChild(slot);
  });
  
  const letters=word.w.split('').concat(['a','e','o','u','b','d','f','g','h','m','n','p','r','s','t','w']).filter((v,i,a)=>a.indexOf(v)===i).sort(()=>Math.random()-.5).slice(0,8);
  const lettersDiv=document.getElementById('blendLetters');
  lettersDiv.innerHTML='';
  letters.forEach(l=>{
    const btn=document.createElement('button');
    btn.className='blend-letter-btn';
    btn.textContent=l;
    btn.onclick=()=>pickLetter(l,word.w,btn);
    lettersDiv.appendChild(btn);
  });
  
  setTimeout(()=>speak(word.w),500);
}
function pickLetter(l,correctWord,btn){
  if(btn.classList.contains('selected'))return;
  
  const correctLetters=correctWord.split('');
  if(blendAnswer.length<correctLetters.length&&l===correctLetters[blendAnswer.length]){
    blendAnswer.push(l);
    btn.classList.add('selected');
    const slots=document.querySelectorAll('.blend-slot');
    slots[blendAnswer.length-1].textContent=l;
    slots[blendAnswer.length-1].classList.add('filled');
    
    if(blendAnswer.length===correctLetters.length){
      playOk();
      speak(correctWord);
      showConfetti();
      blendIdx++;
      setTimeout(nextBlend,2000);
    }
  }else{
    btn.classList.add('wrong-pick');
    playNo();
    setTimeout(()=>btn.classList.remove('wrong-pick'),300);
  }
}

// M3: Listen & Find
let listenIdx=0,listenQueue=[],listenCurrent=null;
function initListen(){
  listenIdx=0;
  listenQueue=[...words].sort(()=>Math.random()-.5);
  nextListen();
}
function nextListen(){
  if(listenIdx>=listenQueue.length){
    stars[3]=5;
    showConfetti();
    setTimeout(()=>goTo(4),1500);
    return;
  }
  listenCurrent=listenQueue[listenIdx];
  const grid=document.getElementById('listenGrid');
  grid.innerHTML='';
  
  const opts=[listenCurrent,...words.filter(w=>w.w!==listenCurrent.w).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);
  opts.forEach(w=>{
    const card=document.createElement('div');
    card.className='listen-card';
    card.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.img}.svg" alt="${w.w}">
      <div class="label">${w.w}</div>`;
    card.onclick=()=>checkListen(w.w===listenCurrent.w,w.w);
    grid.appendChild(card);
  });
  
  setTimeout(()=>speak(listenCurrent.w),500);
}
function replayListen(){
  if(listenCurrent)speak(listenCurrent.w);
}
function checkListen(correct,word){
  if(correct){
    playOk();
    speak(word);
    showConfetti();
    listenIdx++;
    setTimeout(nextListen,2000);
  }else{
    playNo();
    speak(listenCurrent.w);
  }
}

// M4: Memory Match
let memFlipped=[],memMatched=0;
function initMem(){
  memMatched=0;
  memFlipped=[];
  const grid=document.getElementById('memGrid');
  grid.innerHTML='';
  
  const pairs=[...words,...words].sort(()=>Math.random()-.5);
  pairs.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.word=w.w;
    card.dataset.idx=i;
    card.innerHTML=`<div class="mem-front"><div class="emoji">❓</div></div>
      <div class="mem-back">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${w.img}.svg" alt="${w.w}">
        <div class="label">${w.w}</div>
      </div>`;
    card.onclick=()=>flipMem(card);
    grid.appendChild(card);
  });
}
function flipMem(card){
  if(card.classList.contains('flipped')||card.classList.contains('matched')||memFlipped.length>=2)return;
  
  card.classList.add('flipped');
  memFlipped.push(card);
  speak(card.dataset.word);
  
  if(memFlipped.length===2){
    const[c1,c2]=memFlipped;
    if(c1.dataset.word===c2.dataset.word&&c1.dataset.idx!==c2.dataset.idx){
      setTimeout(()=>{
        c1.classList.add('matched');
        c2.classList.add('matched');
        memMatched+=2;
        playOk();
        showConfetti();
        memFlipped=[];
        if(memMatched===words.length*2){
          stars[4]=5;
          setTimeout(()=>goTo(5),1500);
        }
      },800);
    }else{
      setTimeout(()=>{
        c1.classList.remove('flipped');
        c2.classList.remove('flipped');
        playNo();
        memFlipped=[];
      },1000);
    }
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prev();
  if(e.key==='ArrowRight')next();
});
goTo(0);
</script>
</body>
</html>
