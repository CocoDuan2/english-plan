<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 10 - Review Day 2 (Teach)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 30px 70px;text-align:center;overflow-y:auto}
.sl.on{display:flex}
.bg-title{background:linear-gradient(160deg,#fef9ef,#fdebd0)}
.bg-num{background:linear-gradient(160deg,#ebf5fb,#d6eaf8)}
.bg-act{background:linear-gradient(160deg,#d5f5e3,#e8f8f5)}
.bg-col{background:linear-gradient(160deg,#fdebd0,#fadbd8)}
.bg-ani{background:linear-gradient(160deg,#e8f8f5,#d5f5e3)}
.bg-mix{background:linear-gradient(160deg,#f5eef8,#ebdef0)}
.bg-bye{background:linear-gradient(160deg,#fef9ef,#fdebd0)}
.sec{font-size:13px;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.ttl{font-size:32px;font-weight:800;color:#2c3e50;margin-bottom:12px}
.sub{font-size:18px;color:#7f8c8d;margin-bottom:16px}
.ks{font-size:30px;font-weight:600;color:#e67e22;margin:12px 0;background:rgba(230,126,34,.08);border-radius:12px;padding:10px 24px;border-left:4px solid #e67e22}
.fg{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;width:100%;max-width:600px;margin:10px auto}
.fc{background:#fff;border-radius:16px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.05);min-height:100px}
.fc img{width:52px;height:52px}
.fc .fw{font-size:15px;font-weight:700;color:#2c3e50;margin-top:4px}
.color-circle{width:52px;height:52px;border-radius:50%;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.color-circle.big-circle{width:120px;height:120px}
.gm{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%;max-width:620px;margin:10px auto}
.gc{background:#fff;border-radius:12px;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.05);min-height:80px}
.gc img,.gc .color-circle{width:40px;height:40px}
.gc .color-circle{border-radius:50%}
.gc .gw{font-size:12px;font-weight:700;color:#2c3e50;margin-top:3px}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#3498db;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(52,152,219,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.fab:hover{background:#2980b9;transform:scale(1.08)}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:340px;max-height:45vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:16px 20px;display:none;font-size:14px;line-height:1.7;color:#555;border:1px solid rgba(52,152,219,.2)}
.pop.on{display:block;animation:fu .2s ease}
.pop-t{font-size:12px;font-weight:700;color:#3498db;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.pop ul{margin:4px 0 4px 18px}.pop li{margin:3px 0}.pop b{color:#2c3e50}
.pop .tc{font-weight:700;color:#3498db;margin-top:8px;display:block;font-size:13px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nb{padding:10px 22px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#3498db;color:#fff}
.nb:hover{background:#2980b9}
.nb:disabled{background:#e0e0e0;color:#bbb;cursor:default}
.np{font-size:14px;font-weight:600;color:#999}
.nk{font-size:11px;color:#ccc;margin-top:2px;text-align:center}
@media(min-width:768px){
  .ttl{font-size:38px}
  .ks{font-size:34px}
  .fc img{width:68px;height:68px}
  .fc .fw{font-size:18px}
  .color-circle{width:68px;height:68px}
  .color-circle.big-circle{width:150px;height:150px}
  .gc img,.gc .color-circle{width:52px;height:52px}
  .gc .gw{font-size:14px}
  .pop{width:400px}
}
</style>
</head>
<body>
<div class="deck" id="D"></div>
<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div class="pop-t">📋 Teacher Notes</div><div id="B"></div></div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">◀ Back</button>
  <div style="text-align:center"><div class="np" id="pg">1/7</div><div class="nk">← → · T=tips</div></div>
  <button class="nb" id="nb" onclick="go(1)">Next ▶</button>
</div>
<script>
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/';
var N={},c=0,t=0,o=false;
function img(svg,sz){return '<img src="'+TW+svg+'.svg" width="'+sz+'" height="'+sz+'" alt="">'}
function circle(color,sz){return '<div class="color-circle'+(sz>80?' big-circle':'')+'" style="background:'+color+';width:'+sz+'px;height:'+sz+'px"></div>'}
function mk(i,bg,x){return '<div class="sl '+bg+(i===0?' on':'')+'" data-i="'+i+'">'+x+'</div>'}

var NUMBERS=[
  {w:'one',svg:'31-fe0f-20e3'},{w:'two',svg:'32-fe0f-20e3'},{w:'three',svg:'33-fe0f-20e3'},
  {w:'four',svg:'34-fe0f-20e3'},{w:'five',svg:'35-fe0f-20e3'}
];
var ACTIONS=[
  {w:'run',svg:'1f3c3'},{w:'jump',svg:'1f938'},{w:'walk',svg:'1f6b6'},
  {w:'sit',svg:'1fa91'},{w:'stand',svg:'1f9cd'}
];
var COLORS2=[
  {w:'pink',color:'#ff69b4'},{w:'purple',color:'#9b59b6'},{w:'white',color:'#f5f5f5'},
  {w:'black',color:'#2c3e50'},{w:'brown',color:'#8b4513'}
];
var ANIMALS2=[
  {w:'rabbit',svg:'1f430'},{w:'pig',svg:'1f437'},{w:'cow',svg:'1f404'},
  {w:'horse',svg:'1f434'},{w:'sheep',svg:'1f411'}
];

function build(){
var h='',i=0;

// 1 Title
var preview='<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0">';
NUMBERS.forEach(function(n){preview+=img(n.svg,40)});
preview+='</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:6px 0">';
ACTIONS.forEach(function(a){preview+=img(a.svg,40)});
preview+='</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:6px 0">';
COLORS2.forEach(function(c){preview+=circle(c.color,40)});
preview+='</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:6px 0">';
ANIMALS2.forEach(function(a){preview+=img(a.svg,40)});
preview+='</div>';
h+=mk(i++,'bg-title',
  img('1f31f',60)+
  '<div class="ttl">Review Day 2!</div>'+
  '<div class="sub">Let\'s remember everything!</div>'+
  preview);
N[0]='<span class="tc">🎯 Today</span><ul><li>Review Day — no new words!</li><li>Review all 20 words from Day 6-9</li><li>Numbers, Actions, Colors 2, Animals 2</li><li>Each round uses its own sentence pattern</li></ul>';

// 2 Numbers Round
h+=mk(i++,'bg-num',
  '<div class="sec">Numbers Round</div>'+
  '<div class="ttl">Numbers! '+img('1f522',28)+'</div>'+
  '<div class="fg">'+NUMBERS.map(function(n){
    return '<div class="fc">'+img(n.svg,52)+'<div class="fw">'+n.w+'</div></div>'
  }).join('')+'</div>'+
  '<div class="ks">I have ___!</div>');
N[1]='<span class="tc">🗣️ Numbers</span><ul><li>Hold up fingers: "How many?"</li><li>Child: "I have one! I have two!" etc.</li><li>Count objects on screen together</li><li>Speed round: random order, faster each time</li></ul>';

// 3 Actions Round
h+=mk(i++,'bg-act',
  '<div class="sec">Actions Round</div>'+
  '<div class="ttl">Actions! '+img('1f3c3',28)+'</div>'+
  '<div class="fg">'+ACTIONS.map(function(a){
    return '<div class="fc">'+img(a.svg,52)+'<div class="fw">'+a.w+'</div></div>'
  }).join('')+'</div>'+
  '<div class="ks">I can ___!</div>');
N[2]='<span class="tc">🗣️ Actions</span><ul><li>Ask: "Can you ___?"</li><li>Child: "I can run! I can jump!" + do the action</li><li>Simon Says style: "Simon says... run!"</li><li>Mix up speed: slow walk → fast run</li></ul>';

// 4 Colors 2 Round
h+=mk(i++,'bg-col',
  '<div class="sec">Colors Round</div>'+
  '<div class="ttl">More Colors! '+img('1f308',28)+'</div>'+
  '<div class="fg">'+COLORS2.map(function(c){
    return '<div class="fc">'+circle(c.color,52)+'<div class="fw">'+c.w+'</div></div>'
  }).join('')+'</div>'+
  '<div class="ks">It\'s ___!</div>');
N[3]='<span class="tc">🗣️ Colors 2</span><ul><li>Point: "What color is it?"</li><li>Child: "It\'s pink! It\'s purple!" etc.</li><li>Find colors in the room: "Can you find something brown?"</li><li>Mix with Day 1 colors if time allows</li></ul>';

// 5 Animals 2 Round
h+=mk(i++,'bg-ani',
  '<div class="sec">Animals Round</div>'+
  '<div class="ttl">Farm Animals! '+img('1f3a1',28)+'</div>'+
  '<div class="fg">'+ANIMALS2.map(function(a){
    return '<div class="fc">'+img(a.svg,52)+'<div class="fw">'+a.w+'</div></div>'
  }).join('')+'</div>'+
  '<div class="ks">I see a ___!</div>');
N[4]='<span class="tc">🗣️ Animals 2</span><ul><li>Point: "What do you see?"</li><li>Child: "I see a rabbit! I see a pig!" etc.</li><li>Make animal sounds together</li><li>Random order, go faster each round</li></ul>';

// 6 Grand Mix
var mixHtml='<div class="gm">';
NUMBERS.forEach(function(n){
  mixHtml+='<div class="gc">'+img(n.svg,40)+'<div class="gw">'+n.w+'</div></div>';
});
ACTIONS.forEach(function(a){
  mixHtml+='<div class="gc">'+img(a.svg,40)+'<div class="gw">'+a.w+'</div></div>';
});
COLORS2.forEach(function(c){
  mixHtml+='<div class="gc">'+circle(c.color,40)+'<div class="gw">'+c.w+'</div></div>';
});
ANIMALS2.forEach(function(a){
  mixHtml+='<div class="gc">'+img(a.svg,40)+'<div class="gw">'+a.w+'</div></div>';
});
mixHtml+='</div>';
h+=mk(i++,'bg-mix',
  '<div class="sec">Grand Mix</div>'+
  '<div class="ttl">All 20 Words! '+img('1f389',28)+'</div>'+
  mixHtml);
N[5]='<span class="tc">🎮 Grand Mix</span><ul><li>Point randomly: "What\'s this?" or "Where is the ___?"</li><li>Child answers with the correct sentence pattern:</li><li>Numbers → "I have ___!" / Actions → "I can ___!"</li><li>Colors → "It\'s ___!" / Animals → "I see a ___!"</li><li>Speed challenge: how fast can they name all 20?</li></ul>';

// 7 Bye
h+=mk(i++,'bg-bye',
  img('2b50',180)+
  '<div class="ttl">Amazing Job!</div>'+
  '<div class="sub">You remembered everything! See you next time! '+img('1f44b',24)+'</div>');
N[6]='<span class="tc">👋</span><ul><li>"Great job today! You know so many words!"</li><li>"Say bye to all the words!"</li><li>High five!</li></ul>';

document.getElementById('D').innerHTML=h;
t=i;goTo(0);
}

function goTo(i){if(i<0||i>=t)return;document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});document.querySelectorAll('.sl')[i].classList.add('on');c=i;
  document.getElementById('pg').textContent=(c+1)+'/'+t;
  document.getElementById('pb').disabled=c===0;
  var b=document.getElementById('nb');
  if(c===t-1){b.textContent='Done 🎉';b.disabled=true}else{b.textContent='Next ▶';b.disabled=false}
  document.getElementById('B').innerHTML=N[c]||'';
}
function go(d){goTo(c+d)}
function tn(){o=!o;document.getElementById('P').classList.toggle('on',o);document.getElementById('F').classList.toggle('on',o)}
document.addEventListener('click',function(e){if(o&&!e.target.closest('.pop')&&!e.target.closest('.fab')){o=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on')}});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});
build();
</script>
</body>
</html>
