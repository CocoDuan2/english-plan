<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 50%,#fceabb 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#e67e22;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#e67e22;transform:scale(1.2)}
.top-bar .dot.done{background:#f39c12}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:17px;color:rgba(0,0,0,.5);margin-top:2px;line-height:1.3}
.instr-stars{display:flex;gap:5px;margin-top:4px}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}
.card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

.color-circle{border-radius:50%;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.12)}

/* Balloon game */
.balloon-area{position:relative;width:100%;height:320px;overflow:hidden;border-radius:16px;background:rgba(255,255,255,.15)}
.balloon{position:absolute;cursor:pointer;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.balloon:active{transform:scale(.85)}

/* Memory flip */
.flip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;justify-items:center}
.flip-card{background:rgba(255,255,255,.9);border-radius:14px;padding:10px;min-height:90px;width:100%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .3s,background .3s;-webkit-tap-highlight-color:transparent}
.flip-card:active{transform:scale(.95)}
.flip-card.matched{background:#d5f5e3;pointer-events:none;opacity:.7}

.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

.nav-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;
  padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-top:2px solid rgba(0,0,0,.06);z-index:100}
.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#e67e22;border:2px solid #e67e22}
.nav-next{color:#fff;background:linear-gradient(135deg,#f7b731,#e67e22);
  box-shadow:0 4px 15px rgba(230,126,34,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-progress{font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center}

@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

@media(min-width:768px){
  .top-bar,.main{max-width:800px}
  .top-bar{padding:16px 24px}
  .top-bar .title{font-size:22px}
  .main{padding:24px 24px 20px}
  .card img{width:120px!important;height:120px!important}
  .balloon-area{height:400px}
  .flip-grid{gap:14px}
}
</style>
</head>

<!-- PART 1: Data + Audio -->
<script>
function twimg(code,sz){return '<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/'+code+'.svg" width="'+sz+'" height="'+sz+'" alt="">';}

var NUMBERS=[
  {name:'one',code:'31-fe0f-20e3'},{name:'two',code:'32-fe0f-20e3'},{name:'three',code:'33-fe0f-20e3'},
  {name:'four',code:'34-fe0f-20e3'},{name:'five',code:'35-fe0f-20e3'}
];
var ACTIONS=[
  {name:'run',code:'1f3c3'},{name:'jump',code:'1f938'},{name:'walk',code:'1f6b6'},
  {name:'sit',code:'1fa91'},{name:'stand',code:'1f9cd'}
];
var COLORS2=[
  {name:'pink',hex:'#ff69b4'},{name:'purple',hex:'#9b59b6'},{name:'white',hex:'#f0f0f0'},
  {name:'black',hex:'#2c3e50'},{name:'brown',hex:'#8b4513'}
];
var ANIMALS2=[
  {name:'rabbit',code:'1f430'},{name:'pig',code:'1f437'},{name:'cow',code:'1f404'},
  {name:'horse',code:'1f434'},{name:'sheep',code:'1f411'}
];

var currentModule=0;
var audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function speak(text,cb){
  var isWord=text.trim().indexOf(' ')===-1;
  var url=isWord
    ?'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2'
    :'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(text)+'&spd=4&source=web';
  var a=new Audio(url),done=false;
  var finish=function(){if(!done){done=true;if(cb)setTimeout(cb,50);}};
  var safety=setTimeout(finish,4000);
  a.onended=function(){clearTimeout(safety);finish();};
  a.onerror=function(){clearTimeout(safety);finish();};
  a.play().catch(finish);
}
function playCorrect(){var ctx=getAudioCtx();[523.25,659.25].forEach(function(f,i){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;var t=ctx.currentTime+i*.15;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);});}
function playWrong(){var ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.value=200;g.gain.setValueAtTime(.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);o.start();o.stop(ctx.currentTime+.2);}
function playPop(){var ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08);o.start();o.stop(ctx.currentTime+.08);}
function playStar(){var ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(1200,ctx.currentTime);o.frequency.linearRampToValueAtTime(1800,ctx.currentTime+.2);g.gain.setValueAtTime(.25,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);o.start();o.stop(ctx.currentTime+.2);}
</script>

<!-- PART 2: Utilities -->
<script>
function setInstr(en,zh,starsHtml){
  var b=document.getElementById('instrBanner');
  var h='<div class="instr-en">'+en+'</div>';
  if(zh)h+='<div class="instr-zh">'+zh+'</div>';
  if(starsHtml)h+='<div class="instr-stars">'+starsHtml+'</div>';
  b.innerHTML=h;
}
function starsBar(total,earned){
  var h='';for(var i=0;i<total;i++){
    h+='<span style="opacity:'+(i<earned?'1':'.3')+';transition:opacity .3s'+(i<earned?';animation:popIn .4s ease':'')+'">'+twimg('2b50',18)+'</span>';
  }return h;
}
function burstStars(x,y){
  playStar();var c=document.createElement('div');c.className='star-burst';c.style.left=x+'px';c.style.top=y+'px';
  var codes=['2b50','1f31f','2728','1f4ab'];
  for(var i=0;i<8;i++){var s=document.createElement('div');s.className='star-particle';
    var angle=(i/8)*Math.PI*2,dist=60+Math.random()*40;
    s.style.setProperty('--tx',Math.cos(angle)*dist+'px');s.style.setProperty('--ty',Math.sin(angle)*dist+'px');
    s.innerHTML=twimg(codes[i%4],20);c.appendChild(s);}
  document.body.appendChild(c);setTimeout(function(){c.remove();},1100);
}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
</script>

<!-- PART 3: Navigation -->
<script>
function updateDots(){
  var dots=document.getElementById('dots');dots.innerHTML='';
  for(var i=1;i<=5;i++){var d=document.createElement('div');
    d.className='dot'+(i===currentModule?' active':'')+(i<currentModule?' done':'');dots.appendChild(d);}
}
function goModule(n){
  currentModule=n;
  document.querySelectorAll('.module').forEach(function(m){m.classList.remove('active');m.style.display='';});
  var target=document.getElementById('mod'+n);if(target)target.classList.add('active');
  updateDots();
  if(n===1)startNumbers();if(n===2)startActions();if(n===3)startBalloons();
  if(n===4)startAnimalFind();if(n===5)startFlip();
  updateNav();
}
function updateNav(){
  document.getElementById('navPrev').disabled=(currentModule<=1);
  document.getElementById('navNext').textContent=(currentModule>=5)?'Done!':'Next';
  document.getElementById('navProgress').textContent=Math.min(currentModule,5)+'/5';
  document.querySelector('.nav-bar').style.display=(currentModule>=6)?'none':'';
}
function goNext(){if(currentModule<6)goModule(currentModule+1);}
function goPrev(){if(currentModule>1)goModule(currentModule-1);}
</script>

<!-- PART 4: Module 1 - Numbers Sprint -->
<script>
var numRound=0,numOrder=[],numBusy=false;

function startNumbers(){
  numRound=0;numOrder=shuffle([0,1,2,3,4]);numBusy=false;
  buildNumGrid();showNumPrompt();
}
function buildNumGrid(){
  var grid=document.getElementById('numGrid');grid.innerHTML='';
  shuffle(NUMBERS).forEach(function(n){
    var card=document.createElement('div');card.className='card';
    card.innerHTML=twimg(n.code,80)+'<div class="label">'+n.name+'</div>';
    card.onclick=function(e){checkNum(card,n,e);};grid.appendChild(card);
  });
}
function showNumPrompt(){
  if(numRound>=5){setInstr('All numbers found! 🎉','太厉害了，数字全部找对啦！',starsBar(5,5));return;}
  var target=NUMBERS[numOrder[numRound]];
  setInstr('Find: '+target.name+'! '+twimg(target.code,24),'点一点，哪个是 '+target.name+'？',starsBar(5,numRound));
  speak('Find '+target.name);
}
function checkNum(card,item,e){
  if(numRound>=5){speak(item.name);return;}
  if(numBusy)return;
  var target=NUMBERS[numOrder[numRound]];
  if(item.name===target.name){
    numBusy=true;var rect=card.getBoundingClientRect();
    burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    numRound++;
    setInstr('Find: '+target.name+'!','答对啦！这是 '+target.name+'！',starsBar(5,numRound));
    playCorrect();speak(target.name,function(){numBusy=false;buildNumGrid();showNumPrompt();});
  }else{
    speak(item.name);playWrong();
    card.style.animation='shake .4s ease';setTimeout(function(){card.style.animation='';},500);
  }
}
</script>

<script>
var actRound=0,actOrder=[],actBusy=false;

function startActions(){
  actRound=0;actOrder=shuffle([0,1,2,3,4]);actBusy=false;

}

    actRound++;
    setInstr('I can '+target.name+'!','答对啦！这是 '+target.name+'！',starsBar(5,actRound));
    playCorrect();speak(target.name,function(){actBusy=false;buildActGrid();showActPrompt();});

<!-- PART 6: Module 3 - Color Balloon Pop -->
<script>
var balloonRound=0,balloonOrder=[],balloonBusy=false,balloonTimers=[];

function startBalloons(){
  balloonRound=0;balloonOrder=shuffle([0,1,2,3,4]);balloonBusy=false;
  balloonTimers.forEach(clearTimeout);balloonTimers=[];
  showBalloonPrompt();
}
function showBalloonPrompt(){
  if(balloonRound>=5){
    setInstr('All colors popped! 🎈','太厉害了，颜色气球全部戳破啦！',starsBar(5,5));
    document.getElementById('balloonArea').innerHTML='';return;
  }
  var target=COLORS2[balloonOrder[balloonRound]];
  setInstr('Pop the '+target.name+' balloon! 🎈','戳破 '+target.name+' 颜色的气球！',starsBar(5,balloonRound));
  speak(target.name);
  spawnBalloons();
}
function spawnBalloons(){
  var area=document.getElementById('balloonArea');area.innerHTML='';
  var picks=shuffle(COLORS2).slice(0,4);
  var target=COLORS2[balloonOrder[balloonRound]];
  if(!picks.some(function(p){return p.name===target.name;})){picks[0]=target;picks=shuffle(picks);}
  picks.forEach(function(col,idx){
    var b=document.createElement('div');b.className='balloon';
    var x=10+idx*22;
    b.style.left=x+'%';b.style.bottom='-80px';
    b.innerHTML='<svg width="60" height="76" viewBox="0 0 60 76">'+
      '<ellipse cx="30" cy="30" rx="26" ry="30" fill="'+col.hex+'" stroke="rgba(0,0,0,.15)" stroke-width="1.5"/>'+
      '<line x1="30" y1="60" x2="30" y2="76" stroke="#999" stroke-width="2"/>'+
      '</svg><div style="text-align:center;font-size:14px;font-weight:700;color:#333;margin-top:-4px">'+col.name+'</div>';
    b.onclick=function(e){popBalloon(b,col,e);};
    area.appendChild(b);
    var t=setTimeout(function(){b.style.transition='bottom 8s linear';b.style.bottom='340px';},300+idx*500);
    balloonTimers.push(t);
  });
}
function popBalloon(el,col,e){
  if(balloonRound>=5||balloonBusy)return;
  var target=COLORS2[balloonOrder[balloonRound]];
  if(col.name===target.name){
    balloonBusy=true;var rect=el.getBoundingClientRect();
    burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    el.style.display='none';balloonRound++;
    setInstr('Pop the '+target.name+' balloon!','答对啦！这是 '+target.name+'！',starsBar(5,balloonRound));
    playCorrect();speak(target.name,function(){
      balloonBusy=false;balloonTimers.forEach(clearTimeout);balloonTimers=[];showBalloonPrompt();
    });
  }else{
    speak(col.name);playWrong();
    el.style.animation='shake .4s ease';setTimeout(function(){el.style.animation='';},500);
  }
}
</script>

<!-- PART 7: Module 4 - Animal Listen & Find -->
<script>
var animalRound=0,animalOrder=[],animalBusy=false;

function startAnimalFind(){
  animalRound=0;animalOrder=shuffle([0,1,2,3,4]);animalBusy=false;
  buildAnimalGrid();showAnimalPrompt();
}
function buildAnimalGrid(){
  var grid=document.getElementById('animalGrid');grid.innerHTML='';
  shuffle(ANIMALS2).forEach(function(a){
    var card=document.createElement('div');card.className='card';
    card.innerHTML=twimg(a.code,80)+'<div class="label">'+a.name+'</div>';
    card.onclick=function(e){checkAnimal(card,a,e);};grid.appendChild(card);
  });
}
function showAnimalPrompt(){
  if(animalRound>=5){
    setInstr('All animals found! 🐾','全部找到啦，耳朵真灵！',starsBar(5,5));return;
  }
  var target=ANIMALS2[animalOrder[animalRound]];
  setInstr('I see a '+target.name+'! '+twimg(target.code,24),
    '听一听，哪个是 '+target.name+'？点它！',starsBar(5,animalRound));
  speak('I see a '+target.name);
}
function checkAnimal(card,item,e){
  if(animalRound>=5){speak(item.name);return;}
  if(animalBusy)return;
  var target=ANIMALS2[animalOrder[animalRound]];
  if(item.name===target.name){
    animalBusy=true;var rect=card.getBoundingClientRect();
    burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    animalRound++;
    setInstr('I see a '+target.name+'!',
      '找对啦！这是 '+target.name+'！',starsBar(5,animalRound));
    playCorrect();speak(target.name,function(){
      animalBusy=false;buildAnimalGrid();showAnimalPrompt();
    });
  }else{
    speak(item.name);playWrong();
    card.style.animation='shake .4s ease';
    setTimeout(function(){card.style.animation='';},500);
  }
}
</script>

<!-- PART 8: Module 5 - Grand Mix Memory Flip -->
<script>
var flipFirst=null,flipMatched=0,flipLocked=false;

function startFlip(){
  flipFirst=null;flipMatched=0;flipLocked=false;
  setInstr('Find the pairs! 🃏','翻开两张一样的卡片，配成一对！',starsBar(5,0));
  speak('pairs');
  // Pick 5 items from all 4 categories (one from each + one random)
  var pool=[];
  pool.push({name:NUMBERS[Math.floor(Math.random()*5)].name,code:NUMBERS[Math.floor(Math.random()*5)].code,type:'num'});
  pool.push({name:ACTIONS[Math.floor(Math.random()*5)].name,code:ACTIONS[Math.floor(Math.random()*5)].code,type:'act'});
  var rc=COLORS2[Math.floor(Math.random()*5)];
  pool.push({name:rc.name,hex:rc.hex,type:'col'});
  pool.push({name:ANIMALS2[Math.floor(Math.random()*5)].name,code:ANIMALS2[Math.floor(Math.random()*5)].code,type:'ani'});
  // 5th random from any
  var extra=shuffle(NUMBERS.concat(ACTIONS).concat(ANIMALS2))[0];
  pool.push({name:extra.name,code:extra.code,type:'mix'});
  var pairs=shuffle(pool.concat(pool.map(function(p){return Object.assign({},p);})));
  buildFlipGrid(pairs);
}
function flipIcon(w,sz){
  if(w.hex)return '<div class="color-circle" style="background:'+w.hex+';width:'+sz+'px;height:'+sz+'px"></div>';
  return twimg(w.code,sz);
}
function buildFlipGrid(pairs){
  var grid=document.getElementById('flipGrid');grid.innerHTML='';
  pairs.forEach(function(w,i){
    var card=document.createElement('div');card.className='flip-card face-down';
    card.setAttribute('data-idx',i);card.setAttribute('data-name',w.name);
    card.innerHTML='<div class="flip-face">'+twimg('2753',40)+'</div>';
    card.onclick=function(e){flipCard(card,w,e);};
    grid.appendChild(card);
  });
}
function flipCard(el,word,e){
  if(flipLocked)return;
  if(el.classList.contains('matched'))return;
  if(!el.classList.contains('face-down'))return;
  el.classList.remove('face-down');
  el.querySelector('.flip-face').innerHTML=flipIcon(word,50);
  playPop();
  if(!flipFirst){speak(word.name);flipFirst={el:el,word:word};return;}
  flipLocked=true;
  if(flipFirst.word.name===word.name&&flipFirst.el!==el){
    var rect=el.getBoundingClientRect();
    burstStars(rect.left+rect.width/2,rect.top+rect.height/2);
    el.classList.add('matched');flipFirst.el.classList.add('matched');
    flipMatched++;
    setInstr('Find the pairs! 🃏','再翻两张，找一样的！',starsBar(5,flipMatched));
    playCorrect();speak(word.name,function(){
      flipFirst=null;flipLocked=false;
      if(flipMatched>=5){setInstr('All matched! 🎉','全部配对成功，你太棒了！',starsBar(5,5));}
    });
  }else{
    var prev=flipFirst.el;
    setTimeout(function(){
      el.classList.add('face-down');el.querySelector('.flip-face').innerHTML=twimg('2753',40);
      prev.classList.add('face-down');prev.querySelector('.flip-face').innerHTML=twimg('2753',40);
      flipFirst=null;flipLocked=false;
    },800);
    playWrong();
  }
}
</script>
