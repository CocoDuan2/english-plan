<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 5 - Family (Review)</title>
<style>
:root{--tip-accent:#8e24aa;--tip-bg:#f3e5f5}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(180deg,#fce4ec 0%,#f3e5f5 50%,#e1bee7 100%);display:flex;flex-direction:column;align-items:center}
.main{width:100%;max-width:500px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.top{position:sticky;top:0;width:100%;padding:10px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);text-align:center;z-index:100}
.en{font-size:26px;font-weight:800;color:#e91e8c}
.zh{display:inline-block;font-size:20px;font-weight:800;color:var(--tip-accent);margin-top:6px;padding:6px 14px;border-radius:12px;border:3px solid var(--tip-accent);background:var(--tip-bg)}
.stars{font-size:22px;letter-spacing:2px;margin-top:3px}
.mod{display:none;flex:1;width:100%;padding:18px 16px 74px;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.mod.on{display:flex}
.pr{display:flex;align-items:center;gap:10px;margin:10px 0}
.pr img{width:80px;height:auto}
.bbl{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:22px;font-weight:700;color:#8e24aa;position:relative}
.bbl::after{content:'';position:absolute;bottom:-10px;left:28px;border:6px solid transparent;border-top-color:#fff}
.start-btn{font-size:32px;font-weight:700;padding:20px 60px;border:none;border-radius:38px;background:linear-gradient(135deg,#ce93d8,#8e24aa);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(142,36,170,.35);margin-top:16px}
.start-btn:active{transform:scale(.96)}
/* Silhouette cards */
.sil-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px;margin-top:12px}
.sil-card{width:105px;height:130px;border-radius:16px;background:#2c3e50;box-shadow:0 3px 10px rgba(0,0,0,.15);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.4s;overflow:hidden}
.sil-card svg{filter:brightness(0);transition:.4s}
.sil-card.on{background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.sil-card.on svg{filter:none}
.sil-card div{font-size:20px;font-weight:800;color:#fff;text-transform:lowercase;margin-top:4px;transition:.3s}
.sil-card.on div{color:#2c3e50}
/* Food micro-review */
.food-quick{width:100%;max-width:500px;background:rgba(255,255,255,.8);border-radius:20px;padding:12px 10px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fq-title{font-size:24px;font-weight:900;color:#2c3e50}
.fq-row{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.fq-btn{width:100px;height:100px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.fq-btn div{font-size:18px;font-weight:800;color:#2c3e50}
.fq-btn.good{outline:4px solid #66bb6a}
.fq-btn.bad{outline:4px solid #ef5350}
/* Who's calling */
.call-area{width:100%;max-width:500px}
.call-prompt{font-size:28px;font-weight:900;color:#8e24aa;margin:10px 0}
.call-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.call-btn{width:140px;min-height:160px;background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;border:none;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.call-btn div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:6px}
.call-btn.good{outline:4px solid #66bb6a}
.call-btn.bad{outline:4px solid #ef5350}
/* Portrait builder */
.portrait{width:100%;max-width:500px;background:rgba(255,255,255,.85);border-radius:20px;padding:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.portrait-slots{display:flex;gap:8px;justify-content:center;min-height:120px;margin-bottom:12px;flex-wrap:wrap}
.p-slot{width:90px;height:110px;border:3px dashed #ce93d8;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.3s}
.p-slot.filled{border-style:solid;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.p-slot div{font-size:16px;font-weight:800;color:#8e24aa;text-transform:lowercase}
.portrait-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.p-opt{width:100px;height:110px;border:none;border-radius:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.p-opt div{font-size:18px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.p-opt.used{opacity:.3;pointer-events:none}
.p-opt.good{outline:4px solid #66bb6a}
.p-opt.bad{outline:4px solid #ef5350}
/* Who's missing */
.miss-area{width:100%;max-width:500px}
.miss-shown{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.miss-shown-item{width:80px;text-align:center}
.miss-shown-item div{font-size:16px;font-weight:800;color:#2c3e50;text-transform:lowercase}
.miss-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.miss-btn{width:120px;min-height:130px;background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;border:none;padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.miss-btn div{font-size:20px;font-weight:800;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.miss-btn.good{outline:4px solid #66bb6a}
.miss-btn.bad{outline:4px solid #ef5350}
/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#ce93d8;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.main{max-width:100%}.en{font-size:22px}.zh{font-size:16px;padding:4px 10px}
.stars{font-size:18px}.pr img{width:60px}.bbl{font-size:18px;padding:8px 12px}
.start-btn{font-size:26px;padding:16px 44px}
.sil-card{width:85px;height:110px}.call-btn{width:120px;min-height:140px}
.p-slot{width:75px;height:95px}.p-opt{width:85px;height:95px}
}
@media(min-width:768px){.main{max-width:800px}.call-btn{width:160px}}
</style>
</head>
<body>
<div class="main">
<div class="top">
<div class="en" id="en">Family Album Game</div>
<div class="zh" id="zh"></div>
<div class="stars" id="st"></div>
</div>
<div class="mod on" id="m0"></div>
<div class="mod" id="m1"></div>
<div class="mod" id="m2"></div>
<div class="mod" id="m3"></div>
<div class="mod" id="m4"></div>
<div class="mod" id="m5"></div>
</div>
<div class="nav">
<button class="nb" id="pb" onclick="go(-1)">&#9664; Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="xb" onclick="go(1)">Next &#9654;</button>
</div>
<script>
var PP='../../assets/peppa/';
var family=[
  {w:'mom',svg:'<circle cx="80" cy="58" r="34" fill="#f48fb1"/><rect x="52" y="88" width="56" height="52" rx="16" fill="#f48fb1"/><circle cx="70" cy="53" r="4" fill="#fff"/><circle cx="90" cy="53" r="4" fill="#fff"/><path d="M70 66 Q80 74 90 66" stroke="#fff" stroke-width="3" fill="none"/><ellipse cx="80" cy="36" rx="18" ry="6" fill="#ec407a"/>'},
  {w:'dad',svg:'<circle cx="80" cy="55" r="38" fill="#64b5f6"/><rect x="50" y="88" width="60" height="54" rx="16" fill="#64b5f6"/><circle cx="68" cy="50" r="4" fill="#fff"/><circle cx="92" cy="50" r="4" fill="#fff"/><path d="M68 64 Q80 72 92 64" stroke="#fff" stroke-width="3" fill="none"/><rect x="60" y="28" width="40" height="8" rx="4" fill="#1e88e5"/>'},
  {w:'baby',svg:'<circle cx="80" cy="68" r="26" fill="#fff9c4"/><rect x="60" y="90" width="40" height="38" rx="12" fill="#fff9c4"/><circle cx="73" cy="65" r="3.5" fill="#333"/><circle cx="87" cy="65" r="3.5" fill="#333"/><path d="M73 76 Q80 82 87 76" stroke="#e57373" stroke-width="2.5" fill="none"/><circle cx="80" cy="42" r="6" fill="#ffe082"/>'},
  {w:'brother',svg:'<circle cx="80" cy="58" r="30" fill="#81c784"/><rect x="55" y="84" width="50" height="48" rx="14" fill="#81c784"/><circle cx="71" cy="54" r="4" fill="#fff"/><circle cx="89" cy="54" r="4" fill="#fff"/><path d="M71 66 Q80 73 89 66" stroke="#fff" stroke-width="3" fill="none"/><rect x="68" y="34" width="24" height="6" rx="3" fill="#388e3c"/>'},
  {w:'sister',svg:'<circle cx="80" cy="58" r="30" fill="#ce93d8"/><rect x="55" y="84" width="50" height="48" rx="14" fill="#ce93d8"/><circle cx="71" cy="54" r="4" fill="#fff"/><circle cx="89" cy="54" r="4" fill="#fff"/><path d="M71 66 Q80 73 89 66" stroke="#fff" stroke-width="3" fill="none"/><polygon points="80,28 86,42 74,42" fill="#ab47bc"/>'}
];
var foodItems=[
  {w:'apple',svg:'<circle cx="80" cy="85" r="50" fill="#e74c3c"/><rect x="76" y="25" width="8" height="22" rx="4" fill="#795548"/><ellipse cx="90" cy="32" rx="14" ry="9" fill="#4CAF50"/>'},
  {w:'banana',svg:'<ellipse cx="80" cy="88" rx="42" ry="30" fill="#f9e44c"/><ellipse cx="80" cy="88" rx="32" ry="22" fill="#ffe066"/><rect x="72" y="38" width="6" height="24" rx="3" fill="#8d6e63"/>'},
  {w:'egg',svg:'<ellipse cx="80" cy="88" rx="36" ry="42" fill="#fff8e1"/><ellipse cx="80" cy="82" rx="22" ry="22" fill="#ffb300"/>'}
];
function svg(arr,i,s){return '<svg width="'+(s||80)+'" height="'+(s||80)+'" viewBox="0 0 160 160">'+arr[i].svg+'</svg>'}
function fsvg(i,s){return svg(family,i,s)}

var ac=null;
function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function tone(f,d){var c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.16)},200)}
function playNo(){tone(300,.3)}
function speak(t,cb){
  var u=t.indexOf(' ')>=0
    ?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web'
    :'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var a=new Audio(u),done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  a.onended=fin;a.onerror=fin;setTimeout(fin,4200);a.play().catch(fin);
}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'★':'☆';return s}
function setHead(en,zh,s){document.getElementById('en').textContent=en;document.getElementById('zh').textContent=zh;document.getElementById('st').textContent=s||''}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var cur=0,mods=['m0','m1','m2','m3','m4','m5'];

/* M0: Start page */
function init0(){
  document.getElementById('m0').innerHTML=
    '<img src="'+PP+'peppa-pig-happy-standing.png" width="140" alt="Peppa">'+
    '<div class="pr"><div class="bbl">Look at my family album!</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:430px">'+
      family.map(function(_,i){return fsvg(i,72)}).join('')+
    '</div>'+
    '<button class="start-btn" onclick="audio();go(1)">Start!</button>';
  setHead("Family Album Game",'点一点，开始家庭相册游戏！','');
}

/* M1: Food micro-review + silhouette reveal learn */
var fqOrder=[],fqIdx=0,fqScore=0,fqBusy=false,silDone={};
function init1(){
  fqOrder=shuffle([0,1,2]);fqIdx=0;fqScore=0;fqBusy=false;silDone={};
  document.getElementById('m1').innerHTML=
    '<div class="food-quick">'+
      '<div class="fq-title">Yesterday Quick Review</div>'+
      '<div style="font-size:20px;font-weight:800;color:#e67e22;margin-top:4px" id="fqPrompt"></div>'+
      '<div class="fq-row">'+foodItems.map(function(f,i){
        return '<button class="fq-btn" id="fq'+i+'" onclick="tapFq('+i+')">'+
          svg(foodItems,i,60)+'<div>'+f.w+'</div></button>';
      }).join('')+'</div>'+
    '</div>'+
    '<div class="pr"><img src="'+PP+'daddy-pig-walking.png" alt="Daddy"><div class="bbl" id="silBbl">Tap the shadows!</div></div>'+
    '<div class="sil-grid">'+family.map(function(f,i){
      return '<div class="sil-card" id="sc'+i+'" onclick="tapSil('+i+')">'+
        fsvg(i,70)+'<div>'+f.w+'</div></div>';
    }).join('')+'</div>';
  askFq();
  setHead('Review + New Words','先复习昨天，再点亮家人！',stars(0,8));
}
function askFq(){
  if(fqIdx>=3){document.getElementById('fqPrompt').textContent='Now tap the shadows!';return}
  var w=foodItems[fqOrder[fqIdx]].w;
  document.getElementById('fqPrompt').textContent='I like '+w+'!';
  speak(w);
}
function tapFq(i){
  if(fqBusy||fqIdx>=3)return;fqBusy=true;
  var target=fqOrder[fqIdx],el=document.getElementById('fq'+i);
  if(i===target){
    playOk();fqScore++;fqIdx++;el.classList.add('good');
    setHead('Yesterday review','复习答对啦！',stars(fqScore,8));
    speak('I like '+foodItems[i].w,function(){setTimeout(function(){el.classList.remove('good');fqBusy=false;askFq()},500)});
  }else{
    playNo();el.classList.add('bad');
    speak(foodItems[target].w,function(){setTimeout(function(){el.classList.remove('bad');fqBusy=false},350)});
  }
}
function tapSil(i){
  var el=document.getElementById('sc'+i);
  if(el.classList.contains('on')){speak(family[i].w);return}
  el.classList.add('on');silDone[i]=true;fqScore++;playOk();
  document.getElementById('silBbl').textContent='This is my '+family[i].w+'!';
  setHead('Meet the family!','点亮家人！',stars(fqScore,8));
  speak('This is my '+family[i].w);
}

/* M2: Who's Calling — hear sentence, pick the right family member */
var callOrder=[],callIdx=0,callScore=0,callLock=false;
function init2(){
  callOrder=shuffle([0,1,2,3,4]);callIdx=0;callScore=0;callLock=false;
  document.getElementById('m2').innerHTML=
    '<div class="call-area">'+
      '<div class="pr"><img src="'+PP+'emily-elephant-standing.png" alt="Emily"><div class="bbl" id="callBbl">Who is it?</div></div>'+
      '<div class="call-prompt" id="callPrompt"></div>'+
      '<div class="call-row" id="callRow"></div>'+
    '</div>';
  setupCall();
}
function setupCall(){
  if(callIdx>=5){
    setHead('All found!','家人都找到啦！',stars(5,5));
    document.getElementById('callBbl').textContent='Great job!';
    document.getElementById('callPrompt').textContent='';
    document.getElementById('callRow').innerHTML='';
    return;
  }
  var ti=callOrder[callIdx];
  var wrong=shuffle([0,1,2,3,4].filter(function(x){return x!==ti})).slice(0,2);
  var opts=shuffle([ti].concat(wrong));
  document.getElementById('callPrompt').textContent='This is my '+family[ti].w+'!';
  document.getElementById('callRow').innerHTML=opts.map(function(oi){
    return '<button class="call-btn" id="cb'+oi+'" onclick="tapCall('+oi+','+ti+')">'+
      fsvg(oi,80)+'<div>'+family[oi].w+'</div></button>';
  }).join('');
  setHead("Who's calling?",'听一听，谁在叫？',stars(callScore,5));
  speak('This is my '+family[ti].w);
}
function tapCall(picked,target){
  if(callLock)return;callLock=true;
  var el=document.getElementById('cb'+picked);
  if(picked===target){
    playOk();callScore++;callIdx++;el.classList.add('good');
    setHead('Found!','找对啦！',stars(callScore,5));
    speak(family[picked].w,function(){setTimeout(function(){el.classList.remove('good');callLock=false;setupCall()},600)});
  }else{
    playNo();el.classList.add('bad');
    speak(family[target].w,function(){setTimeout(function(){el.classList.remove('bad');callLock=false},350)});
  }
}

/* M3: Portrait Builder — hear name, tap correct person to fill slot */
var ptOrder=[],ptIdx=0,ptScore=0,ptLock=false;
function init3(){
  ptOrder=shuffle([0,1,2,3,4]);ptIdx=0;ptScore=0;ptLock=false;
  var slotsHtml=ptOrder.map(function(si,idx){
    return '<div class="p-slot" id="ps'+idx+'"><div style="font-size:28px;opacity:.3">?</div></div>';
  }).join('');
  var optsOrder=shuffle([0,1,2,3,4]);
  var optsHtml=optsOrder.map(function(oi){
    return '<button class="p-opt" id="po'+oi+'" onclick="tapPt('+oi+')">'+
      fsvg(oi,60)+'<div>'+family[oi].w+'</div></button>';
  }).join('');
  document.getElementById('m3').innerHTML=
    '<div class="pr"><img src="'+PP+'george_pig_dinosaur.png" alt="George"><div class="bbl" id="ptBbl">Build the portrait!</div></div>'+
    '<div class="portrait">'+
      '<div style="font-size:22px;font-weight:800;color:#2c3e50;margin-bottom:6px">Family Portrait</div>'+
      '<div class="portrait-slots" id="ptSlots">'+slotsHtml+'</div>'+
      '<div class="portrait-opts" id="ptOpts">'+optsHtml+'</div>'+
    '</div>';
  askPt();
}
function askPt(){
  if(ptIdx>=5){
    setHead('Portrait done!','全家福完成啦！',stars(5,5));
    document.getElementById('ptBbl').textContent='Beautiful family!';
    setTimeout(function(){go(1)},800);
    return;
  }
  var w=family[ptOrder[ptIdx]].w;
  document.getElementById('ptBbl').textContent='Find '+w+'!';
  setHead('Family portrait','拼全家福！找到 '+w+'！',stars(ptScore,5));
  speak('This is my '+w);
}
function tapPt(i){
  if(ptLock)return;ptLock=true;
  var target=ptOrder[ptIdx];
  var el=document.getElementById('po'+i);
  if(i===target){
    playOk();ptScore++;
    el.classList.add('good');
    var slot=document.getElementById('ps'+ptIdx);
    slot.innerHTML=fsvg(i,55)+'<div>'+family[i].w+'</div>';
    slot.classList.add('filled');
    speak(family[i].w,function(){
      setTimeout(function(){
        el.classList.remove('good');el.classList.add('used');
        ptIdx++;ptLock=false;askPt();
      },500);
    });
  }else{
    playNo();el.classList.add('bad');
    speak(family[target].w,function(){setTimeout(function(){el.classList.remove('bad');ptLock=false},350)});
  }
}

/* M4: Who's Missing — show 4 family members, guess the missing one */
var missOrder=[],missIdx=0,missScore=0,missLock=false;
function init4(){
  missOrder=shuffle([0,1,2,3,4]);missIdx=0;missScore=0;missLock=false;
  document.getElementById('m4').innerHTML=
    '<div class="miss-area">'+
      '<div class="pr"><img src="'+PP+'peppa_pig_bicycle.png" alt="Peppa"><div class="bbl" id="missBbl">Who is missing?</div></div>'+
      '<div class="miss-shown" id="missShown"></div>'+
      '<div class="miss-opts" id="missOpts"></div>'+
    '</div>';
  setupMiss();
}
function setupMiss(){
  if(missIdx>=5){
    setHead('All found!','都找到啦！',stars(5,5));
    document.getElementById('missBbl').textContent='Super!';
    document.getElementById('missShown').innerHTML='';
    document.getElementById('missOpts').innerHTML='';
    setTimeout(function(){go(1)},800);
    return;
  }
  var hidden=missOrder[missIdx];
  var shown=shuffle([0,1,2,3,4].filter(function(x){return x!==hidden}));
  document.getElementById('missShown').innerHTML=shown.map(function(si){
    return '<div class="miss-shown-item">'+fsvg(si,65)+'<div>'+family[si].w+'</div></div>';
  }).join('');
  var wrong=shuffle(shown).slice(0,2);
  var opts=shuffle([hidden].concat(wrong));
  document.getElementById('missOpts').innerHTML=opts.map(function(oi){
    return '<button class="miss-btn" id="mb'+oi+'" onclick="tapMiss('+oi+','+hidden+')">'+
      fsvg(oi,70)+'<div>'+family[oi].w+'</div></button>';
  }).join('');
  setHead("Who's missing?",'谁不见了？找找看！',stars(missScore,5));
  speak("Who is missing");
}
function tapMiss(picked,target){
  if(missLock)return;missLock=true;
  var el=document.getElementById('mb'+picked);
  if(picked===target){
    playOk();missScore++;missIdx++;el.classList.add('good');
    setHead('Found!','找到啦！',stars(missScore,5));
    speak('This is my '+family[picked].w,function(){setTimeout(function(){el.classList.remove('good');missLock=false;setupMiss()},600)});
  }else{
    playNo();el.classList.add('bad');
    speak(family[target].w,function(){setTimeout(function(){el.classList.remove('bad');missLock=false},350)});
  }
}

/* M5: Done page */
function init5(){
  document.getElementById('m5').innerHTML=
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="198" alt="Peppa family">'+
    '<div class="bbl" style="font-size:30px;margin-top:10px">All Done!</div>'+
    '<div style="font-size:26px;font-weight:800;color:#8e24aa;margin-top:10px">This is my mom, dad, baby, brother, sister!</div>'+
    '<button class="start-btn" style="font-size:24px;padding:14px 36px" onclick="restart()">Play Again</button>';
  setHead('Great Job!','家庭相册完成啦！',stars(6,6));
}

/* Navigation */
function restart(){
  document.getElementById(mods[cur]).classList.remove('on');
  cur=0;document.getElementById(mods[cur]).classList.add('on');
  init0();
  document.getElementById('pg').textContent='1/6';
  document.getElementById('pb').disabled=true;
  var xb=document.getElementById('xb');xb.textContent='Next \u25B6';xb.disabled=false;
}
var inits=[init0,init1,init2,init3,init4,init5];
function go(d){
  var n=cur+d;if(n<0||n>=mods.length)return;
  document.getElementById(mods[cur]).classList.remove('on');
  cur=n;document.getElementById(mods[cur]).classList.add('on');
  inits[cur]();
  document.getElementById('pg').textContent=(cur+1)+'/6';
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===mods.length-1){xb.textContent='Done';xb.disabled=true}
  else{xb.textContent='Next \u25B6';xb.disabled=false}
}
init0();
</script>
