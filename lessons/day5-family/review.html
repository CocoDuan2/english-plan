<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 5 Review - Family</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;height:100%;padding:20px 20px 80px}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:12px}
.te{font-size:26px;font-weight:900;color:#e91e8c;margin:4px 0}
.tz{font-size:20px;font-weight:700;color:#e67e22;background:#fff;border-radius:12px;padding:8px 14px;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #e1bee7}
.sb{font-size:22px;font-weight:700;color:#666;margin:4px 0}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.pr img{width:80px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:center;padding:0 20px}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
@media(max-width:480px){
  .te{font-size:22px}.tz{font-size:18px}.bbl{font-size:20px}.pr img{width:65px}
}
</style>
</head>
<body>
<div id="m0" class="mod on"></div>
<div id="m1" class="mod"></div>
<div id="m2" class="mod"></div>
<div id="m3" class="mod"></div>
<div id="m4" class="mod"></div>
<div id="m5" class="mod"></div>
<div class="nav" style="justify-content:space-between">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>&#9664; Back</button>
<div style="font-size:13px;color:#999" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>
<script>
var PP='../../assets/peppa/';
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/';
var W=[
  {w:'mom',tw:'1f469',emoji:'👩'},
  {w:'dad',tw:'1f468',emoji:'👨'},
  {w:'baby',tw:'1f476',emoji:'👶'},
  {w:'brother',tw:'1f466',emoji:'👦'},
  {w:'sister',tw:'1f467',emoji:'👧'}
];
var D4=[
  {w:'apple',tw:'1f34e'},{w:'banana',tw:'1f34c'},{w:'milk',tw:'1f95b'}
];
var actx,curM=0,score=0,totalQ=0;
function twImg(code,sz){return '<img src="'+TW+code+'.svg" width="'+(sz||90)+'">';}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d){var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d)}
function playOk(){tone(523,.1);setTimeout(function(){tone(659,.1)},100);setTimeout(function(){tone(784,.15)},200);showConfetti()}
function playNo(){tone(300,.3)}
function showConfetti(){var w=document.createElement("div");w.className="confetti-wrap";var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22","#e91e8c","#9b59b6"];for(var i=0;i<20;i++){var p=document.createElement("div");p.className="confetti-piece";p.style.left=Math.random()*100+"%";p.style.top=Math.random()*30+"%";p.style.background=colors[i%7];p.style.width=p.style.height=(6+Math.random()*8)+"px";p.style.animationDelay=Math.random()*.3+"s";w.appendChild(p)}document.body.appendChild(w);setTimeout(function(){w.remove()},1600)}
function speak(t,cb){
  var isSent=t.indexOf(' ')>-1;
  var primary=isSent?'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web':'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
  var fallback=isSent?'https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2':'https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
  var done=false;
  function fin(){if(done)return;done=true;if(cb)cb()}
  var a=new Audio(primary);
  a.onended=fin;a.onerror=function(){var b=new Audio(fallback);b.onended=fin;b.onerror=fin;setTimeout(fin,4000);b.play().catch(fin)};
  setTimeout(fin,4000);a.play().catch(function(){var b=new Audio(fallback);b.onended=fin;b.onerror=fin;setTimeout(fin,4000);b.play().catch(fin)});
}
function stars(n,t){var s='';for(var i=0;i<t;i++)s+=i<n?'⭐':'🩶';return s}
function setI(en,zh,s){document.getElementById('ie').textContent=en;document.getElementById('iz').textContent=zh;document.getElementById('sb').innerHTML=s||''}
function goM(d){
  curM+=d;if(curM<0)curM=0;if(curM>5)curM=5;
  document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
  document.getElementById('m'+curM).classList.add('on');
  document.getElementById('pg').textContent=(curM+1)+'/6';
  document.getElementById('pBtn').disabled=curM===0;
  var nb=document.getElementById('nBtn');
  if(curM===0){nb.textContent='Start!'}
  else if(curM>=5){nb.textContent='Done';nb.disabled=true}
  else{nb.textContent='Next ▶';nb.disabled=false}
  if(curM===1)initM1();if(curM===2)initM2();if(curM===3)initM3();if(curM===4)initM4();if(curM===5)initM5();
}

// M0: Start
document.getElementById('m0').innerHTML=
  '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
  '<img src="'+PP+'peppa-family-group-outdoors.png" width="140">'+
  '<div style="font-size:36px;font-weight:900;color:#e91e8c;margin:12px 0">Family Photo Day!</div>'+
  '<div style="font-size:22px;color:#666">mom · dad · baby · brother · sister</div>'+
  '<div id="ie" style="display:none"></div><div id="iz" style="display:none"></div><div id="sb" style="display:none"></div>'+
  '</div>';

// M1: Learn - tap cards to reveal family
var lnI=0,lnB=false,lnOrd;
function initM1(){
  lnI=0;lnB=false;lnOrd=shuffle([0,1,2,3,4]);
  var h='<div class="top"><div class="te">Meet the Family!</div><div class="tz">点一点,认识家人!</div><div class="sb" id="m1s"></div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:10px 0" id="m1cards">';
  for(var i=0;i<5;i++){
    h+='<div id="lc'+i+'" onclick="lnTap('+i+')" style="width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.1);transition:background .4s">';
    h+='<div style="opacity:0;transition:opacity .4s" id="lci'+i+'">'+twImg(W[i].tw,75)+'<div style="font-size:20px;font-weight:700;color:#2c3e50;margin-top:4px">'+W[i].w+'</div></div></div>';
  }
  h+='</div>';
  document.getElementById('m1').innerHTML=h;
  document.getElementById('m1s').innerHTML=stars(0,5);
  speak('Tap to meet family');
}
function lnTap(i){
  if(lnB)return;lnB=true;
  var card=document.getElementById('lc'+i);
  if(card.style.background==='#fff'){speak(W[i].w);lnB=false;return}
  card.style.background='#fff';
  document.getElementById('lci'+i).style.opacity='1';
  lnI++;
  document.getElementById('m1s').innerHTML=stars(lnI,5);
  playOk();speak(W[i].w,function(){lnB=false});
}

// M2: Yesterday Review (Day4 food micro-review)
var rvOrd,rvCur=0,rvB=false;
function initM2(){
  rvCur=0;rvB=false;rvOrd=shuffle([0,1,2]);
  renderRV();
}
function renderRV(){
  var idx=rvOrd[rvCur];
  var h='<div class="top"><div class="te">Remember Food?</div><div class="tz">还记得食物吗?</div><div class="sb" id="m2s">'+stars(rvCur,3)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'george-standing.png" width="75"><div class="bbl">Find '+D4[idx].w+'!</div></div>';
  h+='<div style="display:flex;gap:16px;justify-content:center;margin:20px 0">';
  var opts=shuffle([0,1,2]);
  for(var i=0;i<3;i++){
    h+='<div onclick="rvTap('+opts[i]+')" style="width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12)">'+twImg(D4[opts[i]].tw,70)+'</div>';
  }
  h+='</div><div id="rvfb" style="font-size:22px;font-weight:700;min-height:30px;margin:6px 0;text-align:center"></div>';
  document.getElementById('m2').innerHTML=h;
  speak('Find '+D4[idx].w);
}
function rvTap(i){
  if(rvB)return;rvB=true;
  var correct=rvOrd[rvCur];
  if(i===correct){
    playOk();rvCur++;
    document.getElementById('m2s').innerHTML=stars(rvCur,3);
    document.getElementById('rvfb').textContent='Yes! '+D4[correct].w+'!';
    if(rvCur>=3){setTimeout(function(){goM(1)},1200);return}
    setTimeout(function(){renderRV();rvB=false},1400);
  }else{
    playNo();document.getElementById('rvfb').textContent='Try again!';
    setTimeout(function(){document.getElementById('rvfb').textContent='';rvB=false},800);
  }
}

// M3: Shadow Match (drag family shadows to correct positions)
var shOrd,shCur=0,shB=false;
function initM3(){
  shCur=0;shB=false;shOrd=shuffle([0,1,2,3,4]);
  renderSH();
}
function renderSH(){
  var idx=shOrd[shCur];
  var h='<div class="top"><div class="te">Shadow Match!</div><div class="tz">找到对应的家人!</div><div class="sb" id="m3s">'+stars(shCur,5)+'</div></div>';
  h+='<div class="pr"><img src="'+PP+'peppa-pig-happy-standing.png" width="75"><div class="bbl">Find my '+W[idx].w+'!</div></div>';
  h+='<div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin:20px 0">';
  var opts=shuffle([0,1,2,3,4]).slice(0,3);
  if(opts.indexOf(idx)===-1)opts[Math.floor(Math.random()*3)]=idx;
  for(var i=0;i<opts.length;i++){
    h+='<div onclick="shTap('+opts[i]+')" style="width:110px;height:110px;border-radius:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.12)">'+twImg(W[opts[i]].tw,80)+'</div>';
  }
  h+='</div><div id="shfb" style="font-size:22px;font-weight:700;min-height:30px;margin:6px 0;text-align:center"></div>';
  document.getElementById('m3').innerHTML=h;
  speak('Find my '+W[idx].w);
}
function shTap(i){
  if(shB)return;shB=true;
  var correct=shOrd[shCur];
  if(i===correct){
    playOk();shCur++;score++;totalQ++;
    document.getElementById('m3s').innerHTML=stars(shCur,5);
    document.getElementById('shfb').textContent='This is my '+W[correct].w+'!';
    speak(W[correct].w);
    if(shCur>=5){setTimeout(function(){goM(1)},1200);return}
    setTimeout(function(){renderSH();shB=false},1600);
  }else{
    playNo();totalQ++;
    document.getElementById('shfb').textContent='Try again!';
    setTimeout(function(){document.getElementById('shfb').textContent='';shB=false},800);
  }
}

// M4: Memory Flip (match family pairs - all 5 members)
var fCards=[],fFlip=[],fMatch=0,fB=false;
function initM4(){
  fMatch=0;fFlip=[];fB=false;
  var pairs=[];
  for(var i=0;i<5;i++)pairs.push({idx:i,w:W[i].w,tw:W[i].tw},{idx:i,w:W[i].w,tw:W[i].tw});
  fCards=shuffle(pairs);
  var h='<div class="top"><div class="te">Memory Match!</div><div class="tz">翻牌配对!</div><div class="sb" id="m4s">'+stars(0,5)+'</div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:440px;margin:10px auto">';
  for(var i=0;i<10;i++){
    h+='<div id="fc'+i+'" onclick="fTap('+i+')" style="width:85px;height:85px;border-radius:14px;background:#F9ADC7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,.1)">❓</div>';
  }
  h+='</div>';
  document.getElementById('m4').innerHTML=h;
}
function fTap(i){
  if(fB||fFlip.length>=2)return;
  var el=document.getElementById('fc'+i);
  if(el.classList.contains('done')||fFlip.indexOf(i)>=0)return;
  el.innerHTML=twImg(fCards[i].tw,55);
  el.style.background='#fff';
  fFlip.push(i);
  speak(fCards[i].w);
  if(fFlip.length===2){
    fB=true;
    var a=fFlip[0],b=fFlip[1];
    if(fCards[a].idx===fCards[b].idx){
      playOk();fMatch++;
      document.getElementById('m4s').innerHTML=stars(fMatch,5);
      document.getElementById('fc'+a).classList.add('done');
      document.getElementById('fc'+b).classList.add('done');
      fFlip=[];fB=false;
      if(fMatch>=5)setTimeout(function(){goM(1)},1200);
    }else{
      playNo();
      setTimeout(function(){
        document.getElementById('fc'+a).innerHTML='❓';document.getElementById('fc'+a).style.background='#F9ADC7';
        document.getElementById('fc'+b).innerHTML='❓';document.getElementById('fc'+b).style.background='#F9ADC7';
        fFlip=[];fB=false;
      },800);
    }
  }
}

// M5: Done
function initM5(){
  document.getElementById('m5').innerHTML=
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
    '<img src="'+PP+'peppa-family-group-outdoors.png" width="120" style="margin-bottom:10px">'+
    '<div style="font-size:42px;font-weight:900;color:#e91e8c;margin:10px 0">Family photo done!</div>'+
    '<div style="font-size:24px;color:#666;margin:6px 0">I love my family! 👩👨👶👦👧</div>'+
    '<div style="font-size:28px;margin:10px 0">'+stars(5,5)+'</div>'+
    '<button onclick="location.reload()" style="margin-top:16px;padding:14px 32px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(249,173,199,.4)">Play Again 🔄</button>'+
    '</div>';
}

goM(0);
</script>
</body>
</html>
