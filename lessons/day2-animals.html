<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 2 - Animals 🐾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#a8edea 0%,#fed6e3 50%,#d4fc79 100%);
  overflow-x:hidden;padding:0;position:relative}

/* ===== Top Bar ===== */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08)}
.top-bar .title{font-size:18px;font-weight:800;color:#27ae60;flex:1}
.top-bar .home-btn{font-size:24px;text-decoration:none;cursor:pointer}

/* ===== Progress Dots ===== */
.progress-dots{display:flex;gap:8px;align-items:center}
.dot{width:14px;height:14px;border-radius:50%;background:#ddd;transition:.3s}
.dot.active{background:#27ae60;transform:scale(1.3)}
.dot.done{background:#2ecc71}

/* ===== Main Content ===== */
.main{padding:70px 16px 30px;max-width:600px;margin:0 auto}

/* ===== Section Common ===== */
.section{display:none;animation:fadeIn .5s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== Teacher Guide ===== */
.teacher-guide{background:rgba(255,255,255,.85);border-radius:16px;padding:14px 18px;
  margin-bottom:20px;border-left:5px solid #27ae60;font-size:15px;color:#555;line-height:1.6}
.teacher-guide .label{font-weight:800;color:#27ae60;font-size:13px;margin-bottom:4px}

/* ===== Section Title ===== */
.section-title{text-align:center;font-size:26px;font-weight:800;color:#fff;
  text-shadow:2px 2px 4px rgba(0,0,0,.15);margin:10px 0 20px}

/* ===== Cards Grid ===== */
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:10px 0}
.cards-grid.three-col{grid-template-columns:repeat(3,1fr)}

/* ===== Animal Card (New Words) ===== */
.animal-card{background:rgba(255,255,255,.9);border-radius:24px;padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:.3s;box-shadow:0 6px 20px rgba(0,0,0,.08);
  min-height:200px;justify-content:center;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;user-select:none}
.animal-card:active{transform:scale(.93)}
.animal-card .img-wrap{width:140px;height:140px;display:flex;align-items:center;justify-content:center;
  transition:.5s}
.animal-card .img-wrap svg{width:100%;height:100%}
.animal-card .img-wrap.gray{filter:grayscale(1) brightness(1.2) opacity(.5)}
.animal-card .word{font-size:24px;font-weight:800;color:#333;opacity:0;transition:.4s;
  text-transform:uppercase;letter-spacing:1px}
.animal-card .word.show{opacity:1}
.animal-card .sparkle{position:absolute;pointer-events:none;font-size:28px;
  animation:sparkleAnim .8s ease forwards}
@keyframes sparkleAnim{
  0%{opacity:1;transform:translate(0,0) scale(0)}
  50%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.2)}
  100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0)}
}

/* ===== Next Button ===== */
.next-btn{display:none;margin:30px auto 10px;padding:18px 50px;font-size:22px;font-weight:800;
  color:#fff;background:linear-gradient(135deg,#27ae60,#f1c40f);border:none;border-radius:50px;
  cursor:pointer;box-shadow:0 6px 20px rgba(39,174,96,.3);transition:.2s;
  animation:pulse 1.5s infinite}
.next-btn:active{transform:scale(.95)}
.next-btn.show{display:block}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ===== Greeting / Review Section ===== */
.greeting-area{text-align:center;padding:20px 0}
.greeting-emoji{font-size:100px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.greeting-text{font-size:28px;font-weight:800;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,.15);
  margin:20px 0}
.review-btns{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-top:20px}
.review-btn{width:140px;height:140px;border-radius:28px;border:none;cursor:pointer;
  transition:.2s;box-shadow:0 6px 16px rgba(0,0,0,.12);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;font-size:20px;font-weight:800;
  -webkit-tap-highlight-color:transparent;user-select:none}
.review-btn:active{transform:scale(.9)}
.review-btn .color-circle{width:70px;height:70px;border-radius:50%}

/* ===== Egg Hatch Game ===== */
.egg-card{background:rgba(255,255,255,.9);border-radius:28px;padding:24px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;transition:.3s;box-shadow:0 6px 20px rgba(0,0,0,.08);
  min-height:220px;justify-content:center;position:relative;
  -webkit-tap-highlight-color:transparent;user-select:none}
.egg-card:active{transform:scale(.93)}
.egg-card .egg-emoji{font-size:100px;transition:.3s}
.egg-card .egg-emoji.crack{animation:eggCrack .6s ease forwards}
.egg-card .hatched{display:none;flex-direction:column;align-items:center;gap:8px}
.egg-card .hatched svg{width:120px;height:120px}
.egg-card .hatched .hatch-label{font-size:22px;font-weight:800;color:#333}
.egg-card.opened .egg-emoji{display:none}
.egg-card.opened .hatched{display:flex}
@keyframes eggCrack{
  0%{transform:rotate(0)}
  20%{transform:rotate(-10deg)}
  40%{transform:rotate(10deg)}
  60%{transform:rotate(-5deg)}
  80%{transform:rotate(5deg) scale(1.1)}
  100%{transform:rotate(0) scale(0);opacity:0}
}

/* ===== Listen & Find ===== */
.listen-prompt{text-align:center;background:rgba(255,255,255,.9);border-radius:20px;
  padding:20px;margin-bottom:20px;font-size:22px;font-weight:700;color:#555;
  box-shadow:0 4px 15px rgba(0,0,0,.06)}
.listen-prompt .prompt-word{font-size:32px;font-weight:900;color:#27ae60;display:block;margin-top:8px}
.listen-choice{background:rgba(255,255,255,.85);border-radius:24px;padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  transition:.3s;box-shadow:0 4px 15px rgba(0,0,0,.06);min-height:180px;justify-content:center;
  -webkit-tap-highlight-color:transparent;user-select:none}
.listen-choice:active{transform:scale(.93)}
.listen-choice svg{width:110px;height:110px}
.listen-choice .choice-emoji{font-size:90px}
.listen-choice .choice-label{font-size:20px;font-weight:700;color:#666}
.listen-choice.correct{animation:correctPop .5s ease;background:rgba(46,204,113,.2);
  border:3px solid #2ecc71}
.listen-choice.wrong{animation:shake .4s ease;background:rgba(231,76,60,.1);
  border:3px solid #e74c3c}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ===== Whack-a-Mole ===== */
.mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:10px 0}
.mole-hole{aspect-ratio:1;background:linear-gradient(180deg,#8B4513 0%,#654321 100%);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;box-shadow:inset 0 6px 12px rgba(0,0,0,.3),0 4px 8px rgba(0,0,0,.15);
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;user-select:none}
.mole-hole .mole-content{position:absolute;bottom:-100%;transition:.3s ease;
  display:flex;flex-direction:column;align-items:center;gap:4px}
.mole-hole .mole-content svg{width:70px;height:70px}
.mole-hole .mole-content .mole-emoji{font-size:60px}
.mole-hole .mole-content .mole-label{font-size:14px;font-weight:800;color:#fff;
  text-shadow:1px 1px 2px rgba(0,0,0,.5)}
.mole-hole.up .mole-content{bottom:10%}
.mole-hole.hit{background:rgba(46,204,113,.3)}

/* ===== Score / Stars ===== */
.score-bar{text-align:center;font-size:28px;margin:10px 0}

/* ===== Star Burst ===== */
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-burst .star{position:absolute;font-size:30px;animation:starFly 1s ease forwards}
@keyframes starFly{
  0%{opacity:1;transform:translate(0,0) scale(0) rotate(0deg)}
  50%{opacity:1;transform:translate(var(--sx),var(--sy)) scale(1.2) rotate(180deg)}
  100%{opacity:0;transform:translate(var(--ex),var(--ey)) scale(0) rotate(360deg)}
}

/* ===== Completion ===== */
.completion{text-align:center;padding:40px 20px}
.completion .big-emoji{font-size:100px;animation:bounce 1s infinite}
.completion .msg{font-size:26px;font-weight:800;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,.15);margin:20px 0}
.completion .home-link{display:inline-block;padding:16px 40px;font-size:20px;font-weight:700;
  color:#fff;background:linear-gradient(135deg,#2ecc71,#27ae60);border-radius:50px;
  text-decoration:none;box-shadow:0 6px 20px rgba(46,204,113,.3)}

/* ===== Whack Target Prompt ===== */
.whack-prompt{text-align:center;background:rgba(255,255,255,.9);border-radius:20px;
  padding:16px;margin-bottom:16px;font-size:20px;font-weight:700;color:#555;
  box-shadow:0 4px 15px rgba(0,0,0,.06)}
.whack-prompt .target-word{font-size:28px;font-weight:900;color:#e74c3c;display:block;margin-top:6px}

/* ===== Responsive ===== */
@media(min-width:600px){
  .animal-card .img-wrap{width:180px;height:180px}
  .egg-card .hatched svg{width:150px;height:150px}
  .egg-card .egg-emoji{font-size:120px}
  .listen-choice svg{width:130px;height:130px}
  .listen-choice .choice-emoji{font-size:110px}
  .mole-hole .mole-content svg{width:90px;height:90px}
  .mole-hole .mole-content .mole-emoji{font-size:80px}
  .review-btn{width:170px;height:170px}
  .review-btn .color-circle{width:90px;height:90px}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <a class="home-btn" href="../index.html">🏠</a>
  <div class="title">Day 2 · Animals 🐾</div>
  <div class="progress-dots" id="progressDots">
    <div class="dot" data-step="0"></div>
    <div class="dot" data-step="1"></div>
    <div class="dot" data-step="2"></div>
    <div class="dot" data-step="3"></div>
    <div class="dot" data-step="4"></div>
  </div>
</div>
