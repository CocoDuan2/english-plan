<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 7 - Actions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 74px;text-align:center}
.sl.on{display:flex}
.bg-title{background:linear-gradient(165deg,#e3f2fd,#bbdefb)}
.bg-hello{background:linear-gradient(180deg,#fff3e0,#ffe0b2)}
.bg-yesterday{background:linear-gradient(160deg,#e8f5e9,#c8e6c9)}
.bg-run{background:linear-gradient(160deg,#fff3e0,#ffcc80)}
.bg-jump{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-walk{background:linear-gradient(160deg,#e0f7fa,#b2ebf2)}
.bg-sit{background:linear-gradient(160deg,#f3e5f5,#e1bee7)}
.bg-stand{background:linear-gradient(160deg,#fff9c4,#fff176)}
.bg-whistle{background:linear-gradient(160deg,#e8eaf6,#c5cae9)}
.bg-team{background:linear-gradient(160deg,#e0f2f1,#b2dfdb)}
.bg-bye{background:linear-gradient(180deg,#42a5f5,#7ec8e3 58%,#b3e5fc)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:6px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-transform:lowercase;color:#2c3e50;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pr img{width:85px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;font-size:26px;font-weight:700;color:#1565c0;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj{margin:8px 0}
.review-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:760px;margin-top:14px}
.review-card{width:130px;min-height:130px;background:#fff;border-radius:20px;padding:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;justify-content:center}
.review-num{font-size:42px;font-weight:900;color:#43a047}
.review-word{font-size:26px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:4px}
.whistle-grid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:700px;margin-top:10px}
.w-btn{width:130px;height:130px;border:none;border-radius:20px;background:linear-gradient(145deg,#90caf9,#64b5f6);color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;overflow:hidden;transition:.3s}
.w-btn span{font-size:22px;font-weight:900;text-transform:lowercase;opacity:0;transform:translateY(10px);transition:.3s}
.w-btn .inner{opacity:0;transform:scale(.6);transition:.3s}
.w-btn.on span,.w-btn.on .inner{opacity:1;transform:translateY(0) scale(1)}
.w-btn.on{background:#fff;color:#2c3e50;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:900px;margin-top:10px}
.ti{background:#fff;border-radius:16px;padding:12px;box-shadow:0 3px 10px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center}
.ti .wlabel{font-size:28px;font-weight:900;color:#2c3e50;text-transform:lowercase;margin-top:6px}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:#64b5f6;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(100,181,246,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:126px;right:16px;z-index:199;width:330px;max-height:42vh;background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 16px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#64b5f6;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.ttl{font-size:46px}.sub{font-size:24px}.word{font-size:100px}.w-btn{width:150px;height:150px}}
</style>
</head>

<script>
var notes={
"0":"Title page: Mummy Pig leads Sports Day. 5 action stick figures preview. No words yet — just look at the fun poses!",
"1":"Story setup: Daddy Pig and Peppa get ready for sports day. Image-led, no sentence drills. Just excitement!",
"2":"Yesterday review: 3 number items quick recall. Teacher points, kids say 'I have one/three/five'. 2 min max.",
"3":"run: Show running figure. 'I can run!' Kids repeat 3x. Teacher: pretend to run in place!",
"4":"jump: Show jumping figure. 'I can jump!' Kids repeat 3x. Teacher: let's jump together!",
"5":"walk: Show walking figure. 'I can walk!' Kids repeat 3x. Teacher: walk slowly, walk fast!",
"6":"sit: Show sitting figure. 'I can sit!' Kids repeat 3x. Teacher: sit down now!",
"7":"stand: Show standing figure. 'I can stand!' Kids repeat 3x. Teacher: stand up tall!",
"8":"Whistle Reveal: Teacher taps each blue button to reveal the action. Ask 'What can you do?' before tapping.",
"9":"All Together: Random point and ask. 'Can you run? I can run!' Mix up order.",
"10":"Celebrate! Do all 5 actions together one final time. I can run, jump, walk, sit, stand!"
};

var actionWords=["run","jump","walk","sit","stand"];

function whistleTap(i){
  var el=document.getElementById('wb'+i);
  if(!el||el.classList.contains('on'))return;
  el.classList.add('on');
  document.getElementById('whistleBbl').textContent='I can '+actionWords[i]+'!';
}

var cur=0,total=11,open=false;
function goTo(n){
  if(n<0||n>=total)return;
  document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.sl')[n].classList.add('on');
  cur=n;
  document.getElementById('pg').textContent=(cur+1)+'/'+total;
  document.getElementById('pb').disabled=cur===0;
  var xb=document.getElementById('xb');
  if(cur===total-1){xb.textContent='Done';xb.disabled=true}else{xb.textContent='Next \u25B6';xb.disabled=false}
  document.getElementById('B').innerHTML=notes[cur]||'';
}
function go(d){goTo(cur+d)}
function tn(){open=!open;document.getElementById('P').classList.toggle('on',open);document.getElementById('F').classList.toggle('on',open)}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});
document.addEventListener('click',function(e){
  if(open&&!e.target.closest('.pop')&&!e.target.closest('.fab')){
    open=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on');
  }
});
goTo(0);
</script>
