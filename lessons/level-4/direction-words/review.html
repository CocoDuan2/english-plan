<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 39 Review - Direction Words</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#74b9ff,#a29bfe);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(116,185,255,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(116,185,255,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.learn-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:600px}
.learn-card{width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .3s;position:relative}
.learn-card.revealed{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card img{width:90px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-card .lbl{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .lbl{opacity:1}
.card-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:44px}
.learn-card.revealed .card-icon{display:none}
.maze-wrap{position:relative;width:320px;height:320px;background:#ecf0f1;border-radius:20px;margin:20px auto;border:4px solid #2c3e50}
.maze-cell{position:absolute;width:60px;height:60px;border:2px solid #bdc3c7;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;transition:background .2s}
.maze-cell:hover{background:rgba(52,152,219,.1)}
.maze-cell.visited{background:#3498db;color:#fff}
.peppa-token{position:absolute;width:50px;height:50px;transition:all .4s ease;z-index:10}
.maze-goal{background:#2ecc71!important;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:600px}
.listen-card{width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px}
.listen-card .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.replay-btn{width:60px;height:60px;border-radius:50%;border:none;background:#3498db;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(52,152,219,.3);margin:10px auto;display:flex;align-items:center;justify-content:center}
.replay-btn:active{transform:scale(.9)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;width:440px;margin:20px auto}
.mem-card{width:100%;aspect-ratio:1;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flip{transform:rotateY(180deg)}
.mem-card.matched{opacity:.5;pointer-events:none}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.mem-front{background:#3498db}
.mem-back{background:#fff;transform:rotateY(180deg);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.mem-back img{width:70px}
.mem-back .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.mem-front .card-icon{font-size:44px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.learn-card{width:100px;height:100px}
.learn-card img{width:80px}
.learn-card .lbl{font-size:18px}
.maze-wrap{width:280px;height:280px}
.maze-cell{width:50px;height:50px;font-size:30px}
.peppa-token{width:40px;height:40px}
.listen-card{width:90px;height:90px}
.listen-card img{width:60px}
.listen-card .lbl{font-size:16px}
.mem-grid{width:360px;gap:10px}
.mem-back img{width:60px}
.mem-back .lbl{font-size:16px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa" style="width:110px;margin-bottom:20px">
<div class="te">Direction Words</div>
<div class="tz">Let's play!</div>
<div style="display:flex;gap:20px;margin-top:30px;flex-wrap:wrap;justify-content:center">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b06.svg" width="60" alt="up">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b07.svg" width="60" alt="down">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b05.svg" width="60" alt="left">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/27a1.svg" width="60" alt="right">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d1.svg" width="60" alt="stop">
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，学单词！</div>
<div class="sb" id="st1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Direction Maze -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Direction Maze</div>
<div class="tz">听指令，走迷宫！</div>
<div class="sb" id="st2"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-walking.png" alt="Peppa">
<div class="bbl">Help me reach the goal!</div>
</div>
<div class="maze-wrap" id="maze">
<img src="../../assets/peppa/candy-cat-green-dress.png" class="peppa-token" id="token" style="top:10px;left:10px">
</div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，找一找！</div>
<div class="sb" id="st3"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">Listen and tap!</div>
<button class="replay-btn" onclick="playCurrentWord()">🔊</button>
</div>
<div class="listen-grid" id="lig"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一样的！</div>
<div class="sb" id="st4"><span style="color:#bbb">★★★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">Find the pairs!</div>
</div>
<div class="mem-grid" id="mg"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family" style="width:120px;margin-bottom:20px">
<div class="te">All Done!</div>
<div class="tz">Great job!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="nb" onclick="goM(-5)" style="margin-top:30px">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{word:'up',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b06.svg'},
{word:'down',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b07.svg'},
{word:'left',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b05.svg'},
{word:'right',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/27a1.svg'},
{word:'stop',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d1.svg'}
];
var curM=0,busy=false;
var m1Stars=0,m2Stars=0,m3Stars=0,m4Stars=0;
var currentWord='';
var mazeSteps=0;
var mazeGoal={x:4,y:4};
var peppaPos={x:0,y:0};

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
var g=document.getElementById('lg');
g.innerHTML='';
m1Stars=0;
W.forEach(function(w){
var c=document.createElement('div');
c.className='learn-card';
c.innerHTML='<div class="card-icon">❓</div><img src="'+w.img+'" alt="'+w.word+'"><div class="lbl">'+w.word+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
speak(w.word);
m1Stars++;
document.getElementById('st1').innerHTML=stars(m1Stars,5);
};
g.appendChild(c);
});
}

function initM2(){
var maze=document.getElementById('maze');
maze.innerHTML='<img src="'+PP+'peppa-pig-happy-standing.png" class="peppa-token" id="token" style="top:10px;left:10px">';
peppaPos={x:0,y:0};
mazeSteps=0;
m2Stars=0;
document.getElementById('st2').innerHTML='<span style="color:#bbb">★★★★★</span>';

var directions=['up','right','down','right','down'];
var path=[
{x:0,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1},{x:2,y:2},{x:2,y:3}
];

for(var i=0;i<5;i++){
for(var j=0;j<5;j++){
var cell=document.createElement('div');
cell.className='maze-cell';
cell.style.left=(j*60+10)+'px';
cell.style.top=(i*60+10)+'px';
cell.dataset.x=j;
cell.dataset.y=i;
if(i===4&&j===4){
cell.classList.add('maze-goal');
cell.innerHTML='🎯';
}
maze.appendChild(cell);
}
}

var step=0;
function nextStep(){
if(step>=directions.length){
playOk();
m2Stars=5;
document.getElementById('st2').innerHTML=stars(5,5);
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
return;
}
var dir=directions[step];
speak(dir);
busy=true;
setTimeout(function(){
busy=false;
},2000);
step++;
}

maze.onclick=function(e){
if(busy)return;
if(e.target.classList.contains('maze-cell')){
var x=parseInt(e.target.dataset.x);
var y=parseInt(e.target.dataset.y);
var dx=x-peppaPos.x;
var dy=y-peppaPos.y;
var dir='';
if(dx===1&&dy===0)dir='right';
else if(dx===-1&&dy===0)dir='left';
else if(dx===0&&dy===1)dir='down';
else if(dx===0&&dy===-1)dir='up';
else return;

peppaPos={x:x,y:y};
var token=document.getElementById('token');
token.style.left=(x*60+10)+'px';
token.style.top=(y*60+10)+'px';
e.target.classList.add('visited');
mazeSteps++;

if(x===4&&y===4){
playOk();
m2Stars=5;
document.getElementById('st2').innerHTML=stars(5,5);
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}else{
nextStep();
}
}
};

nextStep();
}

function initM3(){
var g=document.getElementById('lig');
g.innerHTML='';
m3Stars=0;
document.getElementById('st3').innerHTML='<span style="color:#bbb">★★★★★</span>';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
currentWord=shuffled[0].word;
speak(currentWord);
shuffled.forEach(function(w){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+w.img+'" alt="'+w.word+'"><div class="lbl">'+w.word+'</div>';
c.onclick=function(){
if(busy)return;
busy=true;
if(w.word===currentWord){
playOk();
m3Stars++;
document.getElementById('st3').innerHTML=stars(m3Stars,5);
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
setTimeout(function(){
busy=false;
if(m3Stars<5){
var remaining=shuffled.filter(function(x){return x.word!==currentWord});
if(remaining.length>0){
currentWord=remaining[Math.floor(Math.random()*remaining.length)].word;
speak(currentWord);
}
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
g.appendChild(c);
});
}

function playCurrentWord(){
if(currentWord)speak(currentWord);
}

function initM4(){
var g=document.getElementById('mg');
g.innerHTML='';
m4Stars=0;
document.getElementById('st4').innerHTML='<span style="color:#bbb">★★★★★</span>';
var pairs=W.slice(0,5);
var cards=[];
pairs.forEach(function(p){
cards.push({word:p.word,img:p.img,id:p.word});
cards.push({word:p.word,img:p.img,id:p.word});
});
cards.sort(function(){return Math.random()-.5});
var flipped=[];
cards.forEach(function(cd){
var c=document.createElement('div');
c.className='mem-card';
c.innerHTML='<div class="mem-face mem-front"><div class="card-icon">❓</div></div><div class="mem-face mem-back"><img src="'+cd.img+'" alt="'+cd.word+'"><div class="lbl">'+cd.word+'</div></div>';
c.dataset.id=cd.id;
c.onclick=function(){
if(busy||c.classList.contains('flip')||c.classList.contains('matched'))return;
c.classList.add('flip');
flipped.push(c);
if(flipped.length===2){
busy=true;
setTimeout(function(){
if(flipped[0].dataset.id===flipped[1].dataset.id){
playOk();
flipped[0].classList.add('matched');
flipped[1].classList.add('matched');
m4Stars++;
document.getElementById('st4').innerHTML=stars(m4Stars,5);
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
if(m4Stars===5){
setTimeout(function(){goM(1)},1500);
}
}else{
playNo();
flipped[0].classList.remove('flip');
flipped[1].classList.remove('flip');
}
flipped=[];
busy=false;
},800);
}
};
g.appendChild(c);
});
}

function initM5(){
// Done page, no init needed
}

goM(0);
</script>
</body>
</html>
