<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 36 Review - Sports Day</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#667eea,#764ba2);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#fff;margin:8px 0;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(102,126,234,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(102,126,234,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#fff;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#667eea;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.learn-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.learn-card{width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .3s;position:relative}
.learn-card.revealed{background:#fff}
.learn-card img{width:90px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-card .lbl{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .lbl{opacity:1}
.card-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:44px}
.learn-card.revealed .card-icon{display:none}
.sport-zone{width:110px;height:110px;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:18px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s}
.sport-zone:active{transform:scale(.95)}
.sport-zone img{width:60px}
.sport-field{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.listen-card{width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px}
.listen-card .lbl{font-size:20px;font-weight:700;color:#2c3e50}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:440px;margin:20px 0}
.mem-card{width:100%;aspect-ratio:1;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.mem-front{background:linear-gradient(135deg,#667eea,#764ba2)}
.mem-back{background:#fff;transform:rotateY(180deg)}
.mem-back img{width:70px}
.mem-back .lbl{font-size:18px;font-weight:700;color:#2c3e50;margin-top:6px}
.mem-front .icon{font-size:44px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #667eea;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#667eea;color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.sport-zone{width:90px;height:90px;font-size:16px}
.sport-zone img{width:50px}
.mem-grid{width:100%;max-width:360px;grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="top">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa" style="width:110px;margin-bottom:20px">
<div class="te">Sports Day</div>
<div class="tz">Let's play sports!</div>
</div>
<div style="display:flex;gap:20px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg" width="60" alt="kick">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c0.svg" width="60" alt="throw">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f94e.svg" width="60" alt="catch">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c3.svg" width="60" alt="race">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c6.svg" width="60" alt="win">
</div>
<button class="nb" onclick="goM(1)" style="margin-top:20px;font-size:24px;padding:18px 40px">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="sb" id="st1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="tz">点一点，学新词！</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Sports Action Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Sports Action Game</div>
<div class="sb" id="st2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Listen and tap!</div>
</div>
<div class="tz">听一听，点运动！</div>
<div class="sport-field" id="sf"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="sb" id="st3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat">
<div class="bbl">Find the word!</div>
</div>
<div class="tz">听一听，找一找！</div>
<div class="listen-grid" id="lsg"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="sb" id="st4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily Elephant">
<div class="bbl">Match the pairs!</div>
</div>
<div class="tz">翻一翻，找一样的！</div>
<div class="mem-grid" id="mg"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="top">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Peppa Family" style="width:120px;margin-bottom:20px">
<div class="te">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="tz">Great job! You learned 5 sports words!</div>
</div>
<button class="nb" onclick="goM(0)" style="margin-top:20px;font-size:24px;padding:18px 40px">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'kick',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg'},
{w:'throw',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c0.svg'},
{w:'catch',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f94e.svg'},
{w:'race',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c3.svg'},
{w:'win',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c6.svg'}
];
var curM=0,busy=false;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
var lg=document.getElementById('lg');
lg.innerHTML='';
var revealed=0;
W.forEach(function(item){
var card=document.createElement('div');
card.className='learn-card';
card.innerHTML='<div class="card-icon">❓</div><img src="'+item.e+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
card.onclick=function(){
if(card.classList.contains('revealed'))return;
card.classList.add('revealed');
speak(item.w);
revealed++;
document.getElementById('st1').innerHTML=stars(revealed,5);
};
lg.appendChild(card);
});
}

function initM2(){
var sf=document.getElementById('sf');
sf.innerHTML='';
var score=0;
var seq=W.slice().sort(function(){return Math.random()-.5});
var idx=0;
var colors=['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)'];
W.forEach(function(item,i){
var zone=document.createElement('button');
zone.className='sport-zone';
zone.style.background=colors[i];
zone.innerHTML='<img src="'+item.e+'" alt="'+item.w+'"><span>'+item.w+'</span>';
zone.onclick=function(){
if(busy)return;
if(item.w===seq[idx].w){
busy=true;
playOk();
speak(item.w);
score++;
document.getElementById('st2').innerHTML=stars(score,5);
idx++;
setTimeout(function(){
busy=false;
if(idx>=seq.length){
setTimeout(function(){goM(1)},800);
}else{
speak(seq[idx].w);
}
},1200);
}else{
playNo();
}
};
sf.appendChild(zone);
});
setTimeout(function(){speak(seq[0].w)},500);
}

function initM3(){
var lsg=document.getElementById('lsg');
lsg.innerHTML='';
var score=0;
var seq=W.slice().sort(function(){return Math.random()-.5});
var idx=0;
W.forEach(function(item){
var card=document.createElement('div');
card.className='listen-card';
card.innerHTML='<img src="'+item.e+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
card.onclick=function(){
if(busy)return;
if(item.w===seq[idx].w){
busy=true;
playOk();
speak(item.w);
score++;
document.getElementById('st3').innerHTML=stars(score,5);
idx++;
setTimeout(function(){
busy=false;
if(idx>=seq.length){
setTimeout(function(){goM(1)},800);
}else{
speak(seq[idx].w);
}
},1200);
}else{
playNo();
}
};
lsg.appendChild(card);
});
setTimeout(function(){speak(seq[0].w)},500);
}

function initM4(){
var mg=document.getElementById('mg');
mg.innerHTML='';
var pairs=W.concat(W).sort(function(){return Math.random()-.5});
var flipped=[];
var matched=0;
pairs.forEach(function(item){
var card=document.createElement('div');
card.className='mem-card';
card.innerHTML='<div class="mem-face mem-front"><div class="icon">🏃</div></div><div class="mem-face mem-back"><img src="'+item.e+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div></div>';
card.dataset.word=item.w;
card.onclick=function(){
if(busy||card.classList.contains('flipped'))return;
card.classList.add('flipped');
flipped.push(card);
if(flipped.length===2){
busy=true;
setTimeout(function(){
if(flipped[0].dataset.word===flipped[1].dataset.word){
playOk();
speak(flipped[0].dataset.word);
matched++;
document.getElementById('st4').innerHTML=stars(matched,5);
flipped=[];
busy=false;
if(matched===5){
setTimeout(function(){goM(1)},1000);
}
}else{
playNo();
flipped.forEach(function(c){c.classList.remove('flipped')});
flipped=[];
busy=false;
}
},800);
}
};
mg.appendChild(card);
});
}

function initM5(){
document.getElementById('st1').innerHTML=stars(5,5);
document.getElementById('st2').innerHTML=stars(5,5);
document.getElementById('st3').innerHTML=stars(5,5);
document.getElementById('st4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
