<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 35 Review - Cooking Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#ffe5d0,#ffd4a3);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e67e22;margin:8px 0;text-shadow:0 2px 4px rgba(230,126,34,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff9a9e,#fad0c4);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,154,158,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,154,158,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px;margin:20px 0}
.card{width:100%;aspect-ratio:1;background:#ddd;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card.revealed{background:#fff}
.card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.card.revealed img{opacity:1}
.card-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.card.revealed .card-label{opacity:1}
.kitchen-wrap{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:20px 0;max-width:600px}
.kitchen-btn{width:120px;height:120px;border-radius:20px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,.15);transition:transform .2s}
.kitchen-btn:active{transform:scale(.9)}
.kitchen-btn img{width:70px;height:auto;margin-bottom:8px}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:500px;margin:20px 0}
.listen-card{background:#fff;border-radius:16px;padding:16px;text-align:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:90px;height:auto;margin-bottom:8px}
.listen-card-label{font-size:20px;font-weight:700;color:#2c3e50}
.speaker-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ff9a9e,#fad0c4);border:none;color:#fff;font-size:28px;cursor:pointer;margin:10px auto;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,154,158,.4)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px auto}
.memory-card{aspect-ratio:1;background:#fff;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .3s}
.memory-card.flipped{background:#f0f0f0}
.memory-card.matched{opacity:.3;pointer-events:none}
.memory-card img{width:70px;height:auto;opacity:0;transition:opacity .3s}
.memory-card.flipped img{opacity:1}
.memory-card-label{font-size:18px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.memory-card.flipped .memory-card-label{opacity:1}
.memory-back{font-size:44px}
.done-wrap{text-align:center}
.done-wrap img{width:120px;margin:20px 0}
.done-title{font-size:48px;font-weight:900;color:#e67e22;margin:10px 0}
.done-msg{font-size:22px;color:#666;margin:10px 0}
.play-again{padding:16px 40px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;margin:20px 0;box-shadow:0 4px 15px rgba(249,173,199,.4)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card-label{font-size:18px}
.kitchen-btn{width:100px;height:100px}
.kitchen-btn img{width:60px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.memory-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" style="width:110px;margin:20px 0" alt="Mummy">
<div class="te">Cooking Together</div>
<div class="tz">🍳 Let's cook and play!</div>
<div style="display:flex;gap:15px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f373.svg" style="width:60px" alt="cook">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f963.svg" style="width:60px" alt="mix">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg" style="width:60px" alt="pour">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f60b.svg" style="width:60px" alt="taste">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg" style="width:60px" alt="yummy">
</div>
<button class="play-again" onclick="getAC();goM(1)">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">👆 点一点，学单词！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: Cooking Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Help Mummy Cook!</div>
<div class="tz">🍳 点一点，做饭啦！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">Help me cook!</div>
</div>
<div class="kitchen-wrap" id="kw"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find the word!</div>
</div>
<button class="speaker-btn" onclick="if(!busy)playCurrentWord()">🔊</button>
<div class="listen-grid" id="lg3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Match them!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="done-title">All Done!</div>
<div class="done-msg">You helped Peppa cook! Great job!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="play-again" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{w:'cook',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f373.svg'},
{w:'mix',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f963.svg'},
{w:'pour',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg'},
{w:'taste',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f60b.svg'},
{w:'yummy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f36a.svg'}
];
var curM=0,busy=false;
var m1done=0,m2done=0,m3done=0,m4done=0;
var m3cur=0,m3order=[];
var m4flipped=[],m4matched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(m1done>0)return;
var g=document.getElementById('cg1');
g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="card-label">'+item.w+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
speak(item.w);
m1done++;
document.getElementById('s1').innerHTML=stars(m1done,5);
if(m1done===5){
setTimeout(function(){
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
},300);
}
};
g.appendChild(c);
});
}

function initM2(){
if(m2done>0)return;
var kw=document.getElementById('kw');
kw.innerHTML='';
var colors=['linear-gradient(135deg,#ff9a9e,#fad0c4)','linear-gradient(135deg,#a8e6cf,#88d8b0)','linear-gradient(135deg,#ffd89b,#19547b)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)'];
var order=[0,1,2,3,4].sort(function(){return Math.random()-.5});
order.forEach(function(i){
var item=W[i];
var btn=document.createElement('button');
btn.className='kitchen-btn';
btn.style.background=colors[i];
btn.innerHTML='<img src="'+item.img+'" alt="'+item.w+'">';
btn.onclick=function(){
if(busy)return;
busy=true;
speak(item.w);
playOk();
m2done++;
document.getElementById('s2').innerHTML=stars(m2done,5);
btn.style.opacity='.3';
btn.style.pointerEvents='none';
setTimeout(function(){
busy=false;
if(m2done===5){
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
},1200);
};
kw.appendChild(btn);
});
}

function initM3(){
if(m3done>0)return;
m3order=[0,1,2,3,4].sort(function(){return Math.random()-.5});
m3cur=0;
var g=document.getElementById('lg3');
g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="listen-card-label">'+item.w+'</div>';
c.onclick=function(){
if(busy)return;
var correct=W[m3order[m3cur]].w;
if(item.w===correct){
busy=true;
playOk();
speak(item.w);
m3done++;
document.getElementById('s3').innerHTML=stars(m3done,5);
c.style.opacity='.3';
c.style.pointerEvents='none';
setTimeout(function(){
busy=false;
m3cur++;
if(m3cur<5){
playCurrentWord();
}else{
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
},1200);
}else{
playNo();
}
};
g.appendChild(c);
});
setTimeout(function(){playCurrentWord()},500);
}

function playCurrentWord(){
if(m3cur<5){
speak(W[m3order[m3cur]].w);
}
}

function initM4(){
if(m4done>0)return;
var pairs=[];
W.forEach(function(item){
pairs.push({type:'img',data:item.img,word:item.w});
pairs.push({type:'text',data:item.w,word:item.w});
});
pairs.sort(function(){return Math.random()-.5});
var g=document.getElementById('mg4');
g.innerHTML='';
pairs.forEach(function(p,i){
var c=document.createElement('div');
c.className='memory-card';
c.dataset.word=p.word;
c.dataset.type=p.type;
c.dataset.idx=i;
if(p.type==='img'){
c.innerHTML='<div class="memory-back">🍳</div><img src="'+p.data+'" alt="'+p.word+'">';
}else{
c.innerHTML='<div class="memory-back">🍳</div><div class="memory-card-label">'+p.data+'</div>';
}
c.onclick=function(){
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
m4flipped.push(c);
if(m4flipped.length===2){
busy=true;
var c1=m4flipped[0],c2=m4flipped[1];
if(c1.dataset.word===c2.dataset.word&&c1.dataset.type!==c2.dataset.type){
playOk();
speak(c1.dataset.word);
m4matched++;
document.getElementById('s4').innerHTML=stars(m4matched,5);
setTimeout(function(){
c1.classList.add('matched');
c2.classList.add('matched');
m4flipped=[];
busy=false;
if(m4matched===5){
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
goM(1);
},600);
}
},1200);
}else{
playNo();
setTimeout(function(){
c1.classList.remove('flipped');
c2.classList.remove('flipped');
m4flipped=[];
busy=false;
},800);
}
}
};
g.appendChild(c);
});
}

function initM5(){
}

goM(0);
</script>
</body>
</html>
