<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 33 Review - Pet Care</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#e8f5e9,#c8e6c9);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#2e7d32;margin:8px 0;text-shadow:0 2px 4px rgba(46,125,50,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#66bb6a,#81c784);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(102,187,106,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(102,187,106,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
/* M0: Start */
.start-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.start-wrap img{width:110px}
.start-btn{padding:16px 40px;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;background:#66bb6a;color:#fff;box-shadow:0 6px 16px rgba(102,187,106,.4)}
/* M1: Learn */
.learn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:500px;margin:16px 0}
.learn-card{width:100%;aspect-ratio:1;border-radius:16px;background:#ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card.revealed{background:#fff}
.learn-card .lc-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.learn-card.revealed .lc-label{opacity:1}
/* M2: Pet Care Actions */
.pet-scene{position:relative;width:340px;height:340px;background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:20px;margin:20px 0;padding:20px}
.pet-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px}
.action-btn{position:absolute;width:80px;height:80px;border-radius:50%;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.action-btn:active{transform:scale(.9)}
.action-btn.done{background:#81c784;border:3px solid #4caf50}
.action-label{font-size:13px;font-weight:700;color:#2c3e50;margin-top:2px}
/* M3: Listen & Find */
.listen-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;margin:16px 0}
.listen-btn{padding:14px 32px;border:none;border-radius:50px;font-size:28px;cursor:pointer;background:#66bb6a;color:#fff;box-shadow:0 4px 12px rgba(102,187,106,.4)}
.listen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:500px}
.listen-card{width:100%;aspect-ratio:1;border-radius:16px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .1s}
.listen-card:active{transform:scale(.95)}
.listen-card .lc-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px}
/* M4: Memory Match */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:16px 0}
.mem-card{width:100%;aspect-ratio:1;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .2s;position:relative}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{background:#81c784}
.mem-card.matched{background:#4caf50;cursor:default}
.mem-front,.mem-back{position:absolute;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%}
.mem-back{transform:rotateY(180deg)}
.mem-card.flipped .mem-front{transform:rotateY(180deg)}
.mem-card.flipped .mem-back{transform:rotateY(0)}
.mem-emoji{font-size:44px}
.mem-label{font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px}
/* M5: Done */
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.done-wrap img{width:120px}
.done-title{font-size:48px;font-weight:900;color:#2e7d32;text-shadow:0 3px 6px rgba(46,125,50,.2)}
.done-msg{font-size:22px;color:#555;text-align:center}
.play-again-btn{padding:16px 40px;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;background:#66bb6a;color:#fff;box-shadow:0 6px 16px rgba(102,187,106,.4)}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #66bb6a;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#66bb6a;color:#fff;box-shadow:0 4px 12px rgba(102,187,106,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.sb{font-size:22px}
.learn-grid,.listen-grid{grid-template-columns:repeat(2,1fr);gap:12px;max-width:360px}
.pet-scene{width:280px;height:280px}.action-btn{width:65px;height:65px}
.memory-grid{grid-template-columns:repeat(4,1fr);gap:8px;max-width:360px}
.mem-emoji{font-size:32px}.mem-label{font-size:14px}
.start-wrap img,.done-wrap img{width:90px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="start-wrap">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="te">Pet Care Review</div>
<div style="display:flex;gap:12px;margin:16px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="60" alt="dog">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg" width="60" alt="food">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b6.svg" width="60" alt="walk">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg" width="60" alt="play">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2764.svg" width="60" alt="love">
</div>
<button class="start-btn" onclick="getAC();goM(1)">Let's Play!</button>
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn Words</div>
<div class="tz">👆 点一点，学单词！</div>
<div class="sb" id="s1">⭐<span style="color:#bbb">★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Pet Care Actions -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Pet Care</div>
<div class="tz">🐶 点一点，照顾宠物！</div>
<div class="sb" id="s2">⭐⭐<span style="color:#bbb">★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png" alt="Peppa">
<div class="bbl">Help care for the pet!</div>
</div>
<div class="pet-scene">
<div class="pet-center">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f436.svg" width="100" alt="dog">
</div>
<button class="action-btn" style="top:20px;left:50%;transform:translateX(-50%)" data-word="feed">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f95b.svg" width="40" alt="feed">
<div class="action-label">feed</div>
</button>
<button class="action-btn" style="top:50%;left:20px;transform:translateY(-50%)" data-word="walk">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b6.svg" width="40" alt="walk">
<div class="action-label">walk</div>
</button>
<button class="action-btn" style="top:50%;right:20px;transform:translateY(-50%)" data-word="play">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg" width="40" alt="play">
<div class="action-label">play</div>
</button>
<button class="action-btn" style="bottom:20px;left:50%;transform:translateX(-50%)" data-word="love">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2764.svg" width="40" alt="love">
<div class="action-label">love</div>
</button>
</div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐<span style="color:#bbb">★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Listen and find!</div>
</div>
<div class="listen-wrap">
<button class="listen-btn" id="lb" onclick="playListenWord()">🔊</button>
<div class="listen-grid" id="lig"></div>
</div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐<span style="color:#bbb">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Match the pairs!</div>
</div>
<div class="memory-grid" id="mg"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="done-title">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="done-msg">Great job caring for pets!</div>
<button class="play-again-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{word:'pet',emoji:'1f436'},
{word:'feed',emoji:'1f95b'},
{word:'walk',emoji:'1f6b6'},
{word:'play',emoji:'26bd'},
{word:'love',emoji:'2764'}
];
var curM=0,busy=false;
var m1Stars=0,m2Stars=0,m3Stars=0,m4Stars=0;
var listenTarget='',listenAttempts=0;
var memFlipped=[],memMatched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);
o.frequency.value=f;g.gain.value=.15;
o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){tone(300,.3)}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(document.getElementById('lg').children.length>0)return;
var g=document.getElementById('lg');
W.forEach(function(w){
var c=document.createElement('div');
c.className='learn-card';
c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+w.emoji+'.svg" width="90" style="opacity:0"><div class="lc-label">'+w.word+'</div>';
c.onclick=function(){
if(this.classList.contains('revealed'))return;
this.classList.add('revealed');
this.querySelector('img').style.opacity='1';
speak(w.word);
m1Stars++;
document.getElementById('s1').innerHTML=stars(m1Stars,5);
};
g.appendChild(c);
});
}

function initM2(){
if(busy)return;
var btns=document.querySelectorAll('.action-btn');
var order=['feed','walk','play','love'];
var current=0;
btns.forEach(function(btn){
btn.onclick=function(){
if(busy||this.classList.contains('done'))return;
var word=this.getAttribute('data-word');
if(word===order[current]){
busy=true;
this.classList.add('done');
playOk();
speak(word);
m2Stars++;
document.getElementById('s2').innerHTML=stars(m2Stars,5);
current++;
setTimeout(function(){busy=false},1200);
if(current===order.length){
setTimeout(function(){goM(1)},1500);
}
}else{
playNo();
}
};
});
}

function initM3(){
if(document.getElementById('lig').children.length>0)return;
pickListenWord();
var g=document.getElementById('lig');
W.forEach(function(w){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+w.emoji+'.svg" width="90"><div class="lc-label">'+w.word+'</div>';
c.onclick=function(){
if(busy)return;
if(w.word===listenTarget){
busy=true;
playOk();
speak(w.word);
m3Stars++;
document.getElementById('s3').innerHTML=stars(m3Stars,5);
setTimeout(function(){
pickListenWord();
busy=false;
},1200);
}else{
playNo();
}
};
g.appendChild(c);
});
}

function pickListenWord(){
listenTarget=W[Math.floor(Math.random()*W.length)].word;
speak(listenTarget);
}

function playListenWord(){
if(!busy)speak(listenTarget);
}

function initM4(){
if(document.getElementById('mg').children.length>0)return;
var pairs=[];
W.forEach(function(w){
pairs.push({type:'emoji',emoji:w.emoji,id:w.word+'_e'});
pairs.push({type:'word',word:w.word,id:w.word+'_w'});
});
pairs.sort(function(){return Math.random()-.5});
var g=document.getElementById('mg');
pairs.forEach(function(p){
var c=document.createElement('div');
c.className='mem-card';
c.dataset.id=p.id;
var front='<div class="mem-front"><div class="mem-emoji">❓</div></div>';
var back='<div class="mem-back">';
if(p.type==='emoji'){
back+='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+p.emoji+'.svg" width="70">';
}else{
back+='<div class="mem-label">'+p.word+'</div>';
}
back+='</div>';
c.innerHTML=front+back;
c.onclick=function(){memClick(this)};
g.appendChild(c);
});
}

function memClick(card){
if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
card.classList.add('flipped');
memFlipped.push(card);
if(memFlipped.length===2){
busy=true;
var id1=memFlipped[0].dataset.id.split('_')[0];
var id2=memFlipped[1].dataset.id.split('_')[0];
if(id1===id2){
playOk();
memFlipped[0].classList.add('matched');
memFlipped[1].classList.add('matched');
memMatched++;
m4Stars++;
document.getElementById('s4').innerHTML=stars(m4Stars,5);
memFlipped=[];
busy=false;
if(memMatched===W.length){
setTimeout(function(){goM(1)},1500);
}
}else{
playNo();
setTimeout(function(){
memFlipped.forEach(function(c){c.classList.remove('flipped')});
memFlipped=[];
busy=false;
},1000);
}
}
}

function initM5(){}

goM(0);
</script>
</body>
</html>
