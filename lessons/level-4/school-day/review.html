<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 32 Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FFD93D,#FFC93D);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,211,61,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::before{content:'📚';margin-right:8px}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,211,61,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px 0}
.card{width:100%;aspect-ratio:1;background:#ddd;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card.revealed{background:#fff;cursor:pointer}
.card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.card.revealed img{opacity:1}
.card-label{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.card.revealed .card-label{opacity:1}
.activity-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px;margin:20px 0}
.activity-btn{padding:20px;border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(255,255,255,.5);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.activity-btn:hover{transform:scale(1.05);background:rgba(255,255,255,.7)}
.activity-btn img{width:90px;height:auto}
.activity-label{font-size:24px;font-weight:700;color:#2c3e50}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px 0}
.listen-card{padding:15px;border:none;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;background:#fff;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.listen-card:hover{transform:scale(1.05)}
.listen-card img{width:80px;height:auto}
.listen-label{font-size:20px;font-weight:700;color:#2c3e50}
.sound-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;font-size:40px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFD93D,#FFC93D);box-shadow:0 4px 12px rgba(255,211,61,.4);margin:15px 0;transition:transform .1s}
.sound-btn:active{transform:scale(.9)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px 0}
.memory-card{aspect-ratio:1;border:none;border-radius:12px;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.1);position:relative}
.memory-card.flipped{background:linear-gradient(135deg,#FFD93D,#FFC93D)}
.memory-card.matched{opacity:.3;pointer-events:none}
.memory-front{font-size:44px}
.memory-back{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:0;transition:opacity .3s}
.memory-card.flipped .memory-back{opacity:1}
.memory-back img{width:70px;height:auto}
.memory-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.done-img{width:120px;height:auto}
.done-title{font-size:48px;font-weight:900;color:#e91e8c;text-shadow:0 3px 6px rgba(233,30,140,.3)}
.done-msg{font-size:24px;color:#666;text-align:center}
.play-again-btn{padding:16px 40px;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#FFD93D,#FFC93D);color:#fff;box-shadow:0 6px 20px rgba(255,211,61,.4);transition:transform .2s}
.play-again-btn:hover{transform:scale(1.05)}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card-label{font-size:18px}
.activity-grid{grid-template-columns:1fr;gap:15px}
.activity-btn img{width:80px}
.activity-label{font-size:22px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.listen-card img{width:70px}
.listen-label{font-size:18px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px;max-width:440px}
.memory-back img{width:60px}
.memory-back-label{font-size:16px}
.done-img{width:100px}
.done-title{font-size:36px}
.done-msg{font-size:20px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="top">
<div class="te">School Day</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
</div>
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:140px;height:auto;margin:20px 0" alt="Peppa">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Let's play and learn!</div>
</div>
<div style="display:flex;gap:20px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f469-200d-1f3eb.svg" width="70" alt="teacher">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg" width="70" alt="friend">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4da.svg" width="70" alt="learn">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f58d.svg" width="70" alt="draw">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/270f.svg" width="70" alt="write">
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，学单词！</div>
<div class="sb" id="s1">⭐<span style="color:#bbb">★★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: School Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">School Game</div>
<div class="tz">🏫 点一点，去上学！</div>
<div class="sb" id="s2">⭐⭐<span style="color:#bbb">★★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">What can you do at school?</div>
</div>
<div class="activity-grid" id="ag2"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐<span style="color:#bbb">★★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Listen and find!</div>
</div>
<button class="sound-btn" id="playBtn3">🔊</button>
<div class="listen-grid" id="lg3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐<span style="color:#bbb">★</span></div>
</div>
<div class="pr">
<img src="../../../assets/peppa/emily-elephant-standing.png" alt="Emily Elephant">
<div class="bbl">Find the pairs!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="top">
<div class="sb">⭐⭐⭐⭐⭐</div>
</div>
<div class="done-wrap">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" class="done-img" alt="Peppa Family">
<div class="done-title">All Done!</div>
<div class="done-msg">You learned about school!<br>Great job!</div>
<button class="play-again-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{word:'teacher',emoji:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f469-200d-1f3eb.svg'},
{word:'friend',emoji:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9d2.svg'},
{word:'learn',emoji:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4da.svg'},
{word:'draw',emoji:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f58d.svg'},
{word:'write',emoji:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/270f.svg'}
];
var curM=0,busy=false;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn
var m1Revealed=0;
function initM1(){
if(document.getElementById('cg1').children.length>0)return;
var cg=document.getElementById('cg1');
W.forEach(function(w){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<img src="'+w.emoji+'" alt="'+w.word+'"><div class="card-label">'+w.word+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return speak(w.word);
c.classList.add('revealed');
speak(w.word);
m1Revealed++;
document.getElementById('s1').innerHTML=stars(m1Revealed,5);
if(m1Revealed===5){
setTimeout(function(){
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
},300);
}
};
cg.appendChild(c);
});
}

// M2: School Game
var m2Done=[];
function initM2(){
if(document.getElementById('ag2').children.length>0)return;
var ag=document.getElementById('ag2');
var order=['teacher','friend','learn','draw','write'];
order.forEach(function(word){
var w=W.find(function(x){return x.word===word});
var btn=document.createElement('button');
btn.className='activity-btn';
btn.innerHTML='<img src="'+w.emoji+'" alt="'+w.word+'"><div class="activity-label">'+w.word+'</div>';
btn.onclick=function(){
if(m2Done.indexOf(word)!==-1)return;
m2Done.push(word);
btn.style.opacity='0.3';
btn.style.pointerEvents='none';
playOk();
speak(word);
document.getElementById('s2').innerHTML=stars(m2Done.length,5);
if(m2Done.length===5){
setTimeout(function(){
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
},300);
}
};
ag.appendChild(btn);
});
}

// M3: Listen & Find
var m3Queue=[],m3Done=0;
function initM3(){
if(document.getElementById('lg3').children.length>0)return;
m3Queue=W.map(function(w){return w.word}).sort(function(){return Math.random()-.5});
var lg=document.getElementById('lg3');
W.forEach(function(w){
var c=document.createElement('button');
c.className='listen-card';
c.innerHTML='<img src="'+w.emoji+'" alt="'+w.word+'"><div class="listen-label">'+w.word+'</div>';
c.onclick=function(){
if(busy)return;
busy=true;
if(w.word===m3Queue[0]){
playOk();
speak(w.word);
c.style.opacity='0.3';
c.style.pointerEvents='none';
m3Queue.shift();
m3Done++;
document.getElementById('s3').innerHTML=stars(m3Done,5);
setTimeout(function(){
busy=false;
if(m3Done===5){
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}else{
speak(m3Queue[0]);
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
lg.appendChild(c);
});
document.getElementById('playBtn3').onclick=function(){
if(m3Queue.length>0)speak(m3Queue[0]);
};
speak(m3Queue[0]);
}

// M4: Memory Match
var m4Flipped=[],m4Matched=0;
function initM4(){
if(document.getElementById('mg4').children.length>0)return;
var pairs=[];
W.forEach(function(w){
pairs.push({type:'emoji',word:w.word,emoji:w.emoji});
pairs.push({type:'word',word:w.word,emoji:w.emoji});
});
pairs.sort(function(){return Math.random()-.5});
var mg=document.getElementById('mg4');
pairs.forEach(function(p,i){
var c=document.createElement('button');
c.className='memory-card';
c.dataset.word=p.word;
c.dataset.type=p.type;
c.innerHTML='<div class="memory-front">🎴</div><div class="memory-back">'+(p.type==='emoji'?'<img src="'+p.emoji+'" alt="'+p.word+'">':'<div class="memory-back-label">'+p.word+'</div>')+'</div>';
c.onclick=function(){
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
m4Flipped.push(c);
if(m4Flipped.length===2){
busy=true;
var a=m4Flipped[0],b=m4Flipped[1];
if(a.dataset.word===b.dataset.word&&a.dataset.type!==b.dataset.type){
playOk();
a.classList.add('matched');
b.classList.add('matched');
m4Matched++;
document.getElementById('s4').innerHTML=stars(m4Matched,5);
m4Flipped=[];
setTimeout(function(){
busy=false;
if(m4Matched===5){
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
goM(1);
},600);
}
},600);
}else{
playNo();
setTimeout(function(){
a.classList.remove('flipped');
b.classList.remove('flipped');
m4Flipped=[];
busy=false;
},1000);
}
}
};
mg.appendChild(c);
});
}

function initM5(){
document.getElementById('s4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
