<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 37 Review - Feelings and Emotions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#ffeaa7,#fdcb6e);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ffa07a,#ff6b9d);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,107,157,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,107,157,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.learn-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.learn-card{width:110px;height:110px;border-radius:18px;background:#ddd;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .2s}
.learn-card:active{transform:scale(.95)}
.learn-card.revealed{background:#fff}
.learn-card img{width:90px;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-card .lbl{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .lbl{opacity:1}
.card-icon{position:absolute;font-size:44px;color:#999;top:50%;left:50%;transform:translate(-50%,-50%)}
.learn-card.revealed .card-icon{display:none}
.emotion-faces{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:20px 0;max-width:500px}
.emotion-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:16px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s}
.emotion-btn:active{transform:scale(.95)}
.emotion-btn .emoji{font-size:50px}
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.listen-card{width:100px;height:100px;border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px}
.listen-card .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.mem-wrap{width:440px;max-width:100%;margin:20px auto}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mem-card{aspect-ratio:1;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flip{transform:rotateY(180deg)}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.mem-front{background:linear-gradient(135deg,#667eea,#764ba2)}
.mem-back{background:#fff;transform:rotateY(180deg);flex-direction:column;gap:4px}
.mem-back img{width:70px}
.mem-back .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.mem-front .icon{font-size:44px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.emotion-btn{width:85px;height:85px;font-size:14px}
.emotion-btn .emoji{font-size:40px}
.mem-wrap{width:100%}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa" style="width:110px;margin-bottom:20px">
<div class="te">Feelings and Emotions</div>
<div class="tz">点一点，玩游戏！</div>
<div class="sb" style="margin-top:20px">⭐⭐⭐⭐⭐</div>
<button class="nb" style="margin-top:30px;font-size:24px;padding:18px 40px" onclick="getAC();goM(1)">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，学单词！</div>
<div class="sb" id="s1">⭐<span style="color:#bbb">★★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Peppa">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="lg"></div>
</div>

<!-- M2: Emotion Faces -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Emotion Faces</div>
<div class="tz">听一听，点表情！</div>
<div class="sb" id="s2">⭐⭐<span style="color:#bbb">★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Find the feeling!</div>
</div>
<div class="emotion-faces" id="ef"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐<span style="color:#bbb">★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Listen and tap!</div>
</div>
<button class="nb" style="margin:10px 0;font-size:20px" onclick="playListen()">🔊 Listen</button>
<div class="listen-grid" id="ltg"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐<span style="color:#bbb">★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Find pairs!</div>
</div>
<div class="mem-wrap">
<div class="mem-grid" id="mg"></div>
</div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family" style="width:120px;margin-bottom:20px">
<div class="te">All Done!</div>
<div class="tz">你真棒！</div>
<div class="sb" style="margin-top:20px">⭐⭐⭐⭐⭐</div>
<button class="nb" style="margin-top:30px;font-size:24px;padding:18px 40px" onclick="goM(0)">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'excited',e:'1f604'},
{w:'tired',e:'1f62b'},
{w:'proud',e:'1f60a'},
{w:'shy',e:'1f633'},
{w:'brave',e:'1f4aa'}
];
var curM=0,busy=false;
var m1Done=0,m2Done=0,m3Done=0,m4Done=0;
var listenTarget='';

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(m1Done)return;
var lg=document.getElementById('lg');
lg.innerHTML='';
W.forEach(function(item){
var card=document.createElement('div');
card.className='learn-card';
card.style.position='relative';
var icon=document.createElement('div');
icon.className='card-icon';
icon.textContent='❓';
card.appendChild(icon);
var img=document.createElement('img');
img.src='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg';
card.appendChild(img);
var lbl=document.createElement('div');
lbl.className='lbl';
lbl.textContent=item.w;
card.appendChild(lbl);
card.onclick=function(){
if(!card.classList.contains('revealed')){
card.classList.add('revealed');
speak(item.w);
m1Done++;
document.getElementById('s1').innerHTML=stars(Math.min(m1Done,5),5);
}else{
speak(item.w);
}
};
lg.appendChild(card);
});
}

function initM2(){
if(m2Done>=5)return;
var ef=document.getElementById('ef');
ef.innerHTML='';
var colors=['#ffeaa7','#a8e6cf','#ffa07a','#e0c3fc','#667eea'];
var emojis=['😄','😫','😊','😳','💪'];
var shuffled=W.slice().sort(function(){return Math.random()-.5});
var target=shuffled[0];
speak(target.w);
W.forEach(function(item,i){
var btn=document.createElement('button');
btn.className='emotion-btn';
btn.style.background='linear-gradient(135deg,'+colors[i]+','+colors[(i+1)%5]+')';
var emoji=document.createElement('div');
emoji.className='emoji';
emoji.textContent=emojis[i];
btn.appendChild(emoji);
var lbl=document.createElement('div');
lbl.textContent=item.w;
btn.appendChild(lbl);
btn.onclick=function(){
if(busy)return;
busy=true;
if(item.w===target.w){
playOk();
speak(item.w);
m2Done++;
document.getElementById('s2').innerHTML=stars(Math.min(m2Done,5),5);
setTimeout(function(){
busy=false;
if(m2Done<5){
initM2();
}else{
goM(1);
}
},1200);
}else{
playNo();
busy=false;
}
};
ef.appendChild(btn);
});
}

function initM3(){
if(m3Done>=5)return;
var ltg=document.getElementById('ltg');
ltg.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
listenTarget=shuffled[0].w;
W.forEach(function(item){
var card=document.createElement('div');
card.className='listen-card';
var img=document.createElement('img');
img.src='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg';
card.appendChild(img);
var lbl=document.createElement('div');
lbl.className='lbl';
lbl.textContent=item.w;
card.appendChild(lbl);
card.onclick=function(){
if(busy)return;
busy=true;
if(item.w===listenTarget){
playOk();
speak(item.w);
m3Done++;
document.getElementById('s3').innerHTML=stars(Math.min(m3Done,5),5);
setTimeout(function(){
busy=false;
if(m3Done<5){
initM3();
}else{
goM(1);
}
},1200);
}else{
playNo();
busy=false;
}
};
ltg.appendChild(card);
});
}

function playListen(){
if(listenTarget)speak(listenTarget);
}

function initM4(){
if(m4Done)return;
var mg=document.getElementById('mg');
mg.innerHTML='';
var pairs=W.slice(0,5);
var cards=[];
pairs.forEach(function(item){
cards.push({w:item.w,e:item.e});
cards.push({w:item.w,e:item.e});
});
cards.sort(function(){return Math.random()-.5});
var flipped=[];
cards.forEach(function(item){
var card=document.createElement('div');
card.className='mem-card';
var front=document.createElement('div');
front.className='mem-face mem-front';
var icon=document.createElement('div');
icon.className='icon';
icon.textContent='❓';
front.appendChild(icon);
card.appendChild(front);
var back=document.createElement('div');
back.className='mem-face mem-back';
var img=document.createElement('img');
img.src='https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+item.e+'.svg';
back.appendChild(img);
var lbl=document.createElement('div');
lbl.className='lbl';
lbl.textContent=item.w;
back.appendChild(lbl);
card.appendChild(back);
card.dataset.word=item.w;
card.onclick=function(){
if(busy||card.classList.contains('flip')||flipped.length>=2)return;
card.classList.add('flip');
speak(item.w);
flipped.push(card);
if(flipped.length===2){
busy=true;
if(flipped[0].dataset.word===flipped[1].dataset.word){
playOk();
m4Done++;
document.getElementById('s4').innerHTML=stars(Math.min(m4Done,5),5);
setTimeout(function(){
flipped[0].style.visibility='hidden';
flipped[1].style.visibility='hidden';
flipped=[];
busy=false;
if(m4Done>=5){
setTimeout(function(){goM(1)},800);
}
},1200);
}else{
playNo();
setTimeout(function(){
flipped[0].classList.remove('flip');
flipped[1].classList.remove('flip');
flipped=[];
busy=false;
},1200);
}
}
};
mg.appendChild(card);
});
}

function initM5(){
document.getElementById('s4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
