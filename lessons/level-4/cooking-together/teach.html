<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 35 - Cooking Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.bg-purple{background:linear-gradient(160deg,#e1bee7,#ce93d8)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word{font-size:88px;font-weight:900;letter-spacing:4px;margin:6px 0;text-shadow:0 3px 0 rgba(0,0,0,.08)}
.sent{font-size:34px;font-weight:700;color:#e67e22;margin:8px 0}
.pr{display:flex;align-items:center;gap:12px;margin:10px 0}
.pr img{width:75px;height:auto}
.bbl{position:relative;background:#fff;border-radius:18px;padding:12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:26px;font-weight:700;color:#e67e22}
.bbl::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#fff}
.obj-wrap{margin:10px 0}
.obj-wrap svg{width:160px;height:160px}
.sound-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;font-size:44px;display:flex;align-items:center;justify-content:center;margin:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .1s}
.sound-btn:active{transform:scale(.9)}
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#F9ADC7;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(249,173,199,.4);display:flex;align-items:center;justify-content:center}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:300px;max-height:40vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:14px 18px;display:none;font-size:13px;line-height:1.7;color:#555}
.pop.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word{font-size:56px;letter-spacing:2px}
.sent{font-size:24px}
.bbl{font-size:20px;padding:8px 14px}
.obj-wrap svg{width:120px;height:120px}
.sound-btn{width:80px;height:80px;font-size:36px}
}
@media(min-width:768px){
.word{font-size:100px}
.sent{font-size:38px}
}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Title -->
<div class="sl bg-pink on">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" style="width:110px;margin:10px 0">
<div class="ttl">Cooking Together</div>
<div class="sub">Let's cook with Mummy Pig!</div>
<div style="display:flex;gap:20px;margin-top:20px">
<span style="font-size:60px">👩‍🍳</span>
<span style="font-size:60px">🍪</span>
<span style="font-size:60px">🥣</span>
</div>
</div>

<!-- S1: Hello -->
<div class="sl bg-sky">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" style="width:110px;margin:10px 0">
<div class="ttl" style="font-size:52px">Let's make cookies!</div>
</div>

<!-- S2: cook -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png">
<div class="bbl">Let's cook!</div>
</div>
<div class="obj-wrap">
<span style="font-size:140px">👩‍🍳</span>
</div>
<div class="word" style="color:#e67e22">cook</div>
</div>

<!-- S3: mix -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png">
<div class="bbl">Let's mix!</div>
</div>
<div class="obj-wrap">
<span style="font-size:140px">🥣</span>
</div>
<div class="word" style="color:#3498db">mix</div>
</div>

<!-- S4: pour -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/george-standing.png">
<div class="bbl">Let's pour!</div>
</div>
<div class="obj-wrap">
<span style="font-size:140px">🥛</span>
</div>
<div class="word" style="color:#9b59b6">pour</div>
</div>

<!-- S5: taste -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/peppa-pig-red-polka-dot-dress.png">
<div class="bbl">Let's taste!</div>
</div>
<div class="obj-wrap">
<span style="font-size:140px">👅</span>
</div>
<div class="word" style="color:#e74c3c">taste</div>
</div>

<!-- S6: yummy -->
<div class="sl bg-purple">
<div class="pr">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png">
<div class="bbl">It's yummy!</div>
</div>
<div class="obj-wrap">
<span style="font-size:140px">😋</span>
</div>
<div class="word" style="color:#f39c12">yummy</div>
</div>

<!-- S7: Listen & Say -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png">
<div class="bbl">Tap to hear!</div>
</div>
<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:600px">
<button class="sound-btn" style="background:linear-gradient(135deg,#e67e22,#d35400)" onclick="speak('cook')">
👩‍🍳
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#3498db,#2980b9)" onclick="speak('mix')">
🥣
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#9b59b6,#8e44ad)" onclick="speak('pour')">
🥛
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#e74c3c,#c0392b)" onclick="speak('taste')">
👅
</button>
<button class="sound-btn" style="background:linear-gradient(135deg,#f39c12,#e67e22)" onclick="speak('yummy')">
😋
</button>
</div>
</div>

<!-- S8: All Together -->
<div class="sl bg-sky">
<div class="pr">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px">
<div class="bbl">All the words!</div>
</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px auto">
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="font-size:60px">👩‍🍳</span>
<div style="font-size:20px;font-weight:700;color:#2c3e50">cook</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="font-size:60px">🥣</span>
<div style="font-size:20px;font-weight:700;color:#2c3e50">mix</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="font-size:60px">🥛</span>
<div style="font-size:20px;font-weight:700;color:#2c3e50">pour</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="font-size:60px">👅</span>
<div style="font-size:20px;font-weight:700;color:#2c3e50">taste</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="font-size:60px">😋</span>
<div style="font-size:20px;font-weight:700;color:#2c3e50">yummy</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="font-size:60px">🍪</span>
<div style="font-size:20px;font-weight:700;color:#2c3e50">cookie</div>
</div>
</div>
</div>

<!-- S9: Bye -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:110px;margin:10px 0">
<div class="ttl">Great job!</div>
<div class="sub">Tomorrow: Sports Day! ⚽</div>
</div>
</div>

<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div id="B"></div></div>

<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/10</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=10;
var N={
0:"Title page: Introduce cooking together.",
1:"Hello page: Mummy Pig invites us to make cookies.",
2:"New word: cook. Say: 'Let's cook!'",
3:"New word: mix. Say: 'Let's mix!'",
4:"New word: pour. Say: 'Let's pour!'",
5:"New word: taste. Say: 'Let's taste!'",
6:"New word: yummy. Say: 'It's yummy!'",
7:"Listen & Say: Tap each button to hear the word. Encourage kids to repeat.",
8:"All Together: Review all 5 words plus bonus word 'cookie'.",
9:"Bye page: Celebrate! Preview tomorrow's lesson: Sports Day."
};

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
document.getElementById('B').innerHTML=N[c]||'';
}

function tn(){
document.getElementById('F').classList.toggle('on');
document.getElementById('P').classList.toggle('on');
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
if(e.key==='t'||e.key==='T')tn();
});

goTo(0);
</script>
</body>
</html>
