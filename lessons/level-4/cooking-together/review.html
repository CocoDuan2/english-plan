<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 35 Review - Cooking Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fff4f8,#f8fbff 52%,#f5fff4)}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px 80px;text-align:center}
.sl.on{display:flex}
.ttl{font-size:36px;font-weight:800;color:#2c3e50;margin-bottom:12px}
.sub{font-size:18px;color:#7f8c8d;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px;margin:0 auto}
.card{width:200px;height:200px;background:#fff;border-radius:20px;border:3px solid #e0e0e0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card:active{transform:scale(.95)}
.card.correct{background:#4caf50;border-color:#4caf50;transform:scale(1.05)}
.card.wrong{animation:shake .3s}
.card.matched{opacity:.3;pointer-events:none}
.card.selected{border-color:#2196f3;border-width:5px}
.emoji{font-size:80px}
.label{font-size:20px;font-weight:700;color:#555}
.play{width:100px;height:100px;background:#4caf50;border:none;border-radius:50%;color:#fff;font-size:50px;cursor:pointer;box-shadow:0 6px 16px rgba(76,175,80,.3);margin:20px}
.play:active{transform:scale(.9)}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:2px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;padding:0 30px}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff;transition:all .2s}
.btn:disabled{background:#ddd;color:#999}
.btn:active:not(:disabled){transform:scale(.95)}
.pg{font-size:14px;color:#999;font-weight:600}
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-12px)}
75%{transform:translateX(12px)}
}
@media(max-width:600px){
.ttl{font-size:28px}
.sub{font-size:16px}
.grid{grid-template-columns:1fr 1fr;gap:15px;max-width:400px}
.card{width:160px;height:160px}
.emoji{font-size:60px}
.label{font-size:18px}
.play{width:80px;height:80px;font-size:40px}
}
</style>
</head>
<body>
<div class="deck">
<div class="sl on">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" style="width:100px;margin-bottom:10px">
<div class="ttl">Let's Review!</div>
<div class="sub">Cooking Together 🍪</div>
</div>

<div class="sl">
<div class="ttl">Tap to hear!</div>
<div class="grid">
<div class="card" onclick="speak('cook')">
<div class="emoji">👩‍🍳</div>
<div class="label">cook</div>
</div>
<div class="card" onclick="speak('mix')">
<div class="emoji">🥣</div>
<div class="label">mix</div>
</div>
<div class="card" onclick="speak('cookie')">
<div class="emoji">🍪</div>
<div class="label">cookie</div>
</div>
<div class="card" onclick="speak('taste')">
<div class="emoji">👅</div>
<div class="label">taste</div>
</div>
<div class="card" onclick="speak('yummy')">
<div class="emoji">😋</div>
<div class="label">yummy</div>
</div>
</div>
</div>

<div class="sl">
<div class="ttl">Listen & Tap! 👂</div>
<button class="play" onclick="playWord()">🔊</button>
<div class="grid" id="g1">
<div class="card" data-w="cook" onclick="check1(this)">
<div class="emoji">👩‍🍳</div>
</div>
<div class="card" data-w="mix" onclick="check1(this)">
<div class="emoji">🥣</div>
</div>
<div class="card" data-w="cookie" onclick="check1(this)">
<div class="emoji">🍪</div>
</div>
<div class="card" data-w="yummy" onclick="check1(this)">
<div class="emoji">😋</div>
</div>
</div>
</div>
<div class="sl">
<div class="ttl">Match Pairs! 🎯</div>
<div class="sub">Find two same emojis</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px auto" id="g2">
<div class="card" style="width:140px;height:140px" data-w="cook" onclick="match(this)">
<div class="emoji" style="font-size:60px">👩‍🍳</div>
</div>
<div class="card" style="width:140px;height:140px" data-w="mix" onclick="match(this)">
<div class="emoji" style="font-size:60px">🥣</div>
</div>
<div class="card" style="width:140px;height:140px" data-w="cookie" onclick="match(this)">
<div class="emoji" style="font-size:60px">🍪</div>
</div>
<div class="card" style="width:140px;height:140px" data-w="cook" onclick="match(this)">
<div class="emoji" style="font-size:60px">👩‍🍳</div>
</div>
<div class="card" style="width:140px;height:140px" data-w="mix" onclick="match(this)">
<div class="emoji" style="font-size:60px">🥣</div>
</div>
<div class="card" style="width:140px;height:140px" data-w="cookie" onclick="match(this)">
<div class="emoji" style="font-size:60px">🍪</div>
</div>
</div>
</div>

<div class="sl">
<div class="ttl">Great Job! 🎉</div>
<div class="sub">You learned 5 new words!</div>
<div style="display:flex;gap:20px;margin-top:30px;flex-wrap:wrap;justify-content:center">
<span style="font-size:60px">👩‍🍳</span>
<span style="font-size:60px">🥣</span>
<span style="font-size:60px">🍪</span>
<span style="font-size:60px">👅</span>
<span style="font-size:60px">😋</span>
</div>
</div>

<div class="sl">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:100px;margin-bottom:10px">
<div class="ttl">Excellent! 🌟</div>
<div class="sub">See you tomorrow!</div>
</div>
</div>
<div class="nav">
<button class="btn" id="pb" onclick="go(c-1)" disabled>◀ Back</button>
<div class="pg" id="pg">1/6</div>
<button class="btn" id="nb" onclick="go(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=6,ws=['cook','mix','cookie','taste','yummy'],i=0,sel=null,m=0;
function speak(w){
var u='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(w)+'&type=2';
new Audio(u).play().catch(()=>new Audio('https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(w)+'&spd=4&source=web').play().catch(()=>{}));
}
function playWord(){if(i<ws.length)speak(ws[i])}
function check1(e){
if(e.dataset.w===ws[i]){
e.classList.add('correct');
speak(ws[i]);
setTimeout(()=>{e.classList.remove('correct');i++;i<ws.length?speak(ws[i]):setTimeout(()=>go(c+1),800)},800);
}else{e.classList.add('wrong');setTimeout(()=>e.classList.remove('wrong'),300)}
}
function match(e){
if(e.classList.contains('matched'))return;
if(sel===e){e.classList.remove('selected');sel=null;return}
if(sel){
if(sel.dataset.w===e.dataset.w){
sel.classList.add('matched');e.classList.add('matched');sel.classList.remove('selected');
speak(sel.dataset.w);m++;if(m===3)setTimeout(()=>go(c+1),1000);sel=null;
}else{
e.classList.add('wrong');sel.classList.add('wrong');
setTimeout(()=>{e.classList.remove('wrong');sel.classList.remove('wrong','selected');sel=null},500);
}
}else{e.classList.add('selected');sel=e}
}
function go(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(s=>s.classList.remove('on'));
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
if(c===2){i=0;setTimeout(()=>speak(ws[0]),500)}
if(c===3){m=0;sel=null;document.querySelectorAll('#g2 .card').forEach(b=>b.classList.remove('matched','selected'))}
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('nb');
b.textContent=c===t-1?'Done':'Next ▶';
b.disabled=c===t-1;
}
document.addEventListener('keydown',e=>{
if(e.key==='ArrowLeft')go(c-1);
if(e.key==='ArrowRight')go(c+1);
});
</script>
</body>
</html>
