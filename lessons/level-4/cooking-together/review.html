<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 35 Review - Cooking Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.bg-yellow{background:linear-gradient(160deg,#fff9c4,#ffe082)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;max-width:400px;margin:20px auto}
.word-btn{width:160px;height:160px;border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:all .2s}
.word-btn:active{transform:scale(.95)}
.word-btn.correct{background:#4caf50;transform:scale(1.1)}
.word-btn.wrong{background:#f44336;animation:shake .3s}
.emoji{font-size:70px}
.label{font-size:18px;font-weight:700;color:#555}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-10px)}
75%{transform:translateX(10px)}
}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word-grid{grid-template-columns:1fr 1fr;gap:12px}
.word-btn{width:140px;height:140px}
.emoji{font-size:60px}
.label{font-size:16px}
}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Start -->
<div class="sl bg-pink on">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" style="width:110px;margin:10px 0">
<div class="ttl">Let's Review!</div>
<div class="sub">Cooking Together 🍪</div>
</div>

<!-- S1: Learn -->
<div class="sl bg-sky">
<div class="ttl" style="font-size:32px">Tap to hear!</div>
<div class="word-grid">
<button class="word-btn" onclick="speak('cook')">
<div class="emoji">👩‍🍳</div>
<div class="label">cook</div>
</button>
<button class="word-btn" onclick="speak('mix')">
<div class="emoji">🥣</div>
<div class="label">mix</div>
</button>
<button class="word-btn" onclick="speak('cookie')">
<div class="emoji">🍪</div>
<div class="label">cookie</div>
</button>
<button class="word-btn" onclick="speak('taste')">
<div class="emoji">👅</div>
<div class="label">taste</div>
</button>
<button class="word-btn" onclick="speak('yummy')">
<div class="emoji">😋</div>
<div class="label">yummy</div>
</button>
</div>
</div>

<!-- S2: Game 1 - Find the word -->
<div class="sl bg-yellow">
<div class="ttl" style="font-size:32px">Find the word!</div>
<div style="font-size:48px;font-weight:800;color:#e67e22;margin:20px 0" id="target-word">cook</div>
<div class="word-grid" id="game-grid">
<button class="word-btn" data-word="cook" onclick="checkAnswer(this)">
<div class="emoji">👩‍🍳</div>
</button>
<button class="word-btn" data-word="mix" onclick="checkAnswer(this)">
<div class="emoji">🥣</div>
</button>
<button class="word-btn" data-word="cookie" onclick="checkAnswer(this)">
<div class="emoji">🍪</div>
</button>
<button class="word-btn" data-word="yummy" onclick="checkAnswer(this)">
<div class="emoji">😋</div>
</button>
</div>
</div>

<!-- S3: Game 2 - Listen and tap -->
<div class="sl bg-yellow">
<div class="ttl" style="font-size:32px">Listen and tap!</div>
<div class="sub">Tap the word you hear</div>
<div class="word-grid" id="listen-grid">
<button class="word-btn" data-word="cook" onclick="checkListen(this)">
<div class="emoji">👩‍🍳</div>
<div class="label">cook</div>
</button>
<button class="word-btn" data-word="mix" onclick="checkListen(this)">
<div class="emoji">🥣</div>
<div class="label">mix</div>
</button>
<button class="word-btn" data-word="cookie" onclick="checkListen(this)">
<div class="emoji">🍪</div>
<div class="label">cookie</div>
</button>
<button class="word-btn" data-word="taste" onclick="checkListen(this)">
<div class="emoji">👅</div>
<div class="label">taste</div>
</button>
<button class="word-btn" data-word="yummy" onclick="checkListen(this)">
<div class="emoji">😋</div>
<div class="label">yummy</div>
</button>
</div>
</div>

<!-- S4: Memory -->
<div class="sl bg-sky">
<div class="ttl" style="font-size:32px">Great job! 🎉</div>
<div class="sub">You learned 5 new words!</div>
<div style="display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;justify-content:center">
<span style="font-size:50px">👩‍🍳</span>
<span style="font-size:50px">🥣</span>
<span style="font-size:50px">🍪</span>
<span style="font-size:50px">👅</span>
<span style="font-size:50px">😋</span>
</div>
</div>

<!-- S5: Done -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:110px;margin:10px 0">
<div class="ttl">Excellent! 🌟</div>
<div class="sub">See you tomorrow!</div>
</div>
</div>

<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=6;
var words=['cook','mix','cookie','taste','yummy'];
var gameWords=['cook','mix','cookie','taste','yummy'];
var currentWordIndex=0;
var listenWords=['cook','mix','cookie','taste','yummy'];
var listenIndex=0;
var gameActive=false;
var listenActive=false;

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function checkAnswer(btn){
if(!gameActive)return;
var word=btn.getAttribute('data-word');
var target=gameWords[currentWordIndex];
if(word===target){
btn.classList.add('correct');
speak(word);
setTimeout(function(){
btn.classList.remove('correct');
currentWordIndex++;
if(currentWordIndex<gameWords.length){
document.getElementById('target-word').textContent=gameWords[currentWordIndex];
}else{
gameActive=false;
setTimeout(function(){goTo(c+1)},500);
}
},800);
}else{
btn.classList.add('wrong');
setTimeout(function(){btn.classList.remove('wrong')},300);
}
}

function checkListen(btn){
if(!listenActive)return;
var word=btn.getAttribute('data-word');
var target=listenWords[listenIndex];
if(word===target){
btn.classList.add('correct');
setTimeout(function(){
btn.classList.remove('correct');
listenIndex++;
if(listenIndex<listenWords.length){
speak(listenWords[listenIndex]);
}else{
listenActive=false;
setTimeout(function(){goTo(c+1)},500);
}
},800);
}else{
btn.classList.add('wrong');
setTimeout(function(){btn.classList.remove('wrong')},300);
}
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
if(c===2){
gameActive=true;
currentWordIndex=0;
document.getElementById('target-word').textContent=gameWords[0];
}
if(c===3){
listenActive=true;
listenIndex=0;
setTimeout(function(){speak(listenWords[0])},500);
}
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
});

goTo(0);
</script>
</body>
</html>
