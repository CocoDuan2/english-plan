<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 35 Review - Cooking Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 24px 70px;text-align:center}
.sl.on{display:flex}
.bg-pink{background:linear-gradient(160deg,#fce4ec,#f8bbd0)}
.bg-sky{background:linear-gradient(180deg,#87CEEB,#B6E3B5)}
.bg-yellow{background:linear-gradient(160deg,#fff9c4,#ffe082)}
.ttl{font-size:42px;font-weight:800;color:#2c3e50;margin:8px 0}
.sub{font-size:22px;color:#7f8c8d}
.word-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;max-width:400px;margin:20px auto}
.word-btn{width:160px;height:160px;border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:all .2s}
.word-btn:active{transform:scale(.95)}
.word-btn.correct{background:#4caf50;transform:scale(1.1)}
.word-btn.wrong{background:#f44336;animation:shake .3s}
.word-btn.matched{opacity:.3;pointer-events:none}
.word-btn.selected{border:4px solid #2196f3;transform:scale(1.05)}
.emoji{font-size:70px}
.label{font-size:18px;font-weight:700;color:#555}
.play-btn{width:100px;height:100px;border-radius:50%;border:none;background:#4caf50;color:#fff;font-size:50px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);margin:15px}
.play-btn:active{transform:scale(.9)}
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#F9ADC7;color:#fff}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-10px)}
75%{transform:translateX(10px)}
}
@media(max-width:480px){
.ttl{font-size:30px}
.sub{font-size:16px}
.word-grid{grid-template-columns:1fr 1fr;gap:12px}
.word-btn{width:140px;height:140px}
.emoji{font-size:60px}
.label{font-size:16px}
.play-btn{width:80px;height:80px;font-size:40px}
}
</style>
</head>
<body>
<div class="deck">
<!-- S0: Start -->
<div class="sl bg-pink on">
<img src="../../../assets/peppa/mummy-pig-standing-grass.png" style="width:110px;margin:10px 0">
<div class="ttl">Let's Review!</div>
<div class="sub">Cooking Together 🍪</div>
</div>

<!-- S1: Learn -->
<div class="sl bg-sky">
<div class="ttl" style="font-size:32px">Tap to hear!</div>
<div class="word-grid">
<button class="word-btn" onclick="speak('cook')">
<div class="emoji">👩‍🍳</div>
<div class="label">cook</div>
</button>
<button class="word-btn" onclick="speak('mix')">
<div class="emoji">🥣</div>
<div class="label">mix</div>
</button>
<button class="word-btn" onclick="speak('cookie')">
<div class="emoji">🍪</div>
<div class="label">cookie</div>
</button>
<button class="word-btn" onclick="speak('taste')">
<div class="emoji">👅</div>
<div class="label">taste</div>
</button>
<button class="word-btn" onclick="speak('yummy')">
<div class="emoji">😋</div>
<div class="label">yummy</div>
</button>
</div>
</div>

<!-- S2: Game 1 - Listen and find -->
<div class="sl bg-yellow">
<div class="ttl" style="font-size:32px">Listen and tap! 👂</div>
<button class="play-btn" onclick="playCurrentWord()">🔊</button>
<div class="word-grid" id="game1-grid">
<button class="word-btn" data-word="cook" onclick="checkGame1(this)">
<div class="emoji">👩‍🍳</div>
</button>
<button class="word-btn" data-word="mix" onclick="checkGame1(this)">
<div class="emoji">🥣</div>
</button>
<button class="word-btn" data-word="cookie" onclick="checkGame1(this)">
<div class="emoji">🍪</div>
</button>
<button class="word-btn" data-word="yummy" onclick="checkGame1(this)">
<div class="emoji">😋</div>
</button>
</div>
</div>

<!-- S3: Game 2 - Memory match -->
<div class="sl bg-yellow">
<div class="ttl" style="font-size:32px">Match pairs! 🎯</div>
<div class="sub">Find two same words</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:450px;margin:20px auto" id="match-grid">
<button class="word-btn" style="width:130px;height:130px" data-word="cook" onclick="selectCard(this)">
<div class="emoji" style="font-size:50px">👩‍🍳</div>
</button>
<button class="word-btn" style="width:130px;height:130px" data-word="mix" onclick="selectCard(this)">
<div class="emoji" style="font-size:50px">🥣</div>
</button>
<button class="word-btn" style="width:130px;height:130px" data-word="cookie" onclick="selectCard(this)">
<div class="emoji" style="font-size:50px">🍪</div>
</button>
<button class="word-btn" style="width:130px;height:130px" data-word="cook" onclick="selectCard(this)">
<div class="emoji" style="font-size:50px">👩‍🍳</div>
</button>
<button class="word-btn" style="width:130px;height:130px" data-word="mix" onclick="selectCard(this)">
<div class="emoji" style="font-size:50px">🥣</div>
</button>
<button class="word-btn" style="width:130px;height:130px" data-word="cookie" onclick="selectCard(this)">
<div class="emoji" style="font-size:50px">🍪</div>
</button>
</div>
</div>

<!-- S4: Memory -->
<div class="sl bg-sky">
<div class="ttl" style="font-size:32px">Great job! 🎉</div>
<div class="sub">You learned 5 new words!</div>
<div style="display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;justify-content:center">
<span style="font-size:50px">👩‍🍳</span>
<span style="font-size:50px">🥣</span>
<span style="font-size:50px">🍪</span>
<span style="font-size:50px">👅</span>
<span style="font-size:50px">😋</span>
</div>
</div>

<!-- S5: Done -->
<div class="sl bg-pink">
<img src="../../../assets/peppa/peppa-and-george-ooo.png" style="width:110px;margin:10px 0">
<div class="ttl">Excellent! 🌟</div>
<div class="sub">See you tomorrow!</div>
</div>
</div>

<div class="nav">
<button class="nb" id="pb" onclick="goTo(c-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="xb" onclick="goTo(c+1)">Next ▶</button>
</div>

<script>
var c=0,t=6;
var game1Words=['cook','mix','cookie','taste','yummy'];
var game1Index=0;
var game1Active=false;
var selectedCard=null;
var matchedPairs=0;

function speak(txt){
var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(txt)+'&type=2';
var a=new Audio(url);
a.play().catch(function(){
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(txt)+'&spd=4&source=web';
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function playCurrentWord(){
if(game1Active && game1Index<game1Words.length){
speak(game1Words[game1Index]);
}
}

function checkGame1(btn){
if(!game1Active)return;
var word=btn.getAttribute('data-word');
if(word===game1Words[game1Index]){
btn.classList.add('correct');
speak(word);
setTimeout(function(){
btn.classList.remove('correct');
game1Index++;
if(game1Index<game1Words.length){
speak(game1Words[game1Index]);
}else{
game1Active=false;
setTimeout(function(){goTo(c+1)},800);
}
},800);
}else{
btn.classList.add('wrong');
setTimeout(function(){btn.classList.remove('wrong')},300);
}
}

function selectCard(btn){
if(btn.classList.contains('matched'))return;
if(selectedCard===btn){
btn.classList.remove('selected');
selectedCard=null;
return;
}
if(selectedCard){
var word1=selectedCard.getAttribute('data-word');
var word2=btn.getAttribute('data-word');
if(word1===word2){
selectedCard.classList.add('matched');
btn.classList.add('matched');
selectedCard.classList.remove('selected');
speak(word1);
matchedPairs++;
if(matchedPairs===3){
setTimeout(function(){goTo(c+1)},1000);
}
selectedCard=null;
}else{
btn.classList.add('wrong');
selectedCard.classList.add('wrong');
setTimeout(function(){
btn.classList.remove('wrong');
selectedCard.classList.remove('wrong','selected');
selectedCard=null;
},500);
}
}else{
btn.classList.add('selected');
selectedCard=btn;
}
}

function goTo(n){
if(n<0||n>=t)return;
document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});
document.querySelectorAll('.sl')[n].classList.add('on');
c=n;
if(c===2){
game1Active=true;
game1Index=0;
setTimeout(function(){speak(game1Words[0])},500);
}
if(c===3){
matchedPairs=0;
selectedCard=null;
document.querySelectorAll('#match-grid .word-btn').forEach(function(b){
b.classList.remove('matched','selected');
});
}
document.getElementById('pg').textContent=(c+1)+'/'+t;
document.getElementById('pb').disabled=c===0;
var b=document.getElementById('xb');
if(c===t-1){
b.textContent='Done';
b.disabled=true;
}else{
b.textContent='Next ▶';
b.disabled=false;
}
}

document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft')goTo(c-1);
if(e.key==='ArrowRight')goTo(c+1);
});

goTo(0);
</script>
</body>
</html>
