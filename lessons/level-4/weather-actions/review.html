<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 40 Review - Weather Actions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#87CEEB,#4fc3f7);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(135,206,235,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(135,206,235,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.learn-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.learn-card{width:110px;height:110px;border-radius:18px;background:#ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.learn-card.revealed{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card img{width:90px;display:none}
.learn-card.revealed img{display:block}
.learn-card .lbl{font-size:20px;font-weight:700;color:#2c3e50;margin-top:6px;display:none}
.learn-card.revealed .lbl{display:block}
.card-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:44px}
.learn-card.revealed .card-icon{display:none}
.weather-btns{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.weather-btn{width:105px;height:105px;border-radius:18px;border:none;cursor:pointer;font-size:60px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .1s}
.weather-btn:active{transform:scale(.9)}
.listen-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0}
.listen-card{width:100px;height:100px;border-radius:18px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:70px}
.listen-card .lbl{font-size:16px;font-weight:700;color:#2c3e50;margin-top:4px}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:440px;margin:20px 0}
.mem-card{aspect-ratio:1;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mem-front{background:linear-gradient(135deg,#F9ADC7,#ffa8cc)}
.mem-front .e{font-size:44px}
.mem-back{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);transform:rotateY(180deg)}
.mem-back img{width:70px}
.mem-back .lbl{font-size:18px;font-weight:700;color:#2c3e50;margin-top:6px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.speaker-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#4fc3f7,#29b6f6);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(79,195,247,.4);margin:10px 0}
@media(max-width:480px){.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}.pr img{width:65px}.sb{font-size:22px}.mem-grid{width:100%;max-width:360px;grid-template-columns:repeat(4,1fr);gap:8px}.mem-front .e{font-size:36px}.mem-back img{width:50px}.mem-back .lbl{font-size:14px}.weather-btn{width:90px;height:90px;font-size:50px}.listen-card{width:90px;height:90px}.listen-card img{width:60px}}
@media(min-width:768px){.mem-grid{width:560px;gap:16px}}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:10px 0">
<div class="te">Weather Actions</div>
<div class="sb" id="st0">★★★★★</div>
<div style="display:flex;gap:20px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2600.svg" width="70" alt="sunny">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f327.svg" width="70" alt="rainy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f32c.svg" width="70" alt="windy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2744.svg" width="70" alt="snowy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2601.svg" width="70" alt="cloudy">
</div>
<button class="nb" onclick="goM(1)" style="margin-top:20px;font-size:32px;padding:18px 40px">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">点一点，学单词！</div>
<div class="sb" id="st1">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-standing.png">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Weather Forecast Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Weather Forecast</div>
<div class="tz">听天气，点一点！</div>
<div class="sb" id="st2">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/daddy-pig-walking.png">
<div class="bbl">Listen and tap!</div>
</div>
<button class="speaker-btn" onclick="playWeatherQ()">🔊</button>
<div class="weather-btns" id="weatherBtns"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">听单词，找一找！</div>
<div class="sb" id="st3">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/george-standing.png">
<div class="bbl">Find the word!</div>
</div>
<button class="speaker-btn" onclick="playListenQ()">🔊</button>
<div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">翻一翻，找一样的！</div>
<div class="sb" id="st4">★★★★★</div>
</div>
<div class="pr">
<img src="../../../assets/peppa/candy-cat-green-dress.png">
<div class="bbl">Match the pairs!</div>
</div>
<div class="mem-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;margin:10px 0">
<div class="te">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="bbl" style="margin:20px 0;font-size:24px">You learned all the weather words! Great job!</div>
<button class="nb" onclick="goM(0)" style="margin-top:20px;font-size:28px;padding:16px 36px">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../../assets/peppa/';
var W=[
{w:'sunny',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2600.svg'},
{w:'rainy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f327.svg'},
{w:'windy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f32c.svg'},
{w:'snowy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2744.svg'},
{w:'cloudy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2601.svg'}
];
var curM=0,busy=false;
var m1Done=0,m2Done=0,m3Done=0,m4Done=0;
var m2Target='',m3Target='';
var m4Flipped=[],m4Matched=[];

var weatherColors={
sunny:'linear-gradient(135deg,#fff9c4,#ffeb3b)',
rainy:'linear-gradient(135deg,#b3e5fc,#4fc3f7)',
windy:'linear-gradient(135deg,#e1f5fe,#81d4fa)',
snowy:'linear-gradient(135deg,#f1f8e9,#e3f2fd)',
cloudy:'linear-gradient(135deg,#eceff1,#cfd8dc)'
};

var weatherEmoji={
sunny:'☀️',
rainy:'🌧️',
windy:'💨',
snowy:'❄️',
cloudy:'☁️'
};

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
if(d===1&&curM===0){getAC();}
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(m1Done>0)return;
var g=document.getElementById('learnGrid');
g.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='learn-card';
c.innerHTML='<div class="card-icon">❓</div><img src="'+item.img+'"><div class="lbl">'+item.w+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
speak(item.w);
m1Done++;
document.getElementById('st1').innerHTML=stars(m1Done,5);
};
g.appendChild(c);
});
}

function initM2(){
if(m2Done>0)return;
var g=document.getElementById('weatherBtns');
g.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
shuffled.forEach(function(item){
var b=document.createElement('button');
b.className='weather-btn';
b.style.background=weatherColors[item.w];
b.textContent=weatherEmoji[item.w];
b.onclick=function(){
if(busy)return;
if(item.w===m2Target){
busy=true;
playOk();
speak(item.w);
b.style.opacity='0.3';
b.disabled=true;
m2Done++;
document.getElementById('st2').innerHTML=stars(m2Done,5);
setTimeout(function(){
busy=false;
if(m2Done<5)playWeatherQ();
else setTimeout(function(){goM(1)},800);
},1200);
}else{
playNo();
}
};
g.appendChild(b);
});
playWeatherQ();
}

function playWeatherQ(){
if(m2Done>=5)return;
var remaining=W.filter(function(item){
var btns=document.querySelectorAll('#weatherBtns .weather-btn');
for(var i=0;i<btns.length;i++){
if(btns[i].textContent===weatherEmoji[item.w]&&btns[i].disabled)return false;
}
return true;
});
if(remaining.length===0)return;
var target=remaining[Math.floor(Math.random()*remaining.length)];
m2Target=target.w;
speak(target.w);
}

function initM3(){
if(m3Done>0)return;
var g=document.getElementById('listenGrid');
g.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
shuffled.forEach(function(item){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'"><div class="lbl">'+item.w+'</div>';
c.onclick=function(){
if(busy)return;
if(item.w===m3Target){
busy=true;
playOk();
speak(item.w);
c.style.opacity='0.3';
c.style.pointerEvents='none';
m3Done++;
document.getElementById('st3').innerHTML=stars(m3Done,5);
setTimeout(function(){
busy=false;
if(m3Done<5)playListenQ();
else setTimeout(function(){goM(1)},800);
},1200);
}else{
playNo();
}
};
g.appendChild(c);
});
playListenQ();
}

function playListenQ(){
if(m3Done>=5)return;
var remaining=W.filter(function(item){
var cards=document.querySelectorAll('#listenGrid .listen-card');
for(var i=0;i<cards.length;i++){
if(cards[i].querySelector('.lbl').textContent===item.w&&cards[i].style.opacity==='0.3')return false;
}
return true;
});
if(remaining.length===0)return;
var target=remaining[Math.floor(Math.random()*remaining.length)];
m3Target=target.w;
speak(target.w);
}

function initM4(){
if(m4Done>0)return;
var g=document.getElementById('memGrid');
g.innerHTML='';
var pairs=W.concat(W).sort(function(){return Math.random()-.5});
pairs.forEach(function(item,i){
var c=document.createElement('div');
c.className='mem-card';
c.dataset.word=item.w;
c.innerHTML='<div class="mem-face mem-front"><div class="e">❓</div></div><div class="mem-face mem-back"><img src="'+item.img+'"><div class="lbl">'+item.w+'</div></div>';
c.onclick=function(){flipCard(i)};
g.appendChild(c);
});
}

function flipCard(i){
if(busy)return;
var cards=document.querySelectorAll('#memGrid .mem-card');
var c=cards[i];
if(c.classList.contains('flipped')||m4Matched.includes(i))return;
c.classList.add('flipped');
m4Flipped.push(i);
if(m4Flipped.length===2){
busy=true;
var c1=cards[m4Flipped[0]],c2=cards[m4Flipped[1]];
if(c1.dataset.word===c2.dataset.word){
playOk();
speak(c1.dataset.word);
m4Matched.push(m4Flipped[0],m4Flipped[1]);
m4Done++;
document.getElementById('st4').innerHTML=stars(m4Done,5);
setTimeout(function(){
busy=false;
m4Flipped=[];
if(m4Done>=5)setTimeout(function(){goM(1)},800);
},1200);
}else{
playNo();
setTimeout(function(){
c1.classList.remove('flipped');
c2.classList.remove('flipped');
m4Flipped=[];
busy=false;
},1000);
}
}
}

function initM5(){
document.getElementById('st0').innerHTML='⭐⭐⭐⭐⭐';
}

goM(0);
</script>
</body>
</html>
