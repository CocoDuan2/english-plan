<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Phonics 4 · 辅音组合 - 跟着佩琪学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI','Comic Sans MS',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#fff3e0,#ffe0b2);
  padding:20px;color:#2c3e50;
}
.header{text-align:center;margin-bottom:30px}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:#fff3e0;border:3px solid #ffa726;
  color:#e65100;font-size:36px;font-weight:900;
  width:70px;height:70px;border-radius:18px;margin-bottom:12px;
}
h1{font-size:32px;font-weight:900;color:#394867;margin-bottom:6px}
.sub{font-size:16px;color:#667085;margin-bottom:8px}
.section{max-width:600px;margin:0 auto 24px}
.section-title{
  font-size:20px;font-weight:900;color:#e65100;
  margin-bottom:12px;padding-left:8px;border-left:4px solid #ffa726;
}
.lesson-list{display:flex;flex-direction:column;gap:12px}
.lesson-card{
  background:#fff;border-radius:16px;padding:16px 20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  display:flex;align-items:center;gap:16px;
  text-decoration:none;color:inherit;
  transition:all .2s ease;border:2px solid transparent;
}
.lesson-card:hover{
  border-color:#ffa726;transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(0,0,0,.12);
}
.lesson-card .day{
  font-size:14px;font-weight:900;color:#fff;
  background:#ffa726;border-radius:10px;
  padding:6px 12px;min-width:50px;text-align:center;
}
.lesson-card .info{flex:1}
.lesson-card .title{font-size:16px;font-weight:700;color:#394867}
.lesson-card .title-cn{font-size:13px;color:#667085;margin-top:2px}
.lesson-card .links{display:flex;gap:8px}
.lesson-card .link{
  padding:6px 14px;border-radius:8px;
  font-size:13px;font-weight:700;color:#fff;
  text-decoration:none;transition:transform .2s ease;
}
.lesson-card .link:active{transform:scale(.95)}
.link-teach{background:#e91e8c}
.link-review{background:#e67e22}
.back-btn{
  display:inline-block;margin-top:16px;
  padding:12px 28px;background:#ffa726;color:#fff;
  border-radius:12px;text-decoration:none;
  font-size:16px;font-weight:700;
  box-shadow:0 4px 12px rgba(255,167,38,.3);
}
</style>
</head>
<body>
<div class="header">
  <div class="badge">P4</div>
  <h1>Phonics 4 · 辅音组合</h1>
  <div class="sub">辅音连缀 + 字母组合 · 20课</div>
</div>

<div class="section">
  <div class="section-title">🔤 辅音连缀（P62-P71）</div>
  <div class="lesson-list" id="blendsList"></div>
</div>

<div class="section">
  <div class="section-title">🔤 辅音字母组合（P72-P81）</div>
  <div class="lesson-list" id="digraphsList"></div>
</div>

<div style="text-align:center">
  <a class="back-btn" href="index.html">← 返回主页</a>
</div>

<script>
const lessons=[
  {day:"P62",title:"bl Blend · Peppa's Blue Blocks",titleCn:"bl 组合 · 佩琪的蓝色积木",folder:"bl-blend"},
  {day:"P63",title:"cl Blend · Peppa Claps",titleCn:"cl 组合 · 佩琪拍手",folder:"cl-blend"},
  {day:"P64",title:"fl Blend · Peppa's Flower Garden",titleCn:"fl 组合 · 佩琪的花园",folder:"fl-blend"},
  {day:"P65",title:"gl Blend · Peppa's Glass Collection",titleCn:"gl 组合 · 佩琪的玻璃杯收藏",folder:"gl-blend"},
  {day:"P66",title:"pl Blend · Peppa's Playtime",titleCn:"pl 组合 · 佩琪的游戏时间",folder:"pl-blend"},
  {day:"P67",title:"sl Blend · Peppa Loves to Slide",titleCn:"sl 组合 · 佩琪爱滑梯",folder:"sl-blend"},
  {day:"P68",title:"br Blend · Peppa's Brown Bread",titleCn:"br 组合 · 佩琪的棕色面包",folder:"br-blend"},
  {day:"P69",title:"cr Blend · Peppa Finds a Crab",titleCn:"cr 组合 · 佩琪找到螃蟹",folder:"cr-blend"},
  {day:"P70",title:"dr Blend · Peppa Plays the Drum",titleCn:"dr 组合 · 佩琪打鼓",folder:"dr-blend"},
  {day:"P71",title:"fr Blend · Peppa's Fruit Basket",titleCn:"fr 组合 · 佩琪的水果篮",folder:"fr-blend"}
];

const list=document.getElementById('blendsList');
lessons.forEach(l=>{
  const card=document.createElement('div');
  card.className='lesson-card';
  card.innerHTML=`
    <div class="day">${l.day}</div>
    <div class="info">
      <div class="title">${l.title}</div>
      <div class="title-cn">${l.titleCn}</div>
    </div>
    <div class="links">
      <a class="link link-teach" href="lessons/phonics-4/${l.folder}/teach.html">教学</a>
      <a class="link link-review" href="lessons/phonics-4/${l.folder}/review.html">复习</a>
    </div>
  `;
  list.appendChild(card);
});

const digraphs=[
  {day:"P72",title:"ch Digraph · Peppa's Cheese & Chicken",titleCn:"ch 组合 · 佩琪的奶酪和鸡",folder:"ch-digraph"},
  {day:"P73",title:"sh Digraph · Peppa's Shopping Trip",titleCn:"sh 组合 · 佩琪的购物之旅",folder:"sh-digraph"},
  {day:"P74",title:"th Digraph · Peppa Thinks Big",titleCn:"th 组合 · 佩琪想一想",folder:"th-digraph"},
  {day:"P75",title:"wh Digraph · Peppa Asks Why",titleCn:"wh 组合 · 佩琪问为什么",folder:"wh-digraph"},
  {day:"P76",title:"ph Digraph · Peppa's Phone Call",titleCn:"ph 组合 · 佩琪打电话",folder:"ph-sound"},
  {day:"P77",title:"ck Sound · Peppa's Little Duck",titleCn:"ck 组合 · 佩琪的小鸭子",folder:"ck-sound"},
  {day:"P78",title:"ng Sound · Peppa Sings a Song",titleCn:"ng 组合 · 佩琪唱歌",folder:"ng-sound"},
  {day:"P79",title:"nk Sound · Peppa's Pink Bank",titleCn:"nk 组合 · 佩琪的粉色存钱罐",folder:"nk-sound"},
  {day:"P80",title:"gr Blend · Peppa Grows Green Grapes",titleCn:"gr 组合 · 佩琪种绿葡萄",folder:"gr-blend"}
];

const dlist=document.getElementById('digraphsList');
digraphs.forEach(l=>{
  const card=document.createElement('div');
  card.className='lesson-card';
  card.innerHTML=`
    <div class="day">${l.day}</div>
    <div class="info">
      <div class="title">${l.title}</div>
      <div class="title-cn">${l.titleCn}</div>
    </div>
    <div class="links">
      <a class="link link-teach" href="lessons/phonics-4/${l.folder}/teach.html">教学</a>
      <a class="link link-review" href="lessons/phonics-4/${l.folder}/review.html">复习</a>
    </div>
  `;
  dlist.appendChild(card);
});
</script>
</body>
</html>
