<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 4 - Food (Teach)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 30px 70px;text-align:center;overflow-y:auto}
.sl.on{display:flex}
.bg0{background:linear-gradient(160deg,#fef9ef,#fdf2e9)}
.bg1{background:linear-gradient(160deg,#e8f8f5,#d5f5e3)}
.bg2{background:linear-gradient(160deg,#fef9ef,#ebf5fb)}
.bg3{background:linear-gradient(160deg,#fdebd0,#fadbd8)}
.bg4{background:linear-gradient(160deg,#ebf5fb,#d6eaf8)}
.bg5{background:linear-gradient(160deg,#f9ebea,#fdedec)}
.bg6{background:linear-gradient(160deg,#fef9ef,#fdebd0)}
.sec{font-size:13px;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.ttl{font-size:32px;font-weight:800;color:#2c3e50;margin-bottom:12px}
.sub{font-size:18px;color:#7f8c8d;margin-bottom:16px}
.big{width:180px;height:180px;margin:6px 0}
.wd{font-size:60px;font-weight:800;color:#2c3e50;margin:10px 0;letter-spacing:3px}
.ks{font-size:30px;font-weight:600;color:#e67e22;margin:12px 0;background:rgba(230,126,34,.08);border-radius:12px;padding:10px 24px;border-left:4px solid #e67e22}

/* Flash grid */
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:560px;margin:10px auto}
.fc{background:#fff;border-radius:16px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.05);min-height:100px}
.fc img{width:52px;height:52px}
.fc .fw{font-size:15px;font-weight:700;color:#2c3e50;margin-top:4px}

/* Red circle for "red" review word */
.red-circle{width:52px;height:52px;border-radius:50%;background:#e74c3c;display:inline-block}
.red-circle-big{width:180px;height:180px;border-radius:50%;background:#e74c3c;display:inline-block}

/* Shopping Basket */
.basket-area{position:relative;width:100%;max-width:520px;min-height:320px;margin:10px auto}
.basket{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:180px;height:120px;background:linear-gradient(180deg,#d4a574,#b8834a);border-radius:0 0 30px 30px;border:4px solid #a0703c;display:flex;align-items:center;justify-content:center;z-index:2}
.basket::before{content:'';position:absolute;top:-20px;left:10%;width:80%;height:24px;border:4px solid #a0703c;border-bottom:none;border-radius:40px 40px 0 0}
.basket-items{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:8px}
.food-shelf{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.food-item{cursor:pointer;transition:transform .3s,opacity .3s;display:flex;flex-direction:column;align-items:center;gap:4px}
.food-item:hover{transform:scale(1.1)}
.food-item.in-basket{opacity:0;transform:scale(0) translateY(100px);pointer-events:none}
.food-item .fi-label{font-size:14px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.food-item.in-basket .fi-label{opacity:0}
.basket-sentence{font-size:28px;font-weight:700;color:#e67e22;margin-top:8px;min-height:40px;opacity:0;transition:opacity .4s}
.basket-sentence.show{opacity:1}

/* Menu */
.menu-board{background:#fffbf0;border:3px solid #d4a574;border-radius:16px;padding:20px;max-width:480px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.menu-header{font-size:24px;font-weight:800;color:#d4a574;margin-bottom:16px;border-bottom:2px dashed #d4a574;padding-bottom:8px}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.menu-item{background:#fff;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.menu-item:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.menu-item img{width:60px;height:60px}
.menu-item .mi-name{font-size:16px;font-weight:700;color:#2c3e50;margin-top:4px}
.menu-item.selected{background:#d5f5e3;box-shadow:0 0 0 3px #27ae60}
.menu-question{font-size:26px;font-weight:700;color:#e67e22;margin-bottom:12px;min-height:36px}
.menu-answer{font-size:24px;font-weight:600;color:#27ae60;margin-top:12px;min-height:32px;opacity:0;transition:opacity .4s}
.menu-answer.show{opacity:1}

/* FAB & popup */
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#3498db;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(52,152,219,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.fab:hover{background:#2980b9;transform:scale(1.08)}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:340px;max-height:45vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:16px 20px;display:none;font-size:14px;line-height:1.7;color:#555;border:1px solid rgba(52,152,219,.2)}
.pop.on{display:block;animation:fu .2s ease}
.pop-t{font-size:12px;font-weight:700;color:#3498db;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.pop ul{margin:4px 0 4px 18px}.pop li{margin:3px 0}.pop b{color:#2c3e50}
.pop .tc{font-weight:700;color:#3498db;margin-top:8px;display:block;font-size:13px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nb{padding:10px 22px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#3498db;color:#fff}
.nb:hover{background:#2980b9}
.nb:disabled{background:#e0e0e0;color:#bbb;cursor:default}
.np{font-size:14px;font-weight:600;color:#999}
.nk{font-size:11px;color:#ccc;margin-top:2px;text-align:center}

@media(min-width:768px){
  .big{width:220px;height:220px}
  .wd{font-size:72px}
  .ks{font-size:34px}
  .ttl{font-size:38px}
  .fc img{width:68px;height:68px}
  .fc .fw{font-size:18px}
  .red-circle{width:68px;height:68px}
  .red-circle-big{width:220px;height:220px}
  .basket-area{min-height:380px}
  .food-item img{width:80px!important;height:80px!important}
  .menu-item img{width:80px;height:80px}
  .menu-item .mi-name{font-size:18px}
  .pop{width:400px}
}
</style>
</head>
<body>
<div class="deck" id="D"></div>
<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div class="pop-t">📋 Teacher Notes</div><div id="B"></div></div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">◀ Back</button>
  <div style="text-align:center"><div class="np" id="pg">1/12</div><div class="nk">← → · T=tips</div></div>
  <button class="nb" id="nb" onclick="go(1)">Next ▶</button>
</div>
<script>
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/';
var N={},c=0,t=0,o=false;

var RW=[
  {w:'head',svg:'1f600',isCircle:false},
  {w:'red',svg:'',isCircle:true},
  {w:'duck',svg:'1f986',isCircle:false}
];
var NW=[
  {w:'apple',svg:'1f34e',act:'Yummy! Rub your tummy!'},
  {w:'banana',svg:'1f34c',act:'Peel the banana! Peel peel!'},
  {w:'milk',svg:'1f95b',act:'Pour the milk! Glug glug!'},
  {w:'bread',svg:'1f35e',act:'Spread the bread! Spread!'},
  {w:'egg',svg:'1f95a',act:'Crack the egg! Crack!'}
];

function img(svg,sz){return '<img src="'+TW+svg+'.svg" width="'+sz+'" height="'+sz+'" alt="">'}
function mk(i,bg,x){return '<div class="sl '+bg+(i===0?' on':'')+'" data-i="'+i+'">'+x+'</div>'}

function reviewIcon(r, sz) {
  if(r.isCircle) {
    var cls = sz > 60 ? 'red-circle-big' : 'red-circle';
    return '<div class="'+cls+'" style="width:'+sz+'px;height:'+sz+'px"></div>';
  }
  return img(r.svg, sz);
}

function build(){
var h='',i=0;

// 1 Title
h+=mk(i++,'bg0',
  '<div style="display:flex;gap:8px;margin:6px 0">'+NW.map(function(w){return img(w.svg,60)}).join('')+'</div>'+
  '<div class="ttl">Food</div>'+
  '<div class="sub">apple · banana · milk · bread · egg</div>');
N[0]='<span class="tc">🎯 Today</span><ul><li>Sentence: <b>I like ___!</b></li><li>Ask: <b>Do you like ___?</b></li><li>New: apple, banana, milk, bread, egg</li><li>Review: head, red, duck</li></ul>';

// 2 Warm-up
h+=mk(i++,'bg1',
  '<div class="sec">Warm-up</div><div class="ttl">Do you remember? 👀</div>'+
  '<div class="fg">'+RW.map(function(w){
    return '<div class="fc">'+reviewIcon(w,52)+'<div class="fw">'+w.w+'</div></div>';
  }).join('')+'</div>'+
  '<div class="ks">I like ___!</div>');
N[1]='<span class="tc">🗣️</span><ul><li>Point to each: "What\'s this?"</li><li>Then model: "I like red! I like duck!"</li><li>Quick 2-3 rounds</li></ul>';

// 3-7 New Words
NW.forEach(function(w,j){
  h+=mk(i++,'bg2',
    '<div class="sec">New Word '+(j+1)+'/5</div>'+
    img(w.svg,180)+
    '<div class="wd">'+w.w+'</div>'+
    '<div class="ks">I like '+w.w+'!</div>');
  N[i-1]='<span class="tc">🗣️</span><ul><li>"Do you like '+w.w+'?" → "I like '+w.w+'!"</li><li>Repeat: slow → normal → fast</li></ul><span class="tc">🤚</span><ul><li>"'+w.act+'"</li></ul>';
});

// 8 Shopping Basket
h+=mk(i++,'bg3',
  '<div class="sec">Shopping Basket</div><div class="ttl">Let\'s go shopping! 🛒</div>'+
  '<div class="basket-area" id="basketArea">'+
    '<div class="food-shelf" id="foodShelf">'+NW.map(function(w,j){
      return '<div class="food-item" id="fi'+j+'" onclick="addToBasket('+j+')" data-idx="'+j+'">'+
        img(w.svg,70)+'<div class="fi-label" id="fil'+j+'">'+w.w+'</div></div>';
    }).join('')+'</div>'+
    '<div class="basket"><div class="basket-items" id="basketItems"></div></div>'+
  '</div>'+
  '<div class="basket-sentence" id="basketSentence"></div>');
N[i-1]='<span class="tc">🎮 Shopping Basket</span><ul><li>Say: "Let\'s buy some food!"</li><li>Tap each food → it flies into the basket</li><li>Each time say: "I like apple!" etc.</li><li>Ask child: "Do you like banana?"</li></ul>';

// 9 Menu
h+=mk(i++,'bg4',
  '<div class="sec">Menu</div><div class="ttl">Restaurant Time! 🍽️</div>'+
  '<div class="menu-question" id="menuQ">Do you like ___?</div>'+
  '<div class="menu-board">'+
    '<div class="menu-header">Today\'s Menu</div>'+
    '<div class="menu-grid" id="menuGrid">'+NW.map(function(w,j){
      return '<div class="menu-item" id="mi'+j+'" onclick="pickMenu('+j+')">'+
        img(w.svg,60)+'<div class="mi-name">'+w.w+'</div></div>';
    }).join('')+'</div>'+
  '</div>'+
  '<div class="menu-answer" id="menuA"></div>');
N[i-1]='<span class="tc">🎮 Menu Order</span><ul><li>Teacher plays waiter: "Welcome! What do you like?"</li><li>Ask: "Do you like apple?" → child taps</li><li>Child answers: "I like apple!"</li><li>Go through all 5 items</li></ul>';

// 10 Bye
h+=mk(i++,'bg6',
  img('2b50',180)+
  '<div class="ttl">Well Done!</div>'+
  '<div class="sub">See you next time! 👋</div>');
N[i-1]='<span class="tc">👋</span><ul><li>"Say bye to the food! Bye apple! Bye banana!"</li></ul>';

document.getElementById('D').innerHTML=h;
t=i;goTo(0);
}

// === Shopping Basket ===
var basketCount=0;
function addToBasket(idx){
  var el=document.getElementById('fi'+idx);
  if(el.classList.contains('in-basket'))return;
  el.classList.add('in-basket');
  var w=NW[idx];
  var bi=document.getElementById('basketItems');
  var newImg=document.createElement('span');
  newImg.innerHTML=img(w.svg,30);
  newImg.style.animation='popIn .4s ease';
  bi.appendChild(newImg);
  var sent=document.getElementById('basketSentence');
  sent.textContent='I like '+w.w+'!';
  sent.classList.add('show');
  basketCount++;
  if(basketCount>=5){
    setTimeout(function(){sent.textContent='I like all the food!';},1500);
  }
}

// === Menu ===
var menuIdx=0,menuOrder=[0,1,2,3,4];
function shuffleArr(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function initMenu(){
  menuOrder=shuffleArr([0,1,2,3,4]);
  menuIdx=0;
  showMenuQ();
}
function showMenuQ(){
  if(menuIdx>=5){
    document.getElementById('menuQ').textContent='Great ordering!';
    return;
  }
  var w=NW[menuOrder[menuIdx]];
  document.getElementById('menuQ').textContent='Do you like '+w.w+'?';
  document.getElementById('menuA').classList.remove('show');
  document.getElementById('menuA').textContent='';
}
function pickMenu(idx){
  var target=menuOrder[menuIdx];
  var w=NW[idx];
  var mi=document.getElementById('mi'+idx);
  mi.classList.add('selected');
  var ans=document.getElementById('menuA');
  ans.textContent='I like '+w.w+'!';
  ans.classList.add('show');
  menuIdx++;
  setTimeout(function(){
    document.querySelectorAll('.menu-item').forEach(function(m){m.classList.remove('selected');});
    showMenuQ();
  },2000);
}

// === Navigation ===
function goTo(i){if(i<0||i>=t)return;document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});document.querySelectorAll('.sl')[i].classList.add('on');c=i;
  document.getElementById('pg').textContent=(c+1)+'/'+t;
  document.getElementById('pb').disabled=c===0;
  var b=document.getElementById('nb');
  if(c===t-1){b.textContent='Done 🎉';b.disabled=true}else{b.textContent='Next ▶';b.disabled=false}
  document.getElementById('B').innerHTML=N[c]||'';
  // Init menu when navigating to menu slide
  if(c===8) initMenu();
}
function go(d){goTo(c+d)}

// === Teacher Notes ===
function tn(){o=!o;document.getElementById('P').classList.toggle('on',o);document.getElementById('F').classList.toggle('on',o)}
document.addEventListener('click',function(e){if(o&&!e.target.closest('.pop')&&!e.target.closest('.fab')){o=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on')}});

// === Keyboard ===
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});

// popIn animation
var style=document.createElement('style');
style.textContent='@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}';
document.head.appendChild(style);

build();
</script>
</body>
</html>
