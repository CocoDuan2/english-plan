<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 4 Review - Food</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#fce4a8 0%,#f7d794 50%,#f8b4b4 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#e67e22;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#e67e22;transform:scale(1.2)}
.top-bar .dot.done{background:#f39c12}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px;background:none;border-radius:0;min-height:auto;box-shadow:none}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:17px;color:rgba(0,0,0,.5);margin-top:2px;line-height:1.3}
.instr-stars{display:flex;gap:5px;margin-top:4px}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}

.review-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.review-card:active{transform:scale(.95)}
.review-card .icon{line-height:1}
.review-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

.red-circle{width:80px;height:80px;border-radius:50%;background:#e74c3c;display:inline-block}

/* Tap-to-learn */
.learn-grid{display:flex;flex-wrap:wrap;gap:12px;width:100%;justify-content:center}
.learn-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;
  width:calc(33.33% - 8px);min-height:110px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.learn-card:active{transform:scale(.95)}
.learn-card .icon{line-height:1}
.learn-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333;opacity:0;transition:opacity .3s}
.learn-card.revealed .label{opacity:1}
.learn-card.revealed .icon img{filter:none;animation:popIn .4s ease}
.learn-card:not(.revealed) .icon img{filter:grayscale(1) brightness(1.1)}

/* Shopping Cart game */
.cart-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:12px}
.cart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.cart-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .4s,opacity .4s;-webkit-tap-highlight-color:transparent}
.cart-card:active{transform:scale(.95)}
.cart-card .icon{line-height:1}
.cart-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}
.cart-card.fly-away{transform:scale(0) translateY(80px);opacity:0;pointer-events:none}
.cart-box{width:120px;height:80px;background:linear-gradient(180deg,#d4a574,#b8834a);border-radius:0 0 20px 20px;
  border:3px solid #a0703c;display:flex;align-items:center;justify-content:center;position:relative;padding:6px;flex-wrap:wrap;gap:2px}
.cart-box::before{content:'';position:absolute;top:-14px;left:15%;width:70%;height:16px;border:3px solid #a0703c;border-bottom:none;border-radius:30px 30px 0 0}
.cart-collected{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}

/* Listen & Find */
.listen-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.listen-card:active{transform:scale(.95)}
.listen-card .icon{line-height:1}
.listen-card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Memory flip */
.flip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;justify-items:center}
.flip-card{background:rgba(255,255,255,.9);border-radius:14px;padding:10px;min-height:100px;width:100%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .3s,background .3s;-webkit-tap-highlight-color:transparent}
.flip-card:active{transform:scale(.95)}
.flip-card .flip-face{line-height:1}
.flip-card.matched{background:#d5f5e3;pointer-events:none;opacity:.7}

/* Stars burst */
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

/* Complete */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.complete-emoji{animation:popIn .6s ease}
.complete-text{font-size:24px;font-weight:700;color:#fff;margin-top:12px;text-shadow:1px 1px 3px rgba(0,0,0,.2)}

/* Nav bar */
.nav-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;
  padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-top:2px solid rgba(0,0,0,.06);z-index:100}
.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#e67e22;border:2px solid #e67e22}
.nav-next{color:#fff;background:linear-gradient(135deg,#f5b041,#e67e22);
  box-shadow:0 4px 15px rgba(230,126,34,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-progress{font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center}

@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

@media(min-width:768px){
  .top-bar{max-width:800px;padding:16px 24px}
  .top-bar .title{font-size:22px}
  .main{max-width:800px;padding:24px 24px 20px}
  .card-grid,.flip-grid,.cart-grid{gap:18px}
  .card{padding:20px;min-height:140px}
  .card .icon img,.review-card .icon img,.listen-card .icon img,.learn-card .icon img,.cart-card .icon img{width:120px!important;height:120px!important}
  .red-circle{width:120px;height:120px}
  .flip-card .flip-face img{width:80px!important;height:80px!important}
  .complete-emoji img{width:120px!important;height:120px!important}
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title" id="topTitle">Day 4 · Food Review</div>
  <div class="dots" id="dots"></div>
</div>
<div class="main" id="main">
<div class="instr-banner" id="instrBanner"></div>

<!-- Start Screen -->
<div class="module active" id="mod0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px">
  <div style="display:flex;gap:12px" id="startIcons"></div>
  <div style="font-size:32px;font-weight:700;color:#2d3436">准备好了吗？</div>
  <div style="font-size:18px;color:rgba(0,0,0,.45)">点击开始学食物！</div>
  <button onclick="getAudioCtx();goModule(1);document.getElementById('mod0').style.display='none'" style="font-size:28px;padding:16px 50px;border-radius:50px;border:none;background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(230,126,34,.35);letter-spacing:2px">开始玩 ▶</button>
</div>

<!-- Module 1: Review Warm-up -->
<div class="module" id="mod1">
  <div class="card-grid" id="reviewGrid"></div>
</div>

<!-- Module 2: Tap to Learn -->
<div class="module" id="mod2">
  <div class="learn-grid" id="learnGrid"></div>
</div>

<!-- Module 3: Shopping Cart -->
<div class="module" id="mod3">
  <div class="cart-area" id="cartArea">
    <div class="cart-grid" id="cartGrid"></div>
    <div class="cart-box"><div class="cart-collected" id="cartCollected"></div></div>
  </div>
</div>

<!-- Module 4: Listen & Find -->
<div class="module" id="mod4">
  <div class="card-grid" id="listenGrid"></div>
</div>

<!-- Module 5: Memory Flip -->
<div class="module" id="mod5">
  <div class="flip-grid" id="flipGrid"></div>
</div>

<!-- Complete -->
<div class="module" id="mod6">
  <div class="complete-screen">
    <div class="complete-emoji" id="completeEmoji"></div>
    <div class="complete-text">Great Job, Ranran!</div>
    <div style="font-size:16px;color:rgba(255,255,255,.85);margin-top:8px">You learned all the food words!</div>
    <button class="nav-btn nav-next" style="margin-top:20px" onclick="goModule(1)">Play Again</button>
    <button class="nav-btn" style="margin-top:10px;background:rgba(255,255,255,.2);color:#fff;border:none" onclick="location.href='../../index.html'">Home</button>
  </div>
</div>

</div>
<script>
// === TWEMOJI HELPER ===
function twimg(code, sz) {
  return '<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/' + code + '.svg" width="' + sz + '" height="' + sz + '" alt="">';
}

// === DATA ===
var FOODS = [
  {name:'apple',  code:'1f34e'},
  {name:'banana', code:'1f34c'},
  {name:'milk',   code:'1f95b'},
  {name:'bread',  code:'1f35e'},
  {name:'egg',    code:'1f95a'}
];
var REVIEW = [
  {name:'head',  code:'1f600', isCircle:false},
  {name:'red',   code:'',      isCircle:true},
  {name:'duck',  code:'1f986', isCircle:false}
];

var MODULES = 6, currentModule = 0;
var reviewRound = 0, reviewOrder = [];
var learnRevealed = 0;
var cartRound = 0, cartScore = 0, cartOrder = [];
var listenRound = 0, listenOrder = [];
var flipFirst = null, flipMatched = 0, flipLocked = false;

function reviewIcon(r, sz) {
  if (r.isCircle) return '<div class="red-circle" style="width:'+sz+'px;height:'+sz+'px"></div>';
  return twimg(r.code, sz);
}

// === AUDIO & SPEECH ===
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function speak(text, cb) {
  var isWord = text.trim().indexOf(' ') === -1;
  var url = isWord
    ? 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2'
    : 'https://fanyi.baidu.com/gettts?lan=en&text=' + encodeURIComponent(text) + '&spd=4&source=web';
  var a = new Audio(url);
  var done = false;
  var finish = function(){ if(!done){ done=true; if(cb) setTimeout(cb, 50); } };
  var safety = setTimeout(finish, 4000);
  a.onended = function(){ clearTimeout(safety); finish(); };
  a.onerror = function(){ clearTimeout(safety); finish(); };
  a.play().catch(finish);
}
function playCorrect() {
  var ctx = getAudioCtx();
  [523.25, 659.25].forEach(function(freq, i) {
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    var t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  });
}
function playWrong() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
function playPop() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}
function playStar() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}

function setInstr(en, zh, starsHtml) {
  var b = document.getElementById('instrBanner');
  var h = '<div class="instr-en">' + en + '</div>';
  if(zh) h += '<div class="instr-zh">' + zh + '</div>';
  if(starsHtml) h += '<div class="instr-stars">' + starsHtml + '</div>';
  b.innerHTML = h;
}
function starsBar(total, earned) {
  var h = '';
  for(var i = 0; i < total; i++) {
    h += '<span class="star' + (i < earned ? ' earned' : '') + '" style="opacity:'+(i<earned?1:.3)+';transition:opacity .3s,transform .3s">' + twimg('2b50', 18) + '</span>';
  }
  return h;
}
function burstStars(x, y) {
  playStar();
  var c = document.createElement('div');
  c.className = 'star-burst';
  c.style.left = x + 'px'; c.style.top = y + 'px';
  var codes = ['2b50','1f31f','2728','1f4ab'];
  for(var i = 0; i < 8; i++) {
    var s = document.createElement('div');
    s.className = 'star-particle';
    var angle = (i / 8) * Math.PI * 2;
    var dist = 60 + Math.random() * 40;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    s.innerHTML = twimg(codes[i % 4], 20);
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(function(){ c.remove(); }, 1100);
}
function shuffle(arr) {
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// === NAVIGATION ===
function updateDots() {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(var i = 1; i <= 5; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === currentModule ? ' active' : '') + (i < currentModule ? ' done' : '');
    dots.appendChild(d);
  }
}
function goModule(n) {
  currentModule = n;
  document.querySelectorAll('.module').forEach(function(m){
    m.classList.remove('active');
    m.style.display = '';
  });
  var target = document.getElementById('mod' + n);
  if(target) target.classList.add('active');
  updateDots();
  if(n === 1) startReview();
  if(n === 2) initLearn();
  if(n === 3) startCart();
  if(n === 4) startListen();
  if(n === 5) startFlip();
  updateNav();
}
function updateNav() {
  document.getElementById('navPrev').disabled = (currentModule <= 1);
  document.getElementById('navNext').textContent = (currentModule >= 5) ? 'Done!' : 'Next';
  document.getElementById('navProgress').textContent = Math.min(currentModule, 5) + '/5';
  document.querySelector('.nav-bar').style.display = (currentModule >= 6) ? 'none' : '';
}
function goNext() { if(currentModule < 6) goModule(currentModule + 1); }
function goPrev() { if(currentModule > 1) goModule(currentModule - 1); }

// === MODULE 1: REVIEW WARM-UP ===
function startReview() {
  reviewRound = 0;
  reviewOrder = shuffle([0,1,2]);
  buildReviewGrid();
  showReviewPrompt();
}
function buildReviewGrid() {
  var grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  shuffle(REVIEW).forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'review-card';
    card.innerHTML = '<div class="icon">' + reviewIcon(r, 80) + '</div><div class="label">' + r.name + '</div>';
    card.onclick = function(e) { checkReview(this, r, e); };
    grid.appendChild(card);
  });
}
function showReviewPrompt() {
  if(reviewRound >= 3) {
    setInstr('Great memory! 🌟', '太厉害了，全部找对啦！', starsBar(3, 3));
    return;
  }
  var target = REVIEW[reviewOrder[reviewRound]];
  setInstr('Find: ' + target.name + '!', '点一点，哪个是 ' + target.name + '？', starsBar(3, reviewRound));
  speak('Find ' + target.name);
}
var reviewBusy = false;
function checkReview(card, item, e) {
  if(reviewRound >= 3) { speak(item.name); return; }
  if(reviewBusy) return;
  var target = REVIEW[reviewOrder[reviewRound]];
  if(item.name === target.name) {
    reviewBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    reviewRound++;
    setInstr('Find: ' + target.name + '!', '答对啦！这是 ' + target.name + '！', starsBar(3, reviewRound));
    playCorrect();
    speak(target.name);
    setTimeout(function() {
      reviewBusy = false;
      buildReviewGrid(); showReviewPrompt();
    }, 1200);
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 2: TAP TO LEARN ===
function initLearn() {
  learnRevealed = 0;
  setInstr('Tap to learn! 👆', '点一点卡片，学习新单词吧！');
  var grid = document.getElementById('learnGrid');
  grid.innerHTML = '';
  FOODS.forEach(function(a, i) {
    var card = document.createElement('div');
    card.className = 'learn-card';
    card.innerHTML = '<div class="icon">' + twimg(a.code, 80) + '</div><div class="label">' + a.name + '</div>';
    card.onclick = function(e) { revealLearn(this, i, e); };
    grid.appendChild(card);
  });
}
var learnBusy = false;
function revealLearn(el, idx, e) {
  if (el.classList.contains('revealed')) {
    speak(FOODS[idx].name);
    return;
  }
  if (learnBusy) return;
  el.classList.add('revealed');
  learnRevealed++;
  learnBusy = true;
  playPop();
  var rect = el.getBoundingClientRect();
  burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
  speak(FOODS[idx].name, function() {
    learnBusy = false;
    if (learnRevealed >= FOODS.length) {
      setInstr('All learned! 🎉', '全部学会啦，你真棒！');
    } else {
      setInstr('Tap to learn! 👆', '还有卡片没翻开哦，继续点！');
    }
  });
}

// === MODULE 3: SHOPPING CART ===
function startCart() {
  cartRound = 0; cartScore = 0;
  cartOrder = shuffle([0,1,2,3,4]);
  document.getElementById('cartCollected').innerHTML = '';
  buildCartGrid();
  showCartPrompt();
}
function buildCartGrid() {
  var grid = document.getElementById('cartGrid');
  grid.innerHTML = '';
  shuffle(FOODS).forEach(function(f) {
    var card = document.createElement('div');
    card.className = 'cart-card';
    card.innerHTML = '<div class="icon">' + twimg(f.code, 80) + '</div><div class="label">' + f.name + '</div>';
    card.onclick = function(e) { checkCart(this, f, e); };
    grid.appendChild(card);
  });
}
function showCartPrompt() {
  if(cartRound >= 5) {
    setInstr('Cart is full! 🛒', '购物车装满啦，太厉害了！', starsBar(5, 5));
    return;
  }
  var target = FOODS[cartOrder[cartRound]];
  setInstr('Put ' + target.name + ' in the cart! 🛒', '把 ' + target.name + ' 放进购物车！点它！', starsBar(5, cartRound));
  speak(target.name);
}
var cartBusy = false;
function checkCart(card, food, e) {
  if(cartRound >= 5) { speak(food.name); return; }
  if(cartBusy) return;
  var target = FOODS[cartOrder[cartRound]];
  if(food.name === target.name) {
    cartBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    card.classList.add('fly-away');
    var collected = document.getElementById('cartCollected');
    var mini = document.createElement('span');
    mini.innerHTML = twimg(food.code, 28);
    mini.style.animation = 'popIn .4s ease';
    collected.appendChild(mini);
    cartScore++; cartRound++;
    setInstr('Put ' + target.name + ' in the cart! 🛒', '放进去啦！这是 ' + target.name + '！', starsBar(5, cartRound));
    playCorrect();
    speak(target.name, function() {
      cartBusy = false;
      buildCartGrid();
      showCartPrompt();
    });
  } else {
    speak(food.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 4: LISTEN & FIND ===
function startListen() {
  listenRound = 0;
  listenOrder = shuffle([0,1,2,3,4]);
  buildListenGrid();
  showListenPrompt();
}
function buildListenGrid() {
  var grid = document.getElementById('listenGrid');
  grid.innerHTML = '';
  shuffle(FOODS).forEach(function(f) {
    var card = document.createElement('div');
    card.className = 'listen-card';
    card.innerHTML = '<div class="icon">' + twimg(f.code, 80) + '</div><div class="label">' + f.name + '</div>';
    card.onclick = function(e) { checkListen(this, f, e); };
    grid.appendChild(card);
  });
}
function showListenPrompt() {
  if(listenRound >= 5) {
    setInstr('All found! 🎉', '全部找到啦，耳朵真灵！', starsBar(5, 5));
    return;
  }
  var target = FOODS[listenOrder[listenRound]];
  setInstr('Find the ' + target.name + '! 🔍', '听一听，哪个是 ' + target.name + '？点它！', starsBar(5, listenRound));
  speak('Find the ' + target.name);
}
var listenBusy = false;
function checkListen(card, food, e) {
  if(listenRound >= 5) { speak(food.name); return; }
  if(listenBusy) return;
  var target = FOODS[listenOrder[listenRound]];
  if(food.name === target.name) {
    listenBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    listenRound++;
    setInstr('Find the ' + target.name + '! 🔍', '找对啦！这是 ' + target.name + '！', starsBar(5, listenRound));
    playCorrect();
    speak(target.name, function() {
      listenBusy = false;
      buildListenGrid();
      showListenPrompt();
    });
  } else {
    speak(food.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}
</script>
<script>
// === MODULE 5: MEMORY FLIP ===
function startFlip() {
  flipFirst = null; flipMatched = 0; flipLocked = false;
  setInstr('Find the pairs! 🃏', '翻开两张一样的卡片，配成一对！', starsBar(4, 0));
  speak('pairs');
  var picks = shuffle(FOODS).slice(0, 4);
  var pairs = shuffle(picks.concat(picks.slice()));
  buildFlipGrid(pairs);
}
function buildFlipGrid(pairs) {
  var grid = document.getElementById('flipGrid');
  grid.innerHTML = '';
  pairs.forEach(function(w, i) {
    var card = document.createElement('div');
    card.className = 'flip-card face-down';
    card.setAttribute('data-idx', i);
    card.setAttribute('data-name', w.name);
    card.innerHTML = '<div class="flip-face">' + twimg('2753', 40) + '</div>';
    card.onclick = function(e) { flipCard(this, w, e); };
    grid.appendChild(card);
  });
}
function flipCard(el, word, e) {
  if(flipLocked) return;
  if(el.classList.contains('matched')) return;
  if(!el.classList.contains('face-down')) return;
  el.classList.remove('face-down');
  el.querySelector('.flip-face').innerHTML = twimg(word.code, 60);
  playPop();
  if(!flipFirst) {
    speak(word.name);
    flipFirst = {el: el, word: word};
    return;
  }
  flipLocked = true;
  if(flipFirst.word.name === word.name && flipFirst.el !== el) {
    var rect = el.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    el.classList.add('matched');
    flipFirst.el.classList.add('matched');
    flipMatched++;
    setInstr('Find the pairs! 🃏', '配对成功！再翻两张！', starsBar(4, flipMatched));
    playCorrect();
    speak(word.name, function() {
      flipFirst = null;
      flipLocked = false;
      if(flipMatched >= 4) {
        setInstr('All matched! 🎉', '全部配对成功，你太棒了！', starsBar(4, 4));
      }
    });
  } else {
    var prev = flipFirst.el;
    setTimeout(function() {
      el.classList.add('face-down');
      el.querySelector('.flip-face').innerHTML = twimg('2753', 40);
      prev.classList.add('face-down');
      prev.querySelector('.flip-face').innerHTML = twimg('2753', 40);
      flipFirst = null;
      flipLocked = false;
    }, 800);
    playWrong();
  }
}

</script>
