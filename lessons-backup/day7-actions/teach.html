<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 7 - Actions (Teach)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center}
.deck{width:100%;height:100%;display:flex;flex-direction:column}
.sl{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 30px 70px;text-align:center;overflow-y:auto}
.sl.on{display:flex}
.bg0{background:linear-gradient(160deg,#fef9ef,#fdf2e9)}
.bg1{background:linear-gradient(160deg,#e8f8f5,#d5f5e3)}
.bg2{background:linear-gradient(160deg,#ebf5fb,#d6eaf8)}
.bg3{background:linear-gradient(160deg,#fdebd0,#fadbd8)}
.bg4{background:linear-gradient(160deg,#f5eef8,#ebdef0)}
.bg5{background:linear-gradient(160deg,#fef9ef,#fdebd0)}
.bg6{background:linear-gradient(160deg,#f9ebea,#fdedec)}
.sec{font-size:13px;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.ttl{font-size:32px;font-weight:800;color:#2c3e50;margin-bottom:12px}
.sub{font-size:18px;color:#7f8c8d;margin-bottom:16px}
.big{width:180px;height:180px;margin:6px 0}
.wd{font-size:60px;font-weight:800;color:#2c3e50;margin:10px 0;letter-spacing:3px}
.ks{font-size:30px;font-weight:600;color:#e67e22;margin:12px 0;background:rgba(230,126,34,.08);border-radius:12px;padding:10px 24px;border-left:4px solid #e67e22}

/* Flash grid for warm-up */
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:560px;margin:10px auto}
.fc{background:#fff;border-radius:16px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.05);min-height:100px}
.fc img{width:52px;height:52px}
.fc .fw{font-size:15px;font-weight:700;color:#2c3e50;margin-top:4px}

/* Action Cards */
.ac-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:560px;margin:10px auto}
.ac-card{background:#3498db;border-radius:16px;padding:16px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 15px rgba(52,152,219,.3);transition:transform .3s,background .5s;-webkit-tap-highlight-color:transparent}
.ac-card:active{transform:scale(.95)}
.ac-card .ac-back{font-size:48px;line-height:1}
.ac-card .ac-front{display:none;flex-direction:column;align-items:center}
.ac-card.flipped{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:default}
.ac-card.flipped .ac-back{display:none}
.ac-card.flipped .ac-front{display:flex}
.ac-card .ac-front .fw{font-size:16px;font-weight:700;color:#2c3e50;margin-top:6px}

/* Simon Says */
.ss-box{background:#fff;border-radius:20px;padding:30px 40px;max-width:520px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;margin:10px 0}
.ss-label{font-size:16px;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.ss-cmd{font-size:36px;font-weight:800;color:#e67e22;margin:10px 0;transition:opacity .3s}
.ss-icon{margin:10px 0}
.ss-hint{font-size:16px;color:#95a5a6;margin-top:10px}
.ss-btns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.ss-btn{padding:10px 20px;border:2px solid #3498db;border-radius:30px;background:#fff;color:#3498db;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.ss-btn:hover{background:#3498db;color:#fff}
.ss-btn.active{background:#3498db;color:#fff;transform:scale(1.05)}

/* FAB & popup */
.fab{position:fixed;bottom:68px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:#3498db;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(52,152,219,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.fab:hover{background:#2980b9;transform:scale(1.08)}
.fab.on{background:#2c3e50}
.pop{position:fixed;bottom:124px;right:16px;z-index:199;width:340px;max-height:45vh;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow-y:auto;padding:16px 20px;display:none;font-size:14px;line-height:1.7;color:#555;border:1px solid rgba(52,152,219,.2)}
.pop.on{display:block;animation:fu .2s ease}
.pop-t{font-size:12px;font-weight:700;color:#3498db;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.pop ul{margin:4px 0 4px 18px}.pop li{margin:3px 0}.pop b{color:#2c3e50}
.pop .tc{font-weight:700;color:#3498db;margin-top:8px;display:block;font-size:13px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nb{padding:10px 22px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#3498db;color:#fff}
.nb:hover{background:#2980b9}
.nb:disabled{background:#e0e0e0;color:#bbb;cursor:default}
.np{font-size:14px;font-weight:600;color:#999}
.nk{font-size:11px;color:#ccc;margin-top:2px;text-align:center}

@media(min-width:768px){
  .big{width:220px;height:220px}
  .wd{font-size:72px}
  .ks{font-size:34px}
  .ttl{font-size:38px}
  .fc img{width:68px;height:68px}
  .fc .fw{font-size:18px}
  .ac-grid{max-width:680px;gap:18px}
  .ac-card{min-height:160px;padding:20px}
  .ac-card .ac-front img{width:90px!important;height:90px!important}
  .ac-card .ac-front .fw{font-size:20px}
  .ss-box{max-width:640px;padding:36px 50px}
  .ss-cmd{font-size:42px}
  .ss-icon img{width:100px!important;height:100px!important}
  .pop{width:400px}
}
</style>
</head>
<body>
<div class="deck" id="D"></div>
<button class="fab" id="F" onclick="tn()">📋</button>
<div class="pop" id="P"><div class="pop-t">📋 Teacher Notes</div><div id="B"></div></div>
<div class="nav">
  <button class="nb" id="pb" onclick="go(-1)">◀ Back</button>
  <div style="text-align:center"><div class="np" id="pg">1/12</div><div class="nk">← → · T=tips</div></div>
  <button class="nb" id="nb" onclick="go(1)">Next ▶</button>
</div>
<script>
var TW='https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/';
var N={},c=0,t=0,o=false;

var RW=[
  {w:'three',svg:'33-20e3'},
  {w:'five',svg:'35-20e3'},
  {w:'one',svg:'31-20e3'}
];
var NW=[
  {w:'run',svg:'1f3c3',act:'Run in place! Go go go!'},
  {w:'jump',svg:'1f938',act:'Jump up high! 1, 2, 3!'},
  {w:'walk',svg:'1f6b6',act:'Walk walk walk! Slow steps!'},
  {w:'sit',svg:'1fa91',act:'Sit down! Sit on your chair!'},
  {w:'stand',svg:'1f9cd',act:'Stand up tall! Stretch!'}
];

function img(svg,sz){return '<img src="'+TW+svg+'.svg" width="'+sz+'" height="'+sz+'" alt="">'}
function mk(i,bg,x){return '<div class="sl '+bg+(i===0?' on':'')+'" data-i="'+i+'">'+x+'</div>'}

function build(){
var h='',i=0;

// 1 Title
h+=mk(i++,'bg0',
  '<div style="display:flex;gap:8px;margin:6px 0">'+NW.map(function(w){return img(w.svg,60)}).join('')+'</div>'+
  '<div class="ttl">Actions</div>'+
  '<div class="sub">run · jump · walk · sit · stand</div>');
N[0]='<span class="tc">🎯 Today</span><ul><li>Sentence: <b>I can ___!</b></li><li>Ask: <b>Can you ___?</b></li><li>New: run, jump, walk, sit, stand</li><li>Review: three, five, one</li></ul>';

// 2 Review
h+=mk(i++,'bg1',
  '<div class="sec">Review</div><div class="ttl">How many? 🔢</div>'+
  '<div class="fg">'+RW.map(function(w){return '<div class="fc">'+img(w.svg,52)+'<div class="fw">'+w.w+'</div></div>'}).join('')+'</div>'+
  '<div class="ks">I have three!</div>');
N[1]='<span class="tc">🗣️ Review</span><ul><li>Point: "How many?" → "I have three / five / one!"</li><li>Use fingers to show the numbers</li><li>Quick round: hold up fingers, child says "I have ___!"</li></ul>';

// 3-7 New Words
NW.forEach(function(w,j){
  h+=mk(i++,'bg2',
    '<div class="sec">New Word '+(j+1)+'/5</div>'+
    img(w.svg,180)+
    '<div class="wd">'+w.w+'</div>'+
    '<div class="ks">I can '+w.w+'!</div>');
  N[i-1]='<span class="tc">🗣️</span><ul><li>"Can you '+w.w+'?" → "I can '+w.w+'!"</li><li>Repeat: slow → normal → fast</li></ul><span class="tc">🤚 TPR</span><ul><li>"'+w.act+'"</li></ul>';
});

// 8 Action Cards
h+=mk(i++,'bg3',
  '<div class="sec">Action Cards</div><div class="ttl">Flip and move! 🎴</div>'+
  '<div class="ac-grid" id="acGrid"></div>'+
  '<div style="font-size:16px;color:#95a5a6;margin-top:10px">Tap a card to flip it!</div>');
N[i-1]='<span class="tc">🎮 Action Cards</span><ul><li>Cards are face-down. Tap one to flip.</li><li>When revealed, say "I can ___!" and do the action together.</li><li>Flip all 5 cards, do each action!</li></ul>';

// 9 Simon Says
h+=mk(i++,'bg4',
  '<div class="sec">Simon Says</div><div class="ttl">Listen and do! 🗣️</div>'+
  '<div class="ss-box" id="ssBox">'+
    '<div class="ss-label">Simon says...</div>'+
    '<div class="ss-cmd" id="ssCmd">run!</div>'+
    '<div class="ss-icon" id="ssIcon">'+img('1f3c3',80)+'</div>'+
    '<div class="ss-hint">Do the action together!</div>'+
    '<div class="ss-btns" id="ssBtns"></div>'+
  '</div>');
N[i-1]='<span class="tc">🎮 Simon Says</span><ul><li>Say "Simon says... run!" → everyone runs in place</li><li>Click buttons to change the action</li><li>Mix it up: fast/slow, add "Simon says" or trick them!</li><li>Great for TPR — Total Physical Response</li></ul>';

// 10 Bye
h+=mk(i++,'bg5',
  img('2b50',180)+
  '<div class="ttl">Well Done!</div>'+
  '<div class="sub">You can run, jump, walk, sit, and stand! 💪</div>');
N[i-1]='<span class="tc">👋</span><ul><li>"Can you run? Yes, I can run!"</li><li>Quick review all 5 actions one more time</li><li>"Great job! See you next time!"</li></ul>';

document.getElementById('D').innerHTML=h;
t=i;goTo(0);initActionCards();initSimonSays();
}

// === Navigation ===
function goTo(i){if(i<0||i>=t)return;document.querySelectorAll('.sl').forEach(function(s){s.classList.remove('on')});document.querySelectorAll('.sl')[i].classList.add('on');c=i;
  document.getElementById('pg').textContent=(c+1)+'/'+t;
  document.getElementById('pb').disabled=c===0;
  var b=document.getElementById('nb');
  if(c===t-1){b.textContent='Done 🎉';b.disabled=true}else{b.textContent='Next ▶';b.disabled=false}
  document.getElementById('B').innerHTML=N[c]||'';
}
function go(d){goTo(c+d)}

// === Teacher Notes ===
function tn(){o=!o;document.getElementById('P').classList.toggle('on',o);document.getElementById('F').classList.toggle('on',o)}
document.addEventListener('click',function(e){if(o&&!e.target.closest('.pop')&&!e.target.closest('.fab')){o=false;document.getElementById('P').classList.remove('on');document.getElementById('F').classList.remove('on')}});

// === Action Cards ===
function initActionCards(){
  var grid=document.getElementById('acGrid');
  if(!grid)return;
  var order=shuffle(NW.slice());
  grid.innerHTML='';
  order.forEach(function(w){
    var card=document.createElement('div');
    card.className='ac-card';
    card.innerHTML='<div class="ac-back">❓</div><div class="ac-front">'+img(w.svg,70)+'<div class="fw">'+w.w+'</div></div>';
    card.onclick=function(){
      if(card.classList.contains('flipped'))return;
      card.classList.add('flipped');
      card.style.transform='rotateY(360deg)';
    };
    grid.appendChild(card);
  });
}

// === Simon Says ===
function initSimonSays(){
  var btns=document.getElementById('ssBtns');
  if(!btns)return;
  NW.forEach(function(w){
    var btn=document.createElement('button');
    btn.className='ss-btn';
    btn.textContent=w.w;
    btn.onclick=function(){
      document.querySelectorAll('.ss-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      document.getElementById('ssCmd').textContent=w.w+'!';
      document.getElementById('ssIcon').innerHTML=img(w.svg,80);
    };
    btns.appendChild(btn);
  });
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

// === Keyboard ===
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='t'||e.key==='T')tn();
});

build();
</script>
</body>
</html>
