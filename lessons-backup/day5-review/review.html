<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 5 Review - Review Day</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 50%,#c8e6c9 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#e67e22;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#e67e22;transform:scale(1.2)}
.top-bar .dot.done{background:#f39c12}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px;background:none;border-radius:0;min-height:auto;box-shadow:none}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:17px;color:rgba(0,0,0,.5);margin-top:2px;line-height:1.3}
.instr-stars{display:flex;gap:5px;margin-top:4px}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}
.card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Color circles */
.color-dot{border-radius:50%;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.12)}

/* Mole grid */
.mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.mole-hole{background:rgba(139,90,43,.3);border-radius:50%;width:100%;aspect-ratio:1;display:flex;
  align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:inset 0 4px 8px rgba(0,0,0,.15);-webkit-tap-highlight-color:transparent}
.mole-hole:active{transform:scale(.95)}
.mole{position:absolute;bottom:-70px;transition:bottom .3s ease;line-height:1}
.mole.up{bottom:10px;animation:moleWiggle .3s ease}
.mole.whacked{animation:popIn .3s ease}
@keyframes moleWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}

/* Flip grid */
.flip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;justify-items:center}
.flip-card{background:rgba(255,255,255,.9);border-radius:14px;padding:10px;min-height:90px;width:100%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .3s,background .3s;-webkit-tap-highlight-color:transparent}
.flip-card:active{transform:scale(.95)}
.flip-card.matched{background:#d5f5e3;pointer-events:none;opacity:.7}

/* Star burst */
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

/* Nav bar */
.nav-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;
  padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-top:2px solid rgba(0,0,0,.06);z-index:100}
.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#e67e22;border:2px solid #e67e22}
.nav-next{color:#fff;background:linear-gradient(135deg,#f7b731,#e67e22);
  box-shadow:0 4px 15px rgba(230,126,34,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-progress{font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center}

/* Complete */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.complete-text{font-size:24px;font-weight:700;color:#fff;margin-top:12px;text-shadow:1px 1px 3px rgba(0,0,0,.2)}

/* Animations */
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* PC layout */
@media(min-width:768px){
  .top-bar{max-width:800px;padding:16px 24px}
  .top-bar .title{font-size:22px}
  .main{max-width:800px;padding:24px 24px 20px}
  .card-grid,.mole-grid{gap:18px}
  .card{padding:20px;min-height:140px}
  .card img,.card .color-dot{width:100px!important;height:100px!important}
  .mole img{width:70px!important;height:70px!important}
  .flip-card img,.flip-card .color-dot{width:70px!important;height:70px!important}
  .instr-en{font-size:26px}
  .instr-zh{font-size:19px}
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title" id="topTitle">Day 5 · Review Day</div>
  <div class="dots" id="dots"></div>
</div>
<div class="main" id="main">
<div class="instr-banner" id="instrBanner"></div>

<!-- Start Screen -->
<div class="module active" id="mod0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px">
  <div id="startPreview" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:300px"></div>
  <div style="font-size:32px;font-weight:700;color:#2d3436">复习时间到！</div>
  <div style="font-size:18px;color:rgba(0,0,0,.45)">回顾所有学过的单词吧！</div>
  <button onclick="getAudioCtx();goModule(1);document.getElementById('mod0').style.display='none'" style="font-size:28px;padding:16px 50px;border-radius:50px;border:none;background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(230,126,34,.35);letter-spacing:2px">开始玩 ▶</button>
</div>

<!-- Module 1: Color Hunt -->
<div class="module" id="mod1">
  <div class="card-grid" id="colorGrid"></div>
</div>

<!-- Module 2: Animal Whack-a-Mole -->
<div class="module" id="mod2">
  <div class="mole-grid" id="moleGrid"></div>
</div>

<!-- Module 3: Body Touch -->
<div class="module" id="mod3">
  <div class="card-grid" id="bodyGrid"></div>
</div>

<!-- Module 4: Food Sort -->
<div class="module" id="mod4">
  <div class="card-grid" id="foodGrid"></div>
</div>

<!-- Module 5: Grand Mix Memory Flip -->
<div class="module" id="mod5">
  <div class="flip-grid" id="flipGrid"></div>
</div>

<!-- Complete -->
<div class="module" id="mod6">
  <div class="complete-screen">
    <div id="completeEmoji" style="animation:popIn .6s ease"></div>
    <div class="complete-text">太棒了 Ranran！</div>
    <div style="font-size:16px;color:rgba(255,255,255,.85);margin-top:8px">你复习了所有20个单词！</div>
    <button class="nav-btn nav-next" style="margin-top:20px" onclick="goModule(1)">🔄 Play Again</button>
    <button class="nav-btn" style="margin-top:10px;background:rgba(255,255,255,.2);color:#fff;border:none" onclick="location.href='../../index.html'">🏠 Home</button>
  </div>
</div>

</div>

<div class="nav-bar">
  <button class="nav-btn nav-prev" id="navPrev" onclick="goPrev()">&#9664; Back</button>
  <span class="nav-progress" id="navProgress">1/5</span>
  <button class="nav-btn nav-next" id="navNext" onclick="goNext()">Next &#9654;</button>
</div>

<script>
// === TWEMOJI HELPER ===
function twimg(code, sz) {
  return '<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/' + code + '.svg" width="' + sz + '" height="' + sz + '" alt="">';
}
function colorDot(color, sz) {
  return '<div class="color-dot" style="background:' + color + ';width:' + sz + 'px;height:' + sz + 'px"></div>';
}

// === DATA: All 20 words from Day 1-4 ===
var COLORS = [
  {name:'red',    color:'#e74c3c'},
  {name:'blue',   color:'#3498db'},
  {name:'yellow', color:'#f1c40f'},
  {name:'green',  color:'#27ae60'},
  {name:'orange', color:'#e67e22'}
];
var ANIMALS = [
  {name:'cat',  code:'1f431'},
  {name:'dog',  code:'1f436'},
  {name:'fish', code:'1f41f'},
  {name:'bird', code:'1f426'},
  {name:'duck', code:'1f986'}
];
var BODY = [
  {name:'head',  code:'1f600'},
  {name:'eyes',  code:'1f440'},
  {name:'ears',  code:'1f442'},
  {name:'nose',  code:'1f443'},
  {name:'mouth', code:'1f444'}
];
var FOOD = [
  {name:'apple',  code:'1f34e'},
  {name:'banana', code:'1f34c'},
  {name:'milk',   code:'1f95b'},
  {name:'bread',  code:'1f35e'},
  {name:'egg',    code:'1f95a'}
];

var MODULES = 6, currentModule = 0;

// === AUDIO ===
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function speak(text, cb) {
  var isWord = text.trim().indexOf(' ') === -1;
  var url = isWord
    ? 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2'
    : 'https://fanyi.baidu.com/gettts?lan=en&text=' + encodeURIComponent(text) + '&spd=4&source=web';
  var a = new Audio(url);
  var done = false;
  var finish = function(){ if(!done){ done=true; if(cb) setTimeout(cb, 50); } };
  var safety = setTimeout(finish, 4000);
  a.onended = function(){ clearTimeout(safety); finish(); };
  a.onerror = function(){ clearTimeout(safety); finish(); };
  a.play().catch(finish);
}
function playCorrect() {
  var ctx = getAudioCtx();
  [523.25, 659.25].forEach(function(freq, i) {
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    var t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  });
}
function playWrong() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
function playPop() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}
function playStar() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}

// === UI HELPERS ===
function setInstr(en, zh, starsHtml) {
  var b = document.getElementById('instrBanner');
  var h = '<div class="instr-en">' + en + '</div>';
  if(zh) h += '<div class="instr-zh">' + zh + '</div>';
  if(starsHtml) h += '<div class="instr-stars">' + starsHtml + '</div>';
  b.innerHTML = h;
}
function starsBar(total, earned) {
  var h = '';
  for(var i = 0; i < total; i++) {
    h += '<span style="opacity:' + (i < earned ? '1' : '.3') + (i < earned ? ';animation:popIn .4s ease' : '') + '">' + twimg('2b50', 18) + '</span>';
  }
  return h;
}
function burstStars(x, y) {
  playStar();
  var c = document.createElement('div');
  c.className = 'star-burst';
  c.style.left = x + 'px'; c.style.top = y + 'px';
  var codes = ['2b50','1f31f','2728','1f4ab'];
  for(var i = 0; i < 8; i++) {
    var s = document.createElement('div');
    s.className = 'star-particle';
    var angle = (i / 8) * Math.PI * 2;
    var dist = 60 + Math.random() * 40;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    s.innerHTML = twimg(codes[i % 4], 20);
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(function(){ c.remove(); }, 1100);
}
function shuffle(arr) {
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// === NAVIGATION ===
function updateDots() {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(var i = 1; i <= 5; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === currentModule ? ' active' : '') + (i < currentModule ? ' done' : '');
    dots.appendChild(d);
  }
}
function goModule(n) {
  currentModule = n;
  document.querySelectorAll('.module').forEach(function(m){
    m.classList.remove('active');
    m.style.display = '';
  });
  var target = document.getElementById('mod' + n);
  if(target) target.classList.add('active');
  updateDots();
  if(n === 1) startColorHunt();
  if(n === 2) startWhack();
  if(n === 3) startBodyTouch();
  if(n === 4) startFoodSort();
  if(n === 5) startFlip();
  updateNav();
}
function updateNav() {
  document.getElementById('navPrev').disabled = (currentModule <= 1);
  document.getElementById('navNext').textContent = (currentModule >= 5) ? 'Done!' : 'Next';
  document.getElementById('navProgress').textContent = Math.min(currentModule, 5) + '/5';
  document.querySelector('.nav-bar').style.display = (currentModule >= 6) ? 'none' : '';
}
function goNext() { if(currentModule < 6) goModule(currentModule + 1); }
function goPrev() { if(currentModule > 1) goModule(currentModule - 1); }

// === MODULE 1: COLOR HUNT ===
var colorRound = 0, colorOrder = [], colorBusy = false;

function startColorHunt() {
  colorRound = 0;
  colorOrder = shuffle([0,1,2,3,4]);
  colorBusy = false;
  buildColorGrid();
  showColorPrompt();
}

function buildColorGrid() {
  var grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  shuffle(COLORS).forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = colorDot(c.color, 80) + '<div class="label">' + c.name + '</div>';
    card.onclick = function(e) { checkColor(card, c, e); };
    grid.appendChild(card);
  });
}

function showColorPrompt() {
  if(colorRound >= 5) {
    setInstr('All colors found! 🌈', '太厉害了，全部颜色都找对啦！', starsBar(5, 5));
    return;
  }
  var target = COLORS[colorOrder[colorRound]];
  setInstr('Find: ' + target.name + '! 🎨', '点一点，哪个是 ' + target.name + '？', starsBar(5, colorRound));
  speak('Find ' + target.name);
}

function checkColor(card, item, e) {
  if(colorRound >= 5) { speak(item.name); return; }
  if(colorBusy) return;
  var target = COLORS[colorOrder[colorRound]];
  if(item.name === target.name) {
    colorBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    colorRound++;
    setInstr("It's " + target.name + '!', '答对啦！这是 ' + target.name + '！', starsBar(5, colorRound));
    playCorrect();
    speak(target.name, function() {
      colorBusy = false;
      setTimeout(function() { buildColorGrid(); showColorPrompt(); }, 400);
    });
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 2: ANIMAL WHACK-A-MOLE ===
var whackRound = 0, whackOrder = [], whackBusy = false, moleTimers = [];

function startWhack() {
  whackRound = 0;
  whackBusy = false;
  whackOrder = shuffle([0,1,2,3,4]);
  moleTimers.forEach(clearTimeout);
  moleTimers = [];
  buildMoleGrid();
  nextWhackRound();
}

function buildMoleGrid() {
  var grid = document.getElementById('moleGrid');
  grid.innerHTML = '';
  for(var i = 0; i < 6; i++) {
    var hole = document.createElement('div');
    hole.className = 'mole-hole';
    hole.setAttribute('data-hole', i);
    var mole = document.createElement('div');
    mole.className = 'mole';
    mole.setAttribute('data-hole', i);
    hole.appendChild(mole);
    hole.onclick = function(e) { whackMole(this, e); };
    grid.appendChild(hole);
  }
}

function nextWhackRound() {
  if(whackRound >= 5) {
    setInstr('Great whacking! 🔨', '打得太好了，全部打中！', starsBar(5, 5));
    return;
  }
  var target = ANIMALS[whackOrder[whackRound]];
  setInstr('Whack the ' + target.name + '! 🔨', '快打 ' + target.name + '！用手点它！', starsBar(5, whackRound));
  speak(target.name);

  var moles = document.querySelectorAll('.mole');
  moles.forEach(function(m){ m.classList.remove('up'); m.innerHTML = ''; });

  var holes = shuffle([0,1,2,3,4,5]);
  var count = 2 + Math.floor(Math.random() * 2);
  var picks = shuffle(ANIMALS);
  var hasTarget = false;
  var popList = [];
  for(var i = 0; i < count; i++) {
    var w = picks[i % picks.length];
    if(w.name === target.name) hasTarget = true;
    popList.push({hole: holes[i], word: w});
  }
  if(!hasTarget) { popList[0].word = target; }

  popList.forEach(function(p, idx) {
    var t = setTimeout(function() {
      var mole = document.querySelector('.mole[data-hole="' + p.hole + '"]');
      mole.innerHTML = twimg(p.word.code, 70);
      mole.setAttribute('data-name', p.word.name);
      mole.classList.add('up');
    }, idx * 500);
    moleTimers.push(t);
  });
}

function whackMole(hole, e) {
  var mole = hole.querySelector('.mole');
  if(!mole.classList.contains('up') || whackBusy) return;
  var target = ANIMALS[whackOrder[whackRound]];
  var name = mole.getAttribute('data-name');
  if(name === target.name) {
    whackBusy = true;
    mole.classList.add('whacked');
    moleTimers.forEach(clearTimeout); moleTimers = [];
    var rect = hole.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    whackRound++;
    setInstr('I see a ' + target.name + '!', '打对啦！这是 ' + target.name + '！', starsBar(5, whackRound));
    playCorrect();
    speak(target.name, function() {
      whackBusy = false;
      document.querySelectorAll('.mole').forEach(function(m){
        m.classList.remove('up','whacked'); m.innerHTML = '';
      });
      nextWhackRound();
    });
  } else {
    speak(name);
    playWrong();
    hole.style.animation = 'shake .4s ease';
    setTimeout(function(){ hole.style.animation = ''; }, 500);
  }
}

// === MODULE 3: BODY TOUCH ===
var bodyRound = 0, bodyOrder = [], bodyBusy = false;

function startBodyTouch() {
  bodyRound = 0;
  bodyBusy = false;
  bodyOrder = shuffle([0,1,2,3,4]);
  buildBodyGrid();
  showBodyPrompt();
}

function buildBodyGrid() {
  var grid = document.getElementById('bodyGrid');
  grid.innerHTML = '';
  shuffle(BODY).forEach(function(b) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = twimg(b.code, 80) + '<div class="label">' + b.name + '</div>';
    card.onclick = function(e) { checkBody(card, b, e); };
    grid.appendChild(card);
  });
}

function showBodyPrompt() {
  if(bodyRound >= 5) {
    setInstr('All body parts found! 🙌', '太厉害了，全部身体部位都找对啦！', starsBar(5, 5));
    return;
  }
  var target = BODY[bodyOrder[bodyRound]];
  setInstr('Touch the ' + target.name + '! 👆', '听一听，哪个是 ' + target.name + '？点它！', starsBar(5, bodyRound));
  speak('Touch the ' + target.name);
}

function checkBody(card, item, e) {
  if(bodyRound >= 5) { speak(item.name); return; }
  if(bodyBusy) return;
  var target = BODY[bodyOrder[bodyRound]];
  if(item.name === target.name) {
    bodyBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    bodyRound++;
    setInstr('This is my ' + target.name + '!', '答对啦！这是 ' + target.name + '！', starsBar(5, bodyRound));
    playCorrect();
    speak(target.name, function() {
      bodyBusy = false;
      setTimeout(function() { buildBodyGrid(); showBodyPrompt(); }, 400);
    });
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 4: FOOD SORT ===
var foodRound = 0, foodOrder = [], foodBusy = false;

function startFoodSort() {
  foodRound = 0;
  foodBusy = false;
  foodOrder = shuffle([0,1,2,3,4]);
  buildFoodGrid();
  showFoodPrompt();
}

function buildFoodGrid() {
  var grid = document.getElementById('foodGrid');
  grid.innerHTML = '';
  shuffle(FOOD).forEach(function(f) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = twimg(f.code, 80) + '<div class="label">' + f.name + '</div>';
    card.onclick = function(e) { checkFood(card, f, e); };
    grid.appendChild(card);
  });
}

function showFoodPrompt() {
  if(foodRound >= 5) {
    setInstr('All food found! 🍽️', '太厉害了，全部食物都找对啦！', starsBar(5, 5));
    return;
  }
  var target = FOOD[foodOrder[foodRound]];
  setInstr('Find the ' + target.name + '! 🔍', '点一点，哪个是 ' + target.name + '？', starsBar(5, foodRound));
  speak('Find the ' + target.name);
}

function checkFood(card, item, e) {
  if(foodRound >= 5) { speak(item.name); return; }
  if(foodBusy) return;
  var target = FOOD[foodOrder[foodRound]];
  if(item.name === target.name) {
    foodBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    foodRound++;
    setInstr('I like ' + target.name + '!', '答对啦！这是 ' + target.name + '！', starsBar(5, foodRound));
    playCorrect();
    speak(target.name, function() {
      foodBusy = false;
      setTimeout(function() { buildFoodGrid(); showFoodPrompt(); }, 400);
    });
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 5: GRAND MIX MEMORY FLIP ===
var flipFirst = null, flipMatched = 0, flipLocked = false, flipPairs = [];

function startFlip() {
  flipFirst = null; flipMatched = 0; flipLocked = false;
  setInstr('Find the pairs! 🃏', '翻开两张一样的卡片，配成一对！', starsBar(8, 0));
  speak('pairs');

  // Pick 8 random words from all 20 (mix of all themes)
  var allWords = [];
  COLORS.forEach(function(c) { allWords.push({name:c.name, type:'color', color:c.color}); });
  ANIMALS.forEach(function(a) { allWords.push({name:a.name, type:'emoji', code:a.code}); });
  BODY.forEach(function(b) { allWords.push({name:b.name, type:'emoji', code:b.code}); });
  FOOD.forEach(function(f) { allWords.push({name:f.name, type:'emoji', code:f.code}); });

  var picks = shuffle(allWords).slice(0, 8);
  flipPairs = shuffle(picks.concat(picks.map(function(p){ return {name:p.name, type:p.type, code:p.code, color:p.color}; })));
  buildFlipGrid();
}

function flipIcon(word, sz) {
  if(word.type === 'color') return colorDot(word.color, sz);
  return twimg(word.code, sz);
}

function buildFlipGrid() {
  var grid = document.getElementById('flipGrid');
  grid.innerHTML = '';
  flipPairs.forEach(function(w, i) {
    var card = document.createElement('div');
    card.className = 'flip-card face-down';
    card.setAttribute('data-idx', i);
    card.setAttribute('data-name', w.name);
    card.innerHTML = '<div class="flip-face">' + twimg('2753', 40) + '</div>';
    card.onclick = function(e) { flipCard(card, w, i, e); };
    grid.appendChild(card);
  });
}

function flipCard(el, word, idx, e) {
  if(flipLocked) return;
  if(el.classList.contains('matched')) return;
  if(!el.classList.contains('face-down')) return;

  el.classList.remove('face-down');
  el.querySelector('.flip-face').innerHTML = flipIcon(word, 50);
  playPop();

  if(!flipFirst) {
    speak(word.name);
    flipFirst = {el: el, word: word, idx: idx};
    return;
  }

  flipLocked = true;
  if(flipFirst.word.name === word.name && flipFirst.idx !== idx) {
    // Match!
    var rect = el.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    el.classList.add('matched');
    flipFirst.el.classList.add('matched');
    flipMatched++;
    playCorrect();
    speak(word.name, function() {
      flipFirst = null;
      flipLocked = false;
      if(flipMatched >= 8) {
        setInstr('All matched! 🎉', '全部配对成功，你太棒了！', starsBar(8, 8));
      } else {
        setInstr('Find the pairs! 🃏', '再翻两张，找一样的！', starsBar(8, flipMatched));
      }
    });
  } else {
    // No match
    var prev = flipFirst;
    playWrong();
    setTimeout(function() {
      el.classList.add('face-down');
      el.querySelector('.flip-face').innerHTML = twimg('2753', 40);
      prev.el.classList.add('face-down');
      prev.el.querySelector('.flip-face').innerHTML = twimg('2753', 40);
      flipFirst = null;
      flipLocked = false;
    }, 800);
  }
}

document.getElementById('topTitle').innerHTML = twimg('1f4dd', 20) + ' Day 5 · Review Day';

COLORS.forEach(function(c){ previewHtml += colorDot(c.color, 36); });
ANIMALS.forEach(function(a){ previewHtml += twimg(a.code, 36); });
BODY.forEach(function(b){ previewHtml += twimg(b.code, 36); });
FOOD.forEach(function(f){ previewHtml += twimg(f.code, 36); });
document.getElementById('startPreview').innerHTML = previewHtml;
document.getElementById('completeEmoji').innerHTML = twimg('1f3c6', 90);
