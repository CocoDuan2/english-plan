<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 8 Review - Colors 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#f5c6ec 0%,#c8f7dc 50%,#fce4a8 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:70px}

.top-bar{position:sticky;top:0;width:100%;max-width:500px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  border-bottom:2px solid rgba(0,0,0,.06);border-radius:0 0 12px 12px}
.top-bar .title{font-size:16px;font-weight:700;color:#9b59b6;display:flex;align-items:center;gap:6px}
.top-bar .dots{display:flex;gap:6px}
.top-bar .dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:.3s}
.top-bar .dot.active{background:#9b59b6;transform:scale(1.2)}
.top-bar .dot.done{background:#8e44ad}

.main{width:100%;max-width:500px;flex:1;overflow:auto;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center}
.module{display:none;flex-direction:column;align-items:center;flex:1;width:100%}
.module.active{display:flex}

.instr-banner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 14px;margin-bottom:8px;width:100%;max-width:500px;background:none;border-radius:0;min-height:auto;box-shadow:none}
.instr-en{font-size:22px;font-weight:700;color:#2d3436;line-height:1.3}
.instr-zh{font-size:17px;color:rgba(0,0,0,.5);margin-top:2px;line-height:1.3}
.instr-stars{display:flex;gap:5px;margin-top:4px}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.95)}
.card .label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Color dot for cards */
.cdot{border-radius:50%;display:inline-block;transition:filter .4s,transform .4s}
.cdot.gray{filter:grayscale(1) brightness(1.3);opacity:.5}

/* Gift unbox */
.gift-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;justify-items:center}
.gift-card{background:rgba(255,255,255,.9);border-radius:14px;padding:12px;min-height:110px;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .2s;-webkit-tap-highlight-color:transparent;position:relative}
.gift-card:active{transform:scale(.95)}
.gift-card .gift-icon{transition:transform .4s,opacity .4s}
.gift-card.opened .gift-icon{transform:scale(0);opacity:0;position:absolute}
.gift-card .gift-reveal{display:none;flex-direction:column;align-items:center;animation:popIn .5s ease}
.gift-card.opened .gift-reveal{display:flex}
.gift-card .gift-label{font-size:18px;font-weight:700;margin-top:4px;color:#333}

/* Balloon pop */
.balloon-area{position:relative;width:100%;height:320px;overflow:hidden;border-radius:16px;background:linear-gradient(180deg,#87ceeb 0%,#e0f7fa 100%)}
.balloon{position:absolute;bottom:-80px;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent}
.balloon:active{transform:scale(.9)}
.balloon svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.balloon.popped{animation:balloonPop .3s ease forwards}
@keyframes balloonPop{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
@keyframes floatUp{0%{bottom:-80px}100%{bottom:340px}}

/* Stars burst */
.star-burst{position:fixed;pointer-events:none;z-index:999}
.star-particle{position:absolute;animation:starFly 1s ease-out forwards}

/* Nav bar */
.nav-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;
  padding:10px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-top:2px solid rgba(0,0,0,.06);z-index:100}
.nav-btn{padding:10px 24px;border:none;border-radius:30px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .2s,opacity .3s}
.nav-btn:active{transform:scale(.93)}
.nav-prev{background:#fff;color:#9b59b6;border:2px solid #9b59b6}
.nav-next{color:#fff;background:linear-gradient(135deg,#bb6bd9,#9b59b6);
  box-shadow:0 4px 15px rgba(155,89,182,.4)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-progress{font-size:14px;color:#666;align-self:center;font-weight:600;min-width:40px;text-align:center}

/* Complete */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.complete-emoji{animation:popIn .6s ease}
.complete-text{font-size:24px;font-weight:700;color:#fff;margin-top:12px;text-shadow:1px 1px 3px rgba(0,0,0,.2)}

/* Animations */
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.star{opacity:.3;transition:opacity .3s,transform .3s;line-height:1}
.star.earned{opacity:1;animation:popIn .4s ease}

/* PC layout */
@media(min-width:768px){
  .top-bar{max-width:800px;padding:16px 24px}
  .top-bar .title{font-size:22px}
  .main{max-width:800px;padding:24px 24px 20px}
  .card-grid,.gift-grid{gap:18px}
  .card{padding:20px;min-height:140px}
  .cdot{width:120px!important;height:120px!important}
  .balloon-area{height:420px}
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title" id="topTitle">🌈 Day 8 · Colors 2 Review</div>
  <div class="dots" id="dots"></div>
</div>
<div class="main" id="main">
<div class="instr-banner" id="instrBanner"></div>

<!-- Start Screen -->
<div class="module active" id="mod0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px">
  <div style="display:flex;gap:10px" id="startColors"></div>
  <div style="font-size:32px;font-weight:700;color:#2d3436">准备好了吗？</div>
  <div style="font-size:18px;color:rgba(0,0,0,.45)">点击开始学颜色！</div>
  <button onclick="getAudioCtx();goModule(1);document.getElementById('mod0').style.display='none'" style="font-size:28px;padding:16px 50px;border-radius:50px;border:none;background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(155,89,182,.35);letter-spacing:2px">开始玩 ▶</button>
</div>

<!-- Module 1: Review Warm-up -->
<div class="module" id="mod1">
  <div class="card-grid" id="reviewGrid"></div>
</div>

<!-- Module 2: Tap to Learn -->
<div class="module" id="mod2">
  <div class="card-grid" id="learnGrid"></div>
</div>

<!-- Module 3: Gift Unbox -->
<div class="module" id="mod3">
  <div class="gift-grid" id="giftGrid"></div>
</div>

<!-- Module 4: Listen & Find -->
<div class="module" id="mod4">
  <div class="card-grid" id="listenGrid"></div>
</div>

<!-- Module 5: Balloon Pop -->
<div class="module" id="mod5">
  <div class="balloon-area" id="balloonArea"></div>
</div>

<!-- Complete -->
<div class="module" id="mod6">
  <div class="complete-screen">
    <div class="complete-emoji" id="completeEmoji"></div>
    <div class="complete-text">Great Job, Ranran!</div>
    <div style="font-size:16px;color:rgba(255,255,255,.85);margin-top:8px">You learned all the new colors!</div>
    <button class="nav-btn nav-next" style="margin-top:20px" onclick="goModule(1)">🔄 Play Again</button>
    <button class="nav-btn" style="margin-top:10px;background:rgba(255,255,255,.2);color:#fff;border:none" onclick="location.href='../../index.html'">🏠 Home</button>
  </div>
</div>

</div>

<div class="nav-bar">
  <button class="nav-btn nav-prev" id="navPrev" onclick="goPrev()">&#9664; Back</button>
  <span class="nav-progress" id="navProgress">1/5</span>
  <button class="nav-btn nav-next" id="navNext" onclick="goNext()">Next &#9654;</button>
</div>

<script>
// === TWEMOJI HELPER ===
function twimg(code, sz) {
  return '<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/' + code + '.svg" width="' + sz + '" height="' + sz + '" alt="">';
}

// === DATA ===
var COLORS = [
  {name:'pink',   hex:'#e91e8c', border:false},
  {name:'purple', hex:'#9b59b6', border:false},
  {name:'white',  hex:'#ecf0f1', border:true},
  {name:'black',  hex:'#2c3e50', border:false},
  {name:'brown',  hex:'#8b4513', border:false}
];
var REVIEW = [
  {name:'jump',  code:'1f938'},
  {name:'two',   code:'32-20e3'},
  {name:'stand', code:'1f9cd'}
];

var MODULES = 6, currentModule = 0;
var reviewRound = 0, reviewOrder = [];
var learnRevealed = 0;
var giftRound = 0, giftOrder = [], giftMap = {};
var listenRound = 0, listenOrder = [];
var balloonRound = 0, balloonScore = 0, balloonOrder = [], balloonTimer = null, balloonAnims = [];

// === AUDIO & SPEECH ===
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function speak(text, cb) {
  var isWord = text.trim().indexOf(' ') === -1;
  var url = isWord
    ? 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2'
    : 'https://fanyi.baidu.com/gettts?lan=en&text=' + encodeURIComponent(text) + '&spd=4&source=web';
  var a = new Audio(url);
  var done = false;
  var finish = function(){ if(!done){ done=true; if(cb) setTimeout(cb, 50); } };
  var safety = setTimeout(finish, 4000);
  a.onended = function(){ clearTimeout(safety); finish(); };
  a.onerror = function(){ clearTimeout(safety); finish(); };
  a.play().catch(finish);
}
function playCorrect() {
  var ctx = getAudioCtx();
  [523.25, 659.25].forEach(function(freq, i) {
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    var t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  });
}
function playWrong() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
function playPop() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}
function playStar() {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}

// === UTILITIES ===
function setInstr(en, zh, starsHtml) {
  var b = document.getElementById('instrBanner');
  var h = '<div class="instr-en">' + en + '</div>';
  if(zh) h += '<div class="instr-zh">' + zh + '</div>';
  if(starsHtml) h += '<div class="instr-stars">' + starsHtml + '</div>';
  b.innerHTML = h;
}
function starsBar(total, earned) {
  var h = '';
  for(var i = 0; i < total; i++) {
    h += '<span class="star' + (i < earned ? ' earned' : '') + '">' + twimg('2b50', 18) + '</span>';
  }
  return h;
}
function burstStars(x, y) {
  playStar();
  var c = document.createElement('div');
  c.className = 'star-burst';
  c.style.left = x + 'px'; c.style.top = y + 'px';
  var codes = ['2b50','1f31f','2728','1f4ab'];
  for(var i = 0; i < 8; i++) {
    var s = document.createElement('div');
    s.className = 'star-particle';
    var angle = (i / 8) * Math.PI * 2;
    var dist = 60 + Math.random() * 40;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    s.innerHTML = twimg(codes[i % 4], 20);
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(function(){ c.remove(); }, 1100);
}
function shuffle(arr) {
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function colorDot(hex, sz, border) {
  var style = 'width:'+sz+'px;height:'+sz+'px;background:'+hex+';border-radius:50%;display:inline-block';
  if(border) style += ';border:1px solid #bbb';
  return '<div style="'+style+'"></div>';
}
function colorDotEl(hex, sz, border, gray) {
  var style = 'width:'+sz+'px;height:'+sz+'px;background:'+hex;
  if(border) style += ';border:1px solid #bbb';
  if(gray) style += ';filter:grayscale(1) brightness(1.3);opacity:.5';
  return '<div class="cdot'+(gray?' gray':'')+'" style="'+style+'"></div>';
}

// === NAVIGATION ===
function updateDots() {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(var i = 1; i <= 5; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === currentModule ? ' active' : '') + (i < currentModule ? ' done' : '');
    dots.appendChild(d);
  }
}
function goModule(n) {
  currentModule = n;
  document.querySelectorAll('.module').forEach(function(m){
    m.classList.remove('active');
    m.style.display = '';
  });
  var target = document.getElementById('mod' + n);
  if(target) target.classList.add('active');
  updateDots();
  if(n === 1) startReview();
  if(n === 2) initLearn();
  if(n === 3) startGift();
  if(n === 4) startListen();
  if(n === 5) startBalloon();
  updateNav();
}
function updateNav() {
  document.getElementById('navPrev').disabled = (currentModule <= 1);
  document.getElementById('navNext').textContent = (currentModule >= 5) ? 'Done!' : 'Next';
  document.getElementById('navProgress').textContent = Math.min(currentModule, 5) + '/5';
  document.querySelector('.nav-bar').style.display = (currentModule >= 6) ? 'none' : '';
}
function goNext() { if(currentModule < 6) goModule(currentModule + 1); }
function goPrev() { if(currentModule > 1) goModule(currentModule - 1); }

// === MODULE 1: REVIEW WARM-UP (find jump/two/stand) ===
function startReview() {
  reviewRound = 0;
  reviewOrder = shuffle([0,1,2]);
  buildReviewGrid();
  showReviewPrompt();
}
function buildReviewGrid() {
  var grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  shuffle(REVIEW).forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="icon">' + twimg(r.code, 80) + '</div><div class="label">' + r.name + '</div>';
    card.onclick = function(e) { checkReview(card, r, e); };
    grid.appendChild(card);
  });
}
function showReviewPrompt() {
  if(reviewRound >= 3) {
    setInstr('Great memory! 🌟', '太厉害了，全部找对啦！', starsBar(3, 3));
    return;
  }
  var target = REVIEW[reviewOrder[reviewRound]];
  setInstr('Find: ' + target.name + '! ' + twimg(target.code, 24), '点一点，哪个是 ' + target.name + '？', starsBar(3, reviewRound));
  speak('Find ' + target.name);
}
var reviewBusy = false;
function checkReview(card, item, e) {
  if(reviewRound >= 3) { speak(item.name); return; }
  if(reviewBusy) return;
  var target = REVIEW[reviewOrder[reviewRound]];
  if(item.name === target.name) {
    reviewBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    reviewRound++;
    setInstr('Find: ' + target.name + '! ' + twimg(target.code, 24), '答对啦！这是 ' + target.name + '！', starsBar(3, reviewRound));
    playCorrect();
    speak(target.name);
    setTimeout(function() {
      reviewBusy = false;
      buildReviewGrid(); showReviewPrompt();
    }, 1200);
  } else {
    speak(item.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 2: TAP TO LEARN (gray circles → color reveal) ===
function initLearn() {
  learnRevealed = 0;
  setInstr('Tap to learn! 👆', '点一点圆圈，看看是什么颜色！');
  var grid = document.getElementById('learnGrid');
  grid.innerHTML = '';
  COLORS.forEach(function(clr, i) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="icon">' + colorDotEl(clr.hex, 80, clr.border, true) + '</div><div class="label">' + clr.name + '</div>';
    card.querySelector('.label').style.opacity = '0';
    card.onclick = function(e) { revealLearn(card, i, e); };
    grid.appendChild(card);
  });
}
var learnBusy = false;
function revealLearn(el, idx, e) {
  var dot = el.querySelector('.cdot');
  if(dot && !dot.classList.contains('gray')) {
    speak(COLORS[idx].name);
    return;
  }
  if(learnBusy) return;
  learnBusy = true;
  if(dot) {
    dot.classList.remove('gray');
    dot.style.filter = '';
    dot.style.opacity = '1';
    dot.style.animation = 'popIn .4s ease';
  }
  el.querySelector('.label').style.opacity = '1';
  learnRevealed++;
  playPop();
  var rect = el.getBoundingClientRect();
  burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
  speak(COLORS[idx].name, function() {
    learnBusy = false;
    if(learnRevealed >= COLORS.length) {
      setInstr('All learned! 🎉', '全部学会啦，你真棒！');
    } else {
      setInstr('Tap to learn! 👆', '还有圆圈没翻开哦，继续点！');
    }
  });
}

// === MODULE 3: GIFT UNBOX ===
function startGift() {
  giftRound = 0;
  giftOrder = shuffle([0,1,2,3,4]);
  giftMap = {};
  buildGiftGrid();
  showGiftPrompt();
}
function buildGiftGrid() {
  var grid = document.getElementById('giftGrid');
  grid.innerHTML = '';
  var assigned = shuffle(COLORS.slice());
  for(var i = 0; i < 5; i++) {
    var card = document.createElement('div');
    card.className = 'gift-card';
    card.setAttribute('data-idx', i);
    card.innerHTML = '<div class="gift-icon">' + twimg('1f381', 70) + '</div>' +
      '<div class="gift-reveal">' + colorDot(assigned[i].hex, 60, assigned[i].border) +
      '<div class="gift-label">' + assigned[i].name + '</div></div>';
    giftMap[i] = assigned[i];
    (function(idx) {
      card.onclick = function(e) { openGift(card, idx, e); };
    })(i);
    grid.appendChild(card);
  }
}
function showGiftPrompt() {
  if(giftRound >= 5) {
    setInstr('All opened! 🎉', '全部打开啦，你太棒了！', starsBar(5, 5));
    return;
  }
  var target = COLORS[giftOrder[giftRound]];
  setInstr('Find ' + target.name + '! 🎁', '哪个礼物盒里是 ' + target.name + '？点一点！', starsBar(5, giftRound));
  speak('Find ' + target.name);
}
var giftBusy = false;
function openGift(card, idx, e) {
  if(card.classList.contains('opened')) {
    speak(giftMap[idx].name);
    return;
  }
  if(giftBusy) return;
  var target = COLORS[giftOrder[giftRound]];
  if(giftRound >= 5) return;

  if(giftMap[idx].name === target.name) {
    giftBusy = true;
    card.classList.add('opened');
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    giftRound++;
    setInstr('Find ' + target.name + '! 🎁', '答对啦！这是 ' + target.name + '！', starsBar(5, giftRound));
    playCorrect();
    speak(target.name, function() {
      giftBusy = false;
      showGiftPrompt();
    });
  } else {
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 4: LISTEN & FIND ===
function startListen() {
  listenRound = 0;
  listenOrder = shuffle([0,1,2,3,4]);
  buildListenGrid();
  showListenPrompt();
}
function buildListenGrid() {
  var grid = document.getElementById('listenGrid');
  grid.innerHTML = '';
  shuffle(COLORS).forEach(function(clr) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="icon">' + colorDot(clr.hex, 80, clr.border) + '</div><div class="label">' + clr.name + '</div>';
    card.onclick = function(e) { checkListen(card, clr, e); };
    grid.appendChild(card);
  });
}
function showListenPrompt() {
  if(listenRound >= 5) {
    setInstr('All found! 🎉', '全部找到啦，耳朵真灵！', starsBar(5, 5));
    return;
  }
  var target = COLORS[listenOrder[listenRound]];
  setInstr('Find ' + target.name + '! 🔍', '听一听，哪个是 ' + target.name + '？点它！', starsBar(5, listenRound));
  speak('Find ' + target.name);
}
var listenBusy = false;
function checkListen(card, clr, e) {
  if(listenRound >= 5) { speak(clr.name); return; }
  if(listenBusy) return;
  var target = COLORS[listenOrder[listenRound]];
  if(clr.name === target.name) {
    listenBusy = true;
    var rect = card.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    listenRound++;
    setInstr('Find ' + target.name + '! 🔍', '找对啦！这是 ' + target.name + '！', starsBar(5, listenRound));
    playCorrect();
    speak(target.name, function() {
      listenBusy = false;
      buildListenGrid(); showListenPrompt();
    });
  } else {
    speak(clr.name);
    playWrong();
    card.style.animation = 'shake .4s ease';
    setTimeout(function(){ card.style.animation = ''; }, 500);
  }
}

// === MODULE 5: BALLOON POP ===
var balloonActive = [];
function startBalloon() {
  balloonRound = 0;
  balloonScore = 0;
  balloonOrder = shuffle([0,1,2,3,4]);
  balloonAnims.forEach(function(id){ cancelAnimationFrame(id); });
  balloonAnims = [];
  if(balloonTimer) clearInterval(balloonTimer);
  document.getElementById('balloonArea').innerHTML = '';
  nextBalloonRound();
}

function nextBalloonRound() {
  if(balloonRound >= 5) {
    setInstr('Amazing! 🎈', '太厉害了，全部打爆啦！', starsBar(5, 5));
    return;
  }
  var target = COLORS[balloonOrder[balloonRound]];
  setInstr('Pop the ' + target.name + ' balloon! 🎈', '快点 ' + target.name + ' 的气球！', starsBar(5, balloonRound));
  speak(target.name);

  var area = document.getElementById('balloonArea');
  area.innerHTML = '';
  balloonActive = [];

  // Spawn 4-5 balloons with mixed colors
  var picks = shuffle(COLORS.slice());
  var hasTarget = false;
  var count = 4 + Math.floor(Math.random() * 2);
  var spawned = [];
  for(var i = 0; i < count; i++) {
    var clr = picks[i % picks.length];
    if(clr.name === target.name) hasTarget = true;
    spawned.push(clr);
  }
  if(!hasTarget) spawned[0] = target;
  spawned = shuffle(spawned);

  spawned.forEach(function(clr, idx) {
    setTimeout(function() { spawnBalloon(area, clr, target, idx); }, idx * 600);
  });
}

function spawnBalloon(area, clr, target, idx) {
  var el = document.createElement('div');
  el.className = 'balloon';
  var w = area.offsetWidth || 300;
  var left = 20 + Math.random() * (w - 80);
  el.style.left = left + 'px';

  // SVG balloon
  var fill = clr.hex;
  var stroke = clr.border ? '#bbb' : darken(clr.hex, 20);
  el.innerHTML = '<svg width="60" height="76" viewBox="0 0 60 76">' +
    '<ellipse cx="30" cy="28" rx="26" ry="28" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.5"/>' +
    '<polygon points="24,54 30,64 36,54" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1"/>' +
    '<line x1="30" y1="64" x2="30" y2="76" stroke="#999" stroke-width="1.5"/>' +
    '</svg>';

  el.setAttribute('data-color', clr.name);
  el.onclick = function(e) { popBalloon(el, clr, target, e); };
  area.appendChild(el);

  // Animate float up
  var duration = 6000 + Math.random() * 3000;
  var start = performance.now();
  var areaH = area.offsetHeight || 320;
  function animate(now) {
    var elapsed = now - start;
    var progress = elapsed / duration;
    if(progress > 1) { el.remove(); return; }
    var bottom = -80 + progress * (areaH + 160);
    el.style.bottom = bottom + 'px';
    // Gentle sway
    el.style.transform = 'translateX(' + Math.sin(elapsed / 500) * 8 + 'px)';
    var id = requestAnimationFrame(animate);
    balloonAnims.push(id);
  }
  requestAnimationFrame(animate);
}

var balloonBusy = false;
function popBalloon(el, clr, target, e) {
  if(balloonBusy) return;
  if(clr.name === target.name) {
    balloonBusy = true;
    el.classList.add('popped');
    var rect = el.getBoundingClientRect();
    burstStars(rect.left + rect.width/2, rect.top + rect.height/2);
    balloonScore++;
    balloonRound++;
    setInstr('Pop the ' + target.name + ' balloon! 🎈', '打对啦！这是 ' + target.name + '！', starsBar(5, balloonRound));
    playCorrect();
    speak(target.name, function() {
      balloonBusy = false;
      setTimeout(nextBalloonRound, 500);
    });
  } else {
    playWrong();
    el.style.animation = 'shake .3s ease';
    setTimeout(function(){ el.style.animation = ''; }, 400);
  }
}

function darken(hex, amt) {
  var num = parseInt(hex.replace('#',''), 16);
  var r = Math.max(0, (num >> 16) - amt);
  var g = Math.max(0, ((num >> 8) & 0xff) - amt);
  var b = Math.max(0, (num & 0xff) - amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// === MODULE 5 END ===

// === INIT ===
document.getElementById('startColors').innerHTML = COLORS.map(function(c) {
  var style = 'width:50px;height:50px;border-radius:50%;background:'+c.hex+';display:inline-block';
  if(c.border) style += ';border:1px solid #bbb';
  return '<div style="'+style+'"></div>';
}).join('');
document.getElementById('completeEmoji').innerHTML = twimg('1f389', 90);
