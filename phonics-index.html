<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>自然拼读课程 - 跟着佩琪学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#2c3e50;
  --muted:#667085;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 10%,#ffd9e7 0,transparent 35%),
    radial-gradient(circle at 88% 12%,#c9f0ff 0,transparent 32%),
    linear-gradient(160deg,#fff4f8,#f8fbff 52%,#f5fff4);
  padding:20px 16px 28px;
  color:var(--ink);
}
.container{max-width:760px;margin:0 auto}
.hero{
  text-align:center;
  background:rgba(255,255,255,.72);
  border:2px solid rgba(255,255,255,.9);
  border-radius:22px;
  padding:14px 14px 16px;
  box-shadow:0 10px 26px rgba(32,56,90,.08);
}
.logo{width:118px;display:block;margin:2px auto 6px}
h1{font-size:30px;line-height:1.1;color:#394867}
.sub{margin-top:4px;font-size:14px;color:#6b7280}
.back-btn{
  display:inline-block;
  margin-bottom:12px;
  padding:8px 16px;
  background:rgba(255,255,255,.9);
  border:2px solid rgba(255,255,255,.95);
  border-radius:12px;
  text-decoration:none;
  color:var(--ink);
  font-size:14px;
  font-weight:600;
  box-shadow:0 4px 12px rgba(30,58,95,.08);
  transition:transform .2s ease;
}
.back-btn:hover{transform:translateY(-1px)}
.levels{margin-top:20px;display:grid;gap:12px}
.level-card{
  text-decoration:none;
  color:var(--ink);
  background:rgba(255,255,255,.9);
  border:2px solid rgba(255,255,255,.95);
  border-radius:18px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:0 6px 20px rgba(30,58,95,.1);
  transition:transform .2s ease,box-shadow .2s ease;
  cursor:pointer;
}
.level-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(30,58,95,.15)}
.level-card:active{transform:scale(.98)}
.level-icon{
  width:64px;height:64px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;
  border:3px solid;
}
.level-info{flex:1;min-width:0}
.level-title{font-size:20px;font-weight:900;line-height:1.2}
.level-desc{margin-top:4px;font-size:13px;color:var(--muted)}
.level-meta{margin-top:6px;font-size:12px;font-weight:700;opacity:.8}
@media(min-width:700px){
  .levels{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <a class="back-btn" href="index.html">← 返回主页</a>
  
  <div class="hero">
    <img class="logo" src="assets/peppa/peppa-pig-title-logo.png" alt="Peppa">
    <h1>🔤 自然拼读课程</h1>
    <div class="sub">系统学习字母发音 · 掌握拼读规律 · 见词能读</div>
  </div>
  
  <div class="levels">
    <a class="level-card" href="phonics-1.html" style="background:linear-gradient(135deg,#fce4ec,#f8bbd0)">
      <div class="level-icon" style="background:#ffebee;border-color:#ec407a;color:#c2185b">P1</div>
      <div class="level-info">
        <div class="level-title">Phonics 1 · 字母音</div>
        <div class="level-desc">26个字母 + 基本发音</div>
        <div class="level-meta">26 课 · 78 个单词</div>
      </div>
    </a>
    <a class="level-card" href="phonics-2.html" style="background:linear-gradient(135deg,#e3f2fd,#bbdefb)">
      <div class="level-icon" style="background:#e3f2fd;border-color:#42a5f5;color:#1565c0">P2</div>
      <div class="level-info">
        <div class="level-title">Phonics 2 · 短元音</div>
        <div class="level-desc">CVC 拼读家族</div>
        <div class="level-meta">15 课 · 75 个单词</div>
      </div>
    </a>
    <a class="level-card" href="phonics-3.html" style="background:linear-gradient(135deg,#e8f5e9,#c8e6c9)">
      <div class="level-icon" style="background:#e8f5e9;border-color:#66bb6a;color:#2e7d32">P3</div>
      <div class="level-info">
        <div class="level-title">Phonics 3 · 长元音</div>
        <div class="level-desc">Magic E + 双元音</div>
        <div class="level-meta">20 课 · 100 个单词</div>
      </div>
    </a>
    <a class="level-card" href="phonics-4.html" style="background:linear-gradient(135deg,#fff3e0,#ffe0b2)">
      <div class="level-icon" style="background:#fff3e0;border-color:#ffa726;color:#e65100">P4</div>
      <div class="level-info">
        <div class="level-title">Phonics 4 · 辅音组合</div>
        <div class="level-desc">辅音连缀 + 字母组合</div>
        <div class="level-meta">20 课 · 80 个单词</div>
      </div>
    </a>
    <a class="level-card" href="phonics-5.html" style="background:linear-gradient(135deg,#f3e5f5,#e1bee7)">
      <div class="level-icon" style="background:#f3e5f5;border-color:#ab47bc;color:#6a1b9a">P5</div>
      <div class="level-info">
        <div class="level-title">Phonics 5 · 复杂拼读</div>
        <div class="level-desc">R-controlled + 复杂元音</div>
        <div class="level-meta">20 课 · 80 个单词</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
