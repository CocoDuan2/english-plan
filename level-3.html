<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Level 3 · 探索之旅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#2c3e50;
  --muted:#667085;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 10%,#ffd9e7 0,transparent 35%),
    radial-gradient(circle at 88% 12%,#c9f0ff 0,transparent 32%),
    linear-gradient(160deg,#fff4f8,#f8fbff 52%,#f5fff4);
  padding:20px 16px 28px;
  color:var(--ink);
}
.container{max-width:760px;margin:0 auto}
.back{
  display:inline-flex;align-items:center;gap:6px;
  text-decoration:none;color:var(--ink);
  font-size:14px;font-weight:700;
  margin-bottom:12px;
  padding:8px 12px;
  background:rgba(255,255,255,.7);
  border-radius:12px;
  transition:background .2s;
}
.back:hover{background:rgba(255,255,255,.9)}
.hero{
  text-align:center;
  background:rgba(255,255,255,.72);
  border:2px solid rgba(255,255,255,.9);
  border-radius:22px;
  padding:14px 14px 16px;
  box-shadow:0 10px 26px rgba(32,56,90,.08);
}
h1{font-size:28px;line-height:1.1;color:#394867}
.sub{margin-top:4px;font-size:14px;color:#6b7280}
.lesson-group{margin-top:14px}
.lesson-head{
  display:flex;align-items:center;justify-content:space-between;
  border-radius:14px;
  padding:10px 12px;
  font-weight:800;
  font-size:17px;
  color:#263238;
}
.lesson-head small{font-size:12px;font-weight:700;opacity:.78}
.cards{margin-top:8px;display:grid;gap:8px}
.card{
  text-decoration:none;
  color:var(--ink);
  background:rgba(255,255,255,.9);
  border:2px solid rgba(255,255,255,.95);
  border-radius:16px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 4px 16px rgba(30,58,95,.08);
  transition:transform .18s ease,box-shadow .18s ease;
}
.card:active{transform:scale(.98)}
.icon-wrap{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
}
.icon-wrap img{width:42px;height:42px;object-fit:contain}
.info{flex:1;min-width:0}
.row{display:flex;align-items:center;gap:8px}
.title{font-size:17px;font-weight:900;line-height:1.1}
.badge{
  font-size:11px;font-weight:800;padding:3px 7px;border-radius:999px;
  border:2px solid transparent;
}
.desc{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(min-width:700px){
  .cards{grid-template-columns:1fr 1fr}
  .card{padding:12px}
}
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← 返回主页</a>
  <div class="hero">
    <h1>Level 3 · 探索之旅</h1>
    <div class="sub">10 个故事 · 50 个单词</div>
  </div>
  <div id="lessons"></div>
</div>
<script>
var lessons=[{"dir":"going-places","theme":"Going Places","words":"bus, bike, boat, train, plane","panel":"linear-gradient(135deg,#e3f2fd,#bbdefb)","teachIcon":"../assets/peppa/peppa_pig_bicycle.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#e3f2fd","bd":"#42a5f5","txt":"#01579b"},"reviewTone":{"bg":"#bbdefb","bd":"#1976d2","txt":"#0d47a1"}},{"dir":"opposites-game","theme":"Opposites Game","words":"hot, cold, up, down, fast","panel":"linear-gradient(135deg,#fff3e0,#ffe0b2)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#fff3e0","bd":"#ff9800","txt":"#e65100"},"reviewTone":{"bg":"#ffe0b2","bd":"#ff6d00","txt":"#bf360c"}},{"dir":"shapes-around-us","theme":"Shapes Around Us","words":"circle, square, triangle, star, heart","panel":"linear-gradient(135deg,#e1bee7,#ce93d8)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#f3e5f5","bd":"#ab47bc","txt":"#7b1fa2"},"reviewTone":{"bg":"#e1bee7","bd":"#9c27b0","txt":"#6a1b9a"}},{"dir":"music-time","theme":"Music Time","words":"sing, dance, clap, drum, piano","panel":"linear-gradient(135deg,#FFE5B4,#FFD1DC)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#fff8e1","bd":"#ba68c8","txt":"#7b1fa2"},"reviewTone":{"bg":"#ffe0b2","bd":"#9c27b0","txt":"#6a1b9a"}},{"dir":"beach-day","theme":"Beach Day","words":"sand, shell, wave, crab, boat","panel":"linear-gradient(135deg,#87CEEB,#F4E4C1)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#e3f2fd","bd":"#4fc3f7","txt":"#01579b"},"reviewTone":{"bg":"#b3e5fc","bd":"#0077be","txt":"#006064"}},{"dir":"bedtime-story","theme":"Bedtime Story","words":"book, bed, moon, star, dream","panel":"linear-gradient(180deg,#1a1a3e,#2d2d5f)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#e8eaf6","bd":"#5c6bc0","txt":"#1a237e"},"reviewTone":{"bg":"#c5cae9","bd":"#3f51b5","txt":"#0d47a1"}},{"dir":"birthday-party","theme":"Birthday Party","words":"cake, gift, balloon, candle, friend","panel":"linear-gradient(135deg,#FFD700,#FFA07A,#FF69B4)","teachIcon":"../assets/peppa/peppa-pig-red-polka-dot-dress.png","reviewIcon":"../assets/peppa/peppa-family-group-outdoors.png","teachTone":{"bg":"#fff8e1","bd":"#ffd700","txt":"#e65100"},"reviewTone":{"bg":"#ffe0b2","bd":"#ff69b4","txt":"#bf360c"}},{"dir":"doctor-visit","theme":"Doctor Visit","words":"doctor, nurse, sick, medicine, better","panel":"linear-gradient(135deg,#E8F5E9,#B2DFDB,#80DEEA)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/candy-cat-green-dress.png","teachTone":{"bg":"#e8f5e9","bd":"#66bb6a","txt":"#2e7d32"},"reviewTone":{"bg":"#b2dfdb","bd":"#4db6ac","txt":"#00695c"}},{"dir":"shopping-trip","theme":"Shopping Trip","words":"shop, buy, money, bag, toy","panel":"linear-gradient(135deg,#FFE5B4,#FFD700,#FFA07A)","teachIcon":"../assets/peppa/mummy-pig-standing-grass.png","reviewIcon":"../assets/peppa/peppa-pig-happy-standing.png","teachTone":{"bg":"#fff8e1","bd":"#ffd700","txt":"#e65100"},"reviewTone":{"bg":"#ffe0b2","bd":"#ffa500","txt":"#bf360c"}},{"dir":"seasons-change","theme":"Seasons Change","words":"spring, summer, fall, winter, season","panel":"linear-gradient(135deg,#e8f5e9,#fff9c4)","teachIcon":"../assets/peppa/peppa-pig-happy-standing.png","reviewIcon":"../assets/peppa/george-standing.png","teachTone":{"bg":"#e8f5e9","bd":"#8BC34A","txt":"#2e7d32"},"reviewTone":{"bg":"#fff9c4","bd":"#ffa726","txt":"#e65100"}}];

function cardHtml(kind,l){
  var isTeach=kind==='teach';
  var title=isTeach?'老师课件':'练习课件';
  var icon=isTeach?l.teachIcon:l.reviewIcon;
  var tone=isTeach?l.teachTone:l.reviewTone;
  var tip=isTeach?'大屏跟读':'互动游戏';
  return '<a class="card" href="lessons/level-3/'+l.dir+'/'+kind+'.html">'+
    '<div class="icon-wrap" style="background:'+tone.bg+';border:2px solid '+tone.bd+'">'+
      '<img src="'+icon+'" alt="'+title+'">'+
    '</div>'+
    '<div class="info">'+
      '<div class="row">'+
        '<div class="title">'+title+'</div>'+
        '<div class="badge" style="background:'+tone.bg+';border-color:'+tone.bd+';color:'+tone.txt+'">'+tip+'</div>'+
      '</div>'+
      '<div class="desc">'+l.words+'</div>'+
    '</div>'+
  '</a>';
}

var wrap=document.getElementById('lessons');
lessons.forEach(function(l){
  var g=document.createElement('section');
  g.className='lesson-group';
  g.innerHTML=
    '<div class="lesson-head" style="background:'+l.panel+'">'+
      '<span>'+l.theme+'</span>'+
      '<small>5 words</small>'+
    '</div>'+
    '<div class="cards">'+cardHtml('teach',l)+cardHtml('review',l)+'</div>';
  wrap.appendChild(g);
});
</script>
</body>
</html>
