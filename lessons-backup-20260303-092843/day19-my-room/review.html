<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 19 Review - My Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#e8eaf6,#c5cae9);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#5e35b1;margin:8px 0;text-shadow:0 2px 4px rgba(94,53,177,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#7e57c2,#9575cd);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(126,87,194,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(126,87,194,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.pr.big img{width:110px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
/* M0: Start */
.start-preview{display:flex;gap:16px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.start-btn{padding:18px 40px;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;background:#7e57c2;color:#fff;box-shadow:0 6px 16px rgba(126,87,194,.4)}
/* M1: Learn */
.learn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:500px;margin:16px 0}
.learn-card{width:100%;aspect-ratio:1;border-radius:20px;background:#bbb;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:all .3s}
.learn-card.revealed{background:#fff}
.learn-card .lc-label{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .lc-label{opacity:1}
/* M2: Room Builder */
.room-builder{position:relative;width:360px;height:300px;background:linear-gradient(180deg,#e3f2fd 50%,#d7ccc8);border-radius:20px;overflow:hidden;margin:16px 0;border:4px solid #5e35b1}
.rb-slot{position:absolute;width:80px;height:80px;border:3px dashed #5e35b1;border-radius:12px;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.rb-slot.filled{border-color:#7cb342;background:#c5e1a5}
.rb-slot img{width:60px;opacity:0;transition:opacity .3s}
.rb-slot.filled img{opacity:1}
.rb-items{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.rb-item{width:70px;height:70px;border-radius:12px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .1s}
.rb-item:active{transform:scale(.9)}
.rb-item.used{opacity:.3;pointer-events:none}
/* M3: Listen & Find */
.listen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:500px;margin:16px 0}
.listen-card{width:100%;aspect-ratio:1;border-radius:20px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .1s}
.listen-card:active{transform:scale(.95)}
.listen-card .lc-label{font-size:20px;font-weight:700;color:#2c3e50}
.listen-btn{width:80px;height:80px;border-radius:50%;border:none;background:linear-gradient(135deg,#7e57c2,#9575cd);color:#fff;font-size:32px;cursor:pointer;box-shadow:0 4px 12px rgba(126,87,194,.4);margin:12px 0}
/* M4: Memory Match */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:16px 0}
.memory-card{width:100%;aspect-ratio:1;border-radius:16px;background:#7e57c2;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:transform .2s}
.memory-card:active{transform:scale(.95)}
.memory-card.flipped{background:#fff}
.memory-card.matched{background:#c5e1a5;pointer-events:none}
.memory-card .mc-back{font-size:44px}
.memory-card .mc-front{display:none;flex-direction:column;align-items:center;gap:4px}
.memory-card.flipped .mc-back{display:none}
.memory-card.flipped .mc-front{display:flex}
.memory-card .mc-label{font-size:18px;font-weight:700;color:#2c3e50}
/* M5: Done */
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.done-title{font-size:48px;font-weight:900;color:#7e57c2;text-shadow:0 3px 6px rgba(126,87,194,.3)}
.done-msg{font-size:22px;color:#555;text-align:center}
.done-btn{padding:18px 40px;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;background:#7e57c2;color:#fff;box-shadow:0 6px 16px rgba(126,87,194,.4)}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #7e57c2;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#7e57c2;color:#fff;box-shadow:0 4px 12px rgba(126,87,194,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}
.pr img{width:65px}.pr.big img{width:90px}.sb{font-size:22px}
.learn-grid,.listen-grid{grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px}
.memory-grid{grid-template-columns:repeat(4,1fr);gap:10px;max-width:400px}
.room-builder{width:300px;height:250px}.rb-slot{width:65px;height:65px}
.rb-slot img{width:50px}.rb-item{width:60px;height:60px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="pr big"><img src="../../assets/peppa/peppa-pig-red-polka-dot-dress.png" alt="Peppa"></div>
<div class="te">My Room</div>
<div class="start-preview">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" width="60" alt="bed">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6aa.svg" width="60" alt="door">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1fa9f.svg" width="60" alt="window">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1fa91.svg" width="60" alt="chair">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cb.svg" width="60" alt="table">
</div>
<button class="start-btn" onclick="goM(1)">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">🏠 点一点，看看房间里有什么！</div>
<div class="sb" id="s1">⭐<span style="color:#bbb">★★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Tap to see!</div>
</div>
<div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Room Builder -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Room Builder</div>
<div class="tz">🛠️ 听一听，点一点，布置房间！</div>
<div class="sb" id="s2">⭐⭐<span style="color:#bbb">★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Build my room!</div>
</div>
<div class="room-builder" id="roomBuilder">
<div class="rb-slot" style="top:20px;left:20px" data-word="bed">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cf.svg" alt="bed">
</div>
<div class="rb-slot" style="top:20px;right:20px" data-word="door">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6aa.svg" alt="door">
</div>
<div class="rb-slot" style="top:120px;left:30px" data-word="window">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1fa9f.svg" alt="window">
</div>
<div class="rb-slot" style="bottom:20px;left:120px" data-word="chair">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1fa91.svg" alt="chair">
</div>
<div class="rb-slot" style="bottom:20px;right:30px" data-word="table">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cb.svg" alt="table">
</div>
</div>
<div class="rb-items" id="rbItems"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐<span style="color:#bbb">★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Listen carefully!</div>
</div>
<button class="listen-btn" id="listenBtn">🔊</button>
<div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐<span style="color:#bbb">★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Match them!</div>
</div>
<div class="memory-grid" id="memoryGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<div class="pr big"><img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family"></div>
<div class="done-title">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="done-msg">You know all the room words!<br>Great job!</div>
<button class="done-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=['bed','door','window','chair','table'];
var curM=0,busy=false;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);
o.frequency.value=f;g.gain.value=.15;
o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){tone(300,.3);}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){nb.textContent='Start!';nb.disabled=false}
else if(curM>=5){nb.textContent='Done';nb.disabled=true}
else{nb.textContent='Next ▶';nb.disabled=false}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn
function initM1(){
var grid=document.getElementById('learnGrid');
grid.innerHTML='';
var revealed=0;
W.forEach(function(w){
var card=document.createElement('div');
card.className='learn-card';
card.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmoji(w)+'.svg" width="90" alt="'+w+'"><div class="lc-label">'+w+'</div>';
card.onclick=function(){
if(this.classList.contains('revealed'))return speak(w);
this.classList.add('revealed');
speak(w);
revealed++;
document.getElementById('s1').innerHTML=stars(revealed,5);
};
grid.appendChild(card);
});
}

// M2: Room Builder
var rbTarget=null,rbFilled=0;
function initM2(){
rbFilled=0;
document.querySelectorAll('.rb-slot').forEach(function(s){
s.classList.remove('filled');
s.querySelector('img').style.opacity='0';
});
var items=document.getElementById('rbItems');
items.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
shuffled.forEach(function(w){
var item=document.createElement('div');
item.className='rb-item';
item.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmoji(w)+'.svg" width="50" alt="'+w+'">';
item.onclick=function(){
if(this.classList.contains('used'))return;
speak(w);
askPlace(w,this);
};
items.appendChild(item);
});
}

function askPlace(word,itemEl){
rbTarget={word:word,el:itemEl};
document.querySelectorAll('.rb-slot').forEach(function(s){
s.style.cursor='pointer';
s.onclick=function(){
if(this.classList.contains('filled'))return;
var slotWord=this.getAttribute('data-word');
if(slotWord===rbTarget.word){
this.classList.add('filled');
this.querySelector('img').style.opacity='1';
rbTarget.el.classList.add('used');
playOk();
rbFilled++;
document.getElementById('s2').innerHTML=stars(rbFilled,5);
if(rbFilled===5){
setTimeout(function(){goM(1)},1500);
}
}else{
playNo();
}
rbTarget=null;
document.querySelectorAll('.rb-slot').forEach(function(sl){sl.onclick=null;sl.style.cursor='default'});
};
});
}

// M3: Listen & Find
var listenTarget=null,listenScore=0;
function initM3(){
listenScore=0;
var grid=document.getElementById('listenGrid');
grid.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
shuffled.forEach(function(w){
var card=document.createElement('div');
card.className='listen-card';
card.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmoji(w)+'.svg" width="90" alt="'+w+'"><div class="lc-label">'+w+'</div>';
card.onclick=function(){
if(busy||!listenTarget)return;
busy=true;
if(w===listenTarget){
playOk();
listenScore++;
document.getElementById('s3').innerHTML=stars(listenScore,5);
setTimeout(function(){
busy=false;
if(listenScore<5)nextListen();
else setTimeout(function(){goM(1)},800);
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
grid.appendChild(card);
});
document.getElementById('listenBtn').onclick=function(){
if(listenTarget)speak(listenTarget);
};
nextListen();
}

function nextListen(){
listenTarget=W[listenScore];
speak(listenTarget);
}

// M4: Memory Match
var memFlipped=[],memMatched=0;
function initM4(){
memMatched=0;
memFlipped=[];
var grid=document.getElementById('memoryGrid');
grid.innerHTML='';
var pairs=W.concat(W).sort(function(){return Math.random()-.5});
pairs.forEach(function(w){
var card=document.createElement('div');
card.className='memory-card';
card.innerHTML='<div class="mc-back">🏠</div><div class="mc-front"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+getEmoji(w)+'.svg" width="70" alt="'+w+'"><div class="mc-label">'+w+'</div></div>';
card.dataset.word=w;
card.onclick=function(){
if(busy||this.classList.contains('flipped')||this.classList.contains('matched'))return;
this.classList.add('flipped');
speak(w);
memFlipped.push(this);
if(memFlipped.length===2){
busy=true;
setTimeout(function(){
if(memFlipped[0].dataset.word===memFlipped[1].dataset.word){
memFlipped[0].classList.add('matched');
memFlipped[1].classList.add('matched');
playOk();
memMatched++;
document.getElementById('s4').innerHTML=stars(memMatched,5);
if(memMatched===5){
setTimeout(function(){goM(1)},1500);
}
}else{
memFlipped[0].classList.remove('flipped');
memFlipped[1].classList.remove('flipped');
playNo();
}
memFlipped=[];
busy=false;
},1000);
}
};
grid.appendChild(card);
});
}

function initM5(){}

function getEmoji(w){
var map={bed:'1f6cf',door:'1f6aa',window:'1fa9f',chair:'1fa91',table:'1f6cb'};
return map[w]||'2753';
}

goM(0);
</script>
</body>
</html>
