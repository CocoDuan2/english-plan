<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 31 Review - Helping at Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#FFF9C4,#FFE082);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FFB74D,#FFA726);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,180,77,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,180,77,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px 0}
.card{width:100%;aspect-ratio:1;background:#ddd;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card.revealed{background:#fff}
.card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.card.revealed img{opacity:1}
.card-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.card.revealed .card-label{opacity:1}
.chore-btn{width:120px;height:120px;border-radius:20px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:all .2s;background:#fff}
.chore-btn:active{transform:scale(.95)}
.chore-btn img{width:70px;height:auto}
.chore-btn-label{font-size:18px;font-weight:700;color:#2c3e50}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px 0}
.listen-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:16px;border-radius:16px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:all .2s}
.listen-card:active{transform:scale(.95)}
.listen-card img{width:80px;height:auto}
.listen-label{font-size:20px;font-weight:700;color:#2c3e50}
.sound-icon{font-size:32px;margin:10px 0;cursor:pointer;padding:12px;background:linear-gradient(135deg,#FFB74D,#FFA726);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,180,77,.3)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px 0}
.mem-card{aspect-ratio:1;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 3px 10px rgba(0,0,0,.1);background:linear-gradient(135deg,#FFD54F,#FFCA28)}
.mem-card.flipped{background:#fff}
.mem-back{font-size:44px}
.mem-front{display:none;flex-direction:column;align-items:center;gap:4px}
.mem-card.flipped .mem-back{display:none}
.mem-card.flipped .mem-front{display:flex}
.mem-front img{width:70px;height:auto}
.mem-front-label{font-size:18px;font-weight:700;color:#2c3e50}
.mem-card.matched{opacity:.3;pointer-events:none}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card-label{font-size:18px}
.chore-btn{width:100px;height:100px}
.chore-btn img{width:60px}
.chore-btn-label{font-size:16px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.listen-card img{width:70px}
.listen-label{font-size:18px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.mem-front img{width:60px}
.mem-front-label{font-size:16px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" style="width:140px;height:auto;margin:20px 0" alt="Peppa">
<div class="te">Helping at Home</div>
<div class="sb">Let's review!</div>
<div style="display:flex;gap:20px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f9.svg" width="60" alt="clean">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9fd.svg" width="60" alt="wash">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f91d.svg" width="60" alt="help">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9fa.svg" width="60" alt="tidy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f9.svg" width="60" alt="sweep">
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">👆 点一点，学单词！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: Chore Helper -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Chore Helper</div>
<div class="tz">🧹 帮佩琪做家务！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy Pig">
<div class="bbl">Help me!</div>
</div>
<div id="choreArea" style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat">
<div class="bbl">Listen and tap!</div>
</div>
<div class="sound-icon" id="spk3" onclick="playCurrentWord3()">🔊</div>
<div class="listen-grid" id="lg3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily Elephant">
<div class="bbl">Match them!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;height:auto;margin:20px 0" alt="Peppa Family">
<div class="te">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="bbl" style="margin:20px 0">Great job helping at home!</div>
<button class="nb" onclick="location.reload()" style="margin-top:20px">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'clean',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f9.svg'},
{w:'wash',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9fd.svg'},
{w:'help',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f91d.svg'},
{w:'tidy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9fa.svg'},
{w:'sweep',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f9.svg'}
];
var curM=0,busy=false;
var st1=0,st2=0,st3=0,st4=0;
var curW3=0,seq3=[];
var memFlipped=[],memMatched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
var cg=document.getElementById('cg1');
cg.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="card-label">'+item.w+'</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
speak(item.w);
st1++;
document.getElementById('s1').innerHTML=stars(st1,5);
if(st1===5){
playOk();
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
};
cg.appendChild(c);
});
}

function initM2(){
var area=document.getElementById('choreArea');
area.innerHTML='';
var chores=['clean','wash','help','tidy','sweep'];
var shuffled=chores.sort(function(){return Math.random()-.5});
var target=shuffled[0];
document.querySelector('#m2 .bbl').textContent='找到 '+target;
shuffled.forEach(function(ch){
var btn=document.createElement('div');
btn.className='chore-btn';
var itm=W.find(function(x){return x.w===ch});
btn.innerHTML='<img src="'+itm.img+'" alt="'+ch+'"><div class="chore-btn-label">'+ch+'</div>';
btn.onclick=function(){
if(busy)return;
busy=true;
if(ch===target){
playOk();
speak(ch);
st2++;
document.getElementById('s2').innerHTML=stars(st2,5);
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
busy=false;
if(st2<5){
var remaining=chores.filter(function(c){return shuffled.indexOf(c)!==-1&&c!==target});
if(remaining.length>0){
target=remaining[Math.floor(Math.random()*remaining.length)];
document.querySelector('#m2 .bbl').textContent='找到 '+target;
}
}else{
setTimeout(function(){goM(1)},800);
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
area.appendChild(btn);
});
}

function initM3(){
seq3=W.map(function(x){return x.w}).sort(function(){return Math.random()-.5});
curW3=0;
var lg=document.getElementById('lg3');
lg.innerHTML='';
W.forEach(function(item){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="listen-label">'+item.w+'</div>';
c.onclick=function(){
if(busy)return;
busy=true;
if(item.w===seq3[curW3]){
playOk();
speak(item.w);
st3++;
document.getElementById('s3').innerHTML=stars(st3,5);
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
busy=false;
curW3++;
if(curW3>=seq3.length){
setTimeout(function(){goM(1)},800);
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
lg.appendChild(c);
});
playCurrentWord3();
}

function playCurrentWord3(){
if(curW3<seq3.length)speak(seq3[curW3]);
}

function initM4(){
var pairs=[];
W.forEach(function(item){
pairs.push({w:item.w,img:item.img});
pairs.push({w:item.w,img:item.img});
});
pairs.sort(function(){return Math.random()-.5});
var mg=document.getElementById('mg4');
mg.innerHTML='';
pairs.forEach(function(p,i){
var c=document.createElement('div');
c.className='mem-card';
c.dataset.word=p.w;
c.dataset.idx=i;
c.innerHTML='<div class="mem-back">🎴</div><div class="mem-front"><img src="'+p.img+'" alt="'+p.w+'"><div class="mem-front-label">'+p.w+'</div></div>';
c.onclick=function(){
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
speak(p.w);
memFlipped.push(c);
if(memFlipped.length===2){
busy=true;
setTimeout(function(){
if(memFlipped[0].dataset.word===memFlipped[1].dataset.word){
playOk();
memFlipped[0].classList.add('matched');
memFlipped[1].classList.add('matched');
memMatched++;
st4++;
document.getElementById('s4').innerHTML=stars(st4,5);
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
if(memMatched===5){
setTimeout(function(){goM(1)},1200);
}
}else{
playNo();
memFlipped[0].classList.remove('flipped');
memFlipped[1].classList.remove('flipped');
}
memFlipped=[];
busy=false;
},1000);
}
};
mg.appendChild(c);
});
}

function initM5(){
document.getElementById('s4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
