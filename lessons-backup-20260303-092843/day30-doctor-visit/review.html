<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 30 Review - Doctor Visit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#E8F5E9,#B2DFDB);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#4CAF50;margin:8px 0;text-shadow:0 2px 4px rgba(76,175,80,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#66BB6A,#81C784);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(102,187,106,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(102,187,106,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.start-hero{width:110px;margin:20px 0}
.start-preview{display:flex;gap:15px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.start-preview img{width:60px;height:auto}
.start-btn{padding:18px 48px;border:none;border-radius:16px;font-size:28px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#66BB6A,#81C784);color:#fff;box-shadow:0 6px 20px rgba(102,187,106,.4);margin:20px 0}
.learn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px;margin:20px 0}
.learn-card{width:100%;aspect-ratio:1;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:all .3s;position:relative;overflow:hidden}
.learn-card.hidden{background:linear-gradient(135deg,#B2DFDB,#80DEEA)}
.learn-card.revealed{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.learn-card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-label{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.learn-card.revealed .learn-label{opacity:1}
.learn-card.hidden::before{content:'?';font-size:60px;color:#fff;font-weight:900}
.clinic-scene{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px;margin:20px 0}
.clinic-btn{padding:20px;border:none;border-radius:16px;cursor:pointer;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .2s}
.clinic-btn:active{transform:scale(.95)}
.clinic-btn img{width:80px;height:auto}
.clinic-btn-label{font-size:22px;font-weight:700;color:#2c3e50}
.listen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:500px;margin:20px 0}
.listen-card{padding:20px;border:none;border-radius:16px;cursor:pointer;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .2s}
.listen-card img{width:90px;height:auto}
.listen-label{font-size:20px;font-weight:700;color:#2c3e50}
.listen-speaker{position:fixed;top:20px;right:20px;width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#66BB6A,#81C784);color:#fff;font-size:28px;box-shadow:0 4px 12px rgba(102,187,106,.4);display:flex;align-items:center;justify-content:center}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px 0}
.memory-card{aspect-ratio:1;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;position:relative;transform-style:preserve-3d}
.memory-card.flipped{transform:rotateY(180deg)}
.memory-card.matched{opacity:.4;pointer-events:none}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.card-front{background:linear-gradient(135deg,#66BB6A,#81C784);color:#fff;font-size:44px}
.card-back{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);transform:rotateY(180deg)}
.card-back img{width:70px;height:auto}
.card-back-label{font-size:18px;font-weight:700;color:#2c3e50}
.done-hero{width:110px;margin:20px 0}
.done-title{font-size:48px;font-weight:900;color:#4CAF50;margin:10px 0}
.done-msg{font-size:22px;color:#666;margin:10px 0}
.done-btn{padding:18px 48px;border:none;border-radius:16px;font-size:24px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#66BB6A,#81C784);color:#fff;box-shadow:0 6px 20px rgba(102,187,106,.4);margin:20px 0}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #66BB6A;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#66BB6A;color:#fff;box-shadow:0 4px 12px rgba(102,187,106,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.start-hero{width:90px}
.start-preview img{width:50px}
.start-btn{padding:14px 36px;font-size:24px}
.learn-grid{grid-template-columns:1fr;gap:15px}
.learn-card img{width:80px}
.clinic-scene{grid-template-columns:1fr;gap:15px}
.clinic-btn img{width:70px}
.clinic-btn-label{font-size:20px}
.listen-grid{grid-template-columns:1fr;gap:15px}
.listen-card img{width:80px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.card-back img{width:60px}
.card-back-label{font-size:16px}
.done-hero{width:90px}
.done-title{font-size:36px}
.done-msg{font-size:18px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" class="start-hero" alt="Peppa">
<div class="te">Doctor Visit</div>
<div class="sb">Let's review!</div>
<div class="start-preview">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f468-200d-2695-fe0f.svg" alt="doctor">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f469-200d-2695-fe0f.svg" alt="nurse">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f912.svg" alt="sick">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f48a.svg" alt="medicine">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f60a.svg" alt="better">
</div>
<button class="start-btn" onclick="getAC();goM(1)">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">👆 点一点，学单词！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Clinic Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Clinic Game</div>
<div class="tz">🏥 听一听，点一点！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat">
<div class="bbl">Help at the clinic!</div>
</div>
<div class="clinic-scene" id="clinicScene"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Find the word!</div>
</div>
<button class="listen-speaker" id="spk3" onclick="if(!busy)speak(curWord)">🔊</button>
<div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，配一配！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy Pig">
<div class="bbl">Match the pairs!</div>
</div>
<div class="memory-grid" id="memoryGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" class="done-hero" alt="Peppa Family">
<div class="done-title">All Done!</div>
<div class="done-msg">You did a great job!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="done-btn" onclick="goM(-5)">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'doctor',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f468-200d-2695-fe0f.svg'},
{w:'nurse',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f469-200d-2695-fe0f.svg'},
{w:'sick',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f912.svg'},
{w:'medicine',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f48a.svg'},
{w:'better',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f60a.svg'}
];
var curM=0,busy=false,curWord='',stars1=0,stars2=0,stars3=0,stars4=0;
var flipped=[],matched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
stars1=0;
document.getElementById('s1').innerHTML=stars(stars1,5);
var g=document.getElementById('learnGrid');
g.innerHTML='';
W.forEach(function(item){
var c=document.createElement('div');
c.className='learn-card hidden';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="learn-label">'+item.w+'</div>';
c.onclick=function(){
if(this.classList.contains('revealed'))return;
this.classList.remove('hidden');
this.classList.add('revealed');
speak(item.w);
stars1++;
document.getElementById('s1').innerHTML=stars(stars1,5);
};
g.appendChild(c);
});
}

function initM2(){
stars2=0;
document.getElementById('s2').innerHTML=stars(stars2,5);
var g=document.getElementById('clinicScene');
g.innerHTML='';
var order=[0,1,2,3,4];
order.sort(function(){return Math.random()-.5});
var idx=0;
function askNext(){
if(idx>=order.length){
setTimeout(function(){goM(1)},800);
return;
}
var i=order[idx];
var item=W[i];
curWord=item.w;
speak(item.w);
busy=true;
setTimeout(function(){busy=false},1000);
}
W.forEach(function(item,i){
var b=document.createElement('button');
b.className='clinic-btn';
b.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="clinic-btn-label">'+item.w+'</div>';
b.onclick=function(){
if(busy)return;
if(item.w===curWord){
playOk();
stars2++;
document.getElementById('s2').innerHTML=stars(stars2,5);
busy=true;
setTimeout(function(){
idx++;
askNext();
},1200);
}else{
playNo();
}
};
g.appendChild(b);
});
askNext();
}

function initM3(){
stars3=0;
document.getElementById('s3').innerHTML=stars(stars3,5);
var g=document.getElementById('listenGrid');
g.innerHTML='';
var order=[0,1,2,3,4];
order.sort(function(){return Math.random()-.5});
var idx=0;
function askNext(){
if(idx>=order.length){
setTimeout(function(){goM(1)},800);
return;
}
var i=order[idx];
curWord=W[i].w;
speak(curWord);
busy=true;
setTimeout(function(){busy=false},1000);
}
W.forEach(function(item){
var c=document.createElement('button');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="listen-label">'+item.w+'</div>';
c.onclick=function(){
if(busy)return;
if(item.w===curWord){
playOk();
stars3++;
document.getElementById('s3').innerHTML=stars(stars3,5);
busy=true;
setTimeout(function(){
idx++;
askNext();
},1200);
}else{
playNo();
}
};
g.appendChild(c);
});
askNext();
}

function initM4(){
stars4=0;
matched=0;
flipped=[];
document.getElementById('s4').innerHTML=stars(stars4,5);
var g=document.getElementById('memoryGrid');
g.innerHTML='';
var pairs=[];
W.forEach(function(item){
pairs.push({w:item.w,img:item.img});
pairs.push({w:item.w,img:item.img});
});
pairs.sort(function(){return Math.random()-.5});
pairs.forEach(function(item,i){
var c=document.createElement('div');
c.className='memory-card';
c.dataset.word=item.w;
c.dataset.idx=i;
c.innerHTML='<div class="card-front">?</div><div class="card-back"><img src="'+item.img+'" alt="'+item.w+'"><div class="card-back-label">'+item.w+'</div></div>';
c.onclick=function(){
if(busy||this.classList.contains('flipped')||this.classList.contains('matched'))return;
this.classList.add('flipped');
flipped.push(this);
if(flipped.length===2){
busy=true;
var w1=flipped[0].dataset.word;
var w2=flipped[1].dataset.word;
if(w1===w2){
playOk();
flipped[0].classList.add('matched');
flipped[1].classList.add('matched');
matched++;
stars4++;
document.getElementById('s4').innerHTML=stars(stars4,5);
flipped=[];
busy=false;
if(matched===5){
setTimeout(function(){goM(1)},1200);
}
}else{
playNo();
setTimeout(function(){
flipped[0].classList.remove('flipped');
flipped[1].classList.remove('flipped');
flipped=[];
busy=false;
},1000);
}
}
};
g.appendChild(c);
});
}

function initM5(){
document.getElementById('s1').innerHTML=stars(5,5);
document.getElementById('s2').innerHTML=stars(5,5);
document.getElementById('s3').innerHTML=stars(5,5);
document.getElementById('s4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
