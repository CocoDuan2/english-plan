<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 23 Review - In the Garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#c8e6c9,#a5d6a7);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#2e7d32;margin:8px 0;text-shadow:0 2px 4px rgba(46,125,50,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#66bb6a,#43a047);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(102,187,106,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(102,187,106,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#2e7d32;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.start-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:20px}
.start-img{width:110px}
.start-preview{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.start-preview img{width:60px}
.start-btn{padding:16px 48px;border:none;border-radius:16px;font-size:32px;font-weight:900;background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(102,187,106,.4)}
.cards{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;max-width:600px}
.card{width:130px;height:180px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.card.revealed{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.card:not(.revealed){background:#bbb}
.card img{width:90px;opacity:0;transition:opacity .3s}
.card.revealed img{opacity:1}
.card .label{font-size:20px;font-weight:700;color:#2e7d32;margin-top:8px;opacity:0}
.card.revealed .label{opacity:1}
.garden-game{position:relative;width:100%;max-width:600px;height:400px;background:linear-gradient(180deg,#87CEEB 0%,#B6E3B5 100%);border-radius:20px;margin:20px 0;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.garden-spot{position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.3);border:3px dashed #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.garden-spot:hover{background:rgba(255,255,255,.5);transform:scale(1.05)}
.garden-spot img{width:70px;opacity:0;transition:opacity .3s}
.garden-spot.found img{opacity:1}
.garden-spot.found{background:rgba(255,255,255,.8);border-color:#66bb6a}
.listen-wrap{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;max-width:600px}
.listen-card{width:130px;height:180px;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.listen-card:hover{transform:scale(1.05)}
.listen-card img{width:90px}
.listen-card .label{font-size:20px;font-weight:700;color:#2e7d32;margin-top:8px}
.sound-btn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;border:none;font-size:36px;cursor:pointer;margin:10px 0;box-shadow:0 4px 12px rgba(102,187,106,.4)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px 0}
.mem-card{aspect-ratio:1;background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.mem-card:hover{transform:scale(1.05)}
.mem-card.flipped{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flipped .back{display:none}
.mem-card.flipped .front{display:flex}
.mem-card .front img{width:70px}
.mem-card .front .label{font-size:18px;font-weight:700;color:#2e7d32}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.done-img{width:110px}
.done-title{font-size:48px;font-weight:900;color:#2e7d32;text-shadow:0 3px 6px rgba(46,125,50,.2)}
.done-msg{font-size:24px;color:#555}
.done-btn{padding:16px 48px;border:none;border-radius:16px;font-size:28px;font-weight:900;background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(102,187,106,.4)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #66bb6a;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#66bb6a;color:#fff;box-shadow:0 4px 12px rgba(102,187,106,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card{width:110px;height:160px}
.card img{width:70px}
.card .label{font-size:18px}
.garden-game{height:300px}
.garden-spot{width:80px;height:80px}
.garden-spot img{width:55px}
.listen-card{width:110px;height:160px}
.listen-card img{width:70px}
.listen-card .label{font-size:18px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.mem-card .back{font-size:36px}
.mem-card .front img{width:55px}
.mem-card .front .label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="start-wrap">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" class="start-img" alt="Peppa">
<div class="te">In the Garden</div>
<div class="start-preview">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f33c.svg" alt="flower">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f333.svg" alt="tree">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41d.svg" alt="bee">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f98b.svg" alt="butterfly">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41e.svg" alt="ladybug">
</div>
<button class="start-btn" onclick="getAC();goM(1)">Let's Play!</button>
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">👆 点一点，学单词！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="cards" id="cards1"></div>
</div>

<!-- M2: Garden Explorer -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Garden Explorer</div>
<div class="tz">🌸 找到花园里的小生物！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find them all!</div>
</div>
<div class="garden-game" id="garden"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/emily-elephant-standing.png" alt="Emily">
<div class="bbl">Listen carefully!</div>
</div>
<button class="sound-btn" id="playBtn3" onclick="playRound3()">🔊</button>
<div class="listen-wrap" id="listen3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">Match the pairs!</div>
</div>
<div class="memory-grid" id="memGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" class="done-img" alt="Family">
<div class="done-title">All Done!</div>
<div class="done-msg">Great job exploring the garden!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="done-btn" onclick="goM(-5)">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'flower',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f33c.svg'},
{w:'tree',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f333.svg'},
{w:'bee',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41d.svg'},
{w:'butterfly',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f98b.svg'},
{w:'ladybug',e:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f41e.svg'}
];
var curM=0,busy=false;
var st1=0,st2=0,st3=0,st4=0;
var tgt3='',rd3=0;
var flipped=[],matched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(document.getElementById('cards1').children.length>0)return;
var c=document.getElementById('cards1');
W.forEach(function(item){
var d=document.createElement('div');
d.className='card';
d.innerHTML='<img src="'+item.e+'" alt="'+item.w+'"><div class="label">'+item.w+'</div>';
d.onclick=function(){
if(d.classList.contains('revealed'))return;
d.classList.add('revealed');
speak(item.w);
st1++;
document.getElementById('s1').innerHTML=stars(st1,5);
if(st1===5){
playOk();
setTimeout(function(){goM(1)},1200);
}
};
c.appendChild(d);
});
}

function initM2(){
if(document.getElementById('garden').children.length>0)return;
var g=document.getElementById('garden');
var positions=[
{top:'20%',left:'15%'},
{top:'10%',left:'70%'},
{top:'50%',left:'40%'},
{top:'35%',left:'75%'},
{top:'65%',left:'20%'}
];
var queue=W.slice();
queue.sort(function(){return Math.random()-.5});
queue.forEach(function(item,i){
var s=document.createElement('div');
s.className='garden-spot';
s.style.top=positions[i].top;
s.style.left=positions[i].left;
s.innerHTML='<img src="'+item.e+'" alt="'+item.w+'">';
s.onclick=function(){
if(s.classList.contains('found'))return;
s.classList.add('found');
speak(item.w);
playOk();
st2++;
document.getElementById('s2').innerHTML=stars(st2,5);
if(st2===5){
setTimeout(function(){goM(1)},1200);
}
};
g.appendChild(s);
});
}

function initM3(){
if(document.getElementById('listen3').children.length>0)return;
var c=document.getElementById('listen3');
W.forEach(function(item){
var d=document.createElement('div');
d.className='listen-card';
d.innerHTML='<img src="'+item.e+'" alt="'+item.w+'"><div class="label">'+item.w+'</div>';
d.onclick=function(){
if(busy)return;
if(item.w===tgt3){
busy=true;
playOk();
st3++;
document.getElementById('s3').innerHTML=stars(st3,5);
setTimeout(function(){
busy=false;
if(st3===5){
goM(1);
}else{
playRound3();
}
},1200);
}else{
playNo();
}
};
c.appendChild(d);
});
playRound3();
}

function playRound3(){
if(busy)return;
rd3++;
if(rd3>5)rd3=1;
tgt3=W[rd3-1].w;
speak(tgt3);
}

function initM4(){
if(document.getElementById('memGrid').children.length>0)return;
var pairs=W.slice();
var deck=[];
pairs.forEach(function(item){
deck.push({w:item.w,e:item.e});
deck.push({w:item.w,e:item.e});
});
deck.sort(function(){return Math.random()-.5});
var g=document.getElementById('memGrid');
deck.forEach(function(item,idx){
var c=document.createElement('div');
c.className='mem-card';
c.dataset.word=item.w;
c.dataset.idx=idx;
c.innerHTML='<div class="back">🌸</div><div class="front"><img src="'+item.e+'" alt="'+item.w+'"><div class="label">'+item.w+'</div></div>';
c.onclick=function(){
if(busy||c.classList.contains('flipped')||flipped.length>=2)return;
c.classList.add('flipped');
flipped.push(c);
speak(item.w);
if(flipped.length===2){
busy=true;
setTimeout(function(){
if(flipped[0].dataset.word===flipped[1].dataset.word){
playOk();
matched++;
st4++;
document.getElementById('s4').innerHTML=stars(st4,5);
flipped=[];
busy=false;
if(matched===5){
setTimeout(function(){goM(1)},1200);
}
}else{
playNo();
flipped.forEach(function(card){card.classList.remove('flipped')});
flipped=[];
busy=false;
}
},800);
}
};
g.appendChild(c);
});
}

function initM5(){
// Done page, no init needed
}

goM(0);
</script>
</body>
</html>
