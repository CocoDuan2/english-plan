<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 27 Review - Shapes Around Us</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#9b59b6,#8e44ad);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(155,89,182,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::before{content:'🔷';margin-right:8px}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(155,89,182,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px auto}
.card{width:130px;height:150px;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .3s;position:relative}
.card.hidden{background:#bbb;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.card.shown{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);pointer-events:none}
.card svg{width:90px;height:90px;opacity:0;transition:opacity .3s}
.card.shown svg{opacity:1}
.card .label{font-size:20px;font-weight:700;color:#2c3e50;opacity:0;transition:opacity .3s}
.card.shown .label{opacity:1}
.game-area{display:flex;flex-direction:column;gap:20px;align-items:center;max-width:600px;margin:20px auto}
.shape-row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.shape-slot{width:100px;height:100px;border:3px dashed #9b59b6;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.5);cursor:pointer;transition:all .2s}
.shape-slot:active{transform:scale(.95)}
.shape-slot svg{width:70px;height:70px}
.shape-slot.filled{border-color:#27ae60;background:#d5f4e6}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px auto}
.listen-card{width:130px;height:150px;border-radius:14px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.listen-card:active{transform:scale(.95)}
.listen-card svg{width:90px;height:90px}
.listen-card .label{font-size:20px;font-weight:700;color:#2c3e50}
.sound-btn{width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(155,89,182,.4);margin:10px auto;display:flex;align-items:center;justify-content:center}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:20px auto}
.mem-card{width:120px;height:140px;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.mem-front{background:linear-gradient(135deg,#9b59b6,#8e44ad);box-shadow:0 4px 12px rgba(155,89,182,.3)}
.mem-front::after{content:'?';font-size:44px;color:#fff;font-weight:900}
.mem-back{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);transform:rotateY(180deg)}
.mem-back svg{width:70px;height:70px}
.mem-back .label{font-size:18px;font-weight:700;color:#2c3e50}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card{width:110px;height:130px}
.card svg{width:70px;height:70px}
.card .label{font-size:18px}
.shape-slot{width:90px;height:90px}
.shape-slot svg{width:60px;height:60px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.listen-card{width:110px;height:130px}
.listen-card svg{width:70px;height:70px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.mem-card{width:100px;height:120px}
.mem-back svg{width:60px;height:60px}
.mem-back .label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" style="width:140px;margin:20px 0">
<div class="te">Shapes Around Us</div>
<div class="sb">Let's play!</div>
<div style="display:flex;gap:15px;margin:20px 0">
<svg width="60" height="60" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#e74c3c"/></svg>
<svg width="60" height="60" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" fill="#3498db"/></svg>
<svg width="60" height="60" viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#f1c40f"/></svg>
<svg width="60" height="60" viewBox="0 0 100 100"><polygon points="50,20 61,43 85,43 66,58 73,82 50,67 27,82 34,58 15,43 39,43" fill="#e67e22"/></svg>
<svg width="60" height="60" viewBox="0 0 100 100"><path d="M50,30 C30,30 20,40 20,55 C20,75 35,85 50,90 C65,85 80,75 80,55 C80,40 70,30 50,30 Z" fill="#e91e63"/></svg>
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">🔷 点一点，看形状！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png">
<div class="bbl">Tap to see!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: Shape Builder -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Shape Builder</div>
<div class="tz">🔷 听一听，点形状！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png">
<div class="bbl">Build with shapes!</div>
</div>
<div class="game-area" id="ga2"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/emily-elephant-standing.png">
<div class="bbl">Find the shape!</div>
</div>
<button class="sound-btn" id="sb3">🔊</button>
<div class="listen-grid" id="lg3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/peppa-pig-red-polka-dot-dress.png">
<div class="bbl">Match the shapes!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" style="width:120px;margin:20px 0">
<div class="te" style="font-size:48px">All Done!</div>
<div class="sb">You found all the shapes!</div>
<div class="sb" style="font-size:32px;margin:20px 0">⭐⭐⭐⭐⭐</div>
<button class="nb" onclick="location.reload()" style="margin-top:20px">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=['circle','square','triangle','star','heart'];
var curM=0,busy=false;

var shapes={
circle:'<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#e74c3c"/></svg>',
square:'<svg viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" fill="#3498db"/></svg>',
triangle:'<svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#f1c40f"/></svg>',
star:'<svg viewBox="0 0 100 100"><polygon points="50,20 61,43 85,43 66,58 73,82 50,67 27,82 34,58 15,43 39,43" fill="#e67e22"/></svg>',
heart:'<svg viewBox="0 0 100 100"><path d="M50,30 C30,30 20,40 20,55 C20,75 35,85 50,90 C65,85 80,75 80,55 C80,40 70,30 50,30 Z" fill="#e91e63"/></svg>'
};

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn (spiral reveal)
function initM1(){
var cg=document.getElementById('cg1');
cg.innerHTML='';
var st=0;
W.forEach(function(w,i){
var c=document.createElement('div');
c.className='card hidden';
c.innerHTML=shapes[w]+'<div class="label">'+w+'</div>';
c.onclick=function(){
if(this.classList.contains('shown'))return;
this.classList.add('shown');
speak(w);
st++;
document.getElementById('s1').innerHTML=stars(st,5);
var img=document.querySelector('#m1 .pr img');
img.classList.add('peppa-jumping');
setTimeout(function(){img.classList.remove('peppa-jumping')},600);
if(st===5){
playOk();
setTimeout(function(){if(curM===1)goM(1)},1200);
}
};
cg.appendChild(c);
});
}

// M2: Shape Builder
function initM2(){
var ga=document.getElementById('ga2');
ga.innerHTML='';
var seq=W.slice().sort(function(){return Math.random()-.5});
var idx=0,st=0;
function nextShape(){
if(idx>=seq.length){
playOk();
setTimeout(function(){if(curM===2)goM(1)},1200);
return;
}
var target=seq[idx];
var row=document.createElement('div');
row.className='shape-row';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
shuffled.forEach(function(w){
var slot=document.createElement('div');
slot.className='shape-slot';
slot.innerHTML=shapes[w];
slot.onclick=function(){
if(busy)return;
if(w===target){
busy=true;
this.classList.add('filled');
speak(w);
playOk();
st++;
document.getElementById('s2').innerHTML=stars(st,5);
var img=document.querySelector('#m2 .pr img');
img.classList.add('peppa-jumping');
setTimeout(function(){
img.classList.remove('peppa-jumping');
busy=false;
idx++;
ga.innerHTML='';
nextShape();
},1200);
}else{
playNo();
}
};
row.appendChild(slot);
});
ga.appendChild(row);
speak(target);
}
nextShape();
}

// M3: Listen & Find
function initM3(){
var lg=document.getElementById('lg3');
lg.innerHTML='';
var seq=W.slice().sort(function(){return Math.random()-.5});
var idx=0,st=0;
function nextRound(){
if(idx>=seq.length){
playOk();
setTimeout(function(){if(curM===3)goM(1)},1200);
return;
}
var target=seq[idx];
lg.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
shuffled.forEach(function(w){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML=shapes[w]+'<div class="label">'+w+'</div>';
c.onclick=function(){
if(busy)return;
if(w===target){
busy=true;
speak(w);
playOk();
st++;
document.getElementById('s3').innerHTML=stars(st,5);
var img=document.querySelector('#m3 .pr img');
img.classList.add('peppa-jumping');
setTimeout(function(){
img.classList.remove('peppa-jumping');
busy=false;
idx++;
nextRound();
},1200);
}else{
playNo();
}
};
lg.appendChild(c);
});
speak(target);
}
document.getElementById('sb3').onclick=function(){
if(idx<seq.length)speak(seq[idx]);
};
nextRound();
}

// M4: Memory Match
function initM4(){
var mg=document.getElementById('mg4');
mg.innerHTML='';
var pairs=W.concat(W).sort(function(){return Math.random()-.5});
var flipped=[],matched=0;
pairs.forEach(function(w){
var c=document.createElement('div');
c.className='mem-card';
c.innerHTML='<div class="mem-face mem-front"></div><div class="mem-face mem-back">'+shapes[w]+'<div class="label">'+w+'</div></div>';
c.dataset.word=w;
c.onclick=function(){
if(busy||this.classList.contains('flipped'))return;
this.classList.add('flipped');
flipped.push(this);
if(flipped.length===2){
busy=true;
var w1=flipped[0].dataset.word;
var w2=flipped[1].dataset.word;
if(w1===w2){
speak(w1);
playOk();
matched++;
document.getElementById('s4').innerHTML=stars(matched,5);
var img=document.querySelector('#m4 .pr img');
img.classList.add('peppa-jumping');
setTimeout(function(){
img.classList.remove('peppa-jumping');
flipped=[];
busy=false;
if(matched===5){
setTimeout(function(){if(curM===4)goM(1)},1200);
}
},1200);
}else{
playNo();
setTimeout(function(){
flipped.forEach(function(card){card.classList.remove('flipped')});
flipped=[];
busy=false;
},1000);
}
}
};
mg.appendChild(c);
});
}

function initM5(){}

goM(0);
</script>
</body>
</html>
