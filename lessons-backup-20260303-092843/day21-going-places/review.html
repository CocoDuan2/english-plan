<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 21 Review - Going Places</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#e3f2fd,#bbdefb);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#1976d2;margin:8px 0;text-shadow:0 2px 4px rgba(25,118,210,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#42a5f5,#64b5f6);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(66,165,245,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(66,165,245,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0;max-width:500px}
.card{width:100%;aspect-ratio:1;background:#ddd;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.card.revealed{background:#fff}
.card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.card.revealed img{opacity:1}
.card .lbl{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.card.revealed .lbl{opacity:1}
.road-wrap{display:flex;flex-direction:column;gap:16px;margin:20px 0;max-width:500px;width:100%}
.road-btn{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s;border:3px solid transparent}
.road-btn:active{transform:scale(.95)}
.road-btn.correct{border-color:#4caf50;animation:pulse .4s}
.road-btn img{width:80px;height:auto}
.road-btn .lbl{font-size:26px;font-weight:700;color:#2c3e50}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0;max-width:500px}
.listen-card{background:#fff;border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s;border:3px solid transparent}
.listen-card:active{transform:scale(.95)}
.listen-card.correct{border-color:#4caf50;animation:pulse .4s}
.listen-card img{width:80px;height:auto}
.listen-card .lbl{font-size:20px;font-weight:700;color:#2c3e50}
.speaker-btn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#42a5f5,#64b5f6);border:none;color:#fff;font-size:36px;cursor:pointer;box-shadow:0 4px 16px rgba(66,165,245,.4);margin:16px 0;transition:transform .1s}
.speaker-btn:active{transform:scale(.9)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;width:440px;max-width:95%}
.mem-card{aspect-ratio:1;background:linear-gradient(135deg,#42a5f5,#64b5f6);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:transform .3s;position:relative}
.mem-card.flipped{background:#fff;border:2px solid #42a5f5}
.mem-card.matched{background:#c8e6c9;border:2px solid #4caf50;pointer-events:none}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flipped .back{display:none}
.mem-card.flipped .front{display:flex}
.mem-card .front img{width:70px;height:auto}
.mem-card .front .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.done-wrap img{width:110px;height:auto}
.done-wrap .ttl{font-size:48px;font-weight:900;color:#1976d2;margin:10px 0}
.done-wrap .msg{font-size:22px;color:#555;text-align:center;max-width:400px}
.play-again{padding:16px 40px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(249,173,199,.4);margin-top:10px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #42a5f5;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#42a5f5;color:#fff;box-shadow:0 4px 12px rgba(66,165,245,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(min-width:768px){.memory-grid{width:560px;gap:16px}}
@media(max-width:480px){.te{font-size:26px}.tz{font-size:18px;padding:10px 20px}.bbl{font-size:20px}.pr img{width:65px}.sb{font-size:22px}.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}.card img{width:70px}.card .lbl{font-size:18px}.road-btn{padding:12px}.road-btn img{width:70px}.road-btn .lbl{font-size:22px}.listen-grid{grid-template-columns:repeat(2,1fr)}.listen-card img{width:70px}.memory-grid{grid-template-columns:repeat(3,1fr);width:100%}.mem-card .front img{width:60px}.mem-card .front .lbl{font-size:16px}.done-wrap img{width:100px}.done-wrap .ttl{font-size:38px}}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa_pig_bicycle.png" style="width:140px;margin:20px 0" alt="Peppa">
<div class="te">Going Places</div>
<div class="sb">Let's review!</div>
<div style="display:flex;gap:16px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg" width="60" alt="bus">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg" width="60" alt="bike">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg" width="60" alt="boat">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg" width="60" alt="train">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg" width="60" alt="plane">
</div>
<button class="play-again" onclick="goM(1)">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">🚗 点一点，学单词！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: Road Trip -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Road Trip</div>
<div class="tz">🛣️ 听一听，点交通工具！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Find it!</div>
</div>
<div class="road-wrap" id="rw"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Listen!</div>
</div>
<button class="speaker-btn" id="spk3">🔊</button>
<div class="listen-grid" id="lg3"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">Match them!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="ttl">All Done!</div>
<div class="msg">Great job! You learned all the ways to go places!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="play-again" onclick="goM(0)">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'bus',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f68c.svg'},
{w:'bike',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6b2.svg'},
{w:'boat',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26f5.svg'},
{w:'train',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f686.svg'},
{w:'plane',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2708.svg'}
];
var curM=0,busy=false;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

// M1: Learn (rotate-in animation)
function initM1(){
var cg=document.getElementById('cg1');
cg.innerHTML='';
var st=0;
W.forEach(function(item){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
c.style.transform='rotate(180deg)';
c.style.opacity='0';
c.onclick=function(){
if(!c.classList.contains('revealed')){
c.classList.add('revealed');
c.style.transform='rotate(0deg)';
c.style.opacity='1';
speak(item.w);
st++;
document.getElementById('s1').innerHTML=stars(st,5);
}else{
speak(item.w);
}
};
cg.appendChild(c);
});
}

// M2: Road Trip (听词点交通工具)
function initM2(){
if(busy)return;
var rw=document.getElementById('rw');
rw.innerHTML='';
var st=0;
var seq=W.slice().sort(function(){return Math.random()-.5});
var idx=0;

function ask(){
if(idx>=seq.length){
setTimeout(function(){goM(1)},800);
return;
}
var target=seq[idx];
speak(target.w);
busy=true;
setTimeout(function(){busy=false},1000);

W.forEach(function(item){
var btn=document.createElement('div');
btn.className='road-btn';
btn.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
btn.onclick=function(){
if(busy)return;
if(item.w===target.w){
btn.classList.add('correct');
playOk();
st++;
document.getElementById('s2').innerHTML=stars(st,5);
busy=true;
setTimeout(function(){
idx++;
rw.innerHTML='';
ask();
},1200);
}else{
playNo();
}
};
rw.appendChild(btn);
});
}
ask();
}

// M3: Listen & Find
function initM3(){
if(busy)return;
var lg=document.getElementById('lg3');
var spk=document.getElementById('spk3');
lg.innerHTML='';
var st=0;
var seq=W.slice().sort(function(){return Math.random()-.5});
var idx=0;

function ask(){
if(idx>=seq.length){
setTimeout(function(){goM(1)},800);
return;
}
var target=seq[idx];
speak(target.w);
busy=true;
setTimeout(function(){busy=false},1000);

spk.onclick=function(){
if(!busy)speak(target.w);
};

lg.innerHTML='';
var opts=W.slice().sort(function(){return Math.random()-.5});
opts.forEach(function(item){
var card=document.createElement('div');
card.className='listen-card';
card.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
card.onclick=function(){
if(busy)return;
if(item.w===target.w){
card.classList.add('correct');
playOk();
st++;
document.getElementById('s3').innerHTML=stars(st,5);
busy=true;
setTimeout(function(){
idx++;
ask();
},1200);
}else{
playNo();
}
};
lg.appendChild(card);
});
}
ask();
}

// M4: Memory Match
function initM4(){
var mg=document.getElementById('mg4');
mg.innerHTML='';
var pairs=[];
W.forEach(function(item){
pairs.push({type:'img',data:item.img,word:item.w});
pairs.push({type:'word',data:item.w,word:item.w});
});
pairs.sort(function(){return Math.random()-.5});

var flipped=[];
var matched=0;
var st=0;

pairs.forEach(function(p,i){
var card=document.createElement('div');
card.className='mem-card';
card.dataset.word=p.word;
card.dataset.type=p.type;
card.innerHTML='<div class="back">🚗</div><div class="front">'+(p.type==='img'?'<img src="'+p.data+'" alt="'+p.word+'">':'<div class="lbl">'+p.data+'</div>')+'</div>';
card.onclick=function(){
if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
card.classList.add('flipped');
flipped.push(card);
if(flipped.length===2){
busy=true;
var c1=flipped[0],c2=flipped[1];
if(c1.dataset.word===c2.dataset.word&&c1.dataset.type!==c2.dataset.type){
playOk();
c1.classList.add('matched');
c2.classList.add('matched');
matched++;
st++;
document.getElementById('s4').innerHTML=stars(st,5);
flipped=[];
busy=false;
if(matched===W.length){
setTimeout(function(){goM(1)},1200);
}
}else{
playNo();
setTimeout(function(){
c1.classList.remove('flipped');
c2.classList.remove('flipped');
flipped=[];
busy=false;
},1000);
}
}
};
mg.appendChild(card);
});
}

function initM5(){
// Done page, no init needed
}

goM(0);
</script>
</body>
</html>
