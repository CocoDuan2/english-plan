<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 24 Review - Music Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#fce4ec,#f8bbd0);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ba68c8,#9c27b0);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(186,104,200,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(186,104,200,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px 0}
.card{width:100%;aspect-ratio:1;background:#ddd;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card:active{transform:scale(.95)}
.card.revealed{background:#fff;cursor:default}
.card img{width:90px;height:auto;margin-bottom:8px}
.card .label{font-size:20px;font-weight:700;color:#2c3e50}
.stage-wrap{width:100%;max-width:500px;margin:20px 0}
.instrument-btn{width:100%;padding:20px;margin:10px 0;border:3px solid #ddd;border-radius:16px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:15px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.instrument-btn:active{transform:scale(.98)}
.instrument-btn.correct{border-color:#27ae60;background:#d5f4e6}
.instrument-btn img{width:60px;height:auto}
.instrument-btn .label{font-size:24px;font-weight:700;color:#2c3e50}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:500px;margin:20px 0}
.listen-card{width:100%;aspect-ratio:1;background:#fff;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,.1);border:3px solid transparent}
.listen-card:active{transform:scale(.95)}
.listen-card.correct{border-color:#27ae60;background:#d5f4e6}
.listen-card img{width:70px;height:auto;margin-bottom:8px}
.listen-card .label{font-size:18px;font-weight:700;color:#2c3e50}
.speaker-btn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#ba68c8,#9c27b0);border:none;color:#fff;font-size:36px;cursor:pointer;margin:15px 0;box-shadow:0 4px 12px rgba(186,104,200,.4);transition:transform .1s}
.speaker-btn:active{transform:scale(.9)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:440px;margin:20px 0}
.mem-card{aspect-ratio:1;background:linear-gradient(135deg,#ba68c8,#9c27b0);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,.15);position:relative}
.mem-card:active{transform:scale(.95)}
.mem-card.flipped{background:#fff;border:2px solid #ddd}
.mem-card.matched{background:#d5f4e6;border:2px solid #27ae60;cursor:default}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;justify-content:center}
.mem-card.flipped .back{display:none}
.mem-card.flipped .front{display:flex}
.mem-card .front img{width:70px;height:auto;margin-bottom:6px}
.mem-card .front .label{font-size:18px;font-weight:700;color:#2c3e50}
.done-wrap{text-align:center}
.done-wrap img{width:110px;height:auto;margin:20px 0}
.done-wrap .title{font-size:48px;font-weight:900;color:#e91e8c;margin:10px 0}
.done-wrap .msg{font-size:22px;color:#666;margin:10px 0}
.play-again-btn{padding:16px 40px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;margin:20px 0;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #F9ADC7;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#F9ADC7;color:#fff;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card .label{font-size:18px}
.instrument-btn{padding:15px;gap:10px}
.instrument-btn img{width:50px}
.instrument-btn .label{font-size:20px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.listen-card img{width:60px}
.speaker-btn{width:70px;height:70px;font-size:32px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px}
.mem-card .back{font-size:36px}
.mem-card .front img{width:60px}
.mem-card .front .label{font-size:16px}
}
</style>
</head>
<body>
<!-- M0: Start -->
<div id="m0" class="mod on">
<div class="top">
<div class="te">Music Time! 🎵</div>
<div class="sb">Let's review!</div>
</div>
<img src="../../assets/peppa/peppa-pig-happy-standing.png" style="width:140px;margin:20px 0" alt="Peppa">
<div style="display:flex;gap:20px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3a4.svg" width="60" alt="sing">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f483.svg" width="60" alt="dance">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f44f.svg" width="60" alt="clap">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f941.svg" width="60" alt="drum">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3b9.svg" width="60" alt="piano">
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn New Words</div>
<div class="tz">🎵 点一点，听一听！</div>
<div class="sb" id="s1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="learn-grid"></div>
</div>

<!-- M2: Music Show Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Music Show</div>
<div class="tz">🎤 听词点乐器！</div>
<div class="sb" id="s2">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find the music!</div>
</div>
<div class="stage-wrap" id="music-stage"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">Listen carefully!</div>
</div>
<button class="speaker-btn" id="listen-btn">🔊</button>
<div class="listen-grid" id="listen-grid"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 找一样的！</div>
<div class="sb" id="s4">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">Match them!</div>
</div>
<div class="memory-grid" id="mem-grid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="title">All Done! 🎵</div>
<div class="msg">Great job learning music!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="play-again-btn" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{word:'sing',emoji:'1f3a4'},
{word:'dance',emoji:'1f483'},
{word:'clap',emoji:'1f44f'},
{word:'drum',emoji:'1f941'},
{word:'piano',emoji:'1f3b9'}
];
var curM=0,busy=false;
var learnStars=0,gameStars=0,listenStars=0,memStars=0;
var listenTarget='';
var memFlipped=[],memMatched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
var g=document.getElementById('learn-grid');
g.innerHTML='';
W.forEach(function(w){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<div style="font-size:48px">?</div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+w.emoji+'.svg" alt="'+w.word+'"><div class="label">'+w.word+'</div>';
speak(w.word);
learnStars++;
document.getElementById('s1').innerHTML=stars(learnStars,5);
if(learnStars===5){
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
}
};
g.appendChild(c);
});
}

function initM2(){
var stage=document.getElementById('music-stage');
stage.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
var target=shuffled[0];
speak(target.word);
shuffled.forEach(function(w){
var btn=document.createElement('div');
btn.className='instrument-btn';
btn.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+w.emoji+'.svg" alt="'+w.word+'"><div class="label">'+w.word+'</div>';
btn.onclick=function(){
if(busy||btn.classList.contains('correct'))return;
busy=true;
if(w.word===target.word){
playOk();
btn.classList.add('correct');
gameStars++;
document.getElementById('s2').innerHTML=stars(gameStars,5);
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
busy=false;
if(gameStars<5){
shuffled=W.slice().sort(function(){return Math.random()-.5});
target=shuffled[0];
speak(target.word);
stage.querySelectorAll('.instrument-btn').forEach(function(b){b.classList.remove('correct')});
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
stage.appendChild(btn);
});
}

function initM3(){
var g=document.getElementById('listen-grid');
g.innerHTML='';
W.forEach(function(w){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+w.emoji+'.svg" alt="'+w.word+'"><div class="label">'+w.word+'</div>';
c.onclick=function(){
if(busy||c.classList.contains('correct'))return;
busy=true;
if(w.word===listenTarget){
playOk();
c.classList.add('correct');
listenStars++;
document.getElementById('s3').innerHTML=stars(listenStars,5);
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
busy=false;
if(listenStars<5){
pickListenTarget();
}
},1200);
}else{
playNo();
setTimeout(function(){busy=false},800);
}
};
g.appendChild(c);
});
pickListenTarget();
document.getElementById('listen-btn').onclick=function(){
if(listenTarget)speak(listenTarget);
};
}

function pickListenTarget(){
var remaining=W.filter(function(w){
return !document.querySelector('.listen-card.correct img[alt="'+w.word+'"]');
});
if(remaining.length>0){
listenTarget=remaining[Math.floor(Math.random()*remaining.length)].word;
speak(listenTarget);
}
}

function initM4(){
var g=document.getElementById('mem-grid');
g.innerHTML='';
var pairs=[];
W.forEach(function(w){
pairs.push({word:w.word,emoji:w.emoji});
pairs.push({word:w.word,emoji:w.emoji});
});
pairs.sort(function(){return Math.random()-.5});
pairs.forEach(function(p,i){
var c=document.createElement('div');
c.className='mem-card';
c.dataset.word=p.word;
c.dataset.idx=i;
c.innerHTML='<div class="back">🎵</div><div class="front"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/'+p.emoji+'.svg" alt="'+p.word+'"><div class="label">'+p.word+'</div></div>';
c.onclick=function(){
if(busy||c.classList.contains('matched')||c.classList.contains('flipped'))return;
c.classList.add('flipped');
speak(p.word);
memFlipped.push(c);
if(memFlipped.length===2){
busy=true;
setTimeout(function(){
if(memFlipped[0].dataset.word===memFlipped[1].dataset.word){
playOk();
memFlipped[0].classList.add('matched');
memFlipped[1].classList.add('matched');
memMatched++;
memStars++;
document.getElementById('s4').innerHTML=stars(memStars,5);
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
if(memMatched===5){
setTimeout(function(){goM(1)},1500);
}
}else{
playNo();
memFlipped[0].classList.remove('flipped');
memFlipped[1].classList.remove('flipped');
}
memFlipped=[];
busy=false;
},1000);
}
};
g.appendChild(c);
});
}

function initM5(){
document.getElementById('s4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
