<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 17 Review - Farm Visit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#FFE5B4,#90EE90);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#8BC34A,#4CAF50);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(76,175,80,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(76,175,80,.2);border-radius:2px;filter:blur(3px)}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;width:90%;max-width:500px;margin:20px 0}
.card{background:#fff;border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:transform .2s}
.card.revealed{background:#f0f8ff}
.card img{width:90px;height:auto}
.card .lbl{font-size:20px;font-weight:700;color:#2c3e50}
.gray-box{width:90px;height:90px;background:#ddd;border-radius:12px}
.barn-wrap{position:relative;width:90%;max-width:450px;height:350px;background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 40%,#90EE90 40%,#90EE90 100%);border-radius:20px;margin:20px 0;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.barn{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:200px;height:180px;background:#8B4513;border-radius:10px 10px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.barn::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:120px solid transparent;border-right:120px solid transparent;border-bottom:50px solid #A0522D}
.barn-door{width:60px;height:80px;background:#654321;border-radius:8px;margin-top:20px}
.animal-btn{position:absolute;width:70px;height:70px;border-radius:50%;background:#fff;border:3px solid #8BC34A;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .2s}
.animal-btn:hover{transform:scale(1.1)}
.animal-btn img{width:50px;height:auto}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;width:90%;max-width:500px;margin:20px 0}
.listen-card{background:#fff;border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:transform .2s;border:3px solid transparent}
.listen-card:hover{transform:scale(1.05)}
.listen-card.correct{border-color:#27ae60;animation:pulse .3s}
.listen-card img{width:80px;height:auto}
.listen-card .lbl{font-size:18px;font-weight:700;color:#2c3e50}
.speaker-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#8BC34A,#4CAF50);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 3px 10px rgba(76,175,80,.4);margin:10px 0}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:90%;max-width:560px;margin:20px 0}
.mem-card{aspect-ratio:1;background:#fff;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s;position:relative}
.mem-card:hover{transform:scale(1.05)}
.mem-card.flipped{background:#f0f8ff}
.mem-card.matched{background:#d4edda;pointer-events:none}
.mem-card .back{font-size:44px}
.mem-card .front{display:none;flex-direction:column;align-items:center;gap:6px}
.mem-card.flipped .back{display:none}
.mem-card.flipped .front{display:flex}
.mem-card .front img{width:70px;height:auto}
.mem-card .front .txt{font-size:18px;font-weight:700;color:#2c3e50}
.done-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.done-wrap img{width:120px;height:auto}
.done-wrap .big-title{font-size:48px;font-weight:900;color:#27ae60;text-shadow:0 3px 6px rgba(39,174,96,.3)}
.done-wrap .msg{font-size:22px;color:#555;text-align:center}
.play-again{padding:16px 40px;border:none;border-radius:12px;font-size:20px;font-weight:900;background:#F9ADC7;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(249,173,199,.4)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #8BC34A;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#8BC34A;color:#fff;box-shadow:0 4px 12px rgba(139,195,74,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.card img{width:70px}
.card .lbl{font-size:18px}
.barn-wrap{height:280px}
.barn{width:160px;height:140px}
.barn::before{border-left:90px solid transparent;border-right:90px solid transparent;border-bottom:40px solid #A0522D}
.animal-btn{width:55px;height:55px}
.animal-btn img{width:40px}
.listen-grid{grid-template-columns:repeat(2,1fr)}
.listen-card img{width:70px}
.memory-grid{grid-template-columns:repeat(3,1fr);gap:10px}
.mem-card .back{font-size:36px}
.mem-card .front img{width:60px}
.mem-card .front .txt{font-size:16px}
.done-wrap img{width:100px}
.done-wrap .big-title{font-size:36px}
.done-wrap .msg{font-size:18px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px;margin:20px 0" alt="Peppa">
<div class="te">Farm Visit</div>
<div class="sb">Let's play!</div>
<div style="display:flex;gap:15px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f437.svg" width="50" alt="pig">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f404.svg" width="50" alt="cow">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f40e.svg" width="50" alt="horse">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f411.svg" width="50" alt="sheep">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f414.svg" width="50" alt="chicken">
</div>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn</div>
<div class="tz">🐷 点一点，听单词！</div>
<div class="sb" id="st1">⭐⭐⭐⭐⭐</div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Tap to learn!</div>
</div>
<div class="card-grid" id="cg1"></div>
</div>

<!-- M2: Farm Sounds -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Farm Sounds</div>
<div class="tz">🔊 听声音，找动物！</div>
<div class="sb" id="st2">★★★★★</div>
</div>
<div class="pr">
<img src="../../assets/peppa/daddy-pig-standing.png" alt="Daddy">
<div class="bbl">Find the animal!</div>
</div>
<div class="barn-wrap">
<div class="barn">
<div class="barn-door"></div>
</div>
<div class="animal-btn" id="ab0" style="top:15%;left:10%"></div>
<div class="animal-btn" id="ab1" style="top:15%;right:10%"></div>
<div class="animal-btn" id="ab2" style="top:45%;left:15%"></div>
<div class="animal-btn" id="ab3" style="top:45%;right:15%"></div>
<div class="animal-btn" id="ab4" style="bottom:15%;left:50%;transform:translateX(-50%)"></div>
</div>
<button class="speaker-btn" id="replay2" onclick="playCurrentWord()">🔊</button>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听单词，点图片！</div>
<div class="sb" id="st3">★★★★★</div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy">
<div class="bbl">Which one?</div>
</div>
<div class="listen-grid" id="lg3"></div>
<button class="speaker-btn" id="replay3" onclick="playCurrentWord()">🔊</button>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻牌配对！</div>
<div class="sb" id="st4">★★★★★</div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy">
<div class="bbl">Find pairs!</div>
</div>
<div class="memory-grid" id="mg4"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<div class="done-wrap">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" alt="Family">
<div class="big-title">All Done!</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<div class="msg">You helped Peppa at the farm!<br>Great job!</div>
<button class="play-again" onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'pig',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f437.svg'},
{w:'cow',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f404.svg'},
{w:'horse',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f40e.svg'},
{w:'sheep',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f411.svg'},
{w:'chicken',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f414.svg'}
];
var curM=0,busy=false;
var m1Stars=0,m2Stars=0,m2Idx=0,m2Order=[],m3Stars=0,m3Idx=0,m3Order=[],m4Stars=0;
var m4Flipped=[],m4Matched=0;
var currentWord='';

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
var cg=document.getElementById('cg1');
cg.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='card';
c.innerHTML='<div class="gray-box"></div>';
c.onclick=function(){
if(c.classList.contains('revealed'))return;
c.classList.add('revealed');
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
speak(item.w);
m1Stars++;
document.getElementById('st1').innerHTML=stars(m1Stars,5);
var pr=document.querySelector('#m1 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
};
cg.appendChild(c);
});
}

function initM2(){
m2Order=W.map(function(x,i){return i}).sort(function(){return Math.random()-.5});
m2Idx=0;
m2Stars=0;
document.getElementById('st2').innerHTML=stars(0,5);
for(var i=0;i<5;i++){
var ab=document.getElementById('ab'+i);
ab.innerHTML='<img src="'+W[i].img+'" alt="'+W[i].w+'">';
ab.onclick=(function(idx){
return function(){
if(busy)return;
var correct=m2Order[m2Idx];
if(idx===correct){
busy=true;
playOk();
speak(W[idx].w);
m2Stars++;
document.getElementById('st2').innerHTML=stars(m2Stars,5);
var pr=document.querySelector('#m2 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
m2Idx++;
if(m2Idx<5){
playM2();
}else{
setTimeout(function(){goM(1)},800);
}
busy=false;
},1200);
}else{
playNo();
}
};
})(i);
}
playM2();
}

function playM2(){
currentWord=W[m2Order[m2Idx]].w;
setTimeout(function(){speak(currentWord)},300);
}

function playCurrentWord(){
if(currentWord)speak(currentWord);
}

function initM3(){
m3Order=W.map(function(x,i){return i}).sort(function(){return Math.random()-.5});
m3Idx=0;
m3Stars=0;
document.getElementById('st3').innerHTML=stars(0,5);
var lg=document.getElementById('lg3');
lg.innerHTML='';
W.forEach(function(item,i){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="lbl">'+item.w+'</div>';
c.onclick=function(){
if(busy)return;
var correct=m3Order[m3Idx];
if(i===correct){
busy=true;
c.classList.add('correct');
playOk();
speak(item.w);
m3Stars++;
document.getElementById('st3').innerHTML=stars(m3Stars,5);
var pr=document.querySelector('#m3 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){
pr.classList.remove('peppa-jumping');
c.classList.remove('correct');
m3Idx++;
if(m3Idx<5){
playM3();
}else{
setTimeout(function(){goM(1)},800);
}
busy=false;
},1200);
}else{
playNo();
}
};
lg.appendChild(c);
});
playM3();
}

function playM3(){
currentWord=W[m3Order[m3Idx]].w;
setTimeout(function(){speak(currentWord)},300);
}

function initM4(){
m4Stars=0;
m4Matched=0;
m4Flipped=[];
document.getElementById('st4').innerHTML=stars(0,5);
var pairs=W.concat(W).sort(function(){return Math.random()-.5});
var mg=document.getElementById('mg4');
mg.innerHTML='';
pairs.forEach(function(item,i){
var c=document.createElement('div');
c.className='mem-card';
c.innerHTML='<div class="back">🐾</div><div class="front"><img src="'+item.img+'" alt="'+item.w+'"><div class="txt">'+item.w+'</div></div>';
c.dataset.word=item.w;
c.onclick=function(){
if(busy||c.classList.contains('flipped')||c.classList.contains('matched'))return;
c.classList.add('flipped');
speak(item.w);
m4Flipped.push(c);
if(m4Flipped.length===2){
busy=true;
setTimeout(function(){
if(m4Flipped[0].dataset.word===m4Flipped[1].dataset.word){
m4Flipped[0].classList.add('matched');
m4Flipped[1].classList.add('matched');
playOk();
m4Matched++;
m4Stars++;
document.getElementById('st4').innerHTML=stars(m4Stars,5);
var pr=document.querySelector('#m4 .pr img');
pr.classList.add('peppa-jumping');
setTimeout(function(){pr.classList.remove('peppa-jumping')},600);
if(m4Matched===5){
setTimeout(function(){goM(1)},1200);
}
}else{
m4Flipped[0].classList.remove('flipped');
m4Flipped[1].classList.remove('flipped');
playNo();
}
m4Flipped=[];
busy=false;
},800);
}
};
mg.appendChild(c);
});
}

function initM5(){
document.getElementById('st4').innerHTML=stars(5,5);
}

goM(0);
</script>
</body>
</html>
