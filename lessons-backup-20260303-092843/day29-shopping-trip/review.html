<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day 29 Review - Shopping Trip</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(160deg,#FFE5B4,#FFD700);overflow:hidden}
.mod{display:none;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:20px 20px 80px;overflow-y:auto}
.mod.on{display:flex}
.top{text-align:center;margin-bottom:20px}
.te{font-size:32px;font-weight:900;color:#e91e8c;margin:8px 0;text-shadow:0 2px 4px rgba(233,30,140,.2)}
.tz{font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:25px;padding:12px 24px;display:inline-block;box-shadow:0 6px 20px rgba(255,215,0,.35);margin:8px 0;letter-spacing:.5px;position:relative}
.tz::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:80%;height:4px;background:rgba(255,215,0,.2);border-radius:2px;filter:blur(3px)}
.tz::before{content:'🛍️ ';font-size:22px}
.sb{font-size:24px;font-weight:700;color:#666;margin:6px 0;letter-spacing:2px}
.pr{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.pr img{width:75px}
.bbl{background:#fff;border-radius:14px;padding:10px 16px;font-size:22px;font-weight:700;color:#e67e22;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confetti-fall 1.2s ease-out forwards;opacity:0}
@keyframes confetti-fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(60vh) scale(.3)}}
@keyframes peppa-jump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-30px)}100%{transform:translateY(0)}}
.peppa-jumping{animation:peppa-jump .6s ease-out}
.nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:2px solid #FFD700;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nb{padding:14px 32px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;background:#FFD700;color:#fff;box-shadow:0 4px 12px rgba(255,215,0,.4)}
.nb:disabled{background:#ddd;color:#bbb}
.np{font-size:13px;color:#999}
.learn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:500px;margin:20px 0}
.learn-card{width:100%;aspect-ratio:1;background:#ddd;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.learn-card.revealed{background:#fff}
.learn-card img{width:90px;height:auto;opacity:0;transition:opacity .3s}
.learn-card.revealed img{opacity:1}
.learn-label{font-size:20px;font-weight:700;color:#2c3e50;margin-top:8px;opacity:0;transition:opacity .3s}
.learn-card.revealed .learn-label{opacity:1}
.shop-shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:500px;margin:20px 0}
.shelf-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:16px;border-radius:16px;background:rgba(255,255,255,.4);transition:all .3s;border:3px solid transparent}
.shelf-item:hover{transform:scale(1.05);background:rgba(255,255,255,.6)}
.shelf-item.collected{border-color:#32CD32;background:rgba(50,205,50,.2)}
.shelf-item img{width:80px;height:auto}
.shelf-label{font-size:22px;font-weight:700;color:#2c3e50}
.basket{position:fixed;top:20px;right:20px;background:#fff;border-radius:12px;padding:10px 16px;box-shadow:0 4px 12px rgba(0,0,0,.15);font-size:20px;font-weight:700;color:#e67e22}
.listen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:500px;margin:20px 0}
.listen-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:16px;border-radius:16px;background:rgba(255,255,255,.4);transition:all .3s}
.listen-card:hover{transform:scale(1.05)}
.listen-card img{width:90px;height:auto}
.listen-label{font-size:20px;font-weight:700;color:#2c3e50}
.sound-icon{font-size:32px;cursor:pointer;margin:10px 0;padding:12px;background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,215,0,.4)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:440px;max-width:95vw;margin:20px 0}
.memory-card{aspect-ratio:1;background:#FFD700;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:44px;transition:transform .3s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.memory-card:active{transform:scale(.95)}
.memory-card.flipped{background:#fff}
.memory-card.matched{background:#98FB98;pointer-events:none}
.memory-card img{width:70px;height:auto;display:none}
.memory-card.flipped img{display:block}
.memory-card .back-text{font-size:18px;font-weight:700;color:#2c3e50;display:none}
.memory-card.flipped .back-text{display:block}
.done-hero{width:110px;margin:20px 0}
.done-title{font-size:48px;font-weight:900;color:#2c3e50;margin:10px 0}
.done-msg{font-size:24px;color:#7f8c8d;margin:10px 0}
.play-again{padding:16px 40px;border:none;border-radius:12px;font-size:22px;font-weight:900;cursor:pointer;background:#FFD700;color:#fff;box-shadow:0 4px 12px rgba(255,215,0,.4);margin:20px 0}
@media(max-width:480px){
.te{font-size:26px}
.tz{font-size:18px;padding:10px 20px}
.bbl{font-size:20px}
.pr img{width:65px}
.sb{font-size:22px}
.learn-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.learn-card img{width:70px}
.learn-label{font-size:18px}
.shop-shelf{grid-template-columns:repeat(2,1fr);gap:15px}
.shelf-item img{width:70px}
.shelf-label{font-size:20px}
.listen-grid{grid-template-columns:repeat(2,1fr);gap:15px}
.listen-card img{width:70px}
.listen-label{font-size:18px}
.memory-grid{grid-template-columns:repeat(4,1fr);gap:10px;width:340px}
.memory-card{font-size:36px}
.memory-card img{width:60px}
.memory-card .back-text{font-size:16px}
.done-hero{width:90px}
.done-title{font-size:36px}
.done-msg{font-size:20px}
.play-again{font-size:20px;padding:14px 32px}
.basket{font-size:18px;padding:8px 12px}
}
</style>
</head>
<body>

<!-- M0: Start -->
<div id="m0" class="mod on">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" style="width:110px" alt="Peppa">
<div class="te">Shopping Trip</div>
<div class="sb" style="display:flex;gap:15px;margin:20px 0">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3ea.svg" width="50" alt="shop">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d2.svg" width="50" alt="buy">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4b5.svg" width="50" alt="money">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cd.svg" width="50" alt="bag">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg" width="50" alt="toy">
</div>
<button class="nb" onclick="getAC();goM(1)" style="font-size:24px;padding:16px 40px">Let's Play!</button>
</div>

<!-- M1: Learn -->
<div id="m1" class="mod">
<div class="top">
<div class="te">Learn Words</div>
<div class="tz">点一点，学单词！</div>
<div class="sb" id="s1">⭐<span style="color:#bbb">★★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/mummy-pig-standing-grass.png" alt="Mummy Pig">
<div class="bbl">Tap to learn!</div>
</div>
<div class="learn-grid" id="learnGrid"></div>
</div>

<!-- M2: Shopping Game -->
<div id="m2" class="mod">
<div class="top">
<div class="te">Shopping Game</div>
<div class="tz">听一听，买东西！</div>
<div class="sb" id="s2">⭐⭐<span style="color:#bbb">★★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/peppa-pig-happy-standing.png" alt="Peppa">
<div class="bbl">Help me shop!</div>
</div>
<div class="basket" id="basket">🛒 0/5</div>
<div class="shop-shelf" id="shopShelf"></div>
</div>

<!-- M3: Listen & Find -->
<div id="m3" class="mod">
<div class="top">
<div class="te">Listen & Find</div>
<div class="tz">👂 听一听，找一找！</div>
<div class="sb" id="s3">⭐⭐⭐<span style="color:#bbb">★★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/george-standing.png" alt="George">
<div class="bbl">Find it!</div>
</div>
<div class="sound-icon" onclick="if(!busy3)playCurrentWord()">🔊</div>
<div class="listen-grid" id="listenGrid"></div>
</div>

<!-- M4: Memory Match -->
<div id="m4" class="mod">
<div class="top">
<div class="te">Memory Match</div>
<div class="tz">🎴 翻一翻，配一配！</div>
<div class="sb" id="s4">⭐⭐⭐⭐<span style="color:#bbb">★</span></div>
</div>
<div class="pr">
<img src="../../assets/peppa/candy-cat-green-dress.png" alt="Candy Cat">
<div class="bbl">Match them!</div>
</div>
<div class="memory-grid" id="memoryGrid"></div>
</div>

<!-- M5: Done -->
<div id="m5" class="mod">
<img src="../../assets/peppa/peppa-family-group-outdoors.png" class="done-hero" alt="Peppa Family">
<div class="done-title">All Done!</div>
<div class="done-msg">Great shopping! 🎉</div>
<div class="sb">⭐⭐⭐⭐⭐</div>
<button class="play-again" onclick="location.reload()">Play Again</button>
</div>

<div class="nav">
<button class="nb" id="pBtn" onclick="goM(-1)" disabled>◀ Back</button>
<div class="np" id="pg">1/6</div>
<button class="nb" id="nBtn" onclick="goM(1)">Start!</button>
</div>

<script>
var PP='../../assets/peppa/';
var W=[
{w:'shop',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3ea.svg'},
{w:'buy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6d2.svg'},
{w:'money',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4b5.svg'},
{w:'bag',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f6cd.svg'},
{w:'toy',img:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f9f8.svg'}
];
var curM=0,busy=false;
var busy1=false,busy2=false,busy3=false,busy4=false;
var learned=0,shopped=0,listened=0;
var currentWord='',currentIndex=0;
var flipped=[],matched=0;

function speak(t){
var primary='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2';
var fallback='https://fanyi.baidu.com/gettts?lan=en&text='+encodeURIComponent(t)+'&spd=4&source=web';
var a=new Audio(primary);
a.play().catch(function(){
var b=new Audio(fallback);
b.play().catch(function(){});
});
}

function getAC(){
if(!window.actx)window.actx=new(window.AudioContext||window.webkitAudioContext)();
return window.actx;
}

function tone(f,d){
var c=getAC(),o=c.createOscillator(),g=c.createGain();
o.connect(g);
g.connect(c.destination);
o.frequency.value=f;
g.gain.value=.15;
o.start();
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
o.stop(c.currentTime+d);
}

function playOk(){
tone(523,.1);
setTimeout(function(){tone(659,.1)},100);
setTimeout(function(){tone(784,.15)},200);
showConfetti();
}

function playNo(){
tone(300,.3);
}

function showConfetti(){
var w=document.createElement("div");
w.className="confetti-wrap";
var colors=["#e74c3c","#3498db","#f1c40f","#27ae60","#e67e22"];
for(var i=0;i<20;i++){
var p=document.createElement("div");
p.className="confetti-piece";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*30+"%";
p.style.background=colors[i%5];
p.style.width=p.style.height=(6+Math.random()*8)+"px";
p.style.animationDelay=Math.random()*.3+"s";
w.appendChild(p);
}
document.body.appendChild(w);
setTimeout(function(){w.remove()},1600);
}

function stars(n,t){
var s='';
for(var i=0;i<t;i++)s+=i<n?'⭐':'<span style="color:#bbb">★</span>';
return s;
}

function goM(d){
curM+=d;
if(curM<0)curM=0;
if(curM>5)curM=5;
document.querySelectorAll('.mod').forEach(function(m){m.classList.remove('on')});
document.getElementById('m'+curM).classList.add('on');
document.getElementById('pg').textContent=(curM+1)+'/6';
document.getElementById('pBtn').disabled=curM===0;
var nb=document.getElementById('nBtn');
if(curM===0){
nb.textContent='Start!';
nb.disabled=false;
}else if(curM>=5){
nb.textContent='Done';
nb.disabled=true;
}else{
nb.textContent='Next ▶';
nb.disabled=false;
}
if(curM===1)initM1();
if(curM===2)initM2();
if(curM===3)initM3();
if(curM===4)initM4();
if(curM===5)initM5();
}

function initM1(){
if(busy1)return;
busy1=true;
learned=0;
var g=document.getElementById('learnGrid');
g.innerHTML='';
W.forEach(function(item){
var c=document.createElement('div');
c.className='learn-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="learn-label">'+item.w+'</div>';
c.onclick=function(){
if(this.classList.contains('revealed'))return;
this.classList.add('revealed');
speak(item.w);
learned++;
document.getElementById('s1').innerHTML=stars(learned,5);
};
g.appendChild(c);
});
}

function initM2(){
if(busy2)return;
busy2=true;
shopped=0;
document.getElementById('basket').textContent='🛒 0/5';
var shelf=document.getElementById('shopShelf');
shelf.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
var target=shuffled[0];
currentWord=target.w;
speak(currentWord);
W.forEach(function(item){
var div=document.createElement('div');
div.className='shelf-item';
div.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="shelf-label">'+item.w+'</div>';
div.onclick=function(){
if(this.classList.contains('collected'))return;
if(item.w===currentWord){
this.classList.add('collected');
playOk();
shopped++;
document.getElementById('basket').textContent='🛒 '+shopped+'/5';
document.getElementById('s2').innerHTML=stars(shopped,5);
setTimeout(function(){
if(shopped<5){
var remaining=W.filter(function(w){
return !document.querySelector('.shelf-item[data-word="'+w.w+'"]').classList.contains('collected');
});
if(remaining.length>0){
currentWord=remaining[Math.floor(Math.random()*remaining.length)].w;
speak(currentWord);
}
}else{
setTimeout(function(){goM(1)},1000);
}
},1200);
}else{
playNo();
}
};
div.setAttribute('data-word',item.w);
shelf.appendChild(div);
});
}

function initM3(){
if(busy3)return;
busy3=true;
listened=0;
var g=document.getElementById('listenGrid');
g.innerHTML='';
var shuffled=W.slice().sort(function(){return Math.random()-.5});
currentIndex=0;
currentWord=shuffled[currentIndex].w;
speak(currentWord);
shuffled.forEach(function(item){
var c=document.createElement('div');
c.className='listen-card';
c.innerHTML='<img src="'+item.img+'" alt="'+item.w+'"><div class="listen-label">'+item.w+'</div>';
c.onclick=function(){
if(item.w===currentWord){
playOk();
speak(item.w);
listened++;
document.getElementById('s3').innerHTML=stars(listened,5);
setTimeout(function(){
currentIndex++;
if(currentIndex<shuffled.length){
currentWord=shuffled[currentIndex].w;
speak(currentWord);
}else{
setTimeout(function(){goM(1)},1000);
}
},1200);
}else{
playNo();
}
};
g.appendChild(c);
});
}

function playCurrentWord(){
speak(currentWord);
}

function initM4(){
if(busy4)return;
busy4=true;
matched=0;
flipped=[];
var g=document.getElementById('memoryGrid');
g.innerHTML='';
var pairs=[];
W.forEach(function(item){
pairs.push({type:'img',data:item.img,word:item.w});
pairs.push({type:'text',data:item.w,word:item.w});
});
pairs.sort(function(){return Math.random()-.5});
pairs.forEach(function(item,idx){
var c=document.createElement('div');
c.className='memory-card';
c.dataset.word=item.word;
c.dataset.type=item.type;
c.dataset.idx=idx;
if(item.type==='img'){
c.innerHTML='<img src="'+item.data+'" alt="'+item.word+'">';
}else{
c.innerHTML='<div class="back-text">'+item.data+'</div>';
}
c.onclick=function(){
if(this.classList.contains('flipped')||this.classList.contains('matched'))return;
if(flipped.length>=2)return;
this.classList.add('flipped');
flipped.push({el:this,word:item.word,idx:idx});
if(flipped.length===2){
if(flipped[0].word===flipped[1].word&&flipped[0].idx!==flipped[1].idx){
playOk();
setTimeout(function(){
flipped[0].el.classList.add('matched');
flipped[1].el.classList.add('matched');
flipped=[];
matched++;
document.getElementById('s4').innerHTML=stars(matched,5);
if(matched===5){
setTimeout(function(){goM(1)},1000);
}
},800);
}else{
playNo();
setTimeout(function(){
flipped[0].el.classList.remove('flipped');
flipped[1].el.classList.remove('flipped');
flipped=[];
},1000);
}
}
};
g.appendChild(c);
});
}

function initM5(){
document.getElementById('s4').innerHTML='⭐⭐⭐⭐⭐';
}

goM(0);
</script>
</body>
</html>
