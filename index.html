<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>跟着佩琪学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#2c3e50;
  --muted:#667085;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 10%,#ffd9e7 0,transparent 35%),
    radial-gradient(circle at 88% 12%,#c9f0ff 0,transparent 32%),
    linear-gradient(160deg,#fff4f8,#f8fbff 52%,#f5fff4);
  padding:20px 16px 28px;
  color:var(--ink);
}
.container{max-width:760px;margin:0 auto}
.hero{
  text-align:center;
  background:rgba(255,255,255,.72);
  border:2px solid rgba(255,255,255,.9);
  border-radius:22px;
  padding:14px 14px 16px;
  box-shadow:0 10px 26px rgba(32,56,90,.08);
}
.logo{width:118px;display:block;margin:2px auto 6px}
h1{font-size:30px;line-height:1.1;color:#394867}
.sub{margin-top:4px;font-size:14px;color:#6b7280}
.levels{margin-top:20px;display:grid;gap:12px}
.level-card{
  text-decoration:none;
  color:var(--ink);
  background:rgba(255,255,255,.9);
  border:2px solid rgba(255,255,255,.95);
  border-radius:18px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:0 6px 20px rgba(30,58,95,.1);
  transition:transform .2s ease,box-shadow .2s ease;
  cursor:pointer;
}
.level-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(30,58,95,.15)}
.level-card:active{transform:scale(.98)}
.level-icon{
  width:64px;height:64px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;
  border:3px solid;
}
.level-info{flex:1;min-width:0}
.level-title{font-size:20px;font-weight:900;line-height:1.2}
.level-desc{margin-top:4px;font-size:13px;color:var(--muted)}
.level-meta{margin-top:6px;font-size:12px;font-weight:700;opacity:.8}
@media(min-width:700px){
  .levels{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <img class="logo" src="assets/peppa/peppa-pig-title-logo.png" alt="Peppa">
    <h1>跟着佩琪学英语</h1>
    <div class="sub">每天 15-25 分钟 · 图像优先 · 亲子共学</div>
  </div>
  <div class="levels">
    <a class="level-card" href="level-1.html" style="background:linear-gradient(135deg,#fce4ec,#f8bbd0)">
      <div class="level-icon" style="background:#ffebee;border-color:#ef5350;color:#c62828">1</div>
      <div class="level-info">
        <div class="level-title">Level 1 · 日常冒险</div>
        <div class="level-desc">颜色、动物、身体、食物、家人...</div>
        <div class="level-meta">10 个故事 · 50 个单词</div>
      </div>
    </a>
    <a class="level-card" href="level-2.html" style="background:linear-gradient(135deg,#e8f5e9,#c8e6c9)">
      <div class="level-icon" style="background:#e8f5e9;border-color:#66bb6a;color:#2e7d32">2</div>
      <div class="level-info">
        <div class="level-title">Level 2 · 社交世界</div>
        <div class="level-desc">情绪、天气、地点、花园、厨房...</div>
        <div class="level-meta">10 个故事 · 50 个单词</div>
      </div>
    </a>
    <a class="level-card" href="level-3.html" style="background:linear-gradient(135deg,#e3f2fd,#bbdefb)">
      <div class="level-icon" style="background:#e3f2fd;border-color:#42a5f5;color:#01579b">3</div>
      <div class="level-info">
        <div class="level-title">Level 3 · 探索之旅</div>
        <div class="level-desc">交通、形状、音乐、海滩、生日...</div>
        <div class="level-meta">10 个故事 · 50 个单词</div>
      </div>
    </a>
    <a class="level-card" href="level-4.html" style="background:linear-gradient(135deg,#fff9c4,#ffe082)">
      <div class="level-icon" style="background:#fff9c4;border-color:#ffd54f;color:#f57f17">4</div>
      <div class="level-info">
        <div class="level-title">Level 4 · 成长故事</div>
        <div class="level-desc">家务、学校、宠物、烹饪、运动...</div>
        <div class="level-meta">5 个故事 · 25 个单词</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
