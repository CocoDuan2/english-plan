<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>跟着佩琪学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#fce4ec,#f8bbd0);padding:20px}
.container{max-width:500px;margin:0 auto;text-align:center}
.logo{width:100px;margin:10px auto}
h1{font-size:26px;color:#555;margin:12px 0}
.day-group{margin:16px 0;text-align:left}
.day-label{font-size:15px;font-weight:700;color:#888;padding:0 4px 6px;display:flex;align-items:center;gap:6px}
.card{background:rgba(255,255,255,.9);border-radius:16px;padding:14px 18px;margin:6px 0;
  box-shadow:0 4px 15px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;
  text-decoration:none;color:#333;transition:.2s}
.card:active{transform:scale(.97)}
.card .icon{font-size:28px;width:36px;text-align:center}
.card .info{flex:1}
.card .title{font-size:16px;font-weight:700}
.card .desc{font-size:12px;color:#888;margin-top:2px}
</style>
</head>
<body>
<div class="container">
  <img class="logo" src="assets/peppa/peppa-pig-title-logo.png" alt="Peppa">
  <h1>跟着佩琪学英语</h1>
  <div id="lessons"></div>
</div>
<script>
var lessons=[
  {day:1,dir:'day1-colors',emoji:'',theme:'Colors',words:'red, blue, yellow, green, orange'},
  {day:2,dir:'day2-animals',emoji:'',theme:'Animals',words:'cat, dog, fish, bird, duck'}
];
var wrap=document.getElementById('lessons');
lessons.forEach(function(l){
  var g=document.createElement('div');g.className='day-group';
  g.innerHTML='<div class="day-label">Day '+l.day+' · '+l.theme+'</div>'; 
  var t=document.createElement('a');t.className='card';
  t.href='lessons/'+l.dir+'/teach.html';
  t.innerHTML='<div class="icon"><img src="assets/peppa/peppa-pig-happy-standing.png" style="width:28px;height:28px;object-fit:contain"></div><div class="info"><div class="title">老师课件</div><div class="desc">'+l.words+'</div></div>'; 
  g.appendChild(t);
  var r=document.createElement('a');r.className='card';
  r.href='lessons/'+l.dir+'/review.html';
  r.innerHTML='<div class="icon"><img src="assets/peppa/george-standing.png" style="width:28px;height:28px;object-fit:contain"></div><div class="info"><div class="title">练习课件</div><div class="desc">'+l.words+'</div></div>'; 
  g.appendChild(r);
  wrap.appendChild(g);
});
</script>
</body>
</html>
