<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>跟着佩琪学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#2c3e50;
  --muted:#667085;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 10%,#ffd9e7 0,transparent 35%),
    radial-gradient(circle at 88% 12%,#c9f0ff 0,transparent 32%),
    linear-gradient(160deg,#fff4f8,#f8fbff 52%,#f5fff4);
  padding:20px 16px 28px;
  color:var(--ink);
}
.container{max-width:760px;margin:0 auto}
.hero{
  text-align:center;
  background:rgba(255,255,255,.72);
  border:2px solid rgba(255,255,255,.9);
  border-radius:22px;
  padding:14px 14px 16px;
  box-shadow:0 10px 26px rgba(32,56,90,.08);
}
.logo{width:118px;display:block;margin:2px auto 6px}
h1{font-size:30px;line-height:1.1;color:#394867}
.sub{margin-top:4px;font-size:14px;color:#6b7280}
.day-group{margin-top:14px}
.day-head{
  display:flex;align-items:center;justify-content:space-between;
  border-radius:14px;
  padding:10px 12px;
  font-weight:800;
  font-size:17px;
  color:#263238;
}
.day-head small{font-size:12px;font-weight:700;opacity:.78}
.cards{margin-top:8px;display:grid;gap:8px}
.card{
  text-decoration:none;
  color:var(--ink);
  background:rgba(255,255,255,.9);
  border:2px solid rgba(255,255,255,.95);
  border-radius:16px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 4px 16px rgba(30,58,95,.08);
  transition:transform .18s ease,box-shadow .18s ease;
}
.card:active{transform:scale(.98)}
.icon-wrap{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
}
.icon-wrap img{width:42px;height:42px;object-fit:contain}
.info{flex:1;min-width:0}
.row{display:flex;align-items:center;gap:8px}
.title{font-size:17px;font-weight:900;line-height:1.1}
.badge{
  font-size:11px;font-weight:800;padding:3px 7px;border-radius:999px;
  border:2px solid transparent;
}
.desc{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(min-width:700px){
  .cards{grid-template-columns:1fr 1fr}
  .card{padding:12px}
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <img class="logo" src="assets/peppa/peppa-pig-title-logo.png" alt="Peppa">
    <h1>跟着佩琪学英语</h1>
    <div class="sub">每天 15-25 分钟 · 图像优先 · 亲子共学</div>
  </div>
  <div id="lessons"></div>
</div>
<script>
var lessons=[
  {
    day:1,
    dir:'day1-colors',
    theme:'Colors',
    words:'red, blue, yellow, green, orange',
    panel:'linear-gradient(135deg,#ffe0eb,#ffe9c8)',
    teachIcon:'assets/peppa/peppa-pig-happy-standing.png',
    reviewIcon:'assets/peppa/george_pig_bubbles.png',
    teachTone:{bg:'#ffe4ec',bd:'#ff9ec2',txt:'#c2185b'},
    reviewTone:{bg:'#e8f3ff',bd:'#8ec5ff',txt:'#1565c0'}
  },
  {
    day:2,
    dir:'day2-animals',
    theme:'Animals',
    words:'cat, dog, fish, bird, duck',
    panel:'linear-gradient(135deg,#dbf4e0,#d9efff)',
    teachIcon:'assets/peppa/peppa_pig_bicycle.png',
    reviewIcon:'assets/peppa/george-superhero-costume.png',
    teachTone:{bg:'#e7f9ee',bd:'#80d8a4',txt:'#2e7d32'},
    reviewTone:{bg:'#fff4dc',bd:'#ffcc80',txt:'#ef6c00'}
  },
  {
    day:3,
    dir:'day3-body',
    theme:'Body',
    words:'head, eyes, ears, nose, mouth',
    panel:'linear-gradient(135deg,#d9ebff,#e3f7e2)',
    teachIcon:'assets/peppa/daddy-pig-walking.png',
    reviewIcon:'assets/peppa/peppa_pig_princess_fairy.png',
    teachTone:{bg:'#eaf2ff',bd:'#9dbdff',txt:'#2456a6'},
    reviewTone:{bg:'#e9fff0',bd:'#8dd8a5',txt:'#1f7a46'}
  },
  {
    day:4,
    dir:'day4-food',
    theme:'Food',
    words:'apple, banana, milk, bread, egg',
    panel:'linear-gradient(135deg,#fff4e0,#ffe0b2)',
    teachIcon:'assets/peppa/mummy-pig-standing-grass.png',
    reviewIcon:'assets/peppa/george_pig_dinosaur.png',
    teachTone:{bg:'#fff4e0',bd:'#ffcc80',txt:'#e65100'},
    reviewTone:{bg:'#fff8e1',bd:'#ffe082',txt:'#f57f17'}
  },
  {
    day:5,
    dir:'day5-review',
    theme:'Review',
    words:'Day 1-4 全部复习 · 20 words',
    panel:'linear-gradient(135deg,#f3e5f5,#e8eaf6)',
    teachIcon:'assets/peppa/peppa_pig_arms_open.png',
    reviewIcon:'assets/peppa/peppa-fairy-princess-small.png',
    teachTone:{bg:'#f3e5f5',bd:'#ce93d8',txt:'#7b1fa2'},
    reviewTone:{bg:'#ede7f6',bd:'#b39ddb',txt:'#4527a0'}
  },
  {
    day:6,
    dir:'day6-numbers',
    theme:'Numbers',
    words:'one, two, three, four, five',
    panel:'linear-gradient(135deg,#e8f5e9,#dcedc8)',
    teachIcon:'assets/peppa/george-superhero-costume.png',
    reviewIcon:'assets/peppa/emily-elephant-standing.png',
    teachTone:{bg:'#e8f5e9',bd:'#81c784',txt:'#2e7d32'},
    reviewTone:{bg:'#f1f8e9',bd:'#aed581',txt:'#558b2f'}
  },
  {
    day:7,
    dir:'day7-actions',
    theme:'Actions',
    words:'run, jump, walk, sit, stand',
    panel:'linear-gradient(135deg,#e3f2fd,#bbdefb)',
    teachIcon:'assets/peppa/mummy-pig-standing-grass.png',
    reviewIcon:'assets/peppa/peppa_pig_bicycle.png',
    teachTone:{bg:'#e3f2fd',bd:'#90caf9',txt:'#1565c0'},
    reviewTone:{bg:'#e8eaf6',bd:'#9fa8da',txt:'#283593'}
  },
  {
    day:8,
    dir:'day8-colors2',
    theme:'Colors 2',
    words:'pink, purple, white, black, brown',
    panel:'linear-gradient(135deg,#f3e5f5,#e1bee7)',
    teachIcon:'assets/peppa/candy-cat-green-dress.png',
    reviewIcon:'assets/peppa/peppa-fairy-princess-small.png',
    teachTone:{bg:'#f3e5f5',bd:'#ce93d8',txt:'#7b1fa2'},
    reviewTone:{bg:'#fce4ec',bd:'#f48fb1',txt:'#c2185b'}
  },
  {
    day:9,
    dir:'day9-animals2',
    theme:'Animals 2',
    words:'rabbit, pig, cow, horse, sheep',
    panel:'linear-gradient(135deg,#e8f5e9,#c8e6c9)',
    teachIcon:'assets/peppa/george-superhero-costume.png',
    reviewIcon:'assets/peppa/emily-elephant-standing.png',
    teachTone:{bg:'#e8f5e9',bd:'#81c784',txt:'#2e7d32'},
    reviewTone:{bg:'#f1f8e9',bd:'#aed581',txt:'#558b2f'}
  },
  {
    day:10,
    dir:'day10-review',
    theme:'Review',
    words:'Day 6-9 全部复习 · 20 words',
    panel:'linear-gradient(135deg,#e0f2f1,#dcedc8)',
    teachIcon:'assets/peppa/peppa_pig_circle_emblem.png',
    reviewIcon:'assets/peppa/peppa-family-group-outdoors.png',
    teachTone:{bg:'#e0f2f1',bd:'#80cbc4',txt:'#00695c'},
    reviewTone:{bg:'#f1f8e9',bd:'#aed581',txt:'#558b2f'}
  },
  {
    day:11,
    dir:'day11-colors',
    theme:'Colors',
    words:'red, blue, yellow, green, orange',
    panel:'linear-gradient(135deg,#ffe0eb,#ffe9c8)',
    teachIcon:'assets/peppa/peppa-pig-happy-standing.png',
    reviewIcon:'assets/peppa/george-playing-ball.png',
    teachTone:{bg:'#ffe4ec',bd:'#ff9ec2',txt:'#c2185b'},
    reviewTone:{bg:'#e8f3ff',bd:'#8ec5ff',txt:'#1565c0'}
  },
  {
    day:12,
    dir:'day12-animals',
    theme:'Animals',
    words:'cat, dog, fish, bird, duck',
    panel:'linear-gradient(135deg,#dbf4e0,#d9efff)',
    teachIcon:'assets/peppa/peppa_pig_bicycle.png',
    reviewIcon:'assets/peppa/emily-elephant-standing.png',
    teachTone:{bg:'#e7f9ee',bd:'#80d8a4',txt:'#2e7d32'},
    reviewTone:{bg:'#fff4dc',bd:'#ffcc80',txt:'#ef6c00'}
  },
  {
    day:13,
    dir:'day13-body',
    theme:'Body',
    words:'head, eyes, ears, nose, mouth',
    panel:'linear-gradient(135deg,#d9ebff,#e3f7e2)',
    teachIcon:'assets/peppa/george-superhero-costume.png',
    reviewIcon:'assets/peppa/candy-cat-green-dress.png',
    teachTone:{bg:'#eaf2ff',bd:'#9dbdff',txt:'#2456a6'},
    reviewTone:{bg:'#e9fff0',bd:'#8dd8a5',txt:'#1f7a46'}
  },
  {
    day:14,
    dir:'day14-food',
    theme:'Food',
    words:'apple, banana, milk, bread, egg',
    panel:'linear-gradient(135deg,#fff0dc,#ffe6c8)',
    teachIcon:'assets/peppa/daddy-pig-walking.png',
    reviewIcon:'assets/peppa/peppa_pig_princess_fairy.png',
    teachTone:{bg:'#fff4e0',bd:'#ffcc80',txt:'#e65100'},
    reviewTone:{bg:'#fff8e1',bd:'#ffe082',txt:'#f57f17'}
  }
];

function cardHtml(kind,l){
  var isTeach=kind==='teach';
  var title=isTeach?'老师课件':'练习课件';
  var icon=isTeach?l.teachIcon:l.reviewIcon;
  var tone=isTeach?l.teachTone:l.reviewTone;
  var tip=isTeach?'大屏跟读':'互动游戏';
  return '<a class="card" href="lessons/'+l.dir+'/'+kind+'.html">'+
    '<div class="icon-wrap" style="background:'+tone.bg+';border:2px solid '+tone.bd+'">'+
      '<img src="'+icon+'" alt="'+title+'">'+
    '</div>'+
    '<div class="info">'+
      '<div class="row">'+
        '<div class="title">'+title+'</div>'+
        '<div class="badge" style="background:'+tone.bg+';border-color:'+tone.bd+';color:'+tone.txt+'">'+tip+'</div>'+
      '</div>'+
      '<div class="desc">'+l.words+'</div>'+
    '</div>'+
  '</a>';
}

var wrap=document.getElementById('lessons');
lessons.forEach(function(l){
  var g=document.createElement('section');
  g.className='day-group';
  g.innerHTML=
    '<div class="day-head" style="background:'+l.panel+'">'+
      '<span>Day '+l.day+' · '+l.theme+'</span>'+
      '<small>'+(l.theme==='Review'?'20 words':'5 words')+'</small>'+
    '</div>'+
    '<div class="cards">'+cardHtml('teach',l)+cardHtml('review',l)+'</div>';
  wrap.appendChild(g);
});
</script>
</body>
</html>
