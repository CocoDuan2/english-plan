<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Phonics 2 · 短元音家族 - 跟着佩琪学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#e3f2fd,#bbdefb);
  padding:20px;color:#2c3e50;
}
.header{
  max-width:900px;margin:0 auto 30px;text-align:center;
}
.badge{
  display:inline-block;
  background:#e3f2fd;border:3px solid #42a5f5;
  color:#1565c0;font-size:48px;font-weight:900;
  width:90px;height:90px;border-radius:20px;
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}
h1{font-size:36px;font-weight:900;color:#394867;margin-bottom:8px}
.sub{font-size:18px;color:#667085;margin-bottom:20px}
.grid{
  max-width:900px;margin:0 auto;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}
.card{
  background:#fff;border-radius:16px;padding:24px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  transition:transform .2s ease,box-shadow .2s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.card-day{font-size:20px;font-weight:900;color:#42a5f5;margin-bottom:8px}
.card-title{font-size:18px;font-weight:700;color:#2c3e50;margin-bottom:4px}
.card-title-cn{font-size:14px;color:#667085;margin-bottom:12px}
.card-btns{display:flex;gap:10px}
.card-btns a{
  flex:1;padding:10px;background:#42a5f5;color:#fff;
  text-decoration:none;border-radius:8px;text-align:center;
  font-size:14px;font-weight:700;
  transition:background .2s ease;
}
.card-btns a:hover{background:#1e88e5}
.card-btns a:last-child{background:#66bb6a}
.card-btns a:last-child:hover{background:#43a047}
.back-btn{
  display:inline-block;margin:30px auto 0;
  padding:12px 28px;background:#42a5f5;color:#fff;
  border-radius:12px;text-decoration:none;
  font-size:16px;font-weight:700;
  box-shadow:0 4px 12px rgba(66,165,245,.3);
  display:block;max-width:200px;text-align:center;
}
@media(max-width:480px){
  h1{font-size:28px}
  .badge{width:70px;height:70px;font-size:36px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="header">
  <div class="badge">P2</div>
  <h1>Phonics 2 · 短元音家族</h1>
  <div class="sub">CVC 拼读 · 15课 · 75个单词</div>
</div>

<div class="grid" id="lessonGrid"></div>

<a class="back-btn" href="index.html">← 返回主页</a>

<script>
const lessons=[
  {day:"P27",title:"-at Family · Peppa's Hat",titleCn:"-at 家族 · 佩琪的帽子",folder:"at-family"},
  {day:"P28",title:"-an Family · Peppa Helps Cook",titleCn:"-an 家族 · 佩琪帮忙做饭",folder:"an-family"},
  {day:"P29",title:"-ap Family · Peppa's Nap Time",titleCn:"-ap 家族 · 佩琪午睡",folder:"ap-family"},
  {day:"P30",title:"-ad Family · Peppa and Daddy",titleCn:"-ad 家族 · 佩琪和爸爸",folder:"ad-family"},
  {day:"P31",title:"-ag Family · Peppa's Bag",titleCn:"-ag 家族 · 佩琪的书包",folder:"ag-family"},
  {day:"P32",title:"-en Family · Peppa Counts",titleCn:"-en 家族 · 佩琪数数",folder:"en-family"},
  {day:"P33",title:"-et Family · Peppa's Pet",titleCn:"-et 家族 · 佩琪的宠物",folder:"et-family"},
  {day:"P34",title:"-ig Family · Peppa Digs",titleCn:"-ig 家族 · 佩琪挖土",folder:"ig-family"},
  {day:"P35",title:"-in Family · Peppa Wins",titleCn:"-in 家族 · 佩琪赢了",folder:"in-family"}
];

const grid=document.getElementById('lessonGrid');
lessons.forEach(l=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="card-day">${l.day}</div>
    <div class="card-title">${l.title}</div>
    <div class="card-title-cn">${l.titleCn}</div>
    <div class="card-btns">
      <a href="lessons/phonics-2/${l.folder}/teach.html">📖 Teach</a>
      <a href="lessons/phonics-2/${l.folder}/review.html">🎮 Review</a>
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
